                        &lt;div class=&quot;bg-sky-50 p-3 rounded-lg&quot;&gt;

                            &lt;button class=&quot;flex-1 py-1 text-xs border rounded hover:bg-gray-100&quot; id=&quot;btn-eff-n3&quot; onclick=&quot;setEffN(3)&quot;&gt;3&lt;/button&gt;
                            &lt;button class=&quot;flex-1 py-1 text-xs border rounded hover:bg-gray-100&quot; id=&quot;btn-eff-n4&quot; onclick=&quot;setEffN(4)&quot;&gt;4&lt;/button&gt;
                            &lt;button class=&quot;flex-1 py-1 text-xs border rounded hover:bg-gray-100&quot; id=&quot;btn-eff-n5&quot; onclick=&quot;setEffN(5)&quot;&gt;5&lt;/button&gt;

                        &lt;/div&gt;
                        &lt;div class=&quot;flex justify-between text-sm&quot;&gt;
                            &lt;span&gt;总功 \(W_{总} = Fs\):&lt;/span&gt;
                            &lt;span class=&quot;font-mono&quot;&gt;&lt;span id=&quot;exp-w-total&quot;&gt;0.00&lt;/span&gt; J&lt;/span&gt;

                    &lt;div class=&quot;mt-auto bg-gradient-to-br from-green-500 to-emerald-600 text-white rounded-xl p-4 text-center shadow-lg hidden&quot;&gt;

                        &lt;div class=&quot;text-4xl font-bold&quot;&gt;&lt;span id=&quot;exp-eta&quot;&gt;--&lt;/span&gt;%&lt;/div&gt;

    &lt;/main&gt;

    &lt;script&gt;
        // 全局状态管理
        const state = {
            currentTab: 'principle',
            principle: {
                fixed: { g: 50, h: 0, playing: false },
                movable: { g: 50, h: 0, playing: false }
            },
            assembly: { n: 2, s: 0, maxS: 300 },
            mechanics: { g: 100, gPulley: 10, n: 2, h: 0 },
            efficiency: { isRunning: false, h: 0, maxH: 0.2, g: 2.0, gPulley: 0.2, n: 2, f: 0, s: 0, friction: 0.1 }
        };

        // 切换标签页
        function switchTab(tabId) {
            document.querySelectorAll('.nav-item').forEach(el =&gt; el.classList.remove('active'));
            event.currentTarget.classList.add('active');

            document.querySelectorAll('.page-section').forEach(el =&gt; {
                el.style.opacity = '0';
                el.style.pointerEvents = 'none';
            });

            const target = document.getElementById(tabId);
            target.style.opacity = '1';
            target.style.pointerEvents = 'auto';
            
            state.currentTab = tabId;
            
            if(p5Instances[tabId]) p5Instances[tabId].resizeCanvas(
                target.querySelector('.canvas-container, #canvas-assembly, #canvas-mechanics, #canvas-efficiency').clientWidth,
                target.querySelector('.canvas-container, #canvas-assembly, #canvas-mechanics, #canvas-efficiency').clientHeight
            );
            
            if(window.MathJax) MathJax.typesetPromise();
        }

        // --- 模块1: 原理 控制逻辑 ---
        function updateFixedWeight(val) {
            state.principle.fixed.g = parseInt(val);
            document.getElementById('val-g-fixed').innerText = val;
            document.getElementById('val-f-fixed').innerText = val;
        }
        function updateMovableWeight(val) {
            state.principle.movable.g = parseInt(val);
            document.getElementById('val-g-movable').innerText = val;
            document.getElementById('val-f-movable').innerText = val / 2;
        }

        function toggleFixedAnim(play) { state.principle.fixed.playing = play; }
        function resetFixedAnim() { state.principle.fixed.playing = false; state.principle.fixed.h = 0; }
        function toggleMovableAnim(play) { state.principle.movable.playing = play; }
        function resetMovableAnim() { state.principle.movable.playing = false; state.principle.movable.h = 0; }

        // --- 模块2: 组装 控制逻辑 ---
        function setAssemblyMode(n) {
            state.assembly.n = n;
            if (p5Instances.assembly) {
                state.assembly.resetHand = true;
            }
            document.querySelectorAll('[id^=&quot;btn-n&quot;]').forEach(btn =&gt; {
                btn.className = &quot;flex-1 py-1 text-xs rounded text-gray-500 hover:text-gray-700&quot;;
            });
            document.getElementById('btn-n'+n).className = &quot;flex-1 py-1 text-xs rounded bg-white shadow-sm text-sky-600 font-bold&quot;;
            
            let desc = &quot;&quot;;
            if(n===2) desc = &quot;2段绳子承担物重，拉力向下。&quot;;
            else if(n===3) desc = &quot;3段绳子承担物重，拉力向上。&quot;;
            else if(n===4) desc = &quot;4段绳子承担物重，拉力向下。&quot;;
            else if(n===5) desc = &quot;5段绳子承担物重，拉力向上。&quot;;
            document.getElementById('assembly-desc').innerText = desc;
        }

        // --- 模块3: 力学 控制逻辑 ---
        function updateMechHeight(val) {
            state.mechanics.h = parseInt(val);
        }
        function updateMechG(val) {
            state.mechanics.g = parseInt(val);
            document.getElementById('mech-val-g').innerText = val;
            calcMechF();
        }
        function updateMechGPulley(val) {
            state.mechanics.gPulley = parseInt(val);
            document.getElementById('mech-val-g-pulley').innerText = val;
            calcMechF();
        }
        function setMechN(n) {
            state.mechanics.n = n;
            document.getElementById('mech-val-n').innerText = n;
            updateMechHeight(state.mechanics.h);
            calcMechF();
        }
        function calcMechF() {
            const f = (state.mechanics.g + state.mechanics.gPulley) / state.mechanics.n;
            document.getElementById('mech-res-f').innerText = f.toFixed(1);
        }

        // --- 模块4: 效率 控制逻辑 ---
        function updateEffG(val) {
            state.efficiency.g = parseFloat(val);
            document.getElementById('eff-val-g').innerText = val;
            updateEffF();
        }
        function updateEffGP(val) {
            state.efficiency.gPulley = parseFloat(val);
            document.getElementById('eff-val-gp').innerText = val;
            updateEffF();
        }
        function updateEffMaxH(val) {
            state.efficiency.maxH = parseFloat(val);
            document.getElementById('eff-val-h').innerText = val;
        }
        function setEffN(n) {
            state.efficiency.n = n;
            document.querySelectorAll('[id^=&quot;btn-eff-n&quot;]').forEach(btn =&gt; {
                btn.className = &quot;flex-1 py-1 text-xs border rounded hover:bg-gray-100&quot;;
            });
            document.getElementById('btn-eff-n'+n).className = &quot;flex-1 py-1 text-xs border rounded bg-sky-100 text-sky-700 font-bold&quot;;
            updateEffF();
        }
        function updateFriction(val) {
            state.efficiency.friction = parseFloat(val);
            document.getElementById('val-friction').innerText = val;
            updateEffF();
        }
        
        function updateEffF() {
            if (!state.efficiency.isRunning) {
                const g = Number(state.efficiency.g);
                const gPulley = Number(state.efficiency.gPulley);
                const n = Number(state.efficiency.n);
                const friction = Number(state.efficiency.friction);
                
                const G_total = g + gPulley;
                const F_ideal = G_total / n;
                // 简单的摩擦力模型：F = F_ideal + f
                const F_real = F_ideal + friction * 2;
                state.efficiency.f = F_real;
                document.getElementById('exp-f').innerText = F_real.toFixed(2);
            }
        }

        function toggleExperiment() {
            if (state.efficiency.isRunning) return;
            
            state.efficiency.isRunning = true;
            const btn = document.getElementById('btn-start-exp');
            btn.innerHTML = '&lt;span class=&quot;text-2xl&quot;&gt;⏳&lt;/span&gt;';
            btn.classList.add('opacity-75', 'cursor-not-allowed');

            let progress = 0;
            const duration = 3000;
            const startTime = Date.now();

            updateEffF(); // 确保 F 是最新的
            const F_reading = state.efficiency.f;
            const n = Number(state.efficiency.n);
            const g = Number(state.efficiency.g);
            const maxH = Number(state.efficiency.maxH);
            
            document.getElementById('exp-f').innerText = F_reading.toFixed(2);

            const animate = () =&gt; {
                const now = Date.now();
                const elapsed = now - startTime;
                progress = Math.min(elapsed / duration, 1);
                
                state.efficiency.h = progress * maxH;
                
                const h = state.efficiency.h;
                const s = h * n;
                document.getElementById('exp-h').innerText = h.toFixed(2);
                document.getElementById('exp-s').innerText = s.toFixed(2);
                
                const W_useful = g * h;
                const W_total = F_reading * s;
                document.getElementById('exp-w-useful').innerText = W_useful.toFixed(2);
                document.getElementById('exp-w-total').innerText = W_total.toFixed(2);

                if (progress &lt; 1) {
                    requestAnimationFrame(animate);
                } else {
                    state.efficiency.isRunning = false;
                    btn.innerHTML = '&lt;span class=&quot;text-2xl&quot;&gt;↺&lt;/span&gt;';
                    btn.classList.remove('opacity-75', 'cursor-not-allowed');
                    btn.onclick = resetExperiment;
                    
                    // 确保分母不为0
                    const eta = (W_total &gt; 0.0001) ? (W_useful / W_total * 100).toFixed(1) : &quot;0.0&quot;;
                    document.getElementById('exp-eta').innerText = eta;
                }
            };
            requestAnimationFrame(animate);
        }

        function resetExperiment() {
            state.efficiency.h = 0;
            document.getElementById('exp-h').innerText = &quot;0.00&quot;;
            document.getElementById('exp-s').innerText = &quot;0.00&quot;;
            document.getElementById('exp-w-useful').innerText = &quot;0.00&quot;;
            document.getElementById('exp-w-total').innerText = &quot;0.00&quot;;
            document.getElementById('exp-f').innerText = &quot;--&quot;;
            document.getElementById('exp-eta').innerText = &quot;--&quot;;
            
            const btn = document.getElementById('btn-start-exp');
            btn.innerHTML = '&lt;span class=&quot;text-2xl&quot;&gt;▶&lt;/span&gt;';
            btn.onclick = toggleExperiment;
            
            // 重置后重新计算一次 F
            updateEffF();
        }

        // ================= p5.js 绘图逻辑 =================
        
        function drawPulley(p, x, y, r, isFixed) {
            p.push();
            p.translate(x, y);
            p.fill('#bae6fd'); p.stroke('#0ea5e9'); p.strokeWeight(2); p.circle(0, 0, r * 2);
            p.noFill(); p.stroke('#7dd3fc'); p.circle(0, 0, r * 2 - 4);
            p.fill('#0369a1'); p.noStroke(); p.circle(0, 0, 8);
            p.stroke('#64748b'); p.strokeWeight(4);
            if (isFixed) {
                p.line(0, 0, 0, -r - 10); 
                p.noFill(); p.strokeWeight(3); p.arc(0, -r-14, 8, 8, p.PI, 0); 
                p.stroke('#94a3b8'); p.strokeWeight(2); p.line(0, -r-18, 0, -r-35);
                p.stroke('#475569'); p.strokeWeight(4); p.line(-20, -r-35, 20, -r-35);
                for(let i=-20; i&lt;20; i+=5) p.line(i, -r-35, i+3, -r-40);
            } else {
                p.line(0, 0, 0, r + 10); 
                p.noFill(); p.strokeWeight(3); p.arc(0, r+14, 8, 8, 0, p.PI);
            }
            p.pop();
        }

        function drawStandardPulleySystem(p, cx, topY, bottomY, n, handPos) {
            const R_outer = 28; 
            const R_inner = 15;
            
            function drawHook(x, y, dir) {
                p.push();
                p.stroke('#64748b'); p.strokeWeight(3); p.noFill();
                p.line(x, y, x, y + dir * 15);
                if (dir === 1) p.arc(x - 5, y + 15, 10, 10, 0, p.PI); 
                else p.arc(x - 5, y - 15, 10, 10, p.PI, 0);
                p.pop();
                return {x: x - 5, y: y + dir * 20};

                }
                
                p.fill('#ef4444'); p.noStroke();
                p.triangle(cx+95, weightY, cx+100, weightY-5, cx+100, weightY+5);

                // 左侧显示效率
                p.push();
                p.translate(60, p.height / 2);
                p.textAlign(p.CENTER, p.CENTER);
                p.fill(255, 255, 255, 200);
                p.stroke(200);
                p.strokeWeight(1);
                p.rectMode(p.CENTER);
                p.rect(0, 0, 100, 80, 10); // 背景
                p.fill('#059669');
                p.noStroke();
                p.textSize(14);
                p.text(&quot;机械效率&quot;, 0, -15);
                p.textSize(24);
                p.textStyle(p.BOLD);
                let eta = document.getElementById('exp-eta').innerText;
                p.text(eta + &quot;%&quot;, 0, 15);
                p.pop();
            };
        };

        const p5Instances = {};
        setTimeout(() =&gt; {
            p5Instances.principleFixed = new p5(sketchFixed, 'canvas-fixed');
            p5Instances.principleMovable = new p5(sketchMovable, 'canvas-movable');
            p5Instances.assembly = new p5(sketchAssembly, 'canvas-assembly');
            p5Instances.mechanics = new p5(sketchMechanics, 'canvas-mechanics');
            p5Instances.efficiency = new p5(sketchEfficiency, 'canvas-efficiency');
            updateEffF(); // 初始化拉力
            switchTab('principle');
        }, 100);
