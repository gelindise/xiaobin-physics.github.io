<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>注册</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="form-box">
    <h2>用户注册</h2>
    <input type="text" id="regUser" placeholder="设置用户名">
    <input type="password" id="regPwd" placeholder="设置密码">
    <input type="email" id="regEmail" placeholder="邮箱（选填）">
    <button class="btn" onclick="userRegister()">注册</button>
    <p>已有账号？<a href="login.html">去登录</a></p>
    <p id="regTip"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
