    <h2>原子结构 — 元素周期表与电子壳层</h2>
    <p style="color:#94a3b8;margin:0 0 16px 0;">点击周期表中的元素查看其原子结构（质子、中子和电子排布），使用缩放滑块观察细节。</p>

  <script>
    // ===== Javalab helper functions =====
    function mod(x, y) {
      if (x < 0) x += y * (Math.ceil(Math.abs(x) / y) + 1);
      return x - y * Math.floor(x / y);
    }
    function contain(x, y, rx, ry, rw, rh) {
      return x >= rx && x <= rx + rw && y >= ry && y <= ry + rh;
    }
    function mag(x, y, z) {
      return Math.sqrt(x * x + y * y + z * z);
    }
    function dist(x1, y1, z1, x2, y2, z2) {
      return mag(x2 - x1, y2 - y1, z2 - z1);
    }
    if (typeof match === 'undefined') { window.match = function(str, re) { return str.match(re); }; }

    var electrons = [1,0,0,0,0,0,0,2,0,0,0,0,0,0,2,1,0,0,0,0,0,2,2,0,0,0,0,0,2,3,0,0,0,0,0,2,4,0,0,0,0,0,2,5,0,0,0,0,0,2,6,0,0,0,0,0,2,7,0,0,0,0,0,2,8,0,0,0,0,0,2,8,1,0,0,0,0,2,8,2,0,0,0,0,2,8,3,0,0,0,0,2,8,4,0,0,0,0,2,8,5,0,0,0,0,2,8,6,0,0,0,0,2,8,7,0,0,0,0,2,8,8,0,0,0,0,2,8,8,1,0,0,0,2,8,8,2,0,0,0,2,8,9,2,0,0,0,2,8,10,2,0,0,0,2,8,11,2,0,0,0,2,8,13,1,0,0,0,2,8,13,2,0,0,0,2,8,14,2,0,0,0,2,8,15,2,0,0,0,2,8,16,2,0,0,0,2,8,18,1,0,0,0,2,8,18,2,0,0,0,2,8,18,3,0,0,0,2,8,18,4,0,0,0,2,8,18,5,0,0,0,2,8,18,6,0,0,0,2,8,18,7,0,0,0,2,8,18,8,0,0,0,2,8,18,8,1,0,0,2,8,18,8,2,0,0,2,8,18,9,2,0,0,2,8,18,10,2,0,0,2,8,18,12,1,0,0,2,8,18,13,1,0,0,2,8,18,13,2,0,0,2,8,18,15,1,0,0,2,8,18,16,1,0,0,2,8,18,18,0,0,0,2,8,18,18,1,0,0,2,8,18,18,2,0,0,2,8,18,18,3,0,0,2,8,18,18,4,0,0,2,8,18,18,5,0,0,2,8,18,18,6,0,0,2,8,18,18,7,0,0,2,8,18,18,8,0,0,2,8,18,18,8,1,0,2,8,18,18,8,2,0,2,8,18,19,8,2,0,2,8,18,20,8,2,0,2,8,18,21,8,2,0,2,8,18,22,8,2,0,2,8,18,23,8,2,0,2,8,18,24,8,2,0,2,8,18,25,8,2,0,2,8,18,26,8,2,0,2,8,18,27,8,2,0,2,8,18,28,8,2,0,2,8,18,29,8,2,0,2,8,18,30,8,2,0,2,8,18,31,8,2,0,2,8,18,32,8,2,0,2,8,18,32,9,2,0,2,8,18,32,10,2,0,2,8,18,32,11,2,0,2,8,18,32,12,2,0,2,8,18,32,13,2,0,2,8,18,32,14,2,0,2,8,18,32,15,2,0,2,8,18,32,17,1,0,2,8,18,32,18,1,0,2,8,18,32,18,2,0,2,8,18,32,18,3,0,2,8,18,32,18,4,0,2,8,18,32,18,5,0,2,8,18,32,18,6,0,2,8,18,32,18,7,0,2,8,18,32,18,8,0,2,8,18,32,18,8,1,2,8,18,32,18,8,2,2,8,18,32,18,9,2,2,8,18,32,18,10,2,2,8,18,32,20,9,2,2,8,18,32,21,9,2,2,8,18,32,22,9,2,2,8,18,32,24,8,2,2,8,18,32,25,8,2,2,8,18,32,25,9,2,2,8,18,32,27,8,2,2,8,18,32,28,8,2,2,8,18,32,29,8,2,2,8,18,32,30,8,2,2,8,18,32,31,8,2,2,8,18,32,32,8,2,2,8,18,32,32,8,3];
    var shellB = [];
    var shellT = [];
    var electronT = [];
    var nuclearR = 10;
    var nuclearX = [];
    var nuclearY = [];
    var nuclearZ = [];
    var neutron = [];
    var nuclearMax = [1,4,7,9,11,12,14,16,19,20,23,24,27,28,31,32,35,40,39,40,45,48,51,52,55,56,59,59,64,65,70,73,75,79,80,84,86,88,89,91,93,96,99,101,103,106,108,112,115,119,122,128,127,131,133,137,139,140,141,144,145,150,152,157,159,162,165,167,169,173,175,179,181,184,186,190,192,195,197,200,204,207,209,210,211,222,223,226,227,232,231,238,237,242,243,247,247,251,254,253,256,254,257,261,262,263,262,265,266];
    var blockMax = 103;
    var sButton = ["H","He","Li","Be","B","C","N","O","F","Ne","Na","Mg","Al","Si","P","S","Cl","Ar","K","Ca","Sc","Ti","V","Cr","Mn","Fe","Co","Ni","Cu","Zn","Ga","Ge","As","Se","Br","Kr","Rb","Sr","Y","Zr","Nb","Mo","Tc","Ru","Rh","Pd","Ag","Cd","In","Sn","Sb","Te","I","Xe","Cs","Ba","La","Ce","Pr","Nd","Pm","Sm","Eu","Gd","Tb","Dy","Ho","Er","Tm","Yb","Lu","Hf","Ta","W","Re","Os","Ir","Pt","Au","Hg","Tl","Pb","Bi","Po","At","Rn","Fr","Ra","Ac","Th","Pa","U","Np","Pu","Am","Cm","Bk","Cf","Es","Fm","Md","No","Lr"];
    var sName = ["氢","氦","锂","铍","硼","碳","氮","氧","氟","氖","钠","镁","铝","硅","磷","硫","氯","氩","钾","钙","钪","钛","钒","铬","锰","铁","钴","镍","铜","锌","镓","锗","砷","硒","溴","氪","铷","锶","钇","锆","铌","钼","锝","钌","铑","钯","银","镉","铟","锡","锑","碲","碘","氙","铯","钡","镧","铈","镨","钕","钷","钐","铕","钆","铽","镝","钬","铒","铥","镱","镥","铪","钽","钨","铼","锇","铱","铂","金","汞","铊","铅","铋","钋","砹","氡","钫","镭","锕","钍","镤","铀","镎","钚","镅","锔","锫","锎","锿","镄","钔","锘","铹"];
    var blockX = [];
    var blockY = [];
    var blockW;
    var blockH;
    var touchB = false;
    var touchX, touchY;

    function preload() {
      shellImage = loadImage("javalab_atom_shell.png");
    }

    function setup() {
      frameRate(40);
      var o = select("#myContainer");
      var a = 0.5;
      var w = int(min(o.width, (window.innerHeight - 160) / a));
      var h = int(w * a);
      myCanvas = createCanvas(w, h);
      myCanvas.parent("myContainer");
      myCanvas.id("myP5Canvas");

      rangeA = select("#rangeA");
      labelA = select("#labelA");
      labelA.html("缩放");

      for (var i = 0; i < blockMax; i++) {
        shellB[i] = random(0.8);
        shellT[i] = random(TWO_PI);
        electronT[i] = random(TWO_PI);
      }
      shellB[0] = 0.5;
      shellB[1] = 0.5;
      shellT[0] = QUARTER_PI;
      shellT[1] = QUARTER_PI - HALF_PI;
      setup2();
    }

    function windowResized() {
      var o = select("#myContainer");
      var a = 0.5;
      var w = int(min(o.width, (window.innerHeight - 160) / a));
      var h = int(w * a);
      resizeCanvas(w, h);
    }

    function setup2() {
      for (var i = 0; i < 32; i++) blockX[i] = map(i, 0, 32, 0, 1);
      for (var i = 0; i < 7; i++) blockY[i] = map(i, 0, 7, 6/26 - 0.002, 0.5 - 0.002);
      blockW = 1.0 / 32;
      blockH = 1.0 / 26;
      nuclearR = pow(0.000000006 * nuclearMax[index], 1/2.8);
      for (var i = 0; i < nuclearMax[index]; i++) {
        neutron[i] = (i <= index) ? false : true;
        while (true) {
          nuclearX[i] = random(-nuclearR, nuclearR);
          nuclearY[i] = random(-nuclearR, nuclearR);
          nuclearZ[i] = random(-nuclearR, nuclearR);
          var r = dist(0, 0, 0, nuclearX[i], nuclearY[i], nuclearZ[i]);
          if (r < nuclearR) break;
        }
      }
      setup3();
    }

    function setup3() {
      for (var i = 0; i < nuclearMax[index]; i++) {
        var xNew = nuclearX[i] + random(-0.1 * nuclearR, 0.1 * nuclearR);
        var yNew = nuclearY[i] + random(-0.1 * nuclearR, 0.1 * nuclearR);
        var zNew = nuclearZ[i] + random(-0.1 * nuclearR, 0.1 * nuclearR);
        var oldForce = 0;
        var newForce = 0;
        var stepp = int(sqrt(index + 1));
        for (var j = 0; j < nuclearMax[index]; j += stepp) {
          if (i != j) {
            var oldLength = mag(nuclearX[j] - nuclearX[i], nuclearY[j] - nuclearY[i], nuclearZ[j] - nuclearZ[i]);
            var newLength = mag(nuclearX[j] - xNew, nuclearY[j] - yNew, nuclearZ[j] - zNew);
            oldForce += 1 / oldLength;
            newForce += 1 / newLength;
          }
        }
        if (newForce > oldForce) continue;
        if (mag(xNew, yNew, zNew) < nuclearR) {
          nuclearX[i] = xNew;
          nuclearY[i] = yNew;
          nuclearZ[i] = zNew;
        }
      }
      for (var i = 0; i < nuclearMax[index] - 1; i++) {
        for (var j = 1; j < nuclearMax[index]; j++) {
          if (nuclearZ[i] < nuclearZ[j]) {
            var x = nuclearX[i]; nuclearX[i] = nuclearX[j]; nuclearX[j] = x;
            var y = nuclearY[i]; nuclearY[i] = nuclearY[j]; nuclearY[j] = y;
            var z = nuclearZ[i]; nuclearZ[i] = nuclearZ[j]; nuclearZ[j] = z;
            var b = neutron[i]; neutron[i] = neutron[j]; neutron[j] = b;
          }
        }
      }
    }

    function draw() {
      if (touches.length > 1) return;
      if (mouseIsPressed) {
        if (contain(mouseX, mouseY, 0, 0, width, height)) {
          if (!touchB) {
            touchX = mouseX;
            touchY = mouseY;
          }
          touchB = true;
        }
      } else {
        if (touchB) {
          if (dist(mouseX, mouseY, 0, touchX, touchY, 0) < width * 0.01) {
            for (var i = 0; i < blockMax; i++) {
              if (contain(mouseX, mouseY, width * blockX[columnValue[i]], width * blockY[rowValue[i]], width * blockW, width * blockH)) {
                index = i;
                setup2();
              }
            }
          }
          touchB = false;
        }
      }
      background(255, 64);
      strokeWeight(width / 1000);
      var spacing = width * 0.004;
      for (var i = 0; i < blockMax; i++) {
        fill(getFill(i));
        if (i == index) {
          stroke(0);
          strokeWeight(width * 0.002);
        } else {
          stroke(getStroke(i));
          strokeWeight(width * 0.001);
        }
        rect(width * blockX[columnValue[i]] + spacing/2, width * blockY[rowValue[i]] + spacing/2, width * blockW - spacing/2, width * blockH - spacing/2);
        fill(0);
        noStroke();
        textAlign(LEFT, TOP);
        textSize(width * 0.014);
        text((i + 1), width * blockX[columnValue[i]] + spacing, width * blockY[rowValue[i]] + spacing);
        textAlign(RIGHT, BOTTOM);
        textSize(width * 0.014);
        text(sButton[i], width * (blockX[columnValue[i]] + blockW) - spacing, width * (blockY[rowValue[i]] + blockH) - spacing);
      }

      push();
      translate(width * 0.3, width * 0.21);
      scale(map(rangeA.value(), 1, 100, 1, 5));
      stroke(191, 64);
      strokeWeight(width * 0.001);
      fill(233, 233, 255);
      imageMode(CENTER);
      var shells = getShell(index, index);
      for (var i = shells; i > 0; i--) {
        image(shellImage, 0, 0, width * 0.08 * i, width * 0.08 * i);
      }
      setup3();
      noStroke();
      for (var i = 0; i < nuclearMax[index]; i++) {
        if (neutron[i]) fill(0, 191, 0);
        else fill(255, 0, 0);
        noStroke();
        ellipse(width * nuclearX[i], width * nuclearY[i], width * 0.005, width * 0.005);
      }
      noStroke();
      for (var i = index; i >= 0; i--) {
        push();
        rotate(shellT[i]);
        var a = width * 0.04 * (getShell(index, i));
        var b = a * shellB[i];
        fill(0, 0, 255, map(getShell(index, i) * sin(electronT[i]), -shells, shells, 0, 255));
        ellipse(a * cos(electronT[i]), b * sin(electronT[i]), width * 0.004, width * 0.004);
        pop();
      }
      for (var i = 0; i <= index; i++) {
        if (mod(i, 2) == 0) {
          electronT[i] += 0.1 / getShell(index, i);
          if (electronT[i] >= TWO_PI) electronT[i] -= TWO_PI;
        } else {
          electronT[i] -= 0.1 / getShell(index, i);
          if (electronT[i] < 0) electronT[i] += TWO_PI;
        }
      }
      pop();

      noStroke();
      textSize(width * 0.02);
      textAlign(LEFT, CENTER);
      var protonCount = index + 1;
      var neutronCount = nuclearMax[index] - protonCount;
      var infoText = (index + 1) + " " + sName[index] + "（质子:" + protonCount + " 中子:" + neutronCount + " 电子:" + protonCount + "）";
      text(infoText, width * (0.31 + 0.04 * getShell(index, index)), width * 0.21);
    }

    function getShell(i, j) {
      var t = 0;
      for (var n = 0; n < 7; n++) {
        t += electrons[i * 7 + n];
        if (t > j) { return n + 1; }
      }
      return 7;
    }

    function getStroke(i) {
      switch (i + 1) {
        case 1: return color(255, 192, 192);
        case 2: case 10: case 18: case 36: case 54: case 86: return color(224, 224, 224);
        case 3: case 11: case 19: case 37: case 55: case 87: return color(211, 211, 255);
        case 4: case 12: case 20: case 38: case 56: case 88: return color(192, 255, 255);
        case 21: case 22: case 23: case 24: case 25: case 26: case 27: case 28: case 29: case 30: case 39: case 40: case 41: case 42: case 43: case 44: case 45: case 46: case 47: case 48: case 72: case 73: case 74: case 75: case 76: case 77: case 78: case 79: case 80: return color(222);
        case 13: case 31: case 32: case 49: case 50: case 51: case 81: case 82: case 83: case 84: return color(192, 255, 192);
        case 5: case 6: case 7: case 8: case 9: case 14: case 15: case 16: case 17: case 33: case 34: case 35: case 52: case 53: case 85: return color(255, 224, 160);
        default: return color(255, 192, 255);
      }
    }

    function getFill(i) {
      switch (i + 1) {
        case 1: return color(255, 192, 192);
        case 2: case 10: case 18: case 36: case 54: case 86: return color(224, 224, 224);
        case 3: case 11: case 19: case 37: case 55: case 87: return color(211, 211, 255);
        case 4: case 12: case 20: case 38: case 56: case 88: return color(192, 255, 255);
        case 21: case 22: case 23: case 24: case 25: case 26: case 27: case 28: case 29: case 30: case 39: case 40: case 41: case 42: case 43: case 44: case 45: case 46: case 47: case 48: case 72: case 73: case 74: case 75: case 76: case 77: case 78: case 79: case 80: return color(255, 255, 192);
        case 13: case 31: case 32: case 49: case 50: case 51: case 81: case 82: case 83: case 84: return color(192, 255, 192);
        case 5: case 6: case 7: case 8: case 9: case 14: case 15: case 16: case 17: case 33: case 34: case 35: case 52: case 53: case 85: return color(255, 224, 160);
        default: return color(255, 192, 255);
      }
    }
