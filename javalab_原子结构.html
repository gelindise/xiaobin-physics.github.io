<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=10">
  <title>原子结构 — 元素周期表与电子壳层 - 物理虚拟实验</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <style>
    .main-card { max-width: 900px; margin: 0 auto 24px; padding: 0 16px; }
    .canvas-wrap { border-radius: 12px; padding: 4px; width: 100%; box-sizing: border-box; border: 1px solid #e2e8f0; position: relative; background: #fff; }
    #myContainer { position: relative; width: 100%; }
    .controls-bar { display: flex; align-items: center; justify-content: center; padding: 10px 16px; gap: 24px; flex-wrap: wrap; background: #f8fafc; border-radius: 0 0 12px 12px; border-top: 1px solid #e2e8f0; }
    .ctrl-group { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #334155; }
    .ctrl-group input[type="range"] { width: 120px; accent-color: #3b82f6; }
    .section { padding: 1.5rem 2rem 0.5rem; }
    .section h2 { font-size: 1.4rem; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/addons/p5.dom.min.js"></script>
</head>
<body>
  <header class="header">
    <div class="logo">物理虚拟实验</div>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="experiments.html">实验列表</a>
    </nav>
  </header>

  <div class="section">
    <h2>原子结构 — 元素周期表与电子壳层</h2>
    <p style="color:#94a3b8;margin:0 0 16px 0;">点击元素方块查看其原子结构（质子、中子与电子排布），拖动滑块缩放观察细节。</p>
  </div>

  <div class="main-card">
    <div class="canvas-wrap">
      <div id="myContainer"></div>
    </div>
    <div class="controls-bar">
      <div class="ctrl-group">
        <span id="labelA">缩放</span>
        <input type="range" id="rangeA" min="1" max="100" value="50">
      </div>
    </div>
  </div>

  <div class="formula-bar">
    <div class="formula-item">
      <span class="label">电子排布</span>
      <span class="value">2-8-18-32... 遵循能量最低原理</span>
    </div>
    <div class="formula-item">
      <span class="label">原子序数</span>
      <span class="value">= 质子数 = 电子数</span>
    </div>
    <div class="formula-item">
      <span class="label">质量数</span>
      <span class="value">≈ 质子数 + 中子数</span>
    </div>
  </div>

  <script src="protect.js"></script>
  <script>
  (function() {
    // ===== 10 common elements =====
    var elements = [
      { sym: "H",  name: "氢",   shells: [1,0,0,0,0,0,0], nucleons: 1,  period: 1, group: 1  },
      { sym: "He", name: "氦",   shells: [2,0,0,0,0,0,0], nucleons: 4,  period: 1, group: 18 },
      { sym: "C",  name: "碳",   shells: [2,4,0,0,0,0,0], nucleons: 12, period: 2, group: 14 },
      { sym: "N",  name: "氮",   shells: [2,5,0,0,0,0,0], nucleons: 14, period: 2, group: 15 },
      { sym: "O",  name: "氧",   shells: [2,6,0,0,0,0,0], nucleons: 16, period: 2, group: 16 },
      { sym: "Na", name: "钠",   shells: [2,8,1,0,0,0,0], nucleons: 23, period: 3, group: 1  },
      { sym: "Cl", name: "氯",   shells: [2,8,7,0,0,0,0], nucleons: 35, period: 3, group: 17 },
      { sym: "Fe", name: "铁",   shells: [2,8,14,2,0,0,0], nucleons: 56, period: 4, group: 8 },
      { sym: "Cu", name: "铜",   shells: [2,8,18,1,0,0,0], nucleons: 64, period: 4, group: 11 },
      { sym: "Au", name: "金",   shells: [2,8,18,32,18,1,0], nucleons: 197, period: 6, group: 11 }
    ];
    var selectedIndex = 0;
    var shellImage;

    // Nuclear particle positions
    var nx = [], ny = [], nz = [];
    var isNeutron = [];
    var nuclearR = 0;

    // Electron animation
    var eAngle = [], eShellB = [], eShellR = [];

    var canvasW, canvasH;
    var zoomSlider;

    function preload() {
      shellImage = this.loadImage("javalab_atom_shell.png");
    }

    function setup() {
      var container = document.getElementById("myContainer");
      canvasW = container.offsetWidth || 800;
      canvasH = canvasW * 0.5;
      var c = this.createCanvas(canvasW, canvasH);
      c.parent("myContainer");
      c.id("myP5Canvas");
      this.frameRate(30);

      zoomSlider = document.getElementById("rangeA");
      this.initNucleus(0);
      this.initElectrons(0);
    }

    function draw() {
      var p = this;
      p.background(255);

      // Read zoom
      var zoom = parseFloat(zoomSlider.value) / 50;
      if (isNaN(zoom)) zoom = 1;

      // === Left panel: element buttons ===
      var btnW = canvasW * 0.12;
      var btnH = canvasH * 0.12;
      var startX = 10;
      var startY = 10;

      for (var i = 0; i < elements.length; i++) {
        var col = i % 2;
        var row = Math.floor(i / 2);
        var bx = startX + col * (btnW + 6);
        var by = startY + row * (btnH + 6);

        if (i === selectedIndex) {
          p.stroke(0);
          p.strokeWeight(3);
        } else {
          p.stroke(180);
          p.strokeWeight(1);
        }

        // Color by period
        var periodColors = ["#FFC0C0","#E0E0E0","#D3D3FF","#C0FFFF","#FFFFC0","#C0FFC0","#FFC0FF"];
        p.fill(periodColors[elements[i].period - 1] || "#FFC0FF");

        p.rect(bx, by, btnW, btnH, 5);
        p.fill(0);
        p.noStroke();
        p.textAlign(p.CENTER, p.CENTER);
        p.textSize(btnH * 0.35);
        p.text(elements[i].sym, bx + btnW/2, by + btnH * 0.35);
        p.textSize(btnH * 0.22);
        p.text(elements[i].name, bx + btnW/2, by + btnH * 0.7);
      }

      // === Right side: atom visualization ===
      var atomCX = canvasW * 0.62;
      var atomCY = canvasH * 0.52;
      var atomScale = zoom * canvasH * 0.003;

      p.push();
      p.translate(atomCX, atomCY);
      p.scale(atomScale);

      // Draw electron shells
      var el = elements[selectedIndex];
      var totalShells = 0;
      for (var s = 0; s < 7; s++) {
        if (el.shells[s] > 0) totalShells = s + 1;
      }

      // Shell circles (using the shell image)
      p.imageMode(p.CENTER);
      p.tint(200, 200, 255, 80);
      for (var s = totalShells; s >= 1; s--) {
        var shellR = s * 22;
        if (shellImage && shellImage.width > 0) {
          p.image(shellImage, 0, 0, shellR * 2, shellR * 2);
        } else {
          p.noFill();
          p.stroke(180, 180, 220, 100);
          p.strokeWeight(1);
          p.ellipse(0, 0, shellR * 2, shellR * 2);
        }
      }

      // Draw nucleus
      p.noStroke();
      for (var i = 0; i < nx.length; i++) {
        if (isNeutron[i]) p.fill(0, 180, 0);
        else p.fill(255, 0, 0);
        p.ellipse(nx[i], ny[i], 5, 5);
      }

      // Draw electrons on their shells
      var eCount = 0;
      p.noStroke();
      for (var s = 0; s < totalShells; s++) {
        var count = el.shells[s];
        for (var e = 0; e < count; e++) {
          var idx = eCount + e;
          var angle = eAngle[idx] || 0;
          var r = (s + 1) * 22;
          var b = r * (eShellB[idx] || 0.7);
          p.fill(0, 0, 255, 200);
          p.ellipse(r * Math.cos(angle), b * Math.sin(angle), 4, 4);
        }
        eCount += count;
      }

      // Animate electrons
      for (var i = 0; i < eCount; i++) {
        eAngle[i] += (i % 2 === 0 ? 0.04 : -0.04) / ((Math.floor(i / 8) || 1));
        if (eAngle[i] > Math.PI * 2) eAngle[i] -= Math.PI * 2;
        if (eAngle[i] < 0) eAngle[i] += Math.PI * 2;
      }

      p.pop();

      // === Element info ===
      p.noStroke();
      p.fill(0);
      p.textAlign(p.LEFT, p.CENTER);
      p.textSize(canvasH * 0.032);
      var protons = selectedIndex + 1;
      var infoX = canvasW * 0.22;
      var infoY = canvasH * 0.8;
      var electronConfig = [];
      for (var s = 0; s < totalShells; s++) {
        electronConfig.push(el.shells[s]);
      }
      p.text(
        elements[selectedIndex].sym + " " + elements[selectedIndex].name
        + "  质子:" + (selectedIndex + 1)
        + "  中子:" + (el.nucleons - selectedIndex - 1)
        + "  电子排布:" + electronConfig.join("-"),
        infoX, infoY
      );
    }

    // Mouse click to select element
    function mousePressed() {
      var btnW = canvasW * 0.12;
      var btnH = canvasH * 0.12;
      var startX = 10;
      var startY = 10;

      for (var i = 0; i < elements.length; i++) {
        var col = i % 2;
        var row = Math.floor(i / 2);
        var bx = startX + col * (btnW + 6);
        var by = startY + row * (btnH + 6);

        if (this.mouseX >= bx && this.mouseX <= bx + btnW &&
            this.mouseY >= by && this.mouseY <= by + btnH) {
          selectedIndex = i;
          this.initNucleus(i);
          this.initElectrons(i);
          return false;
        }
      }
    }

    // Initialize nucleus particles
    function initNucleus(idx) {
      var el = elements[idx];
      var totalN = el.nucleons;
      nx = []; ny = []; nz = []; isNeutron = [];

      nuclearR = Math.pow(0.000000006 * totalN, 1/2.8) * canvasW || 15;

      for (var i = 0; i < totalN; i++) {
        isNeutron[i] = (i > idx);
        while (true) {
          var x = (Math.random() - 0.5) * 2 * nuclearR;
          var y = (Math.random() - 0.5) * 2 * nuclearR;
          var z = (Math.random() - 0.5) * 2 * nuclearR;
          if (Math.sqrt(x*x + y*y + z*z) < nuclearR) {
            nx[i] = x; ny[i] = y; nz[i] = z; break;
          }
        }
      }
      // Sort by z for pseudo-3D rendering
      for (var i = 0; i < totalN - 1; i++) {
        for (var j = i + 1; j < totalN; j++) {
          if (nz[i] < nz[j]) {
            var t; t = nx[i]; nx[i] = nx[j]; nx[j] = t;
            t = ny[i]; ny[i] = ny[j]; ny[j] = t;
            t = nz[i]; nz[i] = nz[j]; nz[j] = t;
            var b = isNeutron[i]; isNeutron[i] = isNeutron[j]; isNeutron[j] = b;
          }
        }
      }
    }

    // Initialize electron animation
    function initElectrons(idx) {
      var el = elements[idx];
      var totalE = 0;
      for (var s = 0; s < 7; s++) totalE += el.shells[s];

      eAngle = []; eShellB = []; eShellR = [];
      for (var i = 0; i < totalE; i++) {
        eAngle[i] = Math.random() * Math.PI * 2;
        eShellB[i] = 0.3 + Math.random() * 0.5;
        eShellR[i] = 0;
      }
    }

    // ===== Start p5 in instance mode =====
    new p5(function(p) {
      p.preload = function() { preload.call(p); };
      p.setup = function() { setup.call(p); };
      p.draw = function() { draw.call(p); };
      p.mousePressed = function() { mousePressed.call(p); };
      p.initNucleus = initNucleus;
      p.initElectrons = initElectrons;
      p.windowResized = function() {}; // no-op
    });
  })();
  </script>
</body>
</html>
