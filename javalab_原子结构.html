<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=10">
  <title>原子结构 — 元素周期表与电子壳层 - 物理虚拟实验</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <style>
    .main-card { max-width: 900px; margin: 0 auto 24px; padding: 0 16px; }
    .canvas-wrap { border-radius: 12px; padding: 4px; width: 100%; box-sizing: border-box; border: 1px solid #e2e8f0; position: relative; background: #fff; }
    #myContainer { position: relative; width: 100%; }
    .controls-bar { display: flex; align-items: center; justify-content: center; padding: 10px 16px; gap: 24px; flex-wrap: wrap; background: #f8fafc; border-radius: 0 0 12px 12px; border-top: 1px solid #e2e8f0; }
    .ctrl-group { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #334155; }
    .ctrl-group input[type="range"] { width: 120px; accent-color: #3b82f6; }
    .section { padding: 1.5rem 2rem 0.5rem; }
    .section h2 { font-size: 1.4rem; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/addons/p5.dom.min.js"></script>
</head>
<body>
  <header class="header">
    <div class="logo">物理虚拟实验</div>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="experiments.html">实验列表</a>
    </nav>
  </header>

  <div class="section">
    <h2>原子结构 — 元素周期表与电子壳层</h2>
    <p style="color:#94a3b8;margin:0 0 16px 0;">点击元素方块查看其原子结构（质子、中子与电子排布），拖动滑块缩放观察细节。</p>
  </div>

  <div class="main-card">
    <div class="canvas-wrap">
      <div id="myContainer"></div>
    </div>
    <div class="controls-bar">
      <div class="ctrl-group">
        <span id="labelA">缩放</span>
        <input type="range" id="rangeA" min="1" max="100" value="50">
      </div>
    </div>
  </div>

  <div class="formula-bar">
    <div class="formula-item">
      <span class="label">电子排布</span>
      <span class="value">2-8-18-32... 遵循能量最低原理</span>
    </div>
    <div class="formula-item">
      <span class="label">原子序数</span>
      <span class="value">= 质子数 = 电子数</span>
    </div>
    <div class="formula-item">
      <span class="label">质量数</span>
      <span class="value">≈ 质子数 + 中子数</span>
    </div>
  </div>

  <script src="protect.js"></script>
  <script>
  (function() {
    // ===== 10 common elements =====
    var elements = [
      { sym: "H",  name: "氢",   shells: [1,0,0,0,0,0,0], nucleons: 1  },
      { sym: "He", name: "氦",   shells: [2,0,0,0,0,0,0], nucleons: 4  },
      { sym: "C",  name: "碳",   shells: [2,4,0,0,0,0,0], nucleons: 12 },
      { sym: "N",  name: "氮",   shells: [2,5,0,0,0,0,0], nucleons: 14 },
      { sym: "O",  name: "氧",   shells: [2,6,0,0,0,0,0], nucleons: 16 },
      { sym: "Na", name: "钠",   shells: [2,8,1,0,0,0,0], nucleons: 23 },
      { sym: "Cl", name: "氯",   shells: [2,8,7,0,0,0,0], nucleons: 35 },
      { sym: "Fe", name: "铁",   shells: [2,8,14,2,0,0,0], nucleons: 56 },
      { sym: "Cu", name: "铜",   shells: [2,8,18,1,0,0,0], nucleons: 64 },
      { sym: "Au", name: "金",   shells: [2,8,18,32,18,1,0], nucleons: 197 }
    ];
    var selectedIndex = 0;
    var shellImage;

    var nx = [], ny = [], nz = [], isNeutron = [];
    var eAngle = [], eShellB = [];

    var myp5 = new p5(function(p) {
      p.preload = function() {
        shellImage = p.loadImage("javalab_atom_shell.png");
      };

      p.setup = function() {
        var container = document.getElementById("myContainer");
        var cw = container.offsetWidth || 800;
        var ch = cw * 0.5;
        var c = p.createCanvas(cw, ch);
        c.parent("myContainer");
        c.id("myP5Canvas");
        p.frameRate(30);
        initNucleus(0);
        initElectrons(0);
      };

      p.draw = function() {
        p.background(255);

        var cw = p.width;
        var ch = p.height;
        var zoomVal = parseFloat(document.getElementById("rangeA").value) || 50;
        var zoom = zoomVal / 50;

        // Element buttons (2 columns x 5 rows)
        var btnW = cw * 0.11;
        var btnH = ch * 0.11;
        var sx = 10, sy = 10;
        var periodColors = ["#FFC0C0","#E0E0E0","#D3D3FF","#C0FFFF","#FFFFC0","#C0FFC0","#FFC0FF"];

        for (var i = 0; i < elements.length; i++) {
          var col = i % 2;
          var row = Math.floor(i / 2);
          var bx = sx + col * (btnW + 5);
          var by = sy + row * (btnH + 5);

          p.strokeWeight(i === selectedIndex ? 3 : 1);
          p.stroke(i === selectedIndex ? 0 : 180);

          var period = 1;
          if (i >= 2 && i <= 4) period = 2;
          else if (i >= 5 && i <= 6) period = 3;
          else if (i >= 7 && i <= 8) period = 4;
          else if (i === 9) period = 6;
          p.fill(periodColors[period - 1]);

          p.rect(bx, by, btnW, btnH, 5);

          p.fill(0);
          p.noStroke();
          p.textAlign(p.CENTER, p.CENTER);
          p.textSize(btnH * 0.38);
          p.text(elements[i].sym, bx + btnW/2, by + btnH * 0.33);
          p.textSize(btnH * 0.24);
          p.text(elements[i].name, bx + btnW/2, by + btnH * 0.7);
        }

        // Atom visualization
        var atomCX = cw * 0.6;
        var atomCY = ch * 0.5;
        var atomScale = zoom * ch * 0.003;

        p.push();
        p.translate(atomCX, atomCY);
        p.scale(atomScale);

        var el = elements[selectedIndex];
        var totalShells = 0;
        for (var s = 0; s < 7; s++) {
          if (el.shells[s] > 0) totalShells = s + 1;
        }

        // Draw shell circles
        p.imageMode(p.CENTER);
        for (var s = totalShells; s >= 1; s--) {
          var sr = s * 22;
          if (shellImage && shellImage.width > 0) {
            p.tint(200, 200, 255, 100);
            p.image(shellImage, 0, 0, sr * 2, sr * 2);
          } else {
            p.noFill();
            p.stroke(180, 180, 220, 120);
            p.strokeWeight(1);
            p.ellipse(0, 0, sr * 2, sr * 2);
          }
        }
        p.noTint();

        // Nucleus
        p.noStroke();
        for (var i = 0; i < nx.length; i++) {
          p.fill(isNeutron[i] ? [0, 180, 0] : [255, 0, 0]);
          p.ellipse(nx[i], ny[i], 5, 5);
        }

        // Electrons
        var eCount = 0;
        p.noStroke();
        for (var s = 0; s < totalShells; s++) {
          var count = el.shells[s];
          for (var e = 0; e < count; e++) {
            var idx = eCount + e;
            var angle = eAngle[idx] || 0;
            var r = (s + 1) * 22;
            var b = r * (eShellB[idx] || 0.7);
            p.fill(0, 0, 255, 200);
            p.ellipse(r * Math.cos(angle), b * Math.sin(angle), 4, 4);
          }
          eCount += count;
        }

        // Animate electrons
        for (var i = 0; i < eCount; i++) {
          var shell = 1;
          var tmp = 0;
          for (var s = 0; s < 7; s++) {
            tmp += el.shells[s];
            if (i < tmp) { shell = s + 1; break; }
          }
          eAngle[i] += (i % 2 === 0 ? 0.05 : -0.05) / shell;
          if (eAngle[i] > Math.PI * 2) eAngle[i] -= Math.PI * 2;
          if (eAngle[i] < 0) eAngle[i] += Math.PI * 2;
        }

        p.pop();

        // Info text
        p.noStroke();
        p.fill(0);
        p.textAlign(p.LEFT, p.CENTER);
        p.textSize(ch * 0.035);

        var electronsInShells = [];
        for (var s = 0; s < totalShells; s++) electronsInShells.push(el.shells[s]);
        p.text(
          el.sym + " " + el.name +
          "  质子:" + (selectedIndex + 1) +
          "  中子:" + (el.nucleons - selectedIndex - 1) +
          "  电子排布:" + electronsInShells.join("-"),
          cw * 0.22, ch * 0.82
        );
      };

      p.mousePressed = function() {
        var btnW = p.width * 0.11;
        var btnH = p.height * 0.11;
        var sx = 10, sy = 10;

        for (var i = 0; i < elements.length; i++) {
          var col = i % 2;
          var row = Math.floor(i / 2);
          var bx = sx + col * (btnW + 5);
          var by = sy + row * (btnH + 5);

          if (p.mouseX >= bx && p.mouseX <= bx + btnW &&
              p.mouseY >= by && p.mouseY <= by + btnH) {
            selectedIndex = i;
            initNucleus(i);
            initElectrons(i);
            return false;
          }
        }
      };

      p.windowResized = function() {
        var container = document.getElementById("myContainer");
        var cw = container.offsetWidth || 800;
        var ch = cw * 0.5;
        p.resizeCanvas(cw, ch);
      };
    });

    function initNucleus(idx) {
      var totalN = elements[idx].nucleons;
      nx = []; ny = []; nz = []; isNeutron = [];
      var nucR = Math.pow(0.000000006 * totalN, 1/2.8) * (myp5.width || 800) || 15;

      for (var i = 0; i < totalN; i++) {
        isNeutron[i] = (i > idx);
        while (true) {
          var x = (Math.random() - 0.5) * 2 * nucR;
          var y = (Math.random() - 0.5) * 2 * nucR;
          var z = (Math.random() - 0.5) * 2 * nucR;
          if (Math.sqrt(x*x + y*y + z*z) < nucR) {
            nx[i] = x; ny[i] = y; nz[i] = z; break;
          }
        }
      }
      // Sort by z for pseudo-3D
      for (var i = 0; i < totalN - 1; i++) {
        for (var j = i + 1; j < totalN; j++) {
          if (nz[i] < nz[j]) {
            var t = nx[i]; nx[i] = nx[j]; nx[j] = t;
            t = ny[i]; ny[i] = ny[j]; ny[j] = t;
            t = nz[i]; nz[i] = nz[j]; nz[j] = t;
            var b = isNeutron[i]; isNeutron[i] = isNeutron[j]; isNeutron[j] = b;
          }
        }
      }
    }

    function initElectrons(idx) {
      var totalE = 0;
      for (var s = 0; s < 7; s++) totalE += elements[idx].shells[s];
      eAngle = []; eShellB = [];
      for (var i = 0; i < totalE; i++) {
        eAngle[i] = Math.random() * Math.PI * 2;
        eShellB[i] = 0.3 + Math.random() * 0.5;
      }
    }
  })();
  </script>
</body>
</html>
