<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凸透镜成像规律 - 虚拟实验</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 80px 20px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 300px 1fr 320px;
            gap: 20px;
            padding: 20px;
        }

        .control-panel {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .control-panel h3 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .control-group {
            margin-bottom: 25px;
        }

        .control-group label {
            display: block;
            color: #555;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            border-radius: 3px;
            background: #ddd;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
        }

        .value-display {
            min-width: 60px;
            text-align: center;
            font-weight: bold;
            color: #667eea;
            background: white;
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        .preset-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .preset-btn {
            padding: 8px;
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .preset-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.3);
        }

        .reset-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
        }

        .experiment-area {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        #experimentCanvas {
            width: 100%;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: #fafafa;
        }

        .data-panel {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .data-panel h3 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .data-item {
            background: white;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .data-item:hover {
            transform: translateX(5px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .data-label {
            color: #666;
            font-size: 0.9em;
        }

        .data-value {
            color: #333;
            font-size: 1.2em;
            font-weight: bold;
            margin-top: 5px;
        }

        .formula-display {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            border: 2px dashed #667eea;
        }

        .formula {
            font-size: 1.2em;
            color: #333;
            font-family: 'Courier New', monospace;
            margin: 10px 0;
        }

        .help-section {
            background: #e8f4fd;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            border-left: 4px solid #2196F3;
        }

        .help-section h4 {
            color: #1976D2;
            margin-bottom: 10px;
        }

        .help-section ul {
            list-style: none;
            padding-left: 0;
        }

        .help-section li {
            padding: 5px 0;
            color: #555;
        }

        .help-section li:before {
            content: "▸ ";
            color: #2196F3;
            font-weight: bold;
        }

        .conclusion-box {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            color: #333;
        }

        .conclusion-box h4 {
            margin-bottom: 10px;
            color: #d84315;
        }

        @media (max-width: 1200px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .control-panel, .data-panel {
                max-width: 600px;
                margin: 0 auto;
            }
        }

        .animation-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* 全屏按钮 */
        .fullscreen-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
            background: rgba(102, 126, 234, 0.85);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }
        .fullscreen-btn:hover {
            background: rgba(102, 126, 234, 1);
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        /* 全屏模式样式 */
        .container:fullscreen {
            background: #1a1a2e;
            border-radius: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: auto;
        }
        .container:fullscreen header {
            display: none;
        }
        .container:fullscreen .main-content {
            flex: 1;
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            gap: 12px;
            padding: 12px;
            height: 100vh;
            max-height: 100vh;
        }
        .container:fullscreen .control-panel,
        .container:fullscreen .data-panel {
            overflow-y: auto;
            max-height: calc(100vh - 24px);
            font-size: 0.9em;
        }
        .container:fullscreen .experiment-area {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
        }
        .container:fullscreen .fullscreen-btn {
            background: rgba(255,255,255,0.15);
            color: #ccc;
        }
        .container:fullscreen .fullscreen-btn:hover {
            background: rgba(255,255,255,0.25);
            color: #fff;
        }

        /* WebKit 全屏兼容 */
        .container:-webkit-full-screen {
            background: #1a1a2e;
            border-radius: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: auto;
        }
        .container:-webkit-full-screen header {
            display: none;
        }
        .container:-webkit-full-screen .main-content {
            flex: 1;
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            gap: 12px;
            padding: 12px;
            height: 100vh;
            max-height: 100vh;
        }
        .container:-webkit-full-screen .control-panel,
        .container:-webkit-full-screen .data-panel {
            overflow-y: auto;
            max-height: calc(100vh - 24px);
            font-size: 0.9em;
        }
        .container:-webkit-full-screen .experiment-area {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
        }
        .container:-webkit-full-screen .fullscreen-btn {
            background: rgba(255,255,255,0.15);
            color: #ccc;
        }
        .container:-webkit-full-screen .fullscreen-btn:hover {
            background: rgba(255,255,255,0.25);
            color: #fff;
        }

        @media (max-width: 1200px) {
            .container:fullscreen .main-content,
            .container:-webkit-full-screen .main-content {
                grid-template-columns: 1fr;
            }
            .container:fullscreen .control-panel,
            .container:fullscreen .data-panel,
            .container:-webkit-full-screen .control-panel,
            .container:-webkit-full-screen .data-panel {
                max-height: none;
            }
        }
    </style>
  <script src="auth-check.js"></script>
</head>
<body>
    <header class="header">
        <div class="logo">物理虚拟实验</div>
        <nav class="nav">
            <a href="index.html">首页</a>
            <a href="experiments.html">实验列表</a>
            <a href="vip.html">开通VIP</a>
        </nav>
    </header>
    <div class="container" style="margin-top:1rem;">
        <header>
            <h1>🔬 凸透镜成像规律</h1>
            <p>探索凸透镜成像的奥秘，理解物距、像距与焦距的关系</p>
        </header>

        <div class="main-content">
            <aside class="control-panel">
                <h3>🎛️ 参数控制</h3>
                
                <div class="control-group">
                    <label>焦距 f (cm)</label>
                    <div class="slider-container">
                        <input type="range" id="focalLength" min="5" max="20" value="10" step="0.5">
                        <span class="value-display" id="focalValue">10.0</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>物距 u (cm)</label>
                    <div class="slider-container">
                        <input type="range" id="objectDistance" min="5" max="60" value="30" step="0.5">
                        <span class="value-display" id="objectValue">30.0</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>预设场景</label>
                    <div class="preset-buttons">
                        <button class="preset-btn" onclick="setPreset('real')">实像</button>
                        <button class="preset-btn" onclick="setPreset('virtual')">虚像</button>
                        <button class="preset-btn" onclick="setPreset('2f')">2f处</button>
                        <button class="preset-btn" onclick="setPreset('focus')">焦点</button>
                    </div>
                </div>

                <button class="reset-btn" onclick="resetExperiment()">🔄 重置实验</button>

                <div class="help-section">
                    <h4>💡 操作提示</h4>
                    <ul>
                        <li>调节焦距改变透镜能力</li>
                        <li>调节物距观察成像变化</li>
                        <li>观察光线路径理解原理</li>
                        <li>注意实像与虚像的区别</li>
                    </ul>
                </div>
            </aside>

            <main class="experiment-area" style="position:relative;">
                <button class="fullscreen-btn" onclick="toggleFullscreen()" title="全屏模式">⛶ 全屏</button>
                <canvas id="experimentCanvas" width="800" height="500"></canvas>
            </main>

            <aside class="data-panel">
                <h3>📊 数据监控</h3>
                
                <div class="data-item">
                    <div class="data-label">像距 v</div>
                    <div class="data-value" id="imageDistance">-- cm</div>
                </div>

                <div class="data-item">
                    <div class="data-label">放大率 m</div>
                    <div class="data-value" id="magnification">--</div>
                </div>

                <div class="data-item">
                    <div class="data-label">成像性质</div>
                    <div class="data-value" id="imageType">--</div>
                </div>

                <div class="data-item">
                    <div class="data-label">成像位置</div>
                    <div class="data-value" id="imagePosition">--</div>
                </div>

                <div class="formula-display">
                    <div class="formula">1/f = 1/u + 1/v</div>
                    <div class="formula">m = v/u = h'/h</div>
                </div>

                <div class="conclusion-box">
                    <h4>📝 实验结论</h4>
                    <div id="conclusion">
                        调节参数开始实验...
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script src="protect.js"></script>
    <script src="experiment_凸透镜2.js"></script>
    <script>
      function toggleFullscreen() {
        var container = document.querySelector('.container');
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
          if (container.requestFullscreen) {
            container.requestFullscreen().then(function() {
              window.dispatchEvent(new Event('resize'));
            });
          } else if (container.webkitRequestFullscreen) {
            container.webkitRequestFullscreen();
            setTimeout(function() { window.dispatchEvent(new Event('resize')); }, 300);
          }
        } else {
          if (document.exitFullscreen) {
            document.exitFullscreen().then(function() {
              window.dispatchEvent(new Event('resize'));
            });
          } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
            setTimeout(function() { window.dispatchEvent(new Event('resize')); }, 300);
          }
        }
      }

      document.addEventListener('fullscreenchange', updateFullscreenBtn);
      document.addEventListener('webkitfullscreenchange', updateFullscreenBtn);

      function updateFullscreenBtn() {
        var btn = document.querySelector('.fullscreen-btn');
        var isFull = document.fullscreenElement || document.webkitFullscreenElement;
        if (btn) {
          btn.textContent = isFull ? '✕ 退出全屏' : '⛶ 全屏';
        }
      }
    </script>
    <script src="supabase.js"></script>
    <script src="script.js"></script>
</body>
</html>
