<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凸透镜成像规律 - 虚拟实验</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 80px 20px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 300px 1fr 320px;
            gap: 20px;
            padding: 20px;
        }

        .control-panel {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .control-panel h3 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .control-group {
            margin-bottom: 25px;
        }

        .control-group label {
            display: block;
            color: #555;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            border-radius: 3px;
            background: #ddd;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
        }

        .value-display {
            min-width: 60px;
            text-align: center;
            font-weight: bold;
            color: #667eea;
            background: white;
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        .preset-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .preset-btn {
            padding: 8px;
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .preset-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.3);
        }

        .reset-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
        }

        .experiment-area {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        #experimentCanvas {
            width: 100%;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: #fafafa;
        }

        .data-panel {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .data-panel h3 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .data-item {
            background: white;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .data-item:hover {
            transform: translateX(5px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .data-label {
            color: #666;
            font-size: 0.9em;
        }

        .data-value {
            color: #333;
            font-size: 1.2em;
            font-weight: bold;
            margin-top: 5px;
        }

        .formula-display {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            border: 2px dashed #667eea;
        }

        .formula {
            font-size: 1.2em;
            color: #333;
            font-family: 'Courier New', monospace;
            margin: 10px 0;
        }

        .help-section {
            background: #e8f4fd;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            border-left: 4px solid #2196F3;
        }

        .help-section h4 {
            color: #1976D2;
            margin-bottom: 10px;
        }

        .help-section ul {
            list-style: none;
            padding-left: 0;
        }

        .help-section li {
            padding: 5px 0;
            color: #555;
        }

        .help-section li:before {
            content: "▸ ";
            color: #2196F3;
            font-weight: bold;
        }

        .conclusion-box {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            color: #333;
        }

        .conclusion-box h4 {
            margin-bottom: 10px;
            color: #d84315;
        }

        @media (max-width: 1200px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .control-panel, .data-panel {
                max-width: 600px;
                margin: 0 auto;
            }
        }

        .animation-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">物理虚拟实验</div>
        <nav class="nav">
            <a href="index.html">首页</a>
            <a href="experiments.html">实验列表</a>
            <a href="vip.html">开通VIP</a>
        </nav>
    </header>
    <div class="container" style="margin-top:1rem;">
        <header>
            <h1>🔬 凸透镜成像规律</h1>
            <p>探索凸透镜成像的奥秘，理解物距、像距与焦距的关系</p>
        </header>

        <div class="main-content">
            <aside class="control-panel">
                <h3>🎛️ 参数控制</h3>
                
                <div class="control-group">
                    <label>焦距 f (cm)</label>
                    <div class="slider-container">
                        <input type="range" id="focalLength" min="5" max="20" value="10" step="0.5">
                        <span class="value-display" id="focalValue">10.0</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>物距 u (cm)</label>
                    <div class="slider-container">
                        <input type="range" id="objectDistance" min="5" max="60" value="30" step="0.5">
                        <span class="value-display" id="objectValue">30.0</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>预设场景</label>
                    <div class="preset-buttons">
                        <button class="preset-btn" onclick="setPreset('real')">实像</button>
                        <button class="preset-btn" onclick="setPreset('virtual')">虚像</button>
                        <button class="preset-btn" onclick="setPreset('2f')">2f处</button>
                        <button class="preset-btn" onclick="setPreset('focus')">焦点</button>
                    </div>
                </div>

                <button class="reset-btn" onclick="resetExperiment()">🔄 重置实验</button>

                <div class="help-section">
                    <h4>💡 操作提示</h4>
                    <ul>
                        <li>调节焦距改变透镜能力</li>
                        <li>调节物距观察成像变化</li>
                        <li>观察光线路径理解原理</li>
                        <li>注意实像与虚像的区别</li>
                    </ul>
                </div>
            </aside>

            <main class="experiment-area">
                <canvas id="experimentCanvas" width="800" height="500"></canvas>
            </main>

            <aside class="data-panel">
                <h3>📊 数据监控</h3>
                
                <div class="data-item">
                    <div class="data-label">像距 v</div>
                    <div class="data-value" id="imageDistance">-- cm</div>
                </div>

                <div class="data-item">
                    <div class="data-label">放大率 m</div>
                    <div class="data-value" id="magnification">--</div>
                </div>

                <div class="data-item">
                    <div class="data-label">成像性质</div>
                    <div class="data-value" id="imageType">--</div>
                </div>

                <div class="data-item">
                    <div class="data-label">成像位置</div>
                    <div class="data-value" id="imagePosition">--</div>
                </div>

                <div class="formula-display">
                    <div class="formula">1/f = 1/u + 1/v</div>
                    <div class="formula">m = v/u = h'/h</div>
                </div>

                <div class="conclusion-box">
                    <h4>📝 实验结论</h4>
                    <div id="conclusion">
                        调节参数开始实验...
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('experimentCanvas');
        const ctx = canvas.getContext('2d');
        
        // 实验参数
        let focalLength = 10; // 焦距
        let objectDistance = 30; // 物距
        let imageDistance = 0; // 像距
        let magnification = 0; // 放大率
        
        // 画布参数
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const scale = 8; // 缩放比例

        // 初始化控件
        const focalSlider = document.getElementById('focalLength');
        const objectSlider = document.getElementById('objectDistance');
        
        focalSlider.addEventListener('input', (e) => {
            focalLength = parseFloat(e.target.value);
            document.getElementById('focalValue').textContent = focalLength.toFixed(1);
            updateExperiment();
        });
        
        objectSlider.addEventListener('input', (e) => {
            objectDistance = parseFloat(e.target.value);
            document.getElementById('objectValue').textContent = objectDistance.toFixed(1);
            updateExperiment();
        });

        // 计算成像参数
        function calculateImage() {
            if (Math.abs(objectDistance - focalLength) < 0.1) {
                // 物体在焦点上，不成像
                imageDistance = Infinity;
                magnification = Infinity;
                return {
                    type: '不成像',
                    position: '无穷远',
                    real: false
                };
            }
            
            // 透镜成像公式: 1/f = 1/u + 1/v
            imageDistance = (focalLength * objectDistance) / (objectDistance - focalLength);
            magnification = Math.abs(imageDistance / objectDistance);
            
            let type, position, isReal;
            
            if (objectDistance > 2 * focalLength) {
                type = '倒立、缩小、实像';
                position = '透镜另一侧';
                isReal = true;
            } else if (objectDistance === 2 * focalLength) {
                type = '倒立、等大、实像';
                position = '透镜另一侧 2f 处';
                isReal = true;
            } else if (objectDistance > focalLength) {
                type = '倒立、放大、实像';
                position = '透镜另一侧';
                isReal = true;
            } else {
                type = '正立、放大、虚像';
                position = '透镜同侧';
                isReal = false;
            }
            
            return { type, position, real: isReal };
        }

        // 绘制实验场景
        function drawExperiment() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制光轴
            ctx.strokeStyle = '#ccc';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(50, centerY);
            ctx.lineTo(canvas.width - 50, centerY);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // 绘制刻度
            ctx.fillStyle = '#666';
            ctx.font = '12px Arial';
            for (let i = -30; i <= 30; i += 10) {
                const x = centerX + i * scale;
                ctx.beginPath();
                ctx.moveTo(x, centerY - 5);
                ctx.lineTo(x, centerY + 5);
                ctx.stroke();
                if (i !== 0) {
                    ctx.fillText(i, x - 10, centerY + 20);
                }
            }
            
            // 绘制凸透镜符号
            drawLensSymbol(centerX, centerY);
            
            // 绘制焦点
            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.arc(centerX - focalLength * scale, centerY, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(centerX + focalLength * scale, centerY, 4, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#666';
            ctx.font = '12px Arial';
            ctx.fillText('F', centerX - focalLength * scale - 5, centerY - 10);
            ctx.fillText('F', centerX + focalLength * scale - 5, centerY - 10);
            
            // 绘制物体（蜡烛）
            const objectX = centerX - objectDistance * scale;
            drawCandle(objectX, centerY, 30, '#ff6b6b', true); // 物体总是正立的
            
            // 计算并绘制像
            const result = calculateImage();
            
            if (result.type !== '不成像') {
                const imageX = centerX + imageDistance * scale;
                const imageHeight = 30 * magnification;
                
                if (result.real) {
                    // 实像：倒立
                    drawCandle(imageX, centerY, imageHeight, '#4ecdc4', false);
                    drawLightRays(objectX, imageX, 30, imageHeight, true);
                } else {
                    // 虚像：正立，用虚线绘制
                    drawCandle(imageX, centerY, imageHeight, '#4ecdc4', true, true);
                    drawLightRays(objectX, imageX, 30, imageHeight, false);
                }
            } else {
                // 不成像，绘制焦点处的光路图
                drawFocalPointRays(objectX);
            }
            
            // 绘制标签
            ctx.fillStyle = '#333';
            ctx.font = 'bold 14px Arial';
            ctx.fillText('物体', objectX - 15, centerY + 60);
            
            if (result.type !== '不成像') {
                const imageX = centerX + imageDistance * scale;
                ctx.fillText(result.real ? '实像' : '虚像', imageX - 15, centerY + 60);
            }
        }

        // 绘制凸透镜符号
        function drawLensSymbol(x, y) {
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 3;
            
            // 绘制双箭头符号（凸透镜的标准符号）
            // 上箭头
            ctx.beginPath();
            ctx.moveTo(x - 2, y - 50);
            ctx.lineTo(x + 2, y - 50);
            ctx.lineTo(x, y - 60);
            ctx.closePath();
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(x - 2, y - 40);
            ctx.lineTo(x + 2, y - 40);
            ctx.lineTo(x, y - 50);
            ctx.closePath();
            ctx.stroke();
            
            // 下箭头
            ctx.beginPath();
            ctx.moveTo(x - 2, y + 50);
            ctx.lineTo(x + 2, y + 50);
            ctx.lineTo(x, y + 60);
            ctx.closePath();
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(x - 2, y + 40);
            ctx.lineTo(x + 2, y + 40);
            ctx.lineTo(x, y + 50);
            ctx.closePath();
            ctx.stroke();
            
            // 透镜中心线
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x, y - 65);
            ctx.lineTo(x, y + 65);
            ctx.stroke();
        }

        // 绘制蜡烛
        function drawCandle(x, y, height, color, isUpright, isDashed = false) {
            if (isDashed) {
                ctx.setLineDash([5, 5]);
            }
            
            // 蜡烛主体
            ctx.fillStyle = color;
            if (isUpright) {
                // 正立的蜡烛
                ctx.fillRect(x - 8, y - height, 16, height);
                
                // 火焰
                ctx.fillStyle = '#ffa500';
                ctx.beginPath();
                ctx.moveTo(x, y - height - 15);
                ctx.quadraticCurveTo(x - 8, y - height - 5, x, y - height);
                ctx.quadraticCurveTo(x + 8, y - height - 5, x, y - height - 15);
                ctx.fill();
                
                // 火焰光晕
                ctx.fillStyle = 'rgba(255, 165, 0, 0.3)';
                ctx.beginPath();
                ctx.arc(x, y - height - 8, 12, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // 倒立的蜡烛
                ctx.fillRect(x - 8, y, 16, height);
                
                // 火焰（向下）
                ctx.fillStyle = '#ffa500';
                ctx.beginPath();
                ctx.moveTo(x, y + height + 15);
                ctx.quadraticCurveTo(x - 8, y + height + 5, x, y + height);
                ctx.quadraticCurveTo(x + 8, y + height + 5, x, y + height + 15);
                ctx.fill();
                
                // 火焰光晕
                ctx.fillStyle = 'rgba(255, 165, 0, 0.3)';
                ctx.beginPath();
                ctx.arc(x, y + height + 8, 12, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.setLineDash([]);
        }

        // 绘制光线（修正版）
        function drawLightRays(objectX, imageX, objectHeight, imageHeight, isReal) {
            const objectTop = centerY - objectHeight; // 物体顶端
            const objectBottom = centerY; // 物体底端（在光轴上）
            
            if (isReal) {
                // 实像光路图
                ctx.strokeStyle = '#ff6b6b';
                ctx.lineWidth = 2;
                ctx.setLineDash([]);
                
                // 第一条光线：平行于主光轴，经过透镜后通过焦点
                ctx.beginPath();
                ctx.moveTo(objectX, objectTop);
                ctx.lineTo(centerX, objectTop);
                ctx.lineTo(centerX + focalLength * scale, centerY);
                // 延伸到像点（倒立，所以在光轴下方）
                const imageBottom = centerY + imageHeight;
                ctx.lineTo(imageX, imageBottom);
                ctx.stroke();
                
                // 第二条光线：通过光心，传播方向不变
                ctx.beginPath();
                ctx.moveTo(objectX, objectTop);
                ctx.lineTo(centerX, centerY);
                ctx.lineTo(imageX, imageBottom);
                ctx.stroke();
                
            } else {
                // 虚像光路图
                ctx.strokeStyle = '#ff6b6b';
                ctx.lineWidth = 2;
                ctx.setLineDash([]);
                
                // 第一条光线：平行于主光轴，经过透镜后通过右侧焦点F
                ctx.beginPath();
                ctx.moveTo(objectX, objectTop);
                ctx.lineTo(centerX, objectTop);
                ctx.lineTo(centerX + focalLength * scale, centerY);
                // 继续延伸到画布边缘
                const slope1 = (centerY - objectTop) / (centerX + focalLength * scale - centerX);
                const extendX1 = canvas.width - 50;
                const extendY1 = centerY + slope1 * (extendX1 - (centerX + focalLength * scale));
                ctx.lineTo(extendX1, extendY1);
                ctx.stroke();
                
                // 第二条光线：通过光心，传播方向不变
                ctx.beginPath();
                ctx.moveTo(objectX, objectTop);
                ctx.lineTo(centerX, centerY);
                // 延伸到画布边缘
                const slope2 = (centerY - objectTop) / (centerX - objectX);
                const extendX2 = canvas.width - 50;
                const extendY2 = centerY + slope2 * (extendX2 - centerX);
                ctx.lineTo(extendX2, extendY2);
                ctx.stroke();
                
                // 绘制反向延长线（虚线）
                ctx.strokeStyle = '#ff6b6b';
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]);
                
                // 第一条光线的反向延长线：从透镜中心反向延长到虚像点
                ctx.beginPath();
                ctx.moveTo(centerX, objectTop);
                const imageTop = centerY - imageHeight;
                ctx.lineTo(imageX, imageTop);
                ctx.stroke();
                
                // 第二条光线的反向延长线：从光心反向延长到虚像点
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(imageX, imageTop);
                ctx.stroke();
                
                ctx.setLineDash([]);
            }
        }

        // 绘制焦点处的光路图（修正版）
        function drawFocalPointRays(objectX) {
            const objectTop = centerY - 30; // 物体顶端
            
            ctx.strokeStyle = '#ff6b6b';
            ctx.lineWidth = 2;
            ctx.setLineDash([]);
            
            // 第一条光线：平行于主光轴，经过透镜后通过右侧焦点F
            ctx.beginPath();
            ctx.moveTo(objectX, objectTop);
            ctx.lineTo(centerX, objectTop);
            ctx.lineTo(centerX + focalLength * scale, centerY);
            // 继续延伸，保持通过焦点后的方向
            const slope1 = (centerY - objectTop) / (centerX + focalLength * scale - centerX);
            const extendX1 = canvas.width - 50;
            const extendY1 = centerY + slope1 * (extendX1 - (centerX + focalLength * scale));
            ctx.lineTo(extendX1, extendY1);
            ctx.stroke();
            
            // 第二条光线：通过光心，传播方向不变
            ctx.beginPath();
            ctx.moveTo(objectX, objectTop);
            ctx.lineTo(centerX, centerY);
            // 延伸到画布边缘，保持原有方向
            const slope2 = (centerY - objectTop) / (centerX - objectX);
            const extendX2 = canvas.width - 50;
            const extendY2 = centerY + slope2 * (extendX2 - centerX);
            ctx.lineTo(extendX2, extendY2);
            ctx.stroke();
            
            // 添加说明文字
            ctx.fillStyle = '#666';
            ctx.font = '14px Arial';
            ctx.fillText('物体在焦点处，光线经透镜后平行射出', centerX - 100, centerY + 100);
        }

        // 更新实验数据
        function updateExperiment() {
            const result = calculateImage();
            
            // 更新数据显示
            if (result.type === '不成像') {
                document.getElementById('imageDistance').textContent = '∞';
                document.getElementById('magnification').textContent = '∞';
            } else {
                document.getElementById('imageDistance').textContent = 
                    Math.abs(imageDistance).toFixed(1) + ' cm';
                document.getElementById('magnification').textContent = 
                    magnification.toFixed(2);
            }
            
            document.getElementById('imageType').textContent = result.type;
            document.getElementById('imagePosition').textContent = result.position;
            
            // 更新结论
            updateConclusion(result);
            
            // 重绘实验场景
            drawExperiment();
        }

        // 更新实验结论
        function updateConclusion(result) {
            const conclusionDiv = document.getElementById('conclusion');
            let conclusion = '';
            
            if (objectDistance > 2 * focalLength) {
                conclusion = `物距 u = ${objectDistance.toFixed(1)}cm > 2f<br>
                    成倒立、缩小的实像<br>
                    像距 v = ${Math.abs(imageDistance).toFixed(1)}cm<br>
                    应用：照相机、眼睛`;
            } else if (Math.abs(objectDistance - 2 * focalLength) < 0.1) {
                conclusion = `物距 u = 2f<br>
                    成倒立、等大的实像<br>
                    像距 v = 2f<br>
                    这是实像大小的分界点`;
            } else if (objectDistance > focalLength) {
                conclusion = `物距 f < u < 2f<br>
                    成倒立、放大的实像<br>
                    像距 v = ${Math.abs(imageDistance).toFixed(1)}cm > 2f<br>
                    应用：投影仪、幻灯机`;
            } else if (Math.abs(objectDistance - focalLength) < 0.1) {
                conclusion = `物距 u = f<br>
                    物体在焦点上<br>
                    光线经透镜后平行射出<br>
                    不成像（像在无穷远）`;
            } else {
                conclusion = `物距 u = ${objectDistance.toFixed(1)}cm < f<br>
                    成正立、放大的虚像<br>
                    像距 v = ${Math.abs(imageDistance).toFixed(1)}cm（同侧）<br>
                    应用：放大镜`;
            }
            
            conclusionDiv.innerHTML = conclusion;
        }

        // 预设场景
        function setPreset(type) {
            switch(type) {
                case 'real':
                    objectDistance = 30;
                    focalLength = 10;
                    break;
                case 'virtual':
                    objectDistance = 5;
                    focalLength = 10;
                    break;
                case '2f':
                    objectDistance = 20;
                    focalLength = 10;
                    break;
                case 'focus':
                    objectDistance = 10;
                    focalLength = 10;
                    break;
            }
            
            objectSlider.value = objectDistance;
            focalSlider.value = focalLength;
            document.getElementById('objectValue').textContent = objectDistance.toFixed(1);
            document.getElementById('focalValue').textContent = focalLength.toFixed(1);
            
            updateExperiment();
        }

        // 重置实验
        function resetExperiment() {
            objectDistance = 30;
            focalLength = 10;
            
            objectSlider.value = objectDistance;
            focalSlider.value = focalLength;
            document.getElementById('objectValue').textContent = objectDistance.toFixed(1);
            document.getElementById('focalValue').textContent = focalLength.toFixed(1);
            
            updateExperiment();
        }

        // 初始化实验
        updateExperiment();

        // 响应式调整
        window.addEventListener('resize', () => {
            const container = document.querySelector('.experiment-area');
            const maxWidth = container.clientWidth - 40;
            if (maxWidth < 800) {
                canvas.width = maxWidth;
                drawExperiment();
            }
        });
    </script>
    <script src="supabase.js"></script>
    <script src="script.js"></script>
</body>
</html>
