    &lt;script&gt;
        // --- 配置与状态 ---
        const CONFIG = {
            waterDensity: 1.0, // 模拟密度

            scale: 0.5, // 像素到物理量的缩放

            maxIndent: 45, // 橡皮膜最大凹陷像素
        };

        const STATE = {
            orientation: 'horizontal', // 'horizontal' | 'vertical'
            inWater: false,
            depth1: 0, // 左/上表面深度
            depth2: 0, // 右/下表面深度
            pos: { x: 0, y: 0 }, // 仪器中心位置
            isDragging: false
        };

        // --- DOM 元素 ---
        const els = {
            container: document.getElementById('instrument-container'),
            svg: document.getElementById('cylinder-svg'),
            svgDefs: document.getElementById('svg-defs-container'),
            handleGroup: document.getElementById('handle-group'),
            bodyGroup: document.getElementById('body-group'),
            beaker: document.querySelector('.beaker'),
            water: document.getElementById('water-body'),
            labArea: document.getElementById('lab-area'),
            statusText: document.getElementById('status-text'),
            force1: document.getElementById('force-1'),
            force2: document.getElementById('force-2'),
            forceDiff: document.getElementById('force-diff'),
            conclusionBox: document.getElementById('conclusion-box'),
            btnH: document.getElementById('btn-horizontal'),
            btnV: document.getElementById('btn-vertical'),
            btnReset: document.getElementById('btn-reset'),
            scales: document.getElementById('scales')
        };

        // --- 初始化 ---
        function init() {
            // 注入 SVG Defs (渐变定义)
            // 使用 JS 注入以避免 HTML Lint 对 linearGradient 大小写的报错
            const defsContent = `
                &lt;defs&gt;
                    &lt;linearGradient id=&quot;glass-grad&quot; x1=&quot;0%&quot; y1=&quot;0%&quot; x2=&quot;100%&quot; y2=&quot;0%&quot;&gt;
                        &lt;stop offset=&quot;0%&quot; style=&quot;stop-color:rgba(255,255,255,0.8);stop-opacity:0.9&quot; /&gt;
                        &lt;stop offset=&quot;20%&quot; style=&quot;stop-color:rgba(200,220,255,0.4);stop-opacity:0.5&quot; /&gt;
                        &lt;stop offset=&quot;50%&quot; style=&quot;stop-color:rgba(200,220,255,0.1);stop-opacity:0.2&quot; /&gt;
                        &lt;stop offset=&quot;80%&quot; style=&quot;stop-color:rgba(200,220,255,0.4);stop-opacity:0.5&quot; /&gt;
                        &lt;stop offset=&quot;100%&quot; style=&quot;stop-color:rgba(255,255,255,0.8);stop-opacity:0.9&quot; /&gt;
                    &lt;/linearGradient&gt;
                    &lt;linearGradient id=&quot;membrane-grad&quot; x1=&quot;0%&quot; y1=&quot;0%&quot; x2=&quot;0%&quot; y2=&quot;100%&quot;&gt;
                        &lt;stop offset=&quot;0%&quot; style=&quot;stop-color:#fbbf24;stop-opacity:1&quot; /&gt;
                        &lt;stop offset=&quot;100%&quot; style=&quot;stop-color:#d97706;stop-opacity:1&quot; /&gt;
                    &lt;/linearGradient&gt;
                &lt;/defs&gt;
            `;
            els.svgDefs.outerHTML = defsContent;

            // 生成刻度线
            for(let i=1; i&lt;10; i++) {
                const line = document.createElement('div');
                line.className = 'scale-mark';
                line.style.bottom = (i * 10) + '%';
                els.scales.appendChild(line);
            }

            // 初始位置
            resetPosition();
            renderInstrument();
            updatePhysics();
            
            // 事件监听
            setupInteractions();
        }

        function resetPosition() {
            const labRect = els.labArea.getBoundingClientRect();
            STATE.pos = {
                x: labRect.width * 0.15, // 左偏上
                y: labRect.height * 0.1 // 保持靠上
            };
            updateElementPosition();
        }

        function updateElementPosition() {
            els.container.style.transform = `translate(${STATE.pos.x}px, ${STATE.pos.y}px)`;
        }

        // --- 渲染逻辑 ---
        function renderInstrument() {
            const { orientation, depth1, depth2 } = STATE;
            const w = CONFIG.cylinderSize.w;
            const h = CONFIG.cylinderSize.h;
            
            // 计算凹陷程度 (0 - CONFIG.maxIndent)
            // 调整系数以避免过早饱和，确保深处仍有差异
            const indent1 = Math.min(CONFIG.maxIndent, depth1 * 0.12);
            const indent2 = Math.min(CONFIG.maxIndent, depth2 * 0.12);

            let bodyPath = '';
            let membrane1Path = '';
            let membrane2Path = '';
            let handleHtml = '';

            if (orientation === 'horizontal') {
                // 水平放置：长方形，左右是膜
                // 尺寸：宽100，高60
                // 膜向内凹陷
                
                // 玻璃管身 (上下两条线)
                // M 0,0 L 100,0 M 0,60 L 100,60
                
                // 左膜 (x=0)
                membrane1Path = `&lt;path d=&quot;M 0,0 Q ${indent1},30 0,60&quot; fill=&quot;none&quot; stroke=&quot;#d97706&quot; stroke-width=&quot;3&quot; /&gt;
                                 &lt;path d=&quot;M 0,0 Q ${indent1},30 0,60&quot; fill=&quot;url(#membrane-grad)&quot; opacity=&quot;0.5&quot; /&gt;`;
                
                // 右膜 (x=100)
                membrane2Path = `&lt;path d=&quot;M 100,0 Q ${100-indent2},30 100,60&quot; fill=&quot;none&quot; stroke=&quot;#d97706&quot; stroke-width=&quot;3&quot; /&gt;
                                 &lt;path d=&quot;M 100,0 Q ${100-indent2},30 100,60&quot; fill=&quot;url(#membrane-grad)&quot; opacity=&quot;0.5&quot; /&gt;`;

                // 管身
                bodyPath = `&lt;rect x=&quot;0&quot; y=&quot;0&quot; width=&quot;100&quot; height=&quot;60&quot; fill=&quot;url(#glass-grad)&quot; stroke=&quot;#94a3b8&quot; stroke-width=&quot;2&quot; /&gt;`;
                
                // 提手 (中间竖直向上)
                handleHtml = `&lt;path d=&quot;M 50,0 L 50,-100&quot; stroke=&quot;#64748b&quot; stroke-width=&quot;4&quot; fill=&quot;none&quot; /&gt;`;

                // 调整SVG viewBox以适应提手
                els.svg.setAttribute('viewBox', '0 -100 120 180');
                els.svg.style.width = '120px';
                els.svg.style.height = '180px';

            } else {
                // 竖直放置：长方形，上下是膜
                // 尺寸：宽60，高100 (旋转90度)
                
                // 上膜 (y=0)
                membrane1Path = `&lt;path d=&quot;M 0,0 Q 30,${indent1} 60,0&quot; fill=&quot;none&quot; stroke=&quot;#d97706&quot; stroke-width=&quot;3&quot; /&gt;
                                 &lt;path d=&quot;M 0,0 Q 30,${indent1} 60,0&quot; fill=&quot;url(#membrane-grad)&quot; opacity=&quot;0.5&quot; /&gt;`;
                
                // 下膜 (y=100)
                membrane2Path = `&lt;path d=&quot;M 0,100 Q 30,${100-indent2} 60,100&quot; fill=&quot;none&quot; stroke=&quot;#d97706&quot; stroke-width=&quot;3&quot; /&gt;
                                 &lt;path d=&quot;M 0,100 Q 30,${100-indent2} 60,100&quot; fill=&quot;url(#membrane-grad)&quot; opacity=&quot;0.5&quot; /&gt;`;

                // 管身
                bodyPath = `&lt;rect x=&quot;0&quot; y=&quot;0&quot; width=&quot;60&quot; height=&quot;100&quot; fill=&quot;url(#glass-grad)&quot; stroke=&quot;#94a3b8&quot; stroke-width=&quot;2&quot; /&gt;`;
                
                // 提手 (侧面弯曲向上)
                handleHtml = `&lt;path d=&quot;M 60,50 L 80,50 L 80,-50&quot; stroke=&quot;#64748b&quot; stroke-width=&quot;4&quot; fill=&quot;none&quot; stroke-linejoin=&quot;round&quot; /&gt;`;

                els.svg.setAttribute('viewBox', '0 -50 100 170');
                els.svg.style.width = '100px';
                els.svg.style.height = '170px';
            }

            els.bodyGroup.innerHTML = bodyPath + membrane1Path + membrane2Path;
            els.handleGroup.innerHTML = handleHtml;

            // 渲染压力箭头
            renderArrows(indent1, indent2);
        }

        function renderArrows(indent1, indent2) {
            // 简单用 DOM 模拟箭头，根据压力大小改变长度
            // 这里简化处理，直接在 SVG 里画或者用 DOM
            // 为了效果好，我们清除旧箭头，重新计算
            // 实际项目中可以用 SVG 绘制箭头
        }

        // --- 物理逻辑 ---
        function updatePhysics() {
            const beakerRect = els.beaker.getBoundingClientRect();
            const waterRect = els.water.getBoundingClientRect();
            const instRect = els.container.getBoundingClientRect();
            
            // 计算仪器中心相对于水面的位置
            // 水面 Y 坐标
            const waterSurfaceY = waterRect.top;
            
            // 仪器中心 Y
            const instCY = instRect.top + instRect.height / 2;
            // 仪器中心 X
            const instCX = instRect.left + instRect.width / 2;
            
            // 简单的碰撞检测：仪器中心是否在水面以下且在烧杯范围内
            // 烧杯范围 (考虑壁厚，稍微收缩)
            const beakerLeft = beakerRect.left + 10;
            const beakerRight = beakerRect.right - 10;
            
            let d1 = 0, d2 = 0;
            let inWater = false;
            
            // 必须在烧杯水平范围内
            const inBeakerX = instCX &gt; beakerLeft &amp;&amp; instCX &lt; beakerRight;

            // 偏移量校准 (基于 SVG 坐标系)
            let offset1Y, offset2Y;
            
            if (STATE.orientation === 'horizontal') {
                // 水平：左右膜深度相同，等于中心深度
                // 膜中心 Y 约为 instRect.top + instRect.height - 30 (因为有提手)
                // 简化：取容器中心
                const centerY = instRect.top + instRect.height / 2 + 20; // 修正提手带来的偏移
                if (inBeakerX &amp;&amp; centerY &gt; waterSurfaceY) {
                    d1 = centerY - waterSurfaceY;
                    d2 = d1;
                    inWater = true;
                }
            } else {
                // 竖直：上膜浅，下膜深
                // 使用比例计算以匹配 SVG viewBox (0 -50 100 170, total height 220)
                // 圆筒主体 y=0 到 y=100
                // 顶部距离 viewBox 顶(-50) 为 50 单位
                // 底部距离 viewBox 顶(-50) 为 150 单位
                const ratio = instRect.height / 220;
                const topY = instRect.top + (50 * ratio);
                const bottomY = instRect.top + (150 * ratio);
                
                if (inBeakerX) {
                    if (topY &gt; waterSurfaceY) {
                        d1 = topY - waterSurfaceY;
                        inWater = true;
                    }
                    if (bottomY &gt; waterSurfaceY) {
                        d2 = bottomY - waterSurfaceY;
                        inWater = true;
                    }
                }
            }

            STATE.inWater = inWater;
            STATE.depth1 = Math.max(0, d1);
            STATE.depth2 = Math.max(0, d2);

            // 更新 UI 数据
            updateDataPanel();
            
            // 重新渲染仪器（凹陷变化）
            renderInstrument();
        }

        function updateDataPanel() {
            const f1 = Math.round(STATE.depth1 * CONFIG.scale);
            const f2 = Math.round(STATE.depth2 * CONFIG.scale);
            const diff = Math.abs(f2 - f1);

            els.statusText.textContent = STATE.inWater ? &quot;在水中&quot; : &quot;在空气中&quot;;
            els.force1.textContent = f1 + &quot; N&quot;;
            els.force2.textContent = f2 + &quot; N&quot;;
            els.forceDiff.textContent = diff + &quot; N&quot;;

            // 结论判断
            // 只要上表面有压力（即完全浸没或上表面刚入水），就显示结论
            if (STATE.inWater &amp;&amp; STATE.depth1 &gt; 0) {
                if (STATE.orientation === 'horizontal') {
                    els.conclusionBox.innerHTML = `&lt;span class=&quot;text-blue-600 font-bold text-xl&quot;&gt;F&lt;sub&gt;向左&lt;/sub&gt; = F&lt;sub&gt;向右&lt;/sub&gt;&lt;/span&gt;&lt;br&gt;水平方向受力平衡，浮力不由此产生`;
                } else {
                    els.conclusionBox.innerHTML = `&lt;span class=&quot;text-red-600 font-bold text-xl&quot;&gt;F&lt;sub&gt;向上&lt;/sub&gt; &gt; F&lt;sub&gt;向下&lt;/sub&gt;&lt;/span&gt;&lt;br&gt;压力差 = ${diff} N&lt;br&gt;这就是浮力产生的原因！`;
                }
            } else {
                els.conclusionBox.textContent = &quot;请将圆筒完全浸没水中以得出结论&quot;;
            }
        }

        // --- 交互逻辑 ---
        function setupInteractions() {
            let startX, startY, initialLeft, initialTop;

            const onMove = (e) =&gt; {
                if (!STATE.isDragging) return;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                const dx = clientX - startX;
                const dy = clientY - startY;

                STATE.pos.x = initialLeft + dx;
                STATE.pos.y = initialTop + dy;
                
                // 边界限制
                const labRect = els.labArea.getBoundingClientRect();
                STATE.pos.x = Math.max(0, Math.min(STATE.pos.x, labRect.width - 100));
                STATE.pos.y = Math.max(0, Math.min(STATE.pos.y, labRect.height - 100));

                updateElementPosition();
                updatePhysics();
            };

            const onEnd = () =&gt; {
                STATE.isDragging = false;
                els.container.style.cursor = 'grab';
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onEnd);
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('touchend', onEnd);
            };

            const onStart = (e) =&gt; {
                e.preventDefault();
                STATE.isDragging = true;
                els.container.style.cursor = 'grabbing';
                
                startX = e.touches ? e.touches[0].clientX : e.clientX;
                startY = e.touches ? e.touches[0].clientY : e.clientY;
                
                // 获取当前的 translate 值
                // 简单起见直接用 STATE.pos，因为它是唯一的数据源
                initialLeft = STATE.pos.x;
                initialTop = STATE.pos.y;

                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onEnd);
                document.addEventListener('touchmove', onMove, {passive: false});
                document.addEventListener('touchend', onEnd);
            };

            els.container.addEventListener('mousedown', onStart);
            els.container.addEventListener('touchstart', onStart, {passive: false});

            // 按钮事件
            els.btnH.addEventListener('click', () =&gt; setOrientation('horizontal'));
            els.btnV.addEventListener('click', () =&gt; setOrientation('vertical'));
            els.btnReset.addEventListener('click', () =&gt; {
                // 1. 先移回初始位置
                resetPosition();
                // 2. 重置方向
                setOrientation('horizontal');
                
                // 3. 手动强制归零状态，防止 DOM 更新延迟导致的数据残留
                STATE.inWater = false;
                STATE.depth1 = 0;
                STATE.depth2 = 0;
                updateDataPanel();
                
                // 4. 延迟一帧再次检查，确保物理引擎与 DOM 同步
                requestAnimationFrame(() =&gt; {
                    updatePhysics();
                });
            });
        }

        function setOrientation(type) {
            STATE.orientation = type;
            
            // 按钮样式切换
            if (type === 'horizontal') {
                els.btnH.className = &quot;flex-1 py-2 rounded-md text-sm font-medium transition-all bg-white shadow text-blue-600&quot;;
                els.btnV.className = &quot;flex-1 py-2 rounded-md text-sm font-medium text-gray-500 hover:text-gray-700 transition-all&quot;;
            } else {
                els.btnV.className = &quot;flex-1 py-2 rounded-md text-sm font-medium transition-all bg-white shadow text-blue-600&quot;;
                els.btnH.className = &quot;flex-1 py-2 rounded-md text-sm font-medium text-gray-500 hover:text-gray-700 transition-all&quot;;
            }

            renderInstrument();
            updatePhysics();
        }

        // 窗口大小改变时重新计算
        window.addEventListener('resize', () =&gt; {
            resetPosition();
            updatePhysics();
        });

        // 启动
        init();

    &lt;/script&gt;
&lt;/body&gt;
&lt;/html&gt;" frameborder="0"></iframe>
