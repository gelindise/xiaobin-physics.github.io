<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>浮力实验 — 物理虚拟实验</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <script src="protect.js"></script>
  <style>
    :root {
      --primary: #3b82f6; --bg-dark: #0b1120; --text-main: #e2e8f0;
      --text-muted: #94a3b8; --glass-border: rgba(148, 163, 184, 0.12);
      --card-bg: rgba(15, 23, 42, 0.6);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-dark); color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      overflow-x: hidden; min-height: 100vh;
    }
    .particle-bg {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.06) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 50%, rgba(99,102,241,0.06) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.6rem 2rem; background: rgba(11, 17, 32, 0.85);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--glass-border);
    }
    header .logo { font-size: 1.1rem; font-weight: 700; }
    header .logo a { color: var(--text-main); text-decoration: none; }
    header nav a {
      color: var(--text-muted); text-decoration: none; font-size: 0.85rem;
      padding: 0.4rem 1rem; border-radius: 8px; transition: all 0.3s;
    }
    header nav a:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .main-wrap {
      position: relative; z-index: 1;
      max-width: 960px; margin: 1.5rem auto; padding: 0 1rem;
    }
    .main-card {
      background: var(--card-bg); backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border);
      border-radius: 20px; padding: 1.25rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .main-card h2 {
      text-align: center; font-size: 1.25rem; margin-bottom: 0.8rem;
      background: linear-gradient(135deg, var(--primary), #818cf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #canvasWrap { text-align: center; background: #fff; border-radius: 12px; overflow: hidden; }
    #simCanvas { display: block; margin: 0 auto; max-width: 100%; }
    .control-row {
      display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
      gap: 0.5rem; padding: 0.5rem 1rem;
      background: rgba(0,0,0,0.03); border-top: 1px solid rgba(0,0,0,0.06);
    }
    .ctrl-btn {
      padding: 0.4rem 0.9rem; border-radius: 8px; border: 1px solid #d0d0d0;
      font-size: 0.82rem; cursor: pointer; transition: all 0.2s;
      background: #fff; color: #334; white-space: nowrap; font-weight: 600;
    }
    .ctrl-btn:hover { background: #eef; border-color: #99b; }
    .ctrl-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .ctrl-label { font-size: 0.8rem; color: #555; font-weight: 600; min-width: 3rem; text-align: center; }
    .info-cards {
      position: relative; z-index: 1;
      max-width: 960px; margin: 1.5rem auto; padding: 0 1rem;
      display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
    }
    @media (max-width: 640px) { .info-cards { grid-template-columns: 1fr; } }
    .info-card {
      background: var(--card-bg); backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border);
      border-radius: 16px; padding: 1.25rem;
    }
    .info-card h3 { font-size: 1rem; margin-bottom: 0.75rem; color: var(--primary); font-weight: 700; }
    .info-card p, .info-card li { font-size: 0.85rem; color: var(--text-muted); line-height: 1.7; }
    .info-card ul { padding-left: 1.2rem; }
    .info-card li { margin-bottom: 0.3rem; }
  </style>
</head>
<body>
<div class="particle-bg"></div>
<header>
  <div class="logo"><a href="index.html">物理虚拟实验</a></div>
  <nav>
    <a href="index.html">首页</a>
    <a href="experiments.html">实验列表</a>
    <a href="vip.html">开通VIP</a>
  </nav>
</header>

<div class="main-wrap">
  <div class="main-card">
    <h2>浮力实验 — 探究影响浮力大小的因素</h2>
    <div id="canvasWrap">
      <canvas id="simCanvas"></canvas>
      <div class="control-row">
        <span class="ctrl-label">质量</span>
        <button class="ctrl-btn" id="btnMassDown">−</button>
        <span class="ctrl-label" id="massLabel">1000g</span>
        <button class="ctrl-btn" id="btnMassUp">+</button>
        <span style="width:0.5rem"></span>
        <span class="ctrl-label">体积</span>
        <button class="ctrl-btn" id="btnVolDown">−</button>
        <span class="ctrl-label" id="volLabel">500mL</span>
        <button class="ctrl-btn" id="btnVolUp">+</button>
        <span style="width:0.5rem"></span>
        <button class="ctrl-btn" id="btnFluid">液体: <span id="fluidLabel">淡水</span></button>
        <button class="ctrl-btn" id="btnPlanet">星球: <span id="planetLabel">地球</span></button>
        <button class="ctrl-btn" id="btnStart" style="background:#4caf50;color:#fff;border-color:#4caf50;">开始</button>
        <button class="ctrl-btn" id="btnReset">重置</button>
      </div>
    </div>
  </div>
</div>

<div class="info-cards">
  <div class="info-card">
    <h3>实验原理</h3>
    <ul>
      <li><strong>阿基米德原理：</strong>F<sub>浮</sub> = ρ<sub>液</sub> × g × V<sub>排</sub></li>
      <li><strong>拉力：</strong>弹簧测力计读数 = 重力 − 浮力</li>
      <li><strong>影响因素：</strong>浮力大小与液体密度和排开液体体积有关</li>
      <li>ρ<sub>物</sub> > ρ<sub>液</sub> 下沉；ρ<sub>物</sub> < ρ<sub>液</sub> 上浮</li>
    </ul>
  </div>
  <div class="info-card">
    <h3>操作指南</h3>
    <ul>
      <li>点击 <strong>+/−</strong> 调整物体质量和体积</li>
      <li>点击<strong>"液体"</strong>切换液体类型</li>
      <li>点击<strong>"星球"</strong>切换重力环境</li>
      <li>点击<strong>"开始"</strong> → 物体缓慢浸入液体</li>
      <li>右侧图表实时绘制<strong>拉力—浸入深度</strong>关系</li>
    </ul>
  </div>
</div>

<script>
// roundRect polyfill for older browsers
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
    this.beginPath();
    this.moveTo(x + r.tl, y);
    this.lineTo(x + w - r.tr, y);
    this.arcTo(x + w, y, x + w, y + r.tr, r.tr);
    this.lineTo(x + w, y + h - r.br);
    this.arcTo(x + w, y + h, x + w - r.br, y + h, r.br);
    this.lineTo(x + r.bl, y + h);
    this.arcTo(x, y + h, x, y + h - r.bl, r.bl);
    this.lineTo(x, y + r.tl);
    this.arcTo(x, y, x + r.tl, y, r.tl);
    this.closePath();
  };
}

// ===== 实验参数 =====
var planets = [
  { name: "地球", g: 9.8 },
  { name: "月球", g: 1.62 },
  { name: "火星", g: 3.71 },
  { name: "金星", g: 8.87 },
  { name: "木星", g: 24.79 },
  { name: "灶神星", g: 0.22 }
];
var fluids = [
  { name: "淡水", rho: 1.0, color: "#4da6ff" },
  { name: "水银", rho: 13.5, color: "#b0b0b0" },
  { name: "汽油", rho: 0.737, color: "#e6c830" },
  { name: "枫糖浆", rho: 1.33, color: "#b3804d" },
  { name: "原油", rho: 0.825, color: "#4d2e00" }
];

var pi = 0;     // planet index
var fi = 0;     // fluid index
var massG = 1000;    // grams
var volML = 500;     // mL

// ===== 动画状态 =====
var running = false;
var immersion = 0;       // 0~1, 浸入比例
var animId = null;
var dataLog = [];        // {d: depth_cm, F: tension_N}

// ===== Canvas =====
var canvas, ctx;
var W, H;

// ===== 布局区域 =====
var tank = {};
var graph = {};

function initLayout() {
  // 水箱位置 — 左侧
  tank.x = W * 0.08;
  tank.w = W * 0.28;
  tank.h = H * 0.55;
  tank.y = H * 0.38;
  tank.waterTop = tank.y + 30;       // 水面距水箱顶部
  tank.wallThick = 8;
  // 物体
  tank.objW = Math.pow(volML, 1/3) / 8 * 100;
  tank.objH = tank.objW;
  // 图表 — 右侧
  graph.x = W * 0.44;
  graph.y = H * 0.08;
  graph.w = W * 0.52;
  graph.h = H * 0.55;
  // 测力计在物体上方
  tank.sensorX = tank.x + tank.w / 2;
  tank.objX = tank.x + tank.w / 2;
}

// ===== 绘制函数 =====

function drawTank() {
  var tx = tank.x, ty = tank.y, tw = tank.w, th = tank.h, wt = tank.wallThick;

  // 水体（后壁内侧）
  ctx.fillStyle = fluids[fi].color;
  ctx.globalAlpha = 0.45;
  ctx.fillRect(tx + wt, ty + tank.waterTop, tw - wt * 2, th - tank.waterTop);
  ctx.globalAlpha = 1;

  // 水箱玻璃 — 左壁
  ctx.fillStyle = "#dde8f0";
  ctx.fillRect(tx, ty, wt, th);
  // 右壁
  ctx.fillRect(tx + tw - wt, ty, wt, th);
  // 底壁
  ctx.fillRect(tx, ty + th - wt, tw, wt);

  // 水箱边框
  ctx.strokeStyle = "#8899aa";
  ctx.lineWidth = 2;
  ctx.strokeRect(tx, ty, tw, th);

  // 水面线
  var wy = ty + tank.waterTop;
  ctx.strokeStyle = "#2288cc";
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(tx + wt, wy);
  ctx.lineTo(tx + tw - wt, wy);
  ctx.stroke();
  ctx.setLineDash([]);

  // 水位标签
  ctx.fillStyle = "#2288cc";
  ctx.font = "11px 'PingFang SC','Microsoft YaHei',sans-serif";
  ctx.textAlign = "right";
  ctx.fillText("水面", tx + tw - wt - 4, wy - 4);

  // 液体名称标签
  ctx.fillStyle = fluids[fi].color;
  ctx.font = "bold 14px 'PingFang SC','Microsoft YaHei',sans-serif";
  ctx.textAlign = "center";
  ctx.globalAlpha = 0.7;
  ctx.fillText(fluids[fi].name, tx + tw / 2, ty + th / 2);
  ctx.globalAlpha = 1;
}

function drawObject(objY) {
  var ox = tank.objX;
  var ow = tank.objW;
  var oh = tank.objH;

  // 物体主体
  var grad = ctx.createLinearGradient(ox - ow / 2, 0, ox + ow / 2, 0);
  grad.addColorStop(0, "#556677");
  grad.addColorStop(0.3, "#778899");
  grad.addColorStop(0.5, "#8899aa");
  grad.addColorStop(0.7, "#667788");
  grad.addColorStop(1, "#445566");
  ctx.fillStyle = grad;
  ctx.strokeStyle = "#334455";
  ctx.lineWidth = 2;

  // 圆角矩形
  var r = ow * 0.15;
  var x0 = ox - ow / 2, y0 = objY;
  ctx.beginPath();
  ctx.moveTo(x0 + r, y0);
  ctx.lineTo(x0 + ow - r, y0);
  ctx.arcTo(x0 + ow, y0, x0 + ow, y0 + r, r);
  ctx.lineTo(x0 + ow, y0 + oh - r);
  ctx.arcTo(x0 + ow, y0 + oh, x0 + ow - r, y0 + oh, r);
  ctx.lineTo(x0 + r, y0 + oh);
  ctx.arcTo(x0, y0 + oh, x0, y0 + oh - r, r);
  ctx.lineTo(x0, y0 + r);
  ctx.arcTo(x0, y0, x0 + r, y0, r);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // 标签
  ctx.fillStyle = "#fff";
  ctx.font = "bold 11px 'PingFang SC','Microsoft YaHei',sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(massG + "g", ox, objY + oh / 2 + 4);
  ctx.fillText(volML + "mL", ox, objY + oh / 2 + 18);
}

function drawForceSensor(yTop) {
  var sx = tank.sensorX;
  var sw = 42, sh = 50;
  var x0 = sx - sw / 2;

  // 主体
  var grad = ctx.createLinearGradient(0, yTop, 0, yTop + sh);
  grad.addColorStop(0, "#8899aa");
  grad.addColorStop(1, "#556677");
  ctx.fillStyle = grad;
  ctx.strokeStyle = "#334455";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(x0, yTop, sw, sh, 4);
  ctx.fill();
  ctx.stroke();

  // 屏幕
  ctx.fillStyle = "#1a2a1a";
  ctx.fillRect(x0 + 6, yTop + 6, sw - 12, 18);

  // 品牌
  ctx.fillStyle = "#fff";
  ctx.font = "7px Arial";
  ctx.textAlign = "center";
  ctx.fillText("Force Sensor", sx, yTop + 18);

  // 挂钩
  ctx.strokeStyle = "#667";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(sx, yTop + sh + 4, 8, 0, Math.PI);
  ctx.stroke();
}

function drawString(objY) {
  var sx = tank.sensorX;
  var sy = tank.sensorY + 54;  // sensor bottom hook
  ctx.strokeStyle = "#ddaa33";
  ctx.lineWidth = 2;
  ctx.setLineDash([3, 2]);
  ctx.beginPath();
  ctx.moveTo(sx, sy);
  ctx.lineTo(sx, objY);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawGround() {
  var gy = tank.y + tank.h + 2;
  ctx.fillStyle = "#559933";
  ctx.fillRect(0, gy, W, H - gy);
  // 台面
  ctx.fillStyle = "#887755";
  ctx.fillRect(tank.x - 30, gy, tank.w + 60, 18);
  ctx.fillRect(tank.x - 10, gy + 18, tank.w + 20, 10);
}

function drawInfoPanel() {
  var g = planets[pi].g;
  var rho = fluids[fi].rho;
  var Fg = massG / 1000 * g;            // gravity in N
  var V_m3 = volML / 1e6;                // m³
  var Fb_full = rho * 1000 * g * V_m3;  // max buoyancy in N
  var Fb = Fb_full * immersion;
  var Ft = Math.max(0, Fg - Fb);         // tension

  var px = tank.x + tank.w + 30;
  var py = tank.y;
  var pw = 160, ph = 110;

  ctx.fillStyle = "#fff";
  ctx.strokeStyle = "#ccc";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(px, py, pw, ph, 8);
  ctx.fill();
  ctx.stroke();

  ctx.textAlign = "left";
  ctx.fillStyle = "#333";
  ctx.font = "13px 'PingFang SC','Microsoft YaHei',sans-serif";
  ctx.fillText("重力: " + Fg.toFixed(2) + " N", px + 8, py + 20);
  ctx.fillStyle = "#1a73e8";
  ctx.fillText("浮力: " + Fb.toFixed(2) + " N", px + 8, py + 42);
  ctx.fillStyle = running || immersion > 0 ? "#cc2200" : "#333";
  ctx.fillText("拉力: " + Ft.toFixed(2) + " N", px + 8, py + 64);
  ctx.fillStyle = "#888";
  ctx.font = "11px 'PingFang SC','Microsoft YaHei',sans-serif";
  ctx.fillText("浸入: " + (immersion * 100).toFixed(0) + "%", px + 8, py + 84);

  // 星球和 g
  ctx.fillStyle = "#333";
  ctx.font = "bold 14px 'PingFang SC','Microsoft YaHei',sans-serif";
  ctx.textAlign = "left";
  ctx.fillText(planets[pi].name, tank.x, tank.y - 36);
  ctx.font = "12px 'PingFang SC','Microsoft YaHei',sans-serif";
  ctx.fillStyle = "#666";
  ctx.fillText("g = " + planets[pi].g + " m/s²", tank.x, tank.y - 16);

  // 流体密度
  ctx.fillStyle = "#333";
  ctx.font = "bold 14px 'PingFang SC','Microsoft YaHei',sans-serif";
  ctx.fillText("ρ = " + fluids[fi].rho + " g/cm³", tank.x, tank.y - 56);

  return Ft;
}

function drawGraph() {
  var gx = graph.x, gy = graph.y, gw = graph.w, gh = graph.h;

  // 背景
  ctx.fillStyle = "#fafcfe";
  ctx.strokeStyle = "#ccc";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(gx, gy, gw, gh, 6);
  ctx.fill();
  ctx.stroke();

  // 计算范围
  var g = planets[pi].g;
  var rho = fluids[fi].rho;
  var Fg = massG / 1000 * g;
  var V_m3 = volML / 1e6;
  var Fb_max = rho * 1000 * g * V_m3;
  var Fmax = Math.max(Fg, Fb_max) * 1.15;

  var margin = { top: 20, right: 16, bottom: 30, left: 44 };
  var px = gx + margin.left;
  var py = gy + margin.top;
  var pw = gw - margin.left - margin.right;
  var ph = gh - margin.top - margin.bottom;

  // 坐标轴
  ctx.strokeStyle = "#333";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(px, py);
  ctx.lineTo(px, py + ph);
  ctx.lineTo(px + pw, py + ph);
  ctx.stroke();

  // 网格
  ctx.strokeStyle = "#e8e8e8";
  ctx.lineWidth = 0.5;
  for (var i = 1; i <= 4; i++) {
    var gy2 = py + ph * i / 4;
    ctx.beginPath();
    ctx.moveTo(px, gy2);
    ctx.lineTo(px + pw, gy2);
    ctx.stroke();
  }
  for (var j = 1; j <= 4; j++) {
    var gx2 = px + pw * j / 4;
    ctx.beginPath();
    ctx.moveTo(gx2, py);
    ctx.lineTo(gx2, py + ph);
    ctx.stroke();
  }

  // Y 轴标签（力）
  ctx.fillStyle = "#333";
  ctx.font = "11px 'PingFang SC','Microsoft YaHei',sans-serif";
  ctx.textAlign = "right";
  for (var k = 0; k <= 4; k++) {
    var val = Fmax * (4 - k) / 4;
    ctx.fillText(val.toFixed(1), px - 6, py + ph * k / 4 + 4);
  }
  // Y 轴标题
  ctx.save();
  ctx.translate(px - 36, py + ph / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign = "center";
  ctx.fillText("拉力 (N)", 0, 0);
  ctx.restore();

  // X 轴标签（浸入深度 cm）
  ctx.textAlign = "center";
  var objH_cm = tank.objH / (tank.h - tank.waterTop) * 30;  // scale to ~30cm max
  if (objH_cm < 5) objH_cm = 5;
  if (objH_cm > 40) objH_cm = 40;
  var depthMax = objH_cm;
  for (var d = 0; d <= 4; d++) {
    var dv = depthMax * d / 4;
    var dx = px + pw * d / 4;
    ctx.fillText(dv.toFixed(0), dx, py + ph + 16);
  }
  ctx.fillText("浸入深度 (cm)", px + pw / 2, py + ph + 30);

  // 重力参考线（虚线）
  var FgY = py + ph - (Fg / Fmax) * ph;
  ctx.strokeStyle = "#2288cc";
  ctx.lineWidth = 1;
  ctx.setLineDash([5, 4]);
  ctx.beginPath();
  ctx.moveTo(px, FgY);
  ctx.lineTo(px + pw, FgY);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = "#2288cc";
  ctx.textAlign = "left";
  ctx.fillText("G=" + Fg.toFixed(1) + "N", px + pw + 4, FgY + 4);

  // 数据曲线
  if (dataLog.length > 1) {
    ctx.strokeStyle = "#cc2200";
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    for (var m = 0; m < dataLog.length; m++) {
      var dx = px + (dataLog[m].d / depthMax) * pw;
      var dy = py + ph - (dataLog[m].F / Fmax) * ph;
      if (m === 0) ctx.moveTo(dx, dy);
      else ctx.lineTo(dx, dy);
    }
    ctx.stroke();

    // 数据点
    ctx.fillStyle = "#cc2200";
    for (var n = 0; n < dataLog.length; n++) {
      var ddx = px + (dataLog[n].d / depthMax) * pw;
      var ddy = py + ph - (dataLog[n].F / Fmax) * ph;
      ctx.beginPath();
      ctx.arc(ddx, ddy, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // 标题
  ctx.fillStyle = "#333";
  ctx.font = "bold 12px 'PingFang SC','Microsoft YaHei',sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("拉力 — 浸入深度", gx + gw / 2, gy - 4);
}

// ===== 主循环 =====
function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, W, H);

  // 物体 Y 坐标（从上向下移动）
  var restY = tank.y - tank.objH - 15;          // 初始位置：水箱上方
  var fullY = tank.y + tank.waterTop + 10;       // 完全浸入位置
  var objY = restY + (fullY - restY) * immersion;

  tank.sensorY = objY - 70;   // 测力计在物体上方

  drawGround();
  drawTank();
  drawForceSensor(tank.sensorY);
  drawString(objY);
  drawObject(objY);
  var Ft = drawInfoPanel();
  drawGraph();

  // 提示文字
  if (!running && immersion === 0) {
    ctx.fillStyle = "#aaa";
    ctx.font = "15px 'PingFang SC','Microsoft YaHei',sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("点击「开始」将物体浸入液体中", W * 0.5, H * 0.18);
  }

  // 浸入过程
  if (running) {
    immersion += 0.004;
    if (immersion >= 1) {
      immersion = 1;
      running = false;
      updateButtons();
    }
    // 记录数据：每10帧记录一次
    var objH_cm = tank.objH / (tank.h - tank.waterTop) * 30;
    if (objH_cm < 5) objH_cm = 5;
    var depthCm = immersion * objH_cm;
    var g = planets[pi].g;
    var V_m3 = volML / 1e6;
    var Fg = massG / 1000 * g;
    var Fb = fluids[fi].rho * 1000 * g * V_m3 * immersion;
    var F = Math.max(0, Fg - Fb);
    dataLog.push({ d: depthCm, F: F });
    // 限制数据点数量
    if (dataLog.length > 300) dataLog.shift();
  }

  animId = requestAnimationFrame(render);
}

// ===== 按钮逻辑 =====
function updateButtons() {
  document.getElementById("btnMassDown").disabled = running;
  document.getElementById("btnMassUp").disabled = running;
  document.getElementById("btnVolDown").disabled = running;
  document.getElementById("btnVolUp").disabled = running;
  document.getElementById("btnFluid").disabled = running;
  document.getElementById("btnPlanet").disabled = running;
  var btn = document.getElementById("btnStart");
  if (running) {
    btn.textContent = "浸入中…";
    btn.style.background = "#f44336";
    btn.style.borderColor = "#f44336";
  } else {
    btn.textContent = "开始";
    btn.style.background = "#4caf50";
    btn.style.borderColor = "#4caf50";
  }
}

function updateLabels() {
  document.getElementById("massLabel").textContent = massG + "g";
  document.getElementById("volLabel").textContent = volML + "mL";
  document.getElementById("fluidLabel").textContent = fluids[fi].name;
  document.getElementById("planetLabel").textContent = planets[pi].name;
}

function startStop() {
  if (!running) {
    if (immersion >= 1) immersion = 0;
    dataLog = [];
    running = true;
    updateButtons();
  }
}

function resetAll() {
  running = false;
  immersion = 0;
  dataLog = [];
  updateButtons();
}

function resize() {
  var wrap = document.getElementById("canvasWrap");
  var cw = wrap.clientWidth;
  if (!cw || cw < 100) cw = Math.min(window.innerWidth - 40, 920);
  var maxW = Math.min(cw - 4, 920);
  var ratio = 0.62;
  W = maxW;
  H = Math.floor(W * ratio);
  if (H < 400) { H = 400; W = Math.floor(H / ratio); }
  canvas.width = W;
  canvas.height = H;
  initLayout();
}

// ===== 初始化 =====
canvas = document.getElementById("simCanvas");
ctx = canvas.getContext("2d");

// 按钮事件
document.getElementById("btnMassDown").addEventListener("click", function() {
  if (running) return;
  massG = Math.max(100, massG - Math.floor(Math.random() * 150 + 50));
  dataLog = []; immersion = 0;
  initLayout(); updateLabels();
});
document.getElementById("btnMassUp").addEventListener("click", function() {
  if (running) return;
  massG = Math.min(2000, massG + Math.floor(Math.random() * 150 + 50));
  dataLog = []; immersion = 0;
  initLayout(); updateLabels();
});
document.getElementById("btnVolDown").addEventListener("click", function() {
  if (running) return;
  volML = Math.max(100, volML - Math.floor(Math.random() * 50 + 25));
  dataLog = []; immersion = 0;
  initLayout(); updateLabels();
});
document.getElementById("btnVolUp").addEventListener("click", function() {
  if (running) return;
  volML = Math.min(600, volML + Math.floor(Math.random() * 50 + 25));
  dataLog = []; immersion = 0;
  initLayout(); updateLabels();
});
document.getElementById("btnFluid").addEventListener("click", function() {
  if (running) return;
  fi = (fi + 1) % fluids.length;
  dataLog = []; immersion = 0;
  updateLabels();
});
document.getElementById("btnPlanet").addEventListener("click", function() {
  if (running) return;
  pi = (pi + 1) % planets.length;
  dataLog = []; immersion = 0;
  updateLabels();
});
document.getElementById("btnStart").addEventListener("click", startStop);
document.getElementById("btnReset").addEventListener("click", resetAll);

window.addEventListener("resize", resize);

resize();
initLayout();
updateLabels();
updateButtons();
animId = requestAnimationFrame(render);
</script>
</body>
</html>
