  <script src="protect.js"></script>
  <script>
    // ===== Javalab helper functions =====
    var flowLinePhase = 0;
    function mod(x, y) {
      if (x < 0) x += y * (Math.ceil(Math.abs(x) / y) + 1);
      return x - y * Math.floor(x / y);
    }
    function isIntersected(x1, y1, x2, y2, x3, y3, x4, y4) {
      let under = (y4 - y3) * (x2 - x1) - (x4 - x3) * (y2 - y1);
      if (under == 0) return false;
      let _t = (x4 - x3) * (y1 - y3) - (y4 - y3) * (x1 - x3);
      let _s = (x2 - x1) * (y1 - y3) - (y2 - y1) * (x1 - x3);
      let t = _t / under;
      let s = _s / under;
      if (t < 0.0 || t > 1.0 || s < 0.0 || s > 1.0) return false;
      if (Math.abs(_t) <= 1e-10 && Math.abs(_s) <= 1e-10) return false;
      return true;
    }
    function getCrossX(x1, y1, x2, y2, x3, y3, x4, y4) {
      let under = (y4 - y3) * (x2 - x1) - (x4 - x3) * (y2 - y1);
      if (under == 0) return 0;
      let _t = (x4 - x3) * (y1 - y3) - (y4 - y3) * (x1 - x3);
      let t = _t / under;
      return x1 + t * (x2 - x1);
    }
    function getCrossY(x1, y1, x2, y2, x3, y3, x4, y4) {
      let under = (y4 - y3) * (x2 - x1) - (x4 - x3) * (y2 - y1);
      if (under == 0) return 0;
      let _t = (x4 - x3) * (y1 - y3) - (y4 - y3) * (x1 - x3);
      let t = _t / under;
      return y1 + t * (y2 - y1);
    }
    function flowLine_head(x1, y1, x2, y2, head, isStart) {
      let d = dist(x1, y1, x2, y2);
      let d0 = head * (isStart ? mod(millis(), 1000) / 1000 : -flowLinePhase);
      let d1 = head / 2;
      let d2 = head;
      for (let t = d0 - d2; t < d; t += d2) {
        let s1 = t + d1;
        let s2 = t + d2;
        if (s2 < 0) continue;
        if (s1 < 0) s1 = 0;
        if (s1 > d) break;
        if (s2 > d) s2 = d;
        let xx1 = map(s1, 0, d, x1, x2);
        let yy1 = map(s1, 0, d, y1, y2);
        let xx2 = map(s2, 0, d, x1, x2);
        let yy2 = map(s2, 0, d, y1, y2);
        line(xx1, yy1, xx2, yy2);
      }
      flowLinePhase = mod(d - d0, d2) / d2;
    }
    // p5.js 0.9.0 compatibility: match() alias
    if (typeof match === 'undefined') { window.match = function(str, re) { return str.match(re); }; }

    // ===== Main simulation =====
    let labelA, rangeA, labelB, rangeB, labelC, rangeC, checkA, chalkA, checkB, chalkB;
    let backImage, windowImage, windowImageSrc, balloonImage, balloonImageSrc;
    let baseObjX = [117, 117, 500, 500];
    let objX = [];
    let focalLength = 100;
    let objY = [55, 210, 125, 211];
    let rayT = [[4, 12], [-9, -1], [-4, 13], [-19, -4]];
    let rayBlur = [];
    var apertureX = 750;
    var apertureY = [110, 190];
    var lensX = 800;
    var lensY = [100, 200];
    var filmX = 950;
    var lensPolygonX = [];
    var lensPolygonY = [];
    var paused = false;

    function preload() {
      backImage = loadImage("javalab_camera_2_back.png");
      windowImage = loadImage("javalab_camera_2_window.png");
      windowImageSrc = loadImage("javalab_camera_2_window.png");
      balloonImage = loadImage("javalab_camera_2_balloon.png");
      balloonImageSrc = loadImage("javalab_camera_2_balloon.png");
    }

    function setup() {
      frameRate(10);
      let o = select("#myContainer");
      let a = 0.5;
      let w = int(min(o.width, (window.innerHeight - 160) / a));
      let h = int(w * a);
      myCanvas = createCanvas(w, h);
      myCanvas.parent("myContainer");
      myCanvas.id("myP5Canvas");

      labelA = select("#labelA");
      labelA.html("调节光圈曝光");
      rangeA = select("#rangeA");
      rangeA.input(setup2);

      labelB = select("#labelB");
      labelB.html("调节镜头对焦");
      rangeB = select("#rangeB");
      rangeB.input(setup2);

      labelC = select("#labelC");
      labelC.html("调节焦距");
      rangeC = select("#rangeC");
      rangeC.input(setup2);

      checkA = select("#checkA");
      chalkA = select("#chalkA");
      chalkA.html("窗户");
      checkB = select("#checkB");
      chalkB = select("#chalkB");
      chalkB.html("气球");

      setup2();
    }

    function windowResized() {
      let o = select("#myContainer");
      let a = 0.5;
      let w = int(min(o.width, (window.innerHeight - 160) / a));
      let h = int(w * a);
      resizeCanvas(w, h);
    }

    function setup2() {
      focalLength = int(rangeC.value());

      let apertureFactor = rangeA.value() / 2;
      apertureY[0] = 150 - apertureFactor;
      apertureY[1] = 150 + apertureFactor;
      apertureFactor = map(rangeA.value(), 20, 80, 0.5, 1);
      lensX = rangeB.value();

      for (let j = 0; j <= 72; j++) {
        var t = map(j, 0, 72, 0, TWO_PI);
        var lensThick = map(focalLength, 50, 200, 22, 6);
        var lensVert = map(focalLength, 50, 200, 55, 48);
        lensPolygonX[j] = lensX + lensThick * cos(t);
        lensPolygonY[j] = (lensY[0] + lensY[1]) / 2 + lensVert * sin(t);
      }

      drawRays(false);

      windowImage.copy(windowImageSrc, 0, 0, windowImageSrc.width, windowImageSrc.height, 0, 0, windowImageSrc.width, windowImageSrc.height);
      windowImage.filter(BLUR, rayBlur[0] / 2);
      windowImage.loadPixels();
      let numPixels = 4 * windowImage.width * windowImage.height;
      for (let i = 0; i < numPixels; i += 4) {
        windowImage.pixels[i] = int(apertureFactor * windowImage.pixels[i]);
        windowImage.pixels[i + 1] = int(apertureFactor * windowImage.pixels[i + 1]);
        windowImage.pixels[i + 2] = int(apertureFactor * windowImage.pixels[i + 2]);
      }
      windowImage.updatePixels();

      balloonImage = createImage(balloonImageSrc.width, balloonImageSrc.height);
      balloonImage.copy(balloonImageSrc, 0, 0, balloonImageSrc.width, balloonImageSrc.height, 0, 0, balloonImageSrc.width, balloonImageSrc.height);
      balloonImage.filter(BLUR, rayBlur[2] / 2);
      balloonImage.loadPixels();
      numPixels = 4 * balloonImage.width * balloonImage.height;
      for (let i = 0; i < numPixels; i += 4) {
        balloonImage.pixels[i] = int(apertureFactor * balloonImage.pixels[i]);
        balloonImage.pixels[i + 1] = int(apertureFactor * balloonImage.pixels[i + 1]);
        balloonImage.pixels[i + 2] = int(apertureFactor * balloonImage.pixels[i + 2]);
      }
      balloonImage.updatePixels();
      updateFormulaDisplay();
    }

    function draw() {
      if (paused) return;
      push();
      scale(width / 1000);
      background(255);
      strokeWeight(1);
      textSize(24);
      textAlign(LEFT, TOP);

      // 凸透镜（青色）
      noStroke();
      fill(128, 255, 255);
      beginShape();
      for (let j = 0; j <= 72; j++) {
        vertex(lensPolygonX[j], lensPolygonY[j]);
      }
      endShape();

      // 光圈叶片（黑色）
      fill(0);
      noStroke();
      rect(apertureX - 3, 100, 6, apertureY[0] - 100);
      rect(apertureX - 3, apertureY[1], 6, 200 - apertureY[1]);

      // 背景图（被摄场景）
      image(backImage, 0, 0, 1000, 500);

      // 光圈标签
      fill(191);
      textAlign(CENTER, CENTER);
      text("↓", apertureX, 75);

      // CCD 传感器标签
      textAlign(LEFT, BOTTOM);
      text("CCD\n传感器", 910, 370);

      // 光圈示意图
      push();
      translate(apertureX, 30);
      let divs = 12;
      let theta = map(rangeA.value(), 20, 80, 0.2, 0.8);
      fill(0);
      noStroke();
      for (let i = 0; i < divs; i++) {
        push();
        rotate(TWO_PI * i / divs);
        beginShape();
        vertex(30, 2);
        for (let t = 0.2; t < TWO_PI / divs; t += 0.1) {
          vertex(30 * cos(t), 30 * sin(t));
        }
        vertex(30 * cos(TWO_PI / divs), 30 * sin(TWO_PI / divs));
        let x1 = 30 * cos(TWO_PI / divs);
        let y1 = 30 * sin(TWO_PI / divs);
        let x2 = x1 + cos(theta + PI + TWO_PI / divs);
        let y2 = y1 + sin(theta + PI + TWO_PI / divs);
        let x3 = 30;
        let y3 = 2;
        let x4 = x3 + cos(theta + PI);
        let y4 = y3 + sin(theta + PI);
        vertex(getCrossX(x1, y1, x2, y2, x3, y3, x4, y4), getCrossY(x1, y1, x2, y2, x3, y3, x4, y4));
        endShape();
        pop();
      }
      pop();

      drawRays(true);

      image(windowImage, 580, 260, 320, 240);
      image(balloonImage, 580, 260, 320, 240);
      pop();
      updateFormulaDisplay();
    }

    function drawRays(drawing) {
      for (let n = 0; n < baseObjX.length; n++) {
        objX[n] = baseObjX[n];
      }
      for (let n = 0; n < objX.length; n++) {
        let resultY = [];
        var ff = focalLength;
        let pp = lensX - objX[n];
        let ii = 1 / (1 / ff - 1 / pp);
        if (ii <= 0 || pp <= 0) continue;
        var x1 = objX[n];
        var x2 = lensX;
        var x3 = filmX;
        var y1 = objY[n];
        var y2, y3;

        if (n < 2) stroke(128, 128, 0, 128);
        else stroke(255, 0, 0, 128);

        for (let j = rayT[n][0]; j <= rayT[n][1]; j++) {
          var t = radians(j);
          var gotoX = x1 + 900 * cos(t);
          var gotoY = y1 + 900 * sin(t);

          if (isIntersected(x1, y1, gotoX, gotoY, apertureX, apertureY[0], apertureX, apertureY[1])) {
            if (isIntersected(x1, y1, gotoX, gotoY, lensX, lensY[0] + 8, lensX, lensY[1] - 8)) {
              y2 = getCrossY(x1, y1, gotoX, gotoY, lensX, lensY[0], lensX, lensY[1]);
              let xx = lensX + ii;
              let cy = (lensY[0] + lensY[1]) / 2;
              let yy = cy + ii * (cy - y1) / pp;
              y3 = getCrossY(x2, y2, xx, yy, filmX, lensY[0], filmX, lensY[1]);

              var x12 = x2;
              var y12 = y2;
              var x23 = x2;
              var y23 = y2;

              for (let j = 0; j < 72; j++) {
                if (isIntersected(x1, y1, x2, y2, lensPolygonX[j], lensPolygonY[j], lensPolygonX[j + 1], lensPolygonY[j + 1])) {
                  x12 = getCrossX(x1, y1, x2, y2, lensPolygonX[j], lensPolygonY[j], lensPolygonX[j + 1], lensPolygonY[j + 1]);
                  y12 = getCrossY(x1, y1, x2, y2, lensPolygonX[j], lensPolygonY[j], lensPolygonX[j + 1], lensPolygonY[j + 1]);
                }
                if (isIntersected(x2, y2, x3, y3, lensPolygonX[j], lensPolygonY[j], lensPolygonX[j + 1], lensPolygonY[j + 1])) {
                  x23 = getCrossX(x2, y2, x3, y3, lensPolygonX[j], lensPolygonY[j], lensPolygonX[j + 1], lensPolygonY[j + 1]);
                  y23 = getCrossY(x2, y2, x3, y3, lensPolygonX[j], lensPolygonY[j], lensPolygonX[j + 1], lensPolygonY[j + 1]);
                }
              }

              resultY.push(y3);

              let canDraw = false;
              if (n == 0) if (checkA.checked()) canDraw = true;
              if (n == 1) if (checkA.checked()) canDraw = true;
              if (n == 2) if (checkB.checked()) canDraw = true;
              if (n == 3) if (checkB.checked()) canDraw = true;

              if (canDraw && drawing) {
                flowLine_head(x1, y1, x12, y12, 14, true);
                flowLine_head(x12, y12, x23, y23, 7, false);
                flowLine_head(x23, y23, x3, y3, 14, false);
              }
            }
          }
        }
        rayBlur[n] = max(resultY) - min(resultY);
      }
    }

    function updateFormulaDisplay() {
      let u1 = lensX - baseObjX[0];
      let u2 = lensX - baseObjX[2];
      let v = filmX - lensX;
      let f = focalLength;
      let invTarget = 1 / f;
      let invActual1 = u1 > 0 ? 1 / u1 + 1 / v : 0;
      let invActual2 = u2 > 0 ? 1 / u2 + 1 / v : 0;
      let delta1 = invTarget - invActual1;
      let eps = 0.0005;

      select("#lensFormulaValue").html(
        "f = " + nf(f, 1, 0) + " mm, &nbsp;u₁ = " + nf(u1, 1, 0) + " mm, &nbsp;v = " + nf(v, 1, 0) + " mm"
      );

      let statusStr;
      if (abs(delta1) < eps) {
        statusStr = "<span class='ok'>✓ 合焦</span>";
      } else if (abs(delta1) < 5 * eps) {
        statusStr = "<span class='warn'>∼ 轻微离焦</span> Δ=" + nf(delta1, 1, 5);
      } else if (u1 <= 0) {
        statusStr = "<span class='bad'>✗ 物体在镜头后方</span>";
      } else if (1 / f <= 1 / u1) {
        statusStr = "<span class='warn'>物体在焦距内（虚像）</span>";
      } else {
        statusStr = "<span class='bad'>✗ 离焦</span> Δ=" + nf(delta1, 1, 5);
      }
      statusStr += " &nbsp;|&nbsp; 1/f=" + nf(invTarget, 1, 5);
      if (u1 > 0) statusStr += ", 1/u+1/v=" + nf(invActual1, 1, 5);
      select("#focusStatusValue").html(statusStr);

      if (rayBlur.length >= 4) {
        select("#blurSizeValue").html(
          "物体0: " + nf(rayBlur[0], 1, 1) + " px" +
          " &nbsp;|&nbsp; 物体2: " + nf(rayBlur[2], 1, 1) + " px"
        );
      }
    }

    // ===== Quiz Challenge System =====
    var QUIZ_STORAGE_KEY = "quiz_camera_progress";
    var EXPERIMENT_KEY = "camera";

    var quizRound = 0;
    var quizIndex = 0;
    var quizAnswers = [];
    var quizLocked = false;
    var quizScores = [0, 0, 0];
    var quizHighestRound = 0;

    var btnChallenge, btnCloseQuiz, btnResetQuiz, quizOverlay, quizTitle, quizProgressFill, quizBody, quizResult;

    var quizQuestions = [
      // 第1关：相机基础概念
      { q: "相机镜头通常由什么类型的光学透镜构成？", opts: ["凹透镜", "凸透镜", "平面镜", "三棱镜"], ans: 1,
        explain: "相机镜头使用凸透镜（会聚透镜）。凸透镜能将光线会聚，在CCD传感器上形成倒立实像。凹透镜发散光线，不能直接用于成像。" },
      { q: "相机拍摄时，景物通过镜头在CCD传感器上形成什么像？", opts: ["正立虚像", "正立实像", "倒立实像", "倒立虚像"], ans: 2,
        explain: "相机成倒立实像。物体在凸透镜2倍焦距以外时，在透镜另一侧1-2倍焦距之间形成倒立缩小的实像。" },
      { q: "相机的「光圈」主要控制什么？", opts: ["焦距大小", "进光量", "快门速度", "白平衡"], ans: 1,
        explain: "光圈通过叶片开合控制进光量。光圈越大（F值越小），进光越多；光圈越小，进光越少。景深也随之改变。" },
      { q: "手动对焦时，转动镜头环主要是调节什么？", opts: ["物距", "像距", "焦距", "光圈"], ans: 1,
        explain: "手动对焦通过转动镜头组前后移动，改变像距（镜头到CCD的距离），使像恰好落在CCD传感器上。" },
      { q: "以下哪个不是凸透镜对光线的作用？", opts: ["会聚光线", "使平行光聚焦", "发散光线", "可以成像"], ans: 2,
        explain: "凸透镜对光线有会聚作用，凹透镜对光线有发散作用。凸透镜使平行光线汇聚到焦点，发散光线是凹透镜的特性。" },

      // 第2关：透镜公式与应用
      { q: "凸透镜成像的高斯公式是？", opts: ["f = u + v", "1/f = 1/u + 1/v", "f = uv/(u+v)", "u = vf/(f-v)"], ans: 1,
        explain: "透镜成像公式为 1/f = 1/u + 1/v，其中 f 是焦距，u 是物距，v 是像距。这是计算成像位置的基本公式。" },
      { q: "用相机拍远处物体时，物体在凸透镜2倍焦距以外，成什么像？", opts: ["正立放大虚像", "倒立缩小实像", "正立等大虚像", "倒立放大实像"], ans: 1,
        explain: "物距u > 2f时，成倒立缩小的实像（f < v < 2f）。这正是相机拍摄远处景物的原理。" },
      { q: "当物体靠近相机时（对焦距离变短），要使像依然清晰应该如何调节？", opts: ["缩小光圈", "增大像距", "减小像距", "增大焦距"], ans: 1,
        explain: "根据透镜公式 1/u + 1/v = 1/f，当物距 u 减小时，像距 v 必须增大才能保持等式成立，所以镜头需要前伸（增大像距）。" },
      { q: "以下哪个因素会影响照片的景深？", opts: ["像素数量", "光圈大小", "存储卡容量", "白平衡"], ans: 1,
        explain: "景深与光圈大小直接相关：光圈越小（F值越大），景深越大，前后清晰范围越广；光圈越大（F值越小），景深越浅。" },
      { q: "光圈缩小时弥散斑（模糊圈）变小的主要原因是？", opts: ["焦距变短", "边缘斜光线被遮挡减少", "像距自动调整", "传感器灵敏度提高"], ans: 1,
        explain: "小光圈时，透镜边缘的斜光线被光圈叶片遮挡，只有中心较直的光线通过，因此弥散斑直径减小，景深增大。" },

      // 第3关：综合与应用
      { q: "透镜公式 1/f = 1/u + 1/v 中，f 为负值表示？", opts: ["透镜是凸透镜", "透镜是凹透镜", "像在透镜同侧", "物距为负"], ans: 1,
        explain: "在薄透镜公式的符号约定中，凸透镜焦距 f 为正，凹透镜焦距 f 为负。f 为负值表示该透镜是凹透镜。" },
      { q: "实像和虚像的根本区别在于？", opts: ["大小不同", "颜色不同", "能否在光屏上呈现", "正倒不同"], ans: 2,
        explain: "实像是实际光线会聚形成的，能在光屏（如胶片、CCD）上呈现；虚像是光线反向延长线会聚形成的，不能在光屏上呈现。" },
      { q: "为什么大光圈拍摄时容易「跑焦」（对焦不准更明显）？", opts: ["进光太多", "景深太浅", "焦距变短", "快门需要更快"], ans: 1,
        explain: "大光圈景深很浅，焦点前后清晰范围很小。即使微小对焦误差也会导致主体模糊。" },
      { q: "物距小于焦距时（u < f），凸透镜成什么像？", opts: ["倒立缩小实像", "倒立放大实像", "正立放大虚像", "正立缩小虚像"], ans: 2,
        explain: "当物距 u < f 时，成的是正立放大的虚像（放大镜原理）。此时不能在光屏上承接，相机无法正常拍摄。" },
      { q: "在相机自动对焦系统中，判断是否合焦通常依据什么？", opts: ["照片的颜色分布", "被摄物体的亮度", "图像的对比度", "镜头的温度"], ans: 2,
        explain: "自动对焦系统通过分析图像的反差（对比度）来判断是否合焦。对焦准确时，图像边缘对比度最高，轮廓最清晰。" }
    ];

    function initQuiz() {
      btnChallenge = select("#btnChallenge");
      btnCloseQuiz = select("#btnCloseQuiz");
      btnResetQuiz = select("#btnResetQuiz");
      quizOverlay = select("#quizOverlay");
      quizTitle = select("#quizTitle");
      quizProgressFill = select("#quizProgressFill");
      quizBody = select("#quizBody");
      quizResult = select("#quizResult");

      btnChallenge.mouseClicked(startQuiz);
      btnCloseQuiz.mouseClicked(closeQuiz);
      btnResetQuiz.mouseClicked(resetQuiz);

      buttonPause = select("#pauseCheck");
      updateChallengeButton();
    }

    var _origSetupCA = setup;
    setup = function() {
      _origSetupCA();
      initQuiz();
    };

    function startQuiz() {
      loadProgress().then(function(saved) {
        if (saved && saved.highestRound >= 0 && (saved.scores[0] > 0 || saved.round > 0)) {
          quizRound = Math.min(saved.round + 1, 2);
          quizScores = saved.scores.slice();
          quizHighestRound = saved.highestRound;
        } else {
          quizRound = 0; quizScores = [0,0,0]; quizHighestRound = 0;
        }
        quizOverlay.style("display", "block");
        paused = true;
        if (buttonPause) buttonPause.checked(false);
        renderRound();
      });
    }

    function closeQuiz() {
      quizOverlay.style("display", "none");
      paused = false;
      if (buttonPause) buttonPause.checked(true);
      updateChallengeButton();
    }

    function resetQuiz() {
      if (confirm("确定要重置所有挑战进度吗？当前进度将丢失。")) {
        quizRound = 0; quizScores = [0,0,0]; quizHighestRound = 0;
        clearProgress();
        renderRound();
      }
    }

    function renderRound() {
      quizIndex = 0; quizAnswers = []; quizLocked = false;
      quizResult.style("display", "none");
      quizBody.style("display", "block");
      quizTitle.html("第 " + (quizRound + 1) + " 关 (题目 " + (quizRound * 5 + 1) + "-" + (quizRound * 5 + 5) + "/15)");
      quizProgressFill.style("width", (quizRound * (100/3)) + "%");
      renderQuestion();
    }

    function renderQuestion() {
      var q = quizQuestions[quizRound * 5 + quizIndex];
      var html = '<div class="quiz-question">' + (quizIndex + 1) + ". " + q.q + "</div>";
      var labels = ["A", "B", "C", "D"];
      for (var i = 0; i < q.opts.length; i++) {
        html += '<button class="quiz-option" data-idx="' + i + '" ';
        if (quizLocked) html += 'disabled ';
        html += '>' + labels[i] + ". " + q.opts[i] + "</button>";
      }
      quizBody.html(html);

      var opts = document.querySelectorAll("#quizBody .quiz-option");
      for (var j = 0; j < opts.length; j++) {
        (function(idx) {
          opts[j].addEventListener("click", function() { selectAnswer(idx); });
        })(j);
      }
    }

    function selectAnswer(idx) {
      if (quizLocked) return;
      quizLocked = true;
      quizAnswers.push(idx);
      var q = quizQuestions[quizRound * 5 + quizIndex];
      var correct = q.ans;

      var opts = document.querySelectorAll("#quizBody .quiz-option");
      for (var i = 0; i < opts.length; i++) {
        opts[i].disabled = true;
        if (i === correct) opts[i].classList.add("correct");
        if (i === idx && idx !== correct) opts[i].classList.add("wrong");
      }

      setTimeout(function() {
        quizIndex++;
        if (quizIndex < 5) { quizLocked = false; renderQuestion(); }
        else showRoundResult();
      }, 1200);
    }

    function getStars(score, total) {
      if (score === total) return "⭐⭐⭐";
      if (score >= total - 1) return "⭐⭐";
      if (score >= Math.ceil(total / 2)) return "⭐";
      return "";
    }

    function showRoundResult() {
      var correctCount = 0;
      for (var i = 0; i < 5; i++) {
        if (quizAnswers[i] === quizQuestions[quizRound * 5 + i].ans) correctCount++;
      }
      quizScores[quizRound] = correctCount;
      if (quizRound > quizHighestRound) quizHighestRound = quizRound;
      saveProgress();

      quizBody.style("display", "none");
      quizResult.style("display", "block");

      var stars = getStars(correctCount, 5);
      var scoreClass = correctCount >= 4 ? "great" : (correctCount >= 2 ? "good" : "poor");
      var comment = correctCount >= 4 ? "太棒了！" : (correctCount >= 2 ? "继续加油！" : "再看看实验吧！");

      var html = '<div class="quiz-score ' + scoreClass + '">' + correctCount + "/5</div>";
      if (stars) html += '<p style="font-size:20px;margin:4px 0;">' + stars + "</p>";
      html += '<p style="font-size:16px;margin:8px 0;color:#94a3b8;">' + comment + "</p>";

      if (quizRound < 2) {
        html += '<p style="font-size:13px;color:#64748b;margin-bottom:8px;">已完成第' + (quizRound + 1) + "关，进度已保存</p>";
        html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnReviewRound" style="font-size:14px;">📋 查看回顾</button></div>';
        html += '<div class="quiz-btn-row">';
        html += '<button class="btn-primary" id="btnNextRound" style="font-size:14px;padding:8px 24px;">进入下一关</button>';
        html += '<button class="btn-reset" id="btnRetryRound" style="font-size:14px;">重新挑战本关</button>';
        html += "</div>";
      } else {
        var total = quizScores[0] + quizScores[1] + quizScores[2];
        var totalClass = total >= 12 ? "great" : (total >= 8 ? "good" : "poor");
        var totalStars = getStars(total, 15);
        html = '<div class="quiz-score ' + totalClass + '">' + total + "/15</div>";
        if (totalStars) html += '<p style="font-size:20px;margin:4px 0;">' + totalStars + "</p>";
        html += '<p style="font-size:14px;color:#94a3b8;margin-bottom:8px;">第1关: ' + quizScores[0] + '/5 &nbsp; 第2关: ' + quizScores[1] + '/5 &nbsp; 第3关: ' + quizScores[2] + "/5</p>";
        html += '<p style="font-size:16px;margin:8px 0;color:' + (total >= 12 ? "#22c55e" : total >= 8 ? "#f59e0b" : "#ef4444") + ';">' + (total >= 12 ? "恭喜通关！你对相机光学原理理解透彻！" : total >= 8 ? "还不错，再复习一下错题吧！" : "建议回到实验仔细观察凸透镜成像变化规律。") + "</p>";
        html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnReviewRound" style="font-size:14px;">📋 查看回顾</button></div>';
        html += '<div class="quiz-btn-row">';
        html += '<button class="btn-primary" id="btnRetryAll" style="font-size:14px;padding:8px 24px;">重新全部挑战</button>';
        html += '<button class="btn-reset" id="btnBackExp" style="font-size:14px;">返回实验</button>';
        html += "</div>";
        saveQuizToServer();
      }

      quizResult.html(html);
      bindResultButtons();
    }

    function bindResultButtons() {
      setTimeout(function() {
        var btnNext = document.getElementById("btnNextRound");
        var btnRetry = document.getElementById("btnRetryRound");
        var btnRetryAll = document.getElementById("btnRetryAll");
        var btnBack = document.getElementById("btnBackExp");
        var btnReview = document.getElementById("btnReviewRound");
        if (btnNext) btnNext.addEventListener("click", function() { quizRound++; renderRound(); });
        if (btnRetry) btnRetry.addEventListener("click", function() { renderRound(); });
        if (btnRetryAll) btnRetryAll.addEventListener("click", function() {
          quizRound = 0; quizScores = [0,0,0]; quizHighestRound = 0;
          clearProgress(); renderRound();
        });
        if (btnBack) btnBack.addEventListener("click", function() { closeQuiz(); });
        if (btnReview) btnReview.addEventListener("click", function() { showReview(); });
      }, 100);
    }

    function showReview() {
      var html = '<p style="font-size:16px;font-weight:bold;margin-bottom:16px;color:#e2e8f0;">第' + (quizRound + 1) + '关 — 答题回顾</p>';
      var wrongCount = 0;
      var labels = ["A", "B", "C", "D"];
      for (var i = 0; i < 5; i++) {
        var q = quizQuestions[quizRound * 5 + i];
        var userAns = quizAnswers[i];
        var isCorrect = userAns === q.ans;
        if (!isCorrect) wrongCount++;
        var cardClass = isCorrect ? "correct2" : "wrong";
        var badgeHtml = isCorrect ? '<span class="rbadge ok">✓ 正确</span>' : '<span class="rbadge fail">✗ 错误</span>';
        html += '<div class="review-card ' + cardClass + '">';
        html += '<div class="rq">' + badgeHtml + (i + 1) + ". " + q.q + "</div>";
        if (!isCorrect) {
          html += '<div class="review-user-ans">你的答案：' + labels[userAns] + ". " + q.opts[userAns] + "</div>";
          html += '<div class="review-correct-ans">正确答案：' + labels[q.ans] + ". " + q.opts[q.ans] + "</div>";
          html += '<div class="review-explain"><div class="rtitle">💡 解析</div><div class="rtext">' + q.explain + "</div></div>";
        } else {
          html += '<div style="font-size:13px;color:#22c55e;margin-top:2px;">你的答案：' + labels[userAns] + ". " + q.opts[userAns] + " ✓</div>";
        }
        html += "</div>";
      }
      if (wrongCount === 0) {
        html += '<p style="text-align:center;color:#22c55e;font-size:15px;margin-top:12px;">🎉 全部正确！你对这部分知识点掌握得很好！</p>';
      } else {
        html += '<p style="text-align:center;color:#f59e0b;font-size:14px;margin-top:12px;">共错 ' + wrongCount + ' 题，仔细阅读解析，理解后再继续！</p>';
      }
      html += '<div class="quiz-btn-row"><button class="btn-reset" id="btnBackResult" style="font-size:14px;">← 返回结果</button></div>';
      document.getElementById("quizBody").style.display = "none";
      document.getElementById("quizResult").style.display = "block";
      document.getElementById("quizResult").innerHTML = html;
      setTimeout(function() {
        var btnBack = document.getElementById("btnBackResult");
        if (btnBack) btnBack.addEventListener("click", function() { showRoundResultSkipSave(); });
      }, 100);
    }

    function showRoundResultSkipSave() {
      var correctCount = quizScores[quizRound];
      document.getElementById("quizBody").style.display = "none";
      document.getElementById("quizResult").style.display = "block";
      var stars = getStars(correctCount, 5);
      var scoreClass = correctCount >= 4 ? "great" : (correctCount >= 2 ? "good" : "poor");
      var comment = correctCount >= 4 ? "太棒了！" : (correctCount >= 2 ? "继续加油！" : "再看看实验吧！");
      var html = '<div class="quiz-score ' + scoreClass + '">' + correctCount + "/5</div>";
      if (stars) html += '<p style="font-size:20px;margin:4px 0;">' + stars + "</p>";
      html += '<p style="font-size:16px;margin:8px 0;color:#94a3b8;">' + comment + "</p>";
      if (quizRound < 2) {
        html += '<p style="font-size:13px;color:#64748b;margin-bottom:8px;">已完成第' + (quizRound + 1) + '关，进度已保存</p>';
        html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnReviewRound" style="font-size:14px;">📋 查看回顾</button></div>';
        html += '<div class="quiz-btn-row">';
        html += '<button class="btn-primary" id="btnNextRound" style="font-size:14px;padding:8px 24px;">进入下一关</button>';
        html += '<button class="btn-reset" id="btnRetryRound" style="font-size:14px;">重新挑战本关</button>';
        html += "</div>";
      } else {
        var total = quizScores[0] + quizScores[1] + quizScores[2];
        var totalClass = total >= 12 ? "great" : (total >= 8 ? "good" : "poor");
        var totalStars = getStars(total, 15);
        html = '<div class="quiz-score ' + totalClass + '">' + total + "/15</div>";
        if (totalStars) html += '<p style="font-size:20px;margin:4px 0;">' + totalStars + "</p>";
        html += '<p style="font-size:14px;color:#94a3b8;margin-bottom:8px;">第1关: ' + quizScores[0] + '/5 第2关: ' + quizScores[1] + '/5 第3关: ' + quizScores[2] + "/5</p>";
        html += '<p style="font-size:16px;margin:8px 0;color:' + (total >= 12 ? "#22c55e" : total >= 8 ? "#f59e0b" : "#ef4444") + ';">' + (total >= 12 ? "恭喜通关！你对相机光学原理理解透彻！" : total >= 8 ? "还不错，再复习一下错题吧！" : "建议回到实验仔细观察凸透镜成像变化规律。") + "</p>";
        html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnReviewRound" style="font-size:14px;">📋 查看回顾</button></div>';
        html += '<div class="quiz-btn-row">';
        html += '<button class="btn-primary" id="btnRetryAll" style="font-size:14px;padding:8px 24px;">重新全部挑战</button>';
        html += '<button class="btn-reset" id="btnBackExp" style="font-size:14px;">返回实验</button>';
        html += "</div>";
      }
      document.getElementById("quizResult").innerHTML = html;
      bindResultButtons();
    }

    function updateChallengeButton() {
      loadProgress().then(function(saved) {
        if (saved && (saved.scores[0] > 0 || saved.round > 0)) {
          var totalDone = saved.scores[0] + (saved.scores[1] || 0) + (saved.scores[2] || 0);
          btnChallenge.html("继续挑战 (已得" + totalDone + "/15分)");
        } else {
          btnChallenge.html("过关挑战");
        }
      });
    }

    function saveProgress() {
      var data = { round: quizRound, scores: quizScores, highestRound: quizHighestRound, updatedAt: new Date().toISOString() };
      try { localStorage.setItem(QUIZ_STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
    }

    function saveQuizToServer() {
      if (typeof supabase === "undefined" || !supabase) return;
      try {
        var userData = localStorage.getItem("user");
        if (!userData) return;
        var u = JSON.parse(userData);
        var total = quizScores[0] + quizScores[1] + quizScores[2];
        var stars = total >= 12 ? 3 : (total >= 8 ? 2 : (total >= 5 ? 1 : 0));
        supabase.from("users").select("quiz_data").eq("id", u.id).single().then(function(res) {
          var quizData = (res.data && res.data.quiz_data) ? res.data.quiz_data : {};
          if (typeof quizData === "string") quizData = JSON.parse(quizData);
          quizData[EXPERIMENT_KEY] = { correct: total, total: 15, stars: stars, updated_at: new Date().toISOString() };
          supabase.from("users").update({ quiz_data: quizData }).eq("id", u.id).then(function(){});
        });
      } catch(e) {}
    }

    function loadProgress() {
      return new Promise(function(resolve) {
        try { var raw = localStorage.getItem(QUIZ_STORAGE_KEY); if (raw) resolve(JSON.parse(raw)); else resolve(null); } catch(e) { resolve(null); }
      });
    }

    function clearProgress() {
      try { localStorage.removeItem(QUIZ_STORAGE_KEY); } catch(e) {}
    }
  </script>

<div id="quizOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;overflow-y:auto;">
  <div style="max-width:700px;margin:40px auto;background:#1a1a2e;border:1px solid #333;border-radius:16px;padding:24px 32px;color:#e2e8f0;">
    <div id="quizHeader" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <span style="font-size:18px;font-weight:bold;" id="quizTitle">第 1 关 (1/3)</span>
      <div style="display:flex;gap:8px;">
        <button class="btn" id="btnResetQuiz" style="font-size:12px;border-color:#555;color:#999;">↺ 重置</button>
        <button class="btn" id="btnCloseQuiz" style="font-size:12px;">✕ 退出</button>
      </div>
    </div>
    <div id="quizProgress" style="height:4px;background:#333;border-radius:2px;margin-bottom:20px;">
      <div id="quizProgressFill" style="height:100%;background:#8b5cf6;border-radius:2px;width:0%;transition:width 0.3s;"></div>
    </div>
    <div id="quizBody"></div>
    <div id="quizResult" style="display:none;text-align:center;padding:30px 0;"></div>
  </div>
</div>

</body>
</html>
