<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>声音的三要素 - 交互式实验</title>
    <style>
        /* --- 全局与布局样式 --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.1em;
            color: rgba(255, 255, 255, 0.8);
        }

        /* --- 视觉区域 --- */
        #visual-area {
            width: 100%;
            height: 300px;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        canvas {
            display: block;
        }

        /* --- 控制面板 --- */
        #control-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .control-group {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
        }

        .control-group label {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .control-value {
            font-size: 1.2em;
            color: #ffd700;
            font-weight: bold;
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ffd700;
            cursor: pointer;
            transition: background 0.3s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            background: #fff;
        }

        select {
            padding: 10px;
            border-radius: 5px;
            border: none;
            background-color: rgba(255, 255, 255, 0.8);
            color: #333;
            font-size: 1em;
            cursor: pointer;
        }

        /* --- 播放按钮 --- */
        #play-button {
            display: block;
            margin: 0 auto;
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: bold;
            color: #764ba2;
            background-color: #ffd700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px 0 rgba(255, 215, 0, 0.4);
        }

        #play-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(255, 215, 0, 0.6);
        }

        #play-button:active {
            transform: translateY(0);
        }
    </style>
    <script src="protect.js"></script>
</head>
<body>

    <div class="container">
        <h1>声音的三要素</h1>
        <p class="subtitle">探索音调、响度与音色的奥秘</p>

        <div id="visual-area">
            <canvas id="waveCanvas"></canvas>
        </div>

        <div id="control-panel">
            <div class="control-group">
                <label for="frequency-slider">音调 (频率)</label>
                <input type="range" id="frequency-slider" min="100" max="1500" value="440">
                <span class="control-value" id="frequency-value">440 Hz</span>
            </div>
            <div class="control-group">
                <label for="volume-slider">响度 (音量)</label>
                <input type="range" id="volume-slider" min="0" max="100" value="50">
                <span class="control-value" id="volume-value">50 %</span>
            </div>
            <div class="control-group">
                <label for="waveform-selector">音色 (波形)</label>
                <select id="waveform-selector">
                    <option value="sine">正弦波 (柔和)</option>
                    <option value="square">方波 (明亮)</option>
                    <option value="sawtooth">锯齿波 (尖锐)</option>
                    <option value="triangle">三角波 (温暖)</option>
                </select>
            </div>
        </div>

        <button id="play-button">播放</button>
    </div>

    <script>
        // --- DOM 元素获取 ---
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        const playButton = document.getElementById('play-button');
        const frequencySlider = document.getElementById('frequency-slider');
        const frequencyValue = document.getElementById('frequency-value');
        const volumeSlider = document.getElementById('volume-slider');
        const volumeValue = document.getElementById('volume-value');
        const waveformSelector = document.getElementById('waveform-selector');

        // --- Canvas 设置 ---
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // --- 音频上下文与节点 ---
        let audioContext;
        let oscillator;
        let gainNode;
        let isPlaying = false;

        // --- 动画相关变量 ---
        let animationId;
        let phase = 0;

        // --- 初始化音频 ---
        function initAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioContext.createOscillator();
            gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.type = waveformSelector.value;
            oscillator.frequency.value = frequencySlider.value;
            gainNode.gain.value = volumeSlider.value / 100;
            
            oscillator.start();
        }

        // --- 停止音频 ---
        function stopAudio() {
            if (oscillator) {
                oscillator.stop();
                oscillator.disconnect();
                oscillator = null;
            }
            if (gainNode) {
                gainNode.disconnect();
                gainNode = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
        }

        // --- 播放/暂停逻辑 ---
        playButton.addEventListener('click', () => {
            if (!isPlaying) {
                initAudio();
                playButton.textContent = '暂停';
                isPlaying = true;
                draw();
            } else {
                stopAudio();
                cancelAnimationFrame(animationId);
                playButton.textContent = '播放';
                isPlaying = false;
                // 清空画布
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        });

        // --- 控件事件监听 ---
        frequencySlider.addEventListener('input', (e) => {
            const value = e.target.value;
            frequencyValue.textContent = `${value} Hz`;
            if (oscillator) {
                oscillator.frequency.setValueAtTime(value, audioContext.currentTime);
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            const value = e.target.value;
            volumeValue.textContent = `${value} %`;
            if (gainNode) {
                gainNode.gain.setValueAtTime(value / 100, audioContext.currentTime);
            }
        });

        waveformSelector.addEventListener('change', (e) => {
            const value = e.target.value;
            if (oscillator) {
                oscillator.type = value;
            }
        });

        // --- 绘制函数 ---
        function draw() {
            if (!isPlaying) return;

            animationId = requestAnimationFrame(draw);

            const width = canvas.width;
            const height = canvas.height;
            const frequency = parseFloat(frequencySlider.value);
            const volume = parseFloat(volumeSlider.value) / 100;
            const waveformType = waveformSelector.value;

            // 清空画布
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 绘制波形
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 3;
            ctx.beginPath();

            const amplitude = (height / 2 - 20) * volume; // 振幅与响度关联
            const wavelength = (width * 100) / frequency; // 波长与频率成反比

            for (let x = 0; x < width; x++) {
                let y;
                const t = (x / wavelength) + phase;

                switch (waveformType) {
                    case 'sine':
                        y = height / 2 + amplitude * Math.sin(2 * Math.PI * t);
                        break;
                    case 'square':
                        y = height / 2 + (Math.sin(2 * Math.PI * t) > 0 ? amplitude : -amplitude);
                        break;
                    case 'sawtooth':
                        y = height / 2 + amplitude * (2 * (t - Math.floor(t + 0.5)));
                        break;
                    case 'triangle':
                        y = height / 2 + amplitude * (2 * Math.asin(Math.sin(2 * Math.PI * t)) / Math.PI);
                        break;
                }
                
                if (x === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }

            ctx.stroke();

            // 更新相位以产生动画效果
            phase += frequency / 5000; // 动画速度与频率关联
        }
    </script>
</body>
</html>
