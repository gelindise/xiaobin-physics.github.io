    &lt;script type=&quot;module&quot;&gt;
        // 状态管理
        const state = {
            mode: 'wing', // 'wing' or 'ball'
            windSpeed: 0, // 0-100
            isPlaying: false,
            particles: [],
            wingY: 0, // 机翼垂直位置
            ballY: 0, // 乒乓球垂直位置
            ballX: 0, // 乒乓球水平震动
        };

        // 资源配置
        const assets = {
            wingImg: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/on79Hvhmqobx5JBvCGTsCM.jpg',
            funnelImg: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/EoK5GLoheagZtZcfX72sE8.jpg',
            audio1: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/FztyFmMDk7j7djBNrDWCpg.mp3',
            audio2: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/Gh7FeXcMMFxSatEChzAdVY.mp3'
        };

        // p5.js 实例
        new p5((p) =&gt; {
            let wingImage;
            let funnelImage;
            
            p.preload = () =&gt; {
                wingImage = p.loadImage(assets.wingImg);
                funnelImage = p.loadImage(assets.funnelImg);
            };

            p.setup = () =&gt; {
                const container = document.getElementById('canvas-container');
                const canvas = p.createCanvas(container.offsetWidth, container.offsetHeight);
                canvas.parent('canvas-container');
                p.frameRate(60);
                
                // 初始化粒子
                initParticles();
            };

            p.windowResized = () =&gt; {
                const container = document.getElementById('canvas-container');
                p.resizeCanvas(container.offsetWidth, container.offsetHeight);
                initParticles();
            };

            p.draw = () =&gt; {
                p.background(255);
                
                // 更新物理状态
                updatePhysics();

                if (state.mode === 'wing') {
                    drawWingExperiment(p, wingImage);
                } else {
                    drawBallExperiment(p, funnelImage);
                }

                // 更新UI数据
                updateUI();
            };

            function initParticles() {
                state.particles = [];
                const count = 100;
                for(let i=0; i&lt;count; i++) {
                    state.particles.push({
                        x: p.random(p.width),
                        y: p.random(p.height),
                        speed: p.random(2, 5),
                        offset: p.random(100)
                    });
                }
            }

            function updatePhysics() {
                // 目标值平滑过渡
                const targetWingY = state.windSpeed * 1.5; // 最大上升150px
                state.wingY = p.lerp(state.wingY, targetWingY, 0.05);

                // 乒乓球物理
                // 风速越大，压强差越大，向上的力越大
                // 假设重力向下，压强差向上
                // 漏斗口朝下：重力向下，压强差向上（吸住）
                // 这里模拟漏斗倒置吹球（球在漏斗下方，不掉下来）
                if (state.mode === 'ball') {
                    // 临界风速：约30
                    let lift = 0;
                    if (state.windSpeed &gt; 20) {
                        lift = (state.windSpeed - 20) * 2;
                    }
                    // 目标位置：0是贴紧漏斗口，正值是掉下来
                    // 重力效果：默认掉在下面 (比如 y=100)
                    // 升力效果：减小y
                    let targetBallY = 100 - lift;
                    if (targetBallY &lt; 0) targetBallY = 0; // 贴住
                    
                    // 随机震动
                    let shake = state.windSpeed &gt; 0 ? p.random(-2, 2) : 0;
                    
                    state.ballY = p.lerp(state.ballY, targetBallY, 0.1);
                    state.ballX = shake;
                }
            }

            function drawWingExperiment(p, img) {
                // 绘制流线
                p.noFill();
                p.stroke(59, 130, 246, 100);
                p.strokeWeight(2);

                const speedFactor = 1 + state.windSpeed / 20;
                const wingCenterY = p.height/2 + 50 - state.wingY;

                // 绘制粒子流线
                state.particles.forEach(pt =&gt; {
                    // 移动粒子
                    pt.x += pt.speed * speedFactor;
                    if (pt.x &gt; p.width) pt.x = 0;

                    // 计算流线路径（绕过机翼）
                    let flowY = pt.y;
                    let distToWing = p.dist(pt.x, pt.y, p.width/2, wingCenterY);
                    
                    // 简单的流体绕流模拟
                    if (Math.abs(pt.x - p.width/2) &lt; 200) {
                        if (pt.y &lt; wingCenterY &amp;&amp; pt.y &gt; wingCenterY - 100) {
                            // 上方流线向上弯曲（流速快，路程长）
                            flowY -= 40 * Math.sin(Math.PI * (pt.x - (p.width/2 - 100)) / 200);
                        } else if (pt.y &gt; wingCenterY &amp;&amp; pt.y &lt; wingCenterY + 50) {
                            // 下方流线较平
                            flowY += 10 * Math.sin(Math.PI * (pt.x - (p.width/2 - 100)) / 200);
                        }
                    }

                    // 绘制粒子尾迹
                    p.stroke(59, 130, 246, p.map(state.windSpeed, 0, 100, 50, 200));
                    p.line(pt.x - 10 * speedFactor, flowY, pt.x, flowY);
                });

                // 绘制机翼
                p.push();
                p.translate(p.width/2, wingCenterY);
                // 简单的机翼形状绘制（如果图片加载失败或为了更清晰的矢量效果）
                p.fill(200);
                p.stroke(100);
                p.strokeWeight(2);
                // 绘制机翼剖面
                p.beginShape();
                p.vertex(-100, 10);
                p.bezierVertex(-50, -40, 50, -40, 100, 10);
                p.bezierVertex(50, 15, -50, 15, -100, 10);
                p.endShape(p.CLOSE);
                
                // 升力箭头
                if (state.windSpeed &gt; 10) {
                    let arrowLen = state.windSpeed * 1.5;
                    p.stroke(16, 185, 129);
                    p.strokeWeight(4);
                    p.line(0, 0, 0, -arrowLen);
                    p.noStroke();
                    p.fill(16, 185, 129);
                    p.triangle(0, -arrowLen - 10, -10, -arrowLen, 10, -arrowLen);
                    p.textSize(16);
                    p.textAlign(p.CENTER);
                    p.text(&quot;F升&quot;, 20, -arrowLen/2);
                }
                p.pop();

                // 标注
                p.fill(0);
                p.noStroke();
                p.textAlign(p.CENTER);
                p.text(&quot;机翼剖面&quot;, p.width/2, wingCenterY + 60);
            }

            function drawBallExperiment(p, img) {
                const centerX = p.width/2;
                const centerY = p.height/3;

                // 绘制漏斗（倒置）
                p.push();
                p.translate(centerX, centerY);
                
                // 气流粒子
                if (state.windSpeed &gt; 0) {
                    p.stroke(59, 130, 246, 150);
                    p.strokeWeight(2);
                    for(let i=0; i&lt;10; i++) {
                        let x = p.random(-10, 10);
                        let y = p.random(0, 150);
                        let len = p.random(10, 30);
                        p.line(x, y, x, y + len);
                    }
                }

                // 漏斗主体
                p.fill(220, 230, 240, 200);
                p.stroke(150);
                p.strokeWeight(2);
                p.beginShape();
                p.vertex(-20, -100); // 颈部上左
                p.vertex(20, -100);  // 颈部上右
                p.vertex(20, 0);     // 颈部下右
                p.vertex(80, 80);    // 口右
                p.vertex(-80, 80);   // 口左
                p.vertex(-20, 0);    // 颈部下左
                p.endShape(p.CLOSE);

                // 乒乓球
                let ballY = 80 + state.ballY; // 80是漏斗口位置
                p.fill(255, 165, 0);
                p.noStroke();
                // 阴影
                p.fill(200, 100, 0);
                p.circle(state.ballX, ballY, 40);
                // 高光
                p.fill(255, 200, 100);
                p.circle(state.ballX - 5, ballY - 5, 15);

                // 力箭头
                if (state.windSpeed &gt; 0) {
                    // 压强差力（向上）
                    let pForce = state.windSpeed * 1.2;
                    p.stroke(16, 185, 129);
                    p.strokeWeight(3);
                    p.line(50, ballY, 50, ballY - pForce);
                    p.noStroke();
                    p.fill(16, 185, 129);
                    p.triangle(50, ballY - pForce - 5, 45, ballY - pForce, 55, ballY - pForce);
                    p.text(&quot;F压&quot;, 65, ballY - pForce/2);
                }
                
                // 重力（向下）
                p.stroke(239, 68, 68);
                p.strokeWeight(3);
                p.line(-50, ballY, -50, ballY + 60);
                p.noStroke();
                p.fill(239, 68, 68);
                p.triangle(-50, ballY + 65, -55, ballY + 60, -45, ballY + 60);
                p.text(&quot;G&quot;, -65, ballY + 30);

                p.pop();
            }
        });

        // UI 交互逻辑
        const slider = document.getElementById('wind-slider');
        const speedVal = document.getElementById('speed-val');
        const btnPlay = document.getElementById('btn-play');
        const btnReset = document.getElementById('btn-reset');
        const uLeft = document.getElementById('u-left');
        const uRight = document.getElementById('u-right');
        const pressureDiff = document.getElementById('pressure-diff');
        const liftForce = document.getElementById('lift-force');
        const audioPlayer = document.getElementById('audio-player');
        const btnAudio = document.getElementById('btn-audio');

        // 切换 Tab
        window.switchTab = (mode) =&gt; {
            state.mode = mode;
            document.querySelectorAll('.tab-btn').forEach(btn =&gt; btn.classList.remove('active', 'bg-blue-600', 'text-white'));
            document.querySelectorAll('.tab-btn').forEach(btn =&gt; btn.classList.add('bg-white', 'text-gray-600'));
            
            const activeBtn = document.getElementById(`btn-${mode}`);
            activeBtn.classList.add('active', 'bg-blue-600', 'text-white');
            activeBtn.classList.remove('bg-white', 'text-gray-600');

            // 更新文案
            if (mode === 'wing') {
                document.getElementById('exp-title').textContent = '机翼升力原理';
                document.getElementById('exp-desc').textContent = '观察空气流过机翼时的速度变化。机翼上表面弯曲，路程长，流速大；下表面平直，流速小。';
                document.getElementById('force-label').textContent = '升力 (F)';
                audioPlayer.src = assets.audio1;
            } else {
                document.getElementById('exp-title').textContent = '漏斗吹球实验';
                document.getElementById('exp-desc').textContent = '从倒置的漏斗口向下吹气，观察乒乓球的状态。流速大压强小，大气压将球托住。';
                document.getElementById('force-label').textContent = '托力 (F)';
                audioPlayer.src = assets.audio2;
            }
            
            // 重置状态
            resetExp();
        };

        function resetExp() {
            state.windSpeed = 0;
            slider.value = 0;
            state.isPlaying = false;
            updateUI();
        }

        slider.addEventListener('input', (e) =&gt; {
            state.windSpeed = parseInt(e.target.value);
            state.isPlaying = state.windSpeed &gt; 0;
            updateUI();
        });

        btnPlay.addEventListener('click', () =&gt; {
            if (state.windSpeed &gt; 0) {
                // 停止
                anime({
                    targets: state,
                    windSpeed: 0,
                    duration: 1000,
                    easing: 'easeOutQuad',
                    update: () =&gt; {
                        slider.value = state.windSpeed;
                        updateUI();
                    }
                });
            } else {
                // 开始
                anime({
                    targets: state,
                    windSpeed: 80,
                    duration: 1500,
                    easing: 'easeOutQuad',
                    update: () =&gt; {
                        slider.value = state.windSpeed;
                        updateUI();
                    }
                });
            }
        });

        btnReset.addEventListener('click', resetExp);

        btnAudio.addEventListener('click', () =&gt; {
            if (audioPlayer.paused) {
                audioPlayer.play();
                btnAudio.classList.add('animate-pulse');
            } else {
                audioPlayer.pause();
                btnAudio.classList.remove('animate-pulse');
            }
        });

        function updateUI() {
            speedVal.textContent = state.windSpeed + ' m/s';
            
            // 更新压强计
            // 压强差与速度平方成正比 (伯努利方程简化)
            const pDiff = Math.floor(Math.pow(state.windSpeed, 1.5) * 0.5);
            pressureDiff.innerHTML = pDiff + ' &lt;span class=&quot;text-xs font-normal&quot;&gt;Pa&lt;/span&gt;';
            
            // 更新U形管液面
            // 左侧连通流速大区域（压强小），液面上升
            // 右侧连通大气（压强大），液面下降
            const maxH = 40; // 最大高度变化百分比
            const hChange = (state.windSpeed / 100) * maxH;
            
            uLeft.style.height = (50 + hChange) + '%';
            uRight.style.height = (50 - hChange) + '%';

            // 更新升力/托力
            const force = (pDiff * 0.05).toFixed(1);
            liftForce.innerHTML = force + ' &lt;span class=&quot;text-xs font-normal&quot;&gt;N&lt;/span&gt;';

            // 按钮状态
            if (state.windSpeed &gt; 0) {
                btnPlay.innerHTML = `
                    &lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; class=&quot;h-5 w-5 mr-1&quot; viewBox=&quot;0 0 20 20&quot; fill=&quot;currentColor&quot;&gt;
                        &lt;path fill-rule=&quot;evenodd&quot; d=&quot;M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z&quot; clip-rule=&quot;evenodd&quot; /&gt;
                    &lt;/svg&gt;
                    停止送风
                `;
                btnPlay.classList.replace('bg-blue-600', 'bg-red-500');
                btnPlay.classList.replace('hover:bg-blue-700', 'hover:bg-red-600');
            } else {
                btnPlay.innerHTML = `
                    &lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; class=&quot;h-5 w-5 mr-1&quot; viewBox=&quot;0 0 20 20&quot; fill=&quot;currentColor&quot;&gt;
                        &lt;path fill-rule=&quot;evenodd&quot; d=&quot;M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-1.818a1 1 0 000-1.764l-3-1.818z&quot; clip-rule=&quot;evenodd&quot; /&gt;
                    &lt;/svg&gt;
                    开始送风
                `;
                btnPlay.classList.replace('bg-red-500', 'bg-blue-600');
                btnPlay.classList.replace('hover:bg-red-600', 'hover:bg-blue-700');
            }
        }

        // 初始运行一次
        updateUI();
    &lt;/script&gt;
&lt;/body&gt;
&lt;/html&gt;" frameborder="0"></iframe>
  </div>
  <script src="supabase.js"></script>
  <script src="script.js"></script>
  <script>
    (function() {
      var header = document.querySelector('.header');
      var cont = document.querySelector('.iframe-container');
      var hideTimer = null;
      var HIDE_DELAY = 800;
      function show() { clearTimeout(hideTimer); header.classList.remove('hidden'); cont.classList.remove('no-header-padding'); }
      function hide() { hideTimer = setTimeout(function() { header.classList.add('hidden'); cont.classList.add('no-header-padding'); }, HIDE_DELAY); }
      document.addEventListener('mousemove', function(e) {
        if (e.clientY <= 60) show();
        else if (e.clientY > header.offsetHeight + 20 && !header.classList.contains('hidden')) hide();
      });
      header.addEventListener('mouseenter', show);
      header.addEventListener('mouseleave', hide);
      hideTimer = setTimeout(function() { header.classList.add('hidden'); cont.classList.add('no-header-padding'); }, 2000);
    })();
  </script>
</body>
