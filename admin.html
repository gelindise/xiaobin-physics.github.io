<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员后台</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
    .auth-card {
      width:100%; max-width:460px;
      background:rgba(15,23,42,0.7); backdrop-filter:blur(20px);
      border:1px solid var(--glass-border); border-radius:24px;
      padding:2.5rem; box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .auth-header { text-align:center; margin-bottom:1.5rem; }
    .auth-header .icon-wrap {
      width:64px; height:64px; margin:0 auto 1rem;
      background:linear-gradient(135deg,#ef4444,var(--accent)); border-radius:18px;
      display:flex; align-items:center; justify-content:center; font-size:1.8rem;
      box-shadow:0 8px 24px rgba(239,68,68,0.3);
    }
    .auth-header h2 { font-size:1.4rem; font-weight:700; }

    .tabs { display:flex; gap:0.5rem; margin-bottom:1.5rem; }
    .tab-btn {
      flex:1; padding:0.6rem; border:1px solid var(--glass-border); border-radius:10px;
      background:transparent; color:var(--text-muted); cursor:pointer;
      font-size:0.85rem; font-weight:500; transition:all 0.3s;
    }
    .tab-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
    .tab-content { display:none; }
    .tab-content.active { display:block; }

    .input-group { position:relative; margin-bottom:1rem; }
    .input-group .input-icon {
      position:absolute; left:14px; top:50%; transform:translateY(-50%);
      font-size:1rem; opacity:0.5; pointer-events:none;
    }
    .input-group input, .input-group select {
      width:100%; padding:0.85rem 1rem 0.85rem 2.6rem;
      background:rgba(0,0,0,0.3); border:1px solid var(--glass-border);
      border-radius:12px; color:var(--text-main); font-size:0.9rem;
      transition:all 0.3s ease; outline:none;
    }
    .input-group input:focus, .input-group select:focus {
      border-color:var(--accent); background:rgba(0,0,0,0.4);
    }
    .input-group select option { background:var(--bg-dark); color:var(--text-main); }
    .auth-btn {
      width:100%; padding:0.75rem; border:none; border-radius:12px;
      font-size:0.9rem; font-weight:600; cursor:pointer;
      background:linear-gradient(135deg,#ef4444,var(--accent)); color:#fff;
      transition:all 0.3s ease; box-shadow:0 4px 15px rgba(239,68,68,0.3); margin-top:0.25rem;
    }
    .auth-btn:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(239,68,68,0.5); }
    .auth-btn.green { background:linear-gradient(135deg,#22c55e,#16a34a); box-shadow:0 4px 15px rgba(34,197,94,0.3); }
    .auth-btn.green:hover { box-shadow:0 8px 25px rgba(34,197,94,0.5); }
    .auth-btn.blue { background:linear-gradient(135deg,var(--primary),var(--secondary)); box-shadow:0 4px 15px rgba(59,130,246,0.3); }
    .auth-btn.blue:hover { box-shadow:0 8px 25px rgba(59,130,246,0.5); }
    .admin-tip { margin-top:0.8rem; text-align:center; font-size:0.85rem; min-height:1.5rem; }
    .admin-tip.success { color:#4ade80; }
    .admin-tip.error { color:#ef4444; }
    .back-link { display:block; text-align:center; margin-top:1.5rem; color:var(--text-muted); text-decoration:none; font-size:0.8rem; }
    .back-link:hover { color:var(--primary); }
    .inline-flex { display:flex; gap:0.5rem; }
    .inline-flex .auth-btn { flex:1; }

    /* 登录遮罩 */
    .admin-overlay {
      position:fixed; inset:0; z-index:9999;
      display:flex; align-items:center; justify-content:center;
      background:var(--bg-dark); backdrop-filter:blur(10px);
    }
    .admin-overlay .auth-card { animation:cardIn 0.4s ease-out; }
    .admin-overlay.hidden { display:none; }
    .admin-lock-icon {
      width:64px; height:64px; margin:0 auto 1rem;
      background:linear-gradient(135deg,#ef4444,#f59e0b); border-radius:50%;
      display:flex; align-items:center; justify-content:center; font-size:1.8rem;
      box-shadow:0 8px 24px rgba(239,68,68,0.3);
    }
    .admin-footer { display:flex; justify-content:space-between; align-items:center; margin-top:0.5rem; font-size:0.75rem; }
    .admin-footer a { color:var(--text-muted); cursor:pointer; text-decoration:none; }
    .admin-footer a:hover { color:var(--primary); }
    .pwd-hint { text-align:center; font-size:0.8rem; margin-top:0.5rem; min-height:1.5rem; }
    .pwd-hint.error { color:#ef4444; }
    .pwd-hint.success { color:#4ade80; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="icon-wrap">🛠️</div>
        <h2>管理员控制台</h2>
      </div>

      <!-- 数据概览 -->
      <div style="display:flex;gap:1.5rem;justify-content:center;margin-bottom:1.2rem;font-size:0.85rem;">
        <span style="color:var(--text-muted);">👥 注册会员: <strong style="color:var(--text-main);font-size:1.1rem;" id="totalUsers">--</strong> 人</span>
        <span style="color:var(--text-muted);">🟢 在线: <strong style="color:#4ade80;font-size:1.1rem;" id="onlineUsers">--</strong> 人</span>
      </div>

      <!-- 模式切换 -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(this,'tabVip')">🎫 VIP 授权</button>
        <button class="tab-btn" onclick="switchTab(this,'tabCode')">🔑 激活码</button>
        <button class="tab-btn" onclick="switchTab(this,'tabBatch')">📦 批量生成</button>
        <button class="tab-btn" onclick="switchTab(this,'tabInfo')">📋 用户查询</button>
      </div>

      <!-- VIP 授权 -->
      <div class="tab-content active" id="tabVip">
        <div class="input-group">
          <span class="input-icon">👤</span>
          <input type="text" id="adminUser" placeholder="目标用户名">
        </div>
        <div class="input-group">
          <span class="input-icon">💎</span>
          <select id="vipType">
            <option value="月度VIP">月度VIP (30天)</option>
            <option value="年度VIP">年度VIP (365天)</option>
            <option value="终身VIP">终身VIP (永久)</option>
          </select>
        </div>
        <button class="auth-btn" onclick="setUserVip()">授权 VIP 权限</button>
        <div class="admin-tip" id="adminTip"></div>
      </div>

      <!-- 激活码管理 -->
      <div class="tab-content" id="tabCode">
        <div class="input-group">
          <span class="input-icon">👤</span>
          <input type="text" id="codeUser" placeholder="目标用户名">
        </div>
        <div class="input-group">
          <span class="input-icon">🔑</span>
          <input type="text" id="authCode" placeholder="设置激活码（如支付单号后4位）" maxlength="10">
        </div>
        <div class="inline-flex">
          <button class="auth-btn blue" onclick="setAuthCode()">写入激活码</button>
          <button class="auth-btn green" onclick="clearAuthCode()">清除激活码</button>
        </div>
        <div class="admin-tip" id="codeTip"></div>
      </div>

      <!-- 批量生成激活码 -->
      <div class="tab-content" id="tabBatch">
        <div class="input-group">
          <span class="input-icon">💎</span>
          <select id="batchVipType">
            <option value="月度VIP">月度VIP (30天)</option>
            <option value="年度VIP">年度VIP (365天)</option>
            <option value="终身VIP">终身VIP (永久)</option>
          </select>
        </div>
        <div class="input-group">
          <span class="input-icon">🔢</span>
          <input type="number" id="batchQty" value="5" min="1" max="50" placeholder="生成数量">
        </div>
        <button class="auth-btn" onclick="generateCodes()">🎲 批量生成激活码</button>
        <div id="batchResult" style="display:none;margin-top:1rem;">
          <textarea id="codeOutput" readonly style="width:100%;padding:0.6rem;border-radius:8px;background:rgba(0,0,0,0.3);border:1px solid var(--glass-border);color:var(--secondary);font-size:0.85rem;font-family:monospace;resize:none;height:80px;"></textarea>
          <button class="auth-btn green" onclick="copyCodes()" style="margin-top:0.3rem;padding:0.4rem;font-size:0.8rem;">📋 复制激活码</button>
        </div>

        <hr style="border-color:var(--glass-border);margin:1.5rem 0;">

        <div style="display:flex;gap:0.5rem;margin-bottom:0.5rem;">
          <select id="codeFilter" style="flex:1;padding:0.6rem;border-radius:10px;background:rgba(0,0,0,0.3);border:1px solid var(--glass-border);color:var(--text-main);">
            <option value="all">全部状态</option>
            <option value="unused">未使用</option>
            <option value="used">已使用</option>
          </select>
          <button class="auth-btn blue" onclick="loadCodes()" style="width:auto;padding:0.6rem 1rem;">刷新</button>
        </div>
        <div id="codeList" style="max-height:250px;overflow-y:auto;font-size:0.8rem;border:1px solid var(--glass-border);border-radius:8px;padding:0.5rem;"></div>
        <div class="admin-tip" id="batchTip"></div>
      </div>

      <!-- 用户查询 -->
      <div class="tab-content" id="tabInfo">
        <div class="input-group">
          <span class="input-icon">🔍</span>
          <input type="text" id="queryUser" placeholder="输入用户名查询信息">
        </div>
        <button class="auth-btn blue" onclick="queryUserInfo()">查询</button>
        <div class="admin-tip" id="queryTip" style="text-align:left;font-size:0.8rem;"></div>
      </div>

      <div class="admin-footer">
        <a onclick="changeAdminPwd()">🔑 修改密码</a>
        <a onclick="adminLogout()">🚪 退出登录</a>
      </div>
      <a href="index.html" class="back-link">← 返回首页</a>
    </div>
  </div>

  <!-- 管理员登录遮罩 -->
  <div class="admin-overlay" id="adminOverlay">
    <div class="auth-card" style="text-align:center;position:relative;">
      <div class="admin-lock-icon">🔒</div>
      <h2 style="font-size:1.3rem;margin-bottom:0.5rem;">管理员验证</h2>
      <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:1.5rem;">请输入后台管理密码</p>
      <input type="password" id="adminPwd" placeholder="输入密码"
        style="width:100%;padding:0.85rem 1rem;background:rgba(0,0,0,0.3);border:1px solid var(--glass-border);border-radius:12px;color:var(--text-main);font-size:0.9rem;outline:none;box-sizing:border-box;"
        onkeydown="if(event.key==='Enter')adminLogin()">
      <button class="auth-btn" onclick="adminLogin()" style="margin-top:0.75rem;">验证身份</button>
      <div class="pwd-hint" id="adminPwdHint"></div>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script src="script.js"></script>
  <script>
    // ========== 管理员密码（默认 admin123，可在后台底部修改） ==========
    const ADMIN_PWD_KEY = 'admin_pwd_hash';
    const AUTH_SESSION_KEY = 'admin_authed';

    function getAdminPwd() {
      return localStorage.getItem(ADMIN_PWD_KEY) || 'admin123';
    }

    function setAdminPwd(newPwd) {
      localStorage.setItem(ADMIN_PWD_KEY, newPwd);
    }

    function checkAdminAuth() {
      return sessionStorage.getItem(AUTH_SESSION_KEY) === 'true';
    }

    function adminLogin() {
      const input = document.getElementById('adminPwd').value;
      const hint = document.getElementById('adminPwdHint');
      if (!input) {
        hint.className = 'pwd-hint error';
        hint.textContent = '⚠️ 请输入密码';
        return;
      }

      // 如果当前是修改密码模式，直接设置为新密码
      if (window._changingPwd) {
        setAdminPwd(input);
        window._changingPwd = false;
        hint.className = 'pwd-hint success';
        hint.textContent = '✅ 密码已修改';
        sessionStorage.setItem(AUTH_SESSION_KEY, 'true');
        setTimeout(() => {
          document.getElementById('adminOverlay').classList.add('hidden');
          hint.textContent = '';
          loadStats();
        }, 800);
        return;
      }

      if (input === getAdminPwd()) {
        sessionStorage.setItem(AUTH_SESSION_KEY, 'true');
        document.getElementById('adminOverlay').classList.add('hidden');
        hint.className = 'pwd-hint';
        hint.textContent = '';
        document.getElementById('adminPwd').value = '';
        loadStats();
      } else {
        hint.className = 'pwd-hint error';
        hint.textContent = '❌ 密码错误';
      }
    }

    function adminLogout() {
      sessionStorage.removeItem(AUTH_SESSION_KEY);
      location.reload();
    }

    function changeAdminPwd() {
      const overlay = document.getElementById('adminOverlay');
      overlay.classList.remove('hidden');
      const input = document.getElementById('adminPwd');
      input.value = '';
      input.placeholder = '输入新密码';
      input.focus();
      sessionStorage.removeItem(AUTH_SESSION_KEY);
      window._changingPwd = true;
      const hint = document.getElementById('adminPwdHint');
      hint.className = 'pwd-hint';
      hint.innerHTML = '💡 输入新密码后点"验证身份"即可修改';
    }

    // 页面加载时检查登录状态

    async function loadStats() {
      const totalEl = document.getElementById('totalUsers');
      const onlineEl = document.getElementById('onlineUsers');
      try {
        // 获取会员总数
        const users = await SB.getUsers();
        totalEl.textContent = users ? users.length : '0';
        // 获取在线人数（最近 10 分钟活跃）
        const tenMinAgo = new Date(Date.now() - 10 * 60 * 1000).toISOString();
        const online = await SB.query('users', {
          select: 'id',
          filter: { col: 'last_seen', val: 'gte.' + tenMinAgo },
        });
        onlineEl.textContent = online ? online.length : '0';
      } catch (e) {
        console.warn('[admin] loadStats error:', e.message);
        totalEl.textContent = '?';
        onlineEl.textContent = '?';
      }
    }
    document.addEventListener('DOMContentLoaded', () => {
      if (!checkAdminAuth()) {
        document.getElementById('adminOverlay').classList.remove('hidden');
        document.getElementById('adminPwd').focus();
      } else {
        document.getElementById('adminOverlay').classList.add('hidden');
        loadStats();
      }
    });

    function switchTab(btn, id) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(id).classList.add('active');
    }

    async function setUserVip() {
      const user = document.getElementById('adminUser').value.trim();
      const type = document.getElementById('vipType').value;
      const tip = document.getElementById('adminTip');
      if (!user) { tip.className = 'admin-tip error'; tip.textContent = '⚠️ 请输入用户名'; return; }
      tip.textContent = '⏳ 处理中...';

      let expireDate = '';
      const now = new Date();
      if (type === '月度VIP') { now.setDate(now.getDate()+30); expireDate = now.toISOString().split('T')[0]; }
      else if (type === '年度VIP') { now.setDate(now.getDate()+365); expireDate = now.toISOString().split('T')[0]; }
      else { expireDate = '永久'; }

      try {
        const r = await SB.getUser(user);
        if (!r || r.length === 0) { tip.className = 'admin-tip error'; tip.textContent = '❌ 用户不存在'; return; }
        await SB.updateUser(user, { vip: type, expire: expireDate });
        const cached = JSON.parse(localStorage.getItem('users')||'{}');
        if (cached[user]) { cached[user].vip = type; cached[user].expire = expireDate; localStorage.setItem('users', JSON.stringify(cached)); }
        tip.className = 'admin-tip success';
        tip.textContent = '✅ ' + user + ' → ' + type + '（' + expireDate + '）';
      } catch(e) {
        tip.className = 'admin-tip error'; tip.textContent = '❌ ' + e.message;
      }
    }

    async function setAuthCode() {
      const user = document.getElementById('codeUser').value.trim();
      const code = document.getElementById('authCode').value.trim();
      const tip = document.getElementById('codeTip');
      if (!user || !code) { tip.className = 'admin-tip error'; tip.textContent = '⚠️ 请填写用户名和激活码'; return; }
      try {
        const r = await SB.getUser(user);
        if (!r || r.length === 0) { tip.className = 'admin-tip error'; tip.textContent = '❌ 用户不存在'; return; }
        await SB.updateUser(user, { authCode: code });
        tip.className = 'admin-tip success';
        tip.textContent = '✅ 已为 ' + user + ' 设置激活码：' + code;
      } catch(e) {
        tip.className = 'admin-tip error'; tip.textContent = '❌ ' + e.message;
      }
    }

    async function clearAuthCode() {
      const user = document.getElementById('codeUser').value.trim();
      const tip = document.getElementById('codeTip');
      if (!user) { tip.className = 'admin-tip error'; tip.textContent = '⚠️ 请输入用户名'; return; }
      try {
        await SB.updateUser(user, { authCode: '' });
        document.getElementById('authCode').value = '';
        tip.className = 'admin-tip success';
        tip.textContent = '✅ 已清除 ' + user + ' 的激活码';
      } catch(e) {
        tip.className = 'admin-tip error'; tip.textContent = '❌ ' + e.message;
      }
    }

    async function queryUserInfo() {
      const user = document.getElementById('queryUser').value.trim();
      const tip = document.getElementById('queryTip');
      if (!user) { tip.className = 'admin-tip error'; tip.textContent = '⚠️ 请输入用户名'; return; }
      try {
        const r = await SB.getUser(user);
        if (!r || r.length === 0) { tip.className = 'admin-tip error'; tip.textContent = '❌ 用户不存在'; return; }
        const d = r[0];
        tip.className = 'admin-tip success';
        tip.innerHTML =
          '👤 用户名：' + d.username + '<br>' +
          '💎 VIP：' + (d.vip||'普通用户') + '<br>' +
          '📅 到期：' + (d.expire||'无') + '<br>' +
          '📧 邮箱：' + (d.email||'无') + '<br>' +
          '🔑 激活码：' + (d.authCode||'无') + '<br>' +
          '📋 注册时间：' + (d.created_at ? new Date(d.created_at).toLocaleString() : '未知');
      } catch(e) {
        tip.className = 'admin-tip error'; tip.textContent = '❌ ' + e.message;
      }
    }

    // ========== 批量激活码管理 ==========
    const CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // 无 O/0/I/1
    function genCode() {
      let c = '';
      for (let i = 0; i < 9; i++) c += CHARS[Math.floor(Math.random() * CHARS.length)];
      return c; // 纯 9 位，数据库只存字母数字
    }
    function formatCode(code) {
      return code.substring(0,3) + '-' + code.substring(3,6) + '-' + code.substring(6,9);
    }

    async function generateCodes() {
      const type = document.getElementById('batchVipType').value;
      const qty = parseInt(document.getElementById('batchQty').value) || 5;
      const tip = document.getElementById('batchTip');
      const result = document.getElementById('batchResult');

      tip.className = 'admin-tip'; tip.textContent = '⏳ 正在生成...';

      try {
        // 获取已存在的所有激活码
        const existing = await SB.getAllActivationCodes();
        const existingSet = new Set((existing || []).map(r => r.code));

        // 生成不重复的激活码
        const codes = [];
        let attempts = 0;
        while (codes.length < qty && attempts < qty * 30) {
          const code = genCode();
          if (!existingSet.has(code) && !codes.find(c => c.code === code)) {
            codes.push({ code, vip_type: type });
          }
          attempts++;
        }

        if (codes.length === 0) {
          tip.className = 'admin-tip error';
          tip.textContent = '❌ 无法生成足够的唯一激活码，请重试';
          return;
        }

        await SB.createActivationCodes(codes);

        // 显示结果
        const output = document.getElementById('codeOutput');
        output.value = codes.map(c => formatCode(c.code)).join('\n');
        result.style.display = 'block';
        tip.className = 'admin-tip success';
        tip.textContent = '✅ 已生成 ' + codes.length + ' 个 ' + type + ' 激活码';

        loadCodes();
      } catch (e) {
        tip.className = 'admin-tip error';
        tip.textContent = '❌ 生成失败：' + e.message;
        if (e.message.includes('relation') && e.message.includes('activation_codes')) {
          tip.innerHTML = '❌ activation_codes 表不存在，请先在 Supabase SQL Editor 中执行建表脚本 → <code>api/activation_codes.sql</code>';
        }
      }
    }

    function copyCodes() {
      const output = document.getElementById('codeOutput');
      output.select();
      navigator.clipboard.writeText(output.value).then(() => {
        const tip = document.getElementById('batchTip');
        tip.className = 'admin-tip success';
        tip.textContent = '✅ 已复制 ' + output.value.split('\n').length + ' 个激活码到剪贴板';
      }).catch(() => {
        document.execCommand('copy');
      });
    }

    async function loadCodes() {
      const filter = document.getElementById('codeFilter').value;
      const list = document.getElementById('codeList');
      try {
        const codes = await SB.getAllActivationCodes(filter);
        if (!codes || codes.length === 0) {
          list.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:1rem;">暂无激活码</div>';
          return;
        }
        let html = '';
        for (const c of codes) {
          const used = c.status === 'used';
          html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:0.4rem 0.3rem;border-bottom:1px solid var(--glass-border);">' +
            '<span style="font-family:monospace;font-weight:600;color:' + (used ? 'var(--text-muted)' : 'var(--secondary)') + ';">' + formatCode(c.code) + '</span>' +
            '<span style="font-size:0.75rem;color:var(--text-muted);">' +
              c.vip_type + ' · ' +
              (used ? ('<span style="color:#ef4444;">已用</span> by ' + (c.used_by||'?')) : '<span style="color:#4ade80;">可用</span>') +
              ' · ' + new Date(c.created_at).toLocaleDateString() +
            '</span></div>';
        }
        list.innerHTML = html;
      } catch (e) {
        list.innerHTML = '<div style="text-align:center;color:#ef4444;padding:1rem;">❌ 加载失败：' + e.message + '</div>';
      }
    }

    // 切到批量标签页时自动加载码列表
    const origSwitch = switchTab;
    switchTab = function(btn, id) {
      origSwitch(btn, id);
      if (id === 'tabBatch') loadCodes();
    };
  </script>
</body>
</html>
