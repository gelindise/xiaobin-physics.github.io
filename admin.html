<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>管理员后台</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="form-box">
    <h2>管理员 - 设置VIP</h2>
    <input type="text" id="adminUser" placeholder="要开通的用户名">
    <select id="vipType">
      <option value="月度VIP">月度VIP</option>
      <option value="年度VIP">年度VIP</option>
      <option value="终身VIP">终身VIP</option>
    </select>
    <button class="btn" onclick="setUserVip()">确认开通</button>
    <p id="adminTip"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
