<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>管理员后台</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-header .icon-wrap {
      width: 64px;
      height: 64px;
      margin: 0 auto 1rem;
      background: linear-gradient(135deg, #ef4444, var(--accent));
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      box-shadow: 0 8px 24px rgba(239, 68, 68, 0.3);
    }
    .auth-header h2 { font-size: 1.5rem; font-weight: 700; }
    .input-group {
      position: relative;
      margin-bottom: 1rem;
    }
    .input-group .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      opacity: 0.5;
      pointer-events: none;
    }
    .input-group input, .input-group select {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.6rem;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--text-main);
      font-size: 0.9rem;
      transition: all 0.3s ease;
      outline: none;
    }
    .input-group input:focus, .input-group select:focus {
      border-color: var(--accent);
      background: rgba(0, 0, 0, 0.4);
    }
    .input-group select option { background: var(--bg-dark); color: var(--text-main); }
    .auth-btn {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #ef4444, var(--accent));
      color: white;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
      margin-top: 0.5rem;
    }
    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(239, 68, 68, 0.5);
    }
    .admin-tip {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.85rem;
      min-height: 1.5rem;
    }
    .admin-tip.success { color: #4ade80; }
    .admin-tip.error { color: #ef4444; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.8rem;
    }
    .back-link:hover { color: var(--primary); }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="icon-wrap">🛠️</div>
        <h2>管理员控制台</h2>
      </div>

      <div class="input-group">
        <span class="input-icon">👤</span>
        <input type="text" id="adminUser" placeholder="目标用户名">
      </div>

      <div class="input-group">
        <span class="input-icon">💎</span>
        <select id="vipType">
          <option value="月度VIP">月度VIP (30天)</option>
          <option value="年度VIP">年度VIP (365天)</option>
          <option value="终身VIP">终身VIP (永久)</option>
        </select>
      </div>

      <button class="auth-btn" onclick="setUserVip()">授权 VIP 权限</button>

      <div class="admin-tip" id="adminTip"></div>

      <a href="index.html" class="back-link">← 返回首页</a>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script src="script.js"></script>
  <script>
    async function setUserVip() {
      const user = document.getElementById("adminUser").value.trim();
      const type = document.getElementById("vipType").value;
      const tip = document.getElementById("adminTip");

      if (!user) {
        tip.className = "admin-tip error";
        tip.textContent = "⚠️ 请输入用户名";
        return;
      }

      tip.className = "admin-tip";
      tip.textContent = "⏳ 处理中...";

      // 计算到期日期
      let expireDate = "";
      const now = new Date();
      if (type === "月度VIP") {
        now.setDate(now.getDate() + 30);
        expireDate = now.toISOString().split('T')[0];
      } else if (type === "年度VIP") {
        now.setDate(now.getDate() + 365);
        expireDate = now.toISOString().split('T')[0];
      } else {
        expireDate = "永久";
      }

      try {
        const result = await SB.getUser(user);
        if (!result || result.length === 0) {
          tip.className = "admin-tip error";
          tip.textContent = "❌ 用户不存在";
          return;
        }

        await SB.updateUser(user, { vip: type, expire: expireDate });

        // 同步缓存
        const cached = JSON.parse(localStorage.getItem("users") || "{}");
        if (cached[user]) {
          cached[user].vip = type;
          cached[user].expire = expireDate;
          localStorage.setItem("users", JSON.stringify(cached));
        }

        tip.className = "admin-tip success";
        tip.textContent = `✅ 已授予 ${user} ${type}（${expireDate}）`;
      } catch (e) {
        console.error("[管理] 操作失败:", e);
        tip.className = "admin-tip error";
        tip.textContent = "❌ 操作失败：" + e.message;
      }
    }
  </script>
</body>
</html>
