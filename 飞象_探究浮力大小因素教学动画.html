            pointer: document.getElementById('pointer'),
            meterDisplay: document.getElementById('meter-display'),
            valG: document.getElementById('val-g'),
            valF: document.getElementById('val-f'),
            valB: document.getElementById('val-b')
        };

        // --- 4. 核心逻辑：切换步骤 ---
        function switchStep(stepId) {
            state.step = stepId;
            state.hasInteracted = false;
            state.maxDepthReached = 0;
            
            // 重置状态
            state.sliderValue = 0;
            state.objectType = 'Fe';
            state.liquidType = 'water';

            // 特殊步骤预设
            if (stepId === 3 || stepId === 4) {
                state.sliderValue = 80; // 默认完全浸没
            }

            // 更新Tab样式
            for(let i=1; i&lt;=4; i++) {
                const tab = document.getElementById(`tab-${i}`);
                if(i === stepId) {
                    tab.className = &quot;tab-active w-full text-left px-6 py-5 hover:bg-gray-50 transition-colors flex items-center&quot;;
                    tab.querySelector('div').className = &quot;w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold mr-3&quot;;
                } else {
                    tab.className = &quot;tab-inactive w-full text-left px-6 py-5 hover:bg-gray-50 transition-colors flex items-center&quot;;
                    tab.querySelector('div').className = &quot;w-8 h-8 rounded-full bg-gray-100 text-gray-500 flex items-center justify-center font-bold mr-3&quot;;
                }
            }

            // 隐藏结论
            els.conclusionBox.classList.remove('conclusion-visible');
            els.conclusionBox.style.display = 'none';
            els.conclusionPlaceholder.style.display = 'block';

            // 显示手势提示
            showGestureHint();

            // 渲染对应控件
            renderControls();
            
            // 更新物理
            updatePhysics();
        }

        function showGestureHint() {
            els.gestureHint.style.opacity = 1;
            setTimeout(() =&gt; {
                els.gestureHint.style.opacity = 0;
            }, 2500);
        }

        // --- 5. 渲染控件 ---
        function renderControls() {
            let html = '';
            
            switch(state.step) {
                case 1:
                    html = `
                        &lt;h4 class=&quot;font-bold text-gray-800 mb-4&quot;&gt;控制变量：&lt;/h4&gt;
                        &lt;div class=&quot;text-sm text-gray-500 mb-6 space-y-2&quot;&gt;
                            &lt;p&gt;&lt;i class=&quot;fas fa-check text-green-500 mr-2&quot;&gt;&lt;/i&gt;液体：水 (固定)&lt;/p&gt;
                            &lt;p&gt;&lt;i class=&quot;fas fa-check text-green-500 mr-2&quot;&gt;&lt;/i&gt;物体：铁块 (固定)&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;label class=&quot;block font-bold text-gray-700 mb-2&quot;&gt;改变浸入深度 (h)&lt;/label&gt;
                        &lt;div class=&quot;relative h-16 flex items-center&quot;&gt;
                            &lt;input type=&quot;range&quot; oninput=&quot;handleSlider(this.value)&quot; value=&quot;${state.sliderValue}&quot; min=&quot;0&quot; max=&quot;100&quot;&gt;
                            &lt;div class=&quot;absolute top-10 w-full flex justify-between text-xs text-gray-400&quot;&gt;
                                &lt;span&gt;未接触&lt;/span&gt;
                                &lt;span&gt;完全浸没&lt;/span&gt;
                            &lt;/div&gt;
                        &lt;/div&gt;
                        &lt;p class=&quot;text-xs text-gray-400 mt-4&quot;&gt;拖动滑块，观察浮力变化。注意完全浸没后的情况。&lt;/p&gt;
                    `;
                    break;
                case 2:
                    html = `
                        &lt;h4 class=&quot;font-bold text-gray-800 mb-4&quot;&gt;控制变量：&lt;/h4&gt;
                        &lt;div class=&quot;text-sm text-gray-500 mb-6 space-y-2&quot;&gt;
                            &lt;p&gt;&lt;i class=&quot;fas fa-check text-green-500 mr-2&quot;&gt;&lt;/i&gt;液体：水 (固定)&lt;/p&gt;
                            &lt;p&gt;&lt;i class=&quot;fas fa-check text-green-500 mr-2&quot;&gt;&lt;/i&gt;物体：铁块 (固定)&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;label class=&quot;block font-bold text-gray-700 mb-2&quot;&gt;改变排开体积 (V排)&lt;/label&gt;
                        &lt;div class=&quot;relative h-16 flex items-center&quot;&gt;
                            &lt;input type=&quot;range&quot; oninput=&quot;handleSlider(this.value)&quot; value=&quot;${state.sliderValue}&quot; min=&quot;0&quot; max=&quot;100&quot;&gt;
                            &lt;div class=&quot;absolute top-10 w-full flex justify-between text-xs text-gray-400&quot;&gt;
                                &lt;span&gt;V排 = 0&lt;/span&gt;
                                &lt;span&gt;V排 = V物&lt;/span&gt;
                            &lt;/div&gt;
                        &lt;/div&gt;
                        &lt;p class=&quot;text-xs text-gray-400 mt-4&quot;&gt;观察液面上升高度与浮力的关系。&lt;/p&gt;
                    `;
                    break;
                case 3:
                    html = `
                        &lt;h4 class=&quot;font-bold text-gray-800 mb-4&quot;&gt;控制变量：&lt;/h4&gt;
                        &lt;div class=&quot;text-sm text-gray-500 mb-6 space-y-2&quot;&gt;
                            &lt;p&gt;&lt;i class=&quot;fas fa-check text-green-500 mr-2&quot;&gt;&lt;/i&gt;物体：铁块 (固定)&lt;/p&gt;
                            &lt;p&gt;&lt;i class=&quot;fas fa-check text-green-500 mr-2&quot;&gt;&lt;/i&gt;状态：完全浸没 (V排固定)&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;label class=&quot;block font-bold text-gray-700 mb-3&quot;&gt;选择液体种类&lt;/label&gt;
                        &lt;div class=&quot;space-y-3&quot;&gt;
                            &lt;button onclick=&quot;setLiquid('alcohol')&quot; class=&quot;w-full p-3 rounded-lg border-2 ${state.liquidType==='alcohol'?'border-blue-500 bg-blue-50':'border-gray-200'} flex justify-between items-center&quot;&gt;
                                &lt;span&gt;酒精&lt;/span&gt;
                                &lt;span class=&quot;text-xs bg-gray-200 px-2 py-1 rounded&quot;&gt;0.8 g/cm&amp;sup3;&lt;/span&gt;
                            &lt;/button&gt;
                            &lt;button onclick=&quot;setLiquid('water')&quot; class=&quot;w-full p-3 rounded-lg border-2 ${state.liquidType==='water'?'border-blue-500 bg-blue-50':'border-gray-200'} flex justify-between items-center&quot;&gt;
                                &lt;span&gt;水&lt;/span&gt;
                                &lt;span class=&quot;text-xs bg-gray-200 px-2 py-1 rounded&quot;&gt;1.0 g/cm&amp;sup3;&lt;/span&gt;
                            &lt;/button&gt;
                            &lt;button onclick=&quot;setLiquid('saltwater')&quot; class=&quot;w-full p-3 rounded-lg border-2 ${state.liquidType==='saltwater'?'border-blue-500 bg-blue-50':'border-gray-200'} flex justify-between items-center&quot;&gt;
                                &lt;span&gt;盐水&lt;/span&gt;
                                &lt;span class=&quot;text-xs bg-gray-200 px-2 py-1 rounded&quot;&gt;1.1 g/cm&amp;sup3;&lt;/span&gt;
                            &lt;/button&gt;
                        &lt;/div&gt;
                    `;
                    break;
                case 4:
                    html = `
                        &lt;h4 class=&quot;font-bold text-gray-800 mb-4&quot;&gt;控制变量：&lt;/h4&gt;
                        &lt;div class=&quot;text-sm text-gray-500 mb-6 space-y-2&quot;&gt;
                            &lt;p&gt;&lt;i class=&quot;fas fa-check text-green-500 mr-2&quot;&gt;&lt;/i&gt;液体：水 (固定)&lt;/p&gt;
                            &lt;p&gt;&lt;i class=&quot;fas fa-check text-green-500 mr-2&quot;&gt;&lt;/i&gt;状态：完全浸没 (V排固定)&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;label class=&quot;block font-bold text-gray-700 mb-3&quot;&gt;选择物体材质&lt;/label&gt;
                        &lt;div class=&quot;grid grid-cols-3 gap-2&quot;&gt;
                            &lt;button onclick=&quot;setObject('Al')&quot; class=&quot;p-2 rounded-lg border-2 ${state.objectType==='Al'?'border-blue-500 bg-blue-50':'border-gray-200'} text-center&quot;&gt;
                                &lt;div class=&quot;font-bold&quot;&gt;铝&lt;/div&gt;
                                &lt;div class=&quot;text-xs text-gray-500&quot;&gt;2.7&lt;/div&gt;
                            &lt;/button&gt;
                            &lt;button onclick=&quot;setObject('Fe')&quot; class=&quot;p-2 rounded-lg border-2 ${state.objectType==='Fe'?'border-blue-500 bg-blue-50':'border-gray-200'} text-center&quot;&gt;
                                &lt;div class=&quot;font-bold&quot;&gt;铁&lt;/div&gt;
                                &lt;div class=&quot;text-xs text-gray-500&quot;&gt;7.9&lt;/div&gt;
                            &lt;/button&gt;
                            &lt;button onclick=&quot;setObject('Cu')&quot; class=&quot;p-2 rounded-lg border-2 ${state.objectType==='Cu'?'border-blue-500 bg-blue-50':'border-gray-200'} text-center&quot;&gt;
                                &lt;div class=&quot;font-bold&quot;&gt;铜&lt;/div&gt;
                                &lt;div class=&quot;text-xs text-gray-500&quot;&gt;8.9&lt;/div&gt;
                            &lt;/button&gt;
                        &lt;/div&gt;
                        &lt;p class=&quot;text-xs text-gray-400 mt-4&quot;&gt;注意：物体体积相同，但密度不同导致重力不同。&lt;/p&gt;
                    `;
                    break;
            }
            els.controlsArea.innerHTML = html;
        }

        // --- 6. 交互处理 ---
        function handleSlider(val) {
            state.sliderValue = parseInt(val);
            state.hasInteracted = true;
            state.maxDepthReached = Math.max(state.maxDepthReached, state.sliderValue);
            updatePhysics();
            checkConclusion();
        }

        function setLiquid(type) {
            state.liquidType = type;
            state.hasInteracted = true;
            renderControls(); // 刷新选中状态
            updatePhysics();
            checkConclusion();
        }

        function setObject(type) {
            state.objectType = type;
            state.hasInteracted = true;
            renderControls(); // 刷新选中状态
            updatePhysics();
            checkConclusion();
        }

        // --- 7. 物理引擎 (重构：基于几何位置) ---
        function updatePhysics() {
            // 1. 计算重力
            const rhoObj = CONSTANTS.densities[state.objectType];
            const mass = rhoObj * CONSTANTS.blockVolume / 1000; // kg
            const G = mass * CONSTANTS.g;

            // 2. 计算几何位置
            // 滑块 0-100 映射到位移 0-160px (确保能触底)
            const maxDisplacement = 160;
            const currentDisplacement = (state.sliderValue / 100) * maxDisplacement;
            
            // 物体底部当前高度 (相对于容器底部)
            const currentBlockBottomPx = CONSTANTS.initialBlockBottomPx - currentDisplacement;
            
            // 3. 计算浸入深度
            // 初始液面高度
            let currentLiquidHeightPx = CONSTANTS.initialLiquidHeightPx;
            
            // 预估浸入深度 (忽略液面上升)
            let immersionDepthPx = Math.max(0, currentLiquidHeightPx - currentBlockBottomPx);
            
            // 修正：考虑液面上升
            // 简单近似：每浸入1px，液面上升 0.2px (假设容器截面积是物体的5倍)
            // h_immersed = (Liquid_base + h_rise) - Block_bottom
            // h_rise = h_immersed * 0.2
            // =&gt; h_immersed = Liquid_base + 0.2*h_immersed - Block_bottom
            // =&gt; 0.8 * h_immersed = Liquid_base - Block_bottom
            // =&gt; h_immersed = (Liquid_base - Block_bottom) / 0.8
            
            if (currentLiquidHeightPx &gt; currentBlockBottomPx) {
                immersionDepthPx = (currentLiquidHeightPx - currentBlockBottomPx) / 0.8;
            }
            
            // 限制浸入深度不超过物体高度
            immersionDepthPx = Math.min(immersionDepthPx, CONSTANTS.blockHeightPx);
            
            // 计算浸入比例
            const immersionRatio = immersionDepthPx / CONSTANTS.blockHeightPx;

            // 4. 计算浮力
            const rhoLiquid = CONSTANTS.liquidDensities[state.liquidType] * 1000; // kg/m&amp;sup3;
            const vDisp = (CONSTANTS.blockVolume * 1e-6) * immersionRatio; // m&amp;sup3;
            const F_buoy = rhoLiquid * CONSTANTS.g * vDisp;

            // 5. 计算拉力
            const F_pull = Math.max(0, G - F_buoy);

            // --- 视觉更新 ---
            
            // A. 系统位置
            gsap.to(els.systemGroup, { y: currentDisplacement, duration: 0.05, ease: &quot;none&quot; });

            // B. 弹簧伸缩
            const springStretch = F_pull * 0.1; // 缩放系数
            gsap.to('.spring-container', { scaleY: 1 + springStretch, duration: 0.2 });
            gsap.to(els.pointer, { top: 20 + (springStretch * 20), duration: 0.2 });

            // C. 液体与物体
            els.liquid.style.backgroundColor = CONSTANTS.liquidColors[state.liquidType];
            els.liquidSurface.style.backgroundColor = CONSTANTS.liquidSurfaceColors[state.liquidType];
            els.block.style.background = CONSTANTS.blockColors[state.objectType];
            els.blockLabel.textContent = CONSTANTS.blockNames[state.objectType]; // 中文显示

            // D. 液面上升
            // 像素转百分比: 240px = 100%
            const liquidRisePx = immersionDepthPx * 0.2; // 假设截面比
            const finalLiquidHeightPx = CONSTANTS.initialLiquidHeightPx + liquidRisePx;
            const liquidHeightPercent = (finalLiquidHeightPx / CONSTANTS.containerHeightPx) * 100;
            els.liquid.style.height = `${liquidHeightPercent}%`;

            // E. 数据更新
            els.valG.textContent = G.toFixed(2);
            els.valF.textContent = F_pull.toFixed(2);
            els.valB.textContent = F_buoy.toFixed(2);
            els.meterDisplay.textContent = F_pull.toFixed(1);

            // 调试输出
            // console.log(`Slider:${state.sliderValue}, BlockBottom:${currentBlockBottomPx}, Liquid:${finalLiquidHeightPx}, Ratio:${immersionRatio}`);
        }

        // --- 8. 结论判定 ---
        function checkConclusion() {
            if (!state.hasInteracted) return;

            let text = &quot;&quot;;
            let show = false;

            switch(state.step) {
                case 1:
                    // 必须经历过完全浸没
                    if (state.maxDepthReached &gt; 75) {
                        text = &quot;结论：在浸没前，浮力随深度增加而增大；&lt;br&gt;&lt;span class='text-red-600 font-bold'&gt;完全浸没后，浮力与深度无关。&lt;/span&gt;&quot;;
                        show = true;
                    }
                    break;
                case 2:
                    if (state.maxDepthReached &gt; 50) {
                        text = &quot;结论：在同种液体中，物体排开液体的体积越大，所受浮力越大。&quot;;
                        show = true;
                    }
                    break;
                case 3:
                    // 只要切换过液体
                    text = &quot;结论：物体排开体积相同时，&lt;br&gt;&lt;span class='text-blue-600 font-bold'&gt;液体密度越大，所受浮力越大。&lt;/span&gt;&quot;;
                    show = true;
                    break;
                case 4:
                    // 只要切换过物体
                    text = &quot;结论：浮力的大小与物体的密度（或物体的重力）&lt;span class='text-red-600 font-bold'&gt;无关&lt;/span&gt;。&lt;br&gt;&lt;span class='text-xs text-gray-500'&gt;（虽然重力和拉力都变了，但它们的差值F浮保持不变）&lt;/span&gt;&quot;;
                    show = true;
                    break;
            }

            if (show) {
                els.conclusionPlaceholder.style.display = 'none';
                els.conclusionBox.style.display = 'block';
                els.conclusionBox.innerHTML = text;
                // 强制重绘触发动画
                void els.conclusionBox.offsetWidth;
                els.conclusionBox.classList.add('conclusion-visible');
            }
        }

        // 初始化
        switchStep(1);

    &lt;/script&gt;
&lt;/body&gt;
&lt;/html&gt;" frameborder="0"></iframe>
  </div>
  <script src="supabase.js"></script>
  <script src="script.js"></script>
  <script>
    (function() {
      var header = document.querySelector('.header');
      var cont = document.querySelector('.iframe-container');
      var hideTimer = null;
      var HIDE_DELAY = 800;
      function show() { clearTimeout(hideTimer); header.classList.remove('hidden'); cont.classList.remove('no-header-padding'); }
      function hide() { hideTimer = setTimeout(function() { header.classList.add('hidden'); cont.classList.add('no-header-padding'); }, HIDE_DELAY); }
      document.addEventListener('mousemove', function(e) {
        if (e.clientY <= 60) show();
        else if (e.clientY > header.offsetHeight + 20 && !header.classList.contains('hidden')) hide();
      });
      header.addEventListener('mouseenter', show);
      header.addEventListener('mouseleave', hide);
      hideTimer = setTimeout(function() { header.classList.add('hidden'); cont.classList.add('no-header-padding'); }, 2000);
    })();
  </script>
