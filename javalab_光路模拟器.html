<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=10">
  <title>光路模拟器 — 射线光学 - 物理虚拟实验</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <style>
    body { overflow: hidden; }
    .sim-frame {
      position: fixed;
      top: 48px;
      left: 0;
      right: 0;
      bottom: 0;
      border: none;
      width: 100%;
      height: calc(100% - 48px);
    }
    @media (max-width: 768px) {
      .sim-frame { top: 44px; height: calc(100% - 44px); }
    }
  </style>
  <script src="protect.js"></script>
  <script src="auth-check.js"></script>
</head>
<body>
  <header class="header">
    <div class="logo">物理虚拟实验</div>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="experiments.html">实验列表</a>
    </nav>
  </header>
  <iframe class="sim-frame" src="https://phydemo.app/ray-optics/simulator/?zh-CN"
    allowfullscreen
    allow="fullscreen; accelerometer; camera; encrypted-media; gyroscope; microphone; xr-spatial-tracking">
  </iframe>
</body>
</html>
