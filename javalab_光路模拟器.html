<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=10">
  <title>光路模拟器 — 射线光学 - 物理虚拟实验</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <style>
    body { overflow: hidden; }
    .header {
      position: fixed !important;
      top: 0;
      left: 0;
      right: 0;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }
    .header.hidden {
      transform: translateY(-100%);
    }
    .sim-frame {
      position: fixed;
      top: 48px;
      left: 0;
      right: 0;
      bottom: 0;
      border: none;
      width: 100%;
      transition: top 0.35s cubic-bezier(0.4, 0, 0.2, 1), height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .sim-frame.expanded {
      top: 0;
      height: 100%;
    }
    @media (max-width: 768px) {
      .sim-frame { top: 44px; }
      .sim-frame.expanded { top: 0; height: 100%; }
    }
  </style>
  <script src="protect.js"></script>
  <script src="auth-check.js"></script>
</head>
<body>
  <header class="header">
    <div class="logo">物理虚拟实验</div>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="experiments.html">实验列表</a>
    </nav>
  </header>
  <iframe class="sim-frame" src="https://phydemo.app/ray-optics/simulator/?zh-CN"
    allowfullscreen
    allow="fullscreen; accelerometer; camera; encrypted-media; gyroscope; microphone; xr-spatial-tracking">
  </iframe>
  <script>
    (function() {
      var header = document.querySelector('.header');
      var frame = document.querySelector('.sim-frame');
      var hideTimer = null;
      var HIDE_DELAY = 800;

      function showHeader() {
        clearTimeout(hideTimer);
        header.classList.remove('hidden');
        frame.classList.remove('expanded');
      }

      function hideHeader() {
        hideTimer = setTimeout(function() {
          header.classList.add('hidden');
          frame.classList.add('expanded');
        }, HIDE_DELAY);
      }

      document.addEventListener('mousemove', function(e) {
        if (e.clientY <= 60) {
          showHeader();
        } else if (e.clientY > header.offsetHeight + 20 && !header.classList.contains('hidden')) {
          hideHeader();
        }
      });

      header.addEventListener('mouseenter', showHeader);
      header.addEventListener('mouseleave', hideHeader);

      hideTimer = setTimeout(function() {
        header.classList.add('hidden');
        frame.classList.add('expanded');
      }, 2000);
    })();
  </script>
</body>
</html>
