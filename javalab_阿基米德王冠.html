  <script>
    // ========== 工具函数 ==========
    function doFullScreen() {
      const el = document.getElementById('divFull');
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }
    function contain(x, y, x1, y1, w1, h1) {
      return x > x1 && x < x1 + w1 && y > y1 && y < y1 + h1;
    }
    function drawButtonDrag() {
      push();
      const r = 30, gap = 4;
      let cx = width / 1000 * 40, cy = height - 45;
      if (window.devicePixelRatio) { cx = 40; cy = (height / (width / 1000)) - 45; }
      noStroke();
      for (let i = 0; i < 4; i++) {
        let x = cx + i * (r + gap) - 1.5 * (r + gap);
        fill(0, 0, 0, 30);
        ellipse(x, cy - 2, r, r);
        fill(180);
        ellipse(x, cy - 4, r - 2, r - 2);
        fill(240);
        ellipse(x, cy - 4, r - 8, r - 8);
        fill(100);
        noStroke();
        ellipse(x, cy - 4, 4, 4);
      }
      pop();
    }
    function dottedLine(x1, y1, x2, y2) {
      const d = dist(x1, y1, x2, y2);
      const step = 10;
      for (let t = 0; t < d; t += step * 2) {
        const x = lerp(x1, x2, t / d);
        const y = lerp(y1, y2, t / d);
        const x2_ = lerp(x1, x2, min(1, (t + step) / d));
        const y2_ = lerp(y1, y2, min(1, (t + step) / d));
        line(x, y, x2_, y2_);
      }
    }

    // ========== 主模拟代码 ==========
    var language = 3;
    var labelA, labelB, rangeA;
    let handImage;
    var imgWreath, imgWreathSilver, imgNugget;
    var waterY = 600, balanceY = 100, balanceT = 0;

    function preload() {
      var imagePrefix = "images/";
      imgWreath = loadImage(imagePrefix + "archimedes_principle_gold_wreath.png");
      imgWreathSilver = loadImage(imagePrefix + "archimedes_principle_silver_wreath.png");
      imgNugget = loadImage(imagePrefix + "archimedes_principle_gold_nugget.png");
      handImage = loadImage(imagePrefix + "archimedes_principle_hand_0.png");
    }

    function setup() {
      frameRate(50);
      let o = select("#myContainer");
      var a = 1;
      var w = int(min(o.width, (window.innerHeight - 160) / a));
      var h = int(w * a);
      myCanvas = createCanvas(w, h);
      myCanvas.parent("myContainer");
      myCanvas.id("myP5Canvas");
      labelA = select("#labelA");
      labelB = select("#labelB");
      labelA.html("银");
      labelB.html("金");
      rangeA = select("#rangeA");

      // 显示初始值
      updateRangeDisplay();
      rangeA.input(updateRangeDisplay);
    }

    function updateRangeDisplay() {
      const val = rangeA.value();
      document.getElementById('rangeValue').textContent = val + '%';
    }

    function windowResized() {
      let o = select("#myContainer");
      var a = 1;
      var w = int(min(o.width, (window.innerHeight - 160) / a));
      var h = int(w * a);
      resizeCanvas(w, h);
    }

    function draw() {
      push();
      scale(width / 1000);
      background(233, 255, 255);
      strokeWeight(2);
      textSize(36);
      var gold = rangeA.value();
      var silver = 100 - gold;

      // 水平虚线
      stroke(191, 191, 255);
      strokeWeight(0.5);
      for (var i = waterY - 31; i > 0; i -= 31) {
        dottedLine(0, i, 1000, i);
      }

      var balanceX = 500;
      var balanceL = 300;
      var balanceX0 = balanceX - balanceL * cos(balanceT);
      var balanceY0 = balanceY - balanceL * sin(balanceT);
      var balanceX1 = balanceX + balanceL * cos(balanceT);
      var balanceY1 = balanceY + balanceL * sin(balanceT);
      var terminalY0 = balanceY0 + 200;
      var terminalY1 = balanceY1 + 200;
      var objectY0 = terminalY0 + 120;
      var objectY1 = terminalY1 + 50;

      // 金冠（左侧）
      var wreathH = 240;
      var wreathW = 240 * imgWreath.width / imgWreath.height;
      image(imgWreath, balanceX0 - wreathW * 0.52, terminalY0, wreathW, wreathH);
      tint(255, map(rangeA.value(), 0, 100, 255, 0));
      image(imgWreathSilver, balanceX0 - wreathW * 0.52, terminalY0, wreathW, wreathH);
      noTint();

      // 文字标注 - 金冠成分
      fill(0);
      noStroke();
      textAlign(LEFT, CENTER);
      if (gold == 0) {
        text("纯银", 5, 220);
      } else if (gold == 100) {
        text("纯金", 5, 220);
      } else {
        text("银 " + silver + "%\n金 " + gold + "%", 5, 220);
      }

      textAlign(RIGHT, CENTER);
      text("纯金", 995, 220);

      // 金块（右侧）
      var nuggetH = 100;
      var nuggetW = 100 * imgNugget.width / imgNugget.height;
      image(imgNugget, balanceX1 - nuggetW / 2, terminalY1, nuggetW, nuggetH);

      // 天平横梁
      stroke(90, 64, 0);
      strokeWeight(20);
      line(balanceX0, balanceY0, balanceX1, balanceY1);
      // 支点
      ellipse(balanceX, balanceY, 12, 12);
      noStroke();
      fill(255);
      ellipse(balanceX, balanceY, 16, 16);
      ellipse(balanceX0, balanceY0, 5, 5);
      ellipse(balanceX1, balanceY1, 5, 5);
      fill(90, 64, 0);
      ellipse(balanceX, balanceY, 13, 13);

      // 手
      image(handImage, balanceX - 300, balanceY - 200 - 300, 600, 600);

      // 竖直拉线
      stroke(68, 114, 196);
      stroke(90, 64, 0);
      strokeWeight(12);
      { push(); strokeCap(SQUARE); line(balanceX, balanceY - 140, balanceX, balanceY); pop(); }

      stroke(128);
      strokeWeight(3);
      line(balanceX0, balanceY0, balanceX0, terminalY0);
      line(balanceX1, balanceY1, balanceX1, terminalY1);

      // 水面
      noStroke();
      fill(64, 64, 255, 128);
      rect(0, waterY, 1000, 1000);
      fill(0);
      textAlign(CENTER, BOTTOM);
      text("空气", 500, (waterY - 10));
      textAlign(CENTER, TOP);
      text("水", 500, (waterY + 10));

      // 阿基米德浮力计算
      var immerse0 = map(waterY, terminalY0 + wreathH, terminalY0, -0.1, 1.01);
      var immerse1 = map(waterY, terminalY1 + nuggetH, terminalY1, 0, 1);
      immerse0 = constrain(immerse0, 0, 1);
      immerse1 = constrain(immerse1, 0, 1);

      // 浮力 = 浸入体积 / 密度（金冠密度随含金量变化，纯金19.3，纯银10.49）
      var force0 = 1 - immerse0 / map(rangeA.value(), 0, 100, 10.49, 19.3);
      var force1 = 1 - immerse1 / 19.3;
      balanceT += (force1 - force0);
      balanceT *= 0.87;

      pop();
      drawButtonDrag();
    }

    // ========== 鼠标/触摸拖拽 ==========
    var dragged = false, offsetY;

    function touchStarted() {
      if (!contain(mouseX, mouseY, 0, 0, width, height)) return;
      if (touches.length > 1) return;
      let x = mouseX * 1000 / width;
      let y = mouseY * 1000 / width;
      dragged = true;
      offsetY = y - balanceY;
    }

    function touchMoved() {
      if (touches.length > 1) return;
      if (dragged) {
        let x = mouseX * 1000 / width;
        let y = mouseY * 1000 / width;
        balanceY = y - offsetY;
        balanceY = constrain(balanceY, 100, waterY - 100);
        return false;
      }
    }

    function touchEnded() { dragged = false; }

    // 鼠标事件兼容
    function mousePressed() { return touchStarted(); }
    function mouseDragged() { return touchMoved(); }
    function mouseReleased() { touchEnded(); }
  </script>

  <script>
  // === 过关挑战 Quiz System - 阿基米德王冠 ===
  (function() {
    var QUIZ_STORAGE_KEY = 'quiz_crown_progress';
    var EXPERIMENT_KEY = 'crown';
    var quizData = null;
    var currentRound = 0;
    var currentQuestion = 0;
    var selectedOption = null;
    var isAnswered = false;
    var isReviewing = false;
    var quizQuestions = [];

    // === 15 questions across 3 rounds ===
    var allQuestions = [];

    // Round 1: 王冠的故事
    allQuestions.push({ round: 0, question: '叙拉古国王让工匠制作了一顶什么？', options: ['金戒指', '金王冠', '银酒杯', '铜像'], answer: 1, explain: '传说叙拉古国王海厄罗让工匠制作了一顶纯金王冠，但他怀疑工匠偷换了一部分黄金。' });
    allQuestions.push({ round: 0, question: '国王怀疑工匠做了什么？', options: ['偷换了部分黄金掺入白银', '修改了王冠的设计', '损坏了王冠', '偷了制作工具'], answer: 0, explain: '国王怀疑工匠在制作金王冠时偷换了一部分黄金，用等重的白银代替，从而私吞了黄金。' });
    allQuestions.push({ round: 0, question: '阿基米德在什么情况下想到了测量王冠的方法？', options: ['吃饭时', '洗澡时', '睡觉时', '走路时'], answer: 1, explain: '阿基米德在浴缸中洗澡时，注意到身体浸入水中会溢出相同体积的水，突然受到启发，兴奋得跳出浴缸大喊"尤里卡！"' });
    allQuestions.push({ round: 0, question: '阿基米德大喊的"尤里卡"（Eureka）在希腊语中是什么意思？', options: ['我找到了', '我输了', '我明白了', '我错了'], answer: 0, explain: '"尤里卡"（Eureka）在希腊语中的意思是"我找到了"或"我发现了"，现在常用来表示突然找到了解决问题的方法。' });
    allQuestions.push({ round: 0, question: '纯金在室温（20°C）下的密度约为多少？', options: ['10.5 g/cm³', '13.6 g/cm³', '19.3 g/cm³', '7.8 g/cm³'], answer: 2, explain: '纯金的密度约为 19.3 g/cm³，是密度最大的金属之一。银的密度约为 10.5 g/cm³，只有金的一半多一点。' });

    // Round 2: 密度概念
    allQuestions.push({ round: 1, question: '银的密度约为多少？', options: ['19.3 g/cm³', '10.5 g/cm³', '13.6 g/cm³', '7.8 g/cm³'], answer: 1, explain: '银的密度约为 10.5 g/cm³。金的密度约为 19.3 g/cm³，是银的约1.84倍。因此掺银的王冠密度会小于纯金王冠。' });
    allQuestions.push({ round: 1, question: '相同质量的金和银，谁的体积更大？', options: ['金', '银', '一样大', '无法确定'], answer: 1, explain: '密度 = 质量 / 体积。质量相同时，密度越小体积越大。银的密度（10.5）小于金的密度（19.3），因此相同质量下银的体积更大。' });
    allQuestions.push({ round: 1, question: '密度的定义公式是？', options: ['ρ = m × V', 'ρ = m / V', 'ρ = V / m', 'ρ = m + V'], answer: 1, explain: '密度 ρ = 质量 m / 体积 V，即单位体积内所含物质的质量。密度的国际单位是 kg/m³，常用单位还有 g/cm³。' });
    allQuestions.push({ round: 1, question: '如果王冠中掺入了银，它的密度会比纯金王冠？', options: ['变大', '变小', '不变', '无法确定'], answer: 1, explain: '银的密度（10.5 g/cm³）小于金的密度（19.3 g/cm³），因此掺入银会使王冠的整体密度降低，小于纯金的密度。' });
    allQuestions.push({ round: 1, question: '相同体积的金和银，谁的质量更大？', options: ['金', '银', '一样大', '无法确定'], answer: 0, explain: '体积相同时，密度越大质量越大。金的密度（19.3）大于银的密度（10.5），所以相同体积的金质量更大。' });

    // Round 3: 排水法
    allQuestions.push({ round: 2, question: '阿基米德通过测量什么来判断王冠是否掺假？', options: ['王冠的颜色', '王冠的体积和重量（密度）', '王冠的硬度', '王冠的气味'], answer: 1, explain: '阿基米德通过排水法测王冠的体积，再结合王冠的重量计算密度。若密度小于纯金，则证明王冠掺了其他金属。' });
    allQuestions.push({ round: 2, question: '将王冠完全浸入装满水的容器中，溢出的水的体积等于？', options: ['王冠的重量', '王冠的体积', '水的总重量', '王冠的密度'], answer: 1, explain: '物体完全浸没时，排开水的体积等于物体本身的体积。这就是排水法测量不规则物体体积的原理。' });
    allQuestions.push({ round: 2, question: '如果王冠掺了银，在相同质量下它的体积与纯金王冠相比会？', options: ['体积更大', '体积更小', '体积相同', '无法确定'], answer: 0, explain: '质量相同时，密度越大的物体体积越小。掺银后密度降低，因此同质量下手体积比纯金王冠更大，排水法测出的体积会偏大。' });
    allQuestions.push({ round: 2, question: '阿基米德发现浮力规律后，总结出的原理被称为？', options: ['杠杆原理', '阿基米德原理', '牛顿第一定律', '能量守恒定律'], answer: 1, explain: '阿基米德原理指出：浸在流体中的物体所受浮力等于排开的流体的重力。这一原理是流体静力学的基础。' });
    allQuestions.push({ round: 2, question: '阿基米德鉴定王冠的故事体现的科学方法是？', options: ['实验观察与逻辑推理相结合', '只读书本知识', '凭空想象猜测', '抄袭前人的方法'], answer: 0, explain: '这个故事体现了科学探究的核心方法：通过观察现象（洗澡时水溢出）提出问题，设计实验（排水法测体积），收集数据并逻辑推理（计算密度比较），最终得出结论。' });

    quizQuestions = allQuestions;

    // === Core Functions ===
    function initQuiz() {
      loadProgress();
      updateChallengeButton();
      var cb = document.getElementById('challengeBtnCR');
      if (cb) cb.onclick = function() { if (!isReviewing) startQuiz(); };
      var pauseCb = document.getElementById('pauseCR');
      if (pauseCb) {
        pauseCb.addEventListener('change', function() {
          if (this.checked && typeof noLoop === 'function') noLoop();
          else if (typeof loop === 'function') loop();
        });
      }
    }

    function startQuiz() {
      isReviewing = false;
      currentRound = 0;
      currentQuestion = 0;
      selectedOption = null;
      isAnswered = false;
      if (!quizData) {
        quizData = { answers: [], scores: [] };
        for (var r = 0; r < 3; r++) {
          quizData.answers[r] = [];
          quizData.scores[r] = [];
          for (var q = 0; q < 5; q++) { quizData.answers[r][q] = -1; quizData.scores[r][q] = 0; }
        }
      }
      document.getElementById('quizOverlayCR').style.display = 'flex';
      renderRound();
    }

    function closeQuiz() {
      document.getElementById('quizOverlayCR').style.display = 'none';
      updateChallengeButton();
    }

    function resetQuiz() {
      if (!confirm('确定要重置所有答题进度吗？')) return;
      quizData = null;
      try { localStorage.removeItem(QUIZ_STORAGE_KEY); } catch(e) {}
      saveQuizToServer(null);
      isReviewing = false;
      currentRound = 0;
      currentQuestion = 0;
      document.getElementById('quizOverlayCR').style.display = 'none';
      updateChallengeButton();
    }

    function renderRound() {
      var body = document.getElementById('quizBodyCR');
      var title = document.getElementById('quizTitleCR');
      title.textContent = '第 ' + (currentRound + 1) + ' 关（共3关）';
      var roundNames = ['王冠的故事', '密度概念', '排水法与科学方法'];
      var html = '<div class="quiz-progress">第 ' + (currentRound + 1) + ' / 3 关 · 共5题</div>';
      html += '<div style="text-align:center;margin:20px 0;">';
      html += '<p style="font-size:18px;margin-bottom:24px;">准备好迎接挑战了吗？</p>';
      html += '<p style="color:#aaa;margin-bottom:20px;">本关主题：' + roundNames[currentRound] + '</p>';
      html += '<button class="quiz-btn" onclick="renderQuestion(0)">开始答题</button>';
      html += '<button class="quiz-btn secondary" onclick="closeQuiz()">退出</button>';
      html += '</div>';
      body.innerHTML = html;
    }

    function renderQuestion(qIdx) {
      currentQuestion = qIdx;
      selectedOption = null;
      isAnswered = false;
      var qIdx2 = currentRound * 5 + currentQuestion;
      var q = quizQuestions[qIdx2];
      var body = document.getElementById('quizBodyCR');
      var title = document.getElementById('quizTitleCR');
      title.textContent = '第 ' + (currentRound + 1) + ' 关 · 第 ' + (currentQuestion + 1) + ' 题';
      var hasAnswer = (quizData.answers[currentRound][currentQuestion] >= 0);
      var savedAns = quizData.answers[currentRound][currentQuestion];
      var html = '<div class="quiz-progress">';
      html += '第 ' + (currentRound + 1) + ' / 3 关 · ';
      html += '第 ' + (currentQuestion + 1) + ' / 5 题</div>';
      html += '<div style="font-size:18px;font-weight:600;margin:16px 0 20px;">' + q.question + '</div>';
      var labels = ['A', 'B', 'C', 'D'];
      for (var i = 0; i < q.options.length; i++) {
        var cls = 'quiz-option';
        var disabled = '';
        if (hasAnswer) {
          disabled = ' disabled';
          if (i === q.answer) cls += ' correct';
          else if (i === savedAns) cls += ' wrong';
        }
        html += '<button class="' + cls + '"' + disabled + ' data-opt="' + i + '" onclick="selectAnswer(' + i + ')">';
        html += '<strong>' + labels[i] + '.</strong> ' + q.options[i];
        html += '</button>';
      }
      if (hasAnswer) {
        html += '<div class="review-explain" style="margin-top:12px;padding:12px;background:#16213e;border-radius:8px;">';
        html += '<strong>解析：</strong>' + q.explain;
        html += '</div>';
      }
      html += '<div style="text-align:center;margin-top:16px;">';
      if (hasAnswer) {
        if (currentQuestion < 4) {
          html += '<button class="quiz-btn" onclick="renderQuestion(' + (currentQuestion + 1) + ')">下一题</button>';
        } else {
          html += '<button class="quiz-btn" onclick="showRoundResult()">查看本关结果</button>';
        }
      }
      html += '<button class="quiz-btn secondary" onclick="closeQuiz()">退出</button>';
      html += '</div>';
      body.innerHTML = html;
    }

    window.selectAnswer = function(optIdx) {
      if (isAnswered) return;
      var qIdx2 = currentRound * 5 + currentQuestion;
      var q = quizQuestions[qIdx2];
      isAnswered = true;
      selectedOption = optIdx;
      quizData.answers[currentRound][currentQuestion] = optIdx;
      var isCorrect = (optIdx === q.answer);
      quizData.scores[currentRound][currentQuestion] = isCorrect ? 1 : 0;
      var btns = document.querySelectorAll('#quizBodyCR .quiz-option');
      for (var i = 0; i < btns.length; i++) {
        btns[i].disabled = true;
        if (i === q.answer) btns[i].classList.add('correct');
        else if (i === optIdx) btns[i].classList.add('wrong');
      }
      setTimeout(function() {
        var body = document.getElementById('quizBodyCR');
        var explainDiv = document.createElement('div');
        explainDiv.className = 'review-explain';
        explainDiv.style.cssText = 'margin-top:12px;padding:12px;background:#16213e;border-radius:8px;';
        explainDiv.innerHTML = '<strong>解析：</strong>' + q.explain;
        body.appendChild(explainDiv);
        var btnDiv = document.createElement('div');
        btnDiv.style.cssText = 'text-align:center;margin-top:16px;';
        if (currentQuestion < 4) {
          btnDiv.innerHTML = '<button class="quiz-btn" onclick="renderQuestion(' + (currentQuestion + 1) + ')">下一题</button>';
        } else {
          btnDiv.innerHTML = '<button class="quiz-btn" onclick="showRoundResult()">查看本关结果</button>';
        }
        btnDiv.innerHTML += '<button class="quiz-btn secondary" onclick="closeQuiz()">退出</button>';
        body.appendChild(btnDiv);
        saveProgress();
      }, 1200);
    };

    function showRoundResult() {
      var body = document.getElementById('quizBodyCR');
      var title = document.getElementById('quizTitleCR');
      title.textContent = '第 ' + (currentRound + 1) + ' 关结果';
      var correctCount = 0;
      for (var i = 0; i < 5; i++) { if (quizData.scores[currentRound][i] === 1) correctCount++; }
      var stars = getStars(correctCount);
      var starStr = '';
      for (var s = 0; s < 3; s++) { starStr += (s < stars) ? '★' : '☆'; }
      var passed = (correctCount >= 3);
      var html = '<div class="quiz-result">';
      html += '<h3>' + (passed ? '恭喜过关！' : '再接再厉！') + '</h3>';
      html += '<div class="stars">' + starStr + '</div>';
      html += '<p>答对 ' + correctCount + ' / 5 题';
      if (passed) html += ' · ' + (correctCount >= 5 ? '完美！' : correctCount >= 4 ? '优秀！' : '通过！');
      html += '</p></div>';
      html += '<div style="text-align:center;margin:16px 0;">';
      if (passed && currentRound < 2) {
        html += '<button class="quiz-btn" onclick="goToNextRound()">进入下一关</button>';
      } else if (!passed) {
        html += '<button class="quiz-btn" onclick="retryRound()">重新挑战本关</button>';
      }
      if (passed && currentRound >= 2) {
        html += '<button class="quiz-btn" onclick="showReview()">查看全部解析</button>';
      }
      html += '<button class="quiz-btn secondary" onclick="closeQuiz()">退出</button>';
      html += '<button class="quiz-btn danger" onclick="resetQuiz()" style="margin-left:8px;">重置进度</button>';
      html += '</div>';
      body.innerHTML = html;
      saveProgress();
    }

    window.goToNextRound = function() {
      currentRound++;
      currentQuestion = 0;
      renderRound();
    };

    window.retryRound = function() {
      for (var i = 0; i < 5; i++) { quizData.answers[currentRound][i] = -1; quizData.scores[currentRound][i] = 0; }
      currentQuestion = 0;
      renderQuestion(0);
    };

    function showReview() {
      isReviewing = true;
      var body = document.getElementById('quizBodyCR');
      var title = document.getElementById('quizTitleCR');
      title.textContent = '全部题目回顾';
      var allCorrect = 0;
      var total = 0;
      var html = '';
      for (var r = 0; r < 3; r++) {
        html += '<h3 style="color:#ffd700;margin:16px 0 8px;">第 ' + (r + 1) + ' 关</h3>';
        for (var q = 0; q < 5; q++) {
          var qIdx = r * 5 + q;
          var question = quizQuestions[qIdx];
          var ans = quizData.answers[r][q];
          if (ans === undefined || ans === null) continue;
          var isC = (ans === question.answer);
          if (ans >= 0) { allCorrect += isC ? 1 : 0; total++; }
          var cls = isC ? 'correct' : 'wrong';
          html += '<div class="review-card ' + cls + '">';
          html += '<span class="rbadge ' + cls + '">' + (isC ? '正确' : '错误') + '</span>';
          html += '<strong>' + (q + 1) + '. ' + question.question + '</strong>';
          html += '<div style="margin-top:4px;font-size:14px;color:#ccc;">你的答案：' + (ans >= 0 ? question.options[ans] : '未作答') + ' | 正确答案：' + question.options[question.answer] + '</div>';
          html += '<div class="review-explain">' + question.explain + '</div>';
          html += '</div>';
        }
      }
      html += '<div style="text-align:center;margin:16px 0;">';
      html += '<p style="font-size:18px;margin-bottom:12px;">总得分：' + allCorrect + ' / ' + total + '</p>';
      html += '<button class="quiz-btn" onclick="closeQuiz()">关闭</button>';
      html += '<button class="quiz-btn danger" onclick="resetQuiz()">重置进度</button>';
      html += '</div>';
      body.innerHTML = html;
    }

    window.showReview = showReview;
    window.closeQuiz = closeQuiz;
    window.resetQuiz = resetQuiz;
    window.startQuiz = startQuiz;
    window.renderQuestion = renderQuestion;
    window.showRoundResult = showRoundResult;
    window.goToNextRound = goToNextRound;
    window.retryRound = retryRound;

    function getStars(correctCount) {
      if (correctCount >= 5) return 3;
      if (correctCount >= 4) return 2;
      if (correctCount >= 3) return 1;
      return 0;
    }

    function saveProgress() {
      var data = { answers: quizData.answers, scores: quizData.scores, timestamp: Date.now() };
      try { localStorage.setItem(QUIZ_STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
      saveQuizToServer(data);
    }

    function loadProgress() {
      try {
        var raw = localStorage.getItem(QUIZ_STORAGE_KEY);
        if (raw) {
          var data = JSON.parse(raw);
          if (data && data.answers && data.scores) {
            quizData = { answers: data.answers, scores: data.scores };
            return;
          }
        }
      } catch(e) {}
      quizData = null;
    }

    function clearProgress() {
      quizData = null;
      try { localStorage.removeItem(QUIZ_STORAGE_KEY); } catch(e) {}
      saveQuizToServer(null);
    }

    function updateChallengeButton() {
      var btn = document.getElementById('challengeBtnCR');
      if (!btn) return;
      var hasData = false;
      if (quizData) {
        for (var r = 0; r < 3; r++) {
          for (var q = 0; q < 5; q++) {
            if (quizData.answers && quizData.answers[r] && quizData.answers[r][q] >= 0) hasData = true;
          }
        }
      }
      btn.textContent = hasData ? '继续挑战' : '过关挑战';
    }

    // === Supabase sync ===
    function saveQuizToServer(data) {
      if (typeof supabase === 'undefined') return;
      try {
        var userStr = localStorage.getItem('auth_user');
        if (!userStr) return;
        var user = JSON.parse(userStr);
        if (!user || !user.id) return;
        var client = supabase.createClient(
          'https://ahgkfksfjkzqckkdgskl.supabase.co',
          'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFoZ2tma3Nmamt6cWNra2Rnc2tsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY1Mjc4NDUsImV4cCI6MjA1MjEwMzg0NX0.cCdQxkkmRFxzK5n3tYWhOgFpE8x1Qr5tj2j4VJmREng'
        );
        client.from('users').select('quiz_data').eq('id', user.id).then(function(res) {
          if (res.error) return;
          var quizDataObj = res.data && res.data[0] && res.data[0].quiz_data ? JSON.parse(JSON.stringify(res.data[0].quiz_data)) : {};
          if (data === null) {
            delete quizDataObj[EXPERIMENT_KEY];
          } else {
            quizDataObj[EXPERIMENT_KEY] = data;
          }
          client.from('users').update({ quiz_data: quizDataObj }).eq('id', user.id).then(function() {});
        });
      } catch(e) {}
    }

    window.updateChallengeButton = updateChallengeButton;
    window.saveProgress = saveProgress;
    window.loadProgress = loadProgress;
    window.clearProgress = clearProgress;
    window.getStars = getStars;
    window.saveQuizToServer = saveQuizToServer;

    // === Setup override ===
    var _origSetupCR = setup;
    setup = function() {
      if (_origSetupCR) _origSetupCR();
      initQuiz();
    };
  })();
  </script>
  <script src="supabase.js"></script>
  <script>
    (function() {
      var header = document.querySelector('.header');
      var hideTimer = null;
      var HIDE_DELAY = 800;
      function show() { clearTimeout(hideTimer); header.classList.remove('hidden'); document.body.classList.remove('header-hidden'); }
      function hide() { hideTimer = setTimeout(function() { header.classList.add('hidden'); document.body.classList.add('header-hidden'); }, HIDE_DELAY); }
      document.addEventListener('mousemove', function(e) {
        if (e.clientY <= 60) show();
        else if (e.clientY > header.offsetHeight + 20 && !header.classList.contains('hidden')) hide();
      });
      header.addEventListener('mouseenter', show);
      header.addEventListener('mouseleave', hide);
      hideTimer = setTimeout(function() { header.classList.add('hidden'); document.body.classList.add('header-hidden'); }, 2000);
    })();
  </script>
