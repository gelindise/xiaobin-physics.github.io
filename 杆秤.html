<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>杆秤 - 物理虚拟实验</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <script src="protect.js"></script>
  <style>
    :root {
      --primary: #d97706;
      --primary-dark: #92400e;
      --bg-dark: #0b1120;
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --glass-border: rgba(148, 163, 184, 0.12);
      --card-bg: rgba(15, 23, 42, 0.6);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-dark);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }
    .particle-bg {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 30% 40%, rgba(217,119,6,0.06) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 60%, rgba(217,119,6,0.04) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.6rem 2rem;
      background: rgba(11, 17, 32, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--glass-border);
    }
    header .logo { font-size: 1.1rem; font-weight: 700; }
    header .logo a { color: var(--text-main); text-decoration: none; }
    header nav a {
      color: var(--text-muted); text-decoration: none; font-size: 0.85rem;
      padding: 0.4rem 1rem; border-radius: 8px; transition: all 0.3s;
    }
    header nav a:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .main-wrap {
      position: relative; z-index: 1;
      max-width: 960px; margin: 1.2rem auto; padding: 0 1rem;
    }
    .main-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 1.5rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .main-card h2 {
      text-align: center; font-size: 1.3rem; margin-bottom: 0.6rem;
      background: linear-gradient(135deg, var(--primary), #f59e0b);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #divFull {
      background: #0f172a;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    #myContainer { text-align: center; position: relative; }
    #myP5Canvas { display: block; margin: 0 auto; max-width: 100%; touch-action: none; }
    .readout-bar {
      display: flex; align-items: center; justify-content: center;
      gap: 1.5rem; padding: 0.5rem 1rem;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid var(--glass-border);
      font-size: 0.9rem;
    }
    .readout-bar .value {
      font-weight: 700; font-size: 1.4rem;
      background: linear-gradient(135deg, var(--primary), #f59e0b);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .controls {
      padding: 0.5rem 1rem;
      background: rgba(0,0,0,0.2);
      border-top: 1px solid var(--glass-border);
    }
    .controls .obj-row {
      display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
      gap: 0.4rem; margin-bottom: 6px;
    }
    .controls .obj-row button {
      height: 32px; padding: 0 10px; font-size: 0.8rem;
      border: 1px solid var(--glass-border); border-radius: 8px;
      background: rgba(255,255,255,0.06); color: var(--text-main);
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .controls .obj-row button:hover { background: rgba(255,255,255,0.12); }
    .controls .obj-row button.active {
      background: rgba(217,119,6,0.25);
      border-color: var(--primary);
    }
    .param-row {
      display: flex; align-items: center; justify-content: center;
      gap: 0.5rem; margin: 3px 0; flex-wrap: wrap;
    }
    .param-row .label {
      font-size: 0.78rem; color: var(--text-muted);
      min-width: 52px; text-align: right;
    }
    .param-row .pval {
      font-size: 0.82rem; color: var(--text-main); font-weight: 600;
      min-width: 48px; text-align: left;
    }
    .param-row input[type="range"] {
      width: 130px; accent-color: var(--primary); cursor: pointer;
    }
    .param-row .range-info {
      font-size: 0.78rem; color: var(--text-muted); margin-left: 4px;
    }
    .info-section {
      margin-top: 1.2rem; padding: 1rem 1.2rem;
      background: rgba(0,0,0,0.15); border-radius: 12px;
      border: 1px solid var(--glass-border);
    }
    .info-section h3 { font-size: 1rem; color: var(--primary); margin-bottom: 0.5rem; }
    .info-section p, .info-section li {
      font-size: 0.85rem; color: var(--text-muted); line-height: 1.7;
    }
    .info-section ul { padding-left: 1.2rem; }
    .formula-bar {
      display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
      gap: 1.5rem; padding: 0.8rem 1rem; margin-top: 1rem;
      background: rgba(0,0,0,0.2); border-radius: 10px;
      font-size: 0.9rem; color: var(--text-muted);
      border: 1px solid var(--glass-border);
    }
    .formula-bar .formula-item { text-align: center; }
    .formula-bar .formula-item .label { display: block; font-size: 0.75rem; color: var(--text-muted); }
    .formula-bar .formula-item .value { display: block; font-size: 0.95rem; color: var(--text-main); font-weight: 600; }
    @media (max-width: 640px) {
      header { padding: 0.5rem 1rem; }
      .main-wrap { margin: 0.6rem auto; }
      .main-card { padding: 0.6rem; border-radius: 14px; }
      .readout-bar { flex-wrap: wrap; gap: 0.5rem; font-size: 0.8rem; }
      .readout-bar .value { font-size: 1.1rem; }
      .param-row input[type="range"] { width: 100px; }
      .controls .obj-row button { font-size: 0.72rem; padding: 0 6px; height: 28px; }
    }
  </style>
  <script src="auth-check.js"></script>
</head>
<body>
  <div class="particle-bg"></div>
  <header>
    <div class="logo"><a href="index.html">⚖ 物理虚拟实验</a></div>
    <nav>
      <a href="experiments.html">实验列表</a>
      <a href="vip.html">VIP</a>
    </nav>
  </header>

  <div class="main-wrap">
    <div class="main-card">
      <h2>传统杆秤 · 可调参数</h2>

      <div id="divFull">
        <div id="myContainer"></div>
        <div class="readout-bar">
          <span>测量：<span class="value" id="weightDisplay">0.00</span> 斤</span>
          <span>量程：<span id="rangeDisplay" style="font-size:0.9rem;color:var(--text-muted);">0 ~ 0.0 斤</span></span>
          <span id="balanceStatus" style="font-size:0.85rem;">⚖ 拖动秤砣使杆秤平衡</span>
        </div>
        <div class="controls">
          <div class="obj-row">
            <span style="font-size:0.8rem;color:var(--text-muted);">物体：</span>
            <button id="obj0" class="active">🎒 1.0</button>
            <button id="obj1">🥩 2.0</button>
            <button id="obj2">🥚 0.8</button>
            <button id="obj3">🪣 2.5</button>
            <button id="obj4">🍉 1.5</button>
          </div>
          <div class="param-row">
            <span class="label">提钮位置</span>
            <input type="range" id="pivotSlider" min="150" max="450" value="240" step="5">
            <span class="pval" id="pivotVal">240</span>
            <span class="range-info" id="pivotRangeInfo"></span>
          </div>
          <div class="param-row">
            <span class="label">挂钩位置</span>
            <input type="range" id="hookSlider" min="10" max="190" value="50" step="5">
            <span class="pval" id="hookVal">50</span>
            <span class="range-info" id="hookRangeInfo"></span>
          </div>
          <div class="param-row">
            <span class="label">秤砣质量</span>
            <input type="range" id="weightSlider" min="0.2" max="5.0" value="1.0" step="0.1">
            <span class="pval" id="weightVal">1.0</span>
            <span class="range-info" id="weightRangeInfo"></span>
          </div>
        </div>
      </div>

      <div class="info-section">
        <h3>实验说明</h3>
        <ul>
          <li><strong>拖动秤砣</strong>左右移动，杆秤倾斜变化实时反馈</li>
          <li>调整下方<strong>提钮位置、挂钩位置、秤砣质量</strong>，观察量程和刻度变化</li>
          <li>当杆秤<strong>水平平衡</strong>时读取秤星刻度或数字显示</li>
          <li>杠杆原理：m₁ × L₁ = m₂ × L₂（物重 × 物距 = 秤砣重 × 砣距）</li>
        </ul>
      </div>

      <div class="formula-bar">
        <div class="formula-item">
          <span class="label">原理</span>
          <span class="value">m₁L₁ = m₂L₂</span>
        </div>
        <div class="formula-item">
          <span class="label">物距 L₁</span>
          <span class="value" id="formulaL1">190</span>
        </div>
        <div class="formula-item">
          <span class="label">秤砣重 m₂</span>
          <span class="value" id="formulaM2">1.0 斤</span>
        </div>
        <div class="formula-item">
          <span class="label">砣距范围</span>
          <span class="value" id="formulaL2">0 ~ 700</span>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/addons/p5.dom.min.js"></script>
  <script>
  /* ============================================================
     传统杆秤 — 可调参数交互仿真
     ============================================================ */

  // ===== 物理常量（固定） =====
  const BEAM_END_X = 945;

  // ===== 可调参数 =====
  let pivotX = 240;        // 提钮位置
  let hookX = 50;          // 挂钩位置
  let weightMass = 1.0;    // 秤砣质量（斤）

  // ===== 导出量 =====
  function objDist() { return pivotX - hookX; }
  function beamRange() { return BEAM_END_X - pivotX; }

  // ===== 预设物体 =====
  const OBJECTS = [
    { name: '一袋大米', mass: 1.0, icon: '🎒' },
    { name: '一块猪肉', mass: 2.0, icon: '🥩' },
    { name: '一篮鸡蛋', mass: 0.8, icon: '🥚' },
    { name: '一桶水',   mass: 2.5, icon: '🪣' },
    { name: '一个西瓜', mass: 1.5, icon: '🍉' },
  ];

  // ===== 状态 =====
  let objectIdx = 0;
  let objectMass = 1.0;
  let sliderT = 0.27;
  let beamAngle = 0;
  let angleVel = 0;
  let dragging = false;
  let balanceFrameCount = 0;
  let isBalanced = false;

  // ===== 工具函数 =====
  function toVirtual(mx, my) {
    return { x: mx * 1000 / width, y: my * 1000 / width };
  }
  function beamLocalX(vx, vy) {
    let dx = vx - pivotX;
    let dy = vy - pivotY;
    return dx * cos(-beamAngle) - dy * sin(-beamAngle);
  }

  // ===== 物理计算 =====
  function getMeasuredMass() {
    let Lw = sliderT * beamRange();
    return weightMass * Lw / objDist();
  }
  function getTargetAngle() {
    let Lw = sliderT * beamRange();
    let torque = weightMass * Lw - objectMass * objDist();
    let maxT = max(objectMass * objDist(), weightMass * beamRange());
    if (maxT < 0.001) return 0;
    return constrain(torque / maxT * 0.28, -0.28, 0.28);
  }
  function getMaxRange() {
    return weightMass * beamRange() / objDist();
  }

  // ===== p5.js setup =====
  const ASPECT = 0.7;
  let pivotY;  // computed in setup based on aspect

  function setup() {
    frameRate(30);
    pivotY = 360;
    let container = select("#myContainer");
    let w = int(min(container.width, (window.innerHeight - 200) / ASPECT));
    let h = int(w * ASPECT);
    if (w < 100) { w = 820; h = int(w * ASPECT); }
    myCanvas = createCanvas(w, h);
    myCanvas.parent("myContainer");
    myCanvas.id("myP5Canvas");

    // 物体按钮
    for (let i = 0; i < OBJECTS.length; i++) {
      let btn = select("#obj" + i);
      btn.mouseClicked(() => {
        objectIdx = i;
        objectMass = OBJECTS[i].mass;
        for (let j = 0; j < OBJECTS.length; j++)
          select("#obj" + j).removeClass("active");
        btn.addClass("active");
        updateAll();
      });
    }

    // 提钮位置
    select("#pivotSlider").input(() => {
      pivotX = parseFloat(select("#pivotSlider").value());
      select("#pivotVal").html(pivotX);
      constrainHook();
      updateAll();
    });
    // 初始设挂钩最大值为 pivotX - 25
    select("#hookSlider").attribute("max", pivotX - 25);

    // 挂钩位置
    select("#hookSlider").input(() => {
      hookX = parseFloat(select("#hookSlider").value());
      select("#hookVal").html(hookX);
      updateAll();
    });

    // 秤砣质量
    select("#weightSlider").input(() => {
      weightMass = parseFloat(select("#weightSlider").value());
      select("#weightVal").html(weightMass.toFixed(1));
      updateAll();
    });

    updateAll();
  }

  function constrainHook() {
    let maxHook = pivotX - 25;
    select("#hookSlider").attribute("max", maxHook);
    let hVal = parseFloat(select("#hookSlider").value());
    if (hVal > maxHook) {
      hookX = maxHook;
      select("#hookSlider").value(maxHook);
      select("#hookVal").html(maxHook);
    }
  }

  function windowResized() {
    let container = select("#myContainer");
    let w = int(min(container.width, (window.innerHeight - 200) / ASPECT));
    let h = int(w * ASPECT);
    resizeCanvas(w, h);
  }

  function updateAll() {
    // Keep 秤砣 position reasonable when params change
    let maxT = beamRange();
    if (sliderT * maxT > maxT * 0.95) sliderT = 0.5;
    // Update displays
    let m = getMeasuredMass();
    select("#weightDisplay").html(m.toFixed(2));
    let maxW = getMaxRange();
    select("#rangeDisplay").html("0 ~ " + maxW.toFixed(1) + " 斤");
    select("#formulaL1").html(objDist());
    select("#formulaM2").html(weightMass.toFixed(1) + " 斤");
    select("#formulaL2").html("0 ~ " + nf(beamRange(), 1, 0));
  }

  // ===== draw =====
  function draw() {
    if (touches.length > 1) return;

    let targetAngle = getTargetAngle();
    let diff = targetAngle - beamAngle;
    angleVel += diff * 0.12;
    angleVel *= 0.85;
    beamAngle += angleVel;
    if (abs(beamAngle) < 0.001 && abs(angleVel) < 0.0001) beamAngle = 0;

    if (abs(beamAngle) < 0.004 && abs(angleVel) < 0.002) {
      balanceFrameCount++;
    } else {
      balanceFrameCount = 0;
    }
    isBalanced = balanceFrameCount > 12;

    if (dragging && mouseIsPressed) {
      let v = toVirtual(mouseX, mouseY);
      let localX = beamLocalX(v.x, v.y);
      sliderT = constrain(localX / beamRange(), 0.02, 0.98);
      updateAll();
    }
    if (!mouseIsPressed) dragging = false;

    // ---- 绘制 ----
    background(15, 23, 42);
    push();
    scale(width / 1000);

    drawHandle();

    push();
    translate(pivotX, pivotY);
    rotate(beamAngle);

    drawBeam();
    drawScaleMarks();
    drawWeight();
    drawObject();

    pop();

    drawBalanceIndicator();
    pop();

    updateStatusDisplay();
  }

  // ===== 绘制提纽 =====
  function drawHandle() {
    let ropeLen = 130;
    stroke(180, 150, 100);
    strokeWeight(3);
    line(pivotX, pivotY, pivotX, pivotY - ropeLen);
    noFill();
    stroke(200, 170, 110);
    strokeWeight(4);
    ellipse(pivotX, pivotY - ropeLen - 18, 36, 36);
    noStroke();
    fill(200, 170, 110, 60);
    ellipse(pivotX, pivotY - ropeLen - 18, 18, 18);
  }

  // ===== 绘制秤杆 =====
  function drawBeam() {
    let left = hookX - pivotX;
    let right = BEAM_END_X - pivotX;
    let beamH = 18;

    noStroke();
    for (let i = 0; i < beamH; i++) {
      let t = i / beamH;
      fill(lerp(120, 90, t), lerp(80, 55, t), lerp(40, 25, t));
      rect(left, -beamH/2 + i, right - left, 1);
    }
    stroke(160, 120, 60);
    strokeWeight(1.2);
    noFill();
    rect(left, -beamH/2, right - left, beamH, 2);

    fill(180, 140, 70, 200);
    noStroke();
    rect(left - 2, -beamH/2 - 1, 8, beamH + 2, 2);
    rect(right - 6, -beamH/2 - 1, 8, beamH + 2, 2);

    // 支点标记
    fill(200, 170, 110);
    noStroke();
    triangle(-8, -beamH/2 - 10, 8, -beamH/2 - 10, 0, -beamH/2);
    triangle(-8, beamH/2 + 10, 8, beamH/2 + 10, 0, beamH/2);
  }

  // ===== 绘制秤星 =====
  function drawScaleMarks() {
    let d = objDist();
    if (d < 1) return;
    let maxW = getMaxRange();
    let step;
    if (maxW > 5) step = 1.0;
    else if (maxW > 2) step = 0.5;
    else step = 0.2;

    for (let w = step; w <= maxW + 0.001; w += step) {
      let Lw = w * d / weightMass;
      if (Lw > beamRange()) break;
      let x = Lw;
      let isInt = abs(w - round(w)) < 0.01;
      if (isInt) {
        fill(255, 200, 50);
        noStroke();
        ellipse(x, 0, 10, 10);
        fill(255, 220, 100);
        textSize(20);
        textAlign(CENTER, BOTTOM);
        noStroke();
        text(nf(w, 1, w < 10 ? 0 : 1), x, -16);
      } else {
        fill(200, 160, 60, 200);
        noStroke();
        ellipse(x, 0, 6, 6);
      }
    }
  }

  // ===== 绘制秤砣 =====
  function drawWeight() {
    let x = sliderT * beamRange();
    let stringLen = 30;

    stroke(180, 150, 100);
    strokeWeight(2);
    line(x, 0, x, stringLen);

    push();
    translate(x, stringLen);

    noStroke();
    fill(80, 60, 40);
    beginShape();
    vertex(-20, 0); vertex(-22, 10); vertex(-18, 28);
    vertex(-8, 38); vertex(8, 38); vertex(18, 28);
    vertex(22, 10); vertex(20, 0);
    endShape(CLOSE);

    fill(120, 90, 60, 120);
    beginShape();
    vertex(-10, 2); vertex(-16, 12); vertex(-12, 26);
    vertex(-4, 34); vertex(0, 34); vertex(0, 2);
    endShape(CLOSE);

    fill(180, 150, 80);
    noStroke();
    ellipse(0, -2, 14, 10);
    ellipse(0, -4, 8, 6);

    fill(200, 170, 100);
    textSize(12);
    textAlign(CENTER, CENTER);
    text("秤砣", 0, 22);
    pop();

    if (mouseInWeightRegion(x)) {
      noFill();
      stroke(255, 200, 50, 100);
      strokeWeight(2);
      ellipse(x, stringLen + 19, 56, 56);
    }
  }

  function mouseInWeightRegion(wx) {
    let v = toVirtual(mouseX, mouseY);
    let localX = beamLocalX(v.x, v.y);
    return abs(localX - wx) < 50 && abs(v.y - pivotY) < 80;
  }

  // ===== 绘制物体 =====
  function drawObject() {
    let x = hookX - pivotX;
    let hookLen = 50;
    let obj = OBJECTS[objectIdx];
    let oy = hookLen + 18;

    stroke(180, 150, 100);
    strokeWeight(2);
    line(x, 0, x, hookLen);

    noFill();
    stroke(160, 130, 80);
    strokeWeight(3);
    arc(x + 8, hookLen + 5, 16, 16, PI, TWO_PI);

    noStroke();
    let cols = [
      [180, 140, 60], [200, 90, 90], [200, 180, 80],
      [70, 130, 180], [60, 160, 80]
    ];
    let col = cols[objectIdx];
    fill(col[0], col[1], col[2], 220);
    beginShape();
    vertex(x - 28, oy); vertex(x - 30, oy + 40);
    vertex(x - 20, oy + 54); vertex(x + 20, oy + 54);
    vertex(x + 30, oy + 40); vertex(x + 28, oy);
    endShape(CLOSE);

    stroke(180, 150, 100);
    strokeWeight(2);
    noFill();
    arc(x, oy - 2, 30, 10, PI, TWO_PI);

    fill(255, 240);
    textSize(26);
    textAlign(CENTER, CENTER);
    noStroke();
    text(obj.icon, x, oy + 24);

    fill(255, 220, 100, 200);
    textSize(14);
    textAlign(CENTER, BOTTOM);
    text(obj.mass.toFixed(1) + "斤", x, oy + 58);
  }

  // ===== 平衡指示 =====
  function drawBalanceIndicator() {
    if (isBalanced) {
      noStroke();
      fill(34, 197, 94, 180);
      ellipse(pivotX, pivotY - 180, 40, 40);
      fill(255);
      textSize(24);
      textAlign(CENTER, CENTER);
      text("✓", pivotX, pivotY - 180);
    }
  }

  // ===== 状态更新 =====
  function updateStatusDisplay() {
    let el = select("#balanceStatus");
    if (isBalanced) {
      el.html("✅ 平衡！");
      el.style("color", "#22c55e");
    } else {
      let Lw = sliderT * beamRange();
      let torque = weightMass * Lw - objectMass * objDist();
      if (torque > 0.5) el.html("← 向左移动秤砣");
      else if (torque < -0.5) el.html("→ 向右移动秤砣");
      else el.html("⚖ 拖动秤砣使杆秤平衡");
      el.style("color", "#94a3b8");
    }
  }

  // ===== 交互 =====
  function mousePressed() {
    let v = toVirtual(mouseX, mouseY);
    let wx = sliderT * beamRange();
    let dx = v.x - pivotX;
    let dy = v.y - pivotY;
    let localX = dx * cos(-beamAngle) - dy * sin(-beamAngle);
    let localY = dx * sin(-beamAngle) + dy * cos(-beamAngle);

    if (abs(localX - wx) < 50 && abs(localY) < 60) {
      dragging = true;
      return false;
    }
    let hx = hookX - pivotX;
    if (abs(localX - hx) < 50 && abs(localY) < 80) {
      objectIdx = (objectIdx + 1) % OBJECTS.length;
      objectMass = OBJECTS[objectIdx].mass;
      for (let j = 0; j < OBJECTS.length; j++)
        select("#obj" + j).removeClass("active");
      select("#obj" + objectIdx).addClass("active");
      updateAll();
      return false;
    }
  }

  function mouseReleased() { dragging = false; }
  function touchStarted() { return mousePressed(); }
  function touchEnded() { mouseReleased(); }
  </script>
  <script src="supabase.js"></script>
  <script src="script.js"></script>
</body>
