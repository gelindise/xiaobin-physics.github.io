<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>杆秤 - 物理虚拟实验</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <script src="protect.js"></script>
  <style>
    :root {
      --primary: #d97706;
      --primary-dark: #92400e;
      --bg-dark: #0b1120;
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --glass-border: rgba(148, 163, 184, 0.12);
      --card-bg: rgba(15, 23, 42, 0.6);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-dark);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }
    .particle-bg {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 30% 40%, rgba(217,119,6,0.06) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 60%, rgba(217,119,6,0.04) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.6rem 2rem;
      background: rgba(11, 17, 32, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--glass-border);
    }
    header .logo { font-size: 1.1rem; font-weight: 700; }
    header .logo a { color: var(--text-main); text-decoration: none; }
    header nav a {
      color: var(--text-muted); text-decoration: none; font-size: 0.85rem;
      padding: 0.4rem 1rem; border-radius: 8px; transition: all 0.3s;
    }
    header nav a:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .main-wrap {
      position: relative; z-index: 1;
      max-width: 960px; margin: 1.2rem auto; padding: 0 1rem;
    }
    .main-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 1.5rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .main-card h2 {
      text-align: center; font-size: 1.3rem; margin-bottom: 0.6rem;
      background: linear-gradient(135deg, var(--primary), #f59e0b);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #divFull {
      background: #0f172a;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    #myContainer { text-align: center; position: relative; }
    #myP5Canvas { display: block; margin: 0 auto; max-width: 100%; touch-action: none; }
    .flexContainer {
      display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
      gap: 0.5rem; padding: 0.65rem 0.75rem;
      background: rgba(0,0,0,0.25);
    }
    .flexItem { display: flex; align-items: center; gap: 0.3rem; }
    .flexContainer button {
      height: 36px; padding: 0 14px; font-size: 0.85rem;
      border: 1px solid var(--glass-border); border-radius: 8px;
      background: rgba(255,255,255,0.06); color: var(--text-main);
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .flexContainer button:hover { background: rgba(255,255,255,0.12); }
    .flexContainer button.active {
      background: rgba(217,119,6,0.25);
      border-color: var(--primary);
    }
    .flexContainer label { font-size: 0.85rem; cursor: pointer; user-select: none; }
    .flexContainer input[type="range"] {
      width: 140px; accent-color: var(--primary); cursor: pointer;
    }
    .readout-bar {
      display: flex; align-items: center; justify-content: center;
      gap: 1.5rem; padding: 0.5rem 1rem;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid var(--glass-border);
      font-size: 0.9rem;
    }
    .readout-bar .value {
      font-weight: 700; font-size: 1.4rem;
      background: linear-gradient(135deg, var(--primary), #f59e0b);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .readout-bar .balanced { color: #22c55e; -webkit-text-fill-color: #22c55e; }
    .readout-bar .unbalanced { color: #ef4444; -webkit-text-fill-color: #ef4444; }
    .info-section {
      margin-top: 1.2rem; padding: 1rem 1.2rem;
      background: rgba(0,0,0,0.15); border-radius: 12px;
      border: 1px solid var(--glass-border);
    }
    .info-section h3 { font-size: 1rem; color: var(--primary); margin-bottom: 0.5rem; }
    .info-section p, .info-section li {
      font-size: 0.85rem; color: var(--text-muted); line-height: 1.7;
    }
    .info-section ul { padding-left: 1.2rem; }
    .formula-bar {
      display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
      gap: 1.5rem; padding: 0.8rem 1rem; margin-top: 1rem;
      background: rgba(0,0,0,0.2); border-radius: 10px;
      font-size: 0.9rem; color: var(--text-muted);
      border: 1px solid var(--glass-border);
    }
    .formula-bar .formula-item { text-align: center; }
    .formula-bar .formula-item .label { display: block; font-size: 0.75rem; color: var(--text-muted); }
    .formula-bar .formula-item .value { display: block; font-size: 0.95rem; color: var(--text-main); font-weight: 600; }
    @media (max-width: 640px) {
      header { padding: 0.5rem 1rem; }
      .main-wrap { margin: 0.6rem auto; }
      .main-card { padding: 0.6rem; border-radius: 14px; }
      .flexContainer { gap: 0.3rem; padding: 0.4rem; }
      .flexContainer button { font-size: 0.75rem; padding: 0 8px; height: 30px; }
      .readout-bar { flex-wrap: wrap; gap: 0.5rem; font-size: 0.8rem; }
      .readout-bar .value { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <div class="particle-bg"></div>
  <header>
    <div class="logo"><a href="index.html">⚖ 物理虚拟实验</a></div>
    <nav>
      <a href="experiments.html">实验列表</a>
      <a href="vip.html">VIP</a>
    </nav>
  </header>

  <div class="main-wrap">
    <div class="main-card">
      <h2>传统杆秤 · 杠杆原理</h2>

      <div id="divFull">
        <div id="myContainer"></div>
        <div class="readout-bar" id="readoutBar">
          <span>测量结果：<span class="value" id="weightDisplay">0.00</span> 斤</span>
          <span id="balanceStatus" style="font-size:0.85rem;">⚖ 拖动秤砣使杆秤平衡</span>
        </div>
        <div class="flexContainer">
          <span style="font-size:0.82rem;color:var(--text-muted);">物体：</span>
          <div class="flexItem"><button id="obj0" class="active">🎒 1.0斤</button></div>
          <div class="flexItem"><button id="obj1">🥩 2.0斤</button></div>
          <div class="flexItem"><button id="obj2">🥚 0.8斤</button></div>
          <div class="flexItem"><button id="obj3">🪣 2.5斤</button></div>
          <div class="flexItem"><button id="obj4">🍉 1.5斤</button></div>
          <div class="flexItem" style="margin-left:8px;">
            <input type="range" id="massSlider" min="0.2" max="3.4" step="0.1" value="1.0">
          </div>
        </div>
      </div>

      <div class="info-section">
        <h3>实验说明</h3>
        <ul>
          <li><strong>拖动秤砣</strong>左右移动，观察杆秤倾斜变化</li>
          <li>当杆秤<strong>水平平衡</strong>时，读取秤星上的刻度或数字显示</li>
          <li>点击上方按钮切换不同物体，或用滑块自定义重量</li>
          <li>杆秤利用<strong>杠杆原理</strong>：物体重量 × 物距 = 秤砣重量 × 砣距</li>
        </ul>
      </div>

      <div class="formula-bar">
        <div class="formula-item">
          <span class="label">原理</span>
          <span class="value">m₁ × L₁ = m₂ × L₂</span>
        </div>
        <div class="formula-item">
          <span class="label">秤砣重量</span>
          <span class="value">1 斤</span>
        </div>
        <div class="formula-item">
          <span class="label">量程</span>
          <span class="value">0.2 ~ 3.4 斤</span>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/p5.min.js"></script>
  <script>
  /* ============================================================
     传统杆秤模拟 — 杠杆原理交互仿真
     ============================================================ */

  // ===== 常量 =====
  const PIVOT_X = 240;           // 支点虚拟X
  const PIVOT_Y = 360;           // 支点虚拟Y（aspect 0.7 时居中偏上）
  const HOOK_X = 50;             // 挂钩X（左端）
  const BEAM_END_X = 940;        // 秤杆右端X
  const OBJ_DIST = PIVOT_X - HOOK_X;  // 物距 = 190
  const BEAM_RANGE = BEAM_END_X - PIVOT_X;  // 砣距范围 = 700
  const WEIGHT_MASS = 1.0;       // 秤砣重量（斤）
  const MAX_ANGLE = 0.28;        // 最大倾斜（弧度 ≈ 16°）

  // ===== 预设物体 =====
  const OBJECTS = [
    { name: '一袋大米', mass: 1.0, icon: '🎒', emoji: '🟤' },
    { name: '一块猪肉', mass: 2.0, icon: '🥩', emoji: '🔴' },
    { name: '一篮鸡蛋', mass: 0.8, icon: '🥚', emoji: '🟡' },
    { name: '一桶水',   mass: 2.5, icon: '🪣', emoji: '🔵' },
    { name: '一个西瓜', mass: 1.5, icon: '🍉', emoji: '🟢' },
  ];

  // ===== 状态 =====
  let objectIdx = 0;
  let objectMass = 1.0;
  let sliderT = 0.27;
  let beamAngle = 0;
  let angleVel = 0;
  let dragging = false;
  let balanceFrameCount = 0;
  let isBalanced = false;

  // ===== 工具：虚拟坐标 ↔ 屏幕坐标 =====
  function toVirtual(mx, my) {
    return { x: mx * 1000 / width, y: my * 1000 / width };
  }
  function beamLocalX(vx, vy) {
    let dx = vx - PIVOT_X;
    let dy = vy - PIVOT_Y;
    return dx * cos(-beamAngle) - dy * sin(-beamAngle);
  }

  // ===== 获取测量值 =====
  function getMeasuredMass() {
    let Lw = sliderT * BEAM_RANGE;
    return WEIGHT_MASS * Lw / OBJ_DIST;
  }

  // ===== 计算目标角度 (基于扭矩不平衡) =====
  function getTargetAngle() {
    let Lw = sliderT * BEAM_RANGE;
    let torque = objectMass * OBJ_DIST - WEIGHT_MASS * Lw;
    let maxT = max(objectMass * OBJ_DIST, WEIGHT_MASS * BEAM_RANGE);
    if (maxT < 0.001) return 0;
    let ratio = torque / maxT;
    return constrain(ratio * MAX_ANGLE, -MAX_ANGLE, MAX_ANGLE);
  }

  // ===== p5.js setup =====
  function setup() {
    frameRate(30);
    let container = select("#myContainer");
    let aspect = 0.7;
    let w = int(min(container.width, (window.innerHeight - 200) / aspect));
    let h = int(w * aspect);
    if (w < 100) { w = 820; h = int(w * aspect); }
    myCanvas = createCanvas(w, h);
    myCanvas.parent("myContainer");
    myCanvas.id("myP5Canvas");

    // 物体按钮绑定
    for (let i = 0; i < OBJECTS.length; i++) {
      let btn = select("#obj" + i);
      btn.mouseClicked(() => {
        objectIdx = i;
        objectMass = OBJECTS[i].mass;
        // 更新按钮高亮
        for (let j = 0; j < OBJECTS.length; j++) {
          select("#obj" + j).removeClass("active");
        }
        btn.addClass("active");
        // 更新滑块
        select("#massSlider").value(objectMass);
        updateDisplay();
      });
    }

    // 自定义重量滑块
    select("#massSlider").input(() => {
      objectMass = parseFloat(select("#massSlider").value());
      // 找到最近预设
      let nearest = 0;
      for (let i = 0; i < OBJECTS.length; i++) {
        if (abs(OBJECTS[i].mass - objectMass) < abs(OBJECTS[nearest].mass - objectMass))
          nearest = i;
      }
      for (let j = 0; j < OBJECTS.length; j++)
        select("#obj" + j).removeClass("active");
      if (abs(OBJECTS[nearest].mass - objectMass) < 0.05)
        select("#obj" + nearest).addClass("active");
      updateDisplay();
    });

    updateDisplay();
  }

  // ===== 窗口缩放 =====
  function windowResized() {
    let container = select("#myContainer");
    let aspect = 0.7;
    let w = int(min(container.width, (window.innerHeight - 200) / aspect));
    let h = int(w * aspect);
    resizeCanvas(w, h);
  }

  // ===== 更新显示 =====
  function updateDisplay() {
    let m = getMeasuredMass();
    select("#weightDisplay").html(m.toFixed(2));
  }

  // ===== draw =====
  function draw() {
    if (touches.length > 1) return;

    // ---- 物理更新 ----
    let targetAngle = getTargetAngle();
    // 弹簧-阻尼系统
    let diff = targetAngle - beamAngle;
    angleVel += diff * 0.12;
    angleVel *= 0.85;   // 阻尼
    beamAngle += angleVel;
    // 微小角度钳位
    if (abs(beamAngle) < 0.001 && abs(angleVel) < 0.0001) beamAngle = 0;

    // 平衡检测
    if (abs(diff) < 0.005 && abs(angleVel) < 0.005) {
      balanceFrameCount++;
    } else {
      balanceFrameCount = 0;
    }
    isBalanced = balanceFrameCount > 8;

    // 拖动更新
    if (dragging && mouseIsPressed) {
      let v = toVirtual(mouseX, mouseY);
      let localX = beamLocalX(v.x, v.y);
      let newT = constrain((localX) / BEAM_RANGE, 0.02, 0.98);
      sliderT = newT;
      updateDisplay();
    }
    if (!mouseIsPressed) dragging = false;

    // ---- 绘制 ----
    background(15, 23, 42);

    push();
    scale(width / 1000);  // 统一缩放至 1000×1000 虚拟坐标

    // -------- 不旋转的部分 --------
    // 提纽（手柄线 + 环）
    drawHandle();

    // -------- 旋转部分（杆秤整体）--------
    push();
    translate(PIVOT_X, PIVOT_Y);
    rotate(beamAngle);

    // 秤杆（木梁）
    drawBeam();

    // 秤星（刻度标记）
    drawScaleMarks();

    // 秤砣
    drawWeight();

    // 挂钩 + 物体
    drawObject();

    pop(); // 结束旋转

    // -------- 覆盖层 --------
    // 数字标注（在秤杆附近显示当前砣距对应的重量）
    drawWeightLabels();

    // 平衡指示
    drawBalanceIndicator();

    pop(); // 结束缩放

    // -------- HTML覆盖显示 --------
    updateStatusDisplay();
  }

  // ===== 绘制提纽（手柄）=====
  function drawHandle() {
    // 从支点向上的绳子
    let ropeLen = 130;
    stroke(180, 150, 100);
    strokeWeight(3);
    line(PIVOT_X, PIVOT_Y, PIVOT_X, PIVOT_Y - ropeLen);

    // 顶部的环
    noFill();
    stroke(200, 170, 110);
    strokeWeight(4);
    ellipse(PIVOT_X, PIVOT_Y - ropeLen - 18, 36, 36);
    // 环的内部高光
    noStroke();
    fill(200, 170, 110, 60);
    ellipse(PIVOT_X, PIVOT_Y - ropeLen - 18, 18, 18);
  }

  // ===== 绘制秤杆 =====
  function drawBeam() {
    let left = -(PIVOT_X - HOOK_X);
    let right = BEAM_END_X - PIVOT_X;
    let beamH = 18;

    // 秤杆主体渐变（木纹棕色）
    noStroke();
    for (let i = 0; i < beamH; i++) {
      let t = i / beamH;
      let r = lerp(120, 90, t);
      let g = lerp(80, 55, t);
      let b = lerp(40, 25, t);
      fill(r, g, b);
      rect(left, -beamH/2 + i, right - left, 1);
    }

    // 秤杆边缘
    stroke(160, 120, 60);
    strokeWeight(1.2);
    noFill();
    rect(left, -beamH/2, right - left, beamH, 2);

    // 秤杆两头包铜
    fill(180, 140, 70, 200);
    noStroke();
    rect(left - 2, -beamH/2 - 1, 8, beamH + 2, 2);
    rect(right - 6, -beamH/2 - 1, 8, beamH + 2, 2);

    // 支点标记（小三角）
    fill(200, 170, 110);
    noStroke();
    triangle(-6, -beamH/2 - 8, 6, -beamH/2 - 8, 0, -beamH/2);
    triangle(-6, beamH/2 + 8, 6, beamH/2 + 8, 0, beamH/2);
  }

  // ===== 绘制秤星（刻度标记）=====
  function drawScaleMarks() {
    let spacing = 0.2;  // 每0.2斤一个刻度
    let maxMark = 3.4;  // 最大刻度
    let markSize = 5;

    for (let w = spacing; w <= maxMark + 0.01; w += spacing) {
      // 位置: L_weight = w * OBJ_DIST / WEIGHT_MASS
      let Lw = w * OBJ_DIST / WEIGHT_MASS;
      if (Lw > BEAM_RANGE) break;

      let x = Lw;
      let isMajor = abs(w - round(w)) < 0.01;  // 整数斤
      let isHalf = abs(w - round(w*2)/2) < 0.01 && !isMajor;  // 半斤

      if (isMajor) {
        // 大刻度 — 金色大圆点
        fill(255, 200, 50);
        noStroke();
        ellipse(x, 0, markSize + 4, markSize + 4);
        // 数字
        fill(255, 220, 100);
        textSize(22);
        textAlign(CENTER, TOP);
        noStroke();
        text(w + "", x, 16);
      } else if (isHalf) {
        // 中刻度
        fill(200, 160, 60);
        noStroke();
        ellipse(x, 0, markSize + 1, markSize + 1);
      } else {
        // 小刻度
        fill(160, 130, 60, 180);
        noStroke();
        ellipse(x, 0, markSize, markSize);
      }
    }
  }

  // ===== 绘制秤砣 =====
  function drawWeight() {
    let x = sliderT * BEAM_RANGE;
    // 秤砣挂在秤杆下方
    let stringLen = 30;
    // 绳子
    stroke(180, 150, 100);
    strokeWeight(2);
    line(x, 0, x, stringLen);

    // 秤砣本体（传统钟形）
    let wx = x, wy = stringLen;
    push();
    translate(wx, wy);

    // 铃铛形的秤砣
    noStroke();
    // 主体
    fill(80, 60, 40);  // 深棕色铸铁
    beginShape();
    vertex(-20, 0);
    vertex(-22, 10);
    vertex(-18, 28);
    vertex(-8, 38);
    vertex(8, 38);
    vertex(18, 28);
    vertex(22, 10);
    vertex(20, 0);
    endShape(CLOSE);

    // 金属光泽
    fill(120, 90, 60, 120);
    beginShape();
    vertex(-10, 2);
    vertex(-16, 12);
    vertex(-12, 26);
    vertex(-4, 34);
    vertex(0, 34);
    vertex(0, 2);
    endShape(CLOSE);

    // 顶部圆环
    fill(180, 150, 80);
    noStroke();
    ellipse(0, -2, 14, 10);
    ellipse(0, -4, 8, 6);

    // 底部标记
    fill(200, 170, 100);
    textSize(12);
    textAlign(CENTER, CENTER);
    text("1斤", 0, 22);

    pop();

    // 秤砣悬停高亮（拖动提示）
    if (mouseInWeightRegion(x)) {
      noFill();
      stroke(255, 200, 50, 100);
      strokeWeight(2);
      ellipse(x, stringLen + 19, 56, 56);
    }
  }

  function mouseInWeightRegion(wx) {
    let v = toVirtual(mouseX, mouseY);
    let localX = beamLocalX(v.x, v.y);
    return abs(localX - wx) < 40 && abs(v.y - PIVOT_Y) < 80;
  }

  // ===== 绘制挂钩 + 物体 =====
  function drawObject() {
    let x = -(PIVOT_X - HOOK_X);
    let hookLen = 50;

    // 挂钩绳子
    stroke(180, 150, 100);
    strokeWeight(2);
    line(x, 0, x, hookLen);

    // 挂钩
    noFill();
    stroke(160, 130, 80);
    strokeWeight(3);
    arc(x + 8, hookLen + 5, 16, 16, PI, TWO_PI);

    // 物体本体
    let obj = OBJECTS[objectIdx];
    let oy = hookLen + 18;

    // 物体袋子/包裹
    noStroke();
    // 包裹主体
    let col = [
      [180, 140, 60],   // 大米
      [200, 90, 90],    // 猪肉
      [200, 180, 80],   // 鸡蛋
      [70, 130, 180],   // 水
      [60, 160, 80],    // 西瓜
    ][objectIdx];

    fill(col[0], col[1], col[2], 220);
    beginShape();
    vertex(x - 28, oy);
    vertex(x - 30, oy + 40);
    vertex(x - 20, oy + 54);
    vertex(x + 20, oy + 54);
    vertex(x + 30, oy + 40);
    vertex(x + 28, oy);
    endShape(CLOSE);

    // 扎口绳子
    stroke(180, 150, 100);
    strokeWeight(2);
    noFill();
    arc(x, oy - 2, 30, 10, PI, TWO_PI);

    // 物体上的图标文字
    fill(255, 240);
    textSize(26);
    textAlign(CENTER, CENTER);
    noStroke();
    text(obj.icon, x, oy + 24);

    // 重量标签
    fill(255, 220, 100, 200);
    textSize(14);
    textAlign(CENTER, BOTTOM);
    text(obj.mass.toFixed(1) + "斤", x, oy + 58);
  }

  // ===== 绘制秤杆上方的重量标尺标注 =====
  function drawWeightLabels() {
    let alpha = isBalanced ? 180 : 60;
    push();
    translate(PIVOT_X, PIVOT_Y);
    rotate(beamAngle);
    for (let w = 0.5; w <= 3.0; w += 0.5) {
      let Lw = w * OBJ_DIST / WEIGHT_MASS;
      if (Lw > BEAM_RANGE) break;
      fill(255, 220, 100, alpha);
      noStroke();
      textSize(17);
      textAlign(CENTER, BOTTOM);
      text(w + "斤", Lw, -14);
    }
    pop();
  }

  // ===== 绘制平衡指示器 =====
  function drawBalanceIndicator() {
    if (isBalanced) {
      // 绿色平衡标记
      noStroke();
      fill(34, 197, 94, 180);
      ellipse(PIVOT_X, PIVOT_Y - 180, 40, 40);
      fill(255);
      textSize(24);
      textAlign(CENTER, CENTER);
      text("✓", PIVOT_X, PIVOT_Y - 180);
    }
  }

  // ===== 更新状态显示 =====
  function updateStatusDisplay() {
    let el = select("#balanceStatus");
    if (isBalanced) {
      el.html("✅ 平衡！读取测量结果");
      el.style("color", "#22c55e");
    } else {
      let Lw = sliderT * BEAM_RANGE;
      let torque = objectMass * OBJ_DIST - WEIGHT_MASS * Lw;
      if (torque > 0.5) el.html("⬅ 物体太重，向右移动秤砣");
      else if (torque < -0.5) el.html("➡ 物体太轻，向左移动秤砣");
      else el.html("⚖ 拖动秤砣使杆秤平衡");
      el.style("color", "#94a3b8");
    }

    let m = getMeasuredMass();
    select("#weightDisplay").html(m.toFixed(2));
  }

  // ===== 鼠标/触摸交互 =====
  function mousePressed() {
    let v = toVirtual(mouseX, mouseY);
    let wx = sliderT * BEAM_RANGE;   // 秤砣在beam-local坐标中的X
    let dx = v.x - PIVOT_X;
    let dy = v.y - PIVOT_Y;
    let localX = dx * cos(-beamAngle) - dy * sin(-beamAngle);
    let localY = dx * sin(-beamAngle) + dy * cos(-beamAngle);
    // 检查是否点击到秤砣区域
    if (abs(localX - wx) < 50 && abs(localY) < 60) {
      dragging = true;
      return false;
    }
    // 检查是否点击到挂钩物体区域
    let hx = -(PIVOT_X - HOOK_X);
    if (abs(localX - hx) < 50 && abs(localY) < 80) {
      // 点击物体可循环切换
      objectIdx = (objectIdx + 1) % OBJECTS.length;
      objectMass = OBJECTS[objectIdx].mass;
      for (let j = 0; j < OBJECTS.length; j++)
        select("#obj" + j).removeClass("active");
      select("#obj" + objectIdx).addClass("active");
      select("#massSlider").value(objectMass);
      updateDisplay();
      return false;
    }
  }

  function mouseReleased() {
    dragging = false;
  }

  // 触摸支持
  function touchStarted() { return mousePressed(); }
  function touchEnded() { mouseReleased(); }
  </script>
  <script src="supabase.js"></script>
  <script src="script.js"></script>
</body>
</html>
