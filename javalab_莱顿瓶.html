<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>莱顿瓶 - 物理虚拟实验</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <script src="protect.js"></script>
  <style>
    :root {
      --primary: #3b82f6;
      --primary-dark: #1e40af;
      --bg-dark: #0b1120;
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --glass-border: rgba(148, 163, 184, 0.12);
      --card-bg: rgba(15, 23, 42, 0.6);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-dark);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }
    .particle-bg {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.06) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 50%, rgba(99,102,241,0.06) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }

    header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.6rem 2rem;
      background: rgba(11, 17, 32, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--glass-border);
    }
    header .logo { font-size: 1.1rem; font-weight: 700; }
    header .logo a { color: var(--text-main); text-decoration: none; }
    header nav a {
      color: var(--text-muted); text-decoration: none; font-size: 0.85rem;
      padding: 0.4rem 1rem; border-radius: 8px; transition: all 0.3s;
    }
    header nav a:hover { color: #fff; background: rgba(255,255,255,0.05); }

    .main-wrap {
      position: relative; z-index: 1;
      max-width: 1000px; margin: 1.5rem auto; padding: 0 1rem;
    }
    .main-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 1.5rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .main-card h2 {
      text-align: center; font-size: 1.3rem; margin-bottom: 1rem;
      background: linear-gradient(135deg, var(--primary), #818cf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #divFull {
      background: #0f172a;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    #myContainer {
      text-align: center;
      position: relative;
    }
    #myP5Canvas {
      display: block;
      margin: 0 auto;
      max-width: 100%;
      touch-action: pinch-zoom;
    }
    .flexContainer {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem;
      background: rgba(0,0,0,0.2);
    }
    .flexItem {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .flexContainer button {
      height: 36px;
      padding: 0 14px;
      font-size: 0.85rem;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .flexContainer button:hover {
      background: rgba(255,255,255,0.12);
    }
    .flexContainer input[type="checkbox"] {
      width: 18px; height: 18px;
      cursor: pointer;
      accent-color: var(--primary);
    }
    .flexContainer label {
      font-size: 0.85rem;
      cursor: pointer;
      user-select: none;
    }
    .flexContainer input[type="radio"] {
      width: 16px; height: 16px;
      cursor: pointer;
      accent-color: var(--primary);
      margin: 0;
    }
    .flexContainer span label {
      font-size: 0.85rem;
      margin-right: 6px;
    }

    .fullscreen-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      cursor: pointer;
      transition: all 0.2s;
    }
    .fullscreen-btn:hover { background: rgba(255,255,255,0.12); }
    .fullscreen-btn svg { fill: var(--text-muted); width: 20px; height: 20px; }

    .info-section {
      margin-top: 1.5rem;
      padding: 1rem 1.2rem;
      background: rgba(0,0,0,0.15);
      border-radius: 12px;
      border: 1px solid var(--glass-border);
    }
    .info-section h3 {
      font-size: 1rem;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }
    .info-section p, .info-section li {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.7;
    }
    .info-section ul { padding-left: 1.2rem; }

    .formula-bar {
      text-align: center;
      padding: 1rem;
      margin-top: 1rem;
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      font-size: 0.9rem;
      color: var(--text-muted);
      border: 1px solid var(--glass-border);
    }
    .formula-bar strong { color: var(--text-main); }

    @media (max-width: 640px) {
      header { padding: 0.5rem 1rem; }
      .main-wrap { margin: 0.8rem auto; }
      .main-card { padding: 0.8rem; border-radius: 14px; }
      .flexContainer { gap: 0.3rem; padding: 0.5rem; }
      .flexContainer button { font-size: 0.78rem; padding: 0 10px; height: 32px; }
    }
    /* === Quiz Challenge Styles === */
    .quiz-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0 14px;
      height: 36px;
      font-size: 0.85rem;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #fff;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      font-weight: 600;
    }
    .quiz-btn:hover { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
    .quiz-btn svg { width: 16px; height: 16px; fill: currentColor; vertical-align: middle; margin-right: 0.2rem; }

    .quiz-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }
    .quiz-overlay.active { display: flex; }
    .quiz-panel {
      background: #0f172a;
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 2rem;
      max-width: 560px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    }
    .quiz-panel::-webkit-scrollbar { width: 6px; }
    .quiz-panel::-webkit-scrollbar-track { background: transparent; }
    .quiz-panel::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.3); border-radius: 3px; }

    .quiz-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 32px;
      height: 32px;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: all 0.2s;
    }
    .quiz-close:hover { background: rgba(255,255,255,0.12); color: #fff; }

    .quiz-title {
      font-size: 1.3rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.25rem;
      background: linear-gradient(135deg, #f59e0b, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .quiz-subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }
    .quiz-progress {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .quiz-progress-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(148,163,184,0.2);
      border: 1px solid var(--glass-border);
      transition: all 0.3s;
    }
    .quiz-progress-dot.active { background: #f59e0b; border-color: #f59e0b; }
    .quiz-progress-dot.correct { background: #22c55e; border-color: #22c55e; }
    .quiz-progress-dot.wrong { background: #ef4444; border-color: #ef4444; }

    .quiz-question-number {
      text-align: center;
      color: var(--primary);
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    .quiz-question-text {
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
      text-align: center;
      color: var(--text-main);
    }
    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .quiz-option {
      padding: 0.8rem 1rem;
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      font-size: 0.9rem;
      line-height: 1.4;
    }
    .quiz-option:hover { background: rgba(255,255,255,0.08); border-color: rgba(148,163,184,0.3); }
    .quiz-option.selected { border-color: #3b82f6; background: rgba(59,130,246,0.15); }
    .quiz-option.correct { border-color: #22c55e; background: rgba(34,197,94,0.15); }
    .quiz-option.wrong { border-color: #ef4444; background: rgba(239,68,68,0.15); }
    .quiz-option.disabled { pointer-events: none; opacity: 0.6; }

    .quiz-explanation {
      margin-top: 1rem;
      padding: 1rem;
      background: rgba(59,130,246,0.08);
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 10px;
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.6;
      display: none;
    }
    .quiz-explanation.show { display: block; }

    .quiz-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.5rem;
      gap: 0.5rem;
    }
    .quiz-nav-btn {
      padding: 0.6rem 1.5rem;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      color: var(--text-main);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .quiz-nav-btn:hover { background: rgba(255,255,255,0.12); }
    .quiz-nav-btn.primary {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border-color: transparent;
      color: #fff;
      font-weight: 600;
    }
    .quiz-nav-btn.primary:hover { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
    .quiz-nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .quiz-level-select { text-align: center; }
    .quiz-level-card {
      display: inline-block;
      padding: 1.5rem 2rem;
      margin: 0.5rem;
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      transition: all 0.3s;
      min-width: 150px;
    }
    .quiz-level-card:hover {
      background: rgba(255,255,255,0.08);
      border-color: #f59e0b;
      transform: translateY(-2px);
    }
    .quiz-level-card.locked { opacity: 0.4; cursor: not-allowed; }
    .quiz-level-card.locked:hover { transform: none; border-color: var(--glass-border); background: rgba(255,255,255,0.04); }
    .quiz-level-card h4 { font-size: 1.1rem; margin-bottom: 0.3rem; color: var(--text-main); }
    .quiz-level-card p { font-size: 0.8rem; color: var(--text-muted); }
    .quiz-stars { margin-top: 0.5rem; font-size: 1.3rem; }
    .quiz-stars .star { color: rgba(148,163,184,0.3); }
    .quiz-stars .star.filled { color: #f59e0b; }

    .quiz-result { text-align: center; }
    .quiz-result h3 { font-size: 1.4rem; margin-bottom: 0.5rem; color: var(--text-main); }
    .quiz-result .big-stars { font-size: 2rem; margin: 1rem 0; }
    .quiz-result p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.3rem; }

    @media (max-width: 640px) {
      .quiz-panel { padding: 1.2rem; border-radius: 14px; }
      .quiz-level-card { padding: 1rem 1.5rem; min-width: 120px; }
    }
  </style>
  <script src="auth-check.js"></script>
  <script src="supabase.js"></script>
</head>
<body>
  <div class="particle-bg"></div>

  <header>
    <div class="logo"><a href="index.html">⚛ 物理虚拟实验</a></div>
    <nav>
      <a href="experiments.html">实验列表</a>
      <a href="vip.html">VIP</a>
    </nav>
  </header>

  <div class="main-wrap">
    <div class="main-card">
      <h2>莱顿瓶 — 静电存储实验</h2>

      <div id="divFull">
        <div id="myContainer"></div>
        <div class="flexContainer">
          <div class="flexItem"><input type="checkbox" id="checkA" checked><label id="chalkA" for="checkA"></label></div>
          <div class="flexItem"><input type="checkbox" id="checkPause"><label id="chalkPause" for="checkPause">暂停</label></div>
          <div class="flexItem"><span id="radioA"></span></div>
          <div class="flexItem">
            <button class="quiz-btn" onclick="openQuiz()" title="检验你对莱顿瓶和静电存储的掌握程度"><svg viewBox="0 0 24 24"><path d="M11 15h2v2h-2v-2zm0-8h2v6h-2V7zm1-5C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>过关挑战</button>
          </div>
          <div class="flexItem">
            <span onclick="doFullScreen()" class="fullscreen-btn" title="全屏">
              <svg viewBox="0 0 520 520"><g transform="translate(-2598 -260)"><rect x="2650" y="312" width="156" height="52"/><rect x="2650" y="364" width="52" height="78"/><rect x="0" y="0" width="156" height="52" transform="matrix(-1 0 0 1 3066 312)"/><rect x="0" y="0" width="52" height="78" transform="matrix(-1 0 0 1 3066 364)"/><rect x="0" y="0" width="156" height="52" transform="matrix(1 0 0 -1 2650 623)"/><rect x="0" y="0" width="52" height="78" transform="matrix(1 0 0 -1 2650 571)"/><rect x="2910" y="571" width="156" height="52"/><rect x="3014" y="493" width="52" height="78"/><rect x="2650" y="675" width="104" height="52"/><rect x="2806" y="675" width="104" height="52"/><rect x="2962" y="675" width="104" height="52"/></g></svg>
            </span>
          </div>
          <div class="flexItem">
            <span onclick="doFullScreen2()" class="fullscreen-btn" title="仅Canvas全屏">
              <svg viewBox="0 0 520 520"><g transform="translate(-3378 -260)"><rect x="3430" y="338" width="156" height="52"/><rect x="3430" y="390" width="52" height="103"/><rect x="0" y="0" width="156" height="52" transform="matrix(-1 0 0 1 3846 338)"/><rect x="0" y="0" width="52" height="103" transform="matrix(-1 0 0 1 3846 390)"/><rect x="0" y="0" width="156" height="52" transform="matrix(1 0 0 -1 3430 706)"/><rect x="0" y="0" width="52" height="104" transform="matrix(1 0 0 -1 3430 654)"/><rect x="3690" y="649" width="156" height="52"/><rect x="3794" y="545" width="52" height="104"/></g></svg>
            </span>
          </div>
        </div>
      </div>

      <div class="info-section">
        <h3>实验说明</h3>
        <ul>
          <li><b>拖动</b>红色(+)标记：拖向<b>左侧云朵</b>给莱顿瓶充电，拖向<b>右侧灯泡</b>放电</li>
          <li>勾选<b>「风筝」</b>显示风筝（富兰克林实验典故）</li>
          <li>切换<b>「2D / 3D」</b>切换莱顿瓶的显示方式</li>
          <li>充电时红色电荷进入瓶中，放电时灯泡发光</li>
        </ul>
      </div>

      <div class="formula-bar">
        <strong>莱顿瓶（Leyden Jar）</strong>，18世纪发明的储存静电的装置，是最早的电容器。由玻璃瓶内外壁贴附金属箔构成，内外箔间积累电荷。富兰克林曾用风筝将雷电引入莱顿瓶，证明闪电是电。
      </div>
    </div>
  </div>

  <!-- Quiz overlay -->
  <div id="quizOverlay" class="quiz-overlay" onclick="if(event.target===this)closeQuiz()">
    <div id="quizPanel" class="quiz-panel"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/addons/p5.dom.min.js"></script>
  <script>
    /* ===== Javalab utility functions ===== */
    function fullscreenchanged() {}
    function doFullScreen() {
      fullscreenchanged();
      var el = document.getElementById("divFull");
      if(el.requestFullscreen) el.requestFullscreen();
      else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if(el.mozRequestFullScreen) el.mozRequestFullScreen();
      el.addEventListener("fullscreenchange", fullscreenchanged);
      el.addEventListener("webkitfullscreenchange", fullscreenchanged);
      el.addEventListener("mozfullscreenchange", fullscreenchanged);
    }
    function doFullScreen2() {
      fullscreenchanged();
      var el = document.getElementById("myP5Canvas");
      if(el.requestFullscreen) el.requestFullscreen();
      else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if(el.mozRequestFullScreen) el.mozRequestFullScreen();
      el.addEventListener("fullscreenchange", fullscreenchanged);
      el.addEventListener("webkitfullscreenchange", fullscreenchanged);
      el.addEventListener("mozfullscreenchange", fullscreenchanged);
    }
    function mod(x, y) {
      if(x < 0) x += y * (Math.ceil(Math.abs(x)/y) + 1);
      return x - y * Math.floor(x / y);
    }
    function contain(x, y, x1, y1, w1, h1) {
      if(x < x1) return false;
      if(x > (x1 + w1)) return false;
      if(y < y1) return false;
      if(y > (y1 + h1)) return false;
      return true;
    }
    function drawButtonDrag() {
      if(mouseIsPressed && contain(mouseX, mouseY, 0, 0, width, height)) notClicked = false;
      if(millis() > 10000) notClicked = false;
      if(notClicked) {
        var dia = 120;
        push();
        translate(width/2, height/2);
        noStroke();
        fill(128, 128);
        ellipse(0, 0, dia, dia);
        noFill();
        stroke(255);
        strokeWeight(dia*0.04);
        push();
        translate(0, 0);
        line(-dia*0.2, dia*0.3, -dia*0.35, dia*0.1);
        arc(-dia*0.3, dia*0.05, dia*0.1414, dia*0.1414, QUARTER_PI*3, QUARTER_PI*7);
        line(-dia*0.25, 0, -dia*0.15, dia*0.1);
        line(-dia*0.15, dia*0.1, -dia*0.15, -dia*0.25);
        arc(-dia*0.075, -dia*0.25, dia*0.15, dia*0.15, PI, TWO_PI);
        line(0, -dia*0.25, 0, 0);
        arc(dia*0.06, -dia*0.1, dia*0.12, dia*0.12, HALF_PI*3, TWO_PI);
        line(dia*0.12, -dia*0.1, dia*0.12, dia*0.025);
        arc(dia*0.18, -dia*0.05, dia*0.12, dia*0.12, HALF_PI*3, TWO_PI);
        line(dia*0.24, -dia*0.05, dia*0.24, dia*0.05);
        arc(dia*0.29, 0, dia*0.1, dia*0.1, HALF_PI*3, TWO_PI);
        line(dia*0.34, 0, dia*0.34, dia*0.075);
        line(dia*0.34, dia*0.075, dia*0.31, dia*0.3);
        pop();
        pop();
      }
    }

    /* ===== Simulation variables ===== */
    var language = 3; // 0=Korean, 1=Japanese, 2=English, 3=Chinese
    var checkA, chalkA, radioA, checkPause, chalkPause;
    var backImage_0, backImage_1, backImage_2, backImage_3, backImage_4;
    var kiteImage, glowImage;
    var cloudX = 264, cloudY = 108;
    var bulbX = 816, bulbY = 247;
    var plusX = 330, plusY = 150;
    var chargeNum = 0;
    var chargeT = [], chargeX = [], chargeY = [];
    var pathNode = [[], []];
    var pathNodeLength = [];
    var pathNodes = [0, 0];
    var pathX1 = [
      [262,328,386,447,469,486,499,499,430,350],
      [852,844,842,830,796,746,680,675,665,655,645,635,625,620,459,499,499,520,541,564,610,714,786]
    ];
    var pathY1 = [
      [107,143,150,149,153,167,186,424,420,420],
      [285,320,320,344,374,391,400,410,390,410,390,410,390,400,459,424,186,165,160,160,175,228,244]
    ];

    function draw() {
      push();
      scale(width / 1000);

      // Dark background
      background('#0f172a');

      // Lighten the image area so dark elements in PNGs are visible
      noStroke();

      strokeWeight(1);

      // Draw jar background

      else
        image((plusX < 500) ? backImage_3 : backImage_4, 0, 0, 1000, 500);

      // Charging / discharging logic
      var charging = false;
      var delta = 0;
      var discharging = false;
      if (!checkPause.checked()) {
      if(dist(plusX, plusY, cloudX, cloudY) < 1) {
        charging = true;
        delta = (30 - chargeNum) * 0.02;
        chargeNum += delta;
        var toPush = round(chargeNum) - chargeX.length;
        for(var i = 0; i < toPush; i++) {
          var t = random(1);
          chargeT.push(t);
          chargeX.push(getChargeX(0, t));
          chargeY.push(getChargeY(0, t));
        }
      }

      if(dist(plusX, plusY, bulbX, bulbY) < 1) {
        discharging = true;
        delta = chargeNum * 0.02;
        chargeNum -= delta;
        var toSplice = chargeX.length - round(chargeNum);
        for(var i = 0; i < toSplice; i++) {
          chargeT.splice(0, 1);
          chargeX.splice(0, 1);
          chargeY.splice(0, 1);
        }
      }

      // Repel charges
      for(var i = 0; i < 5; i++) reLocation();
      }

      // Draw electrons in jar
      strokeWeight(1);
      for(var i = 0; i < chargeX.length; i++) {
        var x = getChargeX(1, chargeT[i]);
        var y = getChargeY(1, chargeT[i]);
        drawElectron(x, y);
      }

      // Glow effect on discharge
      if(discharging) {
        imageMode(CENTER);
        tint(255, abs(3 * chargeNum));
        image(glowImage, 850, 180, 260, 260);
        noTint();
        imageMode(CORNER);
      }

      // Draw charge markers (red dots with cross)
      strokeWeight(1);
      for(var i = 0; i < chargeX.length; i++) {
        var x = chargeX[i];
        var y = chargeY[i];
        noStroke();
        fill(255, 60, 60);
        ellipse(x, y, 8, 8);
        stroke(255);
        line(x - 3, y, x + 3, y);
        line(x, y - 3, x, y + 3);
      }

      // Draw jar overlay (front)
      if(radioA.value() === "3")

      noFill();
      stroke(200);
      strokeWeight(3);
      bezier(500, 188,
        lerp(500, plusX, 0.2), 100,
        lerp(500, plusX, 0.5), map(plusX, cloudX, bulbX, 200, bulbY),
        plusX, plusY);

      // Pulsating circle at cloud/bulb when hovering
      noStroke();
      fill(255, 80, 80, 160);
      if(!charging && !discharging && dragged) {
        var d = mod(frameCount, 10) + 15;
        if(plusX < 500) ellipse(cloudX, cloudY, d, d);
        else ellipse(bulbX, bulbY, d, d);
      }

      // Charging / Discharging text
      fill(220);
      noStroke();
      textAlign(CENTER, TOP);
      if(charging) text("充电中", cloudX, 180);
      if(discharging && round(chargeNum) > 1) text("放电中", 700, 300);

      // Current markers along path
      if (!checkPause.checked()) {
      var current = 10 * delta;
      for(var i = 0; i < pathNodes.length; i++) {
        if(i === 0 && !charging) continue;
        if(i === 1 && !discharging) continue;
        for(var j = 0; j < pathNodes[i]; j++) {
          pathNode[i][j] += current;
          if(pathNode[i][j] > pathNodeLength[i]) pathNode[i][j] -= pathNodeLength[i];
          if(pathNode[i][j] < 0) pathNode[i][j] += pathNodeLength[i];
        }
        noStroke();
        fill(255, 80, 80);
        for(var j = 0; j < pathNodes[i]; j++) {
          for(var k = 0; k < pathX1[i].length; k++) {
            if(path1[i][k] <= pathNode[i][j] && pathNode[i][j] <= path2[i][k]) {
              var x = map(pathNode[i][j], path1[i][k], path2[i][k],
                pathX1[i][k], pathX2[i][k]);
              var y = map(pathNode[i][j], path1[i][k], path2[i][k],
                pathY1[i][k], pathY2[i][k]);
              var t = atan2(pathY2[i][k] - pathY1[i][k], pathX2[i][k] - pathX1[i][k]);
              drawElectronTran(x, y, current);
            }
          }
        }

    function getChargeX(n, t) {
      if(n === 0) {
        if(t < 0.3) return 431;
        if(t > 0.7) return 569;
        return 500 + 69 * cos(map(t, 0.3, 0.7, PI, 0));
      } else {
        if(t < 0.3) return 448;
        if(t > 0.7) return 552;
        return 500 + 52 * cos(map(t, 0.3, 0.7, PI, 0));
      }
    }

    function getChargeY(n, t) {
      if(n === 0) {
        if(t < 0.3) return map(t, 0, 0.3, 365, 450);
        if(t > 0.7) return map(t, 1, 0.7, 365, 450);
        return 450 + 30 * sin(map(t, 0.3, 0.7, PI, 0));
      } else {
        if(t < 0.3) return map(t, 0, 0.3, 365, 445);
        if(t > 0.7) return map(t, 1, 0.7, 365, 445);
        return 445 + 20 * sin(map(t, 0.3, 0.7, PI, 0));
      }
    }

    function drawElectronTran(x, y, t) {
      noStroke();
      fill(60, 180, 255, Math.min(255, Math.abs(t * 255)));
      ellipse(x, y, 8, 8);
      stroke(255, Math.min(255, Math.abs(t * 255)));
      strokeWeight(1);
      line(x - 3, y, x + 3, y);
    }

    function drawElectron(x, y) {
      noStroke();
      fill(60, 180, 255);
      ellipse(x, y, 8, 8);
      stroke(255);
      strokeWeight(1);
      line(x - 3, y, x + 3, y);
    }

    function reLocation() {
      for(var i = 0; i < chargeX.length; i++) {
        var tNew = constrain(chargeT[i] + random(-0.1, 0.1), 0, 1);
        var xNew = getChargeX(0, tNew);
        var yNew = getChargeY(0, tNew);
        var oldForce = 0;
        var newForce = 0;
        for(var j = 0; j < chargeX.length; j++) {
          if(i !== j) {
            var o = mag((chargeX[j] - chargeX[i]), (chargeY[j] - chargeY[i]));
            var n = mag((chargeX[j] - xNew), (chargeY[j] - yNew));
            o *= o; n *= n;
            oldForce += 1 / o;
            newForce += 1 / n;
          }
        }
        if(newForce >= oldForce) continue;
        chargeT[i] = tNew;
        chargeX[i] = xNew;
        chargeY[i] = yNew;
      }
    }

      if(touches.length > 1) return;

        plusY = mouseY * 1000 / width - offsetY;

        return false;
      }
    }

        var canEnter = i === 0 || (quizState && quizState.scores[i - 1] >= 3);
        var lockedClass = canEnter ? '' : 'locked';

        html += '<div class="quiz-level-card ' + lockedClass + '" onclick="' + (canEnter ? 'startQuiz(' + i + ')' : '') + '">';
        html += '<h4>' + levelNames[i] + '</h4>';
        html += '<p>' + qs.length + ' 题</p>';
        html += '<div class="quiz-stars">';
        for (var s = 0; s < 3; s++) {
          html += '<span class="star' + (s < stars ? ' filled' : '') + '">&#9733;</span>';
        }
        html += '</div>';
        html += '</div>';
      }

      html += '</div>';
      quizPanel.innerHTML = html;
    }

    function getLevelQuestions(level) {
      return quizQuestions.filter(function(q) { return q.level === level; });
    }

    function startQuiz(level) {
      quizCurrentLevel = level;
      quizCurrentQ = 0;
      quizSelected = -1;
      quizAnswered = false;

      if (!quizState) {
        quizState = { currentLevel: 0, currentQuestion: 0, scores: [0,0,0], correctCounts: [0,0,0], answers: [] };
      }
      quizState.currentLevel = level;
      quizState.currentQuestion = 0;
      if (!quizState.answers || quizState.answers.length < 15) {
        quizState.answers = [];
        for (var i = 0; i < 15; i++) quizState.answers[i] = -1;
      }
      saveQuizProgress();
      showQuestion();
    }

    function showQuestion() {
      var questions = getLevelQuestions(quizCurrentLevel);
      var q = questions[quizCurrentQ];
      var globalIdx = quizQuestions.indexOf(q);

      var savedAns = quizState.answers[globalIdx];
      if (savedAns !== undefined && savedAns !== -1 && savedAns !== null) {
        quizSelected = savedAns;
        quizAnswered = true;
      } else {
        quizAnswered = false;
        quizSelected = -1;
      }

      var html = '<div class="quiz-close" onclick="closeQuiz()">&times;</div>';
      html += '<div class="quiz-title">第' + (quizCurrentLevel + 1) + '关</div>';

      // Progress dots
      html += '<div class="quiz-progress">';
      for (var i = 0; i < questions.length; i++) {
        var cls = 'quiz-progress-dot';
        if (i === quizCurrentQ) cls += ' active';
        else {
          var gi = quizQuestions.indexOf(questions[i]);
          var ans = quizState.answers[gi];
          if (ans === questions[i].answer) cls += ' correct';
          else if (ans !== -1 && ans !== undefined && ans !== null) cls += ' wrong';
        }
        html += '<span class="' + cls + '"></span>';
      }
      html += '</div>';

      html += '<div class="quiz-question-number">第 ' + (quizCurrentQ + 1) + ' / ' + questions.length + ' 题</div>';
      html += '<div class="quiz-question-text">' + q.question + '</div>';

      html += '<div class="quiz-options">';
      for (var i = 0; i < q.options.length; i++) {
        var cls = 'quiz-option';
        if (quizAnswered) {
          cls += ' disabled';
          if (i === q.answer) cls += ' correct';
          else if (i === quizSelected && quizSelected !== q.answer) cls += ' wrong';
        } else if (i === quizSelected) {
          cls += ' selected';
        }
        html += '<div class="' + cls + '" onclick="' + (quizAnswered ? '' : 'selectAnswer(' + i + ')') + '">' + String.fromCharCode(65 + i) + '. ' + q.options[i] + '</div>';
      }
      html += '</div>';

      // Explanation
      html += '<div id="quizExplanation" class="quiz-explanation' + (quizAnswered ? ' show' : '') + '">' + q.explanation + '</div>';

      // Navigation
      html += '<div class="quiz-nav">';
      if (quizCurrentQ > 0) {
        html += '<button class="quiz-nav-btn" onclick="prevQuestion()">上一题</button>';
      } else {
        html += '<button class="quiz-nav-btn" disabled>上一题</button>';
      }

      if (quizAnswered) {
        if (quizCurrentQ < questions.length - 1) {
          html += '<button class="quiz-nav-btn primary" onclick="nextQuestion()">下一题</button>';
        } else {
          html += '<button class="quiz-nav-btn primary" onclick="showLevelResult()">查看成绩</button>';
        }
      } else {
        html += '<button class="quiz-nav-btn" disabled>下一题</button>';
      }

      html += '</div>';

      quizPanel.innerHTML = html;
    }

    function selectAnswer(idx) {
      if (quizAnswered) return;
      var questions = getLevelQuestions(quizCurrentLevel);
      var q = questions[quizCurrentQ];
      var globalIdx = quizQuestions.indexOf(q);

      quizSelected = idx;
      quizAnswered = true;
      quizState.answers[globalIdx] = idx;

      if (idx === q.answer) {
        quizState.scores[quizCurrentLevel]++;
        quizState.correctCounts[quizCurrentLevel]++;
      }

      saveQuizProgress();
      showQuestion();
    }

    function nextQuestion() {
      var questions = getLevelQuestions(quizCurrentLevel);
      if (quizCurrentQ < questions.length - 1) {
        quizCurrentQ++;
        quizSelected = -1;
        quizAnswered = false;
        showQuestion();
      }
    }

    function prevQuestion() {
      if (quizCurrentQ > 0) {
        quizCurrentQ--;
        quizSelected = -1;
        quizAnswered = false;
        showQuestion();
      }
    }

    function showLevelResult() {
      var levelNames = ["第1关：静电基础", "第2关：莱顿瓶结构与原理", "第3关：历史与应用"];
      var score = quizState.scores[quizCurrentLevel];
      var total = getLevelQuestions(quizCurrentLevel).length;
      var stars = score >= 5 ? 3 : (score >= 3 ? 2 : (score >= 1 ? 1 : 0));
      var passed = score >= 3;

      var html = '<div class="quiz-close" onclick="closeQuiz()">&times;</div>';
      html += '<div class="quiz-result">';
      html += '<h3>' + levelNames[quizCurrentLevel] + '</h3>';
      html += '<div class="big-stars">';
      for (var i = 0; i < 3; i++) {
        html += '<span class="star' + (i < stars ? ' filled' : '') + '">&#9733;</span>';
      }
      html += '</div>';
      html += '<p>答对 ' + score + ' / ' + total + ' 题</p>';
      html += '<p style="margin-top:0.5rem;font-size:1rem;' + (passed ? 'color:#22c55e' : 'color:#ef4444') + ';">' + (passed ? (quizCurrentLevel < 2 ? '恭喜过关！可进入下一关' : '恭喜通关全部关卡！') : '未通过（需答对3题），再试一次吧') + '</p>';
      html += '<div style="margin-top:1.5rem;display:flex;justify-content:center;gap:0.5rem;flex-wrap:wrap;">';
      html += '<button class="quiz-nav-btn" onclick="startQuiz(' + quizCurrentLevel + ')">重试本关</button>';
      html += '<button class="quiz-nav-btn primary" onclick="renderLevelSelect()">返回选关</button>';
      if (passed && quizCurrentLevel < 2) {
        html += '<button class="quiz-nav-btn primary" onclick="startQuiz(' + (quizCurrentLevel + 1) + ')">下一关</button>';
      }
      html += '</div>';
      html += '</div>';

      quizPanel.innerHTML = html;
      saveQuizProgress();
    }

    function loadQuizProgress() {
      try {
        var saved = localStorage.getItem(QUIZ_STORAGE_KEY);
        if (saved) {
          quizState = JSON.parse(saved);
        } else {
          quizState = { currentLevel: 0, currentQuestion: 0, scores: [0,0,0], correctCounts: [0,0,0], answers: [] };
          for (var i = 0; i < 15; i++) quizState.answers[i] = -1;
        }
      } catch(e) {
        quizState = { currentLevel: 0, currentQuestion: 0, scores: [0,0,0], correctCounts: [0,0,0], answers: [] };
        for (var i = 0; i < 15; i++) quizState.answers[i] = -1;
      }
    }

    function saveQuizProgress() {
      try {
        localStorage.setItem(QUIZ_STORAGE_KEY, JSON.stringify(quizState));
      } catch(e) {}

      // Try Supabase sync
      saveQuizToServer();
    }

    function saveQuizToServer() {
      if (typeof supabase === "undefined" || !supabase) return;
      try {
        var userData = localStorage.getItem("user");
        if (!userData) return;
        var u = JSON.parse(userData);
        var totalCorrect = 0;
        for (var i = 0; i < 3; i++) totalCorrect += (quizState.correctCounts[i] || 0);
        var totalStars = 0;
        for (var i = 0; i < 3; i++) totalStars += (quizState.scores[i] || 0);
        supabase.from("users").select("quiz_data").eq("id", u.id).single().then(function(res) {
          var quizData = (res.data && res.data.quiz_data) ? res.data.quiz_data : {};
          quizData[EXPERIMENT_KEY] = {
            correct: totalCorrect,
            total: 15,
            stars: totalStars,
            updated_at: new Date().toISOString()
          };
          supabase.from("users").update({ quiz_data: quizData }).eq("id", u.id).then(function(){});
        });
      } catch(e) {}
    }

    // Wrap setup to also init quiz
    var _origSetupLJ = setup;
    setup = function() {
      _origSetupLJ();
      initQuiz();
    };
  </script>
</body>
</html>
