<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=10">
  <title>物理虚拟实验 - 自由落体</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      overflow-x: hidden;
      background: #f0f0f0;
    }
    #myContainer { text-align: center; position: relative; }
    #divFull {
      background-color: white;
      position: relative;
      font-size: 18px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    #myP5Canvas { touch-action: pinch-zoom; }
    .sim-wrapper {
      max-width: 1100px;
      margin: 60px auto 0;
      padding: 10px;
    }
    .flexContainer {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: #f8f9fa;
      border-radius: 10px;
      margin-top: 8px;
    }
    .flexContainer * { color: #000 !important; }
    .flexItem { display: inline-flex; align-items: center; gap: 6px; }
    .flexItem label {
      font-size: 14px;
      font-weight: 600;
      color: #000;
      white-space: nowrap;
    }
    .flexItem button {
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid #3b82f6;
      background: #3b82f6;
      color: #fff !important;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .flexItem button:hover { background: #2563eb; }
    .flexItem input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #3b82f6;
    }
    #myDataSheet {
      position: absolute;
      right: 0;
      top: 0;
      overflow-y: auto;
      width: 200px;
      font-size: 13px;
      background: rgba(255,255,255,0.92);
      border-left: 1px solid #ddd;
      padding: 8px;
    }
    #myDataSheet table { width: 100%; border-collapse: collapse; }
    #myDataSheet td, #myDataSheet th {
      border: 1px solid #ccc;
      padding: 3px 5px;
      text-align: center;
      font-size: 12px;
      color: #000 !important;
    }
    #myDataSheet th { background: #f0f0f0; font-weight: 600; color: #000 !important; }
  </style>
  <script src="auth-check.js"></script>
</head>
<body>
  <header class="header">
    <div class="logo">物理虚拟实验</div>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="experiments.html">实验列表</a>
      <a href="vip.html">开通VIP</a>
    </nav>
  </header>

  <div class="sim-wrapper">
    <div id="divFull" style="overflow:hidden;position:relative;">
      <div id="myContainer"></div>
      <div id="myDataSheet"></div>
      <div class="flexContainer">
        <div class="flexItem"><span id="radioA"></span></div>
        <div class="flexItem"><button id="buttonRun">运行</button></div>
        <div class="flexItem"><button id="buttonRst">重置</button></div>
        <div class="flexItem"><button id="buttonData">下载数据</button></div>
        <div class="flexItem">
          <input type="checkbox" id="checkA">
          <label for="checkA" id="chalkA" style="font-weight:600;color:#000;cursor:pointer;">轨迹</label>
        </div>
        <div class="flexItem">
          <a href="javascript:doFullScreen();" style="box-shadow:none;">
            <svg width="32" height="32" viewBox="0 0 40 40" style="vertical-align:middle;">
              <path d="M5,15 L5,5 L15,5 M35,25 L35,35 L25,35 M25,5 L35,5 L35,15 M15,35 L5,35 L5,25" fill="none" stroke="#555" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
      </div>
    </div>
    <p style="text-align:center;font-size:14px;color:#999;margin-top:8px;">自由落体运动模拟 · 点击"运行"开始，点击"重置"归零</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/addons/p5.dom.min.js"></script>
  <script>
    // ========== 工具函数 ==========
    function doFullScreen() {
      const el = document.getElementById('divFull');
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }

    function dottedLine2(x1, y1, x2, y2) {
      let d = dist(x1, y1, x2, y2);
      let d1 = 7, d2 = 14;
      for (let i = 0; i <= (d - d2); i += d2) {
        line(map(i + d1, 0, d, x1, x2), map(i + d1, 0, d, y1, y2),
             map(i + d2, 0, d, x1, x2), map(i + d2, 0, d, y1, y2));
      }
    }

    function mod(x, y) {
      if (x < 0) x += y * (ceil(abs(x)/y) + 1);
      let c = floor(x / y);
      return x - y * c;
    }

    // ========== 主模拟代码 ==========
    let language = 3; // 0=韩语, 1=日语, 2=英语, 3=中文
    let radioA, checkA, chalkA;
    let buttonRst, buttonRun, buttonData;
    let ball2Image;
    let startY = 60;
    let timming;
    let y1;
    let myDataSheet;
    let logData = [];

    function preload() {
      ball2Image = loadImage("images/free_fall_ball_2.png");
    }

    function setup() {
      frameRate(60);
      let container = select("#myContainer");
      let a = 2;
      let w = int(min(container.width, (window.innerHeight - 160) / a));
      let h = int(w * a);
      if (w < 100) w = 800;
      if (h < 100) h = 400;
      myCanvas = createCanvas(w, h);
      myCanvas.parent("myContainer");
      myCanvas.id("myP5Canvas");

      myDataSheet = select("#myDataSheet");

      // 单位选择
      radioA = createRadio("radioA");
      if (language == 2) radioA.option("cm ", "cm");
      if (language == 2) radioA.option("m ", "m");
      if (language == 3) radioA.option("厘米", "cm");
      if (language == 3) radioA.option("米", "m");
      radioA.parent("radioA");
      radioA.value("cm");

      checkA = select("#checkA");
      chalkA = select("#chalkA");
      chalkA.html("轨迹");

      buttonRun = select("#buttonRun");
      buttonRun.mouseClicked(doButtonRun);

      buttonRst = select("#buttonRst");
      buttonRst.mouseClicked(setup2);

      buttonData = select("#buttonData");
      buttonData.mouseClicked(doButtonData);
      buttonData.html("下载数据");

      setup2();
      reSizing();
    }

    function windowResized() {
      let container = select("#myContainer");
      let a = 2;
      let w = int(min(container.width, (window.innerHeight - 160) / a));
      let h = int(w * a);
      if (w < 100) w = 800;
      resizeCanvas(w, h);
      reSizing();
    }

    function reSizing() {
      myDataSheet.style("height", height + "px");
    }

    function setup2() {
      timming = -1;
      y1 = 0;
      logData = [0];
      myDataSheet.html("", false);
    }

    function doButtonRun() {
      timming = 0;
      y1 = 0;
      logData = [0];
      myDataSheet.html("", false);
    }

    function doButtonData() {
      let table = new p5.Table();
      table.addColumn("Time(s)");
      table.addColumn((radioA.value() == "cm") ? "Distance(cm)" : "Distance(m)");
      for (let i = 0; i < logData.length; i++) {
        let newRow = table.addRow();
        newRow.setNum("Time(s)", i / 10);
        if (radioA.value() == "cm")
          newRow.setNum("Distance(cm)", logData[i]);
        else
          newRow.setNum("Distance(m)", logData[i] / 100);
      }
      saveTable(table, "javalab-" + nf(month(), 2) + "-" + nf(day(), 2) + "-" + nf(hour(), 2) + "-" + nf(minute(), 2) + ".csv");
    }

    function draw() {
      if (touches.length > 1) return;
      background(255);
      strokeWeight(1);
      textSize(30);
      textAlign(LEFT, TOP);
      push();
      scale(height / 1000);

      // 刻度线
      stroke(0);
      for (let i = 0; i < 1000; i += 10) line(250, startY + i, 270, startY + i);
      for (let i = 0; i < 1000; i += 100) line(250, startY + i, 290, startY + i);

      // 刻度标签
      fill(0);
      noStroke();
      textSize(32);
      textAlign(LEFT, CENTER);
      for (let i = 0; i < 10; i++) {
        if (radioA.value() == "cm")
          text(i * 100 + " cm", 300, startY + i * 100);
        else
          text(i + " m", 300, startY + i * 100);
      }

      // 物理模拟：自由落体 y = 0.5 * g * t²
      if (timming >= 0) {
        if (timming < 600) {
          timming++;
          y1 = 0.5 * 9.8 * timming * timming / 36;
          if (mod(timming, 6) == 0) {
            logData.push(y1);
            doDataSheet();
          }
        }
      }

      // 高度指示虚线
      if (timming < 0) {
        stroke(255, 128, 0);
        dottedLine2(0, startY + y1, 250, startY + y1);
      }

      // 轨迹（历史位置）
      if (checkA.checked()) {
        for (let i = 0; i < logData.length; i++) {
          image(ball2Image, 0, startY + logData[i] - 200, 200, 200);
        }
      }

      // 当前小球
      image(ball2Image, 0, startY + y1 - 200, 200, 200);
      pop();
    }

    function doDataSheet() {
      let htmlText = "<table><tbody><tr><th>Time (s)</th><th>Distance (" + ((radioA.value() == "cm") ? "cm" : "m") + ")</th></tr>";
      for (let i = 0; i < logData.length; i++) {
        if (radioA.value() == "cm")
          htmlText += "<tr><td>" + i / 10 + "</td><td>" + round(logData[i] * 1000) / 1000 + "</td></tr>";
        else
          htmlText += "<tr><td>" + i / 10 + "</td><td>" + round(logData[i] * 1000) / 100000 + "</td></tr>";
      }
      htmlText += "</tbody></table>";
      myDataSheet.html(htmlText, false);
    }
  </script>
</body>
</html>
