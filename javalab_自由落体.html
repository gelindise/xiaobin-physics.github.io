<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=10">
  <title>物理虚拟实验 - 自由落体</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      overflow-x: hidden;
      background: #f0f0f0;
    }
    #myContainer { text-align: center; position: relative; }
    #divFull {
      background-color: white;
      position: relative;
      font-size: 18px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    #myP5Canvas { touch-action: pinch-zoom; }
    .sim-wrapper {
      max-width: 1100px;
      margin: 60px auto 0;
      padding: 10px;
    }
    .flexContainer {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: #f8f9fa;
      border-radius: 10px;
      margin-top: 8px;
    }
    .flexContainer * { color: #000 !important; }
    .flexItem { display: inline-flex; align-items: center; gap: 6px; }
    .flexItem label {
      font-size: 14px;
      font-weight: 600;
      color: #000;
      white-space: nowrap;
    }
    .flexItem button {
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid #3b82f6;
      background: #3b82f6;
      color: #fff !important;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .flexItem button:hover { background: #2563eb; }
    .flexItem input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #3b82f6;
    }
    #myDataSheet {
      position: absolute;
      right: 0;
      top: 0;
      overflow-y: auto;
      width: 200px;
      font-size: 13px;
      background: rgba(255,255,255,0.92);
      border-left: 1px solid #ddd;
      padding: 8px;
    }
    #myDataSheet table { width: 100%; border-collapse: collapse; }
    #myDataSheet td, #myDataSheet th {
      border: 1px solid #ccc;
      padding: 3px 5px;
      text-align: center;
      font-size: 12px;
      color: #000 !important;
    }
    #myDataSheet th { background: #f0f0f0; font-weight: 600; color: #000 !important; }
    /* 过关挑战答题 */
    .quiz-question { font-size: 15px; margin-bottom: 16px; line-height: 1.6; }
    .quiz-option { display: block; width: 100%; text-align: left; padding: 12px 16px; margin-bottom: 8px; border: 2px solid #333; border-radius: 8px; background: rgba(255,255,255,0.03); color: #ccc; font-size: 14px; cursor: pointer; transition: all 0.2s; }
    .quiz-option:hover { border-color: #8b5cf6; background: rgba(139,92,246,0.1); }
    .quiz-option.correct { border-color: #22c55e; background: rgba(34,197,94,0.15); color: #22c55e; }
    .quiz-option.wrong { border-color: #ef4444; background: rgba(239,68,68,0.15); color: #ef4444; }
    .quiz-option:disabled { cursor: default; opacity: 0.7; }
    .quiz-option:disabled.correct { opacity: 1; }
    .quiz-score { font-size: 48px; font-weight: bold; }
    .quiz-score.great { color: #22c55e; }
    .quiz-score.good { color: #f59e0b; }
    .quiz-score.poor { color: #ef4444; }
    .quiz-btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 16px; }
    .review-card { background: rgba(255,255,255,0.03); border: 1px solid #333; border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; text-align: left; }
    .review-card.wrong { border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.06); }
    .review-card.correct2 { border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.04); }
    .rbadge { font-size: 12px; padding: 2px 8px; border-radius: 10px; margin-right: 8px; }
    .rbadge.ok { background: rgba(34,197,94,0.2); color: #22c55e; }
    .rbadge.fail { background: rgba(239,68,68,0.2); color: #ef4444; }
    .rq { font-size: 14px; margin-bottom: 8px; }
    .review-user-ans { font-size: 13px; color: #ef4444; margin: 4px 0; }
    .review-correct-ans { font-size: 13px; color: #22c55e; margin: 4px 0; }
    .review-explain { background: rgba(139,92,246,0.08); border: 1px solid rgba(139,92,246,0.2); border-radius: 8px; padding: 10px 14px; margin-top: 8px; }
    .review-explain .rtitle { font-size: 13px; color: #a78bfa; margin-bottom: 4px; }
    .review-explain .rtext { font-size: 13px; color: #c4b5fd; line-height: 1.6; }

    /* 可隐藏导航栏 */
    .header {
      position: fixed !important;
      top: 0;
      left: 0;
      right: 0;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }
    .header.hidden { transform: translateY(-100%); }
    body {
      padding-top: 56px;
      transition: padding-top 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    body.header-hidden { padding-top: 0; }
    @media (max-width: 768px) {
      body { padding-top: 48px; }
    }
  </style>
  <script src="auth-check.js"></script>
</head>
<body>
  <header class="header">
    <div class="logo">物理虚拟实验</div>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="experiments.html">实验列表</a>
      <a href="vip.html">开通VIP</a>
    </nav>
  </header>

  <div class="sim-wrapper">
    <div id="divFull" style="overflow:hidden;position:relative;">
      <div id="myContainer"></div>
      <div id="myDataSheet"></div>
      <div class="flexContainer">
        <div class="flexItem"><span id="radioA"></span></div>
        <div class="flexItem"><button id="buttonRun">运行</button></div>
        <div class="flexItem"><button id="buttonRst">重置</button></div>
        <div class="flexItem"><button id="buttonData">下载数据</button></div>
        <div class="flexItem">
          <input type="checkbox" id="checkA">
          <label for="checkA" id="chalkA" style="font-weight:600;color:#000;cursor:pointer;">轨迹</label>
        </div>
        <div class="flexItem">
          <input type="checkbox" id="checkPause">
          <label for="checkPause" style="font-weight:600;color:#000;cursor:pointer;">暂停</label>
        </div>
        <div class="flexItem">
          <a href="javascript:doFullScreen();" style="box-shadow:none;">
            <svg width="32" height="32" viewBox="0 0 40 40" style="vertical-align:middle;">
              <path d="M5,15 L5,5 L15,5 M35,25 L35,35 L25,35 M25,5 L35,5 L35,15 M15,35 L5,35 L5,25" fill="none" stroke="#555" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
      </div>
    </div>
    <p style="text-align:center;font-size:14px;color:#999;margin-top:8px;">自由落体运动模拟 · 点击"运行"开始，点击"重置"归零</p>
  </div>

  <div style="max-width:1100px;margin:0 auto 24px;padding:0 16px;text-align:center;">
    <button class="btn-primary" id="btnChallenge" style="font-size:16px;padding:10px 32px;background:linear-gradient(135deg,#8b5cf6,#06b6d4);">过关挑战</button>
    <p style="color:#64748b;font-size:12px;margin-top:8px;">15道单选题 · 每次5道 · 检验你对自由落体运动的掌握程度</p>
  </div>

  <div id="quizOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;overflow-y:auto;">
    <div style="max-width:700px;margin:40px auto;background:#1a1a2e;border:1px solid #333;border-radius:16px;padding:24px 32px;color:#e2e8f0;">
      <div id="quizHeader" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <span style="font-size:18px;font-weight:bold;" id="quizTitle">第 1 关 (1/3)</span>
        <div style="display:flex;gap:8px;">
          <button class="btn-reset" id="btnResetQuiz" style="font-size:12px;">↺ 重置</button>
          <button class="btn-reset" id="btnCloseQuiz" style="font-size:12px;">✕ 退出</button>
        </div>
      </div>
      <div id="quizProgress" style="height:4px;background:#333;border-radius:2px;margin-bottom:20px;">
        <div id="quizProgressFill" style="height:100%;background:#8b5cf6;border-radius:2px;width:0%;transition:width 0.3s;"></div>
      </div>
      <div id="quizBody"></div>
      <div id="quizResult" style="display:none;text-align:center;padding:30px 0;"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/addons/p5.dom.min.js"></script>
  <script>
    // ========== 工具函数 ==========
    function doFullScreen() {
      const el = document.getElementById('divFull');
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }

    function dottedLine2(x1, y1, x2, y2) {
      let d = dist(x1, y1, x2, y2);
      let d1 = 7, d2 = 14;
      for (let i = 0; i <= (d - d2); i += d2) {
        line(map(i + d1, 0, d, x1, x2), map(i + d1, 0, d, y1, y2),
             map(i + d2, 0, d, x1, x2), map(i + d2, 0, d, y1, y2));
      }
    }

    function mod(x, y) {
      if (x < 0) x += y * (ceil(abs(x)/y) + 1);
      let c = floor(x / y);
      return x - y * c;
    }

    // ========== 主模拟代码 ==========
    let language = 3; // 0=韩语, 1=日语, 2=英语, 3=中文
    let radioA, checkA, chalkA;
    let buttonRst, buttonRun, buttonData;
    let ball2Image;
    let startY = 60;
    let timming;
    let y1;
    let myDataSheet;
    let logData = [];

    function preload() {
      ball2Image = loadImage("images/free_fall_ball_2.png");
    }

    function setup() {
      frameRate(60);
      let container = select("#myContainer");
      let a = 2;
      let w = int(min(container.width, (window.innerHeight - 160) / a));
      let h = int(w * a);
      if (w < 100) w = 800;
      if (h < 100) h = 400;
      myCanvas = createCanvas(w, h);
      myCanvas.parent("myContainer");
      myCanvas.id("myP5Canvas");

      myDataSheet = select("#myDataSheet");

      // 单位选择
      radioA = createRadio("radioA");
      if (language == 2) radioA.option("cm ", "cm");
      if (language == 2) radioA.option("m ", "m");
      if (language == 3) radioA.option("厘米", "cm");
      if (language == 3) radioA.option("米", "m");
      radioA.parent("radioA");
      radioA.value("cm");

      checkA = select("#checkA");
      chalkA = select("#chalkA");
      chalkA.html("轨迹");

      buttonRun = select("#buttonRun");
      buttonRun.mouseClicked(doButtonRun);

      buttonRst = select("#buttonRst");
      buttonRst.mouseClicked(setup2);

      buttonData = select("#buttonData");
      buttonData.mouseClicked(doButtonData);
      buttonData.html("下载数据");

      setup2();
      reSizing();
    }

    function windowResized() {
      let container = select("#myContainer");
      let a = 2;
      let w = int(min(container.width, (window.innerHeight - 160) / a));
      let h = int(w * a);
      if (w < 100) w = 800;
      resizeCanvas(w, h);
      reSizing();
    }

    function reSizing() {
      myDataSheet.style("height", height + "px");
    }

    function setup2() {
      timming = -1;
      y1 = 0;
      logData = [0];
      myDataSheet.html("", false);
    }

    function doButtonRun() {
      timming = 0;
      y1 = 0;
      logData = [0];
      myDataSheet.html("", false);
    }

    function doButtonData() {
      let table = new p5.Table();
      table.addColumn("Time(s)");
      table.addColumn((radioA.value() == "cm") ? "Distance(cm)" : "Distance(m)");
      for (let i = 0; i < logData.length; i++) {
        let newRow = table.addRow();
        newRow.setNum("Time(s)", i / 10);
        if (radioA.value() == "cm")
          newRow.setNum("Distance(cm)", logData[i]);
        else
          newRow.setNum("Distance(m)", logData[i] / 100);
      }
      saveTable(table, "javalab-" + nf(month(), 2) + "-" + nf(day(), 2) + "-" + nf(hour(), 2) + "-" + nf(minute(), 2) + ".csv");
    }

    function draw() {
      if (touches.length > 1) return;
      if (pauseChecked) return;
      background(255);
      strokeWeight(1);
      textSize(30);
      textAlign(LEFT, TOP);
      push();
      scale(height / 1000);

      // 刻度线
      stroke(0);
      for (let i = 0; i < 1000; i += 10) line(250, startY + i, 270, startY + i);
      for (let i = 0; i < 1000; i += 100) line(250, startY + i, 290, startY + i);

      // 刻度标签
      fill(0);
      noStroke();
      textSize(32);
      textAlign(LEFT, CENTER);
      for (let i = 0; i < 10; i++) {
        if (radioA.value() == "cm")
          text(i * 100 + " cm", 300, startY + i * 100);
        else
          text(i + " m", 300, startY + i * 100);
      }

      // 物理模拟：自由落体 y = 0.5 * g * t²
      if (timming >= 0) {
        if (timming < 600) {
          timming++;
          y1 = 0.5 * 9.8 * timming * timming / 36;
          if (mod(timming, 6) == 0) {
            logData.push(y1);
            doDataSheet();
          }
        }
      }

      // 高度指示虚线
      if (timming < 0) {
        stroke(255, 128, 0);
        dottedLine2(0, startY + y1, 250, startY + y1);
      }

      // 轨迹（历史位置）
      if (checkA.checked()) {
        for (let i = 0; i < logData.length; i++) {
          image(ball2Image, 0, startY + logData[i] - 200, 200, 200);
        }
      }

      // 当前小球
      image(ball2Image, 0, startY + y1 - 200, 200, 200);
      pop();
    }

    function doDataSheet() {
      let htmlText = "<table><tbody><tr><th>Time (s)</th><th>Distance (" + ((radioA.value() == "cm") ? "cm" : "m") + ")</th></tr>";
      for (let i = 0; i < logData.length; i++) {
        if (radioA.value() == "cm")
          htmlText += "<tr><td>" + i / 10 + "</td><td>" + round(logData[i] * 1000) / 1000 + "</td></tr>";
        else
          htmlText += "<tr><td>" + i / 10 + "</td><td>" + round(logData[i] * 1000) / 100000 + "</td></tr>";
      }
      htmlText += "</tbody></table>";
      myDataSheet.html(htmlText, false);
    }

    // ============================
    //  QUIZ CHALLENGE
    // ============================
    var QUIZ_STORAGE_KEY = "quiz_free_fall_progress";
    var EXPERIMENT_KEY = "free_fall";

    var quizQuestions = [
      // Round 1: Free fall basics
      { q: "伽利略对自由落体运动的研究，最核心的科学方法是？", opts: ["观察记录", "实验+推理", "数学推导", "猜想假设"], ans: 1,
        explain: "伽利略开创性地将实验与推理结合，通过斜面实验'冲淡'重力，再推理出自由落体规律，对现代物理学影响深远。" },
      { q: "在真空中，羽毛和硬币同时从同一高度释放，它们会？", opts: ["羽毛先落地", "硬币先落地", "同时落地", "无法确定"], ans: 2,
        explain: "真空中没有空气阻力，只受重力作用，自由落体加速度相同（g≈9.8m/s²），因此同时落地。这正是伽利略要证明的——忽略阻力，所有物体下落一样快。" },
      { q: "自由落体运动是____运动。", opts: ["匀速直线", "匀加速直线", "变加速直线", "匀速圆周"], ans: 1,
        explain: "自由落体是初速度为0、加速度恒为g的匀加速直线运动。速度均匀增加（v=gt），位移按t²增长（h=½gt²）。" },
      { q: "重力加速度g的大小约为？", opts: ["9.8 m/s²", "4.9 m/s²", "19.6 m/s²", "0 m/s²"], ans: 0,
        explain: "地球表面重力加速度g≈9.8m/s²，方向竖直向下。物体每秒钟速度增加约9.8m/s。不同纬度g值略有差异，一般近似取9.8m/s²。" },
      { q: "自由落体速度与时间的关系是？", opts: ["v = ½gt²", "v = gt", "v = g/t", "v = 2gt"], ans: 1,
        explain: "初速度为0、加速度恒为g，由v=v₀+at得v=gt。速度与时间成正比，例如自由落体2秒后速度约为19.6m/s。" },
      // Round 2: Free fall equations
      { q: "物体自由下落，第1秒内下落距离约为？", opts: ["9.8m", "4.9m", "19.6m", "1m"], ans: 1,
        explain: "由h=½gt²，t=1s，g=9.8m/s²得h=½×9.8×1²=4.9m。注意不是g=9.8m，正确公式是h=½gt²而非h=gt。" },
      { q: "h-t图像（下降高度-时间）是什么形状？", opts: ["直线", "抛物线", "双曲线", "圆"], ans: 1,
        explain: "h=½gt²是二次函数，h-t图像为开口向上的抛物线。本实验中的数据表也证实：位移随时间平方增长。" },
      { q: "自由落体第1秒、第2秒、第3秒内下落距离之比为？", opts: ["1:2:3", "1:3:5", "1:4:9", "1:1:1"], ans: 1,
        explain: "前n秒下落h=½gn²，第1秒内=½g，第2秒内=½g(4-1)=³⁄₂g，第3秒内=½g(9-4)=⁵⁄₂g，比值1:3:5，是匀加速直线运动重要推论。" },
      { q: "在月球（g≈1.6m/s²）上做自由落体，同样高度下落时间会？", opts: ["不变", "变短", "变长", "无法确定"], ans: 2,
        explain: "由t=√(2h/g)，h相同，g越小t越大。月球g是地球约1/6，下落时间更长。这就是月球上宇航员跳跃显得很慢的原因。" },
      { q: "自由落体加速度大小取决于？", opts: ["物体质量", "物体形状", "下落高度", "所处星球的重力场"], ans: 3,
        explain: "自由落体加速度g取决于所在星球的质量和半径，与物体本身质量、形状和下落高度无关。在同一个星球表面，所有物体自由落体加速度都相同。" },
      // Round 3: Comprehensive
      { q: "物体从45m高处自由下落（g=10m/s²），落地所需时间约？", opts: ["3s", "4.5s", "9s", "2s"], ans: 0,
        explain: "由h=½gt²得t=√(2h/g)=√(90/10)=√9=3s。自由落体45m约需3秒，时间与√h成正比。" },
      { q: "自由落体过程中（忽略阻力），机械能如何变化？", opts: ["逐渐增大", "逐渐减小", "保持不变", "先增后减"], ans: 2,
        explain: "只有重力做功（保守力），机械能守恒。下落过程中重力势能转化为动能，总和不变。" },
      { q: "以下哪种可近似看作自由落体？", opts: ["跳伞开伞后", "树叶飘落", "苹果从树上掉下", "鸽子飞落"], ans: 2,
        explain: "自由落体条件：只受重力、初速为0。苹果从树上掉下阻力小、初速≈0，可近似。跳伞阻力大、树叶阻力显著、鸽子有翅膀主动运动，都不行。" },
      { q: "真空中不同质量物体自由落体，以下正确是？", opts: ["质量大的快", "质量小的快", "下落一样快", "与高度有关"], ans: 2,
        explain: "真空中所有自由落体加速度都是g，与质量无关。伽利略通过斜面实验证明了这一点。日常中羽毛比石头慢是因为空气阻力的影响。" },
      { q: "石子从20m高处自由下落（g=10m/s²），落地速度约？", opts: ["10m/s", "20m/s", "28m/s", "40m/s"], ans: 1,
        explain: "由v²=2gh得v=√(2×10×20)=√400=20m/s。也可由t=√(2h/g)=2s，v=gt=20m/s。20m约6层楼高，落地速度约72km/h。" }
    ];

    var quizRound = 0;
    var quizIndex = 0;
    var quizAnswers = [];
    var quizLocked = false;
    var quizScores = [0, 0, 0];
    var quizHighestRound = 0;

    var pauseChecked = false;
    var btnChallenge, btnCloseQuiz, btnResetQuiz, quizOverlay, quizTitle, quizProgressFill, quizBody, quizResult;

    function initQuiz() {
      btnChallenge = document.getElementById("btnChallenge");
      btnCloseQuiz = document.getElementById("btnCloseQuiz");
      btnResetQuiz = document.getElementById("btnResetQuiz");
      quizOverlay = document.getElementById("quizOverlay");
      quizTitle = document.getElementById("quizTitle");
      quizProgressFill = document.getElementById("quizProgressFill");
      quizBody = document.getElementById("quizBody");
      quizResult = document.getElementById("quizResult");
      btnChallenge.addEventListener("click", startQuiz);
      btnCloseQuiz.addEventListener("click", closeQuiz);
      btnResetQuiz.addEventListener("click", resetQuiz);

      var checkPause = document.getElementById("checkPause");
      if (checkPause) {
        checkPause.addEventListener("change", function() { pauseChecked = this.checked; });
      }

      updateChallengeButton();
    }

    var _origSetupFF = setup;
    setup = function() {
      _origSetupFF();
      initQuiz();
    };

    function updateChallengeButton() {
      loadProgress().then(function(saved) {
        if (saved && (saved.scores[0] > 0 || saved.round > 0)) {
          var totalDone = saved.scores[0] + (saved.scores[1] || 0) + (saved.scores[2] || 0);
          btnChallenge.textContent = "继续挑战 (已得" + totalDone + "/15分)";
        } else {
          btnChallenge.textContent = "过关挑战";
        }
      });
    }

    function getUsername() {
      try { return localStorage.getItem("currentUser"); } catch(e) { return null; }
    }

    function saveProgress() {
      var data = { round: quizRound, scores: quizScores, highestRound: quizHighestRound, updatedAt: new Date().toISOString() };
      try { localStorage.setItem(QUIZ_STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
      var username = getUsername();
      if (username) saveQuizToServer(username, data);
    }

    function saveQuizToServer(username, data) {
      try {
        SB.getUser(username).then(function(users) {
          if (users && users.length > 0) {
            var user = users[0];
            var quizData = user.quiz_data;
            if (typeof quizData === "string") quizData = JSON.parse(quizData);
            if (!quizData || typeof quizData !== "object") quizData = {};
            quizData[EXPERIMENT_KEY] = data;
            SB.updateUser(username, { quiz_data: quizData }).catch(function(){});
          }
        }).catch(function(){});
      } catch(e) {}
    }

    async function loadProgress() {
      var username = getUsername();
      if (username) {
        try {
          var users = await SB.getUser(username);
          if (users && users.length > 0) {
            var user = users[0];
            var quizData = user.quiz_data;
            if (typeof quizData === "string") quizData = JSON.parse(quizData);
            if (quizData && quizData[EXPERIMENT_KEY]) {
              var serverData = quizData[EXPERIMENT_KEY];
              try { localStorage.setItem(QUIZ_STORAGE_KEY, JSON.stringify(serverData)); } catch(e) {}
              return serverData;
            }
          }
        } catch(e) {}
      }
      try {
        var raw = localStorage.getItem(QUIZ_STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch(e) {}
      return null;
    }

    function clearProgress() {
      try { localStorage.removeItem(QUIZ_STORAGE_KEY); } catch(e) {}
      var username = getUsername();
      if (username) {
        try {
          SB.getUser(username).then(function(users) {
            if (users && users.length > 0) {
              var user = users[0];
              var quizData = user.quiz_data;
              if (typeof quizData === "string") quizData = JSON.parse(quizData);
              if (quizData && typeof quizData === "object") {
                delete quizData[EXPERIMENT_KEY];
                SB.updateUser(username, { quiz_data: quizData }).catch(function(){});
              }
            }
          }).catch(function(){});
        } catch(e) {}
      }
    }

    function startQuiz() {
      loadProgress().then(function(saved) {
        if (saved && saved.highestRound >= 0 && (saved.scores[0] > 0 || saved.round > 0)) {
          quizRound = Math.min(saved.round + 1, 2);
          quizScores = saved.scores.slice();
          quizHighestRound = saved.highestRound;
        } else {
          quizRound = 0; quizScores = [0,0,0]; quizHighestRound = 0;
        }
        quizOverlay.style.display = "block";
        if (timming >= 0) { timming = -1; }
        renderRound();
      });
    }

    function closeQuiz() {
      quizOverlay.style.display = "none";
      updateChallengeButton();
    }

    function resetQuiz() {
      if (confirm("确定要重置所有挑战进度吗？当前进度将丢失。")) {
        quizRound = 0; quizScores = [0,0,0]; quizHighestRound = 0;
        clearProgress();
        renderRound();
      }
    }

    function renderRound() {
      quizIndex = 0; quizAnswers = []; quizLocked = false;
      quizResult.style.display = "none";
      quizBody.style.display = "block";
      quizTitle.textContent = "第 " + (quizRound + 1) + " 关 (题目 " + (quizRound * 5 + 1) + "-" + (quizRound * 5 + 5) + "/15)";
      quizProgressFill.style.width = (quizRound * (100/3)) + "%";
      renderQuestion();
    }

    function renderQuestion() {
      var q = quizQuestions[quizRound * 5 + quizIndex];
      var html = '<div class="quiz-question">' + (quizIndex + 1) + ". " + q.q + "</div>";
      var labels = ["A", "B", "C", "D"];
      for (var i = 0; i < q.opts.length; i++) {
        html += '<button class="quiz-option" data-idx="' + i + '" ';
        if (quizLocked) html += 'disabled ';
        html += '>' + labels[i] + ". " + q.opts[i] + "</button>";
      }
      quizBody.innerHTML = html;
      var opts = document.querySelectorAll("#quizBody .quiz-option");
      for (var j = 0; j < opts.length; j++) {
        (function(idx) {
          opts[j].addEventListener("click", function() { selectAnswer(idx); });
        })(j);
      }
    }

    function selectAnswer(idx) {
      if (quizLocked) return;
      quizLocked = true;
      quizAnswers.push(idx);
      var q = quizQuestions[quizRound * 5 + quizIndex];
      var correct = q.ans;
      var opts = document.querySelectorAll("#quizBody .quiz-option");
      for (var i = 0; i < opts.length; i++) {
        opts[i].disabled = true;
        if (i === correct) opts[i].classList.add("correct");
        if (i === idx && idx !== correct) opts[i].classList.add("wrong");
      }
      setTimeout(function() {
        quizIndex++;
        if (quizIndex < 5) { quizLocked = false; renderQuestion(); }
        else showRoundResult();
      }, 1200);
    }

    function getStars(score, total) {
      if (score === total) return "⭐⭐⭐";
      if (score >= total - 1) return "⭐⭐";
      if (score >= Math.ceil(total / 2)) return "⭐";
      return "";
    }

    function showRoundResult() {
      var correctCount = 0;
      for (var i = 0; i < 5; i++) {
        if (quizAnswers[i] === quizQuestions[quizRound * 5 + i].ans) correctCount++;
      }
      quizScores[quizRound] = correctCount;
      if (quizRound > quizHighestRound) quizHighestRound = quizRound;
      saveProgress();

      quizBody.style.display = "none";
      quizResult.style.display = "block";

      var stars = getStars(correctCount, 5);
      var scoreClass = correctCount >= 4 ? "great" : (correctCount >= 2 ? "good" : "poor");
      var comment = correctCount >= 4 ? "太棒了！" : (correctCount >= 2 ? "继续加油！" : "再看看实验吧！");

      var html = '<div class="quiz-score ' + scoreClass + '">' + correctCount + "/5</div>";
      if (stars) html += '<p style="font-size:20px;margin:4px 0;">' + stars + "</p>";
      html += '<p style="font-size:16px;margin:8px 0;color:#94a3b8;">' + comment + "</p>";

      if (quizRound < 2) {
        html += '<p style="font-size:13px;color:#64748b;margin-bottom:8px;">已完成第' + (quizRound + 1) + "关，进度已保存</p>";
        html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnReviewRound" style="font-size:14px;">&#128203; 查看回顾</button></div>';
        html += '<div class="quiz-btn-row">';
        html += '<button class="btn-primary" id="btnNextRound" style="font-size:14px;padding:8px 24px;">进入下一关</button>';
        html += '<button class="btn-reset" id="btnRetryRound" style="font-size:14px;">重新挑战本关</button>';
        html += "</div>";
      } else {
        var total = quizScores[0] + quizScores[1] + quizScores[2];
        var totalClass = total >= 12 ? "great" : (total >= 8 ? "good" : "poor");
        var totalStars = getStars(total, 15);
        html = '<div class="quiz-score ' + totalClass + '">' + total + '</div>';
        if (totalStars) html += '<p style="font-size:20px;margin:4px 0;">' + totalStars + '</p>';
        html += '<p style="font-size:14px;color:#94a3b8;margin-bottom:8px;">第1关: ' + quizScores[0] + '/5 &nbsp; 第2关: ' + quizScores[1] + '/5 &nbsp; 第3关: ' + quizScores[2] + '/5</p>';
        html += '<p style="font-size:16px;margin:8px 0;color:' + (total >= 12 ? '#22c55e' : total >= 8 ? '#f59e0b' : '#ef4444') + ';">' + (total >= 12 ? '恭喜通关！你对自由落体运动理解透彻！' : total >= 8 ? '还不错，再复习一下错题吧！' : '建议回到实验仔细观察自由落体的规律。') + '</p>';
        html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnReviewRound" style="font-size:14px;">&#128203; 查看回顾</button></div>';
        html += '<div class="quiz-btn-row">';
        html += '<button class="btn-primary" id="btnRetryAll" style="font-size:14px;padding:8px 24px;">重新全部挑战</button>';
        html += '<button class="btn-reset" id="btnBackExp" style="font-size:14px;">返回实验</button>';
        html += '</div>';
        clearProgress();
      }

      quizResult.innerHTML = html;
      bindResultButtons();
    }

    function bindResultButtons() {
      setTimeout(function() {
        var btnNext = document.getElementById("btnNextRound");
        var btnRetry = document.getElementById("btnRetryRound");
        var btnRetryAll = document.getElementById("btnRetryAll");
        var btnBack = document.getElementById("btnBackExp");
        var btnReview = document.getElementById("btnReviewRound");
        if (btnNext) btnNext.addEventListener("click", function() { quizRound++; renderRound(); });
        if (btnRetry) btnRetry.addEventListener("click", function() { renderRound(); });
        if (btnRetryAll) btnRetryAll.addEventListener("click", function() {
          quizRound = 0; quizScores = [0,0,0]; quizHighestRound = 0;
          clearProgress(); renderRound();
        });
        if (btnBack) btnBack.addEventListener("click", function() { closeQuiz(); });
        if (btnReview) btnReview.addEventListener("click", function() { showReview(); });
      }, 100);
    }

    function showReview() {
      var html = '<p style="font-size:16px;font-weight:bold;margin-bottom:16px;color:#e2e8f0;">第' + (quizRound + 1) + '关 — 答题回顾</p>';
      var wrongCount = 0;
      var labels = ["A", "B", "C", "D"];
      for (var i = 0; i < 5; i++) {
        var q = quizQuestions[quizRound * 5 + i];
        var userAns = quizAnswers[i];
        var isCorrect = userAns === q.ans;
        if (!isCorrect) wrongCount++;
        var cardClass = isCorrect ? "correct2" : "wrong";
        var badgeHtml = isCorrect ? '<span class="rbadge ok">&#10003; 正确</span>' : '<span class="rbadge fail">&#10007; 错误</span>';
        html += '<div class="review-card ' + cardClass + '">';
        html += '<div class="rq">' + badgeHtml + (i + 1) + ". " + q.q + "</div>";
        if (!isCorrect) {
          html += '<div class="review-user-ans">你的答案：' + labels[userAns] + ". " + q.opts[userAns] + "</div>";
          html += '<div class="review-correct-ans">正确答案：' + labels[q.ans] + ". " + q.opts[q.ans] + "</div>";
          html += '<div class="review-explain"><div class="rtitle">&#128161; 解析</div><div class="rtext">' + q.explain + "</div></div>";
        } else {
          html += '<div style="font-size:13px;color:#22c55e;margin-top:2px;">你的答案：' + labels[userAns] + ". " + q.opts[userAns] + " &#10003;</div>";
        }
        html += "</div>";
      }
      if (wrongCount === 0) {
        html += '<p style="text-align:center;color:#22c55e;font-size:15px;margin-top:12px;">&#127881; 全部正确！你对自由落体运动掌握得很好！</p>';
      } else {
        html += '<p style="text-align:center;color:#f59e0b;font-size:14px;margin-top:12px;">共错 ' + wrongCount + ' 题，仔细阅读解析，理解后再继续！</p>';
      }
      html += '<div class="quiz-btn-row"><button class="btn-reset" id="btnBackResult" style="font-size:14px;">&#8592; 返回结果</button></div>';
      document.getElementById("quizBody").style.display = "none";
      document.getElementById("quizResult").style.display = "block";
      document.getElementById("quizResult").innerHTML = html;
      setTimeout(function() {
        var btnBack = document.getElementById("btnBackResult");
        if (btnBack) btnBack.addEventListener("click", function() { showRoundResultSkipSave(); });
      }, 100);
    }

    function showRoundResultSkipSave() {
      var correctCount = quizScores[quizRound];
      document.getElementById("quizBody").style.display = "none";
      document.getElementById("quizResult").style.display = "block";
      var stars = getStars(correctCount, 5);
      var scoreClass = correctCount >= 4 ? "great" : (correctCount >= 2 ? "good" : "poor");
      var comment = correctCount >= 4 ? "太棒了！" : (correctCount >= 2 ? "继续加油！" : "再看看实验吧！");
      var html = '<div class="quiz-score ' + scoreClass + '">' + correctCount + "/5</div>";
      if (stars) html += '<p style="font-size:20px;margin:4px 0;">' + stars + "</p>";
      html += '<p style="font-size:16px;margin:8px 0;color:#94a3b8;">' + comment + "</p>";
      if (quizRound < 2) {
        html += '<p style="font-size:13px;color:#64748b;margin-bottom:8px;">已完成第' + (quizRound + 1) + '关，进度已保存</p>';
        html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnReviewRound" style="font-size:14px;">&#128203; 查看回顾</button></div>';
        html += '<div class="quiz-btn-row">';
        html += '<button class="btn-primary" id="btnNextRound" style="font-size:14px;padding:8px 24px;">进入下一关</button>';
        html += '<button class="btn-reset" id="btnRetryRound" style="font-size:14px;">重新挑战本关</button>';
        html += "</div>";
      } else {
        var total = quizScores[0] + quizScores[1] + quizScores[2];
        var totalClass = total >= 12 ? "great" : (total >= 8 ? "good" : "poor");
        var totalStars = getStars(total, 15);
        html = '<div class="quiz-score ' + totalClass + '">' + total + '/15</div>';
        if (totalStars) html += '<p style="font-size:20px;margin:4px 0;">' + totalStars + '</p>';
        html += '<p style="font-size:14px;color:#94a3b8;margin-bottom:8px;">第1关: ' + quizScores[0] + '/5 &nbsp; 第2关: ' + quizScores[1] + '/5 &nbsp; 第3关: ' + quizScores[2] + "/5</p>";
        html += '<p style="font-size:16px;margin:8px 0;color:' + (total >= 12 ? '#22c55e' : total >= 8 ? '#f59e0b' : '#ef4444') + ';">' + (total >= 12 ? '恭喜通关！你对自由落体运动理解透彻！' : total >= 8 ? '还不错，再复习一下错题吧！' : '建议回到实验仔细观察自由落体的规律。') + '</p>';
        html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnReviewRound" style="font-size:14px;">&#128203; 查看回顾</button></div>';
        html += '<div class="quiz-btn-row">';
        html += '<button class="btn-primary" id="btnRetryAll" style="font-size:14px;padding:8px 24px;">重新全部挑战</button>';
        html += '<button class="btn-reset" id="btnBackExp" style="font-size:14px;">返回实验</button>';
        html += '</div>';
      }
      document.getElementById("quizResult").innerHTML = html;
      bindResultButtons();
    }

    // ============================
    //  END QUIZ
    // ============================
  </script>
  <script src="supabase.js"></script>
  <script>
    (function() {
      var header = document.querySelector('.header');
      var hideTimer = null;
      var HIDE_DELAY = 800;
      function show() { clearTimeout(hideTimer); header.classList.remove('hidden'); document.body.classList.remove('header-hidden'); }
      function hide() { hideTimer = setTimeout(function() { header.classList.add('hidden'); document.body.classList.add('header-hidden'); }, HIDE_DELAY); }
      document.addEventListener('mousemove', function(e) {
        if (e.clientY <= 60) show();
        else if (e.clientY > header.offsetHeight + 20 && !header.classList.contains('hidden')) hide();
      });
      header.addEventListener('mouseenter', show);
      header.addEventListener('mouseleave', hide);
      hideTimer = setTimeout(function() { header.classList.add('hidden'); document.body.classList.add('header-hidden'); }, 2000);
    })();
  </script>
