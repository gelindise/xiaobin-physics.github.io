        .delete-btn {
            position: absolute;

        /* 烧杯容器 */
        .equipment-container {
            position: relative;
            display: inline-block;
        }

        /* 烧杯 */
        .beaker {
            position: relative;
            width: 200px; /* 放大 */
            height: 275px; /* 放大 */
            border: 1px solid rgba(255,255,255,0.4);
            border-bottom: 3px solid rgba(255,255,255,0.6);
            border-radius: 0 0 12px 12px;
            background-color: rgba(230, 240, 255, 0.1);
            overflow: hidden;
        }
        /* 烧杯刻度 */
        .beaker::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 30%; /* 调整刻度起始位置，对齐液面 (100% - 70%) */
            bottom: 20px;
            width: 10px;
            background: repeating-linear-gradient(
                to bottom,
                rgba(0,0,0,0.3) 0,
                rgba(0,0,0,0.3) 1px,
                transparent 1px,
                transparent 12.5px /* 12.5px一格，对应1cm */
            );
            z-index: 10;
        }

        /* 液体 */
        .liquid {
            position: absolute;
            bottom: 5px;
            left: 5px;
            right: 5px;
            height: 70%; /* 降低液面高度，使其离杯沿更远，避免误解 */
            border-radius: 0 0 8px 8px;
            transition: background-color 0.5s;
        }
        /* 液体表面 */
        .liquid::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 10px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: scaleY(0.5);
        }

        /* 液体颜色变体 */
        .liquid-water { background: rgba(59, 130, 246, 0.4); } /* 水 */
        .liquid-salt { background: rgba(30, 64, 175, 0.5); } /* 盐水 */
        .liquid-alcohol { background: rgba(239, 68, 68, 0.2); } /* 酒精 */

        .manometer-wrapper {
            position: relative;
            width: 125px; /* 放大 */
            height: 425px; /* 放大 */
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .scale-plate {
            position: absolute;
            top: 25px; /* 调整 */
            width: 50px; /* 放大 */
            height: 375px; /* 放大 */
            background: #f9fafb;
            border: 1px solid #d1d5db;
            border-radius: 2px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;

            z-index: 1;

            width: 100%;
            height: 1px;
            background: #9ca3af;
            position: relative;
        }
        .scale-mark.major {
            width: 100%;
            background: #4b5563;
        }
        .scale-mark.major::after {
            content: attr(data-val);
            position: absolute;
            right: 2px;
            top: -10px; /* 调整 */
            font-size: 14px; /* 放大 */
            font-weight: bold;
            color: #374151;

            position: absolute;
            width: 10px; /* 放大 */
            height: 375px; /* 放大 */

            box-shadow: inset 1px 0 2px rgba(255,255,255,0.8), inset -1px 0 2px rgba(0,0,0,0.1);

        .u-leg-right { right: 0; top: 0; }
        
        .u-bottom {
            position: absolute;
            bottom: 15px; /* 调整 */
            left: 0;
            width: 62px; /* 放大 */
            height: 31px; /* 放大 */
            border: 1px solid rgba(150,150,150,0.4);

            border-radius: 0 0 31px 31px;
            background: rgba(255,255,255,0.2);
            box-shadow: inset 0 -2px 3px rgba(0,0,0,0.1);

            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #ef4444;
            transition: height 0.1s ease-out;
            opacity: 0.9;

        .u-liquid::after {
            content: '';
            position: absolute;

        /* 探头优化 */
        .probe-assembly {

            border-radius: 4px;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
        /* 探头盒 */
        .probe-box {
            position: absolute;
            bottom: 12px; /* 调整 */
            left: 50%;
            margin-left: -25px; /* 居中: width 50 / 2 */
            width: 50px; /* 放大 */

        }
        /* 红色薄膜 */
        .probe-membrane {

            border-radius: 50%;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
        }
        /* 探头方向指示箭头 */
        .probe-arrow {
            position: absolute;
            right: -15px;
            top: -5px;
            color: #ef4444;
            font-size: 12px;
            font-weight: bold;
            opacity: 0.8;
        }

        /* 表格样式 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 16px; /* 表格字体增大 */
        }
        .data-table th {
            background: #f3f4f6;
            color: #4b5563;
            font-weight: 700;
            text-align: left;
            padding: 12px; /* 增加内边距 */
            border-bottom: 2px solid #e5e7eb;
        }
        .data-table td {
            padding: 12px; /* 增加内边距 */
            border-bottom: 1px solid #f3f4f6;
            color: #1f2937;
        }
        .data-table tr:last-child td {
            border-bottom: none;
        }
        
        /* 滚动条美化 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 2px;
        }

        /* 拖拽源样式 */
        .draggable-source {
            cursor: grab;
            transition: transform 0.2s;
        }

            transform: scale(1.05);
        }
        .draggable-source.dragging {

        /* 放置区域高亮 */
        .drop-zone {
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            transition: all 0.3s;
        }
        .drop-zone.drag-over {
            border-color: #3b82f6;

            filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.3));
        }

                    &lt;span class=&quot;text-gray-400 text-sm font-medium dashed-text&quot;&gt;放置烧杯&lt;/span&gt;
                    &lt;!-- 动态插入烧杯 --&gt;
                &lt;/div&gt;

                &lt;!-- 压强计放置区 --&gt;
                &lt;div id=&quot;drop-zone-manometer&quot; class=&quot;drop-zone w-48 h-96 flex items-center justify-center pointer-events-auto relative&quot;&gt;
                    &lt;span class=&quot;text-gray-400 text-sm font-medium dashed-text&quot;&gt;放置压强计&lt;/span&gt;
                    &lt;!-- 动态插入压强计 --&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- 探头 (初始隐藏，组装压强计后显示) --&gt;
            &lt;div id=&quot;probe&quot; class=&quot;probe-assembly hidden&quot; style=&quot;left: 50%; top: 50%;&quot;&gt;
                &lt;div class=&quot;metal-rod&quot;&gt;&lt;/div&gt;
                &lt;div class=&quot;probe-box&quot;&gt;
                    &lt;div class=&quot;probe-membrane&quot;&gt;&lt;/div&gt;
                &lt;/div&gt;
                &lt;div class=&quot;probe-arrow&quot;&gt;0&amp;deg;&lt;/div&gt;
            &lt;/div&gt;

        &lt;/section&gt;

        &lt;!-- 右侧显示板 --&gt;
        &lt;aside class=&quot;w-96 bg-white border-l border-gray-200 flex flex-col shadow-sm z-20&quot;&gt;
            &lt;!-- 1. 控制面板 --&gt;
            &lt;div class=&quot;p-5 border-b border-gray-100&quot;&gt;
                &lt;h3 class=&quot;text-lg font-bold text-gray-800 mb-4 flex items-center gap-2&quot;&gt;
                    &lt;span class=&quot;w-1 h-6 bg-blue-600 rounded-full&quot;&gt;&lt;/span&gt;
                    控制面板
                &lt;/h3&gt;
                
                &lt;div class=&quot;space-y-5&quot;&gt;
                    &lt;!-- 深度控制 --&gt;
                    &lt;div&gt;
                        &lt;div class=&quot;flex justify-between text-base mb-2&quot;&gt;
                            &lt;span class=&quot;text-gray-600&quot;&gt;探头深度 (cm)&lt;/span&gt;
                            &lt;span id=&quot;val-depth&quot; class=&quot;font-bold text-blue-600 text-lg&quot;&gt;0.0&lt;/span&gt;
                        &lt;/div&gt;
                        &lt;input type=&quot;range&quot; id=&quot;depth-control&quot; min=&quot;0&quot; max=&quot;15&quot; step=&quot;0.1&quot; value=&quot;0&quot; class=&quot;w-full h-3 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600&quot; disabled&gt;
                        &lt;div class=&quot;flex justify-between text-sm text-gray-400 mt-1&quot;&gt;
                            &lt;span&gt;0&lt;/span&gt;
                            &lt;span&gt;15&lt;/span&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;

                    &lt;!-- 方向控制 --&gt;
                    &lt;div&gt;
                        &lt;div class=&quot;flex justify-between text-base mb-2&quot;&gt;
                            &lt;span class=&quot;text-gray-600&quot;&gt;探头方向 (角度)&lt;/span&gt;
                            &lt;span id=&quot;angle-val&quot; class=&quot;font-bold text-blue-600 text-lg&quot;&gt;0&amp;deg;&lt;/span&gt;
                        &lt;/div&gt;
                        &lt;input type=&quot;range&quot; id=&quot;angle-control&quot; min=&quot;0&quot; max=&quot;360&quot; value=&quot;0&quot; class=&quot;w-full h-3 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600&quot; disabled&gt;
                        &lt;div class=&quot;flex justify-between text-sm text-gray-400 mt-1&quot;&gt;
                            &lt;span&gt;0&amp;deg;&lt;/span&gt;
                            &lt;span&gt;180&amp;deg;&lt;/span&gt;
                            &lt;span&gt;360&amp;deg;&lt;/span&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;

                    &lt;!-- 按钮组 --&gt;
                    &lt;div class=&quot;flex gap-3 pt-2&quot;&gt;
                        &lt;button id=&quot;record-btn&quot; class=&quot;flex-1 py-3 bg-blue-100 text-blue-700 hover:bg-blue-200 rounded-lg text-base font-bold transition-colors&quot; disabled&gt;
                            记录数据
                        &lt;/button&gt;
                        &lt;button id=&quot;clear-btn&quot; class=&quot;px-6 py-3 border border-gray-300 text-gray-600 hover:bg-gray-50 rounded-lg text-base font-medium transition-colors&quot;&gt;
                            清除
                        &lt;/button&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- 2. 实验记录 --&gt;
            &lt;div class=&quot;flex-1 flex flex-col overflow-hidden bg-gray-50&quot;&gt;
                &lt;div class=&quot;p-5 pb-2&quot;&gt;
                    &lt;h3 class=&quot;text-base font-bold text-gray-700&quot;&gt;实验记录&lt;/h3&gt;
                &lt;/div&gt;
                &lt;div class=&quot;flex-1 overflow-y-auto custom-scrollbar px-4 pb-4&quot;&gt;
                    &lt;div class=&quot;bg-white rounded-lg border border-gray-200 overflow-hidden min-h-[200px]&quot;&gt;
                        &lt;table class=&quot;data-table&quot;&gt;
                            &lt;thead&gt;
                                &lt;tr&gt;
                                    &lt;th&gt;液体&lt;/th&gt;
                                    &lt;th&gt;深度&lt;/th&gt;
                                    &lt;th&gt;方向&lt;/th&gt;
                                    &lt;th&gt;高度差&lt;/th&gt;
                                &lt;/tr&gt;
                            &lt;/thead&gt;
                            &lt;tbody id=&quot;data-table-body&quot;&gt;
                                &lt;!-- 数据行 --&gt;
                            &lt;/tbody&gt;
                        &lt;/table&gt;
                        &lt;div id=&quot;empty-tip&quot; class=&quot;text-center text-gray-400 text-xs py-8&quot;&gt;
                            暂无数据，请点击&amp;ldquo;记录数据&amp;rdquo;
                        &lt;/div&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- 3. 当前结论 --&gt;
            &lt;div class=&quot;p-5 bg-blue-50 border-t border-blue-100&quot;&gt;
                &lt;h3 class=&quot;text-base font-bold text-blue-800 mb-2&quot;&gt;当前结论&lt;/h3&gt;
                &lt;p id=&quot;conclusion-text&quot; class=&quot;text-lg font-bold text-blue-900 leading-relaxed&quot;&gt;
                    请组装器材开始实验...
                &lt;/p&gt;
            &lt;/div&gt;
        &lt;/aside&gt;
    &lt;/main&gt;

    &lt;script&gt;
        // --- 状态管理 ---
        const state = {
            liquidType: null, // 'water', 'salt', 'alcohol'
            liquidDensity: 0,
            hasManometer: false,
            probeX: 0,
            probeY: 0,
            probeAngle: 0,
            depth: 0,
            pressureDiff: 0
        };

        const LIQUID_CONFIG = {
            'water': { name: '水', density: 1.0, colorClass: 'liquid-water' },
            'salt': { name: '盐水', density: 1.2, colorClass: 'liquid-salt' },
            'alcohol': { name: '酒精', density: 0.8, colorClass: 'liquid-alcohol' }
        };

        // --- DOM 元素 ---
        const stage = document.getElementById('experiment-stage');
        const dropZoneBeaker = document.getElementById('drop-zone-beaker');
        const dropZoneManometer = document.getElementById('drop-zone-manometer');
        const probe = document.getElementById('probe');
        const hosePath = document.getElementById('hose-path');
        
        // 新控制面板元素
        const depthControl = document.getElementById('depth-control');
        const valDepth = document.getElementById('val-depth');
        const angleControl = document.getElementById('angle-control');
        const angleVal = document.getElementById('angle-val');
        const recordBtn = document.getElementById('record-btn');
        const clearBtn = document.getElementById('clear-btn');
        const dataTableBody = document.getElementById('data-table-body');
        const emptyTip = document.getElementById('empty-tip');
        const conclusionText = document.getElementById('conclusion-text');

        // 记录的数据
        let recordedData = [];

        // --- 拖拽组装逻辑 (Drag &amp; Drop API) ---
        const draggables = document.querySelectorAll('.draggable-source');

        draggables.forEach(draggable =&gt; {
            draggable.addEventListener('dragstart', (e) =&gt; {
                e.dataTransfer.setData('type', draggable.dataset.type);
                draggable.classList.add('dragging');
            });

            draggable.addEventListener('dragend', () =&gt; {
                draggable.classList.remove('dragging');
            });
        });

        [dropZoneBeaker, dropZoneManometer].forEach(zone =&gt; {
            zone.addEventListener('dragover', (e) =&gt; {
                e.preventDefault(); // 允许放置
                if (!zone.classList.contains('occupied')) {
                    zone.classList.add('drag-over');
                }
            });

            zone.addEventListener('dragleave', () =&gt; {
                zone.classList.remove('drag-over');
            });

            zone.addEventListener('drop', (e) =&gt; {
                e.preventDefault();
                zone.classList.remove('drag-over');
                const type = e.dataTransfer.getData('type');
                handleDrop(zone, type);
            });
        });

        function handleDrop(zone, type) {
            if (zone.classList.contains('occupied')) return;

            // 处理烧杯放置
            if (zone.id === 'drop-zone-beaker' &amp;&amp; type.startsWith('beaker-')) {
                const liquidKey = type.split('-')[1];
                placeBeaker(liquidKey);
                addLog(`放置了${LIQUID_CONFIG[liquidKey].name}烧杯`);
            }

            // 处理压强计放置
            if (zone.id === 'drop-zone-manometer' &amp;&amp; type === 'manometer') {
                placeManometer();
                addLog('放置了U形管压强计');
            }
        }

        function placeBeaker(liquidKey) {
            // 清理旧的（如果有）
            dropZoneBeaker.innerHTML = '';
            dropZoneBeaker.classList.add('occupied');
            
            // 容器
            const container = document.createElement('div');
            container.className = 'equipment-container';

            // 删除按钮
            const deleteBtn = createDeleteBtn('beaker', container);
            container.appendChild(deleteBtn);

            // 创建烧杯 DOM
            const beaker = document.createElement('div');
            beaker.className = 'beaker glass-effect';
            
            const liquid = document.createElement('div');
            liquid.className = `liquid ${LIQUID_CONFIG[liquidKey].colorClass}`;
            liquid.id = 'active-liquid'; // 用于碰撞检测
            
            beaker.appendChild(liquid);
            container.appendChild(beaker);
            dropZoneBeaker.appendChild(container);

            // 更新状态
            state.liquidType = liquidKey;
            state.liquidDensity = LIQUID_CONFIG[liquidKey].density;
            updateDataPanel();
            checkExperimentReady();
        }

        function placeManometer() {
            dropZoneManometer.innerHTML = '';
            dropZoneManometer.classList.add('occupied');

            // 容器
            const container = document.createElement('div');
            container.className = 'equipment-container';

            // 删除按钮
            const deleteBtn = createDeleteBtn('manometer', container);
            container.appendChild(deleteBtn);

            // 压强计外壳
            const wrapper = document.createElement('div');
            wrapper.className = 'manometer-wrapper';

            // 1. 刻度板
            const scalePlate = document.createElement('div');
            scalePlate.className = 'scale-plate';
            // 生成刻度
            for(let i=0; i&lt;=20; i++) {
                const mark = document.createElement('div');
                mark.className = i % 5 === 0 ? 'scale-mark major' : 'scale-mark';
                if(i % 5 === 0) mark.setAttribute('data-val', 10 - i); // 10 到 -10
                scalePlate.appendChild(mark);
            }
            wrapper.appendChild(scalePlate);

            // 2. U形管
            const uTube = document.createElement('div');
            uTube.className = 'u-tube-container';
            uTube.innerHTML = `
                &lt;div class=&quot;u-leg u-leg-left&quot;&gt;&lt;div class=&quot;u-liquid&quot; id=&quot;u-left&quot; style=&quot;height: 50%&quot;&gt;&lt;/div&gt;&lt;/div&gt;
                &lt;div class=&quot;u-leg u-leg-right&quot;&gt;&lt;div class=&quot;u-liquid&quot; id=&quot;u-right&quot; style=&quot;height: 50%&quot;&gt;&lt;/div&gt;&lt;/div&gt;
                &lt;div class=&quot;u-bottom&quot;&gt;&lt;/div&gt;
                &lt;div class=&quot;u-liquid-connector&quot;&gt;&lt;/div&gt;
            `;
            wrapper.appendChild(uTube);

            container.appendChild(wrapper);
            dropZoneManometer.appendChild(container);

            // 显示探头
            state.hasManometer = true;
            probe.classList.remove('hidden');
            
            // 初始化探头位置到压强计旁边
            const rect = dropZoneManometer.getBoundingClientRect();
            const stageRect = stage.getBoundingClientRect();
            // 初始位置：压强计左侧一点
            state.probeX = rect.left - stageRect.left - 80;
            state.probeY = rect.top - stageRect.top + 150;
            updateProbePosition();
            
            checkExperimentReady();
            
            // 弹出气密性检查提示
            setTimeout(() =&gt; {
                document.getElementById('airtightness-modal').classList.remove('hidden');
            }, 500);
        }

        // 气密性检查确认
        document.getElementById('check-confirm-btn').addEventListener('click', () =&gt; {
            document.getElementById('airtightness-modal').classList.add('hidden');
            addLog('✅ 已检查装置气密性，状态良好');
            
            // 模拟一下液面跳动，增加真实感
            const uLeft = document.getElementById('u-left');
            const uRight = document.getElementById('u-right');
            if(uLeft &amp;&amp; uRight) {
                anime({
                    targets: uLeft,
                    height: ['50%', '45%', '50%'],
                    duration: 600,
                    easing: 'easeInOutQuad'
                });
                anime({
                    targets: uRight,
                    height: ['50%', '55%', '50%'],
                    duration: 600,
                    easing: 'easeInOutQuad'
                });
            }
        });

        // 警告模态框确认
        document.getElementById('warning-confirm-btn').addEventListener('click', () =&gt; {
            document.getElementById('warning-modal').classList.add('hidden');
        });

        function createDeleteBtn(type, parent) {
            const btn = document.createElement('div');
            btn.className = 'delete-btn';
            btn.innerHTML = '&amp;times;';
            btn.title = '移除器材';
            btn.onclick = (e) =&gt; {
                e.stopPropagation();
                removeEquipment(type);
            };
            return btn;
        }

        function removeEquipment(type) {
            if (type === 'beaker') {
                // 检查探头是否在液体中
                if (state.depth &gt; 0.1) {
                    document.getElementById('warning-modal').classList.remove('hidden');
                    return;
                }

                dropZoneBeaker.innerHTML = '&lt;span class=&quot;text-gray-400 text-sm font-medium dashed-text&quot;&gt;放置烧杯&lt;/span&gt;';
                dropZoneBeaker.classList.remove('occupied');
                state.liquidType = null;
                state.liquidDensity = 0;
                updateDataPanel();
                // 禁用记录按钮
                recordBtn.disabled = true;
                recordBtn.classList.add('bg-blue-100', 'text-blue-700');
                recordBtn.classList.remove('bg-blue-600', 'text-white', 'hover:bg-blue-700');
            } else if (type === 'manometer') {
                dropZoneManometer.innerHTML = '&lt;span class=&quot;text-gray-400 text-sm font-medium dashed-text&quot;&gt;放置压强计&lt;/span&gt;';
                dropZoneManometer.classList.remove('occupied');
                state.hasManometer = false;
                probe.classList.add('hidden');
                angleControl.disabled = true;
                depthControl.disabled = true;
                // 隐藏软管
                hosePath.setAttribute('d', 'M0,0');
            }
            // 重置数据
            state.depth = 0;
            state.pressureDiff = 0;
            updateDisplay();
            updateConclusion('器材已移除。');
        }

        function checkExperimentReady() {
            if (state.hasManometer) {
                angleControl.disabled = false;
            }
            if (state.hasManometer &amp;&amp; state.liquidType) {
                // 启用记录按钮
                recordBtn.disabled = false;
                recordBtn.classList.remove('bg-blue-100', 'text-blue-700');
                recordBtn.classList.add('bg-blue-600', 'text-white', 'hover:bg-blue-700');
                
                updateConclusion('器材就绪。请拖动探头放入液体，或使用滑块控制深度。');
            }
        }

        // --- 探头交互逻辑 (Mouse Events) ---
        let isDraggingProbe = false;
        let dragOffset = { x: 0, y: 0 };

        probe.addEventListener('mousedown', (e) =&gt; {
            isDraggingProbe = true;
            const rect = probe.getBoundingClientRect();
            dragOffset.x = e.clientX - rect.left;
            dragOffset.y = e.clientY - rect.top;
            probe.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', (e) =&gt; {
            if (!isDraggingProbe) return;

            const stageRect = stage.getBoundingClientRect();
            let newX = e.clientX - stageRect.left - dragOffset.x;
            let newY = e.clientY - stageRect.top - dragOffset.y;

            // 边界限制
            newX = Math.max(0, Math.min(newX, stageRect.width - probe.offsetWidth));
            newY = Math.max(0, Math.min(newY, stageRect.height - probe.offsetHeight));

            state.probeX = newX;
            state.probeY = newY;
            
            updateProbePosition();
            calculatePhysics();
        });

        window.addEventListener('mouseup', () =&gt; {
            isDraggingProbe = false;
            probe.style.cursor = 'grab';
        });

        // 探头角度控制
        angleControl.addEventListener('input', (e) =&gt; {
            state.probeAngle = parseInt(e.target.value);
            angleVal.textContent = state.probeAngle + '&amp;deg;';
            // 旋转探头盒
            const probeBox = probe.querySelector('.probe-box');
            if(probeBox) {
                probeBox.style.transform = `rotate(${state.probeAngle}deg)`;
            }
            // 更新箭头文字
            const arrow = probe.querySelector('.probe-arrow');
            if(arrow) arrow.textContent = state.probeAngle + '&amp;deg;';
        });

        // 深度滑块控制
        depthControl.addEventListener('input', (e) =&gt; {
            if (!state.liquidType || !state.hasManometer) return;
            
            const targetDepth = parseFloat(e.target.value);
            valDepth.textContent = targetDepth.toFixed(1);
            
            // 反向计算探头Y坐标
            // depth = (probeY - liquidTop) / 10
            // probeY = liquidTop + depth * 10
            const liquidEl = document.getElementById('active-liquid');
            if (liquidEl) {
                const liquidRect = liquidEl.getBoundingClientRect();
                const stageRect = stage.getBoundingClientRect();
                const liquidTopRel = liquidRect.top - stageRect.top;
                
                // 探头盒中心位置
                const probeBox = probe.querySelector('.probe-box');
                const boxRect = probeBox.getBoundingClientRect();
                const probeRect = probe.getBoundingClientRect();
                const boxCenterOffset = (boxRect.top + boxRect.height/2) - probeRect.top;

                // 视觉修正：液面基准下移 5px
                const liquidSurfaceRel = liquidTopRel + 5;

                // 设置新的Y坐标
                state.probeY = liquidSurfaceRel + (targetDepth * 12.5) - boxCenterOffset; // 比例尺 12.5px
                
                // 限制X坐标在液体内(如果不在的话，强制移入)
                const liquidLeftRel = liquidRect.left - stageRect.left;
                const liquidRightRel = liquidRect.right - stageRect.left;
                const probeCenterX = state.probeX + probeRect.width/2;
                
                if (probeCenterX &lt; liquidLeftRel + 20 || probeCenterX &gt; liquidRightRel - 20) {
                    state.probeX = liquidLeftRel + liquidRect.width/2 - probeRect.width/2;
                }

                updateProbePosition();
                calculatePhysics();
            }
        });

        // 记录数据
        recordBtn.addEventListener('click', () =&gt; {
            if (!state.liquidType) return;
            
            const data = {
                liquid: LIQUID_CONFIG[state.liquidType].name,
                depth: state.depth.toFixed(1),
                angle: state.probeAngle,
                diff: state.pressureDiff.toFixed(1)
            };
            
            recordedData.push(data);
            renderTable();
            analyzeData();
        });

        // 清除数据
        clearBtn.addEventListener('click', () =&gt; {
            recordedData = [];
            renderTable();
            updateConclusion('数据已清除。');
        });

        function renderTable() {
            dataTableBody.innerHTML = '';
            if (recordedData.length === 0) {
                emptyTip.style.display = 'block';
                return;
            }
            emptyTip.style.display = 'none';
            
            recordedData.forEach(row =&gt; {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    &lt;td&gt;${row.liquid}&lt;/td&gt;
                    &lt;td&gt;${row.depth}&lt;/td&gt;
                    &lt;td&gt;${row.angle}&amp;deg;&lt;/td&gt;
                    &lt;td class=&quot;font-bold text-blue-600&quot;&gt;${row.diff}&lt;/td&gt;
                `;
                dataTableBody.appendChild(tr);
            });
            // 滚动到底部
            dataTableBody.parentElement.parentElement.scrollTop = dataTableBody.parentElement.parentElement.scrollHeight;
        }

        function analyzeData() {
            if (recordedData.length &lt; 2) {
                updateConclusion('请继续记录数据以寻找规律。');
                return;
            }

            const last = recordedData[recordedData.length - 1];
            const prev = recordedData[recordedData.length - 2];

            let conclusion = '';

            if (last.liquid === prev.liquid) {
                if (Math.abs(parseFloat(last.depth) - parseFloat(prev.depth)) &gt; 0.1) {
                    conclusion = '结论：同种液体中，深度越深，压强越大。';
                } else if (last.angle !== prev.angle) {
                    conclusion = '结论：同种液体同一深度，向各个方向的压强相等。';
                }
            } else {
                if (Math.abs(parseFloat(last.depth) - parseFloat(prev.depth)) &lt; 0.1) {
                    conclusion = '结论：深度相同时，液体密度越大，压强越大。';
                }
            }

            if (!conclusion) conclusion = '对比数据，观察液体压强与深度、密度的关系。';
            updateConclusion(conclusion);
        }

        function updateConclusion(text) {
            conclusionText.textContent = text;
        }

        // --- 物理计算与渲染 ---
        function updateProbePosition() {
            probe.style.left = state.probeX + 'px';
            probe.style.top = state.probeY + 'px';
            updateHose();
        }

        function updateHose() {
            if (!state.hasManometer) return;

            // 软管起点：探头金属杆顶部 (居中)
            const startX = state.probeX + 25; // probe-assembly width 50 / 2
            const startY = state.probeY + 5;

            // 软管终点：U形管左侧顶部
            const uTube = document.querySelector('.u-tube-container');
            if (!uTube) return;
            const uRect = uTube.getBoundingClientRect();
            const stageRect = stage.getBoundingClientRect();
            
            // 连接到左管口 (u-leg-left is at left:0)
            // u-tube-container top is 20px relative to wrapper
            // wrapper is relative to stage?
            // getBoundingClientRect handles all offsets
            
            const endX = uRect.left - stageRect.left + 5; // +5 是管子半径
            const endY = uRect.top - stageRect.top + 5;

            // 贝塞尔曲线控制点
            const cp1x = startX;
            const cp1y = startY - 100; // 向上拱起
            const cp2x = endX;
            const cp2y = endY - 50;

            const d = `M ${startX} ${startY} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${endX} ${endY}`;
            hosePath.setAttribute('d', d);
        }

        function calculatePhysics() {
            if (!state.liquidType) return;

            const liquidEl = document.getElementById('active-liquid');
            if (!liquidEl) return;

            const probeRect = probe.getBoundingClientRect();
            const liquidRect = liquidEl.getBoundingClientRect();
            const probeCenterY = probeRect.top + probeRect.height / 2;
            const probeCenterX = probeRect.left + probeRect.width / 2;

            // 碰撞检测：探头中心是否在液体矩形内
            // 修正：放宽顶部边界判断，允许探头在液面附近时也触发计算，避免浅水区失效
            const isInLiquid = (
                probeCenterX &gt; liquidRect.left &amp;&amp;
                probeCenterX &lt; liquidRect.right &amp;&amp;
                probeCenterY &gt; liquidRect.top - 10 &amp;&amp; // 允许高出液面10px范围内触发计算
                probeCenterY &lt; liquidRect.bottom
            );

            if (isInLiquid) {
                // 计算深度 (px) -&gt; 转换为 cm (假设 10px = 1cm)
                // 探头中心点修正：探头盒的位置
                const probeBox = probe.querySelector('.probe-box');
                const boxRect = probeBox.getBoundingClientRect();
                
                // 视觉修正：液面有一个厚度，取液面椭圆的垂直中心作为0点 (liquidRect.top + 5px)
                const liquidSurfaceY = liquidRect.top + 5;
                const probeCenterY = boxRect.top + boxRect.height/2;
                
                const depthPx = probeCenterY - liquidSurfaceY;
                const depthCm = Math.max(0, depthPx / 12.5); // 比例尺调整：烧杯放大1.25倍，10px -&gt; 12.5px = 1cm
                
                state.depth = depthCm;
                
                // 压强公式模拟: P = rho * g * h
                state.pressureDiff = state.liquidDensity * depthCm * 1.5;
            } else {
                state.depth = 0;
                state.pressureDiff = 0;
            }

            updateDisplay();
        }

        function updateDisplay() {
            // 更新面板数值
            // elDataDepth.textContent = state.depth.toFixed(1);
            // elDataDiff.textContent = state.pressureDiff.toFixed(1);
            
            // 同步深度滑块
            if (state.depth &gt; 0) {
                depthControl.value = state.depth;
                depthControl.disabled = false;
                valDepth.textContent = state.depth.toFixed(1);
            } else {
                // 如果探头在外面，禁用滑块？或者允许滑块把探头吸进去？
                // 这里选择：如果探头在外面，滑块归零但可用（作为入水入口）
                if (state.hasManometer &amp;&amp; state.liquidType) {
                    depthControl.disabled = false;
                } else {
                    depthControl.disabled = true;
                }
            }

            // 更新U形管液面
            const uLeft = document.getElementById('u-left');
            const uRight = document.getElementById('u-right');
            
            if (uLeft &amp;&amp; uRight) {
                // 基础高度 50%
                // 压强越大，左侧下降，右侧上升
                // 限制最大变化范围 45% (即 5% - 95%)
                // 修正系数：U形管高度300px对应20cm刻度范围，即1cm=15px
                // 单侧变化量(cm) = diff / 2
                // 单侧变化量(px) = (diff / 2) * 15
                // 单侧变化量(%) = ((diff / 2) * 15 / 300) * 100 = diff * 2.5
                const change = Math.min(45, state.pressureDiff * 2.5);
                
                uLeft.style.height = (50 - change) + '%';
                uRight.style.height = (50 + change) + '%';
            }
        }

        function updateDataPanel() {
            // 仅更新结论提示，不再更新旧的数据面板
            if (state.liquidType) {
                updateConclusion(`当前液体：${LIQUID_CONFIG[state.liquidType].name}。请调节深度或方向并记录数据。`);
            }
        }

        function addLog(msg) {
            // 兼容旧代码调用，不再显示日志，改为更新结论或忽略
            // console.log(msg);
        }



        // 窗口大小改变时更新软管
        window.addEventListener('resize', updateHose);

        // 全屏功能
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        fullscreenBtn.addEventListener('click', () =&gt; {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err =&gt; {
                    console.log(`Error attempting to enable full-screen mode: ${err.message} (${err.name})`);
                });
                fullscreenBtn.innerHTML = `
                    &lt;svg class=&quot;w-4 h-4&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;2&quot; d=&quot;M6 18L18 6M6 6l12 12&quot;&gt;&lt;/path&gt;&lt;/svg&gt;
                    退出全屏
                `;
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                    fullscreenBtn.innerHTML = `
                        &lt;svg class=&quot;w-4 h-4&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;2&quot; d=&quot;M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4&quot;&gt;&lt;/path&gt;&lt;/svg&gt;
                        全屏显示
                    `;
                }
            }
        });

        // 监听全屏变化，更新按钮状态（处理按ESC退出的情况）
        document.addEventListener('fullscreenchange', () =&gt; {
            if (!document.fullscreenElement) {
                fullscreenBtn.innerHTML = `
                    &lt;svg class=&quot;w-4 h-4&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;2&quot; d=&quot;M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4&quot;&gt;&lt;/path&gt;&lt;/svg&gt;
                    全屏显示
                `;
            }
        });

    &lt;/script&gt;
