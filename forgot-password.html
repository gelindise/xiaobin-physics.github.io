<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>找回密码 - 物理虚拟实验</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: cardIn 0.5s ease-out;
      position: relative;
      overflow: hidden;
    }
    .auth-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
      pointer-events: none;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
      position: relative;
    }
    .auth-header .icon-wrap {
      width: 64px;
      height: 64px;
      margin: 0 auto 1rem;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      box-shadow: 0 8px 24px rgba(245, 158, 11, 0.3);
    }
    .auth-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .auth-header p {
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .input-group {
      position: relative;
      margin-bottom: 1rem;
    }
    .input-group .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      opacity: 0.5;
      pointer-events: none;
    }
    .input-group input {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.6rem;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--text-main);
      font-size: 0.9rem;
      transition: all 0.3s ease;
      outline: none;
    }
    .input-group input::placeholder {
      color: rgba(148, 163, 184, 0.4);
    }
    .input-group input:focus {
      border-color: var(--primary);
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    .auth-btn {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
      margin-top: 0.5rem;
    }
    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
    }
    .auth-btn:active {
      transform: translateY(0);
    }
    .auth-btn.warn {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
    }
    .auth-btn.warn:hover {
      box-shadow: 0 8px 25px rgba(245, 158, 11, 0.5);
    }
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .auth-footer a {
      color: var(--secondary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }
    .auth-footer a:hover {
      color: var(--primary);
    }
    .auth-tip {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.85rem;
      min-height: 1.5rem;
    }
    .auth-tip.success { color: #4ade80; }
    .auth-tip.error { color: #ef4444; }
    .auth-tip.info { color: #60a5fa; }
    .user-list {
      list-style: none;
      padding: 0;
      margin: 0.5rem 0;
    }
    .user-list li {
      padding: 0.6rem 0.8rem;
      margin-bottom: 0.4rem;
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
    }
    .user-list li:hover {
      background: rgba(59, 130, 246, 0.2);
      border-color: var(--primary);
    }
    #step1, #step2 { display: none; }
    #step1.active, #step2.active { display: block; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="icon-wrap">🔐</div>
        <h2>找回密码</h2>
        <p>通过注册邮箱找回你的账号</p>
      </div>

      <!-- Step 1: 输入邮箱 -->
      <div id="step1" class="active">
        <div class="input-group">
          <span class="input-icon">📧</span>
          <input type="email" id="recoverEmail" placeholder="请输入注册时填写的邮箱" autocomplete="email">
        </div>
        <button class="auth-btn" onclick="lookupEmail()">查找账号</button>
        <div class="auth-tip" id="step1Tip"></div>
      </div>

      <!-- Step 2: 重置密码 -->
      <div id="step2">
        <div id="foundUser" style="text-align:center;margin-bottom:1rem;"></div>
        <div class="input-group">
          <span class="input-icon">🔒</span>
          <input type="password" id="newPwd" placeholder="设置新密码（至少4位）" autocomplete="new-password">
        </div>
        <div class="input-group">
          <span class="input-icon">🔒</span>
          <input type="password" id="newPwd2" placeholder="再次输入新密码确认">
        </div>
        <button class="auth-btn warn" id="resetBtn" onclick="doReset()">重置密码</button>
        <button class="auth-btn" style="margin-top:0.5rem;background:rgba(255,255,255,0.08);box-shadow:none;" onclick="goBack()">← 返回上一步</button>
        <div class="auth-tip" id="step2Tip"></div>
      </div>

      <div class="auth-footer">
        <a href="login.html">← 返回登录</a>
      </div>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script>
    var foundUsers = [];
    var selectedUser = null;

    function lookupEmail() {
      var email = document.getElementById('recoverEmail').value.trim();
      var tip = document.getElementById('step1Tip');
      if (!email) {
        tip.className = 'auth-tip error';
        tip.textContent = '⚠️ 请输入邮箱地址';
        return;
      }
      tip.textContent = '';
      document.getElementById('step1Tip').className = 'auth-tip info';
      document.getElementById('step1Tip').textContent = '正在查找...';

      SB.query('users', { select: 'username,email', filter: { col: 'email', val: 'eq.' + encodeURIComponent(email) } })
        .then(function(users) {
          if (!users || users.length === 0) {
            document.getElementById('step1Tip').className = 'auth-tip error';
            document.getElementById('step1Tip').textContent = '未找到该邮箱关联的账号，请确认邮箱或联系管理员';
            return;
          }
          foundUsers = users;
          if (users.length === 1) {
            selectUser(users[0]);
          } else {
            // 多个账号用同一邮箱
            var html = '<p style="color:#60a5fa;margin-bottom:0.5rem;">找到 ' + users.length + ' 个关联账号，请选择：</p><ul class="user-list">';
            users.forEach(function(u) {
              html += '<li onclick="selectUserByName(\'' + u.username + '\')">👤 ' + u.username + '</li>';
            });
            html += '</ul>';
            document.getElementById('step1Tip').className = 'auth-tip info';
            document.getElementById('step1Tip').innerHTML = html;
          }
        })
        .catch(function(e) {
          document.getElementById('step1Tip').className = 'auth-tip error';
          document.getElementById('step1Tip').textContent = '查询失败，请稍后重试';
        });
    }

    window.selectUserByName = function(name) {
      var u = foundUsers.find(function(x) { return x.username === name; });
      if (u) selectUser(u);
    };

    function selectUser(user) {
      selectedUser = user;
      document.getElementById('step1').classList.remove('active');
      document.getElementById('step2').classList.add('active');
      document.getElementById('foundUser').innerHTML = '<span class="auth-tip info">👤 账号：<strong>' + user.username + '</strong></span>';
      document.getElementById('newPwd').value = '';
      document.getElementById('newPwd2').value = '';
      document.getElementById('step2Tip').textContent = '';
      document.getElementById('step2Tip').className = 'auth-tip';
      document.getElementById('resetBtn').disabled = false;
    }

    function doReset() {
      var pwd = document.getElementById('newPwd').value.trim();
      var pwd2 = document.getElementById('newPwd2').value.trim();
      var tip = document.getElementById('step2Tip');
      if (!pwd || pwd.length < 4) {
        tip.className = 'auth-tip error';
        tip.textContent = '⚠️ 密码至少需要4个字符';
        return;
      }
      if (pwd !== pwd2) {
        tip.className = 'auth-tip error';
        tip.textContent = '⚠️ 两次输入的密码不一致';
        return;
      }
      document.getElementById('resetBtn').disabled = true;
      tip.className = 'auth-tip info';
      tip.textContent = '正在重置...';

      SB.updateUser(selectedUser.username, { password: pwd })
        .then(function() {
          tip.className = 'auth-tip success';
          tip.innerHTML = '✅ 密码重置成功！<a href="login.html" style="color:var(--secondary);">立即登录</a>';
        })
        .catch(function(e) {
          // 降级：尝试用 fetch 直接更新
          fetch(SUPABASE_URL + '/rest/v1/users?username=eq.' + encodeURIComponent(selectedUser.username), {
            method: 'PATCH',
            headers: {
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
              'Content-Type': 'application/json',
              'Prefer': 'return=representation'
            },
            body: JSON.stringify({ password: pwd })
          })
          .then(function(r) { return r.json(); })
          .then(function() {
            tip.className = 'auth-tip success';
            tip.innerHTML = '✅ 密码重置成功！<a href="login.html" style="color:var(--secondary);">立即登录</a>';
          })
          .catch(function() {
            tip.className = 'auth-tip error';
            tip.textContent = '重置失败，请稍后重试或联系管理员';
            document.getElementById('resetBtn').disabled = false;
          });
        });
    }

    function goBack() {
      document.getElementById('step2').classList.remove('active');
      document.getElementById('step1').classList.add('active');
      document.getElementById('step1Tip').textContent = '';
      document.getElementById('step1Tip').className = 'auth-tip';
      selectedUser = null;
      foundUsers = [];
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        if (document.getElementById('step1').classList.contains('active')) {
          lookupEmail();
        } else {
          doReset();
        }
      }
    });
  </script>
</body>
</html>
