<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>奥斯特实验 - 物理虚拟实验</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <script src="protect.js"></script>
  <style>
    :root {
      --primary: #3b82f6;
      --primary-dark: #1e40af;
      --bg-dark: #0b1120;
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --glass-border: rgba(148, 163, 184, 0.12);
      --card-bg: rgba(15, 23, 42, 0.6);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-dark);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }
    .particle-bg {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.06) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 50%, rgba(99,102,241,0.06) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }

    header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.6rem 2rem;
      background: rgba(11, 17, 32, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--glass-border);
    }
    header .logo { font-size: 1.1rem; font-weight: 700; }
    header .logo a { color: var(--text-main); text-decoration: none; }
    header nav a {
      color: var(--text-muted); text-decoration: none; font-size: 0.85rem;
      padding: 0.4rem 1rem; border-radius: 8px; transition: all 0.3s;
    }
    header nav a:hover { color: #fff; background: rgba(255,255,255,0.05); }

    .main-wrap {
      position: relative; z-index: 1;
      max-width: 900px; margin: 1.5rem auto; padding: 0 1rem;
    }
    .main-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 1.5rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .main-card h2 {
      text-align: center; font-size: 1.3rem; margin-bottom: 1rem;
      background: linear-gradient(135deg, var(--primary), #818cf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #divFull {
      background: #0f172a;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    #myContainer {
      text-align: center;
      position: relative;
    }
    #myP5Canvas {
      display: block;
      margin: 0 auto;
      max-width: 100%;
      touch-action: pinch-zoom;
    }
    .flexContainer {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem;
      background: rgba(0,0,0,0.2);
    }
    .flexItem {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .flexContainer button {
      height: 36px;
      padding: 0 14px;
      font-size: 0.85rem;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .flexContainer button:hover {
      background: rgba(255,255,255,0.12);
    }
    .flexContainer input[type="checkbox"] {
      width: 18px; height: 18px;
      cursor: pointer;
      accent-color: var(--primary);
    }
    .flexContainer label {
      font-size: 0.85rem;
      cursor: pointer;
      user-select: none;
    }
    .flexContainer input[type="radio"] {
      width: 16px; height: 16px;
      cursor: pointer;
      accent-color: var(--primary);
      margin: 0;
    }
    .flexContainer span label {
      font-size: 0.85rem;
      margin-right: 6px;
    }

    .fullscreen-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      cursor: pointer;
      transition: all 0.2s;
    }
    .fullscreen-btn:hover { background: rgba(255,255,255,0.12); }
    .fullscreen-btn svg { fill: var(--text-muted); width: 20px; height: 20px; }

    .info-section {
      margin-top: 1.5rem;
      padding: 1rem 1.2rem;
      background: rgba(0,0,0,0.15);
      border-radius: 12px;
      border: 1px solid var(--glass-border);
    }
    .info-section h3 {
      font-size: 1rem;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }
    .info-section p, .info-section li {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.7;
    }
    .info-section ul { padding-left: 1.2rem; }

    .formula-bar {
      text-align: center;
      padding: 1rem;
      margin-top: 1rem;
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      font-size: 0.9rem;
      color: var(--text-muted);
      border: 1px solid var(--glass-border);
    }
    .formula-bar strong { color: var(--text-main); }

    @media (max-width: 640px) {
      header { padding: 0.5rem 1rem; }
      .main-wrap { margin: 0.8rem auto; }
      .main-card { padding: 0.8rem; border-radius: 14px; }
      .flexContainer { gap: 0.3rem; padding: 0.5rem; }
      .flexContainer button { font-size: 0.78rem; padding: 0 10px; height: 32px; }
    }
    .quiz-question { font-size: 15px; margin-bottom: 16px; line-height: 1.6; }
    .quiz-option { display: block; width: 100%; text-align: left; padding: 12px 16px; margin-bottom: 8px; border: 2px solid #333; border-radius: 8px; background: rgba(255,255,255,0.03); color: #ccc; font-size: 14px; cursor: pointer; transition: all 0.2s; }
    .quiz-option:hover { border-color: #8b5cf6; background: rgba(139,92,246,0.1); }
    .quiz-option.correct { border-color: #22c55e; background: rgba(34,197,94,0.15); color: #22c55e; }
    .quiz-option.wrong { border-color: #ef4444; background: rgba(239,68,68,0.15); color: #ef4444; }
    .quiz-option:disabled { cursor: default; opacity: 0.7; }
    .quiz-option:disabled.correct { opacity: 1; }
    .quiz-score { font-size: 48px; font-weight: bold; }
    .quiz-score.great { color: #22c55e; }
    .quiz-score.good { color: #f59e0b; }
    .quiz-score.poor { color: #ef4444; }
    .quiz-btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 16px; }
    .review-card { background: rgba(255,255,255,0.03); border: 1px solid #333; border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; text-align: left; }
    .review-card.wrong { border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.06); }
    .review-card.correct2 { border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.04); }
    .rbadge { font-size: 12px; padding: 2px 8px; border-radius: 10px; margin-right: 8px; }
    .rbadge.ok { background: rgba(34,197,94,0.2); color: #22c55e; }
    .rbadge.fail { background: rgba(239,68,68,0.2); color: #ef4444; }
    .rq { font-size: 14px; margin-bottom: 8px; }
    .review-user-ans { font-size: 13px; color: #ef4444; margin: 4px 0; }
    .review-correct-ans { font-size: 13px; color: #22c55e; margin: 4px 0; }
    .review-explain { background: rgba(139,92,246,0.08); border: 1px solid rgba(139,92,246,0.2); border-radius: 8px; padding: 10px 14px; margin-top: 8px; }
    .review-explain .rtitle { font-size: 13px; color: #a78bfa; margin-bottom: 4px; }
    .review-explain .rtext { font-size: 13px; color: #c4b5fd; line-height: 1.6; }

    /* 可隐藏导航栏 */
    .header {
      position: fixed !important;
      top: 0;
      left: 0;
      right: 0;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }
    .header.hidden { transform: translateY(-100%); }
    body {
      padding-top: 56px;
      transition: padding-top 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    body.header-hidden { padding-top: 0; }
    @media (max-width: 768px) {
      body { padding-top: 48px; }
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/addons/p5.dom.min.js"></script>
  <script>
    /* ===== Javalab utility functions ===== */
    function fullscreenchanged() {}
    function doFullScreen() {
      fullscreenchanged();
      var el = document.getElementById("divFull");
      if(el.requestFullscreen) el.requestFullscreen();
      else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if(el.mozRequestFullScreen) el.mozRequestFullScreen();
      el.addEventListener("fullscreenchange", fullscreenchanged);
      el.addEventListener("webkitfullscreenchange", fullscreenchanged);
      el.addEventListener("mozfullscreenchange", fullscreenchanged);
    }
    function doFullScreen2() {
      fullscreenchanged();
      var el = document.getElementById("myP5Canvas");
      if(el.requestFullscreen) el.requestFullscreen();
      else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if(el.mozRequestFullScreen) el.mozRequestFullScreen();
      el.addEventListener("fullscreenchange", fullscreenchanged);
      el.addEventListener("webkitfullscreenchange", fullscreenchanged);
      el.addEventListener("mozfullscreenchange", fullscreenchanged);
    }
    function mod(x, y) {
      if(x < 0) x += y * (Math.ceil(Math.abs(x)/y) + 1);
      return x - y * Math.floor(x / y);
    }
    function diffAngle(t1, t2) {
      var tt1 = mod(t1, TWO_PI);
      var tt2 = mod(t2, TWO_PI);
      if(Math.abs(tt1 - tt2) > PI) {
        if(tt1 < tt2) tt1 += TWO_PI;
        else if(tt1 > tt2) tt2 += TWO_PI;
      }
      return tt2 - tt1;
    }
    function draw2DArrow2(x, y, cx, cy, thick) {
      var lArrow = Math.sqrt(cx * cx + cy * cy);
      var oxArrow = [0, lArrow - 2*thick, lArrow - 2*thick, lArrow, lArrow - 2*thick, lArrow - 2*thick, 0];
      var oyArrow = [thick, thick, 2*thick, 0, -2*thick, -thick, -thick];
      push();
      translate(x, y);
      rotate(Math.atan2(cy, cx));
      beginShape();
      for(var i = 0; i < oxArrow.length; i++) {
        vertex(Math.max(oxArrow[i], 0), oyArrow[i]);
      }
      endShape(CLOSE);
      pop();
    }

    /* ===== Simulation variables ===== */
    var language = 3; // 0=Korean, 1=Japanese, 2=English, 3=Chinese
    var buttonCompass, buttonBattery, radioA;
    var checkPause, chalkPause;
    var imageCircuit, imageBattery;
    var vCurrent = 1, vCompass = -1;
    var iCurrent = 0, iCompass = 0;
    var tCompass = 0, aCompass = 0;
    var pathIndex = 0;
    var pathNode = [[]];
    var pathNodeLength = [];
    var pathNodes = [5];
    var pathX1 = [[600,900,900,100,100,80,120,80,120,80,120,100,100]];
    var pathX2 = [[900,900,100,100,80,120,80,120,80,120,100,100,400]];
    var pathY1 = [[860,860,300,300,520,530,550,570,590,610,630,640,860]];
    var pathY2 = [[860,300,300,520,530,550,570,590,610,630,640,860,860]];
    var path1 = [[]];
    var path2 = [[]];

    function preload() {
      imageCircuit = loadImage("oersteds_experiment_circuit.png");
      imageBattery = loadImage("oersteds_experiment_battery.png");
    }

    function setup() {
      frameRate(20);
      var o = select("#myContainer");
      var a = 1;
      var w = int(min(o.width, (window.innerHeight - 160) / a));
      var h = int(w * a);
      myCanvas = createCanvas(w, h);
      myCanvas.parent("myContainer");
      myCanvas.id("myP5Canvas");

      buttonCompass = select("#buttonCompass");
      buttonCompass.mouseClicked(doButtonCompass);
      buttonCompass.html("指南针位置");

      buttonBattery = select("#buttonBattery");
      buttonBattery.mouseClicked(doButtonBattery);
      buttonBattery.html("电池方向");

      radioA = createRadio("radioA");
      radioA.option("隐藏 ", "n");
      radioA.option("电流 ", "p");
      radioA.option("电子 ", "e");
      radioA.parent("radioA");
      radioA.value("n");

      checkPause = select("#checkPause");
      chalkPause = select("#chalkPause");

      // Build path data
      for(var i = 0; i < pathNodes.length; i++) {
        for(var j = 0; j < pathX1[i].length; j++) {
          path1[i][j] = (j === 0) ? 0 : path2[i][j-1];
          path2[i][j] = path1[i][j] + dist(pathX1[i][j], pathY1[i][j], pathX2[i][j], pathY2[i][j]);
        }
        pathNodeLength[i] = path2[i][pathX1[i].length - 1];
        pathNodes[i] = round(pathNodeLength[i] / 60);
        for(var j = 0; j < pathNodes[i]; j++) {
          pathNode[i][j] = map(j, 0, pathNodes[i], 0, pathNodeLength[i]);
        }
      }
    }

    function windowResized() {
      var o = select("#myContainer");
      var a = 1;
      var w = int(min(o.width, (window.innerHeight - 160) / a));
      var h = int(w * a);
      resizeCanvas(w, h);
    }

    function doButtonCompass() { vCompass *= -1; }

    function doButtonBattery() {
      if(iCurrent === 0) iCurrent += vCurrent;
      else vCurrent *= -1;
    }

    function draw() {
      if(touches.length > 1) return;
      background('#0f172a');
      strokeWeight(2);
      textSize(25);
      textAlign(CENTER, CENTER);

      // Animate compass position
      if (!checkPause.checked()) {
        iCompass += vCompass;
        iCompass = constrain(iCompass, 0, 10);
        // Animate battery rotation
        if(iCurrent !== 0) iCurrent += vCurrent;
        iCurrent = constrain(iCurrent, -10, 10);
      }

      // Calculate target compass angle based on current and position
      var oCompass = 0;
      if(iCurrent <= -10) {
        if(iCompass <= 0) oCompass = HALF_PI;
        if(iCompass >= 10) oCompass = -HALF_PI;
      }
      if(iCurrent >= 10) {
        if(iCompass <= 0) oCompass = -HALF_PI;
        if(iCompass >= 10) oCompass = HALF_PI;
      }

      // Smooth needle rotation
      var d = diffAngle(tCompass, oCompass) / 8.0;
      if(Math.abs(d) > 0.01) aCompass += d;
      aCompass -= 0.01 * Math.sin(tCompass);
      aCompass *= 0.9;
      tCompass += aCompass / 2.0;

      // Compass position on arc around wire
      var xCompass = 500 + 100 * Math.cos(map(iCompass, 0, 10, 0, PI));
      var yCompass = 300 - 170 * Math.sin(map(iCompass, 0, 10, 0, PI));

      push();
      scale(width / 1000);

      // Draw compass (on top if above wire, behind if below)
      if(iCompass >= 5) { drawCompass(xCompass, yCompass, tCompass); }

      // Lighten circuit area so dark lines are visible against dark background
      noStroke();
      fill(30, 50, 90, 160);
      rect(0, 0, 1000, 1000);

      // Draw battery with rotation
      push();
      translate(500, 860);
      rotate(map(iCurrent, -10, 10, -HALF_PI, HALF_PI));
      imageMode(CENTER);
      image(imageBattery, 0, 0, 1000, 1000);
      pop();

      // Draw circuit
      imageMode(CORNER);
      image(imageCircuit, 0, 0, 1000, 1000);

      // Draw current/electron markers along circuit path
      if(radioA.value() !== "n") {
        var accel = 0;
        if(iCurrent <= -10) accel = -2;
        if(iCurrent >= 10) accel = 2;
        if(radioA.value() === "e") accel *= -1;

        for(var j = 0; j < pathNodes[pathIndex]; j++) {
          if (!checkPause.checked()) {
            pathNode[pathIndex][j] += accel;
            if(pathNode[pathIndex][j] > pathNodeLength[pathIndex]) pathNode[pathIndex][j] -= pathNodeLength[pathIndex];
            if(pathNode[pathIndex][j] < 0) pathNode[pathIndex][j] += pathNodeLength[pathIndex];
          }
        }
        rectMode(CENTER);
        noStroke();
        for(var j = 0; j < pathNodes[pathIndex]; j++) {
          for(var k = 0; k < pathX1[pathIndex].length; k++) {
            if(path1[pathIndex][k] <= pathNode[pathIndex][j] && pathNode[pathIndex][j] <= path2[pathIndex][k]) {
              var x = map(pathNode[pathIndex][j], path1[pathIndex][k], path2[pathIndex][k],
                pathX1[pathIndex][k], pathX2[pathIndex][k]);
              var y = map(pathNode[pathIndex][j], path1[pathIndex][k], path2[pathIndex][k],
                pathY1[pathIndex][k], pathY2[pathIndex][k]);
              var t = atan2(pathY1[pathIndex][k] - pathY2[pathIndex][k],
                pathX1[pathIndex][k] - pathX2[pathIndex][k]);
              if(iCurrent > 0) t += PI;
              if(radioA.value() === "p" && Math.abs(iCurrent) === 10) drawProton(x, y, t);
              if(radioA.value() === "e") drawElectron(x, y);
            }
          }
        }
      }

      // Draw compass (behind wire if below)
      if(iCompass < 5) { drawCompass(xCompass, yCompass, tCompass); }

      pop();
    }

    function drawProton(x, y, t) {
      var cx = 16 * cos(t);
      var cy = 16 * sin(t);
      noStroke();
      fill(255, 80, 80, 220);
      draw2DArrow2(x - cx, y - cy, 2 * cx, 2 * cy, 6);
    }

    function drawElectron(x, y) {
      strokeWeight(1);
      stroke(220);
      fill(60, 180, 255);
      ellipse(x, y, 20, 20);
      fill(255);
      noStroke();
      rectMode(CENTER);
      rect(x, y, 14, 3);
    }

    function drawCompass(x, y, theta) {
      var dia = 200;
      strokeJoin(ROUND);
      fill(255);
      noStroke();
      ellipse(x, y + 3, dia + 8, dia + 8);
      fill(220);
      stroke(0, 200, 100);
      strokeWeight(2);
      ellipse(x, y + 4, dia, dia);
      fill(255, 255, 200);
      stroke(180);
      ellipse(x, y, dia, dia);
      stroke(200);
      fill(255, 80, 80);
      beginShape();
      vertex(x + dia*0.1*cos(theta + HALF_PI), y + dia*0.1*sin(theta + HALF_PI));
      vertex(x + dia*0.4*cos(theta), y + dia*0.4*sin(theta));
      vertex(x + dia*0.1*cos(theta - HALF_PI), y + dia*0.1*sin(theta - HALF_PI));
      endShape(OPEN);
      fill(100, 180, 255);
      beginShape();
      vertex(x + dia*0.1*cos(theta + HALF_PI), y + dia*0.1*sin(theta + HALF_PI));
      vertex(x + dia*0.4*cos(theta + PI), y + dia*0.4*sin(theta + PI));
      vertex(x + dia*0.1*cos(theta - HALF_PI), y + dia*0.1*sin(theta - HALF_PI));
      endShape(OPEN);
      fill(255);
      stroke(180);
      ellipse(x, y, dia*0.1, dia*0.1);
    }
    /* ===== Quiz Challenge System ===== */
    var QUIZ_STORAGE_KEY = "quiz_oersted_progress";
    var EXPERIMENT_KEY = "oersted";

    var quizQuestions = [
      { round: 1, question: "奥斯特实验说明了什么？", options: ["电能生磁（电流周围存在磁场）", "磁能生电", "电能生热", "静电的存在"], answer: 0, explain: "1820年，丹麦物理学家奥斯特发现通电导线能使旁边的小磁针发生偏转，首次揭示了电与磁之间的联系——电流周围存在磁场（电流的磁效应）。" },
      { round: 1, question: "奥斯特实验中，小磁针放在通电导线的什么位置？", options: ["导线的正上方或正下方", "离导线很远的地方", "导线的两端", "电源的两极上"], answer: 0, explain: "小磁针放在通电直导线的上方或下方，靠近导线。这样才能明显观察到电流磁场对小磁针的作用。" },
      { round: 1, question: "奥斯特实验中，改变电流方向后小磁针的偏转方向会怎样？", options: ["不变", "反向偏转", "停止不动", "旋转起来"], answer: 1, explain: "电流方向改变→电流产生的磁场方向改变→小磁针N极受力方向改变→小磁针反向偏转。这说明电流磁场的方向与电流方向有关。" },
      { round: 1, question: "奥斯特实验证明了电和磁之间是什么关系？", options: ["电和磁完全没有关系", "电流可以产生磁场", "磁场可以产生电流", "电和磁是同一种东西"], answer: 1, explain: "奥斯特实验首次证明电流可以产生磁场（电生磁），为电磁学的发展奠定了基础。后来的法拉第则发现了磁生电（电磁感应）。两者合起来构成了电磁学的完整体系。" },
      { round: 1, question: "通电直导线周围的磁感线是什么形状？", options: ["从N到S的曲线", "以导线为圆心的同心圆", "平行直线", "不规则曲线"], answer: 1, explain: "通电直导线周围的磁感线是以导线为圆心的一系列同心圆，分布在垂直于导线的平面内。离导线越近，磁感线越密（磁场越强）；越远越疏（磁场越弱）。" },
      { round: 2, question: "判断通电直导线周围磁场方向使用什么定则？", options: ["右手螺旋定则（安培定则）", "左手定则", "右手定则（发电机定则）", "没有定则"], answer: 0, explain: "用右手握住导线，大拇指指向电流方向，弯曲的四指所指方向即为磁感线（磁场）的环绕方向。这就是安培定则（右手螺旋定则）的用法。" },
      { round: 2, question: "影响通电导线周围磁场强弱的因素不包括？", options: ["电流大小", "离导线的距离", "导线的颜色", "是否有铁芯"], answer: 2, explain: "导线颜色不影响磁场。磁场强弱与电流大小（电流越大磁场越强）、离导线距离（越近越强）、是否有铁芯（有铁芯时磁性强）等因素有关。" },
      { round: 2, question: "通电直导线周围的磁场，距导线越远磁场越怎样？", options: ["越强", "越弱", "不变", "先强后弱"], answer: 1, explain: "距通电直导线越远，磁场越弱。这是因为磁感线（同心圆）的周长随距离增大，单位弧长上的磁感线条数减少，磁场强度与距离成反比。" },
      { round: 2, question: "奥斯特实验中，如果导线不通电，小磁针会怎样？", options: ["偏转90度", "保持原来的指向（指向南北）", "不停地旋转", "指向东西方向"], answer: 1, explain: "导线不通电时没有电流产生的磁场，小磁针只受地磁场作用，指向南北方向（N极指向北方）。只有当导线通电时，电流磁场叠加在地磁场上，小磁针才会偏转。" },
      { round: 2, question: "增大通过导线的电流，小磁针的偏转角度会怎样？", options: ["变小", "变大", "不变", "归零"], answer: 1, explain: "电流越大，导线周围的磁场越强，对小磁针的作用力越大，小磁针偏转角度越大（但不会超过90°）。偏转角度反映了电流磁场相对于地磁场的强弱。" },
      { round: 3, question: "以下哪个应用利用了电流的磁效应？", options: ["电饭煲（热效应）", "电磁起重机（电磁铁）", "太阳能电池（光电效应）", "电池充电（化学效应）"], answer: 1, explain: "电磁起重机利用通电线圈（电磁铁）产生强磁场来吸引钢铁。电饭煲利用电流热效应，太阳能电池利用光电效应，电池充电涉及化学变化。奥斯特实验是电磁铁的理论基础。" },
      { round: 3, question: "通电螺线管的磁场与什么磁体的磁场相似？", options: ["蹄形磁铁", "条形磁铁", "环形磁铁", "没有相似之处"], answer: 1, explain: "通电螺线管（线圈）产生的磁场与条形磁铁的磁场非常相似——一端相当于N极，另一端相当于S极，外部磁感线从N到S、内部从S到N。这是奥斯特实验的自然延伸。" },
      { round: 3, question: "关于电流的磁效应，下列说法错误的是？", options: ["电流的磁效应是奥斯特发现的", "任何通电导体周围都存在磁场", "只有直流电才能产生磁场", "电流磁场方向可用安培定则判断"], answer: 2, explain: "不仅仅是直流电，交流电同样产生磁场（变化的磁场）。电磁铁使用直流电，变压器使用交流电——两者都基于电流的磁效应。因此说'只有直流电才能产生磁场'是错误的。" },
      { round: 3, question: "奥斯特实验的重要意义是什么？", options: ["发明了电池", "首次揭示了电与磁之间的联系", "发明了电动机", "发现了电磁感应"], answer: 1, explain: "奥斯特实验的重大意义在于首次揭示了电与磁之间的联系，打破了此前人们认为电与磁是互不相关的两种现象的认知，开创了电磁学研究的新纪元。法拉第受此启发发现了电磁感应现象。" },
      { round: 3, question: "在地磁场中做奥斯特实验，导线应怎样放置效果最明显？", options: ["东西方向放置（与地磁场方向垂直）", "南北方向放置（与地磁场方向平行）", "竖直放置", "任意方向都一样"], answer: 1, explain: "导线南北放置时，其产生的磁场（同心圆）在导线上下方的方向恰好是东西方向，与地磁场（南北方向）垂直，小磁针受到的偏转力矩最大，偏转效果最明显。若东西放置，电流磁场与地磁场方向平行，偏转效果较弱。" }
    ];

    function initQuiz() {
      var btn = document.getElementById("btnChallenge");
      var overlay = document.getElementById("quizOverlay");
      var closeBtn = document.getElementById("btnCloseQuiz");
      var resetBtn = document.getElementById("btnResetQuiz");
      var quizBody = document.getElementById("quizBody");
      var quizResult = document.getElementById("quizResult");
      var quizTitle = document.getElementById("quizTitle");
      var quizProgressFill = document.getElementById("quizProgressFill");

      if (!btn) return;

      var state = loadQuizState();

      btn.addEventListener("click", function() {
        overlay.style.display = "block";
        document.body.style.overflow = "hidden";
        renderQuiz();
      });

      closeBtn.addEventListener("click", function() {
        overlay.style.display = "none";
        document.body.style.overflow = "";
      });

      resetBtn.addEventListener("click", function() {
        if (confirm("确定要重置所有关卡进度吗？")) {
          state = { currentRound: 0, correctCount: 0, answered: [], wrongRounds: [] };
          saveQuizState(state);
          renderQuiz();
        }
      });

      overlay.addEventListener("click", function(e) {
        if (e.target === overlay) {
          overlay.style.display = "none";
          document.body.style.overflow = "";
        }
      });

      function loadQuizState() {
        try {
          var saved = localStorage.getItem(QUIZ_STORAGE_KEY);
          if (saved) return JSON.parse(saved);
        } catch(e) {}
        return { currentRound: 0, correctCount: 0, answered: [], wrongRounds: [] };
      }

      function saveQuizState(s) {
        try {
          localStorage.setItem(QUIZ_STORAGE_KEY, JSON.stringify(s));
        } catch(e) {}
      }

      function saveQuizToServer(correct, total) {
        if (typeof supabase === "undefined" || !supabase) return;
        try {
          var userData = localStorage.getItem("user");
          if (!userData) return;
          var u = JSON.parse(userData);
          supabase.from("users").select("quiz_data").eq("id", u.id).single().then(function(res) {
            var quizData = (res.data && res.data.quiz_data) ? res.data.quiz_data : {};
            var stars = correct >= 15 ? 3 : (correct >= 12 ? 2 : (correct >= 9 ? 1 : 0));
            quizData[EXPERIMENT_KEY] = { correct: correct, total: total, stars: stars, updated_at: new Date().toISOString() };
            supabase.from("users").update({ quiz_data: quizData }).eq("id", u.id).then(function(){});
          });
        } catch(e) {}
      }

      function getRoundQuestions(round) {
        return quizQuestions.filter(function(q) { return q.round === round; });
      }

      function renderQuiz() {
        state = loadQuizState();
        var round = state.currentRound;
        var totalRounds = 3;
        var questionsPerRound = 5;

        if (round >= totalRounds) {
          showResult();
          return;
        }

        var allQ = getRoundQuestions(round + 1);
        if (allQ.length === 0) {
          showResult();
          return;
        }

        quizTitle.textContent = "第 " + (round + 1) + " 关 (" + (round + 1) + "/" + totalRounds + ")";

        var startIdx = round * questionsPerRound;
        var endIdx = startIdx + questionsPerRound;
        var roundQs = allQ.slice(0, questionsPerRound);

        quizResult.style.display = "none";
        quizBody.style.display = "block";
        quizBody.innerHTML = "";

        var answeredInRound = state.answered.slice(startIdx, endIdx);

        roundQs.forEach(function(q, idx) {
          var qDiv = document.createElement("div");
          qDiv.style.marginBottom = "20px";
          qDiv.style.padding = "16px";
          qDiv.style.background = "rgba(255,255,255,0.02)";
          qDiv.style.borderRadius = "10px";
          qDiv.style.border = "1px solid #333";

          var qText = document.createElement("div");
          qText.className = "quiz-question";
          qText.textContent = (startIdx + idx + 1) + ". " + q.question;
          qDiv.appendChild(qText);

          var answered = answeredInRound[idx];

          q.options.forEach(function(opt, oi) {
            var btn = document.createElement("button");
            btn.className = "quiz-option";
            btn.textContent = String.fromCharCode(65 + oi) + ". " + opt;
            btn.disabled = answered !== undefined;

            if (answered !== undefined) {
              if (oi === q.answer) btn.classList.add("correct");
              if (oi === answered && answered !== q.answer) btn.classList.add("wrong");
            }

            btn.addEventListener("click", function() {
              if (answered !== undefined) return;

              var allBtns = qDiv.querySelectorAll(".quiz-option");
              for (var bi = 0; bi < allBtns.length; bi++) allBtns[bi].disabled = true;

              btn.classList.add(oi === q.answer ? "correct" : "wrong");
              if (oi === q.answer) btn.classList.add("correct");
              else btn.classList.add("wrong");

              var globalIdx = startIdx + idx;
              while (state.answered.length <= globalIdx) state.answered.push(undefined);
              state.answered[globalIdx] = oi;

              if (oi === q.answer) {
                state.correctCount = (state.correctCount || 0) + 1;
              }

              saveQuizState(state);
              updateProgress();

              var roundAnswered = state.answered.slice(startIdx, endIdx).filter(function(a) { return a !== undefined; });
              if (roundAnswered.length >= questionsPerRound) {
                setTimeout(function() {
                  advanceRound();
                }, 1200);
              }
            });

            if (answered !== undefined) {
              var explainDiv = document.createElement("div");
              explainDiv.className = "review-explain";
              explainDiv.innerHTML = '<div class="rtitle">解析</div><div class="rtext">' + q.explain + '</div>';
              qDiv.appendChild(explainDiv);
            }

            qDiv.appendChild(btn);
          });

          quizBody.appendChild(qDiv);
        });

        updateProgress();
      }

      function advanceRound() {
        state.currentRound++;
        saveQuizState(state);

        if (state.currentRound >= 3) {
          saveQuizToServer(state.correctCount, 15);
        }

        renderQuiz();
      }

      function showResult() {
        quizBody.style.display = "none";
        quizResult.style.display = "block";
        quizTitle.textContent = "闯关完成";

        var total = 15;
        var correct = state.correctCount || 0;
        var pct = Math.round(correct / total * 100);

        var stars = 0;
        var gradeClass = "poor";
        if (pct >= 90) { stars = 3; gradeClass = "great"; }
        else if (pct >= 60) { stars = 2; gradeClass = "good"; }
        else { stars = 1; }

        var starStr = "";
        for (var si = 0; si < 3; si++) {
          starStr += si < stars ? "★" : "☆";
        }

        var html = "";
        html += '<div class="quiz-score ' + gradeClass + '">' + correct + '/' + total + '</div>';
        html += '<div style="font-size:32px;margin:12px 0;letter-spacing:8px;">' + starStr + '</div>';
        html += '<div style="font-size:14px;color:#94a3b8;margin-bottom:20px;">正确率 ' + pct + '%</div>';

        html += '<div style="text-align:left;margin-top:20px;">';
        html += '<h4 style="margin-bottom:12px;color:#94a3b8;">答题回顾</h4>';
        for (var ri = 0; ri < quizQuestions.length; ri++) {
          var qq = quizQuestions[ri];
          var ua = state.answered[ri];
          var isCorrect = (ua === qq.answer);
          html += '<div class="review-card ' + (isCorrect ? 'correct2' : 'wrong') + '">';
          html += '<span class="rbadge ' + (isCorrect ? 'ok' : 'fail') + '">' + (isCorrect ? '正确' : '错误') + '</span>';
          html += '<span class="rq"><strong>' + (ri + 1) + '.</strong> ' + qq.question + '</span>';
          if (!isCorrect && ua !== undefined) {
            html += '<div class="review-user-ans">你的答案: ' + String.fromCharCode(65 + ua) + '. ' + qq.options[ua] + '</div>';
          }
          html += '<div class="review-correct-ans">正确答案: ' + String.fromCharCode(65 + qq.answer) + '. ' + qq.options[qq.answer] + '</div>';
          html += '<div class="review-explain"><div class="rtitle">解析</div><div class="rtext">' + qq.explain + '</div></div>';
          html += '</div>';
        }
        html += '</div>';

        var btnHtml = '<div class="quiz-btn-row">';
        btnHtml += '<button class="btn" id="btnRetryQuiz" style="border-color:#8b5cf6;color:#c4b5fd;padding:10px 24px;">再挑战一次</button>';
        btnHtml += '<button class="btn" id="btnCloseQuiz2" style="padding:10px 24px;">退出</button>';
        btnHtml += '</div>';

        quizResult.innerHTML = html + btnHtml;

        document.getElementById("btnRetryQuiz").addEventListener("click", function() {
          state = { currentRound: 0, correctCount: 0, answered: [], wrongRounds: [] };
          saveQuizState(state);
          renderQuiz();
        });

        document.getElementById("btnCloseQuiz2").addEventListener("click", function() {
          overlay.style.display = "none";
          document.body.style.overflow = "";
        });
      }

      function updateProgress() {
        var answered = state.answered.filter(function(a) { return a !== undefined; }).length;
        var pct = Math.min(100, Math.round(answered / 15 * 100));
        quizProgressFill.style.width = pct + "%";
      }
    }

    var _origSetupOER = setup;
    setup = function() { _origSetupOER(); initQuiz(); };
  </script>
  <script>
    (function() {
      var header = document.querySelector('.header');
      var hideTimer = null;
      var HIDE_DELAY = 800;
      function show() { clearTimeout(hideTimer); header.classList.remove('hidden'); document.body.classList.remove('header-hidden'); }
      function hide() { hideTimer = setTimeout(function() { header.classList.add('hidden'); document.body.classList.add('header-hidden'); }, HIDE_DELAY); }
      document.addEventListener('mousemove', function(e) {
        if (e.clientY <= 60) show();
        else if (e.clientY > header.offsetHeight + 20 && !header.classList.contains('hidden')) hide();
      });
      header.addEventListener('mouseenter', show);
      header.addEventListener('mouseleave', hide);
      hideTimer = setTimeout(function() { header.classList.add('hidden'); document.body.classList.add('header-hidden'); }, 2000);
    })();
  </script>
