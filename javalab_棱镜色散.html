    </div>

  <script>
  (function() {
    // ---- pre-computed sin/cos tables (from original) ----
    var dsin = [];
    var dcos = [];
    (function() {
      for (var i = 0; i < 360; i++) {
        dsin.push(Math.sin(i * Math.PI / 180));
        dcos.push(Math.cos(i * Math.PI / 180));
      }
    })();
    function fastSin(deg) { var i = ((deg % 360) + 360) % 360; var f = i - Math.floor(i); var i0 = Math.floor(i); var i1 = (i0+1)%360; return dsin[i0]*(1-f) + dsin[i1]*f; }
    function fastCos(deg) { var i = ((deg % 360) + 360) % 360; var f = i - Math.floor(i); var i0 = Math.floor(i); var i1 = (i0+1)%360; return dcos[i0]*(1-f) + dcos[i1]*f; }

    // ---- color helpers ----
    function cosineInterpolate(a, b, x) {
      var f = (1 - Math.cos(x * Math.PI)) / 2;
      return a * (1 - f) + b * f;
    }
    function getRedColor(nano) {
      if (nano < 420) return cosineInterpolate(64, 84, (nano-400)/20);
      if (nano < 510) return cosineInterpolate(84, 0, (nano-420)/90);
      if (nano < 580) return cosineInterpolate(0, 255, (nano-510)/70);
      if (nano <= 700) return cosineInterpolate(255, 64, (nano-580)/120);
      return 64;
    }
    function getGreenColor(nano) {
      if (nano < 440) return cosineInterpolate(64, 44, (nano-400)/40);
      if (nano < 550) return cosineInterpolate(44, 192, (nano-440)/110);
      if (nano < 640) return cosineInterpolate(192, 54, (nano-550)/90);
      if (nano <= 700) return cosineInterpolate(54, 64, (nano-640)/60);
      return 64;
    }
    function getBlueColor(nano) {
      if (nano < 450) return cosineInterpolate(64, 212, (nano-400)/50);
      if (nano < 550) return cosineInterpolate(212, 52, (nano-450)/100);
      if (nano < 650) return cosineInterpolate(52, 64, (nano-550)/100);
      if (nano <= 700) return cosineInterpolate(64, 64, (nano-650)/50);
      return 64;
    }
    function getLightColor(nano) {
      return [getRedColor(nano)*1.25, getGreenColor(nano)*1.25, getBlueColor(nano)*1.25];
    }

    // ---- geometry helpers ----
    function isIntersected(x1, y1, x2, y2, x3, y3, x4, y4) {
      var under = (y4-y3)*(x2-x1) - (x4-x3)*(y2-y1);
      if (under === 0) return false;
      var _t = (x4-x3)*(y1-y3) - (y4-y3)*(x1-x3);
      var _s = (x2-x1)*(y1-y3) - (y2-y1)*(x1-x3);
      var t = _t / under;
      var s = _s / under;
      if (t < 0.0 || t > 1.0 || s < 0.0 || s > 1.0) return false;
      if (Math.abs(_t) <= 1e-10 && Math.abs(_s) <= 1e-10) return false;
      return true;
    }
    function getCrossX(x1, y1, x2, y2, x3, y3, x4, y4) {
      var under = (y4-y3)*(x2-x1) - (x4-x3)*(y2-y1);
      if (under === 0) return 0;
      return x1 + ((x4-x3)*(y1-y3) - (y4-y3)*(x1-x3)) / under * (x2-x1);
    }
    function getCrossY(x1, y1, x2, y2, x3, y3, x4, y4) {
      var under = (y4-y3)*(x2-x1) - (x4-x3)*(y2-y1);
      if (under === 0) return 0;
      return y1 + ((x4-x3)*(y1-y3) - (y4-y3)*(x1-x3)) / under * (y2-y1);
    }

    // ---- state ----
    var currentShape = "triangle";
    var polygonN = 3;
    var polygonMax = 100; // used for circle
    var polygonOX = 450;
    var polygonOY = 200;
    var rotateT = 0.1;
    var beamY = 150;
    var polygonX = [];
    var polygonY = [];
    var pg;
    var iDragged = -1;
    var offsetY, pmx, pmy;

    var shapesMap = { triangle: 3, square: 4, circle: 100 };

    new p5(function(p) {
      p.setup = function() {
        p.frameRate(10);
        var container = document.getElementById("myContainer");
        var cw = container.offsetWidth || 800;
        var a = 0.5;
        var w = Math.floor(Math.min(cw, (window.innerHeight - 160) / a));
        var h = Math.floor(w * a);
        p.createCanvas(w, h).parent("myContainer").id("myP5Canvas");
        pg = p.createGraphics(900, 450);
        pg.blendMode(p.LIGHTEST);

        // Shape buttons
        document.querySelectorAll(".shape-btn").forEach(function(btn) {
          btn.addEventListener("click", function() {
            document.querySelectorAll(".shape-btn").forEach(function(b) { b.classList.remove("active"); });
            this.classList.add("active");
            currentShape = this.dataset.shape;
            polygonN = shapesMap[currentShape];
            setup2();
          });
        });

        setup2();
        if (typeof initQuiz === 'function') initQuiz();
      };

      p.windowResized = function() {
        var container = document.getElementById("myContainer");
        var cw = container.offsetWidth || 800;
        var a = 0.5;
        var w = Math.floor(Math.min(cw, (window.innerHeight - 160) / a));
        var h = Math.floor(w * a);
        p.resizeCanvas(w, h);
      };

      function setup2() {
        for (var i = 0; i <= polygonN; i++) {
          var t = p.map(i, 0, polygonN, 0, p.TWO_PI);
          polygonX[i] = polygonOX + 100 * p.sin(t + rotateT);
          polygonY[i] = polygonOY - 100 * p.cos(t + rotateT);
        }
        drawing();
      }

      p.draw = function() {
        if (p.touches.length > 1) return;
        p.background(0);
        p.strokeWeight(1);
        p.textSize(20);
        p.push();
        p.scale(p.width / 900);

        // Draw polygon
        p.noStroke();
        p.fill(211, 233, 255, 128);
        p.beginShape();
        for (var i = 0; i < polygonN; i++) {
          p.vertex(polygonX[i], polygonY[i]);
        }
        p.endShape(p.CLOSE);

        // Labels
        p.fill(255);
        p.textAlign(p.RIGHT, p.CENTER);
        p.text("→", 120, beamY);
        p.text("White\nLight", 90, beamY);

        p.textAlign(p.CENTER, p.TOP);
        p.text("Refractive index = 1.51 ~ 1.53", polygonOX, polygonOY + 150);

        // Draw ray buffer
        p.image(pg, 0, 0, 900, 450);
        p.pop();
      };

      function drawing() {
        pg.clear();
        // Draw rays for wavelengths from blue-violet to red
        for (var nano = 450; nano < 650; nano += 5) {
          var index = p.map(nano, 400, 700, 1.53, 1.51);
          drawBeam(130, beamY, 0, nano, index, 1);
        }
      }

      function drawBeam(x, y, theta, nano, index, life) {
        var step = 5;
        var col = getLightColor(nano);
        var a = Math.floor(life * life * 255);
        pg.stroke(col[0], col[1], col[2], a);

        var xStep = x;
        var yStep = y;
        var maxSteps = Math.floor(800 / step);

        for (var i = 0; i < maxSteps; i++) {
          xStep += step * p.cos(theta);
          yStep += step * p.sin(theta);

          for (var k = 0; k < polygonN; k++) {
            if (isIntersected(x, y, xStep, yStep,
              polygonX[k], polygonY[k], polygonX[k+1], polygonY[k+1])) {

              var xCross = getCrossX(x, y, xStep, yStep,
                polygonX[k], polygonY[k], polygonX[k+1], polygonY[k+1]);
              var yCross = getCrossY(x, y, xStep, yStep,
                polygonX[k], polygonY[k], polygonX[k+1], polygonY[k+1]);

              // For circle, snap intersection to circle boundary
              if (polygonN === polygonMax) {
                var tt = p.atan2(yCross - polygonOY, xCross - polygonOX);
                xCross = polygonOX + 100 * p.cos(tt);
                yCross = polygonOY + 100 * p.sin(tt);
              }

              pg.line(x, y, xCross, yCross);

              var faceAngle = p.atan2(
                polygonY[k] - polygonY[k+1],
                polygonX[k] - polygonX[k+1]
              );
              var f = faceAngle - theta;

              if (p.sin(f) > 0) {
                // Entering the polygon
                var t2 = p.atan2(polygonY[k+1] - polygonY[k], polygonX[k+1] - polygonX[k]) + p.HALF_PI;
                if (polygonN === polygonMax) {
                  t2 = p.atan2(polygonOY - yCross, polygonOX - xCross);
                }
                var dt = theta - t2;
                var dt2 = p.asin(p.sin(dt) / index);

                // Transmitted ray (into polygon)
                drawBeam(xCross + p.cos(t2 + dt2), yCross + p.sin(t2 + dt2),
                  t2 + dt2, nano, index,
                  life * Math.pow(Math.abs(p.cos(dt)), 1.1));

                // Reflected ray (back into air)
                var newLife = life * Math.pow(Math.abs(p.sin(dt)), 1.1);
                if (newLife > 0.0001) {
                  var t3 = 2 * t2 - theta + p.PI;
                  drawBeam(xCross + p.cos(t3), yCross + p.sin(t3),
                    t3, nano, index, newLife);
                }
              } else {
                // Exiting the polygon
                var t2 = p.atan2(polygonY[k+1] - polygonY[k], polygonX[k+1] - polygonX[k]) - p.HALF_PI;
                if (polygonN === polygonMax) {
                  t2 = p.atan2(yCross - polygonOY, xCross - polygonOX);
                }
                var dt = theta - t2;
                var ff = Math.abs(p.sin(dt)) * index;

                if (ff < 1) {
                  // Refract out (not total internal reflection)
                  var r1 = getLightColor(nano);
                  pg.stroke(r1[0], r1[1], r1[2], Math.floor(life * life * 255));
                  var t3 = t2 + p.asin(p.sin(dt) * index);
                  pg.line(xCross, yCross,
                    xCross + 600 * p.cos(t3),
                    yCross + 600 * p.sin(t3));
                }

                // Internally reflected ray
                var newLife = life * Math.pow(Math.abs(p.sin(dt)), 2);
                if (newLife > 0.0001) {
                  var t3 = 2 * t2 - theta + p.PI;
                  drawBeam(xCross + p.cos(t3), yCross + p.sin(t3),
                    t3, nano, index, newLife);
                }
              }
              return;
            }
          }
        }
        // Ray exits without hitting anything - draw remaining segment
        pg.line(x, y, xStep, yStep);
      }

      // ---- touch/mouse interaction (from original) ----
      p.mousePressed = function() {
        if (p.mouseX < 0 || p.mouseX > p.width || p.mouseY < 0 || p.mouseY > p.height) return;
        var mx = p.mouseX * 900 / p.width;
        var my = p.mouseY * 900 / p.width;
        if (mx < 250) {
          iDragged = 0;
          offsetY = my - beamY;
        } else {
          iDragged = 1;
          pmx = mx;
          pmy = my;
        }
      };

      p.mouseDragged = function() {
        if (p.touches.length > 1) return;
        if (iDragged >= 0) {
          var mx = p.mouseX * 900 / p.width;
          var my = p.mouseY * 900 / p.width;
          if (iDragged === 0) {
            beamY = my - offsetY;
          } else if (iDragged === 1) {
            var t1 = p.atan2(pmy - polygonOY, pmx - polygonOX);
            var t2 = p.atan2(my - polygonOY, mx - polygonOX);
            rotateT += (t2 - t1);
            pmx = mx;
            pmy = my;
          }
          setup2();
          return false;
        }
      };

      p.mouseReleased = function() {
        iDragged = -1;
      };

      // needed by p5
      p.touchStarted = p.mousePressed;
      p.touchMoved = p.mouseDragged;
      p.touchEnded = p.mouseReleased;
    });
  })();
  </script>

  <script>
  // ========== 过关挑战 — 棱镜色散 ==========
  var QUIZ_STORAGE_KEY = "quiz_prism_progress";
  var EXPERIMENT_KEY = "prism";
  var ROUND_NAMES = ["第一关 · 色散基础", "第二关 · 光谱知识", "第三关 · 综合应用"];
  var quizQuestions = [
    { question:"白光通过三棱镜后分解成多种色光的现象称为？", options:["反射","折射","色散","衍射"], correct:2, explain:"白光通过三棱镜后分解成多种色光的现象叫做光的色散。牛顿最早通过三棱镜实验发现了色散现象。" },
    { question:"最早通过三棱镜实验发现色散现象的科学家是？", options:["伽利略","牛顿","爱因斯坦","惠更斯"], correct:1, explain:"1666年，牛顿通过三棱镜实验发现太阳光（白光）可以分解为七种颜色的光，开创了光谱学。" },
    { question:"白光通过三棱镜后，偏折最大（最靠近底部）的色光是？", options:["红光","黄光","绿光","紫光"], correct:3, explain:"紫光波长最短，折射率最大，因此通过三棱镜时偏折最大。红光波长最长，折射率最小，偏折最小。" },
    { question:"白光通过三棱镜后，偏折最小（最靠近顶部）的色光是？", options:["红光","橙光","黄光","紫光"], correct:0, explain:"红光波长最长，折射率最小（约1.51），因此通过三棱镜时偏折最小，位于光谱的顶端。" },
    { question:"不同颜色的光在真空中传播速度的关系是？", options:["红光最快","紫光最快","一样快","无法比较"], correct:2, explain:"所有颜色的光在真空中传播速度相同，均为 c=3×10^8 m/s。" },
    { question:"可见光的波长范围大约是？", options:["200nm~400nm","400nm~700nm","700nm~1000nm","1mm~1cm"], correct:1, explain:"可见光的波长范围约为 400nm（紫光）到 700nm（红光）。小于400nm为紫外线，大于700nm为红外线。" },
    { question:"哪种色光在玻璃中的折射率最大？", options:["红光","黄光","蓝光","紫光"], correct:3, explain:"紫光波长最短，频率最高，折射率最大。在棱镜色散中，紫光偏折最大。" },
    { question:"光的色散现象说明白光是什么光？", options:["单色光","复色光","相干光","偏振光"], correct:1, explain:"色散现象证明白光是由多种色光组成的复色光。白光通过三棱镜后分解为连续的七色光谱。" },
    { question:"彩虹的形成主要利用了光的什么原理？", options:["反射和色散","折射和色散","衍射","干涉"], correct:1, explain:"太阳光照射到空气中的水滴时，发生折射和色散，不同颜色的光偏折角度不同，形成彩虹的七色光谱。" },
    { question:"在相同介质中，下列色光传播速度最慢的是？", options:["红光","黄光","蓝光","紫光"], correct:3, explain:"在相同介质中，紫光折射率最大，由 n=c/v 可知紫光在介质中的传播速度最慢。" },
    { question:"光的颜色由什么决定？", options:["振幅","频率（或波长）","传播速度","偏振方向"], correct:1, explain:"光的颜色由光的频率（或波长）决定。不同频率的光在人眼中呈现不同的颜色。" },
    { question:"用白光照射一个红色物体，物体呈现红色的原因是？", options:["物体反射红光吸收其他色光","物体吸收红光反射其他色光","物体只发出红光","光经过物体发生了色散"], correct:0, explain:"不透明物体的颜色由其反射的色光决定。红色物体反射红光，吸收其他颜色的光，因此看起来是红色的。" },
    { question:"如果入射光改为单色绿光通过三棱镜，则？", options:["也会分解成七色光","只发生折射不产生色散","不会发生折射","全部被吸收"], correct:1, explain:"色散需要复色光（如白光）才能发生。单色绿光通过三棱镜只会发生折射而改变方向，不会分解成多种色光。" },
    { question:"光谱中七种色光从偏折最小到最大的正确顺序是？", options:["红橙黄绿蓝靛紫","紫蓝绿黄橙红","红黄绿蓝紫橙靛","绿蓝紫红橙黄靛"], correct:0, explain:"从偏折最小到最大依次为：红、橙、黄、绿、蓝、靛、紫。红光偏折最小，紫光偏折最大。" },
    { question:"下列关于色散的说法错误的是？", options:["色散是由于不同色光在同种介质中折射率不同造成的","色散现象说明白光由多种色光组成","所有透明介质都会使白光发生色散","同一介质对不同色光的折射率不同"], correct:2, explain:"并非所有透明介质都能使白光明显色散。色散程度取决于介质对不同波长光的折射率差异，有些介质色散很弱。" }
  ];
  var quizState = { currentRound:0, currentQuestion:0, answers:[], quizStarted:false, quizPaused:false };
  function initQuiz() {
    var btn = document.getElementById("challengeBtn");
    if (!btn) return;
    btn.addEventListener("click",startQuiz);
    document.getElementById("quizCloseBtn").addEventListener("click",closeQuiz);
    var pc = document.getElementById("pauseCheckbox");
    if (pc) pc.addEventListener("change",function(){ quizState.quizPaused=pc.checked; });
    loadProgress();
    updateChallengeButton();
  }
  function startQuiz() {
    document.getElementById("quizOverlay").style.display="flex";
    quizState.quizStarted=true;
    loadProgress();
    if (!quizState.answers||quizState.answers.length===0) { quizState.answers=[]; quizState.currentRound=0; quizState.currentQuestion=0; renderRound(0); }
    else { var r=quizState.currentRound; var q=quizState.currentQuestion; if(q>=5) showRoundResult(r); else renderQuestion(r,q); }
  }
  function closeQuiz() { document.getElementById("quizOverlay").style.display="none"; }
  function resetQuiz() { if(!confirm("确定要重置所有闯关进度吗？")) return; quizState.answers=[]; quizState.currentRound=0; quizState.currentQuestion=0; quizState.quizStarted=false; clearProgress(); updateChallengeButton(); renderRound(0); }
  function renderRound(round) {
    document.getElementById("quizTitle").textContent="过关挑战 - "+ROUND_NAMES[round];
    document.getElementById("quizBody").innerHTML='<div class="quiz-round-header"><h3>'+ROUND_NAMES[round]+'</h3><p>共 5 题，全部答对可获得 ⭐</p><div style="margin-top:24px;"><button class="quiz-btn quiz-btn-primary" id="startRoundBtn">开始答题</button></div></div>';
    document.getElementById("startRoundBtn").addEventListener("click",function(){ quizState.currentQuestion=0; renderQuestion(round,0); });
  }
  function renderQuestion(round,qIdx) {
    var allQ = quizQuestions.slice(round*5,round*5+5);
    var q = allQ[qIdx];
    var ph = '';
    for(var i=0;i<5;i++) { var c='quiz-progress-dot'; if(i<qIdx) c+=' quiz-correct-dot'; ph+='<span class="'+c+'"></span>'; }
    document.getElementById("quizTitle").textContent="过关挑战 - "+ROUND_NAMES[round];
    document.getElementById("quizBody").innerHTML='<div class="quiz-question-num">第 '+(round*5+qIdx+1)+' / 15 题</div><div class="quiz-progress">'+ph+'</div><div class="quiz-question-text">'+q.question+'</div><div class="quiz-options" id="quizOptions">'+
      q.options.map(function(o,i){ return '<div class="quiz-option" data-idx="'+i+'">'+String.fromCharCode(65+i)+'. '+o+'</div>'; }).join('')+'</div><div class="quiz-explain" id="quizExplain"></div>';
    var opts = document.querySelectorAll("#quizOptions .quiz-option");
    for(var i=0;i<opts.length;i++) opts[i].addEventListener("click",function(e){ selectAnswer(round,qIdx,parseInt(e.currentTarget.dataset.idx)); });
  }
  function selectAnswer(round,qIdx,sel) {
    var allQ = quizQuestions.slice(round*5,round*5+5);
    var q = allQ[qIdx];
    var opts = document.querySelectorAll("#quizOptions .quiz-option");
    for(var i=0;i<opts.length;i++) opts[i].classList.add("disabled");
    opts[sel].classList.add(sel===q.correct?"correct":"wrong");
    opts[q.correct].classList.add("correct");
    var ee=document.getElementById("quizExplain");
    ee.style.display="block";
    ee.textContent=(sel===q.correct?"✅ 回答正确！":"❌ 回答错误。正确答案是 "+String.fromCharCode(65+q.correct)+"。")+" "+q.explain;
    if(quizState.answers[round*5+qIdx]===undefined) quizState.answers[round*5+qIdx]=(sel===q.correct)?1:0;
    saveProgress();
    setTimeout(function(){
      if(qIdx+1>=5) showRoundResult(round);
      else { quizState.currentQuestion=qIdx+1; renderQuestion(round,qIdx+1); }
    },1200);
  }
  function showRoundResult(round) {
    var si=round*5,cc=0;
    for(var i=0;i<5;i++) if(quizState.answers[si+i]===1) cc++;
    var st=0; if(cc===5) st=3; else if(cc>=3) st=2; else if(cc>=1) st=1;
    var ss=''; for(var i=0;i<3;i++) ss+=(i<st)?'⭐':'☆';
    document.getElementById("quizBody").innerHTML='<div class="quiz-result"><h3>'+ROUND_NAMES[round]+' 完成！</h3><div class="stars">'+ss+'</div><div class="score">答对 '+cc+' / 5 题</div><div class="result-msg">'+(st>=2?'太棒了！':'加油，再试一次！')+'</div><div class="quiz-result-btns" id="resultBtns">'+
      '<button class="quiz-btn quiz-btn-secondary" id="reviewBtn">查看解析</button>'+(st<3?'<button class="quiz-btn quiz-btn-primary" id="retryBtn">重新挑战</button>':'')+(round<2?'<button class="quiz-btn quiz-btn-success" id="nextRoundBtn">下一关</button>':'')+
      '<button class="quiz-btn quiz-btn-danger" id="resetQuizBtn">重置进度</button></div></div>';
    saveProgress(); updateChallengeButton(); bindResultButtons(round,st);
  }
  function showReview() {
    var h='<div style="margin-bottom:16px;"><button class="quiz-btn quiz-btn-secondary" id="backFromReview">返回</button></div><h3 style="margin:0 0 16px;">全部题目解析</h3>';
    for(var i=0;i<quizQuestions.length;i++) {
      var q=quizQuestions[i],ua=quizState.answers[i],ic=ua===1;
      h+='<div class="review-card"><span class="rbadge '+(ic?'rbadge-c':'rbadge-w')+'">'+(ic?'正确':'错误')+'</span><span style="color:#94a3b8;font-size:12px;">第'+(i+1)+'题</span><div class="rq">'+q.question+'</div><div class="ra">正确答案：'+String.fromCharCode(65+q.correct)+'. '+q.options[q.correct]+'</div><div class="review-explain">'+q.explain+'</div></div>';
    }
    document.getElementById("quizBody").innerHTML=h;
    document.getElementById("backFromReview").addEventListener("click",function(){ showRoundResult(quizState.currentRound); });
  }
  function bindResultButtons(round,stars) {
    var rb=document.getElementById("reviewBtn"); if(rb) rb.addEventListener("click",showReview);
    var rt=document.getElementById("retryBtn"); if(rt) rt.addEventListener("click",function(){ for(var i=round*5;i<round*5+5;i++) quizState.answers[i]=undefined; quizState.currentQuestion=0; renderQuestion(round,0); });
    var nx=document.getElementById("nextRoundBtn"); if(nx) nx.addEventListener("click",function(){ quizState.currentRound=round+1; quizState.currentQuestion=0; renderRound(round+1); });
    var rs=document.getElementById("resetQuizBtn"); if(rs) rs.addEventListener("click",resetQuiz);
  }
  function saveProgress() {
    try { localStorage.setItem(QUIZ_STORAGE_KEY,JSON.stringify({ answers:quizState.answers, currentRound:quizState.currentRound, currentQuestion:quizState.currentQuestion })); } catch(e){}
    saveQuizToServer();
  }
  function loadProgress() {
    try { var d=localStorage.getItem(QUIZ_STORAGE_KEY); if(d){ var p=JSON.parse(d); if(p&&p.answers){ quizState.answers=p.answers; quizState.currentRound=p.currentRound||0; quizState.currentQuestion=p.currentQuestion||0; } } } catch(e){}
  }
  function clearProgress() { try { localStorage.removeItem(QUIZ_STORAGE_KEY); } catch(e){} saveQuizToServer(); }
  function getStars() { var t=0; for(var i=0;i<3;i++){ var c=0; for(var j=0;j<5;j++) if(quizState.answers[i*5+j]===1) c++; if(c===5) t+=3; else if(c>=3) t+=2; else if(c>=1) t+=1; } return t; }
  function updateChallengeButton() {
    var b=document.getElementById("challengeBtn"); if(!b) return;
    var s=getStars(); b.innerHTML='🏆 过关挑战'+(s>0?' <span class="stars-display">⭐'+s+'/9</span>':'');
  }
  function saveQuizToServer() {
    if(typeof supabase==='undefined'||!supabase) return;
    try {
      var uid=localStorage.getItem('userId'); if(!uid) return;
      supabase.from('users').select('quiz_data').eq('id',uid).then(function(r){
        if(r.error) return;
        var ex=(r.data&&r.data[0]&&r.data[0].quiz_data)?r.data[0].quiz_data:{};
        ex[QUIZ_STORAGE_KEY]={ answers:quizState.answers, experimentKey:EXPERIMENT_KEY, updatedAt:new Date().toISOString() };
        supabase.from('users').update({ quiz_data:ex }).eq('id',uid).then(function(){});
      });
    } catch(e){}
  }
  </script>
  <script src="supabase.js"></script>
  <script src="script.js"></script>
</body>
</html>
