<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=10">
  <title>棱镜色散 — 光的折射与光谱 - 物理虚拟实验</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/addons/p5.dom.min.js"></script>
  <style>
    .main-card { max-width: 900px; margin: 0 auto 24px; padding: 0 16px; }
    .canvas-wrap { border-radius: 12px; padding: 4px; width: 100%; box-sizing: border-box; border: 1px solid #e2e8f0; position: relative; background: #000; }
    .controls-bar { display: flex; align-items: center; justify-content: center; padding: 10px 16px; gap: 16px; flex-wrap: wrap; background: #1a1a2e; border-radius: 0 0 12px 12px; border-top: 1px solid #333; }
    .ctrl-group { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #ccc; }
    .shape-btn { border: 2px solid #555; background: transparent; color: #aaa; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.2s; user-select: none; }
    .shape-btn.active { border-color: #8b5cf6; color: #fff; background: rgba(139,92,246,0.2); }
    .shape-btn:hover { border-color: #8b5cf6; }
    .hint-text { color: #888; font-size: 12px; }
    .section { padding: 1.5rem 2rem 0.5rem; }
    .section h2 { font-size: 1.4rem; }
    .formula-bar { max-width: 900px; margin: 0 auto 24px; padding: 0 16px; display: flex; gap: 12px; flex-wrap: wrap; }
    .formula-item { flex: 1; min-width: 180px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px 16px; }
    .formula-item .label { color: #64748b; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; }
    .formula-item .value { color: #e2e8f0; font-size: 13px; }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">物理虚拟实验</div>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="experiments.html">实验列表</a>
    </nav>
  </header>

  <div class="section">
    <h2>棱镜色散 — 光的折射与光谱</h2>
    <p style="color:#94a3b8;margin:0 0 16px 0;">白光通过透明介质分解为七色光谱。拖动左侧可上下移动光束，拖动图形可旋转物体。</p>
  </div>

  <div class="main-card">
    <div class="canvas-wrap">
      <div id="myContainer"></div>
    </div>
    <div class="controls-bar">
      <div class="ctrl-group" id="shapeButtons">
        <button class="shape-btn active" data-shape="triangle">△ 三角形</button>
        <button class="shape-btn" data-shape="square">◇ 正方形</button>
        <button class="shape-btn" data-shape="circle">○ 圆形</button>
      </div>
      <span class="hint-text">拖动左侧 ⇅ 移动光束 &nbsp;|&nbsp; 拖动图形 ↻ 旋转</span>
    </div>
  </div>

  <div class="formula-bar">
    <div class="formula-item">
      <span class="label">斯涅尔定律</span>
      <span class="value">n₁·sinθ₁ = n₂·sinθ₂ &nbsp;（入射与出射均应用）</span>
    </div>
    <div class="formula-item">
      <span class="label">折射率与波长</span>
      <span class="value">红光 (700nm) n=1.51 &nbsp;→&nbsp; 蓝光 (400nm) n=1.53</span>
    </div>
    <div class="formula-item">
      <span class="label">色散原理</span>
      <span class="value">不同波长的光折射程度不同，形成连续光谱</span>
    </div>
  </div>

  <script src="protect.js"></script>
  <script>
  (function() {
    // ---- pre-computed sin/cos tables (from original) ----
    var dsin = [];
    var dcos = [];
    (function() {
      for (var i = 0; i < 360; i++) {
        dsin.push(Math.sin(i * Math.PI / 180));
        dcos.push(Math.cos(i * Math.PI / 180));
      }
    })();
    function fastSin(deg) { var i = ((deg % 360) + 360) % 360; var f = i - Math.floor(i); var i0 = Math.floor(i); var i1 = (i0+1)%360; return dsin[i0]*(1-f) + dsin[i1]*f; }
    function fastCos(deg) { var i = ((deg % 360) + 360) % 360; var f = i - Math.floor(i); var i0 = Math.floor(i); var i1 = (i0+1)%360; return dcos[i0]*(1-f) + dcos[i1]*f; }

    // ---- color helpers ----
    function cosineInterpolate(a, b, x) {
      var f = (1 - Math.cos(x * Math.PI)) / 2;
      return a * (1 - f) + b * f;
    }
    function getRedColor(nano) {
      if (nano < 420) return cosineInterpolate(64, 84, (nano-400)/20);
      if (nano < 510) return cosineInterpolate(84, 0, (nano-420)/90);
      if (nano < 580) return cosineInterpolate(0, 255, (nano-510)/70);
      if (nano <= 700) return cosineInterpolate(255, 64, (nano-580)/120);
      return 64;
    }
    function getGreenColor(nano) {
      if (nano < 440) return cosineInterpolate(64, 44, (nano-400)/40);
      if (nano < 550) return cosineInterpolate(44, 192, (nano-440)/110);
      if (nano < 640) return cosineInterpolate(192, 54, (nano-550)/90);
      if (nano <= 700) return cosineInterpolate(54, 64, (nano-640)/60);
      return 64;
    }
    function getBlueColor(nano) {
      if (nano < 450) return cosineInterpolate(64, 212, (nano-400)/50);
      if (nano < 550) return cosineInterpolate(212, 52, (nano-450)/100);
      if (nano < 650) return cosineInterpolate(52, 64, (nano-550)/100);
      if (nano <= 700) return cosineInterpolate(64, 64, (nano-650)/50);
      return 64;
    }
    function getLightColor(nano) {
      return [getRedColor(nano)*1.25, getGreenColor(nano)*1.25, getBlueColor(nano)*1.25];
    }

    // ---- geometry helpers ----
    function isIntersected(x1, y1, x2, y2, x3, y3, x4, y4) {
      var under = (y4-y3)*(x2-x1) - (x4-x3)*(y2-y1);
      if (under === 0) return false;
      var _t = (x4-x3)*(y1-y3) - (y4-y3)*(x1-x3);
      var _s = (x2-x1)*(y1-y3) - (y2-y1)*(x1-x3);
      var t = _t / under;
      var s = _s / under;
      if (t < 0.0 || t > 1.0 || s < 0.0 || s > 1.0) return false;
      if (Math.abs(_t) <= 1e-10 && Math.abs(_s) <= 1e-10) return false;
      return true;
    }
    function getCrossX(x1, y1, x2, y2, x3, y3, x4, y4) {
      var under = (y4-y3)*(x2-x1) - (x4-x3)*(y2-y1);
      if (under === 0) return 0;
      return x1 + ((x4-x3)*(y1-y3) - (y4-y3)*(x1-x3)) / under * (x2-x1);
    }
    function getCrossY(x1, y1, x2, y2, x3, y3, x4, y4) {
      var under = (y4-y3)*(x2-x1) - (x4-x3)*(y2-y1);
      if (under === 0) return 0;
      return y1 + ((x4-x3)*(y1-y3) - (y4-y3)*(x1-x3)) / under * (y2-y1);
    }

    // ---- state ----
    var currentShape = "triangle";
    var polygonN = 3;
    var polygonMax = 100; // used for circle
    var polygonOX = 450;
    var polygonOY = 200;
    var rotateT = 0.1;
    var beamY = 150;
    var polygonX = [];
    var polygonY = [];
    var pg;
    var iDragged = -1;
    var offsetY, pmx, pmy;

    var shapesMap = { triangle: 3, square: 4, circle: 100 };

    new p5(function(p) {
      p.setup = function() {
        p.frameRate(10);
        var container = document.getElementById("myContainer");
        var cw = container.offsetWidth || 800;
        var a = 0.5;
        var w = Math.floor(Math.min(cw, (window.innerHeight - 160) / a));
        var h = Math.floor(w * a);
        p.createCanvas(w, h).parent("myContainer").id("myP5Canvas");
        pg = p.createGraphics(900, 450);
        pg.blendMode(p.LIGHTEST);

        // Shape buttons
        document.querySelectorAll(".shape-btn").forEach(function(btn) {
          btn.addEventListener("click", function() {
            document.querySelectorAll(".shape-btn").forEach(function(b) { b.classList.remove("active"); });
            this.classList.add("active");
            currentShape = this.dataset.shape;
            polygonN = shapesMap[currentShape];
            setup2();
          });
        });

        setup2();
      };

      p.windowResized = function() {
        var container = document.getElementById("myContainer");
        var cw = container.offsetWidth || 800;
        var a = 0.5;
        var w = Math.floor(Math.min(cw, (window.innerHeight - 160) / a));
        var h = Math.floor(w * a);
        p.resizeCanvas(w, h);
      };

      function setup2() {
        for (var i = 0; i <= polygonN; i++) {
          var t = p.map(i, 0, polygonN, 0, p.TWO_PI);
          polygonX[i] = polygonOX + 100 * p.sin(t + rotateT);
          polygonY[i] = polygonOY - 100 * p.cos(t + rotateT);
        }
        drawing();
      }

      p.draw = function() {
        if (p.touches.length > 1) return;
        p.background(0);
        p.strokeWeight(1);
        p.textSize(20);
        p.push();
        p.scale(p.width / 900);

        // Draw polygon
        p.noStroke();
        p.fill(211, 233, 255, 128);
        p.beginShape();
        for (var i = 0; i < polygonN; i++) {
          p.vertex(polygonX[i], polygonY[i]);
        }
        p.endShape(p.CLOSE);

        // Labels
        p.fill(255);
        p.textAlign(p.RIGHT, p.CENTER);
        p.text("→", 120, beamY);
        p.text("White\nLight", 90, beamY);

        p.textAlign(p.CENTER, p.TOP);
        p.text("Refractive index = 1.51 ~ 1.53", polygonOX, polygonOY + 150);

        // Draw ray buffer
        p.image(pg, 0, 0, 900, 450);
        p.pop();
      };

      function drawing() {
        pg.clear();
        // Draw rays for wavelengths from blue-violet to red
        for (var nano = 450; nano < 650; nano += 5) {
          var index = p.map(nano, 400, 700, 1.53, 1.51);
          drawBeam(130, beamY, 0, nano, index, 1);
        }
      }

      function drawBeam(x, y, theta, nano, index, life) {
        var step = 5;
        var col = getLightColor(nano);
        var a = Math.floor(life * life * 255);
        pg.stroke(col[0], col[1], col[2], a);

        var xStep = x;
        var yStep = y;
        var maxSteps = Math.floor(800 / step);

        for (var i = 0; i < maxSteps; i++) {
          xStep += step * p.cos(theta);
          yStep += step * p.sin(theta);

          for (var k = 0; k < polygonN; k++) {
            if (isIntersected(x, y, xStep, yStep,
              polygonX[k], polygonY[k], polygonX[k+1], polygonY[k+1])) {

              var xCross = getCrossX(x, y, xStep, yStep,
                polygonX[k], polygonY[k], polygonX[k+1], polygonY[k+1]);
              var yCross = getCrossY(x, y, xStep, yStep,
                polygonX[k], polygonY[k], polygonX[k+1], polygonY[k+1]);

              // For circle, snap intersection to circle boundary
              if (polygonN === polygonMax) {
                var tt = p.atan2(yCross - polygonOY, xCross - polygonOX);
                xCross = polygonOX + 100 * p.cos(tt);
                yCross = polygonOY + 100 * p.sin(tt);
              }

              pg.line(x, y, xCross, yCross);

              var faceAngle = p.atan2(
                polygonY[k] - polygonY[k+1],
                polygonX[k] - polygonX[k+1]
              );
              var f = faceAngle - theta;

              if (p.sin(f) > 0) {
                // Entering the polygon
                var t2 = p.atan2(polygonY[k+1] - polygonY[k], polygonX[k+1] - polygonX[k]) + p.HALF_PI;
                if (polygonN === polygonMax) {
                  t2 = p.atan2(polygonOY - yCross, polygonOX - xCross);
                }
                var dt = theta - t2;
                var dt2 = p.asin(p.sin(dt) / index);

                // Transmitted ray (into polygon)
                drawBeam(xCross + p.cos(t2 + dt2), yCross + p.sin(t2 + dt2),
                  t2 + dt2, nano, index,
                  life * Math.pow(Math.abs(p.cos(dt)), 1.1));

                // Reflected ray (back into air)
                var newLife = life * Math.pow(Math.abs(p.sin(dt)), 1.1);
                if (newLife > 0.0001) {
                  var t3 = 2 * t2 - theta + p.PI;
                  drawBeam(xCross + p.cos(t3), yCross + p.sin(t3),
                    t3, nano, index, newLife);
                }
              } else {
                // Exiting the polygon
                var t2 = p.atan2(polygonY[k+1] - polygonY[k], polygonX[k+1] - polygonX[k]) - p.HALF_PI;
                if (polygonN === polygonMax) {
                  t2 = p.atan2(yCross - polygonOY, xCross - polygonOX);
                }
                var dt = theta - t2;
                var ff = Math.abs(p.sin(dt)) * index;

                if (ff < 1) {
                  // Refract out (not total internal reflection)
                  var r1 = getLightColor(nano);
                  pg.stroke(r1[0], r1[1], r1[2], Math.floor(life * life * 255));
                  var t3 = t2 + p.asin(p.sin(dt) * index);
                  pg.line(xCross, yCross,
                    xCross + 600 * p.cos(t3),
                    yCross + 600 * p.sin(t3));
                }

                // Internally reflected ray
                var newLife = life * Math.pow(Math.abs(p.sin(dt)), 2);
                if (newLife > 0.0001) {
                  var t3 = 2 * t2 - theta + p.PI;
                  drawBeam(xCross + p.cos(t3), yCross + p.sin(t3),
                    t3, nano, index, newLife);
                }
              }
              return;
            }
          }
        }
        // Ray exits without hitting anything - draw remaining segment
        pg.line(x, y, xStep, yStep);
      }

      // ---- touch/mouse interaction (from original) ----
      p.mousePressed = function() {
        if (p.mouseX < 0 || p.mouseX > p.width || p.mouseY < 0 || p.mouseY > p.height) return;
        var mx = p.mouseX * 900 / p.width;
        var my = p.mouseY * 900 / p.width;
        if (mx < 250) {
          iDragged = 0;
          offsetY = my - beamY;
        } else {
          iDragged = 1;
          pmx = mx;
          pmy = my;
        }
      };

      p.mouseDragged = function() {
        if (p.touches.length > 1) return;
        if (iDragged >= 0) {
          var mx = p.mouseX * 900 / p.width;
          var my = p.mouseY * 900 / p.width;
          if (iDragged === 0) {
            beamY = my - offsetY;
          } else if (iDragged === 1) {
            var t1 = p.atan2(pmy - polygonOY, pmx - polygonOX);
            var t2 = p.atan2(my - polygonOY, mx - polygonOX);
            rotateT += (t2 - t1);
            pmx = mx;
            pmy = my;
          }
          setup2();
          return false;
        }
      };

      p.mouseReleased = function() {
        iDragged = -1;
      };

      // needed by p5
      p.touchStarted = p.mousePressed;
      p.touchMoved = p.mouseDragged;
      p.touchEnded = p.mouseReleased;
    });
  })();
  </script>
</body>
</html>
