<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=10">
  <title>棱镜色散 — 光的折射与光谱 - 物理虚拟实验</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/p5.min.js"></script>
  <style>
    .main-card { max-width: 900px; margin: 0 auto 24px; padding: 0 16px; }
    .canvas-wrap { border-radius: 12px; padding: 4px; width: 100%; box-sizing: border-box; border: 1px solid #e2e8f0; position: relative; background: #000; }
    .controls-bar { display: flex; align-items: center; justify-content: center; padding: 10px 16px; gap: 16px; flex-wrap: wrap; background: #1a1a2e; border-radius: 0 0 12px 12px; border-top: 1px solid #333; }
    .ctrl-group { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #ccc; }
    .ctrl-group input[type="range"] { width: 110px; accent-color: #8b5cf6; }
    .shape-btn { border: 2px solid #555; background: transparent; color: #aaa; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.2s; user-select: none; }
    .shape-btn.active { border-color: #8b5cf6; color: #fff; background: rgba(139,92,246,0.2); }
    .shape-btn:hover { border-color: #8b5cf6; }
    .hint-text { color: #888; font-size: 12px; }
    .section { padding: 1.5rem 2rem 0.5rem; }
    .section h2 { font-size: 1.4rem; }
    .formula-bar { max-width: 900px; margin: 0 auto 24px; padding: 0 16px; display: flex; gap: 12px; flex-wrap: wrap; }
    .formula-item { flex: 1; min-width: 180px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px 16px; }
    .formula-item .label { color: #64748b; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; }
    .formula-item .value { color: #e2e8f0; font-size: 13px; }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">物理虚拟实验</div>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="experiments.html">实验列表</a>
    </nav>
  </header>

  <div class="section">
    <h2>棱镜色散 — 光的折射与光谱</h2>
    <p style="color:#94a3b8;margin:0 0 16px 0;">白光通过透明介质发生色散。拖动物体调节位置，改变光束角度，观察折射与光谱的形成。</p>
  </div>

  <div class="main-card">
    <div class="canvas-wrap">
      <div id="myContainer"></div>
    </div>
    <div class="controls-bar">
      <div class="ctrl-group" id="shapeButtons">
        <button class="shape-btn active" data-shape="triangle">△ 三角形</button>
        <button class="shape-btn" data-shape="square">◇ 正方形</button>
        <button class="shape-btn" data-shape="circle">○ 圆形</button>
      </div>
      <div class="ctrl-group">
        <span>光束角度</span>
        <input type="range" id="rangeAngle" min="-25" max="25" value="0" step="0.5">
      </div>
      <span class="hint-text">💡 拖动物体上下移动</span>
    </div>
  </div>

  <div class="formula-bar">
    <div class="formula-item">
      <span class="label">斯涅尔定律</span>
      <span class="value">n₁·sinθ₁ = n₂·sinθ₂ &nbsp;（入射面与出射面各一次）</span>
    </div>
    <div class="formula-item">
      <span class="label">折射率随波长变化</span>
      <span class="value">红光 n≈1.510 &nbsp;→&nbsp; 紫光 n≈1.530</span>
    </div>
    <div class="formula-item">
      <span class="label">色散原理</span>
      <span class="value">波长越短折射率越大 → 紫光偏折最大</span>
    </div>
  </div>

  <script src="protect.js"></script>
  <script>
  (function() {
    // ---- spectrum data ----
    var spectrumColors = [
      [255, 60, 60], [255, 140, 20], [255, 220, 0],
      [50, 210, 60], [30, 130, 255], [80, 0, 200], [150, 50, 230]
    ];
    var nValues = [1.510, 1.514, 1.518, 1.522, 1.526, 1.529, 1.530];
    var nAir = 1.0;

    // ---- state ----
    var currentShape = "triangle";
    var shapeOffsetY = 0;     // drag offset
    var beamAngleDeg = 0;     // degrees
    var beamAngle = 0;        // radians

    // ---- shape geometry (logical coords, before offset) ----
    function getShape() {
      var oy = shapeOffsetY;
      if (currentShape === "triangle") {
        // Equilateral triangle: left face vertical, apex right
        var side = 215;
        var h = side * Math.sqrt(3) / 2;
        return {
          type: "polygon",
          vertices: [
            [375, 245 - h/2 + oy],  // top of vertical face
            [375, 245 + h/2 + oy],  // bottom of vertical face
            [375 + h, 245 + oy]     // right apex
          ],
          entryEdge: [0, 1],  // left vertical face
          exitEdges: [[0, 2], [2, 1]]  // top-right and bottom-right faces
        };
      } else if (currentShape === "square") {
        // Diamond (square rotated 45°): left vertex faces light
        var halfDiag = 135;
        return {
          type: "polygon",
          vertices: [
            [500, 245 - halfDiag + oy],  // top
            [500 + halfDiag, 245 + oy],  // right
            [500, 245 + halfDiag + oy],  // bottom
            [500 - halfDiag, 245 + oy]   // left
          ],
          entryEdges: [[3, 0], [3, 2]],  // left vertex: both faces from point 3
          exitEdges: [[0, 1], [1, 2]]    // right vertex: both faces to point 1
        };
      } else {
        // Circle
        return {
          type: "circle",
          center: [500, 245 + oy],
          radius: 110
        };
      }
    }

    // ---- vector math helpers ----
    function vecSub(a, b) { return [a[0]-b[0], a[1]-b[1]]; }
    function vecAdd(a, b) { return [a[0]+b[0], a[1]+b[1]]; }
    function vecMul(s, v) { return [s*v[0], s*v[1]]; }
    function vecDot(a, b) { return a[0]*b[0] + a[1]*b[1]; }
    function vecLen(v) { return Math.sqrt(v[0]*v[0] + v[1]*v[1]); }
    function vecNorm(v) { var l=vecLen(v); return l>1e-10 ? [v[0]/l, v[1]/l] : [0,0]; }

    // Vector Snell's law: refracts incident ray through surface
    // normal: unit vector pointing INTO the second medium
    // Returns refracted direction (unit), or null if TIR
    function refract(incident, normal, n1, n2) {
      var eta = n1 / n2;
      var cosI = -vecDot(incident, normal);
      var k = 1 - eta * eta * (1 - cosI * cosI);
      if (k < 0) return null; // TIR
      var cosT = Math.sqrt(k);
      return vecNorm(vecAdd(vecMul(eta, incident), vecMul(eta * cosI - cosT, normal)));
    }

    // ---- ray-segment intersection ----
    function raySegIntersect(origin, dir, a, b) {
      var dx = b[0] - a[0];
      var dy = b[1] - a[1];
      var denom = dir[0] * dy - dir[1] * dx;
      if (Math.abs(denom) < 1e-10) return null;
      var t = ((a[0] - origin[0]) * dy - (a[1] - origin[1]) * dx) / denom;
      var s = ((a[0] - origin[0]) * dir[1] - (a[1] - origin[1]) * dir[0]) / denom;
      if (t > 0.001 && s >= -0.001 && s <= 1.001) {
        return { point: [origin[0] + t * dir[0], origin[1] + t * dir[1]], t: t };
      }
      return null;
    }

    // Find closest intersection of ray with polygon, excluding one edge index
    function rayPolygonIntersect(origin, dir, vertices, excludeEdge) {
      var best = null;
      var n = vertices.length;
      for (var i = 0; i < n; i++) {
        if (i === excludeEdge) continue;
        var a = vertices[i];
        var b = vertices[(i + 1) % n];
        var hit = raySegIntersect(origin, dir, a, b);
        if (hit && (!best || hit.t < best.t)) best = hit;
      }
      return best;
    }

    // Find closest intersection of ray with circle (returns 0, 1, or 2 points)
    function rayCircleIntersect(origin, dir, center, radius) {
      var oc = vecSub(origin, center);
      var a = vecDot(dir, dir);
      var b = 2 * vecDot(oc, dir);
      var c = vecDot(oc, oc) - radius * radius;
      var disc = b*b - 4*a*c;
      var pts = [];
      if (disc < 0) return pts;
      var t1 = (-b - Math.sqrt(disc)) / (2*a);
      var t2 = (-b + Math.sqrt(disc)) / (2*a);
      if (t1 > 0.001) pts.push({ point: vecAdd(origin, vecMul(t1, dir)), t: t1 });
      if (t2 > 0.001 && Math.abs(t2-t1) > 0.001) pts.push({ point: vecAdd(origin, vecMul(t2, dir)), t: t2 });
      return pts;
    }

    // ---- trace one wavelength ----
    // Returns ray segments: [{p1, p2, colorIndex, alpha}] or null
    function traceRay(beamOrigin, beamDir, colorIndex) {
      var nGlass = nValues[colorIndex];
      var s = getShape();
      var segments = [];

      // 1) Find entry point
      var entryHit;
      if (s.type === "polygon") {
        entryHit = rayPolygonIntersect(beamOrigin, beamDir, s.vertices, -1);
      } else {
        var hits = rayCircleIntersect(beamOrigin, beamDir, s.center, s.radius);
        entryHit = hits.length > 0 ? hits[0] : null;
      }
      if (!entryHit) return null;

      var entryPt = entryHit.point;

      // 2) Entry normal (pointing INTO the shape)
      var entryNormal;
      if (s.type === "polygon") {
        // Find which edge the entry hit is on
        var v = s.vertices, nv = v.length;
        for (var i = 0; i < nv; i++) {
          var a = v[i], b = v[(i+1)%nv];
          var edgeDir = vecSub(b, a);
          // inward normal for CCW polygon: rotate right (perpendicular inward)
          var eNorm = vecNorm([edgeDir[1], -edgeDir[0]]);
          // Check if entryPt is on this edge
          var toHit = vecSub(entryPt, a);
          var edgeLen = vecLen(edgeDir);
          var proj = vecDot(toHit, vecNorm(edgeDir));
          if (proj >= -0.1 && proj <= edgeLen + 0.1) {
            // Verify normal points into polygon (check dot with ray direction)
            if (vecDot(eNorm, beamDir) < 0) {
              entryNormal = eNorm;
              break;
            }
            entryNormal = vecMul(-1, eNorm);
            break;
          }
        }
        if (!entryNormal) entryNormal = [1, 0]; // fallback
      } else {
        // Circle: normal into shape points toward center
        entryNormal = vecNorm(vecSub(s.center, entryPt));
      }

      // 3) Refract at entry
      var internalDir = refract(beamDir, entryNormal, nAir, nGlass);
      if (!internalDir) return null;

      // 4) Find exit point
      var exitPt, exitNormal;
      if (s.type === "polygon") {
        // Find intersection with polygon, excluding the entry edge
        var exitHit = rayPolygonIntersect(entryPt, internalDir, s.vertices, -1);
        // But need to exclude the entry edge specifically
        // Find the entry edge index
        var entryEdgeIdx = -1;
        for (var i2 = 0; i2 < s.vertices.length; i2++) {
          var a2 = s.vertices[i2], b2 = s.vertices[(i2+1)%s.vertices.length];
          var toHit2 = vecSub(entryPt, a2);
          var ed2 = vecSub(b2, a2);
          var pr2 = vecDot(toHit2, vecNorm(ed2));
          if (pr2 >= -0.1 && pr2 <= vecLen(ed2) + 0.1) { entryEdgeIdx = i2; break; }
        }
        exitHit = rayPolygonIntersect(entryPt, internalDir, s.vertices, entryEdgeIdx);
        if (!exitHit) return null;
        exitPt = exitHit.point;

        // Exit normal (pointing OUT of shape)
        for (var j = 0; j < s.vertices.length; j++) {
          var a3 = s.vertices[j], b3 = s.vertices[(j+1)%s.vertices.length];
          var ed3 = vecSub(b3, a3);
          var toHit3 = vecSub(exitPt, a3);
          var pr3 = vecDot(toHit3, vecNorm(ed3));
          if (pr3 >= -0.1 && pr3 <= vecLen(ed3) + 0.1) {
            // Outward normal for CCW polygon: rotate left
            var outNorm = vecNorm([-ed3[1], ed3[0]]);
            if (vecDot(outNorm, internalDir) > 0) {
              exitNormal = outNorm;
            } else {
              exitNormal = vecMul(-1, outNorm);
            }
            break;
          }
        }
        if (!exitNormal) exitNormal = [-1, 0];
      } else {
        var exitHits = rayCircleIntersect(entryPt, internalDir, s.center, s.radius);
        if (exitHits.length < 1) return null;
        exitPt = exitHits[0].point;
        // Outward normal for circle
        exitNormal = vecNorm(vecSub(exitPt, s.center));
      }

      // 5) Refract at exit
      var exitDir = refract(internalDir, exitNormal, nGlass, nAir);
      if (!exitDir) return null;

      // 6) Exit ray endpoint
      var exitEnd = vecAdd(exitPt, vecMul(500, exitDir));

      return {
        entryPt: entryPt,
        exitPt: exitPt,
        internalDir: internalDir,
        exitEnd: exitEnd
      };
    }

    // ---- p5.js instance mode ----
    new p5(function(p) {
      var isDragging = false;
      var dragStartY = 0;
      var dragStartOffset = 0;

      p.setup = function() {
        var container = document.getElementById("myContainer");
        var cw = container.offsetWidth || 800;
        var ch = cw * 0.5;
        var c = p.createCanvas(cw, ch);
        c.parent("myContainer");
        c.id("myP5Canvas");
        p.frameRate(30);

        // Shape buttons
        document.querySelectorAll(".shape-btn").forEach(function(btn) {
          btn.addEventListener("click", function() {
            document.querySelectorAll(".shape-btn").forEach(function(b) { b.classList.remove("active"); });
            this.classList.add("active");
            currentShape = this.dataset.shape;
            shapeOffsetY = 0;
          });
        });

        // Angle slider
        var angleSlider = document.getElementById("rangeAngle");
        if (angleSlider) angleSlider.addEventListener("input", function() {
          beamAngleDeg = parseFloat(this.value);
          beamAngle = beamAngleDeg * Math.PI / 180;
        });
      };

      p.draw = function() {
        p.background(0);
        var cw = p.width, ch = p.height;
        var scale = cw / 1000;
        p.push();
        p.scale(scale);

        drawShape();
        drawRays();
        drawLabels();

        p.pop();
      };

      function drawShape() {
        var s = getShape();
        p.noFill();
        p.strokeWeight(1.8);
        p.stroke(140, 170, 220, 120);

        if (s.type === "polygon") {
          p.beginShape();
          for (var i = 0; i < s.vertices.length; i++) p.vertex(s.vertices[i][0], s.vertices[i][1]);
          p.endShape(p.CLOSE);

          // Light glass-like fill
          p.noStroke();
          p.fill(180, 200, 230, 30);
          p.beginShape();
          for (var i2 = 0; i2 < s.vertices.length; i2++) p.vertex(s.vertices[i2][0], s.vertices[i2][1]);
          p.endShape(p.CLOSE);
        } else {
          p.ellipse(s.center[0], s.center[1], s.radius*2, s.radius*2);
          p.noStroke();
          p.fill(180, 200, 230, 30);
          p.ellipse(s.center[0], s.center[1], s.radius*2, s.radius*2);
        }
      }

      function drawRays() {
        var beamOrigin = [30, 245 + shapeOffsetY];
        var beamDir = [p.cos(beamAngle), p.sin(beamAngle)];

        // Draw white incident beam
        p.stroke(255, 255, 255, 220);
        p.strokeWeight(3);
        p.noFill();
        var beamEnd = vecAdd(beamOrigin, vecMul(900, beamDir));

        // Find actual entry point (use first wavelength's entry)
        var firstTrace = traceRay(beamOrigin, beamDir, 0);
        if (firstTrace) {
          p.line(beamOrigin[0], beamOrigin[1], firstTrace.entryPt[0], firstTrace.entryPt[1]);
        } else {
          p.line(beamOrigin[0], beamOrigin[1], beamEnd[0], beamEnd[1]);
        }

        // Draw colored rays for each wavelength
        for (var w = 0; w < nValues.length; w++) {
          var trace = traceRay(beamOrigin, beamDir, w);
          if (!trace) continue;
          var col = spectrumColors[w];

          // Internal ray (dimmer)
          p.stroke(col[0], col[1], col[2], 90);
          p.strokeWeight(1.2);
          p.line(trace.entryPt[0], trace.entryPt[1], trace.exitPt[0], trace.exitPt[1]);

          // Exit ray (brighter)
          p.stroke(col[0], col[1], col[2], 210);
          p.strokeWeight(1.8);
          p.line(trace.exitPt[0], trace.exitPt[1], trace.exitEnd[0], trace.exitEnd[1]);
        }

        // Source glow
        p.noStroke();
        var glow = p.drawingContext.createRadialGradient(beamOrigin[0], beamOrigin[1], 0, beamOrigin[0], beamOrigin[1], 14);
        glow.addColorStop(0, 'rgba(255,255,255,0.95)');
        glow.addColorStop(0.5, 'rgba(255,255,255,0.3)');
        glow.addColorStop(1, 'rgba(255,255,255,0)');
        p.drawingContext.fillStyle = glow;
        p.ellipse(beamOrigin[0], beamOrigin[1], 28, 28);

        p.noStroke();
      }

      function drawLabels() {
        p.textSize(13);
        p.noStroke();
        p.textAlign(p.LEFT, p.CENTER);

        // White light label
        p.fill(255, 255, 255, 200);
        p.text("白光", 46, 245 + shapeOffsetY - 18);

        // Spectrum bar at bottom-right
        var barX = 680, barY = 440, barW = 260, barH = 10;
        var steps = 70;
        for (var i = 0; i < steps; i++) {
          var t = i / (steps - 1);
          var wi = Math.floor(t * (nValues.length - 1));
          var frac = t * (nValues.length - 1) - wi;
          var c1 = spectrumColors[Math.min(wi, 6)];
          var c2 = spectrumColors[Math.min(wi + 1, 6)];
          p.fill(
            p.lerp(c1[0], c2[0], frac),
            p.lerp(c1[1], c2[1], frac),
            p.lerp(c1[2], c2[2], frac)
          );
          p.noStroke();
          p.rect(barX + i * (barW / steps), barY, barW / steps + 1.5, barH);
        }
        p.fill(220, 50, 50);
        p.textSize(11);
        p.text("红", barX - 20, barY + barH/2);
        p.fill(150, 50, 230);
        p.text("紫", barX + barW + 14, barY + barH/2);

        // Refractive index
        p.fill(160, 170, 200);
        p.textSize(12);
        p.textAlign(p.CENTER, p.TOP);
        p.text("折射率 n = 1.510 ~ 1.530", 500, 420);
      }

      // ---- dragging ----
      p.mousePressed = function() {
        var s = getShape();
        var mx = p.mouseX / (p.width / 1000);
        var my = p.mouseY / (p.width / 1000);

        var inside = false;
        if (s.type === "polygon") {
          var v = s.vertices;
          var insidePoly = pointInPolygon(mx, my, v);
          inside = insidePoly;
        } else {
          var dx = mx - s.center[0];
          var dy = my - s.center[1];
          inside = Math.sqrt(dx*dx + dy*dy) < s.radius + 10;
        }

        if (inside) {
          isDragging = true;
          dragStartY = my;
          dragStartOffset = shapeOffsetY;
        }
      };

      p.mouseDragged = function() {
        if (!isDragging) return;
        var my = p.mouseY / (p.width / 1000);
        shapeOffsetY = dragStartOffset + (my - dragStartY);
        shapeOffsetY = p.constrain(shapeOffsetY, -120, 120);
      };

      p.mouseReleased = function() {
        isDragging = false;
      };

      function pointInPolygon(px, py, vertices) {
        var inside = false;
        var n = vertices.length;
        for (var i = 0, j = n - 1; i < n; j = i++) {
          var xi = vertices[i][0], yi = vertices[i][1];
          var xj = vertices[j][0], yj = vertices[j][1];
          if ((yi > py) !== (yj > py) && px < (xj - xi) * (py - yi) / (yj - yi) + xi) {
            inside = !inside;
          }
        }
        return inside;
      }

      p.windowResized = function() {
        var container = document.getElementById("myContainer");
        var cw = container.offsetWidth || 800;
        var ch = cw * 0.5;
        p.resizeCanvas(cw, ch);
      };
    });
  })();
  </script>
</body>
</html>
