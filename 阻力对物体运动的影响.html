<script>

// ============================================================
//  探究阻力对物体运动的影响 — 纯 Canvas 交互实验
//  物理：人教版八年级下册 第八章 运动和力 第1节 牛顿第一定律
// ============================================================

// ---- 物理常量 ----
const G = 9.8;

// ---- 表面配置 ----
const SURFACES = [
  { name:'毛巾', mu:0.40, color:'#FF3B30', trackBg:'#3d1c18', trackTex:'#5c2820' },
  { name:'棉布', mu:0.20, color:'#FF9500', trackBg:'#2d2518', trackTex:'#4d3d28' },
  { name:'木板', mu:0.10, color:'#34C759', trackBg:'#1d2418', trackTex:'#3d4428' },
  { name:'玻璃', mu:0.02, color:'#AF52DE', trackBg:'#1a1d2d', trackTex:'#2d3050' },
  { name:'理想光滑面', mu:0.00, color:'#5AC8FA', trackBg:'#0d1a2d', trackTex:'#1a3050' }
];

// ---- 状态 ----
let surfaceIdx = 2;          // 默认木板
let rampHeight = 0.46;       // 斜面高度 (m), v0≈3.0m/s
let simTime = 0;
let phase = 'waiting';       // waiting | running | paused | finished
let slowMo = 1;              // 慢动作倍率
let runs = [];               // 已完成的实验记录

// ---- 派生物理量 ----
let rampAngle, rampLen, tIncline, v0, trackScale, rampPixelScale;

function calcPhysics() {
  rampAngle = Math.atan2(rampHeight, 0.80); // 斜面水平投影固定 0.80m
  rampLen = Math.sqrt(rampHeight * rampHeight + 0.80 * 0.80);
  let aIncline = G * Math.sin(rampAngle);
  tIncline = Math.sqrt(2 * rampLen / aIncline);
  v0 = Math.sqrt(2 * G * rampHeight);
  // 视觉斜面与物理斜面角度一致
  rampPixelScale = L.rampW / 0.80; // px per meter 沿斜面
  L.rampTopY = L.trackY - Math.round(L.rampW * Math.tan(rampAngle));
}

// ---- Canvas 尺寸 ----
const VW = 1000, VH = 320;
let cvs, ctx, scale = 1;

function resize() {
  let wrap = document.getElementById('canvasWrap');
  let cw = wrap.clientWidth;
  if (!cw || cw < 100) cw = Math.min(window.innerWidth - 12, 1140);
  let w = Math.floor(cw);
  let h = Math.floor(w * VH / VW);
  let dpr = window.devicePixelRatio || 1;
  cvs.width = w * dpr;
  cvs.height = h * dpr;
  cvs.style.width = w + 'px';
  cvs.style.height = h + 'px';
  scale = w / VW;
}

// ---- 布局常量（虚拟坐标） ----
const L = {
  rampX: 45, rampW: 250, rampBotY: 285,
  trackY: 285, trackX: 295, trackW: 695, trackEnd: 990,
  gaugeCX: 50, gaugeCY: 40, gaugeR: 22,
};

// ---- 物理计算 ----
function getCarState() {
  let s = SURFACES[surfaceIdx];
  let mu = s.mu;
  if (simTime <= tIncline) {
    let frac = simTime / tIncline;
    let distOnRamp = rampLen * frac * frac; // physical meters along ramp
    let dPx = distOnRamp * rampPixelScale;   // pixels along ramp
    // 斜面表面坐标
    let surfX = L.rampX + dPx * Math.cos(rampAngle);
    let surfY = L.rampTopY + dPx * Math.sin(rampAngle);
    let carOff = 15; // 车身半高 + 车轮间隙
    return {
      onRamp: true,
      x: surfX - carOff * Math.sin(rampAngle),
      y: surfY - carOff * Math.cos(rampAngle),
      angle: rampAngle,
      v: frac * v0,
      distOnRamp,
      flatDist: 0,
      stopped: false,
      accel: G * Math.sin(rampAngle)
    };
  } else {
    let tFlat = simTime - tIncline;
    let v, flatDist, stopped, accel;
    if (mu === 0) {
      v = v0;
      flatDist = v0 * tFlat;
      stopped = false;
      accel = 0;
    } else {
      v = v0 - mu * G * tFlat;
      if (v <= 0) {
        v = 0;
        flatDist = v0 * v0 / (2 * mu * G);
        stopped = true;
        accel = 0;
      } else {
        flatDist = v0 * tFlat - 0.5 * mu * G * tFlat * tFlat;
        stopped = false;
        accel = -mu * G;
      }
    }
    return {
      onRamp: false,
      x: L.trackX + flatDist * trackScale,
      y: L.trackY - 15,
      angle: 0,
      v,
      flatDist,
      stopped,
      accel,
      offScreen: flatDist * trackScale > L.trackW + 50
    };
  }
}

// ---- 渲染：背景 ----
function drawBackground(ctx) {
  // 实验台面 — 简洁深色背景
  let grad = ctx.createLinearGradient(0, L.trackY + 10, 0, VH);
  grad.addColorStop(0, '#1c1c26');
  grad.addColorStop(1, '#111118');
  ctx.fillStyle = grad;
  ctx.fillRect(0, L.trackY + 10, VW, VH - L.trackY - 10);
  // 轨道下方金属边
  ctx.fillStyle = '#2a2a35';
  ctx.fillRect(0, L.trackY + 10, VW, 2);
}

// ---- 渲染：斜面 ----
function drawRamp(ctx) {
  let rx = L.rampX, ry = L.trackY;
  let tw = L.rampW, th = L.trackY - L.rampTopY;

  // 斜面主体
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(rx, ry);
  ctx.lineTo(rx + tw, ry);
  ctx.lineTo(rx, ry - th);
  ctx.closePath();

  // 木纹渐变
  let grad = ctx.createLinearGradient(rx, ry, rx + tw, ry - th);
  grad.addColorStop(0, '#5c4033');
  grad.addColorStop(0.5, '#7d5a44');
  grad.addColorStop(1, '#6b4c38');
  ctx.fillStyle = grad;
  ctx.fill();

  // 木纹线
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 1;
  for (let d = 8; d < Math.sqrt(tw * tw + th * th); d += 10) {
    let sx = rx + d * Math.cos(rampAngle);
    let sy = ry - d * Math.sin(rampAngle);
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + 4, sy + 2);
    ctx.stroke();
  }

  // 边框
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(rx, ry);
  ctx.lineTo(rx + tw, ry);
  ctx.lineTo(rx, ry - th);
  ctx.closePath();
  ctx.stroke();

  ctx.restore();

  // 高度标注
  let hx = rx - 16;
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 3]);
  ctx.beginPath();
  ctx.moveTo(hx, ry);
  ctx.lineTo(hx, ry - th);
  ctx.stroke();
  ctx.setLineDash([]);

  // 箭头
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.moveTo(hx, ry - th);
  ctx.lineTo(hx - 6, ry - th + 10);
  ctx.lineTo(hx + 6, ry - th + 10);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(hx, ry);
  ctx.lineTo(hx - 6, ry - 10);
  ctx.lineTo(hx + 6, ry - 10);
  ctx.fill();

  // 高度文字
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '11px -apple-system, "PingFang SC", sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('h=' + rampHeight.toFixed(2) + 'm', hx - 4, ry - th / 2 + 4);
}

// ---- 渲染：水平轨道 ----
function drawTrack(ctx, idx) {
  let s = SURFACES[idx];
  let tx = L.trackX, ty = L.trackY, tw = L.trackW, th = 30;

  // 轨道底面
  ctx.fillStyle = s.trackBg;
  ctx.fillRect(tx, ty, tw, th);

  // 表面纹理
  ctx.save();
  ctx.beginPath();
  ctx.rect(tx, ty, tw, th);
  ctx.clip();

  if (idx === 0) { // 毛巾 - 粗糙纤维
    ctx.fillStyle = s.trackTex;
    for (let x = tx; x < tx + tw; x += 10) {
      for (let y = ty; y < ty + th; y += 8) {
        let ox = (Math.sin(x * 0.7 + y * 0.3) * 3);
        let oy = (Math.cos(y * 0.6 + x * 0.2) * 2);
        ctx.fillRect(x + ox, y + oy, 6, 1.5);
      }
    }
  } else if (idx === 1) { // 棉布 - 细密织物
    ctx.strokeStyle = s.trackTex;
    ctx.lineWidth = 0.4;
    for (let y = ty; y < ty + th; y += 4) {
      ctx.beginPath();
      for (let x = tx; x < tx + tw; x += 6) {
        ctx.moveTo(x, y + Math.sin(x * 0.3) * 1.5);
        ctx.lineTo(x + 6, y + Math.sin((x + 6) * 0.3) * 1.5);
      }
      ctx.stroke();
    }
  } else if (idx === 2) { // 木板 - 木纹
    for (let i = 0; i < 8; i++) {
      let grainY = ty + 3 + i * 3.2;
      ctx.strokeStyle = i % 2 === 0 ? '#2d3418' : '#3d4428';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(tx, grainY);
      for (let x = tx; x < tx + tw; x += 30) {
        ctx.lineTo(x + 30, grainY + Math.sin(x * 0.08) * 1.5);
      }
      ctx.stroke();
    }
  } else if (idx === 3) { // 玻璃 - 半透明反光
    let gGrad = ctx.createLinearGradient(tx, ty, tx, ty + th);
    gGrad.addColorStop(0, 'rgba(120,140,200,0.3)');
    gGrad.addColorStop(0.5, 'rgba(80,100,180,0.15)');
    gGrad.addColorStop(1, 'rgba(120,140,200,0.3)');
    ctx.fillStyle = gGrad;
    ctx.fillRect(tx, ty, tw, th);
    // 反光斜线
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    for (let d = 20; d < tw + th; d += 50) {
      ctx.beginPath();
      ctx.moveTo(tx + d, ty);
      ctx.lineTo(tx + d - th, ty + th);
      ctx.stroke();
    }
  } else { // 理想光滑 - 发光
    let iGrad = ctx.createLinearGradient(tx, ty, tx, ty + th);
    iGrad.addColorStop(0, 'rgba(90,200,250,0.2)');
    iGrad.addColorStop(1, 'rgba(90,200,250,0.05)');
    ctx.fillStyle = iGrad;
    ctx.fillRect(tx, ty, tw, th);
    // 顶部发光线
    ctx.strokeStyle = 'rgba(90,200,250,0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(tx + tw, ty);
    ctx.stroke();
  }
  ctx.restore();

  // 轨道边框
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(tx, ty, tw, th);

  // 起始标记线（斜面底部）
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1;
  ctx.setLineDash([2, 3]);
  ctx.beginPath();
  ctx.moveTo(tx, ty);
  ctx.lineTo(tx, ty + th);
  ctx.stroke();
  ctx.setLineDash([]);

  // 距离刻度
  let maxM = L.trackW / trackScale;
  let step = getNiceStep(maxM / 5);
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.font = '9px -apple-system, "PingFang SC", sans-serif';
  ctx.textAlign = 'center';
  for (let d = 0; d <= maxM + step * 0.5; d += step) {
    let px = tx + d * trackScale;
    if (px > tx + tw + 5) break;
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(px, ty + th - 10);
    ctx.lineTo(px, ty + th);
    ctx.stroke();
    ctx.fillText(d + 'm', px, ty + th - 1);
  }

  // 表面标签
  ctx.fillStyle = s.color;
  ctx.font = 'bold 12px -apple-system, "PingFang SC", sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(s.name + ' μ=' + s.mu.toFixed(2), tx + tw - 8, ty - 6);
}

function getNiceStep(maxVal) {
  if (maxVal <= 0) return 1;
  let step = maxVal / 5;
  let mag = Math.pow(10, Math.floor(Math.log(step) / Math.LN10));
  let r = step / mag;
  return (r <= 1.5 ? 1 : r <= 3.5 ? 2 : r <= 7.5 ? 5 : 10) * mag;
}

// ---- 渲染：已完成实验的停止标记 ----
function drawRunMarkers(ctx) {
  for (let r of runs) {
    if (r.surfaceIdx === surfaceIdx) continue; // 不画当前表面
    let sx = L.trackX + r.stopDist * trackScale;
    if (sx > L.trackX + L.trackW + 30) continue;
    // 停止线
    ctx.strokeStyle = r.color;
    ctx.globalAlpha = 0.4;
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(sx, L.trackY - 10);
    ctx.lineTo(sx, L.trackY + 26);
    ctx.stroke();
    ctx.setLineDash([]);
    // 标签
    ctx.fillStyle = r.color;
    ctx.font = '9px -apple-system, "PingFang SC", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(r.name + ' ' + r.stopDist.toFixed(2) + 'm', sx, L.trackY - 14);
    ctx.globalAlpha = 1;
  }
}

// ---- 渲染：小车 ----
let wheelAngle = 0;

function drawCar(ctx, x, y, angle, color, stopped) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  let bw = 46, bh = 22;

  // 阴影
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(0, bh / 2 + 5, bw / 2 + 3, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // 车身
  let bodyGrad = ctx.createLinearGradient(0, -bh / 2, 0, bh / 2);
  bodyGrad.addColorStop(0, color);
  bodyGrad.addColorStop(1, shadeColor(color, -30));
  ctx.fillStyle = bodyGrad;
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 1.5;
  roundRect(ctx, -bw / 2, -bh / 2, bw, bh, 6);
  ctx.fill();
  ctx.stroke();

  // 高光
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  roundRect(ctx, -bw / 2 + 3, -bh / 2 + 2, bw - 6, bh / 2 - 2, 4);
  ctx.fill();

  // 车窗
  ctx.fillStyle = '#a8d8ff';
  roundRect(ctx, -bw / 2 + 8, -bh / 2 + 5, 13, 9, 2);
  ctx.fill();
  roundRect(ctx, -bw / 2 + 26, -bh / 2 + 5, 13, 9, 2);
  ctx.fill();

  // 车轮
  let wheelR = 5.5;
  let wheelPositions = [
    [-12, bh / 2 + 2],
    [12, bh / 2 + 2]
  ];
  for (let wp of wheelPositions) {
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(wp[0], wp[1], wheelR, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.stroke();

    // 轮辐（旋转）
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 0.8;
    for (let k = 0; k < 6; k++) {
      let a = wheelAngle + k * Math.PI / 3;
      ctx.beginPath();
      ctx.moveTo(wp[0], wp[1]);
      ctx.lineTo(wp[0] + Math.cos(a) * wheelR * 0.7, wp[1] + Math.sin(a) * wheelR * 0.7);
      ctx.stroke();
    }

    // 轮毂
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.arc(wp[0], wp[1], 2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function shadeColor(color, percent) {
  let num = parseInt(color.replace('#', ''), 16);
  let amt = Math.round(2.55 * percent);
  let R = Math.max(0, Math.min(255, (num >> 16) + amt));
  let G = Math.max(0, Math.min(255, (num >> 8 & 0x00FF) + amt));
  let B = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
  return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ---- 渲染：标题和提示 ----
function drawHUD(ctx, carState) {
  ctx.fillStyle = '#fff'; ctx.font = 'bold 16px -apple-system, "PingFang SC", sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('同一小车从斜面同一高度静止释放，在不同水平面上的运动对比', VW / 2, 20);

  let s = SURFACES[surfaceIdx];
  ctx.fillStyle = s.color; ctx.font = 'bold 10px -apple-system, "PingFang SC", sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(s.name + '  μ=' + s.mu.toFixed(2), L.trackX, L.trackY - 24);

  if (phase === 'waiting') {
    ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.font = '13px -apple-system, "PingFang SC", sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('点击「开始」→ 小车从斜面顶端静止释放', VW / 2, 52);
  }
  if (carState && carState.offScreen && SURFACES[surfaceIdx].mu === 0) {
    ctx.fillStyle = SURFACES[surfaceIdx].color; ctx.font = 'bold 12px -apple-system, "PingFang SC", sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('→ 小车以恒定速度 v=' + v0.toFixed(1) + ' m/s 一直运动下去 →', L.trackX + L.trackW / 2, L.trackY - 30);
  }
  if (carState && carState.stopped && phase === 'finished') {
    ctx.fillStyle = SURFACES[surfaceIdx].color; ctx.font = 'bold 11px -apple-system, "PingFang SC", sans-serif'; ctx.textAlign = 'center';
    let stopX = L.trackX + carState.flatDist * trackScale;
    ctx.fillText('▼ ' + carState.flatDist.toFixed(2) + 'm', stopX, L.trackY - 22);
  }
}

// ---- 主渲染循环 ----
function render() {
  ctx.clearRect(0, 0, VW, VH);

  let carState = phase === 'waiting' ? null : getCarState();

  drawBackground(ctx);
  drawTrack(ctx, surfaceIdx);
  drawRunMarkers(ctx);
  drawRamp(ctx);

  // 绘当前小车
  if (phase === 'waiting') {
    // 车尾对齐斜面最高点，车中心沿斜面偏移半车身
    let bwHalf = 23;
    let dPx = bwHalf + 3; // 车尾刚好在斜面顶端
    let wsx = L.rampX + dPx * Math.cos(rampAngle);
    let wsy = L.rampTopY + dPx * Math.sin(rampAngle);
    let coff = 15;
    drawCar(ctx, wsx - coff * Math.sin(rampAngle), wsy - coff * Math.cos(rampAngle), rampAngle, SURFACES[surfaceIdx].color, false);
  } else if (carState) {
    drawCar(ctx, carState.x, carState.y, carState.angle, SURFACES[surfaceIdx].color, carState.stopped);
  }

  drawHUD(ctx, carState);
}

// ---- 动画循环 ----
let lastTime = 0;
let totalDist = 0;

function loop(ts) {
  requestAnimationFrame(loop);

  if (!cvs || !ctx) return;

  let dt = lastTime ? Math.min((ts - lastTime) / 1000, 0.05) : 0.016;
  lastTime = ts;

  // 更新
  if (phase === 'running') {
    let effectiveDt = dt / slowMo;
    simTime += effectiveDt;

    // 更新车轮（累积路程）
    let cs = getCarState();
    let prevDist = totalDist;
    if (cs.onRamp) {
      totalDist = cs.distOnRamp + cs.flatDist;
    } else {
      totalDist = rampLen + cs.flatDist;
    }
    wheelAngle += (totalDist - prevDist) * trackScale / 10;

    // 检查结束
    if (cs.stopped || cs.offScreen) {
      if (cs.stopped) {
        // 记录本次实验
        let s = SURFACES[surfaceIdx];
        let existing = runs.findIndex(r => r.surfaceIdx === surfaceIdx);
        let rec = {
          surfaceIdx,
          name: s.name,
          mu: s.mu,
          color: s.color,
          v0,
          stopDist: cs.flatDist,
          stopTime: simTime - tIncline,
          rampHeight
        };
        if (existing >= 0) runs[existing] = rec;
        else runs.push(rec);
        updateTable();
      }
      phase = 'finished';
      updateButtons();
    }
  }

  // 只在需要时渲染
  if (phase === 'running' || phase === 'paused' || phase === 'finished' || phase === 'waiting') {
    resize();
    ctx.save();
    ctx.scale(scale, scale);
    render();
    ctx.restore();
  }
}

function updateButtons() {
  let btnS = document.getElementById('btnStart');
  let btnP = document.getElementById('btnPause');
  if (phase === 'running') {
    btnS.disabled = true;
    btnS.textContent = '运动中…';
    btnP.disabled = false;
    btnP.textContent = '暂停';
    btnP.classList.remove('paused');
  } else if (phase === 'paused') {
    btnS.disabled = true;
    btnP.disabled = false;
    btnP.textContent = '继续';
    btnP.classList.add('paused');
  } else {
    btnS.disabled = false;
    btnS.textContent = '开始';
    btnP.disabled = true;
    btnP.textContent = '暂停';
    btnP.classList.remove('paused');
  }
}

function updateTable() {
  let card = document.getElementById('tableCard');
  let tbody = document.querySelector('#recordTable tbody');
  if (runs.length === 0) {
    card.style.display = 'none';
    return;
  }
  card.style.display = 'block';
  tbody.innerHTML = runs.map((r, i) =>
    `<tr>
      <td><span class="dot" style="background:${r.color}"></span>${i + 1}</td>
      <td>${r.name}</td>
      <td>${r.mu.toFixed(2)}</td>
      <td>${r.v0.toFixed(2)} m/s</td>
      <td style="color:${r.color};font-weight:600;">${r.stopDist.toFixed(2)} m</td>
      <td>${r.stopTime.toFixed(2)} s</td>
    </tr>`
  ).join('');
}

// ---- 事件处理 ----
function startSim() {
  if (phase === 'running') return;
  if (phase === 'finished') resetState();
  simTime = 0;
  totalDist = 0;
  wheelAngle = 0;
  phase = 'running';
  lastTime = 0;
  updateButtons();
}

function resetState() {
  simTime = 0;
  totalDist = 0;
  wheelAngle = 0;
  phase = 'waiting';
  updateButtons();
}

function resetSim() {
  resetState();
  runs = [];
  updateTable();
}

function togglePause() {
  if (phase === 'running') {
    phase = 'paused';
  } else if (phase === 'paused') {
    phase = 'running';
    lastTime = 0;
  }
  updateButtons();
}

function changeSurface(idx) {
  if (idx === surfaceIdx && phase !== 'waiting') {
    resetState();
    return;
  }
  surfaceIdx = idx;
  resetState();
  // 更新分段按钮
  document.querySelectorAll('#surfaceSeg button').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
  });
}

function changeSlowMo(rate) {
  slowMo = rate;
  document.querySelectorAll('#slowmoSeg button').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.rate) === rate);
  });
}

// ---- 初始化 ----
function init() {
  cvs = document.getElementById('c');
  ctx = cvs.getContext('2d');
  calcPhysics();
  trackScale = L.trackW / 5.0; // 默认 5m 对应轨道宽度
  resize();

  // 创建表面选择按钮
  let seg = document.getElementById('surfaceSeg');
  SURFACES.forEach((s, i) => {
    let btn = document.createElement('button');
    btn.textContent = s.name;
    if (i === surfaceIdx) btn.classList.add('active');
    btn.addEventListener('click', () => changeSurface(i));
    seg.appendChild(btn);
  });

  // 按钮事件
  document.getElementById('btnStart').addEventListener('click', startSim);
  document.getElementById('btnReset').addEventListener('click', resetSim);
  document.getElementById('btnPause').addEventListener('click', togglePause);
  document.getElementById('btnClear').addEventListener('click', () => { runs = []; updateTable(); resetState(); });

  // 慢动作
  document.querySelectorAll('#slowmoSeg button').forEach(b => {
    b.addEventListener('click', () => changeSlowMo(parseInt(b.dataset.rate)));
  });

  // 窗口大小变化
  window.addEventListener('resize', () => {
    resize();
    calcPhysics();
    trackScale = L.trackW / 5.0;
  });

  updateButtons();
  updateTable();
  requestAnimationFrame(loop);
}

// 启动
window.addEventListener('DOMContentLoaded', init);
</script>
</body>
