<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>压强 - 虚拟实验</title>
<style>
:root{--bg-darker:#020617;--bg-dark:#0f172a;--surface:#1e293b;--primary:#3b82f6;--secondary:#06b6d4;--accent:#8b5cf6;--text-main:#f8fafc;--text-muted:#94a3b8;--glass-bg:rgba(255,255,255,0.05);--glass-border:rgba(255,255,255,0.1);--card-shadow:0 8px 32px 0 rgba(0,0,0,0.37)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-darker);color:var(--text-main);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;font-size:16px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 20% 30%,rgba(59,130,246,0.08) 0%,transparent 40%),radial-gradient(circle at 80% 70%,rgba(139,92,246,0.08) 0%,transparent 40%);z-index:-1}
.header{background:rgba(15,23,42,0.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--glass-border);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;position:fixed;top:0;left:0;right:0;z-index:100;transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);will-change:transform}
.header.hidden{transform:translateY(-100%)}body{padding-top:56px;transition:padding-top .35s cubic-bezier(0.4,0,0.2,1)}body.header-hidden{padding-top:0}
.logo{font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav a{color:var(--text-muted);margin-left:1.5rem;text-decoration:none;font-size:0.9rem;font-weight:500;transition:color .3s}.nav a:hover{color:var(--primary)}
.wrap{max-width:1200px;margin:0 auto;padding:1.5rem}
.main-card{background:var(--bg-dark);border:1px solid var(--glass-border);border-radius:24px;overflow:hidden;box-shadow:var(--card-shadow)}
.title-area{padding:1.25rem 1.75rem 0.6rem;border-bottom:1px solid var(--glass-border)}
.title-area h1{font-size:1.6rem;font-weight:800}.title-area p{color:var(--text-muted);font-size:0.85rem;margin-top:0.2rem}
.layout{display:flex;gap:0;flex-wrap:wrap}
.canvas-wrap{flex:1;min-width:560px;display:flex;align-items:center;justify-content:center;padding:0.25rem;background:radial-gradient(ellipse at center,rgba(59,130,246,0.03) 0%,transparent 70%)}
#simCanvas{display:block;width:100%;height:auto;max-width:700px;border-radius:10px}
.panel{width:330px;border-left:1px solid var(--glass-border);padding:1rem 1.1rem;display:flex;flex-direction:column;gap:0.65rem}
.ctrl-group{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:11px;padding:0.65rem 0.9rem}
.ctrl-group label{display:block;font-size:0.8rem;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:0.25rem}
select,input[type=range]{width:100%;background:transparent;color:var(--text-main);border:1px solid var(--glass-border);border-radius:7px;padding:0.4rem 0.55rem;font-size:0.9rem;outline:none;transition:border-color .3s}
select:hover,select:focus{border-color:var(--primary)}select option{background:var(--bg-dark);color:var(--text-main)}
input[type=range]{-webkit-appearance:none;appearance:none;border:none;padding:0;height:4px;background:linear-gradient(90deg,var(--primary),var(--secondary));border-radius:2px;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:#fff;box-shadow:0 0 8px rgba(59,130,246,0.5);cursor:pointer}
.val-row{display:flex;justify-content:space-between;font-size:0.8rem;margin-top:0.25rem}.val-row span:last-child{color:var(--secondary);font-weight:700}
.btn-row{display:flex;gap:0.5rem}
.btn{flex:1;padding:0.55rem 0;border:none;border-radius:10px;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all .3s}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;box-shadow:0 4px 15px rgba(59,130,246,0.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,0.5)}
.btn-secondary{background:var(--glass-bg);color:var(--text-muted);border:1px solid var(--glass-border)}
.btn-secondary:hover{background:rgba(255,255,255,0.1);color:var(--text-main)}
.data-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.35rem}
.data-item{background:var(--glass-bg);border-radius:7px;padding:0.4rem 0.55rem}
.data-item .dl{font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.3px}.data-item .dv{font-size:1.05rem;font-weight:700;margin-top:0.05rem}
.blue{color:var(--primary)}.cyan{color:var(--secondary)}.orange{color:#f59e0b}.red{color:#ef4444}
.formula-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;padding:0.85rem 1.5rem;border-top:1px solid var(--glass-border);background:rgba(6,182,212,0.04);font-size:0.95rem}
.formula-bar .fm{font-weight:700;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.formula-bar .calc{color:var(--text-muted)}.formula-bar .calc span{color:var(--secondary);font-weight:600}
.section-info{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-top:2rem;padding:0}
.card{border-radius:16px;padding:1.25rem 1.5rem;box-shadow:var(--card-shadow);background:var(--bg-dark);border:1px solid var(--glass-border)}
.card h3{font-size:1.05rem;margin-bottom:0.7rem;color:var(--secondary)}.card p,.card li{color:var(--text-muted);font-size:0.88rem;line-height:1.6}.card ol{padding-left:1.2rem}.card ol li{margin-bottom:0.3rem}
@media(max-width:900px){.layout{flex-direction:column}.panel{width:100%;border-left:none;border-top:1px solid var(--glass-border)}.canvas-wrap{min-width:unset}.section-info{grid-template-columns:1fr}}
@media(max-width:768px){body{padding-top:48px}}
</style><script src="protect.js"></script><script src="auth-check.js"></script></head>
<body>
<header class="header"><div class="logo">物理虚拟实验平台</div><nav class="nav"><a href="experiments.html">实验目录</a><a href="index.html">首页</a></nav></header>
<div class="wrap"><div class="main-card">
<div class="title-area"><h1>压强 · 压力作用效果</h1><p>探究压力大小和受力面积对压强的影响</p></div>
<div class="layout">
<div class="canvas-wrap"><canvas id="simCanvas" width="700" height="380"></canvas></div>
<div class="panel">
<div class="ctrl-group"><label>压力大小</label><input type="range" id="forceSlider" min="10" max="200" value="50" step="5"><div class="val-row"><span>10 N</span><span id="forceDisplay">50 N</span><span>200 N</span></div></div>
<div class="ctrl-group"><label>接触面积</label><select id="areaSel"><option value="large">大接触面（0.1 m²）</option><option value="medium" selected>中等接触面（0.05 m²）</option><option value="small">小接触面（0.01 m²）</option><option value="tiny">针尖大小（0.0001 m²）</option></select></div>
<div class="ctrl-group"><label>接触面材料</label><select id="groundSel"><option value="soft">海绵（软）</option><option value="medium" selected>木板（中等）</option><option value="hard">钢板（硬）</option></select></div>
<div class="ctrl-group"><label>实时数据</label>
<div class="data-grid">
<div class="data-item"><div class="dl">压强 p</div><div class="dv orange" id="pressureDisplay">0 Pa</div></div>
<div class="data-item"><div class="dl">压力 F</div><div class="dv cyan" id="forceData">50 N</div></div>
<div class="data-item"><div class="dl">面积 S</div><div class="dv blue" id="areaDisplay">0.050 m²</div></div>
<div class="data-item"><div class="dl">形变程度</div><div class="dv red" id="deformDisplay">中等</div></div>
</div></div></div></div>
<div class="formula-bar"><span class="fm">p = F / S &nbsp;(压强 = 压力 ÷ 受力面积)</span><span class="calc" id="calcDisplay">调节压力和面积观察压强变化</span></div></div>
<div class="section-info wrap" style="max-width:1200px;margin:2rem auto 0">
<div class="card"><h3>实验原理</h3><p><b>压强</b>是表示压力作用效果的物理量，等于单位面积上受到的压力。<br><b>p = F/S</b>，压力一定时，受力面积越小，压强越大；<br>受力面积一定时，压力越大，压强越大。</p></div>
<div class="card"><h3>操作指南</h3><ol><li>调节滑块改变压力大小</li><li>选择不同接触面积观察对比</li><li>观察下方物体形变程度的变化</li></ol></div></div></div>
<script src="script.js"></script>
<script>
(function(){
var c=document.getElementById("simCanvas"),x=c.getContext("2d");
var W=700,H=380;
var AREAS={large:0.1,medium:0.05,small:0.01,tiny:0.0001};
var GROUNDS={soft:{name:"海绵",colors:["rgba(200,150,100,0.3)","rgba(200,150,100,0.5)"]},medium:{name:"木板",colors:["rgba(180,140,80,0.3)","rgba(180,140,80,0.5)"]},hard:{name:"钢板",colors:["rgba(100,120,140,0.3)","rgba(100,120,140,0.5)"]}};
var st={force:50,area:"medium",ground:"medium"};
var $=function(id){return document.getElementById(id);};
var S={forceSlider:$("forceSlider"),forceDisplay:$("forceDisplay"),areaSel:$("areaSel"),groundSel:$("groundSel"),pressureDisplay:$("pressureDisplay"),forceData:$("forceData"),areaDisplay:$("areaDisplay"),deformDisplay:$("deformDisplay"),calcDisplay:$("calcDisplay")};

function drawScene(){
  x.clearRect(0,0,W,H);
  x.save();x.strokeStyle="rgba(255,255,255,0.015)";x.lineWidth=0.5;
  for(var y=0;y<H;y+=30){x.beginPath();x.moveTo(0,y);x.lineTo(W,y);x.stroke();}
  for(var xg=0;xg<W;xg+=30){x.beginPath();x.moveTo(xg,0);x.lineTo(xg,H);x.stroke();}x.restore();
  
  var F=st.force;
  var Sarea=AREAS[st.area];
  var p=F/Sarea;
  var gr=GROUNDS[st.ground];
  var relP=Math.min(p/20000,1);
  
  // Ground
  var gy=280,gh=60;
  x.save();
  var col=gr.colors[relP>0.5?1:0];
  x.fillStyle=col;x.beginPath();x.roundRect(100,gy,500,gh,6);x.fill();
  // Deformation
  var deform=relP*20;
  x.fillStyle="rgba(0,0,0,0.05)";x.beginPath();x.roundRect(100,gy-deform,500,gh+deform,6);x.fill();
  x.strokeStyle="rgba(255,255,255,0.1)";x.lineWidth=1;x.beginPath();x.roundRect(100,gy,500,gh,6);x.stroke();
  x.fillStyle="rgba(255,255,255,0.2)";x.font="11px sans-serif";x.textAlign="center";x.textBaseline="top";
  x.fillText(gr.name,350,gy+gh+5);
  x.restore();
  
  // Block
  var baseW=Math.max(30,200-Sarea*1800);
  var baseH=80;
  var bx=350-baseW/2,by=gy-baseH;
  x.save();
  var bg=x.createLinearGradient(bx,by,bx+baseW,by+baseH);
  bg.addColorStop(0,"rgba(59,130,246,0.4)");bg.addColorStop(0.5,"rgba(59,130,246,0.15)");bg.addColorStop(1,"rgba(59,130,246,0.3)");
  x.fillStyle=bg;x.beginPath();x.roundRect(bx,by,baseW,baseH,4);x.fill();
  x.strokeStyle="rgba(59,130,246,0.4)";x.lineWidth=1;x.stroke();
  
  // Pressure indicator arrows
  var arrowCount=Math.max(3,Math.floor(F/15));
  x.strokeStyle="rgba(239,68,68,0.4)";x.lineWidth=1.5;
  for(var i=0;i<arrowCount;i++){
    var ax=bx+10+(baseW-20)*i/(arrowCount-1);
    x.beginPath();x.moveTo(ax,by-5);x.lineTo(ax,by-20-(relP*15));x.stroke();
    x.beginPath();x.moveTo(ax,by-20-(relP*15));x.lineTo(ax-3,by-16-(relP*15));x.moveTo(ax,by-20-(relP*15));x.lineTo(ax+3,by-16-(relP*15));
    x.stroke();
  }
  x.restore();
  
  // Labels
  x.fillStyle="rgba(255,255,255,0.15)";x.font="11px sans-serif";x.textAlign="center";x.textBaseline="bottom";
  x.fillText("F = "+F+" N",350,by-25-(relP*15));
}

function updateUI(){
  var F=st.force,Sk=st.area,Sarea=AREAS[Sk],p=F/Sarea;
  S.forceDisplay.textContent=F+" N";
  S.pressureDisplay.textContent=(p>=1000?(p/1000).toFixed(1)+" kPa":p.toFixed(0)+" Pa");
  S.forceData.textContent=F+" N";
  S.areaDisplay.textContent=Sarea.toFixed(4)+" m²";
  var d=Math.min(p/20000,1);
  S.deformDisplay.textContent=d<0.2?"几乎无形变":d<0.5?"轻微形变":d<0.8?"明显形变":"严重形变";
  S.calcDisplay.textContent="p = "+F+"N / "+Sarea.toFixed(4)+"m² = "+(p>=1000?(p/1000).toFixed(1)+" kPa":p.toFixed(0)+" Pa");
}

S.forceSlider.addEventListener("input",function(){st.force=parseInt(S.forceSlider.value);updateUI();});
S.areaSel.addEventListener("change",function(){st.area=S.areaSel.value;updateUI();});
S.groundSel.addEventListener("change",function(){st.ground=S.groundSel.value;updateUI();});
updateUI();
(function loop(){drawScene();requestAnimationFrame(loop);})();
})();

(function(){var h=document.querySelector(".header"),ht=null,HD=800;
function sh(){clearTimeout(ht);h.classList.remove("hidden");document.body.classList.remove("header-hidden");}
function hi(){ht=setTimeout(function(){h.classList.add("hidden");document.body.classList.add("header-hidden");},HD);}
document.addEventListener("mousemove",function(e){if(e.clientY<=60)sh();else if(e.clientY>h.offsetHeight+20&&!h.classList.contains("hidden"))hi();});
h.addEventListener("mouseenter",sh);h.addEventListener("mouseleave",hi);
ht=setTimeout(function(){h.classList.add("hidden");document.body.classList.add("header-hidden");},2000);})();
</script></body></html>
