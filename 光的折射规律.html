<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>光的折射交互实验 — Snell 定律</title>
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f6fbff;color:#0b1720}
    .wrap{max-width:1000px;margin:18px auto;padding:18px}
    .card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 6px 20px rgba(2,6,23,0.06)}
    h1{margin:0 0 6px;font-size:20px}
    p.lead{margin:0;color:#475569;font-size:13px}
    .layout{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px}
    .left{flex:1;min-width:540px}
    .right{width:320px}
    #view{background:linear-gradient(180deg,#eaf6ff,#ffffff);border-radius:8px;border:1px solid rgba(2,6,23,0.04);height:420px;display:flex;align-items:center;justify-content:center;position:relative}
    canvas{max-width:100%;height:420px}
    .controls{display:flex;flex-direction:column;gap:10px}
    .control{background:#fff;padding:10px;border-radius:8px;box-shadow:0 2px 8px rgba(2,6,23,0.04)}
    label{font-size:13px;color:#475569;font-weight:600}
    input[type=range], select{width:100%}
    .small{font-size:13px;color:#475569}
    .footer{margin-top:20px;text-align:center;font-size:14px;color:#475569}
  </style>
    <script src="protect.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>光的折射交互实验（Snell定律）</h1>
      <p class="lead">选择透明介质（空气/水/玻璃/钻石），拖动入射角观察折射或全反射。</p>

      <div class="layout">
        <div class="left">
          <div id="view">
            <canvas id="canvas" width="820" height="420"></canvas>
            <div style="position:absolute;left:16px;top:16px;background:rgba(255,255,255,0.95);padding:8px;border-radius:8px;border:1px solid #eef2ff">
              <div class="small">入射角 θ₁: <strong id="theta1">30</strong>°</div>
              <div class="small">折射角 θ₂: <strong id="theta2">-</strong></div>
              <div class="small">入射介质: <strong id="n1name">空气</strong> (n=<span id="n1num">1.00</span>)</div>
              <div class="small">折射介质: <strong id="n2name">水</strong> (n=<span id="n2num">1.33</span>)</div>
            </div>
          </div>
        </div>

        <div class="right">
          <div class="controls">
            <div class="control">
              <label>入射角 θ₁（度）</label>
              <input id="angle" type="range" min="0" max="89.9" step="0.1" value="30">
              <div class="small">当前: <span id="angleVal">30.0</span>°</div>
            </div>
            <div class="control">
              <label>入射介质</label>
              <select id="n1select">
                <option value="air">空气 (n=1.00)</option>
                <option value="water">水 (n=1.33)</option>
                <option value="glass">玻璃 (n=1.50)</option>
                <option value="diamond">钻石 (n=2.42)</option>
              </select>
            </div>
            <div class="control">
              <label>折射介质</label>
              <select id="n2select">
                <option value="air">空气 (n=1.00)</option>
                <option value="water" selected>水 (n=1.33)</option>
                <option value="glass">玻璃 (n=1.50)</option>
                <option value="diamond">钻石 (n=2.42)</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="footer">小彬老师出品 获取更多加微信 gelindise</div>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const angleSlider = document.getElementById("angle");
    const angleVal = document.getElementById("angleVal");
    const theta1El = document.getElementById("theta1");
    const theta2El = document.getElementById("theta2");
    const n1select = document.getElementById("n1select");
    const n2select = document.getElementById("n2select");
    const n1name = document.getElementById("n1name");
    const n1num = document.getElementById("n1num");
    const n2name = document.getElementById("n2name");
    const n2num = document.getElementById("n2num");

    const media = {
      air: {name:"空气", n:1.00},
      water: {name:"水", n:1.33},
      glass: {name:"玻璃", n:1.50},
      diamond: {name:"钻石", n:2.42}
    };

    function drawArrow(x1,y1,x2,y2,color){
      const headlen = 10;
      const angle = Math.atan2(y2-y1,x2-x1);
      ctx.strokeStyle=color;
      ctx.fillStyle=color;
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(x1,y1);
      ctx.lineTo(x2,y2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x2,y2);
      ctx.lineTo(x2-headlen*Math.cos(angle-Math.PI/6),y2-headlen*Math.sin(angle-Math.PI/6));
      ctx.lineTo(x2-headlen*Math.cos(angle+Math.PI/6),y2-headlen*Math.sin(angle+Math.PI/6));
      ctx.closePath();
      ctx.fill();
    }

    function update(){
      const angleDeg = parseFloat(angleSlider.value);
      angleVal.textContent = angleDeg.toFixed(1);
      theta1El.textContent = angleDeg.toFixed(1);

      const n1 = media[n1select.value].n;
      const n2 = media[n2select.value].n;
      n1name.textContent = media[n1select.value].name;
      n1num.textContent = n1.toFixed(2);
      n2name.textContent = media[n2select.value].name;
      n2num.textContent = n2.toFixed(2);

      ctx.clearRect(0,0,canvas.width,canvas.height);

      const midY = canvas.height/2;
      ctx.strokeStyle="#94a3b8";
      ctx.setLineDash([6,4]);
      ctx.beginPath();
      ctx.moveTo(0,midY);
      ctx.lineTo(canvas.width,midY);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(canvas.width/2,0);
      ctx.lineTo(canvas.width/2,canvas.height);
      ctx.stroke();

      const incidentLength=140;
      const startX=canvas.width/2;
      const startY=midY;
      const angleRad=angleDeg*Math.PI/180;
      const ix=startX - incidentLength*Math.sin(angleRad);
      const iy=startY - incidentLength*Math.cos(angleRad);
      drawArrow(ix,iy,startX,startY,"red");

      let sinTheta2 = n1*Math.sin(angleRad)/n2;
      if(Math.abs(sinTheta2)>1){
        theta2El.textContent = "全反射";
        const rx=startX + incidentLength*Math.sin(angleRad);
        const ry=startY - incidentLength*Math.cos(angleRad);
        drawArrow(startX,startY,rx,ry,"red");
      }else{
        const theta2=Math.asin(sinTheta2);
        theta2El.textContent=(theta2*180/Math.PI).toFixed(1);
        const tx=startX + incidentLength*Math.sin(theta2);
        const ty=startY + incidentLength*Math.cos(theta2);
        drawArrow(startX,startY,tx,ty,"blue");
      }
    }

    angleSlider.addEventListener("input",update);
    n1select.addEventListener("change",update);
    n2select.addEventListener("change",update);
    update();
  </script>
</body>
</html>
