<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流体压强与流速的关系 虚拟实验</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="protect.js"></script>
    <style>
        body { background: #0f172a; font-family: "Microsoft YaHei", Arial, sans-serif; }
        canvas { border-radius: 4px; }
        .panel-dark { background: rgba(30,41,59,0.9); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen p-4">
    <div class="max-w-7xl mx-auto">
        <!-- 顶部控制栏 -->
        <div class="flex flex-wrap justify-between items-center gap-4 mb-4">
            <!-- 流量调节 -->
            <div class="panel-dark p-3">
                <label class="block font-bold mb-1">流量: <span id="flowVal" class="text-red-600">5000</span> L/s</label>
                <input type="range" id="flowSlider" min="1000" max="10000" step="100" value="5000" class="w-64 accent-cyan-500">
            </div>

            <!-- 核心公式 -->
            <div class="bg-red-500 text-white px-8 py-2 rounded-xl font-bold text-5xl shadow-lg text-center">
                Q = v × S
                <div class="text-sm font-normal mt-1">流量 = 流速 × 横截面积</div>
            </div>

            <!-- 流速压强面板 -->
            <div class="flex gap-4">
                <div class="panel-dark p-3 text-center">
                    <div class="font-bold text-xl mb-1">流速</div>
                    <div id="speed1Show" class="text-2xl font-bold text-blue-600">0.4 m/s</div>
                </div>
                <div class="panel-dark p-3">
                    <div class="text-center font-bold mb-1">压强</div>
                    <canvas id="pressureGauge1" width="180" height="120"></canvas>
                    <div id="pressure1Show" class="text-center font-bold">175 kPa</div>
                </div>
                <div class="panel-dark p-3 text-center">
                    <div class="font-bold text-xl mb-1">流速</div>
                    <div id="speed2Show" class="text-2xl font-bold text-blue-600">1.9 m/s</div>
                </div>
                <div class="panel-dark p-3">
                    <div class="text-center font-bold mb-1">压强</div>
                    <canvas id="pressureGauge2" width="180" height="120"></canvas>
                    <div id="pressure2Show" class="text-center font-bold">150 kPa</div>
                </div>
            </div>
        </div>

        <div class="flex flex-wrap lg:flex-nowrap gap-4">
            <!-- 主实验画布 -->
            <div class="w-full">
                <canvas id="mainCanvas" width="1200" height="500" class="w-full border border-slate-600 rounded-lg"></canvas>
            </div>

            <!-- 右侧功能面板 -->
            <div class="w-full lg:w-64 flex flex-col gap-4">
                <div class="panel-dark p-4 space-y-3">
                    <label class="flex items-center gap-2 font-bold">
                        <input type="checkbox" id="dotsCheck" checked>
                        显示粒子
                    </label>
                    <label class="flex items-center gap-2 font-bold">
                        <input type="checkbox" id="rulerCheck">
                        显示标尺
                    </label>
                    <div class="border-t border-slate-500 pt-2">
                        <div class="font-bold mb-1">单位</div>
                        <label class="flex items-center gap-2">
                            <input type="radio" name="units" checked>
                            公制
                        </label>
                        <label class="flex items-center gap-2">
                            <input type="radio" name="units">
                            英制
                        </label>
                    </div>
                    <label class="flex items-center gap-2 font-bold">
                        <input type="checkbox" id="frictionCheck">
                        考虑摩擦力
                    </label>
                    <label class="flex items-center gap-2 font-bold">
                        <input type="checkbox" id="fluxCheck">
                        显示流量计
                    </label>
                    <button id="resetBtn" class="w-full bg-slate-700 hover:bg-slate-600 border border-slate-500 text-white rounded py-2 font-bold mt-2">
                        全部重置
                    </button>
                </div>

                <div class="panel-dark p-4">
                    <button id="densityBtn" class="w-full flex items-center justify-center gap-2 bg-slate-700 hover:bg-slate-600 border border-slate-500 text-white rounded py-2 font-bold">
                        <span class="text-green-600 font-bold text-xl">+</span>
                        流体密度
                    </button>
                </div>
            </div>
        </div>

        <!-- 底部控制栏 -->
        <div class="flex justify-between items-center mt-4 panel-dark p-3">
            <div class="flex gap-6 items-center">
                <label class="flex items-center gap-2 font-bold">
                    <input type="radio" name="speedMode" id="slowMode">
                    慢动作
                </label>
                <label class="flex items-center gap-2 font-bold">
                    <input type="radio" name="speedMode" id="normalMode" checked>
                    正常速度
                </label>
            </div>
            <div class="flex gap-4">
                <button id="pauseBtn" class="bg-slate-700 border border-slate-500 rounded-full w-12 h-12 flex items-center justify-center font-bold text-white">
                    ❚❚
                </button>
                <button id="stepBtn" class="bg-slate-700 border border-slate-500 rounded-full w-12 h-12 flex items-center justify-center font-bold text-white">
                    ▶
                </button>
            </div>
        </div>

        <!-- 原理说明 -->
        <div class="mt-6 bg-slate-800 rounded-lg p-4 border border-slate-600">
            <h2 class="text-2xl font-bold text-cyan-400 mb-2">实验核心原理：伯努利原理</h2>
            <ul class="space-y-2 text-lg">
                <li>1. 流量守恒：理想不可压缩流体，<strong>体积流量Q = 流速v × 横截面积S</strong>，同一管道内流量恒定</li>
                <li>2. 管道越细（横截面积S越小），流体流速v越大；管道越粗，流速v越小</li>
                <li>3. 流体压强与流速的关系：<strong>流速大的地方，压强小；流速小的地方，压强大</strong></li>
                <li>4. 伯努利方程：总压守恒 <code>P + ½ρv² = 常数</code>，流速增大，静压减小</li>
            </ul>
        </div>
    </div>

    <script>
        (function() {
          var ref = document.referrer;
          if (!ref || ref.indexOf(location.hostname) === -1) {
            location.replace('index.html');
          }
        })();

        // 主画布初始化
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        // 压力表画布
        const gauge1 = document.getElementById('pressureGauge1');
        const gaugeCtx1 = gauge1.getContext('2d');
        const gauge2 = document.getElementById('pressureGauge2');
        const gaugeCtx2 = gauge2.getContext('2d');

        // 全局物理参数
        let flowRate = 5000; // 流量 L/s
        const pipe = {
            // 文丘里管参数：左粗段→收缩段→细段→扩张段→右粗段
            xStart: 100,
            xEnd: 1100,
            yCenter: 250,
            radiusBig: 80, // 粗管半径（像素）
            radiusSmall: 40, // 细管半径（像素）
            shrinkStart: 300, // 收缩开始x坐标
            shrinkEnd: 500, // 收缩结束x坐标（细管开始）
            expandStart: 700, // 扩张开始x坐标（细管结束）
            expandEnd: 900, // 扩张结束x坐标
        };
        // 流体粒子
        let particles = [];
        const maxParticles = 80;
        // 控制参数
        let showDots = true;
        let isPaused = false;
        let isSlow = false;
        let fluidDensity = 1000; // 流体密度 kg/m³
        
        // 核心修正：总压设定为200kPa（合理工程范围），对应表盘正中间
        const totalPressure = 200; // 总压（滞止压强）单位：kPa，恒定值
        // 表盘量程：100kPa（最左）~ 300kPa（最右），200kPa正好在中间
        const gaugeMinP = 100;
        const gaugeMaxP = 300;

        // 控件绑定
        const flowSlider = document.getElementById('flowSlider');
        const flowVal = document.getElementById('flowVal');
        const dotsCheck = document.getElementById('dotsCheck');
        const slowMode = document.getElementById('slowMode');
        const normalMode = document.getElementById('normalMode');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const speed1Show = document.getElementById('speed1Show');
        const speed2Show = document.getElementById('speed2Show');
        const pressure1Show = document.getElementById('pressure1Show');
        const pressure2Show = document.getElementById('pressure2Show');

        // 滑块事件
        flowSlider.oninput = () => {
            flowRate = Number(flowSlider.value);
            flowVal.innerText = flowRate;
        };
        dotsCheck.onchange = () => {
            showDots = dotsCheck.checked;
        };
        slowMode.onchange = () => {
            isSlow = slowMode.checked;
        };
        normalMode.onchange = () => {
            isSlow = !normalMode.checked;
        };
        pauseBtn.onclick = () => {
            isPaused = !isPaused;
            pauseBtn.innerText = isPaused ? '▶' : '❚❚';
        };
        resetBtn.onclick = () => {
            flowRate = 5000;
            flowSlider.value = 5000;
            flowVal.innerText = 5000;
            showDots = true;
            dotsCheck.checked = true;
            isPaused = false;
            isSlow = false;
            normalMode.checked = true;
            slowMode.checked = false;
            pauseBtn.innerText = '❚❚';
            particles = [];
            prefillParticles();
        };

        // 核心物理计算（修正单位量级，压强变化精准）
        function calcPhysics() {
            // 流量转换：L/s → m³/s
            const Q = flowRate / 1000;
            // 横截面积 S = πr² （像素→米转换：100像素=1米）
            const S_big = Math.PI * Math.pow(pipe.radiusBig / 100, 2);
            const S_small = Math.PI * Math.pow(pipe.radiusSmall / 100, 2);
            // 流速 v = Q/S
            const v_big = Q / S_big;
            const v_small = Q / S_small;
            
            // 伯努利方程：总压P0 = 静压P + 动压½ρv²，总压恒定
            // 动压计算：Pa → kPa，除以1000
            const dynamicPressure_big = 0.5 * fluidDensity * Math.pow(v_big, 2) / 1000;
            const dynamicPressure_small = 0.5 * fluidDensity * Math.pow(v_small, 2) / 1000;
            
            // 静压 = 总压 - 动压，流量变化时两个位置压强同步变化
            const pressure_big = totalPressure - dynamicPressure_big;
            const pressure_small = totalPressure - dynamicPressure_small;

            return { v_big, v_small, pressure_big, pressure_small };
        }

        // 获取管道某x位置的半径
        function getPipeRadius(x) {
            if (x < pipe.shrinkStart || x > pipe.expandEnd) {
                return pipe.radiusBig;
            } else if (x >= pipe.shrinkEnd && x <= pipe.expandStart) {
                return pipe.radiusSmall;
            } else if (x > pipe.shrinkStart && x < pipe.shrinkEnd) {
                // 收缩段：线性减小
                const ratio = (x - pipe.shrinkStart) / (pipe.shrinkEnd - pipe.shrinkStart);
                return pipe.radiusBig - ratio * (pipe.radiusBig - pipe.radiusSmall);
            } else {
                // 扩张段：线性增大
                const ratio = (x - pipe.expandStart) / (pipe.expandEnd - pipe.expandStart);
                return pipe.radiusSmall + ratio * (pipe.radiusBig - pipe.radiusSmall);
            }
        }

        // 预填充粒子，沿整个管道均匀分布
        function prefillParticles() {
            for (let i = 0; i < maxParticles; i++) {
                const x = pipe.xStart + (i / maxParticles) * (pipe.xEnd - pipe.xStart);
                const r = getPipeRadius(x);
                particles.push({
                    x: x,
                    y: pipe.yCenter + (Math.random() * 2 - 1) * (r - 10),
                    life: 1
                });
            }
        }

        // 初始化粒子
        function initParticle() {
            if (particles.length >= maxParticles) return;
            const radius = getPipeRadius(pipe.xStart);
            particles.push({
                x: pipe.xStart + Math.random() * 20,
                y: pipe.yCenter + (Math.random() * 2 - 1) * (radius - 10),
                life: 1
            });
        }

        // 更新粒子位置
        function updateParticles() {
            const { v_big, v_small } = calcPhysics();
            const speedFactor = isSlow ? 0.3 : 1;
            const baseSpeed = v_big * 30 * speedFactor; // 像素缩放系数

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                // 根据x位置计算当前流速
                let v;
                if (p.x < pipe.shrinkStart || p.x > pipe.expandEnd) {
                    v = baseSpeed;
                } else if (p.x >= pipe.shrinkEnd && p.x <= pipe.expandStart) {
                    v = baseSpeed * (v_small / v_big);
                } else if (p.x > pipe.shrinkStart && p.x < pipe.shrinkEnd) {
                    const ratio = (p.x - pipe.shrinkStart) / (pipe.shrinkEnd - pipe.shrinkStart);
                    v = baseSpeed * (1 + ratio * (v_small / v_big - 1));
                } else {
                    const ratio = (p.x - pipe.expandStart) / (pipe.expandEnd - pipe.expandStart);
                    v = baseSpeed * (v_small / v_big - ratio * (v_small / v_big - 1));
                }

                p.x += v * 0.016; // 帧间隔更新位置

                // 超出管道移除
                if (p.x > pipe.xEnd) {
                    particles.splice(i, 1);
                    continue;
                }

                // 限制粒子在管道内
                const r = getPipeRadius(p.x);
                const maxY = pipe.yCenter + r - 5;
                const minY = pipe.yCenter - r + 5;
                if (p.y > maxY) p.y = maxY;
                if (p.y < minY) p.y = minY;
            }

            // 持续生成新粒子
            if (!isPaused && Math.random() > 0.4) {
                initParticle();
            }
        }

        // 绘制管道和流体
        function drawPipe() {
            // 绘制管道轮廓
            ctx.beginPath();
            // 上边缘
            ctx.moveTo(pipe.xStart, pipe.yCenter - pipe.radiusBig);
            ctx.lineTo(pipe.shrinkStart, pipe.yCenter - pipe.radiusBig);
            ctx.lineTo(pipe.shrinkEnd, pipe.yCenter - pipe.radiusSmall);
            ctx.lineTo(pipe.expandStart, pipe.yCenter - pipe.radiusSmall);
            ctx.lineTo(pipe.expandEnd, pipe.yCenter - pipe.radiusBig);
            ctx.lineTo(pipe.xEnd, pipe.yCenter - pipe.radiusBig);
            // 下边缘
            ctx.lineTo(pipe.xEnd, pipe.yCenter + pipe.radiusBig);
            ctx.lineTo(pipe.expandEnd, pipe.yCenter + pipe.radiusBig);
            ctx.lineTo(pipe.expandStart, pipe.yCenter + pipe.radiusSmall);
            ctx.lineTo(pipe.shrinkEnd, pipe.yCenter + pipe.radiusSmall);
            ctx.lineTo(pipe.shrinkStart, pipe.yCenter + pipe.radiusBig);
            ctx.lineTo(pipe.xStart, pipe.yCenter + pipe.radiusBig);
            ctx.closePath();

            // 管道金色渐变
            const pipeGradient = ctx.createLinearGradient(0, pipe.yCenter - pipe.radiusBig, 0, pipe.yCenter + pipe.radiusBig);
            pipeGradient.addColorStop(0, '#f9d749');
            pipeGradient.addColorStop(0.5, '#b8860b');
            pipeGradient.addColorStop(1, '#f9d749');
            ctx.strokeStyle = pipeGradient;
            ctx.lineWidth = 20;
            ctx.stroke();

            // 流体蓝色填充
            ctx.fillStyle = 'rgba(56, 189, 248, 0.8)';
            ctx.fill();

            // 绘制流速标签
            const { v_big, v_small } = calcPhysics();
            // 粗管流速标签
            ctx.fillStyle = 'rgba(30,41,59,0.9)';
            ctx.fillRect(150, 100, 120, 60);
            ctx.strokeStyle = 'rgba(56,189,248,0.5)';
            ctx.lineWidth = 2;
            ctx.strokeRect(150, 100, 120, 60);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 20px Microsoft YaHei';
            ctx.textAlign = 'center';
            ctx.fillText('流速', 210, 125);
            ctx.fillText(v_big.toFixed(1) + ' m/s', 210, 150);
            // 箭头
            ctx.fillStyle = 'blue';
            ctx.beginPath();
            ctx.moveTo(210, 160);
            ctx.lineTo(210, 170);
            ctx.lineTo(205, 165);
            ctx.moveTo(210, 170);
            ctx.lineTo(215, 165);
            ctx.fill();

            // 细管流速标签
            ctx.fillStyle = 'rgba(30,41,59,0.9)';
            ctx.fillRect(600, 100, 120, 60);
            ctx.strokeStyle = 'rgba(56,189,248,0.5)';
            ctx.strokeRect(600, 100, 120, 60);
            ctx.fillStyle = '#fff';
            ctx.fillText('流速', 660, 125);
            ctx.fillText(v_small.toFixed(1) + ' m/s', 660, 150);
            // 箭头
            ctx.fillStyle = 'blue';
            ctx.beginPath();
            ctx.moveTo(660, 160);
            ctx.lineTo(660, 170);
            ctx.lineTo(655, 165);
            ctx.moveTo(660, 170);
            ctx.lineTo(665, 165);
            ctx.fill();
            ctx.stroke();
        }

        // 绘制粒子
        function drawParticles() {
            if (!showDots) return;
            ctx.fillStyle = '#ef4444';
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // 绘制压力表（优化量程，指针落在中间区域）
        function drawGauge(ctx, pressure) {
            const width = ctx.canvas.width;
            const height = ctx.canvas.height;
            const centerX = width / 2;
            const centerY = height - 10;
            const radius = 80;

            ctx.clearRect(0, 0, width, height);

            // 表盘背景
            ctx.fillStyle = '#1e293b';
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, Math.PI, 0);
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 刻度线与数值标注
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.lineWidth = 2;
            ctx.font = '10px Microsoft YaHei';
            ctx.fillStyle = '#94a3b8';
            ctx.textAlign = 'center';
            for (let i = 0; i <= 10; i++) {
                const angle = Math.PI + (Math.PI / 10) * i;
                // 刻度线
                const x1 = centerX + Math.cos(angle) * (radius - 10);
                const y1 = centerY + Math.sin(angle) * (radius - 10);
                const x2 = centerX + Math.cos(angle) * radius;
                const y2 = centerY + Math.sin(angle) * radius;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
                // 刻度数值
                const labelP = gaugeMinP + (gaugeMaxP - gaugeMinP) * (i / 10);
                const labelX = centerX + Math.cos(angle) * (radius + 15);
                const labelY = centerY + Math.sin(angle) * (radius + 15);
                ctx.fillText(labelP, labelX, labelY);
            }

            // 指针计算：100kPa对应最左，300kPa对应最右，200kPa在正中间
            const ratio = (pressure - gaugeMinP) / (gaugeMaxP - gaugeMinP);
            const angle = Math.PI + Math.PI * Math.min(1, Math.max(0, ratio));
            // 绘制指针
            ctx.strokeStyle = 'red';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(centerX + Math.cos(angle) * (radius - 20), centerY + Math.sin(angle) * (radius - 20));
            ctx.stroke();

            // 中心圆点
            ctx.fillStyle = '#f8fafc';
            ctx.beginPath();
            ctx.arc(centerX, centerY, 5, 0, Math.PI * 2);
            ctx.fill();
        }

        // 更新数据显示
        function updateData() {
            const { v_big, v_small, pressure_big, pressure_small } = calcPhysics();
            // 流速数值更新
            speed1Show.innerText = v_big.toFixed(1) + ' m/s';
            speed2Show.innerText = v_small.toFixed(1) + ' m/s';
            // 压强数值更新（保留整数）
            const p1 = Math.round(pressure_big);
            const p2 = Math.round(pressure_small);
            pressure1Show.innerText = p1 + ' kPa';
            pressure2Show.innerText = p2 + ' kPa';

            // 两个压力表实时重绘
            drawGauge(gaugeCtx1, p1);
            drawGauge(gaugeCtx2, p2);
        }

        // 主动画循环
        function render() {
            requestAnimationFrame(render);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制背景
            ctx.fillStyle = '#1e3a5f';
            ctx.fillRect(0, 0, canvas.width, 100);
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 100, canvas.width, canvas.height - 100);

            if (!isPaused) {
                updateParticles();
            }

            drawPipe();
            drawParticles();
            updateData();
        }

        // 启动动画
        prefillParticles();
        render();
    </script>
</body>
</html>
