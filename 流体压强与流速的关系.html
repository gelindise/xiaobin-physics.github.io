<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流体压强与流速的关系 虚拟实验</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="protect.js"></script>
    <style>
        body { background: #0f172a; font-family: "Microsoft YaHei", Arial, sans-serif; }
        canvas { border-radius: 4px; }
        .panel-dark { background: rgba(30,41,59,0.9); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen p-4">
    <div class="max-w-7xl mx-auto">
        <!-- 顶部控制栏 -->
        <div class="flex flex-wrap justify-between items-center gap-4 mb-4">
            <!-- 流量调节 -->
            <div class="panel-dark p-3">
                <label class="block font-bold mb-1">流量: <span id="flowVal" class="text-red-600">5000</span> L/s</label>
                <input type="range" id="flowSlider" min="1000" max="10000" step="100" value="5000" class="w-64 accent-cyan-500">
            </div>

            <!-- 核心公式 -->
            <div class="bg-red-500 text-white px-8 py-2 rounded-xl font-bold text-5xl shadow-lg text-center">
                Q = v × S
                <div class="text-sm font-normal mt-1">流量 = 流速 × 横截面积</div>
            </div>

            <!-- 粗管数据 -->
            <div class="panel-dark p-3 text-center min-w-[130px]">
                <div class="font-bold text-xl mb-1">粗管段</div>
                <div id="speed1Show" class="text-2xl font-bold text-cyan-400">0.4 m/s</div>
                <div id="pressure1Show" class="text-lg text-slate-300">175 kPa</div>
            </div>

            <!-- 细管数据 -->
            <div class="panel-dark p-3 text-center min-w-[130px]">
                <div class="font-bold text-xl mb-1">细管段</div>
                <div id="speed2Show" class="text-2xl font-bold text-cyan-400">1.9 m/s</div>
                <div id="pressure2Show" class="text-lg text-slate-300">150 kPa</div>
            </div>
        </div>

        <!-- 主实验画布 -->
        <canvas id="mainCanvas" width="1200" height="500" class="w-full border border-slate-600 rounded-lg"></canvas>

        <!-- 底部控制栏 -->
        <div class="flex justify-between items-center mt-4 panel-dark p-3">
            <div class="flex gap-6 items-center">
                <label class="flex items-center gap-2 font-bold cursor-pointer">
                    <input type="checkbox" id="manometerCheck" checked>
                    显示压强计
                </label>
                <label class="flex items-center gap-2 font-bold cursor-pointer">
                    <input type="radio" name="speedMode" id="slowMode">
                    慢动作
                </label>
                <label class="flex items-center gap-2 font-bold cursor-pointer">
                    <input type="radio" name="speedMode" id="normalMode" checked>
                    正常速度
                </label>
            </div>
            <div class="flex gap-4 items-center">
                <button id="pauseBtn" class="bg-slate-700 hover:bg-slate-600 border border-slate-500 rounded-full w-12 h-12 flex items-center justify-center font-bold text-white transition-colors">
                    ❚❚
                </button>
                <button id="stepBtn" class="bg-slate-700 hover:bg-slate-600 border border-slate-500 rounded-full w-12 h-12 flex items-center justify-center font-bold text-white transition-colors">
                    ▶
                </button>
                <button id="resetBtn" class="bg-slate-700 hover:bg-slate-600 border border-slate-500 text-white rounded-lg px-4 py-2 font-bold transition-colors">
                    全部重置
                </button>
            </div>
        </div>

        <!-- 原理说明 -->
        <div class="mt-6 bg-slate-800 rounded-lg p-4 border border-slate-600">
            <h2 class="text-2xl font-bold text-cyan-400 mb-2">实验核心原理：伯努利原理</h2>
            <ul class="space-y-2 text-lg">
                <li>1. 流量守恒：理想不可压缩流体，<strong>体积流量Q = 流速v × 横截面积S</strong>，同一管道内流量恒定</li>
                <li>2. 管道越细（横截面积S越小），流体流速v越大；管道越粗，流速v越小</li>
                <li>3. 流体压强与流速的关系：<strong>流速大的地方，压强小；流速小的地方，压强大</strong></li>
                <li>4. 伯努利方程：总压守恒 <code>P + ½ρv² = 常数</code>，流速增大，静压减小</li>
            </ul>
        </div>
    </div>

    <script>
        (function() {
          var ref = document.referrer;
          if (ref && ref.indexOf(location.hostname) === -1) {
            location.replace('index.html');
          }
        })();

        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');

        // 全局物理参数
        let flowRate = 5000;
        const pipe = {
            xStart: 100,
            xEnd: 1100,
            yCenter: 360,
            radiusBig: 80,
            radiusSmall: 40,
            shrinkStart: 300,
            shrinkEnd: 500,
            expandStart: 700,
            expandEnd: 900,
        };
        // 流体粒子
        let particles = [];
        const maxParticles = 100;
        let isPaused = false;
        let isSlow = false;
        let showManometer = true;
        let fluidDensity = 1000;

        const totalPressure = 200;
        const gaugeMinP = 100;
        const gaugeMaxP = 220;

        // 测量位置 x 坐标
        const measureX1 = 210; // 粗管段测量点
        const measureX2 = 660; // 细管段测量点

        // DOM 引用
        const flowSlider = document.getElementById('flowSlider');
        const flowVal = document.getElementById('flowVal');
        const slowMode = document.getElementById('slowMode');
        const normalMode = document.getElementById('normalMode');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const speed1Show = document.getElementById('speed1Show');
        const speed2Show = document.getElementById('speed2Show');
        const pressure1Show = document.getElementById('pressure1Show');
        const pressure2Show = document.getElementById('pressure2Show');
        const manometerCheck = document.getElementById('manometerCheck');

        // 事件
        flowSlider.oninput = () => {
            flowRate = Number(flowSlider.value);
            flowVal.innerText = flowRate;
        };
        slowMode.onchange = () => { isSlow = slowMode.checked; };
        normalMode.onchange = () => { isSlow = !normalMode.checked; };
        manometerCheck.onchange = () => { showManometer = manometerCheck.checked; };
        pauseBtn.onclick = () => {
            isPaused = !isPaused;
            pauseBtn.innerText = isPaused ? '▶' : '❚❚';
        };
        resetBtn.onclick = () => {
            flowRate = 5000;
            flowSlider.value = 5000;
            flowVal.innerText = 5000;
            isPaused = false;
            isSlow = false;
            showManometer = true;
            manometerCheck.checked = true;
            normalMode.checked = true;
            slowMode.checked = false;
            pauseBtn.innerText = '❚❚';
            particles = [];
            prefillParticles();
        };

        // 物理计算
        function calcPhysics() {
            const Q = flowRate / 1000;
            const S_big = Math.PI * Math.pow(pipe.radiusBig / 100, 2);
            const S_small = Math.PI * Math.pow(pipe.radiusSmall / 100, 2);
            const v_big = Q / S_big;
            const v_small = Q / S_small;
            const dp_big = 0.5 * fluidDensity * Math.pow(v_big, 2) / 1000;
            const dp_small = 0.5 * fluidDensity * Math.pow(v_small, 2) / 1000;
            const pressure_big = totalPressure - dp_big;
            const pressure_small = totalPressure - dp_small;
            return { v_big, v_small, pressure_big, pressure_small };
        }

        function getPipeRadius(x) {
            if (x < pipe.shrinkStart || x > pipe.expandEnd) return pipe.radiusBig;
            if (x >= pipe.shrinkEnd && x <= pipe.expandStart) return pipe.radiusSmall;
            if (x > pipe.shrinkStart && x < pipe.shrinkEnd) {
                const ratio = (x - pipe.shrinkStart) / (pipe.shrinkEnd - pipe.shrinkStart);
                return pipe.radiusBig - ratio * (pipe.radiusBig - pipe.radiusSmall);
            }
            const ratio = (x - pipe.expandStart) / (pipe.expandEnd - pipe.expandStart);
            return pipe.radiusSmall + ratio * (pipe.radiusBig - pipe.radiusSmall);
        }

        function prefillParticles() {
            for (let i = 0; i < maxParticles; i++) {
                const x = pipe.xStart + (i / maxParticles) * (pipe.xEnd - pipe.xStart);
                const r = getPipeRadius(x);
                particles.push({
                    x: x,
                    y: pipe.yCenter + (Math.random() * 2 - 1) * (r - 10),
                    life: 1
                });
            }
        }

        function initParticle() {
            if (particles.length >= maxParticles) return;
            const radius = getPipeRadius(pipe.xStart);
            particles.push({
                x: pipe.xStart + Math.random() * 20,
                y: pipe.yCenter + (Math.random() * 2 - 1) * (radius - 10),
                life: 1
            });
        }

        function updateParticles() {
            const { v_big, v_small } = calcPhysics();
            const speedFactor = isSlow ? 0.3 : 1;
            const baseSpeed = v_big * 30 * speedFactor;

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                let v;
                if (p.x < pipe.shrinkStart || p.x > pipe.expandEnd) {
                    v = baseSpeed;
                } else if (p.x >= pipe.shrinkEnd && p.x <= pipe.expandStart) {
                    v = baseSpeed * (v_small / v_big);
                } else if (p.x > pipe.shrinkStart && p.x < pipe.shrinkEnd) {
                    const ratio = (p.x - pipe.shrinkStart) / (pipe.shrinkEnd - pipe.shrinkStart);
                    v = baseSpeed * (1 + ratio * (v_small / v_big - 1));
                } else {
                    const ratio = (p.x - pipe.expandStart) / (pipe.expandEnd - pipe.expandStart);
                    v = baseSpeed * (v_small / v_big - ratio * (v_small / v_big - 1));
                }

                p.x += v * 0.016;

                if (p.x > pipe.xEnd) {
                    particles.splice(i, 1);
                    continue;
                }

                const r = getPipeRadius(p.x);
                const maxY = pipe.yCenter + r - 5;
                const minY = pipe.yCenter - r + 5;
                if (p.y > maxY) p.y = maxY;
                if (p.y < minY) p.y = minY;
            }

            if (!isPaused && Math.random() > 0.4) {
                initParticle();
            }
        }

        // 在主 Canvas 上绘制压强表
        function drawGaugeAt(cx, cy, radius, pressure) {
            // 半圆背景
            ctx.fillStyle = '#1e293b';
            ctx.beginPath();
            ctx.arc(cx, cy, radius, Math.PI, 0);
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 刻度线和数值
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.lineWidth = 1.5;
            ctx.font = '9px Microsoft YaHei';
            ctx.fillStyle = '#94a3b8';
            ctx.textAlign = 'center';
            for (let i = 0; i <= 10; i++) {
                const angle = Math.PI + (Math.PI / 10) * i;
                const x1 = cx + Math.cos(angle) * (radius - 8);
                const y1 = cy + Math.sin(angle) * (radius - 8);
                const x2 = cx + Math.cos(angle) * radius;
                const y2 = cy + Math.sin(angle) * radius;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
                const labelP = gaugeMinP + (gaugeMaxP - gaugeMinP) * (i / 10);
                const labelX = cx + Math.cos(angle) * (radius + 12);
                const labelY = cy + Math.sin(angle) * (radius + 12);
                ctx.fillText(labelP, labelX, labelY);
            }

            // 指针
            const ratio = Math.min(1, Math.max(0, (pressure - gaugeMinP) / (gaugeMaxP - gaugeMinP)));
            const angle = Math.PI + Math.PI * ratio;
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + Math.cos(angle) * (radius - 16), cy + Math.sin(angle) * (radius - 16));
            ctx.stroke();

            // 中心圆点
            ctx.fillStyle = '#f8fafc';
            ctx.beginPath();
            ctx.arc(cx, cy, 4, 0, Math.PI * 2);
            ctx.fill();

            // 压强数值
            ctx.fillStyle = '#f8fafc';
            ctx.font = 'bold 13px Microsoft YaHei';
            ctx.fillText(Math.round(pressure) + ' kPa', cx, cy + radius + 16);
        }

        // 绘制管道
        function drawPipe() {
            ctx.beginPath();
            ctx.moveTo(pipe.xStart, pipe.yCenter - pipe.radiusBig);
            ctx.lineTo(pipe.shrinkStart, pipe.yCenter - pipe.radiusBig);
            ctx.lineTo(pipe.shrinkEnd, pipe.yCenter - pipe.radiusSmall);
            ctx.lineTo(pipe.expandStart, pipe.yCenter - pipe.radiusSmall);
            ctx.lineTo(pipe.expandEnd, pipe.yCenter - pipe.radiusBig);
            ctx.lineTo(pipe.xEnd, pipe.yCenter - pipe.radiusBig);
            ctx.lineTo(pipe.xEnd, pipe.yCenter + pipe.radiusBig);
            ctx.lineTo(pipe.expandEnd, pipe.yCenter + pipe.radiusBig);
            ctx.lineTo(pipe.expandStart, pipe.yCenter + pipe.radiusSmall);
            ctx.lineTo(pipe.shrinkEnd, pipe.yCenter + pipe.radiusSmall);
            ctx.lineTo(pipe.shrinkStart, pipe.yCenter + pipe.radiusBig);
            ctx.lineTo(pipe.xStart, pipe.yCenter + pipe.radiusBig);
            ctx.closePath();

            const pipeGradient = ctx.createLinearGradient(0, pipe.yCenter - pipe.radiusBig, 0, pipe.yCenter + pipe.radiusBig);
            pipeGradient.addColorStop(0, '#f9d749');
            pipeGradient.addColorStop(0.5, '#b8860b');
            pipeGradient.addColorStop(1, '#f9d749');
            ctx.strokeStyle = pipeGradient;
            ctx.lineWidth = 20;
            ctx.stroke();

            ctx.fillStyle = 'rgba(56, 189, 248, 0.8)';
            ctx.fill();
        }

        function drawParticles() {
            ctx.fillStyle = '#ef4444';
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // 绘制测量标记和连线
        function drawMarkers() {
            // 粗管测量位置 - 虚线标记
            const r1 = getPipeRadius(measureX1);
            ctx.setLineDash([4, 6]);
            ctx.strokeStyle = 'rgba(56,189,248,0.6)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(measureX1, pipe.yCenter - r1 - 20);
            ctx.lineTo(measureX1, pipe.yCenter + r1);
            ctx.stroke();
            ctx.setLineDash([]);

            // 细管测量位置 - 虚线标记
            const r2 = getPipeRadius(measureX2);
            ctx.setLineDash([4, 6]);
            ctx.beginPath();
            ctx.moveTo(measureX2, pipe.yCenter - r2 - 20);
            ctx.lineTo(measureX2, pipe.yCenter + r2);
            ctx.stroke();
            ctx.setLineDash([]);

            // 流速标签
            const { v_big, v_small } = calcPhysics();
            ctx.fillStyle = 'rgba(30,41,59,0.85)';
            ctx.strokeStyle = 'rgba(56,189,248,0.4)';
            ctx.lineWidth = 1;

            // 粗管流速标签
            const labelW = 110, labelH = 30;
            const lx1 = measureX1 - labelW / 2, ly1 = pipe.yCenter + pipe.radiusBig + 8;
            ctx.fillRect(lx1, ly1, labelW, labelH);
            ctx.strokeRect(lx1, ly1, labelW, labelH);
            ctx.fillStyle = '#f8fafc';
            ctx.font = 'bold 14px Microsoft YaHei';
            ctx.textAlign = 'center';
            ctx.fillText('v = ' + v_big.toFixed(1) + ' m/s', measureX1, ly1 + 20);

            // 细管流速标签
            const lx2 = measureX2 - labelW / 2, ly2 = pipe.yCenter + pipe.radiusSmall + 8;
            ctx.fillStyle = 'rgba(30,41,59,0.85)';
            ctx.fillRect(lx2, ly2, labelW, labelH);
            ctx.strokeRect(lx2, ly2, labelW, labelH);
            ctx.fillStyle = '#f8fafc';
            ctx.fillText('v = ' + v_small.toFixed(1) + ' m/s', measureX2, ly2 + 20);
            ctx.textAlign = 'start';
        }

        // 绘制玻璃管压强计
        function drawManometer(cx, pipeTopY, pressure) {
            const tubeW = 22;
            const tubeTop = 135;
            const tubeLeft = cx - tubeW / 2;
            const tubeBottom = pipeTopY;
            const tubeH = tubeBottom - tubeTop;
            const maxWaterH = 150;
            const waterH = Math.min(tubeH - 4, maxWaterH * (pressure - gaugeMinP) / (gaugeMaxP - gaugeMinP));

            // 玻璃管外壁（开口）
            ctx.fillStyle = 'rgba(255,255,255,0.06)';
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(tubeLeft, tubeBottom);
            ctx.lineTo(tubeLeft, tubeTop);
            ctx.lineTo(tubeLeft + tubeW, tubeTop);
            ctx.lineTo(tubeLeft + tubeW, tubeBottom);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // 管口边缘加粗
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(tubeLeft, tubeTop);
            ctx.lineTo(tubeLeft + tubeW, tubeTop);
            ctx.stroke();

            // 玻璃高光
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(tubeLeft + 4, tubeTop + 8);
            ctx.lineTo(tubeLeft + 4, tubeBottom - 4);
            ctx.stroke();

            // 水位填充
            const waterTop = tubeBottom - waterH;
            ctx.fillStyle = 'rgba(56, 189, 248, 0.7)';
            ctx.fillRect(tubeLeft + 2, waterTop, tubeW - 4, waterH - 2);

            // 水面波纹
            ctx.fillStyle = 'rgba(147, 220, 255, 0.6)';
            ctx.fillRect(tubeLeft + 2, waterTop, tubeW - 4, 3);

            // 刻度标记
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 1;
            ctx.font = '8px Microsoft YaHei';
            ctx.fillStyle = '#94a3b8';
            ctx.textAlign = 'left';
            for (let i = 0; i <= 4; i++) {
                const y = tubeBottom - 4 - (i / 4) * maxWaterH;
                const val = Math.round(gaugeMinP + (i / 4) * (gaugeMaxP - gaugeMinP));
                ctx.beginPath();
                ctx.moveTo(tubeLeft - 4, y);
                ctx.lineTo(tubeLeft, y);
                ctx.stroke();
                if (i % 2 === 0) {
                    ctx.fillText(val, tubeLeft - 36, y + 3);
                }
            }

            // 与管道的连接线
            ctx.strokeStyle = 'rgba(255,255,255,0.25)';
            ctx.lineWidth = 1;
            ctx.setLineDash([2, 3]);
            ctx.beginPath();
            ctx.moveTo(cx, tubeBottom);
            ctx.lineTo(cx, pipe.yCenter - getPipeRadius(cx) + 3);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function updateData() {
            const { v_big, v_small, pressure_big, pressure_small } = calcPhysics();
            speed1Show.innerText = v_big.toFixed(1) + ' m/s';
            speed2Show.innerText = v_small.toFixed(1) + ' m/s';
            const p1 = Math.round(pressure_big);
            const p2 = Math.round(pressure_small);
            pressure1Show.innerText = p1 + ' kPa';
            pressure2Show.innerText = p2 + ' kPa';
        }

        function render() {
            requestAnimationFrame(render);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 背景
            ctx.fillStyle = '#1e3a5f';
            ctx.fillRect(0, 0, canvas.width, 150);
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 150, canvas.width, canvas.height - 150);

            // 两个压强表画在对应测量位置上方
            const { pressure_big, pressure_small } = calcPhysics();
            const gaugeCY = 72;
            const gaugeR = 52;
            drawGaugeAt(measureX1, gaugeCY, gaugeR, pressure_big);
            drawGaugeAt(measureX2, gaugeCY, gaugeR, pressure_small);

            if (!isPaused) {
                updateParticles();
            }

            drawPipe();

            // 玻璃管压强计
            if (showManometer) {
                const r1 = pipe.yCenter - pipe.radiusBig;
                const r2 = pipe.yCenter - pipe.radiusSmall;
                drawManometer(measureX1 - 50, r1, pressure_big);
                drawManometer(measureX2 - 50, r2, pressure_small);
            }

            drawMarkers();
            drawParticles();
            updateData();
        }

        prefillParticles();
        render();
    </script>
</body>
</html>
