    &lt;script type=&quot;module&quot;&gt;
        // 物理常量与配置
        const CONFIG = {
            g: 9.8,             // 重力加速度 (模拟值)
            scale: 50,          // 像素/米
            ballRadius: 15,     // 小球半径
            slopeAngle: 30 * Math.PI / 180, // 斜面角度
            slopeLength: 200,   // 斜面长度(像素)
            startHeight: 100,   // 起始高度(像素)
            groundY: 300        // 地面Y坐标
        };

        // 状态管理
        const state = {
            running: false,
            phase: 'ready', // ready, slope, ground, stopped
            t: 0,           // 动画时间
            x: 0,           // 小球X坐标
            y: 0,           // 小球Y坐标
            v: 0,           // 当前速度
            distance: 0,    // 水平位移
            mu: 0.3,        // 摩擦系数
            cameraX: 0      // 相机偏移量
        };

        // DOM 元素
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const stopBtn = document.getElementById('stop-btn');
        const slider = document.getElementById('friction-slider');
        const muDisplay = document.getElementById('mu-value');
        const materialDisplay = document.getElementById('material-name');
        const speedDisplay = document.getElementById('speed-display');
        const distDisplay = document.getElementById('distance-display');
        const statusBadge = document.getElementById('status-badge');
        const msgOverlay = document.getElementById('message-overlay');

        // 初始化 Canvas 尺寸
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            draw();
        }
        window.addEventListener('resize', resizeCanvas);

        // 材质映射
        function updateMaterial(val) {
            const mu = val / 100;
            state.mu = mu;
            muDisplay.textContent = mu.toFixed(2);
            
            let name = &quot;&quot;;
            let color = &quot;&quot;;
            if (mu === 0) { name = &quot;理想光滑平面&quot;; color = &quot;text-purple-600&quot;; }
            else if (mu &lt; 0.1) { name = &quot;冰面&quot;; color = &quot;text-blue-400&quot;; }
            else if (mu &lt; 0.4) { name = &quot;木板&quot;; color = &quot;text-amber-600&quot;; }
            else if (mu &lt; 0.7) { name = &quot;棉布&quot;; color = &quot;text-slate-500&quot;; }
            else { name = &quot;毛巾&quot;; color = &quot;text-slate-700&quot;; }
            
            materialDisplay.textContent = name;
            materialDisplay.className = `text-sm font-bold ${color}`;
        }

        // 物理计算核心
        function updatePhysics(dt) {
            // dt 是秒
            if (state.phase === 'slope') {
                // 斜面下滑阶段 (简化模型：匀加速)
                // a = g * sin(theta)
                const a = CONFIG.g * Math.sin(CONFIG.slopeAngle) * CONFIG.scale; // 像素加速度
                state.v += a * dt;
                
                // 沿斜面位移
                const dx = state.v * Math.cos(CONFIG.slopeAngle) * dt;
                const dy = state.v * Math.sin(CONFIG.slopeAngle) * dt;
                
                state.x += dx;
                state.y += dy;

                // 到达底部判断
                if (state.y &gt;= CONFIG.groundY - CONFIG.ballRadius) {
                    state.y = CONFIG.groundY - CONFIG.ballRadius;
                    state.phase = 'ground';
                    // 速度方向转为水平 (假设无能量损失)
                    // 实际物理中会有碰撞损失，这里为了演示理想实验，保持速率不变
                }
            } else if (state.phase === 'ground') {
                // 水平运动阶段
                // a = -mu * g
                const a = state.mu * CONFIG.g * CONFIG.scale;
                
                if (state.v &gt; 0) {
                    state.v -= a * dt;
                    if (state.v &lt; 0) state.v = 0;
                }
                
                state.x += state.v * dt;
                
                // 计算水平位移 (减去斜面底端坐标)
                const slopeBottomX = CONFIG.startHeight / Math.tan(CONFIG.slopeAngle); 
                // 这里的计算稍微简化，直接用当前x减去初始x作为演示距离
                state.distance = (state.x - 100) / CONFIG.scale; // 假设初始x在100附近

                // 停止判断
                if (state.v &lt;= 0.1 &amp;&amp; state.mu &gt; 0) {
                    state.v = 0;
                    state.phase = 'stopped';
                    state.running = false;
                    updateUIState();
                }
            }
        }

        // 绘图核心
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 相机跟随逻辑：如果小球跑出屏幕右侧 2/3，相机向右移
            let targetCameraX = 0;
            if (state.x &gt; canvas.width * 0.6) {
                targetCameraX = state.x - canvas.width * 0.6;
            }
            // 平滑相机移动
            state.cameraX += (targetCameraX - state.cameraX) * 0.1;

            ctx.save();
            ctx.translate(-state.cameraX, 0);

            // 1. 绘制斜面
            const startX = 50;
            const slopeHeight = CONFIG.startHeight;
            const slopeWidth = slopeHeight / Math.tan(CONFIG.slopeAngle);
            const bottomX = startX + slopeWidth;
            
            ctx.beginPath();
            ctx.moveTo(startX, CONFIG.groundY - slopeHeight);
            ctx.lineTo(bottomX, CONFIG.groundY);
            ctx.lineTo(startX, CONFIG.groundY);
            ctx.closePath();
            ctx.fillStyle = '#CBD5E1'; // 斜面颜色
            ctx.fill();
            
            // 2. 绘制地面 (无限延伸)
            // 根据材质改变地面纹理/颜色
            let groundColor = '#E2E8F0';
            if (state.mu === 0) groundColor = '#F0F9FF'; // 冰/光面
            else if (state.mu &gt; 0.6) groundColor = '#94A3B8'; // 粗糙
            
            ctx.fillStyle = groundColor;
            ctx.fillRect(bottomX, CONFIG.groundY, canvas.width + state.cameraX + 1000, 4); // 地面线
            
            // 绘制地面刻度
            ctx.fillStyle = '#94A3B8';
            ctx.font = '10px sans-serif';
            for (let i = 0; i &lt; 100; i++) {
                const markX = bottomX + i * CONFIG.scale;
                if (markX &gt; state.cameraX - 50 &amp;&amp; markX &lt; state.cameraX + canvas.width + 50) {
                    ctx.fillRect(markX, CONFIG.groundY, 1, 5);
                    if (i % 5 === 0) {
                        ctx.fillText(i + 'm', markX - 5, CONFIG.groundY + 15);
                    }
                }
            }

            // 3. 绘制小球
            // 计算小球位置
            let ballX, ballY;
            if (state.phase === 'ready') {
                ballX = startX;
                ballY = CONFIG.groundY - slopeHeight - CONFIG.ballRadius / Math.cos(CONFIG.slopeAngle); 
                // 修正：简单起见，直接定点
                ballX = startX; 
                ballY = CONFIG.groundY - slopeHeight - CONFIG.ballRadius; 
                // 实际上应该贴合斜面，这里做个简单近似，或者精确计算
                // 精确计算：
                // 斜面方程 y = tan(theta)*(x - startX) + (groundY - slopeHeight) ... 坐标系不同
                // 简单处理：初始位置设在斜面顶端
                ballX = startX;
                ballY = CONFIG.groundY - slopeHeight - CONFIG.ballRadius;
            } else {
                ballX = state.x;
                ballY = state.y;
            }

            // 绘制小球本体
            ctx.beginPath();
            ctx.arc(ballX, ballY, CONFIG.ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#EF4444'; // 红色小球
            ctx.fill();
            
            // 绘制小球高光
            ctx.beginPath();
            ctx.arc(ballX - 4, ballY - 4, 5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.fill();

            // 绘制滚动效果 (十字线)
            ctx.save();
            ctx.translate(ballX, ballY);
            // 滚动角度 = 位移 / 半径
            const rotation = state.x / CONFIG.ballRadius;
            ctx.rotate(rotation);
            ctx.strokeStyle = 'rgba(255,255,255,0.8)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-CONFIG.ballRadius + 2, 0);
            ctx.lineTo(CONFIG.ballRadius - 2, 0);
            ctx.moveTo(0, -CONFIG.ballRadius + 2);
            ctx.lineTo(0, CONFIG.ballRadius - 2);
            ctx.stroke();
            ctx.restore();

            ctx.restore();
        }

        // 动画循环
        let lastTime = 0;
        function loop(timestamp) {
            if (!state.running) return;
            
            const dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            
            // 限制 dt 防止切屏后跳跃
            if (dt &lt; 0.1) {
                updatePhysics(dt);
            }
            
            // 更新UI数据
            // 转换像素速度为米/秒
            const realSpeed = state.v / CONFIG.scale;
            speedDisplay.textContent = realSpeed.toFixed(2);
            
            // 计算位移
            let displayDist = 0;
            const slopeBottomX = 50 + CONFIG.startHeight / Math.tan(CONFIG.slopeAngle);
            if (state.x &gt; slopeBottomX) {
                displayDist = (state.x - slopeBottomX) / CONFIG.scale;
            }
            distDisplay.textContent = displayDist.toFixed(2);

            draw();
            
            // 特殊状态检查
            if (state.mu === 0 &amp;&amp; state.phase === 'ground' &amp;&amp; state.x &gt; slopeBottomX + 200) {
                msgOverlay.style.opacity = '1';
            } else {
                msgOverlay.style.opacity = '0';
            }

            requestAnimationFrame(loop);
        }

        // 事件处理
        function startExperiment() {
            if (state.running) return;
            
            // 如果是停止状态，重置位置但保留参数
            if (state.phase === 'stopped' || state.phase === 'ground') {
                resetExperiment();
            }

            state.running = true;
            state.phase = 'slope';
            
            // 初始位置修正
            state.x = 50;
            state.y = CONFIG.groundY - CONFIG.startHeight - CONFIG.ballRadius;
            state.v = 0;
            
            lastTime = performance.now();
            requestAnimationFrame(loop);
            
            updateUIState();
        }

        function resetExperiment() {
            state.running = false;
            state.phase = 'ready';
            state.x = 50;
            state.y = CONFIG.groundY - CONFIG.startHeight - CONFIG.ballRadius;
            state.v = 0;
            state.distance = 0;
            state.cameraX = 0;
            
            speedDisplay.textContent = &quot;0.00&quot;;
            distDisplay.textContent = &quot;0.00&quot;;
            msgOverlay.style.opacity = '0';
            
            draw();
            updateUIState();
        }

        function updateUIState() {
            if (state.running) {
                startBtn.disabled = true;
                startBtn.classList.add('opacity-50', 'cursor-not-allowed');
                stopBtn.disabled = false;
                stopBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                slider.disabled = true;
                
                statusBadge.textContent = state.mu === 0 ? &quot;匀速直线运动中...&quot; : &quot;运动中...&quot;;
                statusBadge.className = &quot;px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700&quot;;
            } else {
                startBtn.disabled = false;
                startBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                stopBtn.disabled = true;
                stopBtn.classList.add('opacity-50', 'cursor-not-allowed');
                slider.disabled = false;
                
                if (state.phase === 'stopped') {
                    statusBadge.textContent = &quot;已停止&quot;;
                    statusBadge.className = &quot;px-3 py-1 rounded-full text-xs font-bold bg-slate-200 text-slate-600&quot;;
                } else {
                    statusBadge.textContent = &quot;准备就绪&quot;;
                    statusBadge.className = &quot;px-3 py-1 rounded-full text-xs font-bold bg-physics-light text-physics-dark&quot;;
                }
            }
        }

        // 绑定事件
        startBtn.addEventListener('click', startExperiment);
        resetBtn.addEventListener('click', resetExperiment);
        stopBtn.addEventListener('click', () =&gt; {
            state.running = false;
            updateUIState();
        });
        
        slider.addEventListener('input', (e) =&gt; {
            updateMaterial(e.target.value);
        });

        // 初始化
        resizeCanvas();
        updateMaterial(30);
        resetExperiment();

    &lt;/script&gt;
&lt;/body&gt;
&lt;/html&gt;" frameborder="0"></iframe>
  </div>

  <script src="script.js"></script>
  <script>
    (function() {
      var header = document.querySelector('.header');
      var cont = document.querySelector('.iframe-container');
      var hideTimer = null;
      var HIDE_DELAY = 800;
      function show() { clearTimeout(hideTimer); header.classList.remove('hidden'); cont.classList.remove('no-header-padding'); }
      function hide() { hideTimer = setTimeout(function() { header.classList.add('hidden'); cont.classList.add('no-header-padding'); }, HIDE_DELAY); }
      document.addEventListener('mousemove', function(e) {
        if (e.clientY <= 60) show();
        else if (e.clientY > header.offsetHeight + 20 && !header.classList.contains('hidden')) hide();
      });
      header.addEventListener('mouseenter', show);
      header.addEventListener('mouseleave', hide);
      hideTimer = setTimeout(function() { header.classList.add('hidden'); cont.classList.add('no-header-padding'); }, 2000);
    })();
  </script>
