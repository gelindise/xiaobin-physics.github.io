<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>物理虚拟实验 - 光路模拟器</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
      background: #000;
    }
    .header {
      padding: 0.4rem 1rem;
    }
    .logo {
      font-size: 1rem;
    }
    .nav a {
      font-size: 0.8rem;
      padding: 0.3rem 0.6rem;
    }
    .sim-container {
      position: fixed;
      top: 34px;
      left: 0;
      right: 0;
      bottom: 0;
    }
    .sim-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    @media (max-width: 768px) {
      .sim-container { top: 32px; }
    }
  </style>
  <script src="protect.js"></script>
</head>
<body>
  <header class="header">
    <div class="logo">物理虚拟实验平台</div>
    <nav class="nav">
      <a href="experiments.html">实验目录</a>
      <a href="index.html">首页</a>
      <a href="vip.html">开通VIP</a>
    </nav>
  </header>
  <div class="sim-container">
    <iframe src="https://phydemo.app/ray-optics/simulator/?zh-CN"
      allowfullscreen
      allow="fullscreen; accelerometer; autoplay; camera; encrypted-media; gyroscope; microphone; geolocation; xr-spatial-tracking">
    </iframe>
  </div>
  <script src="supabase.js"></script>
  <script src="script.js"></script>
</body>
</html>
