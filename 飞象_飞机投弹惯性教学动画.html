&lt;html lang=&quot;zh-CN&quot;&gt;
&lt;head&gt;

    &lt;style&gt;
        :root {
            --primary: #FF5600;

            color: var(--primary);
        }
        input[type=&quot;range&quot;] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            background: #ddd;
            border-radius: 3px;
            outline: none;
        }
        input[type=&quot;range&quot;]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
        }
        .toggle-switch {
            position: relative;
            display: inline-block;

        .slider {

        .slider:before {
            position: absolute;

        #canvas-container {

    &lt;/style&gt;
&lt;/head&gt;
&lt;body class=&quot;flex&quot;&gt;

    &lt;aside class=&quot;w-80 h-screen glass-panel p-8 flex flex-col z-10&quot;&gt;
        &lt;h1 class=&quot;text-2xl font-bold mb-2 text-primary&quot;&gt;惯性现象演示&lt;/h1&gt;
        &lt;p class=&quot;text-sm text-text-sub mb-6&quot;&gt;八年级物理下册 &amp;middot; 交互课件&lt;/p&gt;

        &lt;div class=&quot;grid grid-cols-2 gap-2 mb-8&quot;&gt;
            &lt;button id=&quot;btn-scene-plane&quot; class=&quot;scene-btn active py-2 rounded-lg text-sm font-bold border-gray-200 border&quot;&gt;飞机投弹&lt;/button&gt;
            &lt;button id=&quot;btn-scene-train&quot; class=&quot;scene-btn py-2 rounded-lg text-sm font-bold border-gray-200 border&quot;&gt;列车起跳&lt;/button&gt;
        &lt;/div&gt;

        &lt;div class=&quot;space-y-8&quot;&gt;
            &lt;div&gt;
                &lt;div class=&quot;flex justify-between mb-2&quot;&gt;
                    &lt;span id=&quot;speed-label&quot; class=&quot;font-medium&quot;&gt;飞机速度 (v)&lt;/span&gt;

                &lt;/div&gt;
                &lt;input type=&quot;range&quot; id=&quot;speed-slider&quot; min=&quot;10&quot; max=&quot;40&quot; value=&quot;15&quot;&gt;
            &lt;/div&gt;

            &lt;div&gt;
                &lt;div class=&quot;flex justify-between mb-2&quot;&gt;
                    &lt;span class=&quot;font-medium&quot;&gt;加速度 (a)&lt;/span&gt;
                    &lt;span id=&quot;accel-val&quot; class=&quot;text-primary font-bold&quot;&gt;0 m/s&amp;sup2;&lt;/span&gt;
                &lt;/div&gt;
                &lt;input type=&quot;range&quot; id=&quot;accel-slider&quot; min=&quot;-4&quot; max=&quot;4&quot; value=&quot;0&quot; step=&quot;0.5&quot;&gt;

            &lt;div class=&quot;grid grid-cols-3 gap-2 mb-2&quot;&gt;
                &lt;button id=&quot;btn-uniform&quot; class=&quot;scene-btn active py-2 rounded-lg text-xs font-bold border-gray-200 border&quot;&gt;匀速飞行&lt;/button&gt;
                &lt;button id=&quot;btn-accelerate&quot; class=&quot;scene-btn py-2 rounded-lg text-xs font-bold border-gray-200 border&quot;&gt;加速飞行&lt;/button&gt;
                &lt;button id=&quot;btn-decelerate&quot; class=&quot;scene-btn py-2 rounded-lg text-xs font-bold border-gray-200 border&quot;&gt;减速飞行&lt;/button&gt;
            &lt;/div&gt;

            &lt;div id=&quot;speed-indicator&quot; class=&quot;text-center py-2 rounded-lg bg-blue-50 text-sm font-bold&quot; style=&quot;display:none;&quot;&gt;&lt;/div&gt;

            &lt;div class=&quot;flex items-center justify-between&quot;&gt;
                &lt;span class=&quot;font-medium&quot;&gt;空气阻力 (f)&lt;/span&gt;
                &lt;label class=&quot;toggle-switch&quot;&gt;
                    &lt;input type=&quot;checkbox&quot; id=&quot;drag-toggle&quot;&gt;
                    &lt;span class=&quot;slider&quot;&gt;&lt;/span&gt;
                &lt;/label&gt;
            &lt;/div&gt;

            &lt;div class=&quot;pt-4&quot;&gt;
                &lt;button id=&quot;action-btn&quot; class=&quot;w-full py-3 bg-primary text-black rounded-xl font-bold shadow-lg hover:opacity-90 transition-all active:scale-95&quot;&gt;
                    投放炸弹
                &lt;/button&gt;
                &lt;button id=&quot;reset-btn&quot; class=&quot;w-full mt-3 py-2 border border-gray-300 rounded-xl text-text-sub hover:bg-gray-50 transition-all&quot;&gt;
                    重置场景
                &lt;/button&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;mt-auto p-4 bg-orange-50 rounded-xl border border-orange-100&quot;&gt;
            &lt;p id=&quot;physics-tip&quot; class=&quot;text-xs leading-relaxed text-orange-800&quot;&gt;
                &lt;strong&gt;物理提示：&lt;/strong&gt;&lt;br&gt;
                在不计阻力时，炸弹由于&lt;strong&gt;惯性&lt;/strong&gt;保持与飞机相同的水平速度，始终处于飞机正下方。
            &lt;/p&gt;
        &lt;/div&gt;
        
        &lt;audio id=&quot;audio-plane&quot; src=&quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/zjpEnpXA9ZyPxPS7WLoPeR.mp3&quot;&gt;&lt;/audio&gt;
        &lt;audio id=&quot;audio-train&quot; src=&quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/tZtZgubqYsgTKbWE29PruM.mp3&quot;&gt;&lt;/audio&gt;
    &lt;/aside&gt;

    &lt;main id=&quot;canvas-container&quot;&gt;
        &lt;canvas id=&quot;simCanvas&quot;&gt;&lt;/canvas&gt;
    &lt;/main&gt;

    &lt;script type=&quot;module&quot;&gt;
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const speedSlider = document.getElementById('speed-slider');
        const speedVal = document.getElementById('speed-val');
        const dragToggle = document.getElementById('drag-toggle');
        const actionBtn = document.getElementById('action-btn');
        const resetBtn = document.getElementById('reset-btn');
        const speedLabel = document.getElementById('speed-label');
        const physicsTip = document.getElementById('physics-tip');

        const planeImg = new Image(); planeImg.src = 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/tpesvewAUGPNewqp42qwvf.jpg';
        const bombImg = new Image(); bombImg.src = 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/WSW3UXwHtBpUESt27oLwvP.jpg';
        const trainImg = new Image(); trainImg.src = 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/uQocKRsT82c8FDLoNfUej5.jpg';
        const personImg = new Image(); personImg.src = 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/L3zNyEA3sFoK7bkL5DDB9o.jpg';

        const G = 9.8;
        let width, height, currentScene = 'plane';
        let plane = { x: 100, y: 100, speed: 15 };
        let train = { x: 100, y: 0, speed: 15 };
        let person = { x: 0, y: 0, vx: 0, vy: 0, jumping: false, relX: 200 };
        let bombs = [], trajectories = [], explosions = [], isMoving = false, autoDropTimer = null, autoJumpTimer = null;
        let acceleration = 0, initialSpeed = 15, speedMode = 'uniform';

        function resize() {
            width = canvas.width = window.innerWidth - 320;
            height = canvas.height = window.innerHeight;
            train.y = height - 250; // 调高列车位置
            reset();
        }
        window.addEventListener('resize', resize);
        resize();

        function reset() {
            bombs = []; trajectories = []; explosions = []; isMoving = false;
            if (autoDropTimer) clearInterval(autoDropTimer);
            if (autoJumpTimer) clearInterval(autoJumpTimer);
            autoDropTimer = null;
            autoJumpTimer = null;
            plane.x = 100;
            plane.speed = initialSpeed;
            train.x = 100;
            train.speed = initialSpeed;
            person.jumping = false;
            person.vy = 0;
            person.vx = 0;
            person.relX = 250;
            speedIndicator.style.display = 'none';
            speedVal.innerText = `${initialSpeed} m/s`;
        }

        document.getElementById('btn-scene-plane').onclick = function() {
            currentScene = 'plane';
            this.classList.add('active');
            document.getElementById('btn-scene-train').classList.remove('active');
            actionBtn.innerText = '投放炸弹';
            speedLabel.innerText = '飞机速度 (v)';
            physicsTip.innerHTML = '&lt;strong&gt;物理提示：&lt;/strong&gt;&lt;br&gt;炸弹由于&lt;strong&gt;惯性&lt;/strong&gt;保持投出时刻的水平速度。&lt;br&gt;匀速时炸弹在飞机正下方；&lt;strong&gt;加速时炸弹落后&lt;/strong&gt;于飞机；&lt;strong&gt;减速时炸弹超前&lt;/strong&gt;于飞机。';
            reset();
        };

        document.getElementById('btn-scene-train').onclick = function() {
            currentScene = 'train';
            this.classList.add('active');
            document.getElementById('btn-scene-plane').classList.remove('active');
            actionBtn.innerText = '小人起跳';
            speedLabel.innerText = '列车速度 (v)';
            physicsTip.innerHTML = '&lt;strong&gt;物理提示：&lt;/strong&gt;&lt;br&gt;在匀速行驶的列车上起跳，由于&lt;strong&gt;惯性&lt;/strong&gt;，小人保持与列车相同的水平速度，最终落回原处。';
            reset();
        };

        const accelSlider = document.getElementById('accel-slider');
        const accelVal = document.getElementById('accel-val');
        const speedIndicator = document.getElementById('speed-indicator');
        const btnUniform = document.getElementById('btn-uniform');
        const btnAccelerate = document.getElementById('btn-accelerate');
        const btnDecelerate = document.getElementById('btn-decelerate');

        speedSlider.oninput = () =&gt; {
            const val = parseInt(speedSlider.value);
            initialSpeed = val;
            if (!isMoving) { plane.speed = train.speed = val; }
            speedVal.innerText = `${val} m/s`;
        };

        accelSlider.oninput = () =&gt; {
            acceleration = parseFloat(accelSlider.value);
            accelVal.innerText = `${acceleration &gt;= 0 ? '+' : ''}${acceleration.toFixed(1)} m/s&amp;sup2;`;
            // Deselect all mode buttons when manually adjusting slider
            btnUniform.classList.remove('active');
            btnAccelerate.classList.remove('active');
            btnDecelerate.classList.remove('active');
            speedMode = 'custom';
        };

        function setSpeedMode(mode) {
            speedMode = mode;
            btnUniform.classList.remove('active');
            btnAccelerate.classList.remove('active');
            btnDecelerate.classList.remove('active');
            if (mode === 'uniform') {
                btnUniform.classList.add('active');
                acceleration = 0;
                accelSlider.value = 0;
                accelVal.innerText = '0 m/s&amp;sup2;';
            } else if (mode === 'accelerate') {
                btnAccelerate.classList.add('active');
                acceleration = 3;
                accelSlider.value = 3;
                accelVal.innerText = '+3.0 m/s&amp;sup2;';
            } else if (mode === 'decelerate') {
                btnDecelerate.classList.add('active');
                acceleration = -3;
                accelSlider.value = -3;
                accelVal.innerText = '-3.0 m/s&amp;sup2;';
            }
            if (!isMoving) { plane.speed = train.speed = initialSpeed; }
        }

        btnUniform.onclick = () =&gt; setSpeedMode('uniform');
        btnAccelerate.onclick = () =&gt; setSpeedMode('accelerate');
        btnDecelerate.onclick = () =&gt; setSpeedMode('decelerate');

        function performAction() {
            if (currentScene === 'plane') {
                if (!isMoving) {
                    isMoving = true;
                    dropBomb();
                    autoDropTimer = setInterval(dropBomb, 1000); // 进一步缩短至1.0秒，确保视觉节奏紧凑
                }
            } else {
                if (!isMoving) {
                    isMoving = true;
                    const jump = () =&gt; {
                        if (!person.jumping) {
                            // 边界检测：relX 接近 20 说明到了车尾
                            if (dragToggle.checked &amp;&amp; person.relX &lt; 40) {
                                if (autoJumpTimer) {
                                    clearInterval(autoJumpTimer);
                                    autoJumpTimer = null;
                                }
                                return;
                            }
                            document.getElementById('audio-train').play();
                            person.jumping = true;
                            // 再次压低高度：有阻力 -6.5，确保绝不超限；无阻力保持 -5.5
                            person.vy = dragToggle.checked ? -6.5 : -5.5; 
                            person.vx = train.speed;
                            person.x = train.x + person.relX;
                            person.y = train.y + 80;
                        }
                    };
                    jump();
                    autoJumpTimer = setInterval(jump, 500); // 缩短至 0.5 秒，极速演示
                }
            }
            actionBtn.classList.add('btn-pulse');
            setTimeout(() =&gt; actionBtn.classList.remove('btn-pulse'), 300);
        }

        function dropBomb() {
            document.getElementById('audio-plane').play();
            bombs.push({
                x: plane.x, y: plane.y + 30, vx: plane.speed, vy: 0, path: [], active: true,
                color: `hsl(${Math.random() * 360}, 70%, 50%)`, hasDrag: dragToggle.checked
            });
        }

        actionBtn.onclick = performAction;
        resetBtn.onclick = reset;

        function update() {
            if (!isMoving) return;
            const dt = 0.02;

            if (currentScene === 'plane') {
                // Apply acceleration to plane speed
                plane.speed += acceleration * dt;
                // Clamp speed to reasonable range
                if (plane.speed &lt; 1) plane.speed = 1;
                if (plane.speed &gt; 60) plane.speed = 60;

                // Update speed display
                speedVal.innerText = `${plane.speed.toFixed(1)} m/s`;
                if (acceleration !== 0) {
                    speedIndicator.style.display = 'block';
                    const dir = acceleration &gt; 0 ? '加速中' : '减速中';
                    speedIndicator.innerHTML = `${dir} | a=${acceleration.toFixed(1)} m/s&amp;sup2; | v=${plane.speed.toFixed(1)} m/s`;
                    speedIndicator.style.color = acceleration &gt; 0 ? '#16a34a' : '#dc2626';
                } else {
                    speedIndicator.style.display = 'none';
                }

                const dx = plane.x + (plane.speed * dt);
                plane.x = dx;
                if (plane.x &gt; width + 100) {
                    plane.x = -100;
                    bombs = []; trajectories = []; explosions = [];
                }
                bombs.forEach(bomb =&gt; {
                    if (!bomb.active) return;
                    bomb.path.push({x: bomb.x, y: bomb.y});
                    let ay = G * 0.02;
                    if (bomb.hasDrag) {
                        const k = 0.04; let ax = -k * bomb.vx; bomb.vx += ax * dt;
                        ay = (G * 0.02) - (k * bomb.vy);
                    }
                    // Bomb keeps its initial horizontal speed (inertia) — does NOT match plane
                    bomb.x += bomb.vx * dt;
                    bomb.vy += ay * dt; bomb.y += bomb.vy * 0.2;
                    if (bomb.y &gt; height - 80) {
                        bomb.active = false;
                        trajectories.push({path: bomb.path, color: bomb.color});
                        explosions.push({x: bomb.x, y: height - 80, r: 5, o: 1});
                    }
                });
            } else {
                const dx = (train.speed * dt);
                train.x += dx;
                // 深度优化：当列车重置时，必须同步更新小人的全局坐标，防止其&amp;ldquo;消失&amp;rdquo;
                if (train.x &gt; width + 200) {
                    const oldTrainX = train.x;
                    train.x = -500;
                    const offset = train.x - oldTrainX;
                    person.x += offset; 
                }
                if (person.jumping) {
                    let ay = G * 0.02;
                    if (dragToggle.checked) {
                        const k = 0.8; 
                        person.vx += (-k * person.vx) * dt;
                        const dragY = -k * person.vy;
                        ay = (G * 0.02) + dragY * dt;
                        person.x += (person.vx * dt);
                        
                        // 实时边界检测：限制 relX 不得小于 20（车尾）
                        let currentRelX = person.x - train.x;
                        if (currentRelX &lt; 20) {
                            person.x = train.x + 20;
                            person.vx = train.speed;
                        }
                    } else {
                        person.x += dx;
                    }
                    person.vy += ay;
                    person.y += person.vy;
                    if (person.y &gt;= train.y + 80) {
                        person.y = train.y + 80;
                        person.jumping = false;
                        person.relX = person.x - train.x;
                        
                        if (dragToggle.checked &amp;&amp; person.relX &lt; 40) {
                            if (autoJumpTimer) {
                                clearInterval(autoJumpTimer);
                                autoJumpTimer = null;
                            }
                        }
                    }
                }
            }

            explosions.forEach(exp =&gt; { exp.r += 2; exp.o -= 0.03; });
            explosions = explosions.filter(exp =&gt; exp.o &gt; 0);
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#94a3b8'; ctx.fillRect(0, height - 80, width, 80);

            if (currentScene === 'plane') {
                trajectories.forEach(trj =&gt; {
                    ctx.beginPath(); ctx.setLineDash([5, 5]); ctx.strokeStyle = trj.color + '88';
                    trj.path.forEach((p, i) =&gt; { if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
                    ctx.stroke(); ctx.setLineDash([]);
                });
                bombs.forEach(bomb =&gt; {
                    if (!bomb.active) return;
                    ctx.beginPath(); ctx.strokeStyle = bomb.color; ctx.lineWidth = 2;
                    bomb.path.forEach((p, i) =&gt; { if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
                    ctx.stroke();
                    ctx.save(); ctx.translate(bomb.x, bomb.y); ctx.rotate(Math.atan2(bomb.vy, bomb.vx));
                    ctx.drawImage(bombImg, -15, -10, 30, 20); ctx.restore();
                    ctx.beginPath(); ctx.setLineDash([2, 4]); ctx.strokeStyle = '#94a3b8';
                    ctx.moveTo(bomb.x, bomb.y); ctx.lineTo(bomb.x, plane.y + 30); ctx.stroke(); ctx.setLineDash([]);
                });
                ctx.save(); ctx.translate(plane.x, plane.y); ctx.scale(-1, 1); ctx.drawImage(planeImg, -50, -30, 100, 60); ctx.restore();
            } else {
                ctx.save();
                ctx.translate(train.x, train.y);
                ctx.scale(-1, 1); 
                ctx.drawImage(trainImg, -500, 0, 500, 180); 
                
                // 在车厢地板画起跳标记点（固定在 250 位置作为参照）
                ctx.fillStyle = 'rgba(255, 86, 0, 0.5)';
                ctx.fillRect(-290, 160, 40, 5);
                ctx.restore();
                
                const px = person.jumping ? person.x : train.x + person.relX;
                const py = person.jumping ? person.y : train.y + 80;
                ctx.drawImage(personImg, px, py, 40, 80);
                if (person.jumping) {
                    ctx.beginPath(); ctx.setLineDash([2, 4]); ctx.strokeStyle = '#94a3b8';
                    ctx.moveTo(px + 20, py + 80); ctx.lineTo(train.x + 270, train.y + 160); ctx.stroke(); ctx.setLineDash([]);
                }
            }

            explosions.forEach(exp =&gt; {
                ctx.beginPath(); ctx.arc(exp.x, exp.y, exp.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 86, 0, ${exp.o})`; ctx.fill();
            });

            requestAnimationFrame(() =&gt; { update(); draw(); });
        }

        planeImg.onload = bombImg.onload = trainImg.onload = personImg.onload = () =&gt; draw();
    &lt;/script&gt;
