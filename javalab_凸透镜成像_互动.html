<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=10">
  <title>凸透镜成像规律 — 互动探究 - 物理虚拟实验</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1e293b;
      --muted: #94a3b8;
      --border: #e2e8f0;
      --accent: #3b82f6;
      --red: #ef4444;
      --green: #22c55e;
      --orange: #f59e0b;
      --purple: #8b5cf6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #f8fafc;
      color: var(--text);
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1.5rem;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }
    .logo { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .nav { display: flex; gap: 1.2rem; }
    .nav a { color: var(--muted); text-decoration: none; font-size: 0.9rem; }
    .nav a:hover { color: var(--accent); }

    .main-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 1.5rem;
    }
    .title-area { margin-bottom: 0.8rem; }
    .title-area h2 { font-size: 1.5rem; }
    .title-area p { color: var(--muted); font-size: 0.9rem; margin-top: 0.2rem; }

    .sim-card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .canvas-wrap {
      position: relative;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      cursor: default;
    }
    .controls-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 12px 20px;
      flex-wrap: wrap;
      background: #fafbfc;
    }
    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: #475569;
    }
    .ctrl-group input[type="range"] {
      width: 130px;
      accent-color: var(--accent);
    }
    .ctrl-group input[type="checkbox"] {
      accent-color: var(--accent);
    }
    .btn {
      padding: 6px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { background: #f1f5f9; border-color: var(--accent); }
    .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .data-panel {
      display: flex;
      gap: 12px;
      padding: 14px 20px;
      flex-wrap: wrap;
      justify-content: center;
      background: linear-gradient(135deg, #f0f9ff, #fefce8);
      border-top: 1px solid var(--border);
    }
    .data-item {
      text-align: center;
      min-width: 70px;
    }
    .data-item .val {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }
    .data-item .lbl {
      font-size: 0.75rem;
      color: var(--muted);
    }
    .data-item .val.red { color: var(--red); }
    .data-item .val.green { color: var(--green); }
    .data-item .val.orange { color: var(--orange); }

    .formula-bar {
      display: flex;
      gap: 16px;
      padding: 12px 20px;
      flex-wrap: wrap;
      justify-content: center;
      border-top: 1px solid var(--border);
      background: #fafbfc;
    }
    .formula-item {
      font-size: 0.85rem;
    }
    .formula-item .label {
      color: var(--muted);
    }
    .formula-item .value {
      font-weight: 600;
      font-family: 'SF Mono', 'Consolas', monospace;
    }

    .tip-bar {
      text-align: center;
      padding: 8px 16px;
      font-size: 0.8rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    @media (max-width: 768px) {
      .main-wrap { padding: 0.8rem 0.8rem; }
      .controls-row { gap: 16px; padding: 10px 12px; }
      .data-item .val { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">物理虚拟实验</div>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="experiments.html">实验列表</a>
    </nav>
  </header>

  <div class="main-wrap">
    <div class="title-area">
      <h2>凸透镜成像规律 — 互动探究</h2>
      <p>拖拽蜡烛改变物距，观察三条特征光线如何汇聚成像。切换焦距、对比实像与虚像。</p>
    </div>

    <div class="sim-card">
      <div class="canvas-wrap">
        <canvas id="simCanvas"></canvas>
      </div>

      <div class="controls-row">
        <div class="ctrl-group">
          <span>焦距 f =</span>
          <input type="range" id="focalSlider" min="80" max="280" value="160">
          <span id="focalVal" style="min-width:36px;font-weight:600;">160</span>
          <span>px</span>
        </div>
        <button class="btn" id="btnPreset1" onclick="setPreset(0.5)">u &lt; f</button>
        <button class="btn" id="btnPreset2" onclick="setPreset(1.0)">u = f</button>
        <button class="btn active" id="btnPreset3" onclick="setPreset(2.0)">u = 2f</button>
        <button class="btn" id="btnPreset4" onclick="setPreset(3.5)">u &gt; 2f</button>
      </div>

      <div class="data-panel" id="dataPanel">
        <div class="data-item">
          <div class="val" id="valU">320</div>
          <div class="lbl">物距 u (px)</div>
        </div>
        <div class="data-item">
          <div class="val" id="valF">160</div>
          <div class="lbl">焦距 f (px)</div>
        </div>
        <div class="data-item">
          <div class="val" id="valV">--</div>
          <div class="lbl">像距 v (px)</div>
        </div>
        <div class="data-item">
          <div class="val" id="valM">--</div>
          <div class="lbl">放大率</div>
        </div>
        <div class="data-item">
          <div class="val" id="valType" style="font-size:0.95rem;">--</div>
          <div class="lbl">像的性质</div>
        </div>
      </div>

      <div class="formula-bar">
        <div class="formula-item">
          <span class="label">透镜公式：</span>
          <span class="value">1/f = 1/u + 1/v</span>
        </div>
        <div class="formula-item">
          <span class="label">放大率：</span>
          <span class="value">M = |v| / u</span>
        </div>
      </div>

      <div class="tip-bar">
        💡 拖拽蜡烛左右移动改变物距 · 拖拽焦点 F 或 F' 改变焦距 · 红色=平行光线 · 蓝色=过光心光线 · 绿色=过焦点光线
      </div>
    </div>
  </div>

  <script src="protect.js"></script>
  <script>
    (function() {
      const canvas = document.getElementById('simCanvas');
      const ctx = canvas.getContext('2d');

      // Physical layout (in canvas pixel coordinates)
      const AXIS_Y = 280;
      const LENS_X = 500;
      const LENS_HALF_H = 190;

      // State
      let focalLength = 160;
      let objDist = 320; // u: distance from lens to object (positive = left)
      let objHeight = 100;
      let dragging = null; // 'object' | 'focalLeft' | 'focalRight' | null
      let dragOffX = 0;
      let showRays = true;

      // Candle drawing params
      const CANDLE_W = 14;
      const CANDLE_H = 100;
      const FLAME_H = 28;

      function resizeCanvas() {
        const wrap = canvas.parentElement;
        const w = wrap.clientWidth;
        canvas.width = w * 2; // retina
        canvas.height = 520 * 2;
        canvas.style.width = w + 'px';
        canvas.style.height = '520px';
      }

      function getObjX() { return LENS_X - objDist; }
      function getObjTopY() { return AXIS_Y - objHeight; }

      function getImageDist() {
        if (Math.abs(objDist - focalLength) < 0.5) return Infinity;
        return (objDist * focalLength) / (objDist - focalLength);
      }

      function getImageHeight() {
        let v = getImageDist();
        if (!isFinite(v)) return Infinity;
        return objHeight * Math.abs(v) / objDist;
      }

      function getImageX() {
        let v = getImageDist();
        if (!isFinite(v)) return Infinity;
        return LENS_X + v;
      }

      function isRealImage() {
        return objDist > focalLength;
      }

      function drawGrid() {
        const dpr = window.devicePixelRatio || 1;
        ctx.save();
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.strokeStyle = '#f1f5f9';
        ctx.lineWidth = 0.5;
        // Vertical grid lines every 50px
        for (let x = 0; x <= canvas.width / dpr; x += 50) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, canvas.height / dpr);
          ctx.stroke();
        }
        // Horizontal grid lines
        for (let y = 0; y <= canvas.height / dpr; y += 50) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(canvas.width / dpr, y);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawOpticalAxis() {
        const dpr = window.devicePixelRatio || 1;
        ctx.save();
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.strokeStyle = '#cbd5e1';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([8, 4]);
        ctx.beginPath();
        ctx.moveTo(20, AXIS_Y);
        ctx.lineTo(canvas.width / dpr - 20, AXIS_Y);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }

      function drawConvexLens() {
        const dpr = window.devicePixelRatio || 1;
        ctx.save();
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        // Lens shape: two arcs meeting at top and bottom
        ctx.fillStyle = 'rgba(59, 130, 246, 0.15)';
        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 3;
        ctx.beginPath();
        // Left arc
        ctx.moveTo(LENS_X, AXIS_Y - LENS_HALF_H);
        ctx.quadraticCurveTo(LENS_X - 30, AXIS_Y, LENS_X, AXIS_Y + LENS_HALF_H);
        // Right arc
        ctx.quadraticCurveTo(LENS_X + 30, AXIS_Y, LENS_X, AXIS_Y - LENS_HALF_H);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // Double arrows at top and bottom
        drawArrow(LENS_X, AXIS_Y - LENS_HALF_H - 12, 'up');
        drawArrow(LENS_X, AXIS_Y + LENS_HALF_H + 12, 'down');

        // Label
        ctx.fillStyle = '#3b82f6';
        ctx.font = 'bold 13px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('凸透镜', LENS_X, AXIS_Y + LENS_HALF_H + 30);

        ctx.restore();
      }

      function drawArrow(x, y, dir) {
        const s = dir === 'up' ? -1 : 1;
        ctx.beginPath();
        ctx.moveTo(x - 8, y);
        ctx.lineTo(x + 8, y);
        ctx.moveTo(x, y);
        ctx.lineTo(x, y + s * 10);
        ctx.moveTo(x - 5, y + s * 6);
        ctx.lineTo(x, y + s * 10);
        ctx.lineTo(x + 5, y + s * 6);
        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      function drawFocalPoints() {
        const dpr = window.devicePixelRatio || 1;
        ctx.save();
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        // Left focal point F
        const fx = LENS_X - focalLength;
        drawFocalMarker(fx, AXIS_Y, 'F', '#f59e0b');
        // Right focal point F'
        const fx2 = LENS_X + focalLength;
        drawFocalMarker(fx2, AXIS_Y, "F'", '#f59e0b');

        // 2F markers
        const f2x1 = LENS_X - 2 * focalLength;
        const f2x2 = LENS_X + 2 * focalLength;
        drawFocalMarker(f2x1, AXIS_Y, '2F', '#94a3b8', true);
        drawFocalMarker(f2x2, AXIS_Y, "2F'", '#94a3b8', true);

        ctx.restore();
      }

      function drawFocalMarker(x, y, label, color, small) {
        if (x < 30 || x > canvas.width / (window.devicePixelRatio || 1) - 30) return;
        const r = small ? 4 : 6;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = color;
        ctx.font = (small ? '11px' : '12px') + ' -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(label, x, y + (small ? 16 : 18));
        // Hit area indicator (invisible)
      }

      function drawCandle(x, topY) {
        const dpr = window.devicePixelRatio || 1;
        ctx.save();
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const bodyH = objHeight;
        const bodyBottom = AXIS_Y;

        // Candle body
        const bodyGrad = ctx.createLinearGradient(x, 0, x + CANDLE_W, 0);
        bodyGrad.addColorStop(0, '#fef3c7');
        bodyGrad.addColorStop(0.3, '#fef9c3');
        bodyGrad.addColorStop(0.7, '#fde68a');
        bodyGrad.addColorStop(1, '#d97706');
        ctx.fillStyle = bodyGrad;
        ctx.fillRect(x - CANDLE_W / 2, bodyBottom - bodyH, CANDLE_W, bodyH);

        // Candle stripes
        ctx.strokeStyle = 'rgba(180, 120, 40, 0.2)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 4; i++) {
          const sy = bodyBottom - bodyH + (i + 1) * bodyH / 5;
          ctx.beginPath();
          ctx.moveTo(x - CANDLE_W / 2, sy);
          ctx.lineTo(x + CANDLE_W / 2, sy);
          ctx.stroke();
        }

        // Wick
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(x, bodyBottom - bodyH);
        ctx.lineTo(x, bodyBottom - bodyH - 5);
        ctx.stroke();

        // Flame (animated flicker)
        const flicker = Math.sin(Date.now() / 80) * 2 + Math.sin(Date.now() / 130) * 1.5;
        const flameTop = bodyBottom - bodyH - 5 - FLAME_H + flicker;
        const flameGrad = ctx.createLinearGradient(x, flameTop, x, bodyBottom - bodyH);
        flameGrad.addColorStop(0, 'rgba(255, 200, 20, 0.1)');
        flameGrad.addColorStop(0.2, 'rgba(255, 180, 10, 0.9)');
        flameGrad.addColorStop(0.5, 'rgba(255, 140, 0, 1)');
        flameGrad.addColorStop(0.8, 'rgba(255, 100, 0, 1)');
        flameGrad.addColorStop(1, 'rgba(255, 60, 0, 0.8)');

        ctx.fillStyle = flameGrad;
        ctx.beginPath();
        ctx.moveTo(x, bodyBottom - bodyH - 5);
        ctx.quadraticCurveTo(x - 8 + flicker * 0.3, bodyBottom - bodyH - 5 - FLAME_H * 0.6, x - 3, flameTop);
        ctx.quadraticCurveTo(x, flameTop + 6, x + 3, flameTop);
        ctx.quadraticCurveTo(x + 8 - flicker * 0.3, bodyBottom - bodyH - 5 - FLAME_H * 0.6, x, bodyBottom - bodyH - 5);
        ctx.fill();

        // Glow
        const glowGrad = ctx.createRadialGradient(x, flameTop + FLAME_H * 0.3, 2, x, flameTop + FLAME_H * 0.3, 30);
        glowGrad.addColorStop(0, 'rgba(255, 200, 50, 0.4)');
        glowGrad.addColorStop(1, 'rgba(255, 200, 50, 0)');
        ctx.fillStyle = glowGrad;
        ctx.beginPath();
        ctx.arc(x, flameTop + FLAME_H * 0.3, 30, 0, Math.PI * 2);
        ctx.fill();

        // Label
        ctx.fillStyle = '#475569';
        ctx.font = '12px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('物体（蜡烛）', x, AXIS_Y + 20);

        ctx.restore();
      }

      function drawImage() {
        const dpr = window.devicePixelRatio || 1;
        const v = getImageDist();
        if (!isFinite(v) || Math.abs(v) < 1) return; // at infinity or too close

        const real = isRealImage();
        const imgX = LENS_X + v;
        if (imgX < 30 || imgX > canvas.width / dpr - 30) return;

        const imgH = getImageHeight();
        if (!isFinite(imgH)) return;
        const imgTopY = AXIS_Y - imgH;

        ctx.save();
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        if (real) {
          // Real image: inverted, shown on right
          // Dashed outline of the image
          ctx.setLineDash([4, 3]);
          ctx.strokeStyle = '#ef4444';
          ctx.lineWidth = 2;
          ctx.strokeRect(imgX - CANDLE_W / 2, imgTopY, CANDLE_W, imgH);

          // Small image indicator
          ctx.setLineDash([]);
          ctx.fillStyle = '#ef4444';
          ctx.beginPath();
          const cx = imgX;
          const cy = imgTopY + imgH / 2;
          ctx.moveTo(cx, imgTopY);
          ctx.lineTo(cx - 10, imgTopY + 15);
          ctx.lineTo(cx + 10, imgTopY + 15);
          ctx.closePath();
          ctx.fill();

          // Label
          ctx.fillStyle = '#ef4444';
          ctx.font = 'bold 13px -apple-system, sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('实像', imgX, imgTopY - 15);
          ctx.font = '11px -apple-system, sans-serif';
          ctx.fillText('(倒立)', imgX, imgTopY + imgH + 20);

        } else {
          // Virtual image: upright, magnified, on left side (same side as object)
          ctx.setLineDash([4, 3]);
          ctx.strokeStyle = '#8b5cf6';
          ctx.lineWidth = 2;
          ctx.strokeRect(imgX - CANDLE_W / 2, imgTopY, CANDLE_W, imgH);

          ctx.setLineDash([]);
          ctx.fillStyle = '#8b5cf6';
          ctx.font = 'bold 13px -apple-system, sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('虚像', imgX, imgTopY - 15);
          ctx.font = '11px -apple-system, sans-serif';
          ctx.fillText('(正立)', imgX, imgTopY + imgH + 20);
        }

        ctx.restore();
      }

      function drawRays() {
        const dpr = window.devicePixelRatio || 1;
        const real = isRealImage();
        const v = getImageDist();
        const objX = getObjX();
        const objTopY = getObjTopY();
        const objTipX = objX;
        const objTipY = objTopY;

        if (!isFinite(v) || Math.abs(v) < 0.5) {
          // u ≈ f: rays emerge parallel, image at infinity
          drawParallelRaysCase(objTipX, objTipY);
          return;
        }

        const imgX = LENS_X + v;
        const imgTopY = AXIS_Y - getImageHeight();

        ctx.save();
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        // Three principal rays:
        // 1. Parallel ray (RED): from tip, parallel to axis → after lens, through F'
        // 2. Central ray (BLUE): from tip, through lens center → straight
        // 3. Focal ray (GREEN): from tip, through F → after lens, parallel to axis

        const fRightX = LENS_X + focalLength;
        const fLeftX = LENS_X - focalLength;

        // Calculate ray paths
        // After-lens convergence point
        let convergeX, convergeY;
        if (real) {
          convergeX = imgX;
          convergeY = imgTipY; // inverted: AXIS_Y + (AXIS_Y - objTipY) * v/u
        } else {
          convergeX = imgX; // virtual image location (left of lens)
          convergeY = imgTipY;
        }

        // --- Ray 1: Parallel → through F' (RED) ---
        {
          const r1StartX = objTipX;
          const r1StartY = objTipY;
          const r1LensY = objTipY; // arrives at lens at same height
          const r1EndX = fRightX; // after lens, goes through F'
          const r1EndY = AXIS_Y;

          if (real) {
            // Real image: ray actually goes through F' to image
            drawRaySegment(r1StartX, r1StartY, LENS_X, r1LensY, '#ef4444', 2.5, 'solid');
            drawRaySegment(LENS_X, r1LensY, convergeX, convergeY, '#ef4444', 2.5, 'solid');
            // Extend past image
            if (convergeX < canvas.width / dpr - 30) {
              drawRaySegment(convergeX, convergeY, Math.min(convergeX + 60, canvas.width / dpr - 10), convergeY + (convergeY - r1LensY) / (convergeX - LENS_X) * 60, '#ef4444', 1.5, 'dashed');
            }
          } else {
            // Virtual image: ray goes through F' direction, dashed extension back to virtual image
            drawRaySegment(r1StartX, r1StartY, LENS_X, r1LensY, '#ef4444', 2.5, 'solid');
            // After lens: actual ray goes toward F' (down-right)
            const r1AfterEndX = Math.min(LENS_X + 300, canvas.width / dpr - 10);
            const r1AfterEndY = AXIS_Y + (r1AfterEndX - LENS_X) * (AXIS_Y - r1LensY) / (LENS_X - fRightX);
            drawRaySegment(LENS_X, r1LensY, r1AfterEndX, r1AfterEndY, '#ef4444', 2.5, 'solid');
            // Dashed backward extension to virtual image
            drawRaySegment(LENS_X, r1LensY, convergeX, convergeY, '#ef4444', 1.5, 'dashed');
          }
        }

        // --- Ray 2: Central ray → straight through (BLUE) ---
        {
          const r2StartX = objTipX;
          const r2StartY = objTipY;
          if (real) {
            drawRaySegment(r2StartX, r2StartY, LENS_X, AXIS_Y, '#3b82f6', 2.5, 'solid');
            drawRaySegment(LENS_X, AXIS_Y, convergeX, convergeY, '#3b82f6', 2.5, 'solid');
            if (convergeX < canvas.width / dpr - 30) {
              const dx = convergeX - LENS_X;
              const dy = convergeY - AXIS_Y;
              drawRaySegment(convergeX, convergeY, convergeX + dx * 60 / Math.abs(dx || 1), convergeY + dy * 60 / Math.abs(dx || 1), '#3b82f6', 1.5, 'dashed');
            }
          } else {
            drawRaySegment(r2StartX, r2StartY, LENS_X, AXIS_Y, '#3b82f6', 2.5, 'solid');
            const r2AfterX = Math.min(LENS_X + 300, canvas.width / dpr - 10);
            const r2AfterY = AXIS_Y + (r2AfterX - LENS_X) * (AXIS_Y - r2StartY) / (LENS_X - r2StartX);
            drawRaySegment(LENS_X, AXIS_Y, r2AfterX, r2AfterY, '#3b82f6', 2.5, 'solid');
            drawRaySegment(LENS_X, AXIS_Y, convergeX, convergeY, '#3b82f6', 1.5, 'dashed');
          }
        }

        // --- Ray 3: Through F → parallel after lens (GREEN) ---
        {
          const r3StartX = objTipX;
          const r3StartY = objTipY;
          const r3LensX = LENS_X;
          // Arrives at lens at some height, determined by line from obj through F
          const dxLF = objTipX - fLeftX;
          const dyLF = objTipY - AXIS_Y;
          const r3LensY = AXIS_Y + dyLF * (LENS_X - fLeftX) / dxLF;

          if (real) {
            drawRaySegment(r3StartX, r3StartY, LENS_X, r3LensY, '#22c55e', 2.5, 'solid');
            drawRaySegment(LENS_X, r3LensY, convergeX, convergeY, '#22c55e', 2.5, 'solid');
          } else {
            // Path from object through F to lens
            // F is to the left of object (object is between F and lens)
            // The ray from object heading toward F would go left
            // Instead, we draw a ray that would go through F if extended backward
            const r3LensY2 = AXIS_Y - (AXIS_Y - objTipY) * (LENS_X - objTipX) / (fLeftX - objTipX);
            drawRaySegment(r3StartX, r3StartY, LENS_X, r3LensY2, '#22c55e', 2.5, 'solid');
            // After lens: parallel to axis
            const r3AfterX = Math.min(LENS_X + 300, canvas.width / dpr - 10);
            drawRaySegment(LENS_X, r3LensY2, r3AfterX, r3LensY2, '#22c55e', 2.5, 'solid');
            // Dashed backward extension
            drawRaySegment(LENS_X, r3LensY2, convergeX, convergeY, '#22c55e', 1.5, 'dashed');
          }
        }

        ctx.restore();
      }

      function drawParallelRaysCase(objTipX, objTipY) {
        const dpr = window.devicePixelRatio || 1;
        ctx.save();
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const objX = getObjX();
        // When u ≈ f, all rays emerge parallel
        const r1LensY = objTipY;
        const fRightX = LENS_X + focalLength;

        // Red: parallel → through F' (now parallel to that direction)
        drawRaySegment(objTipX, objTipY, LENS_X, r1LensY, '#ef4444', 2.5, 'solid');
        const r1EndX = Math.min(LENS_X + 250, canvas.width / dpr - 10);
        const r1EndY = AXIS_Y + (r1EndX - LENS_X) * (AXIS_Y - r1LensY) / (LENS_X - fRightX);
        drawRaySegment(LENS_X, r1LensY, r1EndX, r1EndY, '#ef4444', 2.5, 'solid');

        // Blue: central ray
        drawRaySegment(objTipX, objTipY, LENS_X, AXIS_Y, '#3b82f6', 2.5, 'solid');
        const r2EndX = Math.min(LENS_X + 250, canvas.width / dpr - 10);
        const r2EndY = AXIS_Y + (r2EndX - LENS_X) * (AXIS_Y - objTipY) / (LENS_X - objTipX);
        drawRaySegment(LENS_X, AXIS_Y, r2EndX, r2EndY, '#3b82f6', 2.5, 'solid');

        // Green: through F → parallel
        const fLeftX = LENS_X - focalLength;
        const r3LensY = AXIS_Y + (objTipY - AXIS_Y) * (LENS_X - fLeftX) / (objTipX - fLeftX);
        drawRaySegment(objTipX, objTipY, LENS_X, r3LensY, '#22c55e', 2.5, 'solid');
        const r3EndX = Math.min(LENS_X + 250, canvas.width / dpr - 10);
        drawRaySegment(LENS_X, r3LensY, r3EndX, r3LensY, '#22c55e', 2.5, 'solid');

        // Label: image at infinity
        ctx.fillStyle = '#ef4444';
        ctx.font = 'bold 14px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('折射光线平行射出，不成像（或像在无穷远）', LENS_X + 170, AXIS_Y - 30);

        ctx.restore();
      }

      function drawRaySegment(x1, y1, x2, y2, color, width, style) {
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.globalAlpha = style === 'dashed' ? 0.5 : 0.85;
        if (style === 'dashed') ctx.setLineDash([6, 4]);
        else ctx.setLineDash([]);

        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();

        ctx.setLineDash([]);
        ctx.globalAlpha = 1;

        // Arrowhead at end for solid rays
        if (style === 'solid') {
          const angle = Math.atan2(y2 - y1, x2 - x1);
          const arrowLen = 10;
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.moveTo(x2, y2);
          ctx.lineTo(
            x2 - arrowLen * Math.cos(angle - 0.5),
            y2 - arrowLen * Math.sin(angle - 0.5)
          );
          ctx.lineTo(
            x2 - arrowLen * Math.cos(angle + 0.5),
            y2 - arrowLen * Math.sin(angle + 0.5)
          );
          ctx.closePath();
          ctx.fill();
        }
      }

      function drawDistanceMarkers() {
        const dpr = window.devicePixelRatio || 1;
        ctx.save();
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const objX = getObjX();
        const bottomY = AXIS_Y + LENS_HALF_H + 50;

        // u: distance from object to lens
        drawBrace(objX, bottomY, LENS_X, bottomY, '#64748b', 'u = ' + Math.round(objDist) + ' px');

        const v = getImageDist();
        if (isFinite(v) && Math.abs(v) > 1 && isRealImage()) {
          const imgX = LENS_X + v;
          if (imgX < canvas.width / dpr - 30) {
            drawBrace(LENS_X, bottomY, imgX, bottomY, '#ef4444', 'v = ' + Math.round(v) + ' px');
          }
        }

        // Focal length marker
        drawBrace(LENS_X - focalLength, bottomY + 20, LENS_X, bottomY + 20, '#f59e0b', 'f = ' + Math.round(focalLength) + ' px');

        ctx.restore();
      }

      function drawBrace(x1, y, x2, y, color, label) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        ctx.setLineDash([]);
        // Horizontal line
        ctx.beginPath();
        ctx.moveTo(x1, y);
        ctx.lineTo(x2, y);
        ctx.stroke();
        // End caps
        ctx.beginPath();
        ctx.moveTo(x1, y - 5);
        ctx.lineTo(x1, y + 5);
        ctx.moveTo(x2, y - 5);
        ctx.lineTo(x2, y + 5);
        ctx.stroke();
        // Label
        ctx.fillStyle = color;
        ctx.font = '11px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(label, (x1 + x2) / 2, y - 6);
      }

      function updateDataPanel() {
        const v = getImageDist();
        const real = isRealImage();

        document.getElementById('valU').textContent = Math.round(objDist);
        document.getElementById('valF').textContent = Math.round(focalLength);

        const valV = document.getElementById('valV');
        const valM = document.getElementById('valM');
        const valType = document.getElementById('valType');

        if (!isFinite(v) || Math.abs(v) < 0.5) {
          valV.textContent = '∞';
          valV.className = 'val orange';
          valM.textContent = '∞';
          valM.className = 'val orange';
          valType.textContent = '不成像（平行光）';
          valType.className = 'val';
        } else {
          valV.textContent = real ? Math.round(v) : Math.round(v);
          valV.className = real ? 'val red' : 'val';
          const m = Math.abs(v) / objDist;
          valM.textContent = m.toFixed(1) + '×';
          valM.className = 'val';

          if (real) {
            if (m > 1.05) valType.textContent = '倒立放大实像';
            else if (m < 0.95) valType.textContent = '倒立缩小实像';
            else valType.textContent = '倒立等大实像';
            valType.className = 'val red';
          } else {
            valType.textContent = '正立放大虚像';
            valType.className = 'val';
            valType.style.color = '#8b5cf6';
          }
        }
      }

      function render() {
        resizeCanvas();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        drawGrid();
        drawOpticalAxis();
        drawConvexLens();
        drawFocalPoints();
        const objX = getObjX();
        if (objX > 40) {
          drawCandle(objX, getObjTopY());
          drawRays();
          drawImage();
        }
        drawDistanceMarkers();
        updateDataPanel();

        requestAnimationFrame(render);
      }

      // --- Interaction ---
      function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        return {
          x: (e.clientX - rect.left) * (canvas.width / dpr) / rect.width,
          y: (e.clientY - rect.top) * (canvas.height / dpr) / rect.height
        };
      }

      function hitTest(x, y) {
        // Check object (candle)
        const objX = getObjX();
        const objTopY = getObjTopY();
        if (Math.abs(x - objX) < 25 && y > objTopY - 10 && y < AXIS_Y + 15) {
          return { target: 'object', offX: x - objX };
        }
        // Check left focal point F
        const fLeftX = LENS_X - focalLength;
        if (Math.abs(x - fLeftX) < 15 && Math.abs(y - AXIS_Y) < 15) {
          return { target: 'focalLeft', offX: x - fLeftX };
        }
        // Check right focal point F'
        const fRightX = LENS_X + focalLength;
        if (Math.abs(x - fRightX) < 15 && Math.abs(y - AXIS_Y) < 15) {
          return { target: 'focalRight', offX: x - fRightX };
        }
        return null;
      }

      canvas.addEventListener('mousedown', function(e) {
        const pos = getCanvasPos(e);
        const hit = hitTest(pos.x, pos.y);
        if (hit) {
          dragging = hit.target;
          dragOffX = hit.offX;
          canvas.style.cursor = 'grabbing';
          updatePresetButtons();
        }
      });

      canvas.addEventListener('mousemove', function(e) {
        const pos = getCanvasPos(e);
        if (dragging) {
          if (dragging === 'object') {
            const newObjX = pos.x - dragOffX;
            objDist = Math.max(50, Math.min(450, LENS_X - newObjX));
          } else if (dragging === 'focalLeft') {
            const newFX = pos.x - dragOffX;
            focalLength = Math.max(80, Math.min(280, LENS_X - newFX));
            document.getElementById('focalSlider').value = focalLength;
            document.getElementById('focalVal').textContent = focalLength;
          } else if (dragging === 'focalRight') {
            const newFX = pos.x - dragOffX;
            focalLength = Math.max(80, Math.min(280, newFX - LENS_X));
            document.getElementById('focalSlider').value = focalLength;
            document.getElementById('focalVal').textContent = focalLength;
          }
          document.getElementById('focalVal').textContent = focalLength;
          updatePresetButtons();
        } else {
          const hit = hitTest(pos.x, pos.y);
          canvas.style.cursor = hit ? 'grab' : 'default';
        }
      });

      canvas.addEventListener('mouseup', function() {
        dragging = null;
        canvas.style.cursor = 'default';
      });

      canvas.addEventListener('mouseleave', function() {
        dragging = null;
        canvas.style.cursor = 'default';
      });

      // Touch support
      canvas.addEventListener('touchstart', function(e) {
        if (e.touches.length === 1) {
          const pos = getCanvasPos(e.touches[0]);
          const hit = hitTest(pos.x, pos.y);
          if (hit) {
            dragging = hit.target;
            dragOffX = hit.offX;
            e.preventDefault();
            updatePresetButtons();
          }
        }
      }, { passive: false });

      canvas.addEventListener('touchmove', function(e) {
        if (dragging && e.touches.length === 1) {
          const pos = getCanvasPos(e.touches[0]);
          if (dragging === 'object') {
            const newObjX = pos.x - dragOffX;
            objDist = Math.max(50, Math.min(450, LENS_X - newObjX));
          } else if (dragging === 'focalLeft') {
            const newFX = pos.x - dragOffX;
            focalLength = Math.max(80, Math.min(280, LENS_X - newFX));
            document.getElementById('focalSlider').value = focalLength;
            document.getElementById('focalVal').textContent = focalLength;
          } else if (dragging === 'focalRight') {
            const newFX = pos.x - dragOffX;
            focalLength = Math.max(80, Math.min(280, newFX - LENS_X));
            document.getElementById('focalSlider').value = focalLength;
            document.getElementById('focalVal').textContent = focalLength;
          }
          document.getElementById('focalVal').textContent = focalLength;
          e.preventDefault();
          updatePresetButtons();
        }
      }, { passive: false });

      canvas.addEventListener('touchend', function() {
        dragging = null;
      });

      // Slider
      document.getElementById('focalSlider').addEventListener('input', function() {
        focalLength = parseInt(this.value);
        document.getElementById('focalVal').textContent = focalLength;
        updatePresetButtons();
      });

      // Preset buttons
      function updatePresetButtons() {
        const ratio = objDist / focalLength;
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        if (ratio < 0.9) document.getElementById('btnPreset1').classList.add('active');
        else if (ratio < 1.1) document.getElementById('btnPreset2').classList.add('active');
        else if (ratio < 1.6) document.getElementById('btnPreset3').classList.add('active');
        else document.getElementById('btnPreset4').classList.add('active');
      }

      window.setPreset = function(ratio) {
        objDist = Math.round(focalLength * ratio);
        if (ratio < 1.0) objDist = Math.max(50, Math.round(focalLength * 0.5));
        updatePresetButtons();
      };

      // Initial state: u = 2f
      objDist = focalLength * 2;
      updatePresetButtons();

      // Start render loop
      render();
    })();
  </script>
</body>
</html>
