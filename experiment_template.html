<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>虚拟实验 - [实验名称]</title>
  <!-- 引入全局样式以继承科技感背景和字体 -->
  <link rel="stylesheet" href="style.css">
  <style>
    /* 实验专用布局优化 */
    .lab-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }
    .lab-frame {
      width: 100%;
      height: 700px;
      background: var(--bg-dark);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      position: relative;
    }
    /* 模拟器占位提示 */
    .lab-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
    }
    .lab-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 1.5rem;
    }
    .lab-title h2 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(to right, #fff, var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .back-btn {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
    }
    .back-btn:hover {
      color: var(--primary);
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">物理虚拟实验平台</div>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="experiments.html">返回目录</a>
    </nav>
  </header>

  <main class="lab-container">
    <div class="lab-header">
      <div class="lab-title">
        <h2>实验项目：[请在此处输入您的实验名称]</h2>
        <p style="color: var(--text-muted)">适用章节：八年级下册 第八章 第一节</p>
      </div>
      <a href="experiments.html" class="back-btn">← 返回实验列表</a>
    </div>

    <!-- 核心实验内容区域 -->
    <div class="lab-frame">
      <!-- 
        建议 1：如果您的实验是一个独立的 .html 文件，请使用 <iframe> 嵌入 
        <iframe src="your_experiment_core.html" width="100%" height="100%" frameborder="0"></iframe>
      -->

      <!-- 建议 2：或者直接在这里编写您的实验代码（Canvas / JS / Three.js） -->
      <div class="lab-placeholder">
        <div style="font-size: 4rem; margin-bottom: 1rem;">⚙️</div>
        <p>虚拟实验加载区域</p>
        <p style="font-size: 0.8rem; margin-top: 1rem;">请将您的虚拟实验代码放入此处</p>
      </div>
    </div>

    <!-- 实验说明与思考 -->
    <div class="section" style="margin-top: 3rem; padding: 0;">
      <div class="card">
        <h3 style="color: var(--secondary); margin-bottom: 1rem;">实验原理</h3>
        <p>在此处简述实验的科学原理，例如：牛顿第一定律（惯性定律）...</p>
      </div>
      <div class="card" style="margin-top: 1.5rem;">
        <h3 style="color: var(--secondary); margin-bottom: 1rem;">操作指南</h3>
        <ol style="padding-left: 1.2rem; color: var(--text-muted);">
          <li>使用鼠标拖动滑块调节斜面粗糙度</li>
          <li>点击“开始”按钮释放小球</li>
          <li>观察小球在不同水平面上的运动距离</li>
        </ol>
      </div>
    </div>
  </main>

  <!-- 继承全局动画背景 -->
  <script src="script.js"></script>
</body>
</html>
