<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=10">
  <title>单摆 — 机械能转化与耗散 - 物理虚拟实验</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/addons/p5.dom.min.js"></script>
  <style>
    .main-card { max-width: 900px; margin: 0 auto 24px; padding: 0 16px; }
    .canvas-wrap { border-radius: 12px; padding: 4px; width: 100%; box-sizing: border-box; border: 1px solid #e2e8f0; position: relative; background: #fff; }
    .controls-bar { display: flex; align-items: center; justify-content: center; padding: 12px 16px; gap: 18px; flex-wrap: wrap; background: #1a1a2e; border-radius: 0 0 12px 12px; border-top: 1px solid #333; color: #ccc; font-size: 13px; }
    .controls-bar .ctrl-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .controls-bar label { color: #ccc; font-size: 12px; white-space: nowrap; }
    .controls-bar input[type="range"] { width: 120px; accent-color: #8b5cf6; }
    .btn { border: 2px solid #555; background: transparent; color: #aaa; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
    .btn:hover { border-color: #8b5cf6; color: #fff; }
    .hint-text { color: #888; font-size: 12px; }
    .section { padding: 1.5rem 2rem 0.5rem; }
    .section h2 { font-size: 1.4rem; }
    .formula-bar { max-width: 900px; margin: 0 auto 24px; padding: 0 16px; display: flex; gap: 12px; flex-wrap: wrap; }
    .formula-item { flex: 1; min-width: 180px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px 16px; }
    .formula-item .label { color: #64748b; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; }
    .formula-item .value { color: #e2e8f0; font-size: 13px; }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">物理虚拟实验</div>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="experiments.html">实验列表</a>
    </nav>
  </header>

  <div class="section">
    <h2>单摆 — 机械能转化与耗散</h2>
    <p style="color:#94a3b8;margin:0 0 16px 0;">拖拽摆球释放，观察重力势能与动能的相互转化。摆球与空气分子碰撞，机械能逐渐转化为内能（分子热运动）。</p>
  </div>

  <div class="main-card">
    <div class="canvas-wrap">
      <div id="myContainer"></div>
    </div>
    <div class="controls-bar">
      <div class="ctrl-col">
        <label id="labelA">空气分子数量</label>
        <input type="range" id="rangeA" min="0" max="200" value="80">
      </div>
      <button class="btn" id="buttonRst">重置</button>
      <span class="hint-text">拖拽红色摆球释放 | 观察能量转化与耗散</span>
    </div>
  </div>

  <div class="formula-bar">
    <div class="formula-item">
      <span class="label">机械能守恒（理想情况）</span>
      <span class="value">Ek + Ep = 常量 &nbsp;—&nbsp; 无外力做功时，动能与重力势能之和不变</span>
    </div>
    <div class="formula-item">
      <span class="label">能量耗散</span>
      <span class="value">摆球碰撞空气分子 → 机械能转化为内能 → 熵增过程不可逆</span>
    </div>
    <div class="formula-item">
      <span class="label">总能量守恒</span>
      <span class="value">E<sub>总</sub> = Ek + Ep + U &nbsp;—&nbsp; 能量不会消失，只会转化形式</span>
    </div>
  </div>

  <script src="protect.js"></script>
  <script>
  function mag(x, y) { return Math.sqrt(x * x + y * y); }

  function getAngle(x, y) {
    var deg = Math.atan2(y, x) * 180 / Math.PI;
    return ((deg % 360) + 360) % 360;
  }

  function mod(x, y) {
    if (x < 0) x += y * (Math.ceil(Math.abs(x) / y) + 1);
    var c = Math.floor(x / y);
    return x - y * c;
  }

  function contain(x, y, x1, y1, w1, h1) {
    if (x < x1 || x > (x1 + w1) || y < y1 || y > (y1 + h1)) return false;
    return true;
  }

  // === 主仿真代码 ===
  var labelA, rangeA, buttonRst;
  var minX = 0, maxX = 1000, minY = 0, maxY = 500;
  var moles = 40;
  var moleX = [], moleY = [], moleVx = [], moleVy = [], moleR = [], moleM = [];
  var pendOX = 500, pendOY = 0, pendL = 400;
  var pendT = 1.570795;
  var pendX, pendY, pendVx, pendVy;
  var dragged = false;

  // Energy tracking
  var initReleaseY = 400;
  var initMechEnergy = 2000;
  var energyBarMax = 2000;
  var bobEk = 0, bobEp = 0, internalEnergy = 0, mechEnergy = 0;
  var rodLostAcc = 0;

  function setup() {
    frameRate(40);
    var o = select("#myContainer");
    var a = 0.5;
    var w = int(min(o.width, (window.innerHeight - 160) / a));
    var h = int(w * a);
    myCanvas = createCanvas(w, h);
    myCanvas.parent("myContainer");
    myCanvas.id("myP5Canvas");

    labelA = select("#labelA");
    labelA.html("空气分子数量");
    rangeA = select("#rangeA");
    buttonRst = select("#buttonRst");
    buttonRst.mouseClicked(setup2);
    buttonRst.html("重置");
    setup2();
  }

  function windowResized() {
    var o = select("#myContainer");
    var a = 0.5;
    var w = int(min(o.width, (window.innerHeight - 160) / a));
    var h = int(w * a);
    resizeCanvas(w, h);
  }

  function setup2() {
    moles = rangeA.value();
    labelA.html(moles == 0 ? "空气分子：0（机械能守恒）" : "空气分子：" + moles);
    for (var i = 0; i < 200; i++) {
      moleX[i] = random(minX, maxX);
      moleY[i] = random(minY, maxY);
      var v = (i == 0) ? 0 : 0.5;
      var t = random(TWO_PI);
      moleVx[i] = v * cos(t);
      moleVy[i] = v * sin(t);
      moleR[i] = (i == 0) ? 30 : 8;
      moleM[i] = (i == 0) ? 100 : 1;
    }
    pendT = 1.570795;
    initReleaseY = pendOY + pendL * Math.sin(pendT);
    initMechEnergy = 100 * 0.2 * (maxY - initReleaseY);
    energyBarMax = initMechEnergy;
    rodLostAcc = 0;
    setup3();
  }

  function setup3() {
    pendX = pendOX + pendL * cos(pendT);
    pendY = pendOY + pendL * sin(pendT);
    pendVx = 0;
    pendVy = 0;
  }

  function draw() {
    if (touches.length > 1) return;
    background(255);
    strokeWeight(1);
    textSize(20);
    textAlign(LEFT, TOP);
    push();
    scale(width / 1000);

    // Draw pivot support arcs
    stroke(255, 128, 0);
    for (var i = 1; i < 18; i++) {
      var t = map(i, 0, 18, 0, PI);
      var x1 = pendOX + 40 * cos(t);
      var y1 = pendOY + 40 * sin(t);
      var x2 = pendOX + 60 * cos(t);
      var y2 = pendOY + 60 * sin(t);
      line(x1, y1, x2, y2);
    }

    moles = rangeA.value();
    labelA.html(moles == 0 ? "空气分子：0（机械能守恒）" : "空气分子：" + moles);

    // Pendulum physics — angular dynamics (symplectic, conserves energy)
    var gravityY = 0.2;
    if (!dragged) {
      // Compute current angle and angular velocity
      var dx1 = pendX - pendOX;
      var dy1 = pendY - pendOY;
      var r1 = sqrt(dx1 * dx1 + dy1 * dy1);
      if (r1 > 0.001) {
        // Tangential velocity → angular velocity
        var vtan = (-pendVx * dy1 + pendVy * dx1) / r1;
        var omega = vtan / pendL;

        // Angular acceleration: α = (g/L) * cos(θ)
        var theta = atan2(dy1, dx1);
        var alpha = (gravityY / pendL) * cos(theta);

        // Semi-implicit Euler (symplectic): update ω first, then θ
        omega += alpha;
        theta += omega;

        // Convert back to cartesian on the circle
        pendX = pendOX + pendL * cos(theta);
        pendY = pendOY + pendL * sin(theta);
        pendVx = -omega * pendL * sin(theta);
        pendVy = omega * pendL * cos(theta);
      }

      // Collision with air molecules
      moleX[0] = pendX;
      moleY[0] = pendY;
      moleVx[0] = pendVx;
      moleVy[0] = pendVy;
      running();
      pendX = moleX[0];
      pendY = moleY[0];
      pendVx = moleVx[0];
      pendVy = moleVy[0];

      // Re-constrain after collisions; track total mechanical energy lost to rod
      var mechPre = 0.5 * 100 * (pendVx * pendVx + pendVy * pendVy) + 100 * 0.2 * (maxY - pendY);
      constrainToRod();
      var mechPost = 0.5 * 100 * (pendVx * pendVx + pendVy * pendVy) + 100 * 0.2 * (maxY - pendY);
      var lost = mechPre - mechPost;
      if (lost > 0) rodLostAcc += lost;
    }

    // Rod direction for drawing
    var dx = pendX - pendOX, dy = pendY - pendOY;
    var l = sqrt(dx * dx + dy * dy);
    var rodX = pendOX + dx * pendL / (l || 1);
    var rodY = pendOY + dy * pendL / (l || 1);

    // === 计算能量 ===
    var bobMass = 100;
    bobEk = 0.5 * bobMass * (pendVx * pendVx + pendVy * pendVy);
    bobEp = bobMass * 0.2 * (maxY - pendY);
    mechEnergy = bobEk + bobEp;

    // Internal energy = air molecule KE + energy lost to rod during collisions
    internalEnergy = 0;
    for (var i = 1; i < moles; i++) {
      internalEnergy += 0.5 * moleM[i] * (moleVx[i] * moleVx[i] + moleVy[i] * moleVy[i]);
    }
    internalEnergy += rodLostAcc;

    var totalEnergy = mechEnergy + internalEnergy;

    // === 初始高度的水平虚线 ===
    stroke(0, 150, 0, 180);
    strokeWeight(1.2);
    drawDashedLine2(0, initReleaseY, 800, initReleaseY);
    noStroke();
    fill(0, 120, 0);
    textAlign(LEFT, BOTTOM);
    textSize(11);
    text("释放高度", 8, initReleaseY - 2);

    // Draw rod
    stroke(0);
    strokeWeight(2.5);
    line(pendOX, pendOY, rodX, rodY);

    // Draw pivot point
    fill(60);
    noStroke();
    ellipse(pendOX, pendOY, 8, 8);

    // Draw pendulum bob
    noStroke();
    fill(255, 60, 60);
    ellipse(rodX, rodY, 2 * moleR[0], 2 * moleR[0]);

    // Speed label on bob
    var bobSpeed = mag(pendVx, pendVy);
    fill(180, 0, 0);
    textAlign(CENTER, BOTTOM);
    textSize(12);
    text("v=" + bobSpeed.toFixed(2), rodX, rodY - moleR[0] - 5);

    // Draw air molecules
    noStroke();
    for (var i = 1; i < moles; i++) {
      fill(64, 100, 230);
      ellipse(moleX[i], moleY[i], moleR[i], moleR[i]);
    }

    // === 能量条（右侧） ===
    drawEnergyBars();

    // === 左上角数据面板 ===
    fill(255, 255, 255, 220);
    stroke(200);
    strokeWeight(0.8);
    rect(5, 5, 215, 73, 5);
    noStroke();
    textAlign(LEFT, TOP);
    textSize(12);
    // Status line
    if (moles == 0) {
      fill(0, 140, 60);
      text("Ek + Ep = 机械能 (守恒)", 10, 10);
    } else {
      fill(200, 80, 0);
      text("Ek + Ep + U = 总能量 (机械能耗散中)", 10, 10);
    }
    fill(0);
    text("Ek=" + bobEk.toFixed(1) + "  Ep=" + bobEp.toFixed(1) + "  U=" + internalEnergy.toFixed(1), 10, 28);
    text("Mech = " + mechEnergy.toFixed(1) + "  Total = " + totalEnergy.toFixed(1), 10, 46);
    var avgV = 0;
    for (var i = 1; i < moles; i++) avgV += mag(moleVx[i], moleVy[i]);
    if (moles > 1) avgV /= (moles - 1);
    text("v=" + bobSpeed.toFixed(2) + "  v_avg=" + avgV.toFixed(3) + "  N=" + moles, 10, 64);

    pop();
  }

  function drawEnergyBars() {
    fill(255, 255, 255, 210);
    stroke(180);
    strokeWeight(0.8);
    var px = 810, py = 60, pw = 180, ph = 390;
    rect(px, py, pw, ph, 6);

    noStroke();
    fill(0);
    textAlign(CENTER, TOP);
    textSize(13);
    text("能量分布 (参考=" + initMechEnergy.toFixed(0) + ")", px + pw / 2, py + 8);

    var barX = px + 15;
    var barW = 34;
    var barBase = py + ph - 25;
    var barMaxH = 290;

    function drawBar(bx, val, label, color, maxVal) {
      var h = constrain(val / maxVal * barMaxH, 0, barMaxH);
      noStroke();
      fill(color[0], color[1], color[2], 200);
      rect(bx, barBase - h, barW, h, 3);
      stroke(130);
      strokeWeight(0.5);
      noFill();
      rect(bx, barBase - h, barW, h, 3);
      if (h > 15) {
        noStroke();
        fill(255);
        textAlign(CENTER, CENTER);
        textSize(10);
        push();
        translate(bx + barW / 2, barBase - h / 2);
        rotate(-HALF_PI);
        text(val.toFixed(0), 0, 0);
        pop();
      }
      noStroke();
      fill(color[0], color[1], color[2]);
      textAlign(CENTER, TOP);
      textSize(11);
      text(val.toFixed(0), bx + barW / 2, barBase + 2);
      textSize(9);
      fill(80);
      text(label, bx + barW / 2, barBase + 16);
    }

    // Bar variant: uses val for height, but displays refVal as the number
    function drawBarRef(bx, val, label, color, maxVal, refVal) {
      var h = constrain(val / maxVal * barMaxH, 0, barMaxH);
      var refH = constrain(refVal / maxVal * barMaxH, 0, barMaxH);
      // Reference line
      stroke(180);
      strokeWeight(0.5);
      drawDashedLine2(bx, barBase - refH, bx + barW, barBase - refH);
      // Bar
      noStroke();
      fill(color[0], color[1], color[2], 200);
      rect(bx, barBase - h, barW, h, 3);
      stroke(130);
      strokeWeight(0.5);
      noFill();
      rect(bx, barBase - h, barW, h, 3);
      if (h > 15) {
        noStroke();
        fill(255);
        textAlign(CENTER, CENTER);
        textSize(10);
        push();
        translate(bx + barW / 2, barBase - h / 2);
        rotate(-HALF_PI);
        text(val.toFixed(0), 0, 0);
        pop();
      }
      // Show reference number (fixed, doesn't change)
      noStroke();
      fill(color[0], color[1], color[2]);
      textAlign(CENTER, TOP);
      textSize(11);
      text(refVal.toFixed(0), bx + barW / 2, barBase + 2);
      textSize(9);
      fill(80);
      text(label, bx + barW / 2, barBase + 16);
    }

    var refMax = initMechEnergy;
    drawBar(barX, bobEk, "动能Ek", [60, 140, 240], refMax);
    drawBar(barX + barW + 5, bobEp, "势能Ep", [40, 160, 40], refMax);
    // Mech energy bar: height = current mechEnergy, label = fixed reference
    drawBarRef(barX + 2*(barW + 5), mechEnergy, "机械能", [140, 60, 200], refMax, initMechEnergy);
    drawBar(barX + 3*(barW + 5), internalEnergy, "内能U", [230, 100, 30], refMax);

    // Ek + Ep = MechE indicator
    noStroke();
    fill(100);
    textAlign(CENTER, TOP);
    textSize(10);
    text("Ek+Ep=" + (bobEk+bobEp).toFixed(0), barX + barW/2 + (barW+5), barBase - barMaxH - 15);

    // Status
    if (moles == 0) {
      fill(0, 140, 60);
    } else {
      fill(200, 80, 0);
    }
    textAlign(CENTER, TOP);
    textSize(11);
    text(moles == 0 ? "机械能守恒" : "机械能耗散中", px + pw / 2, barBase + 33);

    fill(100);
    textSize(10);
    var totalE = mechEnergy + internalEnergy;
    text("总能量: " + totalE.toFixed(0), px + pw / 2, barBase + 50);
  }

  function drawDashedLine2(x1, y1, x2, y2) {
    var d = dist(x1, y1, x2, y2);
    var steps = d / 12;
    for (var i = 0; i < steps; i += 2) {
      var t1 = i / steps;
      var t2 = min((i + 1) / steps, 1);
      line(lerp(x1, x2, t1), lerp(y1, y2, t1), lerp(x1, x2, t2), lerp(y1, y2, t2));
    }
  }

  function constrainToRod() {
    var dx = pendX - pendOX;
    var dy = pendY - pendOY;
    var dist = sqrt(dx * dx + dy * dy);
    if (dist < 0.001) return;
    // Project position onto circle
    pendX = pendOX + dx * pendL / dist;
    pendY = pendOY + dy * pendL / dist;
    // Remove radial velocity (only tangential velocity remains)
    var nx = dx / dist;
    var ny = dy / dist;
    var vr = pendVx * nx + pendVy * ny;
    pendVx -= vr * nx;
    pendVy -= vr * ny;
  }

  // Constrain a molecule to the rod circle — used during collisions to keep bob on track.
  // Returns mechanical energy lost (transferred to rod / dissipated).
  function constrainMoleculeRod(idx) {
    var dx = moleX[idx] - pendOX;
    var dy = moleY[idx] - pendOY;
    var dist = sqrt(dx * dx + dy * dy);
    if (dist < 0.001) return 0;
    // Mechanical energy before constraint
    var mechPre = 0.5 * moleM[idx] * (moleVx[idx] * moleVx[idx] + moleVy[idx] * moleVy[idx])
                + moleM[idx] * 0.2 * (maxY - moleY[idx]);
    // Project position onto circle
    moleX[idx] = pendOX + dx * pendL / dist;
    moleY[idx] = pendOY + dy * pendL / dist;
    // Remove radial velocity component
    var nx = dx / dist;
    var ny = dy / dist;
    var vr = moleVx[idx] * nx + moleVy[idx] * ny;
    moleVx[idx] -= vr * nx;
    moleVy[idx] -= vr * ny;
    // Mechanical energy after constraint
    var mechPost = 0.5 * moleM[idx] * (moleVx[idx] * moleVx[idx] + moleVy[idx] * moleVy[idx])
                 + moleM[idx] * 0.2 * (maxY - moleY[idx]);
    var lost = mechPre - mechPost;
    return lost > 0 ? lost : 0;
  }

  function running() {
    var n = moles;
    for (var i = 0; i < n - 1; i++) {
      for (var j = i + 1; j < n; j++) {
        var pix = moleX[i] + moleVx[i];
        var piy = moleY[i] + moleVy[i];
        var pjx = moleX[j] + moleVx[j];
        var pjy = moleY[j] + moleVy[j];
        if (abs(moleX[i] - moleX[j]) < (moleR[i] + moleR[j]) &&
            abs(moleY[i] - moleY[j]) < (moleR[i] + moleR[j])) {
          if (dist(moleX[i], moleY[i], moleX[j], moleY[j]) < (moleR[i] + moleR[j]) &&
              dist(moleX[i], moleY[i], moleX[j], moleY[j]) > dist(pix, piy, pjx, pjy)) {
            var vcx = (moleM[i] * moleVx[i] + moleM[j] * moleVx[j]) / (moleM[i] + moleM[j]);
            var vcy = (moleM[i] * moleVy[i] + moleM[j] * moleVy[j]) / (moleM[i] + moleM[j]);
            var vcix = moleVx[i] - vcx;
            var vciy = moleVy[i] - vcy;
            var vcjx = moleVx[j] - vcx;
            var vcjy = moleVy[j] - vcy;
            var vci = mag(vcix, vciy);
            var vcj = mag(vcjx, vcjy);
            var aci = getAngle(vcix, vciy);
            var acj = getAngle(vcjx, vcjy);
            var aij = getAngle(moleX[j] - moleX[i], moleY[j] - moleY[i]);
            var aji = getAngle(moleX[i] - moleX[j], moleY[i] - moleY[j]);
            aci = mod(2 * aij + 180 - aci, 360);
            acj = mod(2 * aji + 180 - acj, 360);
            var aciRad = aci * Math.PI / 180;
            var acjRad = acj * Math.PI / 180;
            moleVx[i] = vci * Math.cos(aciRad);
            moleVy[i] = vci * Math.sin(aciRad);
            moleVx[j] = vcj * Math.cos(acjRad);
            moleVy[j] = vcj * Math.sin(acjRad);
            moleVx[i] += vcx;
            moleVy[i] += vcy;
            moleVx[j] += vcx;
            moleVy[j] += vcy;
            // Immediately re-constrain bob after each collision to prevent
            // cascading off-circle errors across multiple collisions per frame.
            if (i == 0 || j == 0) {
              rodLostAcc += constrainMoleculeRod(0);
            }
          }
        }
      }
    }
    // Update air molecule positions only (bob at index 0 is moved by angular dynamics)
    for (var k = 1; k < n; k++) {
      moleX[k] += moleVx[k];
      moleY[k] += moleVy[k];
      if (moleX[k] < minX + moleR[k]) moleVx[k] = abs(moleVx[k]);
      if (moleX[k] > maxX - moleR[k]) moleVx[k] = -abs(moleVx[k]);
      if (moleY[k] < minY + moleR[k]) moleVy[k] = abs(moleVy[k]);
      if (moleY[k] > maxY - moleR[k]) moleVy[k] = -abs(moleVy[k]);
    }
    // Ensure bob position stays on rod after collision velocity changes
    rodLostAcc += constrainMoleculeRod(0);
  }

  // === 鼠标/触摸交互 ===
  function onDragMove() {
    pendT = atan2(mouseY * 1000 / width - pendOY, mouseX * 1000 / width - pendOX);
    pendT = constrain(pendT, 0.05, PI - 0.05);
    setup3();
    initReleaseY = pendY;
    initMechEnergy = max(20 * (maxY - pendY), 500);
    energyBarMax = initMechEnergy;
    return false;
  }

  function onDragEnd() {
    initReleaseY = pendY;
    initMechEnergy = max(20 * (maxY - pendY), 500);
    energyBarMax = initMechEnergy;
    rodLostAcc = 0;
    dragged = false;
  }

  function mousePressed() {
    if (!contain(mouseX, mouseY, 0, 0, width, height)) return;
    dragged = true;
    return false;
  }

  function mouseDragged() { if (dragged) return onDragMove(); }
  function mouseReleased() { if (dragged) onDragEnd(); }

  function touchStarted() {
    if (!contain(mouseX, mouseY, 0, 0, width, height)) return;
    if (touches.length > 1) return;
    dragged = true;
    return false;
  }

  function touchMoved() { if (touches.length > 1) return; if (dragged) return onDragMove(); }
  function touchEnded() { if (dragged) onDragEnd(); }
  </script>
</body>
</html>
