    <p style="color:#94a3b8;margin:0 0 16px 0;">拖拽摆球释放，观察重力势能与动能的相互转化。摆球与空气分子碰撞，机械能逐渐转化为内能（分子热运动）。</p>

  <script>
  function mag(x, y) { return Math.sqrt(x * x + y * y); }

  function getAngle(x, y) {
    var deg = Math.atan2(y, x) * 180 / Math.PI;
    return ((deg % 360) + 360) % 360;
  }

  function mod(x, y) {
    if (x < 0) x += y * (Math.ceil(Math.abs(x) / y) + 1);
    var c = Math.floor(x / y);
    return x - y * c;
  }

  function contain(x, y, x1, y1, w1, h1) {
    if (x < x1 || x > (x1 + w1) || y < y1 || y > (y1 + h1)) return false;
    return true;
  }

  // === 主仿真代码 ===
  var labelA, rangeA, buttonRst, buttonPause;
  var minX = 0, maxX = 1000, minY = 0, maxY = 500;
  var moles = 40;
  var moleX = [], moleY = [], moleVx = [], moleVy = [], moleR = [], moleM = [];
  var pendOX = 500, pendOY = 0, pendL = 400;
  var pendT = 1.570795;
  var pendX, pendY, pendVx, pendVy;
  var dragged = false;
  var paused = false;

  // Energy tracking
  var initReleaseY = 400;
  var initMechEnergy = 2000;
  var energyBarMax = 2000;
  var bobEk = 0, bobEp = 0, internalEnergy = 0, mechEnergy = 0;
  var rodLostAcc = 0;

  function setup() {
    frameRate(40);
    var o = select("#myContainer");
    var a = 0.5;
    var w = int(min(o.width, (window.innerHeight - 160) / a));
    var h = int(w * a);
    myCanvas = createCanvas(w, h);
    myCanvas.parent("myContainer");
    myCanvas.id("myP5Canvas");

    labelA = select("#labelA");
    labelA.html("空气分子数量");
    rangeA = select("#rangeA");
    buttonRst = select("#buttonRst");
    buttonRst.mouseClicked(setup2);
    buttonRst.html("重置");
    buttonPause = select("#buttonPause");
    buttonPause.mouseClicked(function() {
      paused = !paused;
      buttonPause.html(paused ? "继续" : "暂停");
    });
    buttonPause.html("暂停");
    setup2();
  }

  function windowResized() {
    var o = select("#myContainer");
    var a = 0.5;
    var w = int(min(o.width, (window.innerHeight - 160) / a));
    var h = int(w * a);
    resizeCanvas(w, h);
  }

  function setup2() {
    moles = rangeA.value();
    labelA.html(moles == 0 ? "空气分子：0（机械能守恒）" : "空气分子：" + moles);
    for (var i = 0; i < 200; i++) {
      moleX[i] = random(minX, maxX);
      moleY[i] = random(minY, maxY);
      var v = (i == 0) ? 0 : 0.5;
      var t = random(TWO_PI);
      moleVx[i] = v * cos(t);
      moleVy[i] = v * sin(t);
      moleR[i] = (i == 0) ? 30 : 8;
      moleM[i] = (i == 0) ? 100 : 1;
    }
    pendT = 1.570795;
    initReleaseY = pendOY + pendL * Math.sin(pendT);
    initMechEnergy = Math.round(100 * 0.2 * (maxY - initReleaseY));
    energyBarMax = initMechEnergy;
    rodLostAcc = 0;
    setup3();
  }

  function setup3() {
    pendX = pendOX + pendL * cos(pendT);
    pendY = pendOY + pendL * sin(pendT);
    pendVx = 0;
    pendVy = 0;
  }

  function draw() {
    if (touches.length > 1) return;
    background(255);
    strokeWeight(1);
    textSize(20);
    textAlign(LEFT, TOP);
    push();
    scale(width / 1000);

    // Draw pivot support arcs
    stroke(255, 128, 0);
    for (var i = 1; i < 18; i++) {
      var t = map(i, 0, 18, 0, PI);
      var x1 = pendOX + 40 * cos(t);
      var y1 = pendOY + 40 * sin(t);
      var x2 = pendOX + 60 * cos(t);
      var y2 = pendOY + 60 * sin(t);
      line(x1, y1, x2, y2);
    }

    moles = rangeA.value();
    labelA.html(moles == 0 ? "空气分子：0（机械能守恒）" : "空气分子：" + moles);

    // Pendulum physics — angular dynamics (symplectic, conserves energy)
    var gravityY = 0.2;
    if (!dragged && !paused) {
      // Compute current angle and angular velocity
      var dx1 = pendX - pendOX;
      var dy1 = pendY - pendOY;
      var r1 = sqrt(dx1 * dx1 + dy1 * dy1);
      if (r1 > 0.001) {
        // Tangential velocity → angular velocity
        var vtan = (-pendVx * dy1 + pendVy * dx1) / r1;
        var omega = vtan / pendL;

        // Angular acceleration: α = (g/L) * cos(θ)
        var theta = atan2(dy1, dx1);
        var alpha = (gravityY / pendL) * cos(theta);

        // Semi-implicit Euler (symplectic): update ω first, then θ
        omega += alpha;
        theta += omega;

        // Convert back to cartesian on the circle
        pendX = pendOX + pendL * cos(theta);
        pendY = pendOY + pendL * sin(theta);
        pendVx = -omega * pendL * sin(theta);
        pendVy = omega * pendL * cos(theta);
      }

      // Collision with air molecules
      moleX[0] = pendX;
      moleY[0] = pendY;
      moleVx[0] = pendVx;
      moleVy[0] = pendVy;
      running();
      pendX = moleX[0];
      pendY = moleY[0];
      pendVx = moleVx[0];
      pendVy = moleVy[0];

      // Re-constrain after collisions; track total mechanical energy lost to rod
      var mechPre = 0.5 * 100 * (pendVx * pendVx + pendVy * pendVy) + 100 * 0.2 * (maxY - pendY);
      constrainToRod();
      var mechPost = 0.5 * 100 * (pendVx * pendVx + pendVy * pendVy) + 100 * 0.2 * (maxY - pendY);
      var lost = mechPre - mechPost;
      if (lost > 0) rodLostAcc += lost;
    }

    // Rod direction for drawing
    var dx = pendX - pendOX, dy = pendY - pendOY;
    var l = sqrt(dx * dx + dy * dy);
    var rodX = pendOX + dx * pendL / (l || 1);
    var rodY = pendOY + dy * pendL / (l || 1);

    // === 计算能量 ===
    var bobMass = 100;
    bobEk = 0.5 * bobMass * (pendVx * pendVx + pendVy * pendVy);
    bobEp = bobMass * 0.2 * (maxY - pendY);
    mechEnergy = bobEk + bobEp;
    // In conservation mode, anchor mechEnergy to initMechEnergy to keep bar number
    // perfectly constant. Numerical drift is <2%, so the adjustment is imperceptible
    // in bar height but guarantees Ek+Ep=Mech=constant in the displayed numbers.
    if (moles == 0 && initMechEnergy > 0) {
      bobEp = initMechEnergy - bobEk;
      mechEnergy = initMechEnergy;
    }

    // Internal energy = air molecule KE + energy lost to rod during collisions
    internalEnergy = 0;
    for (var i = 1; i < moles; i++) {
      internalEnergy += 0.5 * moleM[i] * (moleVx[i] * moleVx[i] + moleVy[i] * moleVy[i]);
    }
    internalEnergy += rodLostAcc;

    var totalEnergy = mechEnergy + internalEnergy;

    // === 初始高度的水平虚线 ===
    stroke(0, 150, 0, 180);
    strokeWeight(1.2);
    drawDashedLine2(0, initReleaseY, 800, initReleaseY);
    noStroke();
    fill(0, 120, 0);
    textAlign(LEFT, BOTTOM);
    textSize(11);
    text("释放高度", 8, initReleaseY - 2);

    // Draw rod
    stroke(0);
    strokeWeight(2.5);
    line(pendOX, pendOY, rodX, rodY);

    // Draw pivot point
    fill(60);
    noStroke();
    ellipse(pendOX, pendOY, 8, 8);

    // Draw pendulum bob
    noStroke();
    fill(255, 60, 60);
    ellipse(rodX, rodY, 2 * moleR[0], 2 * moleR[0]);

    // Speed label on bob
    var bobSpeed = mag(pendVx, pendVy);
    fill(180, 0, 0);
    textAlign(CENTER, BOTTOM);
    textSize(12);
    text("v=" + bobSpeed.toFixed(2), rodX, rodY - moleR[0] - 5);

    // Draw air molecules
    noStroke();
    for (var i = 1; i < moles; i++) {
      fill(64, 100, 230);
      ellipse(moleX[i], moleY[i], moleR[i], moleR[i]);
    }

    // === 能量条（右侧） ===
    drawEnergyBars();

    // === 左上角数据面板 ===
    fill(255, 255, 255, 220);
    stroke(200);
    strokeWeight(0.8);
    rect(5, 5, 215, 73, 5);
    noStroke();
    textAlign(LEFT, TOP);
    textSize(12);
    // Status line
    if (moles == 0) {
      fill(0, 140, 60);
      text("Ek + Ep = 机械能 (守恒)", 10, 10);
    } else {
      fill(200, 80, 0);
      text("Ek + Ep + U = 总能量 (机械能耗散中)", 10, 10);
    }
    fill(0);
    text("Ek=" + bobEk.toFixed(1) + "  Ep=" + bobEp.toFixed(1) + "  U=" + internalEnergy.toFixed(1), 10, 28);
    text("Mech = " + mechEnergy.toFixed(1) + "  Total = " + totalEnergy.toFixed(1), 10, 46);
    var avgV = 0;
    for (var i = 1; i < moles; i++) avgV += mag(moleVx[i], moleVy[i]);
    if (moles > 1) avgV /= (moles - 1);
    text("v=" + bobSpeed.toFixed(2) + "  v_avg=" + avgV.toFixed(3) + "  N=" + moles, 10, 64);

    pop();
  }

  function drawEnergyBars() {
    fill(255, 255, 255, 210);
    stroke(180);
    strokeWeight(0.8);
    var px = 810, py = 60, pw = 180, ph = 390;
    rect(px, py, pw, ph, 6);

    noStroke();
    fill(0);
    textAlign(CENTER, TOP);
    textSize(13);
    text("能量分布 (参考=" + initMechEnergy.toFixed(0) + ")", px + pw / 2, py + 8);

    var barX = px + 15;
    var barW = 34;
    var barBase = py + ph - 25;
    var barMaxH = 290;

    function drawBar(bx, val, label, color, maxVal, showNum) {
      var h = constrain(val / maxVal * barMaxH, 0, barMaxH);
      var num = (showNum !== undefined) ? showNum : Math.round(val);
      noStroke();
      fill(color[0], color[1], color[2], 200);
      rect(bx, barBase - h, barW, h, 3);
      stroke(130);
      strokeWeight(0.5);
      noFill();
      rect(bx, barBase - h, barW, h, 3);
      if (h > 15) {
        noStroke();
        fill(255);
        textAlign(CENTER, CENTER);
        textSize(10);
        push();
        translate(bx + barW / 2, barBase - h / 2);
        rotate(-HALF_PI);
        text(num.toString(), 0, 0);
        pop();
      }
      noStroke();
      fill(color[0], color[1], color[2]);
      textAlign(CENTER, TOP);
      textSize(11);
      text(num.toString(), bx + barW / 2, barBase + 2);
      textSize(9);
      fill(80);
      text(label, bx + barW / 2, barBase + 16);
    }

    // Bar variant: refVal as dashed reference line, showNum as the displayed number
    function drawBarRef(bx, val, label, color, maxVal, refVal, showNum) {
      var h = constrain(val / maxVal * barMaxH, 0, barMaxH);
      var refH = constrain(refVal / maxVal * barMaxH, 0, barMaxH);
      var num = (showNum !== undefined) ? showNum : Math.round(val);
      // Reference line (initMechEnergy, fixed)
      stroke(180);
      strokeWeight(0.5);
      drawDashedLine2(bx, barBase - refH, bx + barW, barBase - refH);
      // Bar height shows current mechEnergy
      noStroke();
      fill(color[0], color[1], color[2], 200);
      rect(bx, barBase - h, barW, h, 3);
      stroke(130);
      strokeWeight(0.5);
      noFill();
      rect(bx, barBase - h, barW, h, 3);
      if (h > 15) {
        noStroke();
        fill(255);
        textAlign(CENTER, CENTER);
        textSize(10);
        push();
        translate(bx + barW / 2, barBase - h / 2);
        rotate(-HALF_PI);
        text(num.toString(), 0, 0);
        pop();
      }
      // Number: exactly Ek+Ep (sum of rounded values), constant in conservation
      noStroke();
      fill(color[0], color[1], color[2]);
      textAlign(CENTER, TOP);
      textSize(11);
      text(num.toString(), bx + barW / 2, barBase + 2);
      textSize(9);
      fill(80);
      text(label, bx + barW / 2, barBase + 16);
    }

    var refMax = initMechEnergy;
    var ekR = Math.round(bobEk);
    var epR = Math.round(bobEp);
    var mechShow = ekR + epR;  // Always equals Ek + Ep displayed numbers
    drawBar(barX, bobEk, "动能Ek", [60, 140, 240], refMax, ekR);
    drawBar(barX + barW + 5, bobEp, "势能Ep", [40, 160, 40], refMax, epR);
    // Mech energy bar: height = current mechEnergy, number = ekR + epR (constant in conservation, always equals sum)
    drawBarRef(barX + 2*(barW + 5), mechEnergy, "机械能", [140, 60, 200], refMax, initMechEnergy, mechShow);
    drawBar(barX + 3*(barW + 5), internalEnergy, "内能U", [230, 100, 30], refMax);

    // Ek + Ep = MechE indicator (uses same rounded values as bar numbers)
    noStroke();
    fill(100);
    textAlign(CENTER, TOP);
    textSize(10);
    text("Ek+Ep=" + mechShow, barX + barW/2 + (barW+5), barBase - barMaxH - 15);

    // Status
    if (moles == 0) {
      fill(0, 140, 60);
    } else {
      fill(200, 80, 0);
    }
    textAlign(CENTER, TOP);
    textSize(11);
    text(moles == 0 ? "机械能守恒" : "机械能耗散中", px + pw / 2, barBase + 33);

    fill(100);
    textSize(10);
    var totalE = mechEnergy + internalEnergy;
    text("总能量: " + totalE.toFixed(0), px + pw / 2, barBase + 50);
  }

  function drawDashedLine2(x1, y1, x2, y2) {
    var d = dist(x1, y1, x2, y2);
    var steps = d / 12;
    for (var i = 0; i < steps; i += 2) {
      var t1 = i / steps;
      var t2 = min((i + 1) / steps, 1);
      line(lerp(x1, x2, t1), lerp(y1, y2, t1), lerp(x1, x2, t2), lerp(y1, y2, t2));
    }
  }

  function constrainToRod() {
    var dx = pendX - pendOX;
    var dy = pendY - pendOY;
    var dist = sqrt(dx * dx + dy * dy);
    if (dist < 0.001) return;
    // Project position onto circle
    pendX = pendOX + dx * pendL / dist;
    pendY = pendOY + dy * pendL / dist;
    // Remove radial velocity (only tangential velocity remains)
    var nx = dx / dist;
    var ny = dy / dist;
    var vr = pendVx * nx + pendVy * ny;
    pendVx -= vr * nx;
    pendVy -= vr * ny;
  }

  // Constrain a molecule to the rod circle — used during collisions to keep bob on track.
  // Returns mechanical energy lost (transferred to rod / dissipated).
  function constrainMoleculeRod(idx) {
    var dx = moleX[idx] - pendOX;
    var dy = moleY[idx] - pendOY;
    var dist = sqrt(dx * dx + dy * dy);
    if (dist < 0.001) return 0;
    // Mechanical energy before constraint
    var mechPre = 0.5 * moleM[idx] * (moleVx[idx] * moleVx[idx] + moleVy[idx] * moleVy[idx])
                + moleM[idx] * 0.2 * (maxY - moleY[idx]);
    // Project position onto circle
    moleX[idx] = pendOX + dx * pendL / dist;
    moleY[idx] = pendOY + dy * pendL / dist;
    // Remove radial velocity component
    var nx = dx / dist;
    var ny = dy / dist;
    var vr = moleVx[idx] * nx + moleVy[idx] * ny;
    moleVx[idx] -= vr * nx;
    moleVy[idx] -= vr * ny;
    // Mechanical energy after constraint
    var mechPost = 0.5 * moleM[idx] * (moleVx[idx] * moleVx[idx] + moleVy[idx] * moleVy[idx])
                 + moleM[idx] * 0.2 * (maxY - moleY[idx]);
    var lost = mechPre - mechPost;
    return lost > 0 ? lost : 0;
  }

  function running() {
    var n = moles;
    for (var i = 0; i < n - 1; i++) {
      for (var j = i + 1; j < n; j++) {
        var pix = moleX[i] + moleVx[i];
        var piy = moleY[i] + moleVy[i];
        var pjx = moleX[j] + moleVx[j];
        var pjy = moleY[j] + moleVy[j];
        if (abs(moleX[i] - moleX[j]) < (moleR[i] + moleR[j]) &&
            abs(moleY[i] - moleY[j]) < (moleR[i] + moleR[j])) {
          if (dist(moleX[i], moleY[i], moleX[j], moleY[j]) < (moleR[i] + moleR[j]) &&
              dist(moleX[i], moleY[i], moleX[j], moleY[j]) > dist(pix, piy, pjx, pjy)) {
            var vcx = (moleM[i] * moleVx[i] + moleM[j] * moleVx[j]) / (moleM[i] + moleM[j]);
            var vcy = (moleM[i] * moleVy[i] + moleM[j] * moleVy[j]) / (moleM[i] + moleM[j]);
            var vcix = moleVx[i] - vcx;
            var vciy = moleVy[i] - vcy;
            var vcjx = moleVx[j] - vcx;
            var vcjy = moleVy[j] - vcy;
            var vci = mag(vcix, vciy);
            var vcj = mag(vcjx, vcjy);
            var aci = getAngle(vcix, vciy);
            var acj = getAngle(vcjx, vcjy);
            var aij = getAngle(moleX[j] - moleX[i], moleY[j] - moleY[i]);
            var aji = getAngle(moleX[i] - moleX[j], moleY[i] - moleY[j]);
            aci = mod(2 * aij + 180 - aci, 360);
            acj = mod(2 * aji + 180 - acj, 360);
            var aciRad = aci * Math.PI / 180;
            var acjRad = acj * Math.PI / 180;
            moleVx[i] = vci * Math.cos(aciRad);
            moleVy[i] = vci * Math.sin(aciRad);
            moleVx[j] = vcj * Math.cos(acjRad);
            moleVy[j] = vcj * Math.sin(acjRad);
            moleVx[i] += vcx;
            moleVy[i] += vcy;
            moleVx[j] += vcx;
            moleVy[j] += vcy;
            // Immediately re-constrain bob after each collision to prevent
            // cascading off-circle errors across multiple collisions per frame.
            if (i == 0 || j == 0) {
              rodLostAcc += constrainMoleculeRod(0);
            }
          }
        }
      }
    }
    // Update air molecule positions only (bob at index 0 is moved by angular dynamics)
    for (var k = 1; k < n; k++) {
      moleX[k] += moleVx[k];
      moleY[k] += moleVy[k];
      if (moleX[k] < minX + moleR[k]) moleVx[k] = abs(moleVx[k]);
      if (moleX[k] > maxX - moleR[k]) moleVx[k] = -abs(moleVx[k]);
      if (moleY[k] < minY + moleR[k]) moleVy[k] = abs(moleVy[k]);
      if (moleY[k] > maxY - moleR[k]) moleVy[k] = -abs(moleVy[k]);
    }
    // Ensure bob position stays on rod after collision velocity changes
    rodLostAcc += constrainMoleculeRod(0);
  }

  function onDragMove() {
    pendT = atan2(mouseY * 1000 / width - pendOY, mouseX * 1000 / width - pendOX);
    pendT = constrain(pendT, 0.05, PI - 0.05);

  }

  function onDragEnd() {

  function getUsername() {

  function saveProgress() {
    var data = { round: quizRound, scores: quizScores, highestRound: quizHighestRound, updatedAt: new Date().toISOString() };
    // Always save to localStorage as fallback
    try { localStorage.setItem("quiz_pendulum_progress", JSON.stringify(data)); } catch(e) {}

    if (username) saveQuizToServer(username, data);

  function saveQuizToServer(username, data) {
    try {
      SB.getUser(username).then(function(users) {
        if (users && users.length > 0) {
          var user = users[0];
          var quizData = user.quiz_data;
          if (typeof quizData === 'string') quizData = JSON.parse(quizData);
          if (!quizData || typeof quizData !== 'object') quizData = {};
          quizData.pendulum = data;
          SB.updateUser(username, { quiz_data: quizData }).catch(function(){});
        }
      }).catch(function(){});
    } catch(e) {}

  async function loadProgress() {
    // Try Supabase first if logged in
    var username = getUsername();
    if (username) {
      try {
        var users = await SB.getUser(username);
        if (users && users.length > 0) {
          var user = users[0];
          var quizData = user.quiz_data;
          if (typeof quizData === 'string') quizData = JSON.parse(quizData);
          if (quizData && quizData.pendulum) {
            var serverData = quizData.pendulum;
            // Also sync to localStorage for offline fallback
            try { localStorage.setItem("quiz_pendulum_progress", JSON.stringify(serverData)); } catch(e) {}
            return serverData;
          }
        }
      } catch(e) {}
    }
    // Fallback to localStorage
    try {
      var raw = localStorage.getItem("quiz_pendulum_progress");
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    return null;
  }

  function clearProgress() {
    try { localStorage.removeItem("quiz_pendulum_progress"); } catch(e) {}
    var username = getUsername();
    if (username) {
      try {
        SB.getUser(username).then(function(users) {
          if (users && users.length > 0) {
            var user = users[0];
            var quizData = user.quiz_data;
            if (typeof quizData === 'string') quizData = JSON.parse(quizData);
            if (quizData && typeof quizData === 'object') {
              delete quizData.pendulum;
              SB.updateUser(username, { quiz_data: quizData }).catch(function(){});

          }
        }).catch(function(){});

    }

  function startQuiz() {
    loadProgress().then(function(saved) {
      if (saved && saved.highestRound >= 0 && (saved.scores[0] > 0 || saved.round > 0)) {
        // Has meaningful progress: resume from next unfinished round
        quizRound = Math.min(saved.round + 1, 2);
        quizScores = saved.scores.slice();
        quizHighestRound = saved.highestRound;
      } else {
        quizRound = 0;
        quizScores = [0, 0, 0];
        quizHighestRound = 0;
      }
      quizOverlay.style("display", "block");
      paused = true;
      buttonPause.html("暂停");

      quizHighestRound = 0;

  function renderQuestion() {
    var q = quizQuestions[quizRound * 5 + quizIndex];
    var html = '<div class="quiz-question">' + (quizIndex + 1) + ". " + q.q + "</div>";
    var labels = ["A", "B", "C", "D"];
    for (var i = 0; i < q.opts.length; i++) {
      html += '<button class="quiz-option" data-idx="' + i + '" ';
      if (quizLocked) html += 'disabled ';
      html += '>' + labels[i] + ". " + q.opts[i] + "</button>";
    }
    quizBody.html(html);

    // Bind click handlers
    var opts = document.querySelectorAll("#quizBody .quiz-option");
    for (var j = 0; j < opts.length; j++) {
      (function(idx) {
        opts[j].addEventListener("click", function() { selectAnswer(idx); });
      })(j);
    }
  }

  function selectAnswer(idx) {
    if (quizLocked) return;
    quizLocked = true;
    quizAnswers.push(idx);

    var q = quizQuestions[quizRound * 5 + quizIndex];
    var correct = q.ans;

    // Highlight correct and wrong
    var opts = document.querySelectorAll("#quizBody .quiz-option");
    for (var i = 0; i < opts.length; i++) {
      opts[i].disabled = true;
      if (i === correct) opts[i].classList.add("correct");
      if (i === idx && idx !== correct) opts[i].classList.add("wrong");
    }

    // Delay then advance
    setTimeout(function() {
      quizIndex++;
      if (quizIndex < 5) {
        quizLocked = false;
        renderQuestion();
      } else {
        showRoundResult();
      }
    }, 1200);
  }

    if (score >= Math.ceil(total / 2)) return "⭐";
    return "";

      var labels = ["A", "B", "C", "D"];
      var cardClass = isCorrect ? "correct2" : "wrong";
      var badgeHtml = isCorrect ? '<span class="rbadge ok">✓ 正确</span>' : '<span class="rbadge fail">✗ 错误</span>';

      html += '<div class="review-card ' + cardClass + '">';
      html += '<div class="rq">' + badgeHtml + (i + 1) + ". " + q.q + "</div>";

      if (!isCorrect) {
        html += '<div class="review-user-ans">你的答案：' + labels[userAns] + ". " + q.opts[userAns] + "</div>";
        html += '<div class="review-correct-ans">正确答案：' + labels[q.ans] + ". " + q.opts[q.ans] + "</div>";
        html += '<div class="review-explain"><div class="rtitle">💡 解析</div><div class="rtext">' + q.explain + "</div></div>";
      } else {
        html += '<div style="font-size:13px;color:#22c55e;margin-top:2px;">你的答案：' + labels[userAns] + ". " + q.opts[userAns] + " ✓</div>";
      }

      html += "</div>";
    }

    if (wrongCount === 0) {
      html += '<p style="text-align:center;color:#22c55e;font-size:15px;margin-top:12px;">🎉 全部正确！你对这部分知识点掌握得很好！</p>';
    } else {
      html += '<p style="text-align:center;color:#f59e0b;font-size:14px;margin-top:12px;">共错 ' + wrongCount + ' 题，仔细阅读解析，理解后再继续！</p>';
    }

    html += '<div class="quiz-btn-row"><button class="btn" id="btnBackResult" style="font-size:14px;">← 返回结果</button></div>';

    quizBody.style("display", "none");
    quizResult.style("display", "block");
    quizResult.html(html);

    setTimeout(function() {
      var btnBack = document.getElementById("btnBackResult");
      if (btnBack) btnBack.addEventListener("click", function() {
        showRoundResultSkipSave();
      });
    }, 100);
  }

  function showRoundResultSkipSave() {
    // Re-display round result without re-saving progress
    var correctCount = quizScores[quizRound];

    quizBody.style("display", "none");
    quizResult.style("display", "block");

    var stars = getStars(correctCount, 5);
    var scoreClass = correctCount >= 4 ? "great" : (correctCount >= 2 ? "good" : "poor");
    var comment = correctCount >= 4 ? "太棒了！" : (correctCount >= 2 ? "继续加油！" : "再看看实验吧！");

    var html = '<div class="quiz-score ' + scoreClass + '">' + correctCount + "/5</div>";
    if (stars) html += '<p style="font-size:20px;margin:4px 0;">' + stars + "</p>";
    html += '<p style="font-size:16px;margin:8px 0;color:#94a3b8;">' + comment + "</p>";

    if (quizRound < 2) {
      html += '<p style="font-size:13px;color:#64748b;margin-bottom:8px;">已完成第' + (quizRound + 1) + "关，进度已保存</p>";
      html += '<div class="quiz-btn-row">';
      html += '<button class="btn" id="btnReviewRound" style="font-size:14px;border-color:#8b5cf6;color:#c4b5fd;">📋 查看回顾</button>';
      html += "</div>";
      html += '<div class="quiz-btn-row">';
      html += '<button class="btn" id="btnNextRound" style="font-size:14px;padding:8px 24px;">进入下一关</button>';
      html += '<button class="btn" id="btnRetryRound" style="font-size:14px;">重新挑战本关</button>';
      html += "</div>";
    } else {
      var total = quizScores[0] + quizScores[1] + quizScores[2];
      var totalClass = total >= 12 ? "great" : (total >= 8 ? "good" : "poor");
      var totalStars = getStars(total, 15);
      html = '<div class="quiz-score ' + totalClass + '">' + total + "/15</div>";
      if (totalStars) html += '<p style="font-size:20px;margin:4px 0;">' + totalStars + "</p>";
      html += '<p style="font-size:14px;color:#94a3b8;margin-bottom:8px;">第1关: ' + quizScores[0] + '/5 &nbsp; 第2关: ' + quizScores[1] + '/5 &nbsp; 第3关: ' + quizScores[2] + "/5</p>";
      html += '<p style="font-size:16px;margin:8px 0;color:' + (total >= 12 ? "#22c55e" : total >= 8 ? "#f59e0b" : "#ef4444") + ';">' + (total >= 12 ? "恭喜通关！你对机械能转化理解透彻！" : total >= 8 ? "还不错，再复习一下错题吧！" : "建议回到实验仔细观察能量变化规律。") + "</p>";
      html += '<div class="quiz-btn-row">';
      html += '<button class="btn" id="btnReviewRound" style="font-size:14px;border-color:#8b5cf6;color:#c4b5fd;">📋 查看回顾</button>';
      html += "</div>";
      html += '<div class="quiz-btn-row">';
      html += '<button class="btn" id="btnRetryAll" style="font-size:14px;padding:8px 24px;">重新全部挑战</button>';
      html += '<button class="btn" id="btnBackExp" style="font-size:14px;">返回实验</button>';
      html += "</div>";
    }

    quizResult.html(html);
    bindResultButtons();
  }

  function bindResultButtons() {
    setTimeout(function() {
      var btnNext = document.getElementById("btnNextRound");
      var btnRetry = document.getElementById("btnRetryRound");
      var btnRetryAll = document.getElementById("btnRetryAll");
      var btnBack = document.getElementById("btnBackExp");
      var btnReview = document.getElementById("btnReviewRound");

      if (btnNext) btnNext.addEventListener("click", function() {
        quizRound++;
        renderRound();
      });
      if (btnRetry) btnRetry.addEventListener("click", function() {
        renderRound();
      });
      if (btnRetryAll) btnRetryAll.addEventListener("click", function() {
        quizRound = 0;
        quizScores = [0, 0, 0];
        quizHighestRound = 0;
        clearProgress();
        renderRound();
      });
      if (btnBack) btnBack.addEventListener("click", function() {
        closeQuiz();
      });
      if (btnReview) btnReview.addEventListener("click", function() {
        showReview();
      });
    }, 100);
  }

  function showRoundResult() {
    var correctCount = 0;
    for (var i = 0; i < 5; i++) {
      var q = quizQuestions[quizRound * 5 + i];
      if (quizAnswers[i] === q.ans) correctCount++;
    }
    quizScores[quizRound] = correctCount;
    if (quizRound > quizHighestRound) quizHighestRound = quizRound;

    // Save progress after each round
    saveProgress();

    var stars = getStars(correctCount, 5);
    var scoreClass = correctCount >= 4 ? "great" : (correctCount >= 2 ? "good" : "poor");
    var comment = correctCount >= 4 ? "太棒了！" : (correctCount >= 2 ? "继续加油！" : "再看看实验吧！");

    var html = '<div class="quiz-score ' + scoreClass + '">' + correctCount + "/5</div>";
    if (stars) html += '<p style="font-size:20px;margin:4px 0;">' + stars + "</p>";
    html += '<p style="font-size:16px;margin:8px 0;color:#94a3b8;">' + comment + "</p>";

    if (quizRound < 2) {
      html += '<p style="font-size:13px;color:#64748b;margin-bottom:8px;">已完成第' + (quizRound + 1) + "关，进度已保存</p>";
      html += '<div class="quiz-btn-row">';
      html += '<button class="btn" id="btnReviewRound" style="font-size:14px;border-color:#8b5cf6;color:#c4b5fd;">📋 查看回顾</button>';
      html += "</div>";
      html += '<div class="quiz-btn-row">';
      html += '<button class="btn" id="btnNextRound" style="font-size:14px;padding:8px 24px;">进入下一关</button>';
      html += '<button class="btn" id="btnRetryRound" style="font-size:14px;">重新挑战本关</button>';
      html += "</div>";
    } else {
      // All rounds complete
      var total = quizScores[0] + quizScores[1] + quizScores[2];
      var totalClass = total >= 12 ? "great" : (total >= 8 ? "good" : "poor");
      var totalStars = getStars(total, 15);
      html = '<div class="quiz-score ' + totalClass + '">' + total + "/15</div>";
      if (totalStars) html += '<p style="font-size:20px;margin:4px 0;">' + totalStars + "</p>";
      html += '<p style="font-size:14px;color:#94a3b8;margin-bottom:8px;">第1关: ' + quizScores[0] + '/5 &nbsp; 第2关: ' + quizScores[1] + '/5 &nbsp; 第3关: ' + quizScores[2] + "/5</p>";
      html += '<p style="font-size:16px;margin:8px 0;color:' + (total >= 12 ? "#22c55e" : total >= 8 ? "#f59e0b" : "#ef4444") + ';">' + (total >= 12 ? "恭喜通关！你对机械能转化理解透彻！" : total >= 8 ? "还不错，再复习一下错题吧！" : "建议回到实验仔细观察能量变化规律。") + "</p>";
      html += '<div class="quiz-btn-row">';
      html += '<button class="btn" id="btnReviewRound" style="font-size:14px;border-color:#8b5cf6;color:#c4b5fd;">📋 查看回顾</button>';
      html += "</div>";
      html += '<div class="quiz-btn-row">';
      html += '<button class="btn" id="btnRetryAll" style="font-size:14px;padding:8px 24px;">重新全部挑战</button>';
      html += '<button class="btn" id="btnBackExp" style="font-size:14px;">返回实验</button>';
      html += "</div>";

      // Clear progress after full completion
      clearProgress();
    }

    quizBody.style("display", "none");
    quizResult.style("display", "block");
    quizResult.html(html);
    bindResultButtons();
  }

  // Initialize quiz on p5 setup
  var _origSetup = setup;
  setup = function() {
    _origSetup();
    initQuiz();
  };
  </script>
</body>
</html>
