  <script>
// === 工具函数（源自 javalab.js） ===
var notClicked = true;

function doFullScreen() {
  var el = document.getElementById("divFull");
  if(el.requestFullscreen) el.requestFullscreen();
  else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  else if(el.mozRequestFullScreen) el.mozRequestFullScreen();
  else if(el.msRequestFullscreen) el.msRequestFullscreen();
}

function doFullScreen2() {
  var el = document.getElementById("myP5Canvas");
  if(el.requestFullscreen) el.requestFullscreen();
  else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  else if(el.mozRequestFullScreen) el.mozRequestFullScreen();
  else if(el.msRequestFullscreen) el.msRequestFullscreen();
}

function contain(x, y, x1, y1, w1, h1) {
  if(x < x1 || x > (x1 + w1) || y < y1 || y > (y1 + h1)) return false;
  return true;
}

function drawButtonDrag() { drawButtonDetail("Drag"); }

function drawButtonDetail(str) {
  if(mouseIsPressed) if(contain(mouseX, mouseY, 0, 0, width, height)) notClicked = false;
  if(millis() > 10000) notClicked = false;
  var dia = 120;
  if(notClicked) {
    push();
    translate(width/2, height/2);
    noStroke();
    fill(128, 128);
    ellipse(0, 0, dia, dia);
    noFill();
    stroke(255);
    strokeWeight(dia*0.04);
    drawFingers(0, 0, dia*0.85);
    pop();
  }
}

function drawFingers(x, y, d) {
  push();
  translate(x, y);
  line(-d*0.2, d*0.3, -d*0.35, d*0.1);
  arc(-d*0.3, d*0.05, d*0.1414, d*0.1414, QUARTER_PI*3, QUARTER_PI*7);
  line(-d*0.25, d*0.0, -d*0.15, d*0.1);
  line(-d*0.15, d*0.1, -d*0.15, -d*0.25);
  arc(-d*0.075, -d*0.25, d*0.15, d*0.15, PI, TWO_PI);
  line(-d*0.0, -d*0.25, -d*0.0, d*0.0);
  arc(d*0.06, -d*0.1, d*0.12, d*0.12, HALF_PI*3, TWO_PI);
  line(d*0.12, -d*0.1, d*0.12, d*0.025);
  arc(d*0.18, -d*0.05, d*0.12, d*0.12, HALF_PI*3, TWO_PI);
  line(d*0.24, -d*0.05, d*0.24, d*0.05);
  arc(d*0.29, -d*0.0, d*0.1, d*0.1, HALF_PI*3, TWO_PI);
  line(d*0.34, -d*0.0, d*0.34, d*0.075);
  line(d*0.34, d*0.075, d*0.31, d*0.3);
  pop();
}

function draw2DArrow2(x, y, cx, cy, thick) {
  var lArrow = sqrt(cx * cx + cy * cy);
  var oxArrow = [0, lArrow - 2*thick, lArrow - 2*thick, lArrow, lArrow - 2*thick, lArrow - 2*thick, 0];
  var oyArrow = [thick, thick, 2*thick, 0, -2*thick, -thick, -thick];
  push();
  translate(x, y);
  rotate(atan2(cy, cx));
  beginShape();
  for(var i = 0; i < oxArrow.length; i++) { vertex(max(oxArrow[i], 0), oyArrow[i]); }
  endShape(CLOSE);
  pop();
}

// === 浮力比较仿真（汉化版 language=3） ===
var language = 3;
var labelA = [], rangeA = [], labelB = [], rangeB = [];
var checkA, chalkA, checkB, chalkB;
var handImage = [];
var labelC, labelD, radioC, radioD;
var waterY = 600;
var velocity = [0, 0];
var objectY = [800, 800];
var objectR = [];

function preload() {
  handImage[0] = loadImage("images/archimedes_principle_hand_0.png");
  handImage[1] = loadImage("images/archimedes_principle_hand_1.png");
}

function setup() {
  frameRate(60);
  var o = select("#myContainer");
  var a = 1;
  var w = int(min(o.width, (window.innerHeight - 160) / a));
  var h = int(w * a);
  myCanvas = createCanvas(w, h);
  myCanvas.parent("myContainer");
  myCanvas.id("myP5Canvas");
  labelA = [select("#labelA1"), select("#labelA2")];
  labelB = [select("#labelB1"), select("#labelB2")];
  rangeA = [select("#rangeA1"), select("#rangeA2")];
  rangeB = [select("#rangeB1"), select("#rangeB2")];
  rangeA[0].input(setup2);
  rangeA[1].input(setup2);
  rangeB[0].input(setup2);
  rangeB[1].input(setup2);
  checkA = select("#checkA");
  chalkA = select("#chalkA");
  chalkA.html("数值");
  checkB = select("#checkB");
  chalkB = select("#chalkB");
  chalkB.html("手的作用力");
  labelC = select("#labelC");
  labelC.html("密度单位");
  radioC = createRadio("radioC");
  radioC.option("g/mL ", "g/mL");
  radioC.option("kg/L ", "kg/L");
  radioC.parent("radioC");
  radioC.value("kg/L");
  radioC.changed(setup2);
  labelD = select("#labelD");
  labelD.html("力的单位");
  radioD = createRadio("radioD");
  radioD.option("N ", "N");
  radioD.option("g·f ", "g·f");
  radioD.option("kg·f ", "kg·f");
  radioD.parent("radioD");
  radioD.value("N");
  radioD.changed(setup2);
  setup2();
}

function windowResized() {
  var o = select("#myContainer");
  var a = 1;
  var w = int(min(o.width, (window.innerHeight - 160) / a));
  var h = int(w * a);
  resizeCanvas(w, h);
}

function setup2() {
  for(var i = 0; i < 2; i++) {
    var volUnit = (radioC.value() == "kg/L") ? "L" : "mL";
    var volFactor = (radioC.value() == "kg/L") ? 1/1000 : 1;
    labelA[i].html("体积 " + round(volFactor * rangeA[i].value() * 1000) / 1000 + " " + volUnit);
    var massUnit = (radioC.value() == "kg/L") ? "kg" : "g";
    var massFactor = (radioC.value() == "kg/L") ? 1/1000 : 1;
    labelB[i].html("质量 " + round(massFactor * rangeB[i].value() * 1000) / 1000 + " " + massUnit);
  }
}

function draw() {
  push();
  scale(width / 1000);
  if(touches.length > 1) return;
  background(255);
  strokeWeight(1);
  textSize(40);
  noStroke();
  fill(191, 191, 255);
  rect(20, waterY, 960, 460);

  var density = [], buoyancy = [], gravity = [];
  for(var i = 0; i < 2; i++) {
    density[i] = rangeB[i].value() / rangeA[i].value();
    objectR[i] = pow(map(rangeA[i].value(), 0, 100, 0, 1), 0.2) * 140;
    var ratio = map(objectY[i], waterY - objectR[i], waterY + objectR[i], -HALF_PI, HALF_PI);
    ratio = constrain(ratio, -HALF_PI, HALF_PI);
    ratio = map(sin(ratio), -1, 1, 0, 1);
    buoyancy[i] = -rangeA[i].value() * ratio;
    gravity[i] = rangeB[i].value();

    if(dragged != i) {
      velocity[i] += 10 * (buoyancy[i] + gravity[i]) / gravity[i];
      velocity[i] *= 0.8;
      objectY[i] += velocity[i];
      objectY[i] = min(objectY[i], 960 - objectR[i]);
    }

    if(checkB.checked())
      if(dragged == i) {
        stroke(255, 128);
        fill(255, 0, 0, 128);
        if(abs(buoyancy[i]) < (gravity[i] - 1)) {
          image(handImage[0], offsetX[i], objectY[i] - 800, 1000, 1000);
          draw2DArrow2(500 + offsetX[i], objectY[i] - 200, 0, abs(buoyancy[i]) - gravity[i], 12);
        }
        if(abs(buoyancy[i]) > (gravity[i] + 1)) {
          image(handImage[1], offsetX[i], objectY[i] - 800 - objectR[i], 1000, 1000);
          draw2DArrow2(500 + offsetX[i], objectY[i] - 200 - objectR[i], 0, abs(buoyancy[i]) - gravity[i], 12);
        }
      }

    var c = map(density[i], 0, 2, 191, 64);
    c = constrain(c, 64, 191);
    fill(c);
    noStroke();
    ellipse(500 + offsetX[i], objectY[i], 2 * objectR[i], 2 * objectR[i]);
  }

  noStroke();
  fill(222, 222, 255, 64);
  rect(20, waterY, 960, 460);
  fill(64);
  rect(0, 550, 40, 450, 20, 20);
  rect(0, 960, 1000, 40, 20, 20);
  rect(960, 550, 40, 450, 20, 20);

  for(var i = 0; i < 2; i++) {
    stroke(255, 128);
    fill(0, 128);
    textAlign(LEFT, CENTER);
    if(checkA.checked()) {
      text("密度\n" + round(1000 * density[i]) / 1000 + " " + radioC.value(), 450 + offsetX[i] + objectR[i], objectY[i]);
    }

    strokeWeight(2);
    stroke(255, 128);
    fill(0, 96, 0);
    if(buoyancy[i] < 0) draw2DArrow2(500 + offsetX[i], objectY[i], 0, buoyancy[i], 12);
    var b = -buoyancy[i];
    if(radioD.value() == "N") b *= 9.8 / 1000;
    if(radioD.value() == "kg·f") b *= 1 / 1000;
    b = round(b * 1000) / 1000;
    fill(0, 96, 0);
    textAlign(CENTER, BOTTOM);
    if(checkA.checked())
      text(b + " " + radioD.value(), 500 + offsetX[i], objectY[i] + buoyancy[i] - 10);

    if(gravity[i] > 0) {
      stroke(255, 128);
      fill(0, 0, 128);
      draw2DArrow2(500 + offsetX[i], (objectY[i] + 5), 0, gravity[i], 12);
      var g = gravity[i];
      if(radioD.value() == "N") g *= 9.8 / 1000;
      if(radioD.value() == "kg·f") g *= 1 / 1000;
      g = round(g * 1000) / 1000;
      fill(0, 0, 128);
      textAlign(CENTER, TOP);
      if(checkA.checked())
        text(g + " " + radioD.value(), 500 + offsetX[i], objectY[i] + gravity[i] + 20);
    }
  }

  fill(0, 128);
  noStroke();
  if(checkA.checked()) {
    textAlign(LEFT, TOP);
    text("0.001293 " + radioC.value() + "\n空气", 30, 40);
    textAlign(LEFT, BOTTOM);
    text("水\n1 " + radioC.value(), 50, 950);
  }
  pop();
  drawButtonDrag();
}

var dragged = -1;
var offsetX = [-200, 200];
var offsetY;

function touchStarted() {
  if(!contain(mouseX, mouseY, 0, 0, width, height)) return;
  if(touches.length > 1) return;
  var x = mouseX * 1000 / width;
  var y = mouseY * 1000 / width;
  dragged = (x < 500) ? 0 : 1;
  offsetY = y - objectY[dragged];
}

function touchMoved() {
  if(touches.length > 1) return;
  if(dragged >= 0) {
    objectY[dragged] = mouseY * 1000 / width - offsetY;
    objectY[dragged] = constrain(objectY[dragged], 300, 960 - objectR[dragged]);
    return false;
  }
}

function touchEnded() { dragged = -1; }
  </script>

  // === 过关挑战 Quiz System - 浮力比较 ===
  (function() {
    var QUIZ_STORAGE_KEY = 'quiz_buoyancy_compare_progress';
    var EXPERIMENT_KEY = 'buoyancy_compare';
    var quizData = null;
    var currentRound = 0;
    var currentQuestion = 0;
    var selectedOption = null;
    var isAnswered = false;
    var isReviewing = false;
    var quizQuestions = [];

    // === 15 questions across 3 rounds ===
    var allQuestions = [];

    // Round 1: 浮力基础概念
    allQuestions.push({ round: 0, question: '浮力的方向是？', options: ['竖直向下', '竖直向上', '水平方向', '斜向上'], answer: 1, explain: '浮力的方向总是竖直向上的，与重力方向相反。' });
    allQuestions.push({ round: 0, question: '阿基米德原理指出，物体所受浮力的大小等于？', options: ['物体的重力', '物体排开液体的重力', '液体的总重力', '物体的体积'], answer: 1, explain: '阿基米德原理：浸在液体中的物体受到向上的浮力，浮力的大小等于它排开的液体所受的重力，即 F_浮 = G_排 = ρ_液·g·V_排。' });
    allQuestions.push({ round: 0, question: '物体在液体中受到的浮力大小与什么有关？', options: ['物体的质量', '物体的密度', '排开液体的体积和液体密度', '物体的颜色'], answer: 2, explain: '根据阿基米德原理 F_浮 = ρ_液·g·V_排，浮力只与液体密度和排开液体的体积有关，与物体的质量、密度等无关。' });
    allQuestions.push({ round: 0, question: '同一物体分别浸没在水和酒精中，在哪一种液体中受到的浮力更大？', options: ['水中', '酒精中', '一样大', '无法确定'], answer: 0, explain: '水的密度（1.0 g/mL）大于酒精（0.8 g/mL），浸没时排开液体体积相同。由 F_浮 = ρ_液·g·V_排 可知，密度大的液体中浮力更大。' });
    allQuestions.push({ round: 0, question: '当物体的密度小于液体的密度时，物体在液体中会？', options: ['下沉', '悬浮', '漂浮', '先下沉后上浮'], answer: 2, explain: '当 ρ_物 < ρ_液 时，物体静止时漂浮在液面上，部分体积露出液面。如木块漂在水面上就是典型例子。' });

    // Round 2: 浮力应用
    allQuestions.push({ round: 1, question: '轮船从大海驶入河流（河水密度小于海水），船身会？', options: ['上浮一些', '下沉一些', '保持不变', '无法确定'], answer: 1, explain: '轮船漂浮时 F_浮 = G，浮力不变等于船重。海水密度大于河水，根据 V_排 = F_浮 / (ρ_液·g)，密度减小则 V_排 增大，故船身下沉一些。' });
    allQuestions.push({ round: 1, question: '潜水艇是通过改变什么来实现上浮和下沉的？', options: ['自身体积', '自身重力', '自身形状', '自身颜色'], answer: 1, explain: '潜水艇通过向水舱中注水或排水来改变自身重力。注水时重力增大，重力大于浮力则下沉；排水时重力减小，重力小于浮力则上浮。' });
    allQuestions.push({ round: 1, question: '体积相同的铁块和木块完全浸没在水中，哪个受到的浮力大？', options: ['铁块', '木块', '一样大', '无法确定'], answer: 2, explain: '根据 F_浮 = ρ_液·g·V_排，浸没时 V_排 = V_物。两者体积相同，排开液体体积相同，同种液体中密度相同，因此浮力一样大。' });
    allQuestions.push({ round: 1, question: '一个物体悬浮在某种液体中，它的密度与液体密度相比？', options: ['大于', '等于', '小于', '无法确定'], answer: 1, explain: '悬浮时物体静止在液体内部任意位置，此时 ρ_物 = ρ_液，重力等于浮力，合力为零。' });
    allQuestions.push({ round: 1, question: '将三个体积相同的小球分别放入水中：甲漂浮、乙悬浮、丙沉底。它们受到的浮力大小关系是？', options: ['甲最小', '乙最小', '丙最小', '三者相等'], answer: 0, explain: '浮力由排开液体的体积决定：甲漂浮则 V_排 < V_物，乙悬浮则 V_排 = V_物，丙沉底则 V_排 = V_物。但丙沉底说明其密度大，排开体积与乙相同。实际上甲漂浮露出水面，排开体积最小，浮力最小。' });

    // Round 3: 阿基米德原理深化
    allQuestions.push({ round: 2, question: '阿基米德原理的适用范围是？', options: ['仅液体', '仅气体', '液体和气体', '仅真空'], answer: 2, explain: '阿基米德原理不仅适用于液体，也适用于气体。如气球在空气中受到浮力升空，潜艇在水中受到浮力，都属于阿基米德原理的范畴。' });
    allQuestions.push({ round: 2, question: '用弹簧测力计挂一石块，在空气中称时示数为G，浸入水中后示数F会？', options: ['大于G', '小于G', '等于G', '无法确定'], answer: 1, explain: '石块浸入水中后受到向上的浮力，弹簧测力计的拉力 F = G - F_浮，因此示数小于G，差值即为浮力的大小。' });
    allQuestions.push({ round: 2, question: '排开液体的体积越大，物体受到的浮力？', options: ['越大', '越小', '不变', '先增大后减小'], answer: 0, explain: '由 F_浮 = ρ_液·g·V_排 可知，当液体密度不变时，浮力与 V_排 成正比，排开液体体积越大，浮力越大。' });
    allQuestions.push({ round: 2, question: '质量相同的铜块和铝块浸没在水中，哪个受到的浮力大？（ρ_铜=8.9>ρ_铝=2.7 g/cm³）', options: ['铜块', '铝块', '一样大', '无法确定'], answer: 1, explain: '质量相同，密度越大体积越小。ρ_铜 > ρ_铝，所以 V_铜 < V_铝。浸没时 V_排 = V_物，铝块排开体积更大，由 F_浮 = ρ_液·g·V_排 可知浮力更大。' });
    allQuestions.push({ round: 2, question: '浮力的施力物体是？', options: ['地球', '物体本身', '液体或气体', '容器'], answer: 2, explain: '浮力是液体或气体对浸入其中的物体施加的竖直向上的托力，因此施力物体是液体或气体。重力才是地球施加的。' });

    quizQuestions = allQuestions;

    // === Core Functions ===
    function initQuiz() {
      loadProgress();
      updateChallengeButton();
      var cb = document.getElementById('challengeBtnBC');
      if (cb) cb.onclick = function() { if (!isReviewing) startQuiz(); };
      var pauseCb = document.getElementById('pauseBC');
      if (pauseCb) {
        pauseCb.addEventListener('change', function() {
          if (this.checked && typeof noLoop === 'function') noLoop();
          else if (typeof loop === 'function') loop();
        });
      }
    }

    function startQuiz() {
      isReviewing = false;
      currentRound = 0;
      currentQuestion = 0;
      selectedOption = null;
      isAnswered = false;
      if (!quizData) {
        quizData = { answers: [], scores: [] };
        for (var r = 0; r < 3; r++) {
          quizData.answers[r] = [];
          quizData.scores[r] = [];
          for (var q = 0; q < 5; q++) { quizData.answers[r][q] = -1; quizData.scores[r][q] = 0; }
        }
      }
      document.getElementById('quizOverlayBC').style.display = 'flex';
      renderRound();
    }

    function closeQuiz() {
      document.getElementById('quizOverlayBC').style.display = 'none';
      updateChallengeButton();
    }

    function resetQuiz() {
      if (!confirm('确定要重置所有答题进度吗？')) return;
      quizData = null;
      try { localStorage.removeItem(QUIZ_STORAGE_KEY); } catch(e) {}
      saveQuizToServer(null);
      isReviewing = false;
      currentRound = 0;
      currentQuestion = 0;
      document.getElementById('quizOverlayBC').style.display = 'none';
      updateChallengeButton();
    }

    function renderRound() {
      var body = document.getElementById('quizBodyBC');
      var title = document.getElementById('quizTitleBC');
      title.textContent = '第 ' + (currentRound + 1) + ' 关（共3关）';
      var roundNames = ['浮力基础概念', '浮力应用', '阿基米德原理深化'];
      var html = '<div class="quiz-progress">第 ' + (currentRound + 1) + ' / 3 关 · 共5题</div>';
      html += '<div style="text-align:center;margin:20px 0;">';
      html += '<p style="font-size:18px;margin-bottom:24px;">准备好迎接挑战了吗？</p>';
      html += '<p style="color:#aaa;margin-bottom:20px;">本关主题：' + roundNames[currentRound] + '</p>';
      html += '<button class="quiz-btn" onclick="renderQuestion(0)">开始答题</button>';
      html += '<button class="quiz-btn secondary" onclick="closeQuiz()">退出</button>';
      html += '</div>';
      body.innerHTML = html;
    }

    function renderQuestion(qIdx) {
      currentQuestion = qIdx;
      selectedOption = null;
      isAnswered = false;
      var qIdx2 = currentRound * 5 + currentQuestion;
      var q = quizQuestions[qIdx2];
      var body = document.getElementById('quizBodyBC');
      var title = document.getElementById('quizTitleBC');
      title.textContent = '第 ' + (currentRound + 1) + ' 关 · 第 ' + (currentQuestion + 1) + ' 题';
      var hasAnswer = (quizData.answers[currentRound][currentQuestion] >= 0);
      var savedAns = quizData.answers[currentRound][currentQuestion];
      var html = '<div class="quiz-progress">';
      html += '第 ' + (currentRound + 1) + ' / 3 关 · ';
      html += '第 ' + (currentQuestion + 1) + ' / 5 题</div>';
      html += '<div style="font-size:18px;font-weight:600;margin:16px 0 20px;">' + q.question + '</div>';
      var labels = ['A', 'B', 'C', 'D'];
      for (var i = 0; i < q.options.length; i++) {
        var cls = 'quiz-option';
        var disabled = '';
        if (hasAnswer) {
          disabled = ' disabled';
          if (i === q.answer) cls += ' correct';
          else if (i === savedAns) cls += ' wrong';
        }
        html += '<button class="' + cls + '"' + disabled + ' data-opt="' + i + '" onclick="selectAnswer(' + i + ')">';
        html += '<strong>' + labels[i] + '.</strong> ' + q.options[i];
        html += '</button>';
      }
      if (hasAnswer) {
        html += '<div class="review-explain" style="margin-top:12px;padding:12px;background:#16213e;border-radius:8px;">';
        html += '<strong>解析：</strong>' + q.explain;
        html += '</div>';
      }
      html += '<div style="text-align:center;margin-top:16px;">';
      if (hasAnswer) {
        if (currentQuestion < 4) {
          html += '<button class="quiz-btn" onclick="renderQuestion(' + (currentQuestion + 1) + ')">下一题</button>';
        } else {
          html += '<button class="quiz-btn" onclick="showRoundResult()">查看本关结果</button>';
        }
      }
      html += '<button class="quiz-btn secondary" onclick="closeQuiz()">退出</button>';
      html += '</div>';
      body.innerHTML = html;
    }

    window.selectAnswer = function(optIdx) {
      if (isAnswered) return;
      var qIdx2 = currentRound * 5 + currentQuestion;
      var q = quizQuestions[qIdx2];
      isAnswered = true;
      selectedOption = optIdx;
      quizData.answers[currentRound][currentQuestion] = optIdx;
      var isCorrect = (optIdx === q.answer);
      quizData.scores[currentRound][currentQuestion] = isCorrect ? 1 : 0;
      var btns = document.querySelectorAll('#quizBodyBC .quiz-option');
      for (var i = 0; i < btns.length; i++) {
        btns[i].disabled = true;
        if (i === q.answer) btns[i].classList.add('correct');
        else if (i === optIdx) btns[i].classList.add('wrong');
      }
      setTimeout(function() {
        var body = document.getElementById('quizBodyBC');
        var explainDiv = document.createElement('div');
        explainDiv.className = 'review-explain';
        explainDiv.style.cssText = 'margin-top:12px;padding:12px;background:#16213e;border-radius:8px;';
        explainDiv.innerHTML = '<strong>解析：</strong>' + q.explain;
        body.appendChild(explainDiv);
        var btnDiv = document.createElement('div');
        btnDiv.style.cssText = 'text-align:center;margin-top:16px;';
        if (currentQuestion < 4) {
          btnDiv.innerHTML = '<button class="quiz-btn" onclick="renderQuestion(' + (currentQuestion + 1) + ')">下一题</button>';
        } else {
          btnDiv.innerHTML = '<button class="quiz-btn" onclick="showRoundResult()">查看本关结果</button>';
        }
        btnDiv.innerHTML += '<button class="quiz-btn secondary" onclick="closeQuiz()">退出</button>';
        body.appendChild(btnDiv);
        saveProgress();
      }, 1200);
    };

    function showRoundResult() {
      var body = document.getElementById('quizBodyBC');
      var title = document.getElementById('quizTitleBC');
      title.textContent = '第 ' + (currentRound + 1) + ' 关结果';
      var correctCount = 0;
      for (var i = 0; i < 5; i++) { if (quizData.scores[currentRound][i] === 1) correctCount++; }
      var stars = getStars(correctCount);
      var starStr = '';
      for (var s = 0; s < 3; s++) { starStr += (s < stars) ? '★' : '☆'; }
      var passed = (correctCount >= 3);
      var html = '<div class="quiz-result">';
      html += '<h3>' + (passed ? '恭喜过关！' : '再接再厉！') + '</h3>';
      html += '<div class="stars">' + starStr + '</div>';
      html += '<p>答对 ' + correctCount + ' / 5 题';
      if (passed) html += ' · ' + (correctCount >= 5 ? '完美！' : correctCount >= 4 ? '优秀！' : '通过！');
      html += '</p></div>';
      html += '<div style="text-align:center;margin:16px 0;">';
      if (passed && currentRound < 2) {
        html += '<button class="quiz-btn" onclick="goToNextRound()">进入下一关</button>';
      } else if (!passed) {
        html += '<button class="quiz-btn" onclick="retryRound()">重新挑战本关</button>';
      }
      if (passed && currentRound >= 2) {
        html += '<button class="quiz-btn" onclick="showReview()">查看全部解析</button>';
      }
      html += '<button class="quiz-btn secondary" onclick="closeQuiz()">退出</button>';
      html += '<button class="quiz-btn danger" onclick="resetQuiz()" style="margin-left:8px;">重置进度</button>';
      html += '</div>';
      body.innerHTML = html;
      saveProgress();
    }

    window.goToNextRound = function() {
      currentRound++;
      currentQuestion = 0;
      renderRound();
    };

    window.retryRound = function() {
      for (var i = 0; i < 5; i++) { quizData.answers[currentRound][i] = -1; quizData.scores[currentRound][i] = 0; }
      currentQuestion = 0;
      renderQuestion(0);
    };

    function showReview() {
      isReviewing = true;
      var body = document.getElementById('quizBodyBC');
      var title = document.getElementById('quizTitleBC');
      title.textContent = '全部题目回顾';
      var allCorrect = 0;
      var total = 0;
      var html = '';
      for (var r = 0; r < 3; r++) {
        html += '<h3 style="color:#ffd700;margin:16px 0 8px;">第 ' + (r + 1) + ' 关</h3>';
        for (var q = 0; q < 5; q++) {
          var qIdx = r * 5 + q;
          var question = quizQuestions[qIdx];
          var ans = quizData.answers[r][q];
          if (ans === undefined || ans === null) continue;
          var isC = (ans === question.answer);
          if (ans >= 0) { allCorrect += isC ? 1 : 0; total++; }
          var cls = isC ? 'correct' : 'wrong';
          html += '<div class="review-card ' + cls + '">';
          html += '<span class="rbadge ' + cls + '">' + (isC ? '正确' : '错误') + '</span>';
          html += '<strong>' + (q + 1) + '. ' + question.question + '</strong>';
          html += '<div style="margin-top:4px;font-size:14px;color:#ccc;">你的答案：' + (ans >= 0 ? question.options[ans] : '未作答') + ' | 正确答案：' + question.options[question.answer] + '</div>';
          html += '<div class="review-explain">' + question.explain + '</div>';
          html += '</div>';
        }
      }
      html += '<div style="text-align:center;margin:16px 0;">';
      html += '<p style="font-size:18px;margin-bottom:12px;">总得分：' + allCorrect + ' / ' + total + '</p>';
      html += '<button class="quiz-btn" onclick="closeQuiz()">关闭</button>';
      html += '<button class="quiz-btn danger" onclick="resetQuiz()">重置进度</button>';
      html += '</div>';
      body.innerHTML = html;
    }

    window.showReview = showReview;
    window.closeQuiz = closeQuiz;
    window.resetQuiz = resetQuiz;
    window.startQuiz = startQuiz;
    window.renderQuestion = renderQuestion;
    window.showRoundResult = showRoundResult;
    window.goToNextRound = goToNextRound;
    window.retryRound = retryRound;

    function getStars(correctCount) {
      if (correctCount >= 5) return 3;
      if (correctCount >= 4) return 2;
      if (correctCount >= 3) return 1;
      return 0;
    }

    function saveProgress() {
      var data = { answers: quizData.answers, scores: quizData.scores, timestamp: Date.now() };
      try { localStorage.setItem(QUIZ_STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
      saveQuizToServer(data);
    }

    function loadProgress() {
      try {
        var raw = localStorage.getItem(QUIZ_STORAGE_KEY);
        if (raw) {
          var data = JSON.parse(raw);
          if (data && data.answers && data.scores) {
            quizData = { answers: data.answers, scores: data.scores };
            return;
          }
        }
      } catch(e) {}
      quizData = null;
    }

    function clearProgress() {
      quizData = null;
      try { localStorage.removeItem(QUIZ_STORAGE_KEY); } catch(e) {}
      saveQuizToServer(null);
    }

    function updateChallengeButton() {
      var btn = document.getElementById('challengeBtnBC');
      if (!btn) return;
      var hasData = false;
      if (quizData) {
        for (var r = 0; r < 3; r++) {
          for (var q = 0; q < 5; q++) {
            if (quizData.answers && quizData.answers[r] && quizData.answers[r][q] >= 0) hasData = true;
          }
        }
      }
      btn.textContent = hasData ? '继续挑战' : '过关挑战';
    }

    // === Supabase sync ===
    function saveQuizToServer(data) {
      if (typeof supabase === 'undefined') return;
      try {
        var userStr = localStorage.getItem('auth_user');
        if (!userStr) return;
        var user = JSON.parse(userStr);
        if (!user || !user.id) return;
        var client = supabase.createClient(
          'https://ahgkfksfjkzqckkdgskl.supabase.co',
          'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFoZ2tma3Nmamt6cWNra2Rnc2tsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY1Mjc4NDUsImV4cCI6MjA1MjEwMzg0NX0.cCdQxkkmRFxzK5n3tYWhOgFpE8x1Qr5tj2j4VJmREng'
        );
        client.from('users').select('quiz_data').eq('id', user.id).then(function(res) {
          if (res.error) return;
          var quizDataObj = res.data && res.data[0] && res.data[0].quiz_data ? JSON.parse(JSON.stringify(res.data[0].quiz_data)) : {};
          if (data === null) {
            delete quizDataObj[EXPERIMENT_KEY];
          } else {
            quizDataObj[EXPERIMENT_KEY] = data;
          }
          client.from('users').update({ quiz_data: quizDataObj }).eq('id', user.id).then(function() {});
        });
      } catch(e) {}
    }

    window.updateChallengeButton = updateChallengeButton;
    window.saveProgress = saveProgress;
    window.loadProgress = loadProgress;
    window.clearProgress = clearProgress;
    window.getStars = getStars;
    window.saveQuizToServer = saveQuizToServer;

    // === Setup override ===
    var _origSetupBC = setup;
    setup = function() {
      if (_origSetupBC) _origSetupBC();
      initQuiz();
    };
  })();
  </script>
  <script src="supabase.js"></script>
  <script src="script.js"></script>
  <script>
    (function() {
      var header = document.querySelector('.header');
      var hideTimer = null;
      var HIDE_DELAY = 800;
      function show() { clearTimeout(hideTimer); header.classList.remove('hidden'); document.body.classList.remove('header-hidden'); }
      function hide() { hideTimer = setTimeout(function() { header.classList.add('hidden'); document.body.classList.add('header-hidden'); }, HIDE_DELAY); }
      document.addEventListener('mousemove', function(e) {
        if (e.clientY <= 60) show();
        else if (e.clientY > header.offsetHeight + 20 && !header.classList.contains('hidden')) hide();
      });
      header.addEventListener('mouseenter', show);
      header.addEventListener('mouseleave', hide);
      hideTimer = setTimeout(function() { header.classList.add('hidden'); document.body.classList.add('header-hidden'); }, 2000);
    })();
  </script>
