<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光学实验沙盒 - 虚拟实验</title>
<style>
:root {
  --bg-darker: #020617;
  --bg-dark: #0f172a;
  --surface: #1e293b;
  --primary: #3b82f6;
  --secondary: #06b6d4;
  --accent: #8b5cf6;
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
  --glass-bg: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.1);
  --card-shadow: 0 8px 32px 0 rgba(0,0,0,0.37);
}
* { margin:0; padding:0; box-sizing:border-box }
body {
  background: var(--bg-darker);
  color: var(--text-main);
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}
body::before {
  content:""; position:fixed; inset:0;
  background: radial-gradient(circle at 20% 30%, rgba(59,130,246,0.08) 0%, transparent 40%),
              radial-gradient(circle at 80% 70%, rgba(139,92,246,0.08) 0%, transparent 40%);
  z-index:-1;
}
.header {
  background: rgba(15,23,42,0.8);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--glass-border);
  padding:1rem 2rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky; top:0; z-index:100;
}
.logo {
  font-size:1.3rem; font-weight:800;
  background: linear-gradient(135deg,var(--primary),var(--secondary));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.nav a {
  color:var(--text-muted); margin-left:1.5rem;
  text-decoration:none; font-size:0.9rem; font-weight:500;
  transition:color .3s;
}
.nav a:hover { color:var(--primary) }
.wrap { max-width:1200px; margin:0 auto; padding:1.5rem }
.main-card {
  background: var(--bg-dark);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  overflow: hidden;
  box-shadow: var(--card-shadow);
}
.experiment-title {
  padding: 1.5rem 2rem 0.75rem;
  border-bottom: 1px solid var(--glass-border);
}
.experiment-title h1 { font-size:1.6rem; font-weight:700 }
.experiment-title p { color:var(--text-muted); font-size:0.9rem; margin-top:0.25rem }
.layout { display:flex; gap:0; flex-wrap:wrap }
.canvas-wrap {
  flex: 1;
  min-width: 500px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0.5rem;
  position: relative;
  background: #000;
}
#simCanvas {
  display: block;
  border-radius: 8px;
  cursor: crosshair;
}
.panel {
  width: 300px;
  border-left: 1px solid var(--glass-border);
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  max-height: 580px;

}
.ctrl-group {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  padding: 0.6rem 0.8rem;
}
.ctrl-group h4 {
  font-size: 0.8rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 0.5rem;
}
.component-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.35rem;
}
.comp-btn {
  background: rgba(59,130,246,0.1);
  border: 1px solid rgba(59,130,246,0.2);
  color: var(--text-main);
  padding: 0.4rem 0.3rem;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.75rem;
  transition: all 0.2s;
  text-align: center;
}
.comp-btn:hover {
  background: rgba(59,130,246,0.25);
  border-color: var(--primary);
}
.comp-btn.active-type {
  background: rgba(59,130,246,0.35);
  border-color: var(--secondary);
  box-shadow: 0 0 8px rgba(6,182,212,0.3);
}
.comp-btn .icon { font-size: 1.2rem; display: block; margin-bottom: 2px; }
.btn {
  background: rgba(59,130,246,0.15);
  border: 1px solid rgba(59,130,246,0.3);
  color: var(--text-main);
  padding: 0.45rem 0.8rem;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.8rem;
  transition: all 0.2s;
}
.btn:hover { background: rgba(59,130,246,0.3); }
.btn.danger { border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.1); }
.btn.danger:hover { background: rgba(239,68,68,0.3); }
.btn-row { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.prop-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.25rem 0;
  font-size: 0.8rem;
}
.prop-row span:first-child { color: var(--text-muted); }
.prop-row span:last-child { color: var(--secondary); font-weight: 600; }
select, input[type=range] {
  width: 100%;
  background: transparent;
  color: var(--text-main);
  border: 1px solid var(--glass-border);
  border-radius: 6px;
  padding: 0.3rem 0.5rem;
  font-size: 0.8rem;
  outline: none;
}
select option { background: var(--bg-dark); color: var(--text-main) }
input[type=range] {
  -webkit-appearance: none; appearance: none;
  border: none; padding: 0; height: 3px;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 6px rgba(59,130,246,0.5);
  cursor: pointer;
}
.info-row {
  display: flex; justify-content: space-between;

}
.info-row span:last-child { color: var(--secondary); font-weight: 600; }
.empty-hint {
  text-align: center;
  color: var(--text-muted);
  font-size: 0.8rem;
  padding: 1rem 0;
}
@media (max-width: 860px) {
  .layout { flex-direction: column; }
  .panel { width: 100%; border-left: none; border-top: 1px solid var(--glass-border); max-height: none; }
  .canvas-wrap { min-width: auto; }
}
</style>

<body>
<div class="header">
  <div class="logo">物理虚拟实验</div>
  <nav class="nav">
    <a href="index.html">首页</a>

<div class="wrap">
  <div class="main-card">
    <div class="experiment-title">
      <h1>光学实验沙盒</h1>
      <p>交互式光学模拟 — 拖拽元件，观察光的折射、反射与全反射现象</p>
    </div>
    <div class="layout">
      <div class="canvas-wrap">
        <canvas id="simCanvas"></canvas>
      </div>
      <div class="panel" id="panel">
        <div class="ctrl-group">
          <h4>元件面板 <span style="font-weight:400;font-size:0.7rem;color:var(--text-muted);">（点击添加，拖拽移动）</span></h4>
          <div class="component-grid" id="compGrid">
            <button class="comp-btn" data-type="laser_single"><span class="icon">🔴</span>单束激光</button>
            <button class="comp-btn" data-type="laser_triple"><span class="icon">🔴🔴🔴</span>三束激光</button>
            <button class="comp-btn" data-type="convex_lens"><span class="icon">🔍</span>凸透镜</button>
            <button class="comp-btn" data-type="concave_lens"><span class="icon">🔎</span>凹透镜</button>
            <button class="comp-btn" data-type="flat_mirror"><span class="icon">🪞</span>平面镜</button>
            <button class="comp-btn" data-type="concave_mirror"><span class="icon">🥄</span>凹面镜</button>
            <button class="comp-btn" data-type="convex_mirror"><span class="icon">🔄</span>凸面镜</button>
            <button class="comp-btn" data-type="glass_block"><span class="icon">🧱</span>玻璃块</button>
            <button class="comp-btn" data-type="prism"><span class="icon">🔺</span>三棱镜</button>
          </div>
        </div>

        <div class="ctrl-group" id="propGroup">
          <h4>选中元件属性</h4>
          <div id="propContent" class="empty-hint">点击画布上的元件以查看属性</div>
        </div>

        <div class="ctrl-group">
          <h4>全局控制</h4>
          <div class="btn-row">
            <button class="btn danger" onclick="clearAll()">🗑 清空全部</button>
            <button class="btn" onclick="toggleNormals()" id="btnNormals">📐 显示法线</button>
          </div>
          <div style="margin-top:0.5rem;">
            <label style="font-size:0.75rem;color:var(--text-muted);">玻璃折射率: <span id="nVal">1.50</span></label>
            <input type="range" min="1.0" max="2.5" step="0.01" value="1.50" oninput="setGlobalN(this.value)" id="nSlider">
          </div>
        </div>

        <div class="ctrl-group">
          <h4>操作提示</h4>
          <div class="info-row"><span>添加元件</span><span>点击左侧按钮</span></div>
          <div class="info-row"><span>移动元件</span><span>拖拽元件中心</span></div>
          <div class="info-row"><span>旋转元件</span><span>拖拽旋转手柄</span></div>
          <div class="info-row"><span>删除元件</span><span>双击元件</span></div>
          <div class="info-row"><span>选中元件</span><span>单击元件</span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ========== 主画布设置 ==========
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;

let W, H;
function resize() {
  const wrap = canvas.parentElement;
  W = Math.min(wrap.clientWidth - 16, 700);
  H = Math.min(520, W * 0.75);
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
}
resize();
window.addEventListener('resize', () => { resize(); });

// ========== 全局状态 ==========
let components = [];
let selectedComp = null;
let globalN = 1.50;
let showNormals = false;
let placingType = null;

// 交互状态
let dragging = false;
let rotating = false;
let dragComp = null;
let dragStart = null;
let dragCompStart = null;
let dragRotStartAngle = 0;

// ========== 颜色 ==========
const RAY_COLORS = ['#ef4444', '#f59e0b', '#3b82f6'];
const RAY_GLOW = ['rgba(239,68,68,0.4)', 'rgba(245,158,11,0.4)', 'rgba(59,130,246,0.4)'];
const SELECTED_COLOR = '#06b6d4';
const HANDLE_COLOR = '#fbbf24';

// ========== 元件类型定义 ==========
const COMP_DEFS = {
  laser_single: { name: '单束激光', icon: '🔴', isSource: true },
  laser_triple: { name: '三束激光', icon: '🔴🔴🔴', isSource: true },
  convex_lens: { name: '凸透镜', icon: '🔍', isSource: false },
  concave_lens: { name: '凹透镜', icon: '🔎', isSource: false },
  flat_mirror: { name: '平面镜', icon: '🪞', isSource: false },
  concave_mirror: { name: '凹面镜', icon: '🥄', isSource: false },
  convex_mirror: { name: '凸面镜', icon: '🔄', isSource: false },
  glass_block: { name: '玻璃块', icon: '🧱', isSource: false },
  prism: { name: '三棱镜', icon: '🔺', isSource: false },
};

// ========== 添加元件 ==========
function addComponent(type) {
  const def = COMP_DEFS[type];
  if (!def) return;
  const comp = {
    id: Date.now() + Math.random(),
    type: type,
    x: W / 2,
    y: H / 2,
    angle: 0,
    n: globalN,
  };
  // 类型特定默认值
  switch (type) {
    case 'laser_single':
    case 'laser_triple':
      comp.angle = 0; // 向右发射
      break;
    case 'convex_lens':
      comp.lensH = 120; comp.lensR = 160; comp.lensW = 12;
      break;
    case 'concave_lens':
      comp.lensH = 120; comp.lensR = 160; comp.lensW = 12;
      break;
    case 'flat_mirror':
      comp.mirrorLen = 120;
      break;
    case 'concave_mirror':
      comp.mirrorR = 150; comp.mirrorSpan = Math.PI / 3;
      break;
    case 'convex_mirror':
      comp.mirrorR = 150; comp.mirrorSpan = Math.PI / 3;
      break;
    case 'glass_block':
      comp.blockW = 100; comp.blockH = 60;
      break;
    case 'prism':
      comp.prismSide = 80;
      break;
  }
  components.push(comp);
  selectedComp = comp;
  updatePropPanel();
}

function clearAll() {
  components = [];
  selectedComp = null;
  updatePropPanel();
}

// ========== 获取元件的表面（用于光线求交） ==========
function getSurfaces(comp) {
  const cx = comp.x, cy = comp.y, a = comp.angle;
  const cos = Math.cos(a), sin = Math.sin(a);
  const surfaces = [];

  function rotatePoint(px, py) {
    return {
      x: cx + px * cos - py * sin,
      y: cy + px * sin + py * cos
    };
  }

  const isMirror = comp.type.includes('mirror');
  const n_in = comp.n || globalN;
  const n_out = 1.0;

  switch (comp.type) {
    case 'flat_mirror': {
      const L = (comp.mirrorLen || 120) / 2;
      const p1 = rotatePoint(0, -L);
      const p2 = rotatePoint(0, L);
      surfaces.push({ kind: 'line', x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y, isMirror: true, n1: n_out, n2: n_out });
      break;
    }
    case 'concave_mirror': {
      const R = comp.mirrorR || 150;
      const span = comp.mirrorSpan || Math.PI / 3;
      const arcCenter = rotatePoint(-R, 0);
      const startA = a - span / 2;
      const endA = a + span / 2;
      surfaces.push({ kind: 'arc', cx: arcCenter.x, cy: arcCenter.y, r: R, startAngle: startA - Math.PI, endAngle: endA - Math.PI, isMirror: true, n1: n_out, n2: n_out });
      break;
    }
    case 'convex_mirror': {
      const R = comp.mirrorR || 150;
      const span = comp.mirrorSpan || Math.PI / 3;
      const arcCenter = rotatePoint(R, 0);
      const startA = a + Math.PI - span / 2;
      const endA = a + Math.PI + span / 2;
      surfaces.push({ kind: 'arc', cx: arcCenter.x, cy: arcCenter.y, r: R, startAngle: startA, endAngle: endA, isMirror: true, n1: n_out, n2: n_out });
      break;
    }
    case 'glass_block': {
      const hw = (comp.blockW || 100) / 2;
      const hh = (comp.blockH || 60) / 2;
      const corners = [
        rotatePoint(-hw, -hh), rotatePoint(hw, -hh),
        rotatePoint(hw, hh), rotatePoint(-hw, hh)
      ];
      for (let i = 0; i < 4; i++) {
        const j = (i + 1) % 4;
        surfaces.push({ kind: 'line', x1: corners[i].x, y1: corners[i].y, x2: corners[j].x, y2: corners[j].y, isMirror: false, n1: n_out, n2: n_in });
      }
      break;
    }
    case 'prism': {
      const s = comp.prismSide || 80;
      const h = s * Math.sqrt(3) / 2;
      const corners = [
        rotatePoint(0, -h * 2/3),
        rotatePoint(-s/2, h * 1/3),
        rotatePoint(s/2, h * 1/3)
      ];
      for (let i = 0; i < 3; i++) {
        const j = (i + 1) % 3;
        surfaces.push({ kind: 'line', x1: corners[i].x, y1: corners[i].y, x2: corners[j].x, y2: corners[j].y, isMirror: false, n1: n_out, n2: n_in });
      }
      break;
    }
    case 'convex_lens': {
      const hh = (comp.lensH || 120) / 2;
      const R = comp.lensR || 160;
      const hw = (comp.lensW || 12) / 2;
      const d = Math.sqrt(Math.max(R * R - hh * hh, 0));
      // Left arc: center to the right of the left surface
      const leftCx = -hw + d;
      const leftCenter = rotatePoint(leftCx, 0);
      const topPt = rotatePoint(-hw, -hh);
      const botPt = rotatePoint(-hw, hh);
      const leftStart = Math.atan2(topPt.y - leftCenter.y, topPt.x - leftCenter.x);
      const leftEnd = Math.atan2(botPt.y - leftCenter.y, botPt.x - leftCenter.x);
      surfaces.push({ kind: 'arc', cx: leftCenter.x, cy: leftCenter.y, r: R, startAngle: Math.min(leftStart, leftEnd), endAngle: Math.max(leftStart, leftEnd), isMirror: false, n1: n_out, n2: n_in });
      // Right arc: center to the left of the right surface
      const rightCx = hw - d;
      const rightCenter = rotatePoint(rightCx, 0);
      const rtopPt = rotatePoint(hw, -hh);
      const rbotPt = rotatePoint(hw, hh);
      const rightStart = Math.atan2(rbotPt.y - rightCenter.y, rbotPt.x - rightCenter.x);
      const rightEnd = Math.atan2(rtopPt.y - rightCenter.y, rtopPt.x - rightCenter.x);
      surfaces.push({ kind: 'arc', cx: rightCenter.x, cy: rightCenter.y, r: R, startAngle: Math.min(rightStart, rightEnd), endAngle: Math.max(rightStart, rightEnd), isMirror: false, n1: n_out, n2: n_in });
      break;
    }
    case 'concave_lens': {
      const hh = (comp.lensH || 120) / 2;
      const R = comp.lensR || 160;
      const hw = (comp.lensW || 12) / 2;
      const d = Math.sqrt(Math.max(R * R - hh * hh, 0));
      // Left arc: arcs inward (center to the left of the surface)
      const leftCenter = rotatePoint(-hw - d, 0);
      const topPtL = rotatePoint(-hw, -hh);
      const botPtL = rotatePoint(-hw, hh);
      const ls = Math.atan2(topPtL.y - leftCenter.y, topPtL.x - leftCenter.x);
      const le = Math.atan2(botPtL.y - leftCenter.y, botPtL.x - leftCenter.x);
      surfaces.push({ kind: 'arc', cx: leftCenter.x, cy: leftCenter.y, r: R, startAngle: Math.min(ls, le), endAngle: Math.max(ls, le), isMirror: false, n1: n_out, n2: n_in });
      // Right arc: arcs inward (center to the right of the surface)
      const rightCenter = rotatePoint(hw + d, 0);
      const topPtR = rotatePoint(hw, -hh);
      const botPtR = rotatePoint(hw, hh);
      const rs = Math.atan2(botPtR.y - rightCenter.y, botPtR.x - rightCenter.x);
      const re = Math.atan2(topPtR.y - rightCenter.y, topPtR.x - rightCenter.x);
      surfaces.push({ kind: 'arc', cx: rightCenter.x, cy: rightCenter.y, r: R, startAngle: Math.min(rs, re), endAngle: Math.max(rs, re), isMirror: false, n1: n_out, n2: n_in });
      break;
    }
  }
  return surfaces;
}

// ========== 获取光源射线 ==========
function getSourceRays(comp) {
  const cx = comp.x, cy = comp.y, a = comp.angle;
  const cos = Math.cos(a), sin = Math.sin(a);
  const rays = [];
  if (comp.type === 'laser_single') {
    rays.push({ ox: cx, oy: cy, dx: cos, dy: sin, color: 0 });
  } else if (comp.type === 'laser_triple') {
    const perpX = -sin, perpY = cos;
    for (let i = -1; i <= 1; i++) {
      const ox = cx + perpX * i * 8;
      const oy = cy + perpY * i * 8;
      rays.push({ ox, oy, dx: cos, dy: sin, color: i + 1 });
    }
  }
  return rays;
}

// ========== 光线追踪 ==========
function intersectLineRay(x1, y1, x2, y2, ox, oy, dx, dy) {
  const sx = x2 - x1, sy = y2 - y1;
  const denom = dx * sy - dy * sx;
  if (Math.abs(denom) < 1e-8) return null;
  const t = ((x1 - ox) * sy - (y1 - oy) * sx) / denom;
  const s = ((x1 - ox) * dy - (y1 - oy) * dx) / denom;
  if (t <= 1e-6 || s < 0 || s > 1) return null;
  return { t, point: { x: ox + t * dx, y: oy + t * dy }, s };
}

function intersectArcRay(cx, cy, r, startAngle, endAngle, ox, oy, dx, dy) {
  const fx = ox - cx, fy = oy - cy;
  const a = dx * dx + dy * dy;
  const b = 2 * (fx * dx + fy * dy);
  const c = fx * fx + fy * fy - r * r;
  let disc = b * b - 4 * a * c;
  if (disc < 0) return null;
  disc = Math.sqrt(disc);
  // Compute chord endpoints
  const ax = cx + r * Math.cos(startAngle), ay = cy + r * Math.sin(startAngle);
  const bx = cx + r * Math.cos(endAngle), by = cy + r * Math.sin(endAngle);
  const cdx = bx - ax, cdy = by - ay;
  // Cross product of (B-A) x (C-A): tells us which side of the chord the center is on
  const crossCenter = cdx * (cy - ay) - cdy * (cx - ax);

  let bestHit = null;
  for (const t of [t1, t2]) {
    if (t <= 1e-6) continue;
    const px = ox + t * dx, py = oy + t * dy;
    const crossP = cdx * (py - ay) - cdy * (px - ax);
    if (crossP * crossCenter <= 0) {
      if (!bestHit || t < bestHit.t) {
        bestHit = { t, point: { x: px, y: py } };
      }
    }
  }
  return bestHit;
}

function normalAtLine(x1, y1, x2, y2, px, py) {
  const lx = x2 - x1, ly = y2 - y1;
  const len = Math.sqrt(lx * lx + ly * ly);
  // Normal pointing to the right of the line direction (for consistent inside/outside)
  return { nx: -ly / len, ny: lx / len };
}

function normalAtArc(cx, cy, px, py) {
  const dx = px - cx, dy = py - cy;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len < 1e-8) return { nx: 0, ny: 1 };
  return { nx: dx / len, ny: dy / len };
}

function reflect(dx, dy, nx, ny) {
  const dot = dx * nx + dy * ny;
  return { dx: dx - 2 * dot * nx, dy: dy - 2 * dot * ny };
}

function refractSimple(dx, dy, nx, ny, n1, n2) {
  // nx, ny points AGAINST the incident ray (from n1 toward n2)
  // dot(d, n) should be negative (d goes against n)
  const cos1 = -(dx * nx + dy * ny); // cos(incident angle), positive
  const ratio = n1 / n2;
  const sin2Sq = ratio * ratio * (1 - cos1 * cos1);
  if (sin2Sq > 1) return null; // TIR
  const cos2 = Math.sqrt(1 - sin2Sq);
  const factor = ratio * cos1 - cos2;
  return { dx: ratio * dx + factor * nx, dy: ratio * dy + factor * ny };
}

function flipNormalTowardRay(nx, ny, dx, dy) {
  // If normal points with the ray, flip it so it points against the ray
  if (dx * nx + dy * ny > 0) {
    return { nx: -nx, ny: -ny };
  }
  return { nx, ny };
}

function extendRay(ox, oy, dx, dy, maxLen) {
  // Extend to canvas boundary or maxLen
  let t = maxLen || 2000;
  // Clip to canvas bounds
  const bounds = [
    { x: 0, y: 0, nx: -1, ny: 0 },  { x: W, y: 0, nx: 1, ny: 0 },
    { x: 0, y: 0, nx: 0, ny: -1 },  { x: 0, y: H, nx: 0, ny: 1 },
  ];
  for (const b of bounds) {
    const denom = dx * b.nx + dy * b.ny;
    if (Math.abs(denom) < 1e-8) continue;
    const tb = ((b.x - ox) * b.nx + (b.y - oy) * b.ny) / denom;
    if (tb > 1e-6 && tb < t) t = tb;
  }
  return { x: ox + dx * t, y: oy + dy * t };
}

function traceRay(ox, oy, dx, dy, components, depth, colorIdx, currentN) {
  if (depth > 12) return [];
  if (currentN === undefined) currentN = 1.0;
  const segments = [];

  // Find closest surface intersection
  let bestT = Infinity, bestSurf = null, bestComp = null, bestPoint = null, bestNormal = null;

  for (const comp of components) {
    if (comp.type === 'laser_single' || comp.type === 'laser_triple') continue;
    const surfaces = getSurfaces(comp);
    for (const surf of surfaces) {
      let hit = null;
      if (surf.kind === 'line') {
        hit = intersectLineRay(surf.x1, surf.y1, surf.x2, surf.y2, ox, oy, dx, dy);
        if (hit) {
          hit.normal = normalAtLine(surf.x1, surf.y1, surf.x2, surf.y2, hit.point.x, hit.point.y);
        }
      } else if (surf.kind === 'arc') {
        hit = intersectArcRay(surf.cx, surf.cy, surf.r, surf.startAngle, surf.endAngle, ox, oy, dx, dy);
        if (hit) {
          hit.normal = normalAtArc(surf.cx, surf.cy, hit.point.x, hit.point.y);
        }
      }
      if (hit && hit.t < bestT - 1e-6) {
        bestT = hit.t;
        bestSurf = surf;
        bestComp = comp;
        bestPoint = hit.point;
        bestNormal = hit.normal;
      }
    }
  }

  if (!bestSurf) {
    const end = extendRay(ox, oy, dx, dy, 2000);
    segments.push({ x1: ox, y1: oy, x2: end.x, y2: end.y });
    return segments;
  }

  segments.push({ x1: ox, y1: oy, x2: bestPoint.x, y2: bestPoint.y });

  if (bestSurf.isMirror) {
    const r = reflect(dx, dy, bestNormal.nx, bestNormal.ny);
    const childSegs = traceRay(bestPoint.x, bestPoint.y, r.dx, r.dy, components, depth + 1, colorIdx, currentN);
    segments.push(...childSegs);
  } else {
    // Refraction: determine entering vs leaving
    const n1 = bestSurf.n1, n2 = bestSurf.n2; // n1=outside, n2=inside
    let fromN, toN;
    if (Math.abs(currentN - n1) < 0.01) {
      fromN = n1; toN = n2; // entering medium
    } else {
      fromN = n2; toN = n1; // leaving medium
    }
    // Make normal point against the incoming ray (from current medium to other)
    const n = flipNormalTowardRay(bestNormal.nx, bestNormal.ny, dx, dy);
    const ref = refractSimple(dx, dy, n.nx, n.ny, fromN, toN);
    if (ref) {
      const childSegs = traceRay(bestPoint.x, bestPoint.y, ref.dx, ref.dy, components, depth + 1, colorIdx, toN);
      segments.push(...childSegs);
    } else {
      // TIR - reflect
      const r = reflect(dx, dy, bestNormal.nx, bestNormal.ny);
      const childSegs = traceRay(bestPoint.x, bestPoint.y, r.dx, r.dy, components, depth + 1, colorIdx, currentN);
      segments.push(...childSegs);
    }
  }

  return segments;
}

// ========== 渲染 ==========
function drawGrid() {
  ctx.strokeStyle = 'rgba(51,65,85,0.25)';
  ctx.lineWidth = 0.5;
  const step = 40;
  for (let x = step; x < W; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = step; y < H; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  // Center crosshair
  ctx.strokeStyle = 'rgba(100,116,139,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, H/2); ctx.lineTo(W, H/2); ctx.stroke();
}

function drawComponent(comp) {
  const cx = comp.x, cy = comp.y, a = comp.angle;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(a);

  const isSelected = selectedComp && selectedComp.id === comp.id;
  const isSource = comp.type === 'laser_single' || comp.type === 'laser_triple';

  if (isSelected) {
    ctx.shadowColor = SELECTED_COLOR;
    ctx.shadowBlur = 12;
  }

  switch (comp.type) {
    case 'laser_single':
      ctx.fillStyle = '#ef4444';
      ctx.shadowColor = 'rgba(239,68,68,0.6)';
      ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.fill();
      // Arrow indicator
      ctx.strokeStyle = '#ef4444';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(22, 0); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(22, 0); ctx.lineTo(16, -4); ctx.lineTo(16, 4); ctx.closePath(); ctx.fill();
      break;

    case 'laser_triple':
      ctx.fillStyle = '#f59e0b';
      ctx.shadowColor = 'rgba(245,158,11,0.5)';
      ctx.shadowBlur = 8;
      for (let dy = -8; dy <= 8; dy += 8) {
        ctx.beginPath(); ctx.arc(0, dy, 3.5, 0, Math.PI * 2); ctx.fill();
      }
      ctx.strokeStyle = '#f59e0b';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(5, 0); ctx.lineTo(18, 0); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(18, 0); ctx.lineTo(13, -3.5); ctx.lineTo(13, 3.5); ctx.closePath(); ctx.fill();
      break;

    case 'convex_lens': {
      const hh = (comp.lensH || 120) / 2;
      const R = comp.lensR || 160;
      const hw = (comp.lensW || 12) / 2;
      const d = Math.sqrt(Math.max(R * R - hh * hh, 0));
      const lcx = -hw + d;
      const rcx = hw - d;
      const topLA = Math.atan2(-hh, -hw - lcx);
      const botLA = Math.atan2(hh, -hw - lcx);
      const topRA = Math.atan2(-hh, hw - rcx);
      const botRA = Math.atan2(hh, hw - rcx);

      ctx.fillStyle = 'rgba(56,189,248,0.12)';
      ctx.strokeStyle = isSelected ? SELECTED_COLOR : '#38bdf8';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(lcx, 0, R, topLA, botLA, true);
      ctx.arc(rcx, 0, R, botRA, topRA, true);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.strokeStyle = 'rgba(56,189,248,0.5)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 4]);
      ctx.beginPath(); ctx.moveTo(0, -hh - 5); ctx.lineTo(0, hh + 5); ctx.stroke();
      ctx.setLineDash([]);
      break;
    }

    case 'concave_lens': {
      const hh = (comp.lensH || 120) / 2;
      const R = comp.lensR || 160;
      const hw = (comp.lensW || 12) / 2;
      const d = Math.sqrt(Math.max(R * R - hh * hh, 0));
      const leftCx = -hw - d;
      const topLA = Math.atan2(-hh, -hw - leftCx);
      const botLA = Math.atan2(hh, -hw - leftCx);
      const rightCx = hw + d;
      const topRA = Math.atan2(-hh, hw - rightCx);
      const botRA = Math.atan2(hh, hw - rightCx);

      ctx.fillStyle = 'rgba(56,189,248,0.08)';
      ctx.strokeStyle = isSelected ? SELECTED_COLOR : '#38bdf8';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(leftCx, 0, R, topLA, botLA, false);
      ctx.arc(rightCx, 0, R, botRA, topRA, false);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.strokeStyle = 'rgba(56,189,248,0.5)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 4]);
      ctx.beginPath(); ctx.moveTo(0, -hh - 5); ctx.lineTo(0, hh + 5); ctx.stroke();
      ctx.setLineDash([]);
      break;
    }

    case 'flat_mirror': {
      const L = (comp.mirrorLen || 120) / 2;
      // Backing
      ctx.fillStyle = 'rgba(148,163,184,0.2)';
      ctx.fillRect(-2, -L, 4, L * 2);
      ctx.strokeStyle = isSelected ? SELECTED_COLOR : '#94a3b8';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(0, -L); ctx.lineTo(0, L); ctx.stroke();
      // Hatching on reflective side
      ctx.strokeStyle = 'rgba(148,163,184,0.4)';
      ctx.lineWidth = 1;
      for (let y = -L + 6; y < L; y += 10) {
        ctx.beginPath(); ctx.moveTo(4, y); ctx.lineTo(10, y); ctx.stroke();
      }
      break;
    }

    case 'concave_mirror': {
      const R = comp.mirrorR || 150;
      const span = comp.mirrorSpan || Math.PI / 3;
      // Arc center is at (-R, 0) in local coords
      ctx.strokeStyle = isSelected ? SELECTED_COLOR : '#94a3b8';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(-R, 0, R, -span / 2, span / 2);
      ctx.stroke();
      // Hatching
      ctx.strokeStyle = 'rgba(148,163,184,0.4)';
      ctx.lineWidth = 1;
      for (let ang = -span / 2 + 0.1; ang < span / 2; ang += 0.15) {
        const sx = -R + R * Math.cos(ang);
        const sy = R * Math.sin(ang);
        const nx = Math.cos(ang), ny = Math.sin(ang);
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(sx + nx * 6, sy + ny * 6);
        ctx.stroke();
      }
      break;
    }

    case 'convex_mirror': {
      const R = comp.mirrorR || 150;
      const span = comp.mirrorSpan || Math.PI / 3;
      ctx.strokeStyle = isSelected ? SELECTED_COLOR : '#94a3b8';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(R, 0, R, Math.PI - span / 2, Math.PI + span / 2);
      ctx.stroke();
      // Hatching
      ctx.strokeStyle = 'rgba(148,163,184,0.4)';
      ctx.lineWidth = 1;
      for (let ang = Math.PI - span / 2 + 0.1; ang < Math.PI + span / 2; ang += 0.15) {
        const sx = R + R * Math.cos(ang);
        const sy = R * Math.sin(ang);
        const nx = -Math.cos(ang), ny = -Math.sin(ang);
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(sx + nx * 6, sy + ny * 6);
        ctx.stroke();
      }
      break;
    }

    case 'glass_block': {
      const hw = (comp.blockW || 100) / 2;
      const hh = (comp.blockH || 60) / 2;
      ctx.fillStyle = 'rgba(56,189,248,0.1)';
      ctx.strokeStyle = isSelected ? SELECTED_COLOR : 'rgba(56,189,248,0.8)';
      ctx.lineWidth = 2;
      ctx.fillRect(-hw, -hh, hw * 2, hh * 2);
      ctx.strokeRect(-hw, -hh, hw * 2, hh * 2);
      ctx.fillStyle = 'rgba(56,189,248,0.4)';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('n=' + (comp.n || globalN).toFixed(2), 0, hh + 15);
      break;
    }

    case 'prism': {
      const s = comp.prismSide || 80;
      const h = s * Math.sqrt(3) / 2;
      const pts = [
        { x: 0, y: -h * 2/3 },
        { x: -s/2, y: h * 1/3 },
        { x: s/2, y: h * 1/3 }
      ];
      ctx.fillStyle = 'rgba(168,85,247,0.1)';
      ctx.strokeStyle = isSelected ? SELECTED_COLOR : 'rgba(168,85,247,0.8)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      ctx.lineTo(pts[1].x, pts[1].y);
      ctx.lineTo(pts[2].x, pts[2].y);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      break;
    }
  }

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.restore();

  // Draw rotation handle if selected
  if (isSelected && !isSource) {
    const handleDist = 35;
    const hx = cx + Math.cos(a) * handleDist;
    const hy = cy + Math.sin(a) * handleDist;
    ctx.strokeStyle = 'rgba(251,191,36,0.5)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(hx, hy); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = HANDLE_COLOR;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(hx, hy, 7, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  }

  // Selection ring
  if (isSelected && !isSource) {
    ctx.strokeStyle = SELECTED_COLOR;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 3]);
    const r = 55;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]);
  }
}

function drawRays() {
  const allSegments = [];
  // Group segments by color
  for (const comp of components) {
    const rays = getSourceRays(comp);
    for (const ray of rays) {
      const segs = traceRay(ray.ox, ray.oy, ray.dx, ray.dy, components, 0, ray.color);
      for (const seg of segs) {
        allSegments.push({ ...seg, color: ray.color });
      }
    }
  }

  // Draw glow first
  for (const seg of allSegments) {
    ctx.strokeStyle = RAY_GLOW[seg.color] || RAY_GLOW[0];
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(seg.x1, seg.y1);
    ctx.lineTo(seg.x2, seg.y2);
    ctx.stroke();
  }

  // Draw main rays
  for (const seg of allSegments) {
    ctx.strokeStyle = RAY_COLORS[seg.color] || RAY_COLORS[0];
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.moveTo(seg.x1, seg.y1);
    ctx.lineTo(seg.x2, seg.y2);
    ctx.stroke();
  }

  // Draw arrows at midpoints of segments
  for (const seg of allSegments) {
    const mx = (seg.x1 + seg.x2) / 2;
    const my = (seg.y1 + seg.y2) / 2;
    const ang = Math.atan2(seg.y2 - seg.y1, seg.x2 - seg.x1);
    const len = Math.sqrt((seg.x2 - seg.x1) ** 2 + (seg.y2 - seg.y1) ** 2);
    if (len < 15) continue;
    ctx.fillStyle = RAY_COLORS[seg.color] || RAY_COLORS[0];
    ctx.save();
    ctx.translate(mx, my);
    ctx.rotate(ang);
    ctx.beginPath();
    ctx.moveTo(5, 0);
    ctx.lineTo(-3, -3);
    ctx.lineTo(-3, 3);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

function drawNormalVectors() {
  if (!showNormals) return;
  for (const comp of components) {
    if (comp.type === 'laser_single' || comp.type === 'laser_triple') continue;
    const surfaces = getSurfaces(comp);
    for (const surf of surfaces) {
      ctx.strokeStyle = 'rgba(251,191,36,0.5)';
      ctx.lineWidth = 0.8;
      ctx.setLineDash([2, 4]);
      if (surf.kind === 'line') {
        const mx = (surf.x1 + surf.x2) / 2;
        const my = (surf.y1 + surf.y2) / 2;
        const n = normalAtLine(surf.x1, surf.y1, surf.x2, surf.y2, mx, my);
        ctx.beginPath();
        ctx.moveTo(mx, my);
        ctx.lineTo(mx + n.nx * 20, my + n.ny * 20);
        ctx.stroke();
      } else if (surf.kind === 'arc') {
        const midA = (surf.startAngle + surf.endAngle) / 2;
        const px = surf.cx + surf.r * Math.cos(midA);
        const py = surf.cy + surf.r * Math.sin(midA);
        const n = normalAtArc(surf.cx, surf.cy, px, py);
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(px + n.nx * 20, py + n.ny * 20);
        ctx.stroke();
      }
    }
  }
  ctx.setLineDash([]);
}

function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#080810';
  ctx.fillRect(0, 0, W, H);
  drawGrid();
  drawRays();
  for (const comp of components) {
    drawComponent(comp);
  }
  drawNormalVectors();

  requestAnimationFrame(render);
}

// ========== 交互处理 ==========
function canvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function findCompAt(px, py) {
  // Search in reverse order (top-most first)
  for (let i = components.length - 1; i >= 0; i--) {
    const comp = components[i];
    const dx = px - comp.x, dy = py - comp.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const hitR = (comp.type === 'convex_lens' || comp.type === 'concave_lens') ? (comp.lensH || 120) / 2
      : (comp.type === 'glass_block') ? Math.max(comp.blockW || 100, comp.blockH || 60) / 2
      : (comp.type === 'prism') ? (comp.prismSide || 80) * Math.sqrt(3) / 3
      : (comp.type === 'laser_single' || comp.type === 'laser_triple') ? 12
      : (comp.type.includes('mirror')) ? (comp.mirrorLen || 120) / 2
      : 40;
    if (dist < hitR) return comp;

    // Check rotation handle for non-source components
    if (comp.type !== 'laser_single' && comp.type !== 'laser_triple') {
      const handleDist = 35;
      const hx = comp.x + Math.cos(comp.angle) * handleDist;
      const hy = comp.y + Math.sin(comp.angle) * handleDist;
      if (Math.sqrt((px - hx) ** 2 + (py - hy) ** 2) < 10) {
        return { comp, isHandle: true };
      }
    }
  }
  return null;
}

canvas.addEventListener('mousedown', (e) => {
  const pos = canvasPos(e);
  const hit = findCompAt(pos.x, pos.y);

  if (hit && hit.isHandle) {
    // Start rotating
    rotating = true;
    dragComp = hit.comp;
    dragStart = pos;
    dragRotStartAngle = dragComp.angle;
    selectedComp = dragComp;
    updatePropPanel();
    return;
  }

  if (hit) {
    selectedComp = hit;
    dragComp = hit;
    dragStart = pos;
    dragCompStart = { x: hit.x, y: hit.y };
    updatePropPanel();
    return;
  }

  // Clicked empty space
  selectedComp = null;
  updatePropPanel();
});

canvas.addEventListener('mousemove', (e) => {
  const pos = canvasPos(e);
  if (rotating && dragComp) {
    const dx = pos.x - dragComp.x;
    const dy = pos.y - dragComp.y;
    dragComp.angle = Math.atan2(dy, dx);
    updatePropPanel();
  } else if (dragComp && dragStart && dragCompStart && !rotating) {
    dragComp.x = dragCompStart.x + (pos.x - dragStart.x);
    dragComp.y = dragCompStart.y + (pos.y - dragStart.y);
    updatePropPanel();
  }
});

canvas.addEventListener('mouseup', () => {
  dragging = false;
  rotating = false;
  dragComp = null;
  dragStart = null;
  dragCompStart = null;
});

canvas.addEventListener('mouseleave', () => {
  dragging = false;
  rotating = false;
  dragComp = null;
  dragStart = null;
  dragCompStart = null;
});

canvas.addEventListener('dblclick', (e) => {
  const pos = canvasPos(e);
  const hit = findCompAt(pos.x, pos.y);
  if (hit && !hit.isHandle) {
    components = components.filter(c => c.id !== hit.id);
    if (selectedComp && selectedComp.id === hit.id) selectedComp = null;
    updatePropPanel();
  }
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  const pos = canvasPos(touch);
  const hit = findCompAt(pos.x, pos.y);

  if (hit && hit.isHandle) {
    rotating = true;
    dragComp = hit.comp;
    dragStart = pos;
    dragRotStartAngle = dragComp.angle;
    selectedComp = dragComp;
    updatePropPanel();
  } else if (hit) {
    selectedComp = hit;
    dragComp = hit;
    dragStart = pos;
    dragCompStart = { x: hit.x, y: hit.y };
    updatePropPanel();
  } else {
    selectedComp = null;
    updatePropPanel();
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const pos = canvasPos(e.touches[0]);
  if (rotating && dragComp) {
    const dx = pos.x - dragComp.x;
    const dy = pos.y - dragComp.y;
    dragComp.angle = Math.atan2(dy, dx);
    updatePropPanel();
  } else if (dragComp && dragStart && dragCompStart && !rotating) {
    dragComp.x = dragCompStart.x + (pos.x - dragStart.x);
    dragComp.y = dragCompStart.y + (pos.y - dragStart.y);
    updatePropPanel();
  }
}, { passive: false });

canvas.addEventListener('touchend', () => {
  dragging = false; rotating = false;
  dragComp = null; dragStart = null; dragCompStart = null;
});

// ========== UI 控制 ==========
function updateCompButtons() {
  document.querySelectorAll('.comp-btn').forEach(btn => {
    btn.classList.toggle('active-type', btn.dataset.type === placingType);
  });
}

document.getElementById('compGrid').addEventListener('click', (e) => {
  const btn = e.target.closest('.comp-btn');
  if (!btn) return;
  const type = btn.dataset.type;
  placingType = null;
  updateCompButtons();

  // Immediately add component at canvas center
  const comp = {
    id: Date.now() + Math.random(),
    type: type,
    x: W / 2,
    y: H / 2,
    angle: 0,
    n: globalN,
  };
  switch (type) {
    case 'convex_lens': comp.lensH = 120; comp.lensR = 160; comp.lensW = 12; break;
    case 'concave_lens': comp.lensH = 120; comp.lensR = 160; comp.lensW = 12; break;
    case 'flat_mirror': comp.mirrorLen = 120; break;
    case 'concave_mirror': comp.mirrorR = 150; comp.mirrorSpan = Math.PI / 3; break;
    case 'convex_mirror': comp.mirrorR = 150; comp.mirrorSpan = Math.PI / 3; break;
    case 'glass_block': comp.blockW = 100; comp.blockH = 60; break;
    case 'prism': comp.prismSide = 80; break;
  }
  components.push(comp);
  selectedComp = comp;
  updatePropPanel();
});

function updatePropPanel() {
  const content = document.getElementById('propContent');
  if (!selectedComp) {
    content.innerHTML = '<div class="empty-hint">点击画布上的元件以查看属性</div>';
    return;
  }
  const comp = selectedComp;
  const def = COMP_DEFS[comp.type];
  const angleDeg = ((comp.angle * 180 / Math.PI) % 360).toFixed(1);

  let html = `<div class="prop-row"><span>类型</span><span>${def.icon} ${def.name}</span></div>`;
  html += `<div class="prop-row"><span>位置</span><span>(${comp.x.toFixed(0)}, ${comp.y.toFixed(0)})</span></div>`;
  html += `<div class="prop-row"><span>角度</span><span>${angleDeg}°</span></div>`;

  if (comp.type.includes('lens')) {
    html += `<div class="prop-row"><span>透镜高度</span><span>${(comp.lensH || 120)}px</span></div>`;
    html += `<label style="font-size:0.75rem;color:var(--text-muted);margin-top:0.3rem;">高度: <span>${comp.lensH || 120}px</span></label>`;
    html += `<input type="range" min="60" max="180" value="${comp.lensH || 120}" oninput="selectedComp.lensH=parseInt(this.value);updatePropPanel();">`;
    html += `<label style="font-size:0.75rem;color:var(--text-muted);margin-top:0.3rem;">曲率半径: <span>${comp.lensR || 160}px</span></label>`;
    html += `<input type="range" min="80" max="300" value="${comp.lensR || 160}" oninput="selectedComp.lensR=parseInt(this.value);updatePropPanel();">`;
  }

  if (comp.type === 'flat_mirror') {
    html += `<div class="prop-row"><span>镜面长度</span><span>${comp.mirrorLen || 120}px</span></div>`;
    html += `<label style="font-size:0.75rem;color:var(--text-muted);margin-top:0.3rem;">长度: <span>${comp.mirrorLen || 120}px</span></label>`;
    html += `<input type="range" min="40" max="250" value="${comp.mirrorLen || 120}" oninput="selectedComp.mirrorLen=parseInt(this.value);updatePropPanel();">`;
  }

  if (comp.type === 'concave_mirror' || comp.type === 'convex_mirror') {
    html += `<div class="prop-row"><span>曲率半径</span><span>${comp.mirrorR || 150}px</span></div>`;
    html += `<label style="font-size:0.75rem;color:var(--text-muted);margin-top:0.3rem;">半径: <span>${comp.mirrorR || 150}px</span></label>`;
    html += `<input type="range" min="60" max="300" value="${comp.mirrorR || 150}" oninput="selectedComp.mirrorR=parseInt(this.value);updatePropPanel();">`;
  }

  if (comp.type === 'glass_block') {
    html += `<div class="prop-row"><span>宽度</span><span>${comp.blockW || 100}px</span></div>`;
    html += `<label style="font-size:0.75rem;color:var(--text-muted);margin-top:0.3rem;">宽度: <span>${comp.blockW || 100}px</span></label>`;
    html += `<input type="range" min="40" max="200" value="${comp.blockW || 100}" oninput="selectedComp.blockW=parseInt(this.value);updatePropPanel();">`;
    html += `<label style="font-size:0.75rem;color:var(--text-muted);margin-top:0.3rem;">高度: <span>${comp.blockH || 60}px</span></label>`;
    html += `<input type="range" min="20" max="150" value="${comp.blockH || 60}" oninput="selectedComp.blockH=parseInt(this.value);updatePropPanel();">`;
  }

  if (comp.type === 'prism') {
    html += `<div class="prop-row"><span>边长</span><span>${comp.prismSide || 80}px</span></div>`;
    html += `<label style="font-size:0.75rem;color:var(--text-muted);margin-top:0.3rem;">边长: <span>${comp.prismSide || 80}px</span></label>`;
    html += `<input type="range" min="30" max="160" value="${comp.prismSide || 80}" oninput="selectedComp.prismSide=parseInt(this.value);updatePropPanel();">`;
  }

  if (comp.type !== 'laser_single' && comp.type !== 'laser_triple' && !comp.type.includes('mirror')) {
    html += `<label style="font-size:0.75rem;color:var(--text-muted);margin-top:0.3rem;">折射率: <span>${(comp.n || globalN).toFixed(2)}</span></label>`;
    html += `<input type="range" min="1.0" max="2.5" step="0.01" value="${(comp.n || globalN).toFixed(2)}" oninput="selectedComp.n=parseFloat(this.value);updatePropPanel();">`;
  }

  html += `<div style="margin-top:0.5rem;"><button class="btn danger" style="width:100%;" onclick="deleteSelected()">🗑 删除此元件</button></div>`;

  content.innerHTML = html;
}

function deleteSelected() {
  if (!selectedComp) return;
  components = components.filter(c => c.id !== selectedComp.id);
  selectedComp = null;
  updatePropPanel();
}

function toggleNormals() {
  showNormals = !showNormals;
  document.getElementById('btnNormals').textContent = showNormals ? '📐 隐藏法线' : '📐 显示法线';
}

function setGlobalN(v) {
  globalN = parseFloat(v);
  document.getElementById('nVal').textContent = globalN.toFixed(2);
}

// 键盘快捷键
window.addEventListener('keydown', (e) => {
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (selectedComp && document.activeElement === document.body) {
      deleteSelected();
    }
  }
  if (e.key === 'Escape') {
    placingType = null;
    selectedComp = null;
    updateCompButtons();
    updatePropPanel();
  }
  // 方向键微调位置
  if (selectedComp && ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
    e.preventDefault();
    const step = e.shiftKey ? 10 : 1;
    if (e.key === 'ArrowLeft') selectedComp.x -= step;
    if (e.key === 'ArrowRight') selectedComp.x += step;
    if (e.key === 'ArrowUp') selectedComp.y -= step;
    if (e.key === 'ArrowDown') selectedComp.y += step;
    updatePropPanel();
  }
});

// ========== 全局函数暴露 ==========
window.clearAll = clearAll;
window.toggleNormals = toggleNormals;
window.setGlobalN = setGlobalN;
window.deleteSelected = deleteSelected;
window.addComponent = addComponent;

// ========== 初始化和预置演示 ==========
function initDemo() {
  // Add a triple laser source
  const laser = {
    id: Date.now(),
    type: 'laser_triple',
    x: 60,
    y: H / 2,
    angle: 0,
    n: globalN,
  };
  components.push(laser);

  // Add a convex lens
  const lens = {
    id: Date.now() + 1,
    type: 'convex_lens',
    x: W / 2 - 60,
    y: H / 2,
    angle: 0,
    lensH: 120,
    lensR: 160,
    lensW: 12,
    n: globalN,
  };
  components.push(lens);
}

initDemo();
render();

// 响应窗口大小变化
window.addEventListener('resize', () => {
  resize();
});
</script>
</body>
