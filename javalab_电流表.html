  <script>
// === 工具函数（源自 javalab.js） ===
var notClicked = true;

function doFullScreen() {
  var el = document.getElementById("divFull");
  if(el.requestFullscreen) el.requestFullscreen();
  else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  else if(el.mozRequestFullScreen) el.mozRequestFullScreen();

function doFullScreen2() {

  else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  else if(el.mozRequestFullScreen) el.mozRequestFullScreen();
  else if(el.msRequestFullscreen) el.msRequestFullscreen();
}

function contain(x, y, x1, y1, w1, h1) {
  if(x < x1 || x > (x1 + w1) || y < y1 || y > (y1 + h1)) return false;
  return true;
}

function draw2DArrow2(x, y, cx, cy, thick) {
  var lArrow = sqrt(cx * cx + cy * cy);
  var oxArrow = [0, lArrow - 2*thick, lArrow - 2*thick, lArrow, lArrow - 2*thick, lArrow - 2*thick, 0];
  var oyArrow = [thick, thick, 2*thick, 0, -2*thick, -thick, -thick];
  push();
  translate(x, y);
  rotate(atan2(cy, cx));
  beginShape();
  for(var i = 0; i < oxArrow.length; i++) { vertex(max(oxArrow[i], 0), oyArrow[i]); }
  endShape(CLOSE);
  pop();
}

// === 电流表仿真（汉化版 language=3） ===
var language = 3;
var labelA, rangeA, rangeAvalue = 0, radioA;
var checkA, chalkA;
var imgMagnet_05, imgMagnet_5, imgCoil;
var centerX = 0.5, centerY = 0.3;
var current = 0, theta1 = 0, theta2 = 0;
var cableX = [[0,0,0,0],[0,0,0,0]];
var cableY = [[0,0,0,0],[0,0,0,0]];
var pathNode = [[],[],[],[],[],[],[]];
var pathNodeLength = [];
var pathNodes = [0,0,0,0,0,0,0];
var pathX1 = [[1.00,0.65],[0.575],[0.5],[0.425,0.35],[],[-0.045,-0.035,0.042,-0.054,-0.044,0.048,-0.058,-0.048,0.048,-0.058,-0.048,0.044,-0.052,-0.042,0.035],[]];
var pathY1 = [[0.48,0.48],[0.4],[0.4],[0.4,0.48],[],[0.035,0.032,0.029,0.021,0.018,0.014,0.006,0.002,-0.002,-0.011,-0.014,-0.018,-0.026,-0.029,-0.032],[]];
var pathX2 = [[0.65,0.575],[0.5],[0.425],[0.35,0],[],[-0.035,0.042,0.052,-0.044,0.048,0.058,-0.048,0.048,0.058,-0.048,0.044,0.054,-0.042,0.035,0.045],[]];
var pathY2 = [[0.48,0.4],[0.4],[0.4],[0.48,0.48],[],[0.032,0.029,0.026,0.018,0.014,0.011,0.002,-0.002,-0.006,-0.014,-0.018,-0.021,-0.029,-0.032,-0.035],[]];
var path1 = [[],[],[],[],[],[],[],[]];
var path2 = [[],[],[],[],[],[],[],[]];

function preload() {
  imgMagnet_05 = loadImage("images/ammeter_magnet_05.png");
  imgMagnet_5 = loadImage("images/ammeter_magnet_5.png");
  imgCoil = loadImage("images/ammeter_coil.png");
}

function setup() {
  frameRate(50);
  var o = select("#myContainer");
  var a = 0.5;
  var w = int(min(o.width, (window.innerHeight - 160) / a));
  var h = int(w * a);
  myCanvas = createCanvas(w, h);
  myCanvas.parent("myContainer");
  myCanvas.id("myP5Canvas");
  radioA = createRadio("radioA");
  radioA.option("500mA ", "0");
  radioA.option("5A ", "1");
  radioA.parent("radioA");
  radioA.value("1");
  radioA.changed(setup2);
  labelA = select("#labelA");
  labelA.html("电流强度");
  rangeA = select("#rangeA");
  checkA = select("#checkA");
  chalkA = select("#chalkA");
  chalkA.html("电流");
  setup2();
}

function setup2() {
  if(radioA.value() == "0") {
    pathX1[2] = [0.5]; pathY1[2] = [0.4];
    pathX2[2] = [0.425]; pathY2[2] = [0.4];
    pathX1[3] = [0.425,0.35]; pathY1[3] = [0.4,0.48];
    pathX2[3] = [0.35,0]; pathY2[3] = [0.48,0.48];
  } else {
    pathX1[2] = [0.425]; pathY1[2] = [0.4];
    pathX2[2] = [0.5]; pathY2[2] = [0.4];
    pathX1[3] = [0.5,0.425]; pathY1[3] = [0.4,0.48];
    pathX2[3] = [0.425,0]; pathY2[3] = [0.48,0.48];
  }
  for(var i = 0; i < pathNodes.length; i++) { pathCalculate(i); }
}

function pathCalculate(i) {
  if(i == 4) {
    cableX[0][3] = (centerX + 0.055*cos(theta2 + QUARTER_PI));
    cableY[0][3] = (centerY + 0.055*sin(theta2 + QUARTER_PI));
    cableX[0][2] = (centerX + 0.08*cos(theta2 + 0.7*QUARTER_PI));
    cableY[0][2] = (centerY + 0.08*sin(theta2 + 0.7*QUARTER_PI));
    cableX[0][1] = (centerX + 0.11*cos(theta2*0.5 + 0.15*PI));
    cableY[0][1] = (centerY + 0.11*sin(theta2*0.5 + 0.15*PI));
    cableX[0][0] = 0.575; cableY[0][0] = 0.4;
    for(var j = 0; j < 10; j++) {
      var t1 = j/10, t2 = (j+1)/10;
      pathX1[4][j] = cableX[0][0]*(1-t1)*(1-t1)*(1-t1) + 3*cableX[0][1]*t1*(1-t1)*(1-t1) + 3*cableX[0][2]*t1*t1*(1-t1) + cableX[0][3]*t1*t1*t1;
      pathY1[4][j] = cableY[0][0]*(1-t1)*(1-t1)*(1-t1) + 3*cableY[0][1]*t1*(1-t1)*(1-t1) + 3*cableY[0][2]*t1*t1*(1-t1) + cableY[0][3]*t1*t1*t1;
      pathX2[4][j] = cableX[0][0]*(1-t2)*(1-t2)*(1-t2) + 3*cableX[0][1]*t2*(1-t2)*(1-t2) + 3*cableX[0][2]*t2*t2*(1-t2) + cableX[0][3]*t2*t2*t2;
      pathY2[4][j] = cableY[0][0]*(1-t2)*(1-t2)*(1-t2) + 3*cableY[0][1]*t2*(1-t2)*(1-t2) + 3*cableY[0][2]*t2*t2*(1-t2) + cableY[0][3]*t2*t2*t2;
    }
  }
  if(i == 6) {
    cableX[1][0] = (centerX + 0.055*cos(theta2 + 5*QUARTER_PI));
    cableY[1][0] = (centerY + 0.055*sin(theta2 + 5*QUARTER_PI));
    cableX[1][1] = (centerX + 0.09*cos(theta2 + 4.6*QUARTER_PI));
    cableY[1][1] = (centerY + 0.09*sin(theta2 + 4.6*QUARTER_PI));
    cableX[1][2] = (centerX + 0.11*cos(theta2*0.5 + PI));
    cableY[1][2] = (centerY + 0.11*sin(theta2*0.5 + PI));
    cableX[1][3] = 0.425; cableY[1][3] = 0.4;
    for(var j = 0; j < 10; j++) {
      var t1 = j/10, t2 = (j+1)/10;
      pathX1[6][j] = cableX[1][0]*(1-t1)*(1-t1)*(1-t1) + 3*cableX[1][1]*t1*(1-t1)*(1-t1) + 3*cableX[1][2]*t1*t1*(1-t1) + cableX[1][3]*t1*t1*t1;
      pathY1[6][j] = cableY[1][0]*(1-t1)*(1-t1)*(1-t1) + 3*cableY[1][1]*t1*(1-t1)*(1-t1) + 3*cableY[1][2]*t1*t1*(1-t1) + cableY[1][3]*t1*t1*t1;
      pathX2[6][j] = cableX[1][0]*(1-t2)*(1-t2)*(1-t2) + 3*cableX[1][1]*t2*(1-t2)*(1-t2) + 3*cableX[1][2]*t2*t2*(1-t2) + cableX[1][3]*t2*t2*t2;
      pathY2[6][j] = cableY[1][0]*(1-t2)*(1-t2)*(1-t2) + 3*cableY[1][1]*t2*(1-t2)*(1-t2) + 3*cableY[1][2]*t2*t2*(1-t2) + cableY[1][3]*t2*t2*t2;
    }
  }
  for(var j = 0; j < pathX1[i].length; j++) {
    path1[i][j] = (j == 0) ? 0 : path2[i][j-1];
    path2[i][j] = path1[i][j] + dist(pathX1[i][j], pathY1[i][j], pathX2[i][j], pathY2[i][j]);
  }
  pathNodeLength[i] = path2[i][pathX1[i].length - 1];
  pathNodeLength[4] = 0.3;
  pathNodeLength[6] = 0.3;
  pathNodes[i] = round(pathNodeLength[i] * 30);
  for(var j = 0; j < pathNodes[i]; j++) { pathNode[i][j] = map(j, 0, pathNodes[i], 0, pathNodeLength[i]); }
}

function windowResized() {
  var o = select("#myContainer");
  var a = 0.5;
  var w = int(min(o.width, (window.innerHeight - 160) / a));
  var h = int(w * a);
  resizeCanvas(w, h);
}

function draw() {
  if(touches.length > 1) return;
  if(mouseIsPressed) {
    if(contain(mouseX, mouseY, 0, 0, width, height)) {
      if(!touchB) { touchX = mouseX; touchY = mouseY; }
      touchB = true;
    }
  } else {
    if(touchB)
      if(dist(mouseX, mouseY, touchX, touchY) < width*0.01) {
        if(dist(mouseX, mouseY, width*0.425, width*0.4) < width*0.04) { radioA.value("0"); setup2(); }
        if(dist(mouseX, mouseY, width*0.5, width*0.4) < width*0.04) { radioA.value("1"); setup2(); }
      }
    touchB = false;
  }
  background(255);
  textSize(width*0.03);
  textAlign(CENTER, BOTTOM);
  theta1 = map(rangeA.value(), 0, 100, 0, HALF_PI);
  if(radioA.value() == "0") theta1 *= 10;
  theta1 -= QUARTER_PI;
  theta2 = lerp(theta2, theta1, 0.1);
  theta2 = constrain(theta2, -0.25*PI, 0.285*PI);
  {
    var indexs = [4, 6];
    for(var ii = 0; ii < 2; ii++) {
      var i = indexs[ii];
      var v1 = 999, v2 = 999;
      for(var j = 0; j < pathNodes[i]; j++) { v1 = pathNode[i][j]; if(v1 < v2) v2 = v1; }
      pathCalculate(i);
      for(var j = 0; j < pathNodes[i]; j++) { pathNode[i][j] += v2; }
    }
  }
  rectMode(CENTER);
  noStroke();
  fill(244);
  rect(width*0.5, width*0.2, width*0.5, width*0.5);
  {
    noFill(); stroke(0); strokeWeight(width*0.002);
    bezier(width*cableX[0][0], width*cableY[0][0], width*cableX[0][1], width*cableY[0][1], width*cableX[0][2], width*cableY[0][2], width*cableX[0][3], width*cableY[0][3]);
  }
  {
    noFill(); stroke(0); strokeWeight(width*0.002);
    bezier(width*cableX[1][0], width*cableY[1][0], width*cableX[1][1], width*cableY[1][1], width*cableX[1][2], width*cableY[1][2], width*cableX[1][3], width*cableY[1][3]);
  }
  imageMode(CORNER);
  if(radioA.value() == "0") image(imgMagnet_05, 0, 0, width, width*0.5);
  else image(imgMagnet_5, 0, 0, width, width*0.5);
  var alpha = map(rangeA.value(), 0, 100, 0, 0.5);
  if(radioA.value() == "0") alpha *= 10;
  push();
  translate(width*centerX, width*centerY);
  rotate(theta2);
  noStroke();
  fill(lerpColor(color(128), color(255, 0, 0), alpha));
  arc(0, 0, width*0.105, width*0.105, PI, TWO_PI);
  fill(lerpColor(color(128), color(0, 0, 255), alpha));
  arc(0, 0, width*0.105, width*0.105, 0, PI);
  imageMode(CENTER);
  image(imgCoil, 0, 0, width*0.14, width*0.14);
  pop();
  current = rangeA.value();
  if(checkA.checked())
    for(var i = 0; i < pathNodes.length; i++) {
      for(var j = 0; j < pathNodes[i]; j++) {
        if(i == 0) pathNode[i][j] += current/20000;
        if(radioA.value() == "0") {
          if(i == 1) pathNode[i][j] += (5/6)*current/20000;
          if(i == 2) pathNode[i][j] += (5/6)*current/20000;
          if(i == 4) pathNode[i][j] += (1/6)*current/20000;
          if(i == 5) pathNode[i][j] += (1/6)*current/20000;
          if(i == 6) pathNode[i][j] += (1/6)*current/20000;
        } else {
          if(i == 1) pathNode[i][j] += (5.7/6)*current/20000;
          if(i == 2) pathNode[i][j] += (0.3/6)*current/20000;
          if(i == 4) pathNode[i][j] += (0.3/6)*current/20000;
          if(i == 5) pathNode[i][j] += (0.3/6)*current/20000;
          if(i == 6) pathNode[i][j] += (0.3/6)*current/20000;
        }
        if(i == 3) pathNode[i][j] += current/20000;
        if(pathNode[i][j] > pathNodeLength[i]) pathNode[i][j] -= pathNodeLength[i];
        if(pathNode[i][j] < 0) pathNode[i][j] += pathNodeLength[i];
      }
      drawCharges(i);
    }
  noFill();
  strokeWeight(width*0.004);
  stroke(255, 191, 128);
  beginShape();
  for(var i = 0; i < 30; i++) {
    var t = map(i, 0, 29, theta2 - 1.3, -15.9);
    var r = map(i, 0, 29, 0.02, map(theta2, -QUARTER_PI, QUARTER_PI, 0.05, 0.04));
    var x = width*(centerX + r*cos(t));
    var y = width*(centerY + r*sin(t));
    curveVertex(x, y);
  }
  var x = width*(centerX - 0.041);
  var y = width*(centerY + 0.075);
  curveVertex(x, y);
  curveVertex(x, y);
  endShape();
  fill(255, 191, 128);
  ellipse(x, y, width*0.01, width*0.01);
  stroke(0);
  textAlign(CENTER, CENTER);
  push();
  translate(width*centerX, width*centerY);
  strokeWeight(width*0.001);
  for(var i = 0; i <= 50; i++) {
    var t = map(i, 0, 50, -3*QUARTER_PI, -QUARTER_PI);
    var x1 = width*0.22*cos(t);
    var y1 = width*0.22*sin(t);
    var x2 = width*0.24*cos(t);
    var y2 = width*0.24*sin(t);
    line(x1, y1, x2, y2);
  }
  strokeWeight(width*0.002);
  for(var i = 0; i <= 50; i += 10) {
    stroke(0);
    var t = map(i, 0, 50, -3*QUARTER_PI, -QUARTER_PI);
    var x1 = width*0.22*cos(t);
    var y1 = width*0.22*sin(t);
    var x2 = width*0.25*cos(t);
    var y2 = width*0.25*sin(t);
    line(x1, y1, x2, y2);
    push();
    fill(0);
    noStroke();
    translate(width*0.27*cos(t), width*0.27*sin(t));
    rotate(map(i, 0, 50, -QUARTER_PI, QUARTER_PI));
    text(round(i/10) + "", 0, 0);
    pop();
  }
  pop();
  push();
  translate(width*centerX, width*centerY);
  rotate(theta2);
  fill(190);
  noStroke();
  beginShape();
  vertex(-width*0.01, width*0.01);
  vertex(0, -width*0.24);
  vertex(width*0.01, width*0.01);
  endShape(CLOSE);
  pop();
  noStroke();
  fill(0);
  ellipse(width*0.66, width*0.18, width*0.01, width*0.01);
}

function drawCharges(i) {
  if(i == 5) { push(); translate(width*centerX, width*centerY); rotate(theta2); }
  fill(0);
  noStroke();
  for(var j = 0; j < pathNodes[i]; j++)
    for(var k = 0; k < pathX1[i].length; k++) {
      if(path1[i][k] <= pathNode[i][j])
        if(pathNode[i][j] <= path2[i][k]) {
          var x = width*map(pathNode[i][j], path1[i][k], path2[i][k], pathX1[i][k], pathX2[i][k]);
          var y = width*map(pathNode[i][j], path1[i][k], path2[i][k], pathY1[i][k], pathY2[i][k]);
          var t = atan2(pathY2[i][k] - pathY1[i][k], pathX2[i][k] - pathX1[i][k]);
          drawCurrent(x, y, t);
        }
    }
  if(i == 5) { pop(); }
}

function drawCurrent(x, y, t) {
  var cx = width*0.006*cos(t);
  var cy = width*0.006*sin(t);
  stroke(255, 191);
  strokeWeight(1);
  fill(255, 0, 0, 191);
  draw2DArrow2(x - cx, y - cy, 2*cx, 2*cy, width*0.0025);
}

var touchB = false;
var touchX = 0, touchY = 0;
  </script>

  <script>
    (function() {
      var header = document.querySelector('.header');
      var hideTimer = null;
      var HIDE_DELAY = 800;
      function show() { clearTimeout(hideTimer); header.classList.remove('hidden'); document.body.classList.remove('header-hidden'); }
      function hide() { hideTimer = setTimeout(function() { header.classList.add('hidden'); document.body.classList.add('header-hidden'); }, HIDE_DELAY); }
      document.addEventListener('mousemove', function(e) {
        if (e.clientY <= 60) show();
        else if (e.clientY > header.offsetHeight + 20 && !header.classList.contains('hidden')) hide();
      });
      header.addEventListener('mouseenter', show);
      header.addEventListener('mouseleave', hide);
      hideTimer = setTimeout(function() { header.classList.add('hidden'); document.body.classList.add('header-hidden'); }, 2000);
    })();
  </script>
