  <div class="section">

  <div id="quizOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;overflow-y:auto;">

  <script>
    // ===== 全局变量（与原始代码完全一致） =====
    var checkA, checkB, checkC, checkT, checkD, checkPause, chalkPause;
    var chalkA, chalkB, chalkC, chalkT, chalkD;
    var img_motor_1, img_motor_2;
    var theta = 1;
    var lastTheta = 1;
    var mode = 'motor';  // 'motor' or 'generator'
    var motorX = 561, motorY = 132;
    var roterMax = 12;
    var roterX = [-40, -20, -20, -100, -100, -100, 100, 100, 100, 20, 20, 40];
    var roterY = [-195, -195, -60, -60, 0, 60, 60, 0, -60, -60, -195, -195];
    var vectorX = [], vectorY = [];
    var vectorOX = [-100, 100], vectorOY = 0;
    var bridgeX = motorX - 195, bridgeY = motorY + 195;
    var translateY = 30;
    var dragged = false;
    var dragSpeed = 0;
    var pmx, pmy;

    // ===== 工具函数（来自 javalab.js） =====
    function mod(x, y) {
      if (x < 0) x += y * (ceil(abs(x) / y) + 1);
      var c = floor(x / y);
      return x - y * c;
    }
    function switchMode(newMode) {
      mode = newMode;
      if (mode === 'generator') {
        document.getElementById('expTitle').textContent = '直流发电机原理';
        document.getElementById('expDesc').textContent = '观察直流发电机如何利用电磁感应原理将机械能转换为电能。拖动线圈旋转或点击运行来发电，观察灯泡亮度和感应电流方向。';
        chalkD.html('转动');
        chalkA.html('显示感应电流方向');
        chalkC.html('显示电磁阻力');
        chalkT.html('显示驱动转矩');
        document.getElementById('forceGroup').style.opacity = '0.5';
        document.getElementById('torqueGroup').style.opacity = '0.5';
        checkC.checked(false);
        checkT.checked(false);
      } else {
        document.getElementById('expTitle').textContent = '直流电动机原理';
        document.getElementById('expDesc').textContent = '观察直流电动机中电流、磁场、电磁力和转矩的相互作用。拖动线圈可手动旋转，理解换向器如何实现持续转动。';
        chalkD.html('运行');
        chalkA.html('显示电流方向');
        chalkC.html('显示电磁力');
        chalkT.html('显示转矩');
        document.getElementById('forceGroup').style.opacity = '1';
        document.getElementById('torqueGroup').style.opacity = '1';
        checkC.checked(true);
        checkT.checked(true);
      }
    }
    function contain(x, y, x1, y1, w1, h1) {
      if (x < x1) return false;
      if (x > (x1 + w1)) return false;
      if (y < y1) return false;
      if (y > (y1 + h1)) return false;
      return true;
    }

    // ===== 箭头绘制（与原始 drawArrow2D_thick 完全一致） =====
    function drawArrow2D_thick(x, y, cx, cy, thick) {
      var lArrow = sqrt(cx * cx + cy * cy);
      if (lArrow < 1) return;
      var oxArrow = [0, lArrow - 2 * thick, lArrow - 2 * thick, lArrow, lArrow - 2 * thick, lArrow - 2 * thick, 0];
      var oyArrow = [thick, thick, 2 * thick, 0, -2 * thick, -thick, -thick];
      push();
      translate(x, y);
      rotate(atan2(cy, cx));
      beginShape();
      for (var i = 0; i < oxArrow.length; i++) {
        vertex(max(oxArrow[i], 0), oyArrow[i]);
      }
      endShape(CLOSE);
      pop();
    }

    // ===== 预加载图像 =====
    function preload() {
      img_motor_1 = loadImage("lee/image/dc_motor_2_1.png");
      img_motor_2 = loadImage("lee/image/dc_motor_2_2.png");
    }

    function setup() {
      frameRate(20);
      var o = select("#myContainer");
      var a = 0.5;
      var w = int(min(o.width, (window.innerHeight - 200) / a));
      var h = int(w * a);
      myCanvas = createCanvas(w, h);
      myCanvas.parent("myContainer");
      myCanvas.id("myP5Canvas");

      checkA = select("#checkA"); chalkA = select("#chalkA");
      checkB = select("#checkB"); chalkB = select("#checkB");
      checkC = select("#checkC"); chalkC = select("#checkC");
      checkT = select("#checkT"); chalkT = select("#checkT");
      checkD = select("#checkD"); chalkD = select("#checkD");
      checkPause = select("#checkPause"); chalkPause = select("#chalkPause");
    }

    function windowResized() {
      var o = select("#myContainer");
      var a = 0.5;
      var w = int(min(o.width, (window.innerHeight - 200) / a));
      var h = int(w * a);
      resizeCanvas(w, h);
    }

    function draw() {
      background(233);
      textSize(20);
      push();
      scale(width / 1000);
      strokeCap(ROUND);
      strokeJoin(ROUND);
      translate(0, translateY);

      var tBefore = theta;
      if (checkD.checked() && !mouseIsPressed && !checkPause.checked()) theta += 0.05;
      var rotSpeed = abs(theta - tBefore) + dragSpeed;
      dragSpeed = 0;
      theta = mod(theta, PI);
      // Handle theta wrap-around
      if (rotSpeed > PI / 2) rotSpeed = abs(PI - rotSpeed);

      for (var i = 0; i < 2; i++) {
        vectorX[i] = motorX + vectorOX[i] * sin(theta) + vectorOY;
        vectorY[i] = motorY + vectorOX[i] * cos(theta) - vectorOY;
      }

      // 1. 背景静态图像（磁铁等）
      image(img_motor_1, 0, 0, 1000, 450);

      // 2. 线圈后层
      stroke(64, 32, 0);
      noFill();
      drawRoter(false);

      // 3. 箭头后层（磁场/电流/力/转矩）
      stroke(233);
      drawVector(false);

      // 4. 磁场线
      noFill();
      stroke(0, 255, 0);
      strokeWeight(3);
      if (checkB.checked()) drawMagnetic();

      // 5. 拖拽指示点
      if (dragged) {
        noStroke();
        fill(255, 0, 255);
        ellipse(motorX, motorY, 10, 10);
      }

      // 6. 线圈前层
      drawRoter(true);

      // 7. 箭头前层
      stroke(233);
      drawVector(true);

      // 8. 换向器
      strokeWeight(8);
      noFill();
      stroke(64, 32, 0);
      for (var i = 0; i < 2; i++) {
        beginShape();
        for (var t = PI * 0.1; t < PI; t += PI * 0.1) {
          curveVertex(
            bridgeX + 42 * sin(t + theta + PI * i + HALF_PI),
            bridgeY + 42 * cos(t + theta + PI * i + HALF_PI)
          );
        }
        endShape();
      }

      // 9. 前景静态图像（电池、电刷、导线）
      image(img_motor_2, 0, 0, 1000, 450);

      // 10. 发电机模式：绘制灯泡（覆盖电池位置）
      if (mode === 'generator') {
        drawBulb(rotSpeed);
      }

      pop();
    }

    // ===== 灯泡绘制（发电机模式） =====
    function drawBulb(rotSpeed) {
      var bx = 500, by = 395;  // 灯泡中心位置（原电池位置）
      var glowAlpha = min(rotSpeed * 8, 0.9);
      var bulbBright = min(rotSpeed * 12, 1);

      noStroke();

      // 发光光晕（多层）
      if (glowAlpha > 0.02) {
        drawingContext.save();
        drawingContext.filter = 'blur(6px)';
        fill(255, 220, 80, glowAlpha * 160);
        ellipse(bx, by, 38, 38);
        drawingContext.filter = 'blur(3px)';
        fill(255, 240, 150, glowAlpha * 200);
        ellipse(bx, by, 24, 24);
        drawingContext.restore();
      }

      // 灯泡主体
      fill(255, 250, 200, 160 + bulbBright * 95);
      ellipse(bx, by, 18, 18);

      // 灯泡高光
      fill(255, 255, 255, 200);
      ellipse(bx - 3, by - 3, 6, 6);

      // 灯泡底座（螺纹接口）
      fill(160, 160, 160);
      rectMode(CENTER);
      rect(bx, by + 13, 8, 6, 2);
      rect(bx, by + 18, 10, 4, 1);

      // 底部触点
      fill(120, 120, 120);
      ellipse(bx, by + 21, 6, 3);
      rectMode(CORNER);

      // 灯泡轮廓
      noFill();
      stroke(200, 180, 120, 150);
      strokeWeight(1.5);
      ellipse(bx, by, 18, 18);
      noStroke();
    }

    // ===== 转子绘制 =====
    function drawRoter(bFront) {
      push();
      noFill();
      strokeCap(SQUARE);
      stroke(233);
      strokeWeight(8);
      drawRoter2(bFront);
      stroke(64, 32, 0);
      strokeWeight(4);
      drawRoter2(bFront);
      pop();
    }

    function drawRoter2(bFront) {
      if (bFront) {
        beginShape();
        for (var i = 0; i < roterMax; i++) {
          if (roterY[i] <= 0)
            vertex(
              motorX + roterX[i] * sin(theta) + roterY[i],
              motorY + roterX[i] * cos(theta) - roterY[i]
            );
          else {
            endShape();
            beginShape();
          }
        }
        endShape();
      } else {
        beginShape();
        for (var i = 0; i < roterMax; i++) {
          if (roterY[i] >= 0)
            vertex(
              motorX + roterX[i] * sin(theta) + roterY[i],
              motorY + roterX[i] * cos(theta) - roterY[i]
            );
        }
        endShape();
      }
    }

    // ===== 箭头向量绘制 =====
    function drawVector(bFront) {
      // 磁场方向箭头（绿色）
      for (var i = 0; i < 2; i++) {
        if (checkB.checked()) {
          fill(0, 128, 0);
          if (!bFront) drawArrow2D_thick(vectorX[0], vectorY[0], 50, 0, 7);
          if (bFront) drawArrow2D_thick(vectorX[1], vectorY[1], 50, 0, 7);
        }
      }

      if (PI * 0.1 < theta && theta < PI * 0.9) {
        for (var i = 0; i < 2; i++) {
          // 电流方向（黑色）
          if (checkA.checked()) {
            fill(0);
            if (!bFront) drawArrow2D_thick(vectorX[0], vectorY[0], 40, -40, 7);
            if (bFront) drawArrow2D_thick(vectorX[1], vectorY[1], -40, 40, 7);
          }
          // 电磁力（红色）
          if (checkC.checked()) {
            fill(255, 0, 0);
            if (!bFront) drawArrow2D_thick(vectorX[0], vectorY[0], 0, 80, 7);
            if (bFront) drawArrow2D_thick(vectorX[1], vectorY[1], 0, -80, 7);
          }
          // 转矩（品红色）
          if (checkT.checked()) {
            fill(255, 0, 255);
            var x1 = bFront ? vectorX[1] : vectorX[0];
            var y1 = bFront ? vectorY[1] : vectorY[0];
            var x2 = 80 * cos((bFront ? 0 : PI) + theta) * sin(theta);
            var y2 = -80 * sin((bFront ? 0 : PI) + theta) * sin(theta);
            drawArrow2D_thick(x1, y1, x2, y2, 7);
          }
        }
      }
    }

    // ===== 磁场线绘制 =====
    function drawMagnetic() {
      var minX = motorX - 185;
      var maxX = motorX + 185;
      var minY = motorY - 60;
      var maxY = motorY + 60;
      var lineX = [vectorX[0], vectorX[1]];
      var lineY = [vectorY[0], vectorY[1]];
      var lineMax = 8;
      var poleX = [], poleY = [], poleIsN = [];

      for (var j = 0; j < lineMax; j++) {
        poleX.push(minX - 20);
        poleY.push(map(j, 0, lineMax - 1, minY - 16, maxY + 16));
        poleIsN.push(true);
      }
      for (var j = 0; j < lineMax; j++) {
        poleX.push(maxX + 20);
        poleY.push(map(j, 0, lineMax - 1, minY - 16, maxY + 16));
        poleIsN.push(false);
      }

      for (var c = 1; c < lineMax - 1; c++) {
        var steps = 600;
        var forward = (c < lineMax / 2);
        var current = forward ? 4 : -4;
        var flux = forward ? 20 : -20;
        var foreX = [], foreY = [];
        foreX.push(forward ? minX : maxX);
        foreY.push(poleY[c]);

        for (var i = 0; i < steps; i++) {
          var x = foreX[foreX.length - 1];
          var y = foreY[foreX.length - 1];
          var vecX = 0, vecY = 0;

          if (PI * 0.1 < theta && theta < PI * 0.9) {
            for (var k = 0; k < 2; k++) {
              var r = dist(x, y, lineX[k], lineY[k]);
              var hi = ((k === 0) ? -1 : 1) * current / r / r;
              vecX += hi * (y - lineY[k]) / r;
              vecY -= hi * (x - lineX[k]) / r;
            }
          }

          for (var j = 0; j < poleX.length; j++) {
            var len = pow(x - poleX[j], 2) + pow(y - poleY[j], 2);
            vecX += flux * (poleIsN[j] ? 1 : -1) / len * ((x - poleX[j]) / sqrt(len));
            vecY += flux * (poleIsN[j] ? 1 : -1) / len * ((y - poleY[j]) / sqrt(len));
          }

          var h = sqrt(vecX * vecX + vecY * vecY);
          if (h < 0.001) break;
          x += vecX / h;
          y += vecY / h;
          foreX.push(x);
          foreY.push(y);

          if (forward) { if (x > maxX) break; }
          else { if (x < minX) break; }
        }

        var biasY = (foreY[foreX.length - 1] - foreY[0]);
        for (var ii = 0; ii < foreX.length; ii++)
          foreY[ii] -= biasY * ii / (foreX.length - 1);

        strokeWeight(7);
        stroke(233);
        beginShape();
        if (forward)
          for (var ii = 60; ii < foreX.length; ii++) vertex(foreX[ii], foreY[ii]);
        else
          for (var ii = 0; ii < foreX.length - 60; ii++) vertex(foreX[ii], foreY[ii]);
        endShape();

        strokeWeight(3);
        stroke(0, 255, 0);
        beginShape();
        for (var ii = 0; ii < foreX.length; ii++) vertex(foreX[ii], foreY[ii]);
        endShape();
      }
    }

    // ===== 交互：拖拽旋转 =====
    function touchStarted() {
      if (!contain(mouseX, mouseY, 0, 0, width, height)) return;
      if (touches.length > 1) return;
      dragged = true;
      dragSpeed = 0;
      pmx = mouseX * 1000 / width;
      pmy = mouseY * 1000 / height;
      return false;
    }

    function touchMoved() {
      if (touches.length > 1) return;
      if (dragged) {
        var rot1 = atan2(pmy - (motorY + translateY), pmx - motorX);
        var rot2 = atan2(mouseY * 1000 / height - (motorY + translateY), mouseX * 1000 / width - motorX);
        var oldT = theta;
        theta += rot1 - rot2;
        dragSpeed += abs(theta - oldT);
        if (dragSpeed > PI / 2) dragSpeed = abs(PI - dragSpeed);
        pmx = mouseX * 1000 / width;
        pmy = mouseY * 1000 / height;
        return false;
      }
    }

      dragged = false;

      dragged = true;
      dragSpeed = 0;
      pmx = mouseX * 1000 / width;

        var oldT = theta;
        theta += rot1 - rot2;

        if (dragSpeed > PI / 2) dragSpeed = abs(PI - dragSpeed);
        pmx = mouseX * 1000 / width;

              try { localStorage.setItem(QUIZ_STORAGE_KEY, JSON.stringify(serverData)); } catch(e) {}
              return serverData;
            }
          }

      return "";

      html += '<p style="font-size:16px;margin:8px 0;color:#94a3b8;">' + (correctCount >= 4 ? "太棒了!" : (correctCount >= 2 ? "继续加油!" : "再看看实验吧!")) + "</p>";
      if (quizRound < 2) {
        html += '<p style="font-size:13px;color:#64748b;margin-bottom:8px;">已完成第' + (quizRound + 1) + "关，进度已保存</p>";
        html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnReviewRound" style="font-size:14px;">查看回顾</button></div>';
        html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnNextRound" style="font-size:14px;padding:8px 24px;">进入下一关</button><button class="btn-reset" id="btnRetryRound" style="font-size:14px;">重新挑战本关</button></div>';
      } else {
        var total = quizScores[0] + quizScores[1] + quizScores[2];
        html = '<div class="quiz-score ' + (total >= 12 ? "great" : total >= 8 ? "good" : "poor") + '">' + total + "/15</div>";
        html += '<p style="font-size:14px;color:#94a3b8;margin-bottom:8px;">第1关: ' + quizScores[0] + '/5 &nbsp; 第2关: ' + quizScores[1] + '/5 &nbsp; 第3关: ' + quizScores[2] + "/5</p>";
        html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnReviewRound" style="font-size:14px;">查看回顾</button></div>';
        html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnRetryAll" style="font-size:14px;padding:8px 24px;">重新全部挑战</button><button class="btn-reset" id="btnBackExp" style="font-size:14px;">返回实验</button></div>';
      }
      document.getElementById("quizResult").innerHTML = html;
      bindResultButtons();
    }

    function initQuiz() {
      btnChallenge = select("#btnChallenge"); btnCloseQuiz = select("#btnCloseQuiz"); btnResetQuiz = select("#btnResetQuiz");
      quizOverlay = select("#quizOverlay"); quizTitle = select("#quizTitle"); quizProgressFill = select("#quizProgressFill");
      quizBody = select("#quizBody"); quizResult = select("#quizResult");
      btnChallenge.mouseClicked(startQuiz); btnCloseQuiz.mouseClicked(closeQuiz); btnResetQuiz.mouseClicked(resetQuiz);
      updateChallengeButton();
    }

    var _origSetup = setup;
    setup = function() { _origSetup(); initQuiz(); };
  </script>
</body>
</html>
