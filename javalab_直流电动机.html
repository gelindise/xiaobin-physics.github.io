<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=10">
  <title>直流电动机原理 - 物理虚拟实验</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <script src="auth-check.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/addons/p5.dom.min.js"></script>
  <style>
    #myP5Canvas { touch-action: pinch-zoom; display: block; margin: 0 auto; border-radius: 12px; }
    .canvas-wrap { border-radius: 12px; padding: 4px; width: 100%; box-sizing: border-box; border: 1px solid #e2e8f0; position: relative; background: #fff; }
    .controls-bar { display: flex; align-items: center; justify-content: center; padding: 10px 16px; gap: 20px; flex-wrap: wrap; background: #f8fafc; border-radius: 0 0 12px 12px; border-top: 1px solid #e2e8f0; }
    .ctrl-group { display: flex; align-items: center; gap: 6px; font-size: 14px; color: #334155; }
    .ctrl-group input[type="checkbox"] { accent-color: #3b82f6; }
    .section { padding: 1.5rem 2rem 0.5rem; }
    .section h2 { font-size: 1.4rem; }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">物理虚拟实验</div>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="experiments.html">实验列表</a>
    </nav>
  </header>

  <div class="section">
    <h2>直流电动机原理</h2>
    <p style="color:#94a3b8;margin:0 0 16px 0;">观察直流电动机中电流、磁场、电磁力和转矩的相互作用。拖动线圈可手动旋转，理解换向器如何实现持续转动。</p>
  </div>

  <div class="main-card">
    <div class="canvas-wrap">
      <div id="myContainer"></div>
    </div>
    <div class="controls-bar">
      <div class="ctrl-group">
        <input type="checkbox" id="checkA" checked>
        <label id="chalkA" for="checkA">显示电流方向</label>
      </div>
      <div class="ctrl-group">
        <input type="checkbox" id="checkB" checked>
        <label id="chalkB" for="checkB" style="color:#0B0;">显示磁场</label>
      </div>
      <div class="ctrl-group">
        <input type="checkbox" id="checkC" checked>
        <label id="chalkC" for="checkC" style="color:#f00;">显示电磁力</label>
      </div>
      <div class="ctrl-group">
        <input type="checkbox" id="checkT" checked>
        <label id="chalkT" for="checkT" style="color:#f0f;">显示转矩</label>
      </div>
      <div class="ctrl-group">
        <input type="checkbox" id="checkD" checked>
        <label id="chalkD" for="checkD">运行</label>
      </div>
    </div>
  </div>

  <script>
    var checkA, checkB, checkC, checkT, checkD;
    var chalkA, chalkB, chalkC, chalkT, chalkD;
    var theta = 1;
    var motorX = 561, motorY = 132;
    var roterMax = 12;
    var roterX = [-40, -20, -20, -100, -100, -100, 100, 100, 100, 20, 20, 40];
    var roterY = [-195, -195, -60, -60, 0, 60, 60, 0, -60, -60, -195, -195];
    var vectorX = [], vectorY = [];
    var vectorOX = [-100, 100], vectorOY = 0;
    var bridgeX = motorX - 195, bridgeY = motorY + 195;
    var translateY = 30;
    var dragged = false;
    var pmx, pmy;

    function setup() {
      frameRate(20);
      var o = select("#myContainer");
      var a = 0.5;
      var w = int(min(o.width, (window.innerHeight - 200) / a));
      var h = int(w * a);
      myCanvas = createCanvas(w, h);
      myCanvas.parent("myContainer");
      myCanvas.id("myP5Canvas");

      checkA = select("#checkA"); chalkA = select("#chalkA");
      checkB = select("#checkB"); chalkB = select("#chalkB");
      checkC = select("#checkC"); chalkC = select("#chalkC");
      checkT = select("#checkT"); chalkT = select("#chalkT");
      checkD = select("#checkD"); chalkD = select("#chalkD");
    }

    function windowResized() {
      var o = select("#myContainer");
      var a = 0.5;
      var w = int(min(o.width, (window.innerHeight - 200) / a));
      var h = int(w * a);
      resizeCanvas(w, h);
    }

    function draw() {
      background(233);
      textSize(20);
      push();
      scale(width / 1000);
      strokeCap(ROUND);
      strokeJoin(ROUND);
      translate(0, translateY);

      if (checkD.checked() && !mouseIsPressed) theta += 0.05;
      theta = theta % PI;
      if (theta < 0) theta += PI;

      for (var i = 0; i < 2; i++) {
        vectorX[i] = motorX + vectorOX[i] * sin(theta) + vectorOY;
        vectorY[i] = motorY + vectorOX[i] * cos(theta) - vectorOY;
      }

      drawStaticBack();
      stroke(64, 32, 0);
      noFill();
      drawRoter(false);
      stroke(233);
      drawVector(false);
      noFill();
      stroke(0, 255, 0);
      strokeWeight(3);
      if (checkB.checked()) drawMagnetic();

      if (dragged) {
        noStroke();
        fill(255, 0, 255);
        ellipse(motorX, motorY, 10, 10);
      }

      drawRoter(true);
      stroke(233);
      drawVector(true);

      strokeWeight(8);
      noFill();
      stroke(64, 32, 0);
      for (var i = 0; i < 2; i++) {
        beginShape();
        for (var t = PI * 0.1; t < PI; t += PI * 0.1) {
          curveVertex(
            bridgeX + 42 * sin(t + theta + PI * i + HALF_PI),
            bridgeY + 42 * cos(t + theta + PI * i + HALF_PI)
          );
        }
        endShape();
      }

      drawStaticFront();
      pop();
    }

    function drawStaticBack() {
      var mw = 45, mh = 170, my = motorY - 60;

      // 左磁铁 — N极面对线圈
      var mxL = motorX - 210;
      // 外半部分（S，蓝色）
      noStroke();
      fill(60, 80, 210);
      rect(mxL, my, mw / 2, mh, 4, 0, 0, 4);
      // 内半部分（N，红色，面对线圈）
      fill(210, 50, 50);
      rect(mxL + mw / 2, my, mw / 2, mh, 0, 4, 4, 0);
      // 标签
      fill(255);
      textSize(22);
      textAlign(CENTER, CENTER);
      text("S", mxL + mw * 0.25, motorY + 70);
      text("N", mxL + mw * 0.75, motorY + 70);

      // 右磁铁 — S极面对线圈
      var mxR = motorX + 165;
      fill(60, 80, 210);
      rect(mxR, my, mw / 2, mh, 4, 0, 0, 4);
      fill(210, 50, 50);
      rect(mxR + mw / 2, my, mw / 2, mh, 0, 4, 4, 0);
      fill(255);
      text("S", mxR + mw * 0.25, motorY + 70);
      text("N", mxR + mw * 0.75, motorY + 70);

      // 磁铁底座
      fill(160, 160, 170);
      noStroke();
      rect(mxL - 6, my + mh - 8, mw + 12, 18, 6);
      rect(mxR - 6, my + mh - 8, mw + 12, 18, 6);
    }

    function drawStaticFront() {
      // 电刷支架及电刷
      var brushW = 16, brushH = 26;
      var bLY = bridgeY - 22;
      // 左电刷
      noStroke();
      fill(100);
      rect(bridgeX - 22 - brushW, bLY, brushW, brushH, 5);
      // 右电刷
      rect(bridgeX + 22, bLY, brushW, brushH, 5);

      // 左电刷接触点
      fill(60);
      ellipse(bridgeX - 22 - brushW / 2, bridgeY, 9, 9);
      // 右电刷接触点
      ellipse(bridgeX + 22 + brushW / 2, bridgeY, 9, 9);

      // 导线：电池到电刷
      var batCX = motorX - 210, batCY = bridgeY + 80;
      strokeWeight(3.5);
      strokeCap(ROUND);

      // 红线：电池正极 → 右电刷
      stroke(220, 50, 50);
      noFill();
      beginShape();
      vertex(batCX - 10, batCY);
      vertex(batCX - 10, batCY - 45);
      vertex(bridgeX + 60, bridgeY + 55);
      vertex(bridgeX + 22 + brushW / 2, bridgeY + 10);
      endShape();

      // 蓝线：电池负极 → 左电刷
      stroke(50, 100, 220);
      beginShape();
      vertex(batCX + 75, batCY);
      vertex(batCX + 90, batCY);
      vertex(batCX + 90, bridgeY + 55);
      vertex(bridgeX - 60, bridgeY + 55);
      vertex(bridgeX - 22 - brushW / 2, bridgeY + 10);
      endShape();

      // 电池
      var batX = batCX, batY = batCY;
      // 电池主体
      noStroke();
      fill(50);
      rect(batX, batY, 78, 34, 8);
      // 正极凸起
      fill(240, 190, 30);
      rect(batX - 12, batY + 6, 14, 22, 4);
      // 负极
      fill(140);
      rect(batX + 78, batY + 6, 10, 22, 4);
      // 标签
      fill(30);
      textSize(15);
      textAlign(CENTER, CENTER);
      text("+", batX - 5, batY + 17);
      text("−", batX + 89, batY + 17);

      // 电池标签 "电池"
      fill(80);
      textSize(13);
      textAlign(CENTER, CENTER);
      text("电池", batX + 39, batY - 12);
    }

    function drawRoter(bFront) {
      push();
      noFill();
      strokeCap(SQUARE);
      stroke(233);
      strokeWeight(8);
      drawRoter2(bFront);
      stroke(64, 32, 0);
      strokeWeight(4);
      drawRoter2(bFront);
      pop();
    }

    function drawRoter2(bFront) {
      if (bFront) {
        beginShape();
        for (var i = 0; i < roterMax; i++) {
          if (roterY[i] <= 0)
            vertex(
              motorX + roterX[i] * sin(theta) + roterY[i],
              motorY + roterX[i] * cos(theta) - roterY[i]
            );
          else {
            endShape();
            beginShape();
          }
        }
        endShape();
      } else {
        beginShape();
        for (var i = 0; i < roterMax; i++) {
          if (roterY[i] >= 0)
            vertex(
              motorX + roterX[i] * sin(theta) + roterY[i],
              motorY + roterX[i] * cos(theta) - roterY[i]
            );
        }
        endShape();
      }
    }

    function drawVector(bFront) {
      // 磁场方向指示（绿色箭头）
      for (var i = 0; i < 2; i++) {
        if (checkB.checked()) {
          fill(0, 128, 0);
          if (!bFront) drawArrow2D(vectorX[0], vectorY[0], 50, 0, 7);
          if (bFront) drawArrow2D(vectorX[1], vectorY[1], 50, 0, 7);
        }
      }

      if (PI * 0.1 < theta && theta < PI * 0.9) {
        for (var i = 0; i < 2; i++) {
          // 电流方向（黑色箭头）
          if (checkA.checked()) {
            fill(0);
            if (!bFront) drawArrow2D(vectorX[0], vectorY[0], 40, -40, 7);
            if (bFront) drawArrow2D(vectorX[1], vectorY[1], -40, 40, 7);
          }
          // 电磁力（红色箭头）
          if (checkC.checked()) {
            fill(255, 0, 0);
            if (!bFront) drawArrow2D(vectorX[0], vectorY[0], 0, 80, 7);
            if (bFront) drawArrow2D(vectorX[1], vectorY[1], 0, -80, 7);
          }
          // 转矩（紫色箭头）
          if (checkT.checked()) {
            fill(255, 0, 255);
            var x1 = bFront ? vectorX[1] : vectorX[0];
            var y1 = bFront ? vectorY[1] : vectorY[0];
            var x2 = 80 * cos((bFront ? 0 : PI) + theta) * sin(theta);
            var y2 = -80 * sin((bFront ? 0 : PI) + theta) * sin(theta);
            drawArrow2D(x1, y1, x2, y2, 7);
          }
        }
      }
    }

    function drawArrow2D(x, y, dx, dy, thick) {
      var d = sqrt(dx * dx + dy * dy);
      if (d < 1) return;
      var ux = dx / d, uy = dy / d;
      var px = x + dx, py = y + dy;

      // 箭头线体（用四边形填充代替线条，保持粗细一致）
      var hw = thick * 0.45;
      noStroke();
      quad(
        x - uy * hw, y + ux * hw,
        x + uy * hw, y - ux * hw,
        px + uy * hw, py - ux * hw,
        px - uy * hw, py + ux * hw
      );

      // 箭头头部
      var hs = thick * 1.8;
      hw = thick * 0.9;
      triangle(
        px, py,
        px - ux * hs + uy * hw, py - uy * hs - ux * hw,
        px - ux * hs - uy * hw, py - uy * hs + ux * hw
      );
    }

    function drawMagnetic() {
      var minX = motorX - 185;
      var maxX = motorX + 185;
      var minY = motorY - 60;
      var maxY = motorY + 60;
      var lineX = [vectorX[0], vectorX[1]];
      var lineY = [vectorY[0], vectorY[1]];
      var lineMax = 8;
      var poleX = [], poleY = [], poleIsN = [];

      for (var j = 0; j < lineMax; j++) {
        poleX.push(minX - 20);
        poleY.push(map(j, 0, lineMax - 1, minY - 16, maxY + 16));
        poleIsN.push(true);
      }
      for (var j = 0; j < lineMax; j++) {
        poleX.push(maxX + 20);
        poleY.push(map(j, 0, lineMax - 1, minY - 16, maxY + 16));
        poleIsN.push(false);
      }

      for (var c = 1; c < lineMax - 1; c++) {
        var steps = 600;
        var forward = (c < lineMax / 2);
        var current = forward ? 4 : -4;
        var flux = forward ? 20 : -20;
        var foreX = [], foreY = [];
        foreX.push(forward ? minX : maxX);
        foreY.push(poleY[c]);

        for (var i = 0; i < steps; i++) {
          var x = foreX[foreX.length - 1];
          var y = foreY[foreX.length - 1];
          var vecX = 0, vecY = 0;

          if (PI * 0.1 < theta && theta < PI * 0.9) {
            for (var k = 0; k < 2; k++) {
              var r = dist(x, y, lineX[k], lineY[k]);
              var hi = ((k === 0) ? -1 : 1) * current / r / r;
              vecX += hi * (y - lineY[k]) / r;
              vecY -= hi * (x - lineX[k]) / r;
            }
          }

          for (var j = 0; j < poleX.length; j++) {
            var len = pow(x - poleX[j], 2) + pow(y - poleY[j], 2);
            vecX += flux * (poleIsN[j] ? 1 : -1) / len * ((x - poleX[j]) / sqrt(len));
            vecY += flux * (poleIsN[j] ? 1 : -1) / len * ((y - poleY[j]) / sqrt(len));
          }

          var h = sqrt(vecX * vecX + vecY * vecY);
          if (h < 0.001) break;
          x += vecX / h;
          y += vecY / h;
          foreX.push(x);
          foreY.push(y);

          if (forward) { if (x > maxX) break; }
          else { if (x < minX) break; }
        }

        var biasY = (foreY[foreX.length - 1] - foreY[0]);
        for (var ii = 0; ii < foreX.length; ii++)
          foreY[ii] -= biasY * ii / (foreX.length - 1);

        strokeWeight(7);
        stroke(233);
        beginShape();
        if (forward)
          for (var ii = 60; ii < foreX.length; ii++) vertex(foreX[ii], foreY[ii]);
        else
          for (var ii = 0; ii < foreX.length - 60; ii++) vertex(foreX[ii], foreY[ii]);
        endShape();

        strokeWeight(3);
        stroke(0, 255, 0);
        beginShape();
        for (var ii = 0; ii < foreX.length; ii++) vertex(foreX[ii], foreY[ii]);
        endShape();
      }
    }

    function touchStarted() {
      if (touches.length > 1) return;
      dragged = true;
      pmx = mouseX * 1000 / width;
      pmy = mouseY * 1000 / height;
      return false;
    }

    function touchMoved() {
      if (touches.length > 1) return;
      if (dragged) {
        var rot1 = atan2(pmy - (motorY + translateY), pmx - motorX);
        var rot2 = atan2(mouseY * 1000 / height - (motorY + translateY), mouseX * 1000 / width - motorX);
        theta += rot1 - rot2;
        pmx = mouseX * 1000 / width;
        pmy = mouseY * 1000 / height;
        return false;
      }
    }

    function touchEnded() {
      dragged = false;
    }

    function mousePressed() {
      dragged = true;
      pmx = mouseX * 1000 / width;
      pmy = mouseY * 1000 / height;
    }

    function mouseDragged() {
      if (dragged) {
        var rot1 = atan2(pmy - (motorY + translateY), pmx - motorX);
        var rot2 = atan2(mouseY * 1000 / height - (motorY + translateY), mouseX * 1000 / width - motorX);
        theta += rot1 - rot2;
        pmx = mouseX * 1000 / width;
        pmy = mouseY * 1000 / height;
      }
    }

    function mouseReleased() {
      dragged = false;
    }
  </script>
</body>
</html>
