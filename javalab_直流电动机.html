<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=10">
  <title>直流电动机原理 - 物理虚拟实验</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <script src="auth-check.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/addons/p5.dom.min.js"></script>
  <style>
    #myP5Canvas { touch-action: pinch-zoom; display: block; margin: 0 auto; border-radius: 12px; }
    .canvas-wrap { border-radius: 12px; padding: 4px; width: 100%; box-sizing: border-box; border: 1px solid #e2e8f0; position: relative; background: #fff; }
    .controls-bar { display: flex; align-items: center; justify-content: center; padding: 10px 16px; gap: 20px; flex-wrap: wrap; background: #f8fafc; border-radius: 0 0 12px 12px; border-top: 1px solid #e2e8f0; }
    .ctrl-group { display: flex; align-items: center; gap: 6px; font-size: 14px; color: #334155; }
    .ctrl-group input[type="checkbox"] { accent-color: #3b82f6; }
    .section { padding: 1.5rem 2rem 0.5rem; }
    .section h2 { font-size: 1.4rem; }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">物理虚拟实验</div>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="experiments.html">实验列表</a>
    </nav>
  </header>

  <div class="section">
    <h2>直流电动机原理</h2>
    <p style="color:#94a3b8;margin:0 0 16px 0;">观察直流电动机中电流、磁场、电磁力和转矩的相互作用。拖动线圈可手动旋转，理解换向器如何实现持续转动。</p>
  </div>

  <div class="main-card">
    <div class="canvas-wrap">
      <div id="myContainer"></div>
    </div>
    <div class="controls-bar">
      <div class="ctrl-group">
        <input type="checkbox" id="checkA" checked>
        <label id="chalkA" for="checkA">显示电流方向</label>
      </div>
      <div class="ctrl-group">
        <input type="checkbox" id="checkB" checked>
        <label id="chalkB" for="checkB" style="color:#0B0;">显示磁场</label>
      </div>
      <div class="ctrl-group">
        <input type="checkbox" id="checkC" checked>
        <label id="chalkC" for="checkC" style="color:#f00;">显示电磁力</label>
      </div>
      <div class="ctrl-group">
        <input type="checkbox" id="checkT" checked>
        <label id="chalkT" for="checkT" style="color:#f0f;">显示转矩</label>
      </div>
      <div class="ctrl-group">
        <input type="checkbox" id="checkD" checked>
        <label id="chalkD" for="checkD">运行</label>
      </div>
    </div>
  </div>

  <script>
    // ===== 全局变量（与原始代码完全一致） =====
    var checkA, checkB, checkC, checkT, checkD;
    var chalkA, chalkB, chalkC, chalkT, chalkD;
    var img_motor_1, img_motor_2;
    var theta = 1;
    var motorX = 561, motorY = 132;
    var roterMax = 12;
    var roterX = [-40, -20, -20, -100, -100, -100, 100, 100, 100, 20, 20, 40];
    var roterY = [-195, -195, -60, -60, 0, 60, 60, 0, -60, -60, -195, -195];
    var vectorX = [], vectorY = [];
    var vectorOX = [-100, 100], vectorOY = 0;
    var bridgeX = motorX - 195, bridgeY = motorY + 195;
    var translateY = 30;
    var dragged = false;
    var pmx, pmy;

    // ===== 工具函数（来自 javalab.js） =====
    function mod(x, y) {
      if (x < 0) x += y * (ceil(abs(x) / y) + 1);
      var c = floor(x / y);
      return x - y * c;
    }
    function contain(x, y, x1, y1, w1, h1) {
      if (x < x1) return false;
      if (x > (x1 + w1)) return false;
      if (y < y1) return false;
      if (y > (y1 + h1)) return false;
      return true;
    }

    // ===== 箭头绘制（与原始 drawArrow2D_thick 完全一致） =====
    function drawArrow2D_thick(x, y, cx, cy, thick) {
      var lArrow = sqrt(cx * cx + cy * cy);
      if (lArrow < 1) return;
      var oxArrow = [0, lArrow - 2 * thick, lArrow - 2 * thick, lArrow, lArrow - 2 * thick, lArrow - 2 * thick, 0];
      var oyArrow = [thick, thick, 2 * thick, 0, -2 * thick, -thick, -thick];
      push();
      translate(x, y);
      rotate(atan2(cy, cx));
      beginShape();
      for (var i = 0; i < oxArrow.length; i++) {
        vertex(max(oxArrow[i], 0), oyArrow[i]);
      }
      endShape(CLOSE);
      pop();
    }

    // ===== 预加载图像 =====
    function preload() {
      img_motor_1 = loadImage("lee/image/dc_motor_2_1.png");
      img_motor_2 = loadImage("lee/image/dc_motor_2_2.png");
    }

    function setup() {
      frameRate(20);
      var o = select("#myContainer");
      var a = 0.5;
      var w = int(min(o.width, (window.innerHeight - 200) / a));
      var h = int(w * a);
      myCanvas = createCanvas(w, h);
      myCanvas.parent("myContainer");
      myCanvas.id("myP5Canvas");

      checkA = select("#checkA"); chalkA = select("#chalkA");
      checkB = select("#checkB"); chalkB = select("#checkB");
      checkC = select("#checkC"); chalkC = select("#checkC");
      checkT = select("#checkT"); chalkT = select("#checkT");
      checkD = select("#checkD"); chalkD = select("#checkD");
    }

    function windowResized() {
      var o = select("#myContainer");
      var a = 0.5;
      var w = int(min(o.width, (window.innerHeight - 200) / a));
      var h = int(w * a);
      resizeCanvas(w, h);
    }

    function draw() {
      background(233);
      textSize(20);
      push();
      scale(width / 1000);
      strokeCap(ROUND);
      strokeJoin(ROUND);
      translate(0, translateY);

      if (checkD.checked() && !mouseIsPressed) theta += 0.05;
      theta = mod(theta, PI);

      for (var i = 0; i < 2; i++) {
        vectorX[i] = motorX + vectorOX[i] * sin(theta) + vectorOY;
        vectorY[i] = motorY + vectorOX[i] * cos(theta) - vectorOY;
      }

      // 1. 背景静态图像（磁铁等）
      image(img_motor_1, 0, 0, 1000, 450);

      // 2. 线圈后层
      stroke(64, 32, 0);
      noFill();
      drawRoter(false);

      // 3. 箭头后层（磁场/电流/力/转矩）
      stroke(233);
      drawVector(false);

      // 4. 磁场线
      noFill();
      stroke(0, 255, 0);
      strokeWeight(3);
      if (checkB.checked()) drawMagnetic();

      // 5. 拖拽指示点
      if (dragged) {
        noStroke();
        fill(255, 0, 255);
        ellipse(motorX, motorY, 10, 10);
      }

      // 6. 线圈前层
      drawRoter(true);

      // 7. 箭头前层
      stroke(233);
      drawVector(true);

      // 8. 换向器
      strokeWeight(8);
      noFill();
      stroke(64, 32, 0);
      for (var i = 0; i < 2; i++) {
        beginShape();
        for (var t = PI * 0.1; t < PI; t += PI * 0.1) {
          curveVertex(
            bridgeX + 42 * sin(t + theta + PI * i + HALF_PI),
            bridgeY + 42 * cos(t + theta + PI * i + HALF_PI)
          );
        }
        endShape();
      }

      // 9. 前景静态图像（电池、电刷、导线）
      image(img_motor_2, 0, 0, 1000, 450);

      pop();
    }

    // ===== 转子绘制 =====
    function drawRoter(bFront) {
      push();
      noFill();
      strokeCap(SQUARE);
      stroke(233);
      strokeWeight(8);
      drawRoter2(bFront);
      stroke(64, 32, 0);
      strokeWeight(4);
      drawRoter2(bFront);
      pop();
    }

    function drawRoter2(bFront) {
      if (bFront) {
        beginShape();
        for (var i = 0; i < roterMax; i++) {
          if (roterY[i] <= 0)
            vertex(
              motorX + roterX[i] * sin(theta) + roterY[i],
              motorY + roterX[i] * cos(theta) - roterY[i]
            );
          else {
            endShape();
            beginShape();
          }
        }
        endShape();
      } else {
        beginShape();
        for (var i = 0; i < roterMax; i++) {
          if (roterY[i] >= 0)
            vertex(
              motorX + roterX[i] * sin(theta) + roterY[i],
              motorY + roterX[i] * cos(theta) - roterY[i]
            );
        }
        endShape();
      }
    }

    // ===== 箭头向量绘制 =====
    function drawVector(bFront) {
      // 磁场方向箭头（绿色）
      for (var i = 0; i < 2; i++) {
        if (checkB.checked()) {
          fill(0, 128, 0);
          if (!bFront) drawArrow2D_thick(vectorX[0], vectorY[0], 50, 0, 7);
          if (bFront) drawArrow2D_thick(vectorX[1], vectorY[1], 50, 0, 7);
        }
      }

      if (PI * 0.1 < theta && theta < PI * 0.9) {
        for (var i = 0; i < 2; i++) {
          // 电流方向（黑色）
          if (checkA.checked()) {
            fill(0);
            if (!bFront) drawArrow2D_thick(vectorX[0], vectorY[0], 40, -40, 7);
            if (bFront) drawArrow2D_thick(vectorX[1], vectorY[1], -40, 40, 7);
          }
          // 电磁力（红色）
          if (checkC.checked()) {
            fill(255, 0, 0);
            if (!bFront) drawArrow2D_thick(vectorX[0], vectorY[0], 0, 80, 7);
            if (bFront) drawArrow2D_thick(vectorX[1], vectorY[1], 0, -80, 7);
          }
          // 转矩（品红色）
          if (checkT.checked()) {
            fill(255, 0, 255);
            var x1 = bFront ? vectorX[1] : vectorX[0];
            var y1 = bFront ? vectorY[1] : vectorY[0];
            var x2 = 80 * cos((bFront ? 0 : PI) + theta) * sin(theta);
            var y2 = -80 * sin((bFront ? 0 : PI) + theta) * sin(theta);
            drawArrow2D_thick(x1, y1, x2, y2, 7);
          }
        }
      }
    }

    // ===== 磁场线绘制 =====
    function drawMagnetic() {
      var minX = motorX - 185;
      var maxX = motorX + 185;
      var minY = motorY - 60;
      var maxY = motorY + 60;
      var lineX = [vectorX[0], vectorX[1]];
      var lineY = [vectorY[0], vectorY[1]];
      var lineMax = 8;
      var poleX = [], poleY = [], poleIsN = [];

      for (var j = 0; j < lineMax; j++) {
        poleX.push(minX - 20);
        poleY.push(map(j, 0, lineMax - 1, minY - 16, maxY + 16));
        poleIsN.push(true);
      }
      for (var j = 0; j < lineMax; j++) {
        poleX.push(maxX + 20);
        poleY.push(map(j, 0, lineMax - 1, minY - 16, maxY + 16));
        poleIsN.push(false);
      }

      for (var c = 1; c < lineMax - 1; c++) {
        var steps = 600;
        var forward = (c < lineMax / 2);
        var current = forward ? 4 : -4;
        var flux = forward ? 20 : -20;
        var foreX = [], foreY = [];
        foreX.push(forward ? minX : maxX);
        foreY.push(poleY[c]);

        for (var i = 0; i < steps; i++) {
          var x = foreX[foreX.length - 1];
          var y = foreY[foreX.length - 1];
          var vecX = 0, vecY = 0;

          if (PI * 0.1 < theta && theta < PI * 0.9) {
            for (var k = 0; k < 2; k++) {
              var r = dist(x, y, lineX[k], lineY[k]);
              var hi = ((k === 0) ? -1 : 1) * current / r / r;
              vecX += hi * (y - lineY[k]) / r;
              vecY -= hi * (x - lineX[k]) / r;
            }
          }

          for (var j = 0; j < poleX.length; j++) {
            var len = pow(x - poleX[j], 2) + pow(y - poleY[j], 2);
            vecX += flux * (poleIsN[j] ? 1 : -1) / len * ((x - poleX[j]) / sqrt(len));
            vecY += flux * (poleIsN[j] ? 1 : -1) / len * ((y - poleY[j]) / sqrt(len));
          }

          var h = sqrt(vecX * vecX + vecY * vecY);
          if (h < 0.001) break;
          x += vecX / h;
          y += vecY / h;
          foreX.push(x);
          foreY.push(y);

          if (forward) { if (x > maxX) break; }
          else { if (x < minX) break; }
        }

        var biasY = (foreY[foreX.length - 1] - foreY[0]);
        for (var ii = 0; ii < foreX.length; ii++)
          foreY[ii] -= biasY * ii / (foreX.length - 1);

        strokeWeight(7);
        stroke(233);
        beginShape();
        if (forward)
          for (var ii = 60; ii < foreX.length; ii++) vertex(foreX[ii], foreY[ii]);
        else
          for (var ii = 0; ii < foreX.length - 60; ii++) vertex(foreX[ii], foreY[ii]);
        endShape();

        strokeWeight(3);
        stroke(0, 255, 0);
        beginShape();
        for (var ii = 0; ii < foreX.length; ii++) vertex(foreX[ii], foreY[ii]);
        endShape();
      }
    }

    // ===== 交互：拖拽旋转 =====
    function touchStarted() {
      if (!contain(mouseX, mouseY, 0, 0, width, height)) return;
      if (touches.length > 1) return;
      dragged = true;
      pmx = mouseX * 1000 / width;
      pmy = mouseY * 1000 / height;
      return false;
    }

    function touchMoved() {
      if (touches.length > 1) return;
      if (dragged) {
        var rot1 = atan2(pmy - (motorY + translateY), pmx - motorX);
        var rot2 = atan2(mouseY * 1000 / height - (motorY + translateY), mouseX * 1000 / width - motorX);
        theta += rot1 - rot2;
        pmx = mouseX * 1000 / width;
        pmy = mouseY * 1000 / height;
        return false;
      }
    }

    function touchEnded() {
      dragged = false;
    }

    function mousePressed() {
      dragged = true;
      pmx = mouseX * 1000 / width;
      pmy = mouseY * 1000 / height;
    }

    function mouseDragged() {
      if (dragged) {
        var rot1 = atan2(pmy - (motorY + translateY), pmx - motorX);
        var rot2 = atan2(mouseY * 1000 / height - (motorY + translateY), mouseX * 1000 / width - motorX);
        theta += rot1 - rot2;
        pmx = mouseX * 1000 / width;
        pmy = mouseY * 1000 / height;
      }
    }

    function mouseReleased() {
      dragged = false;
    }
  </script>
</body>
</html>
