  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=10">
  <title>影子的形成 — 太阳与树影 - 物理虚拟实验</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <style>
    .main-card { max-width: 960px; margin: 0 auto 24px; padding: 0 16px; }
    .canvas-wrap { border-radius: 12px; padding: 4px; width: 100%; box-sizing: border-box; border: 1px solid #e2e8f0; position: relative; background: #e8f4fd; }
    .canvas-wrap canvas { display: block; width: 100%; height: auto; }
    .controls-bar { display: flex; align-items: center; justify-content: center; padding: 12px 16px; gap: 16px; flex-wrap: wrap; background: #1a1a2e; border-radius: 0 0 12px 12px; border-top: 1px solid #333; color: #ccc; font-size: 13px; }
    .controls-bar .ctrl-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .controls-bar label { color: #ccc; font-size: 12px; white-space: nowrap; }
    .controls-bar input[type="range"] { width: 100px; accent-color: #f59e0b; }
    .controls-bar input[type="checkbox"] { accent-color: #f59e0b; }
    .hint-text { color: #888; font-size: 12px; }
    .section { padding: 1.5rem 2rem 0.5rem; }
    .section h2 { font-size: 1.4rem; }
    .formula-bar { max-width: 960px; margin: 0 auto 24px; padding: 0 16px; display: flex; gap: 12px; flex-wrap: wrap; }
    .formula-item { flex: 1; min-width: 180px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px 16px; }
    .formula-item .flabel { color: #64748b; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; }
    .formula-item .fvalue { color: #e2e8f0; font-size: 13px; }
    .shadow-data { background: #f8fafc; border-radius: 8px; padding: 8px 14px; margin: 4px 0; display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; font-size: 13px; color: #334155; }
    .shadow-data span { white-space: nowrap; }
    .shadow-data .val { font-weight: 700; color: #1e293b; }
    .fullscreen-btn { position: absolute; top: 8px; right: 8px; z-index: 10; background: rgba(0,0,0,0.3); color: #666; border: 1px solid rgba(0,0,0,0.15); border-radius: 6px; padding: 5px 10px; font-size: 14px; cursor: pointer; transition: all 0.2s; }
    .fullscreen-btn:hover { background: rgba(0,0,0,0.6); color: #fff; }
    .main-card.fullscreen-mode { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 9999; margin: 0; padding: 0; background: #1a1a2e; max-width: none; display: flex; flex-direction: column; }
    .main-card.fullscreen-mode .canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; border-radius: 0; border: none; min-height: 0; }
    .main-card.fullscreen-mode .canvas-wrap canvas { width: auto; height: auto; max-width: 100vw; max-height: calc(100vh - 60px); }
    .main-card.fullscreen-mode .controls-bar { flex-shrink: 0; border-radius: 0; }
    .header { position: fixed !important; top: 0; left: 0; right: 0; transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); will-change: transform; }
    .header.hidden { transform: translateY(-100%); }
    body { padding-top: 56px; transition: padding-top 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
    body.header-hidden { padding-top: 0; }
    @media (max-width: 768px) { body { padding-top: 48px; } }
  </style>
  <script src="auth-check.js"></script>
</head>
<body>
  <header class="header">
    <div class="logo">物理虚拟实验</div>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="experiments.html">实验列表</a>
    </nav>

  <div class="section">
    <h2>影子的形成 — 太阳与树影</h2>
    <p style="color:#94a3b8;margin:0 0 16px 0;">太阳在天空中移动，阳光照射树木在地面上形成影子。太阳越高影子越短（正午最短），太阳越低影子越长（早晨和傍晚最长）。拖动太阳位置，观察树影长度的变化。</p>
  </div>

  <div class="main-card">
    <div class="canvas-wrap">
      <button class="fullscreen-btn" id="fullscreenBtn" title="全屏模式">⛶ 全屏</button>
      <canvas id="simCanvas"></canvas>
    </div>
    <div class="shadow-data">
      <span>🌞 太阳高度角: <span class="val" id="sdAngle">--</span>°</span>
      <span>📏 影子长度: <span class="val" id="sdLength">--</span> m</span>
      <span>🌳 树高: <span class="val" id="sdTreeH">--</span> m</span>
    </div>
    <div class="controls-bar">
      <div class="ctrl-col">
        <label for="sunPos">太阳位置</label>
        <div style="display:flex;align-items:center;gap:4px;">
          <span style="color:#f59e0b;font-size:10px;">🌅早</span>
          <input type="range" id="sunPos" min="0" max="100" value="12">
          <span style="color:#f59e0b;font-size:10px;">午🌞</span>
          <input type="range" id="sunH" min="15" max="45" value="30" style="width:60px;">
          <span style="color:#f59e0b;font-size:10px;">晚🌇</span>
        </div>
      </div>
      <div class="ctrl-col">
        <label for="treeH">树的高度</label>
        <input type="range" id="treeH" min="3" max="15" value="6">
      </div>
      <div class="ctrl-col">
        <input type="checkbox" id="showRays" checked />
        <label for="showRays">显示光线</label>
      </div>
      <div class="ctrl-col">
        <input type="checkbox" id="multiRays" />
        <label for="multiRays">多光线模式</label>
      </div>
      <span class="hint-text">太阳越低影子越长 | 正午影子最短 | 树越高影子越长</span>
    </div>
  </div>

  <div class="formula-bar">
    <div class="formula-item">
      <span class="flabel">直线传播</span>
      <span class="fvalue">阳光沿直线传播，被树木遮挡后在地面形成阴影</span>
    </div>
    <div class="formula-item">
      <span class="flabel">影子长度公式</span>
      <span class="fvalue">影长 = 树高 / tan(太阳高度角) — 高度角越大影子越短</span>
    </div>
    <div class="formula-item">
      <span class="flabel">一天中的变化</span>
      <span class="fvalue">早晨长 → 正午最短 → 傍晚长。太阳高度角先增大后减小</span>
    </div>
  </div>

  <script src="protect.js"></script>
  <script>
  (function() {
    var canvas = document.getElementById("simCanvas");
    var ctx = canvas.getContext("2d");
    var isFullscreen = false;
    var canvasW, canvasH;

    // Animation
    var sunPosValue = 12; // 0-100: left to right (start low morning)
    var sunHValue = 30;   // 15-45: sun max height (fits in frame)
    var treeHValue = 6;   // meters

    // Read sliders
    function readSliders() {
      sunPosValue = Number(document.getElementById("sunPos").value);
      sunHValue = Number(document.getElementById("sunH").value);
      treeHValue = Number(document.getElementById("treeH").value);
    }

    function resize() {
      var wrap = document.querySelector(".canvas-wrap");
      var w, h;
      if (isFullscreen) {
        w = Math.min(window.innerWidth, Math.floor((window.innerHeight - 60) / 0.45));
        h = Math.floor(w * 0.45);
      } else {
        w = wrap ? wrap.clientWidth - 8 : 920;
        if (w <= 0) w = 800;
        w = Math.min(w, 960);
        h = Math.floor(w * 0.45);
      }
      canvas.width = w;
      canvas.height = h;
      canvasW = w;
      canvasH = h;
      render();
    }

    function render() {
      readSliders();
      var W = canvasW, H = canvasH;

      // Sky gradient
      var skyGrad = ctx.createLinearGradient(0, 0, 0, H);
      skyGrad.addColorStop(0, "#7ec8f8");
      skyGrad.addColorStop(0.55, "#b8dff8");
      skyGrad.addColorStop(1, "#d4e8c2");
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, W, H);

      // ---- Ground ----
      var groundY = H * 0.72;
      // Ground surface
      var gndGrad = ctx.createLinearGradient(0, groundY, 0, H);
      gndGrad.addColorStop(0, "#8a9e5c");
      gndGrad.addColorStop(0.3, "#6d8a3e");
      gndGrad.addColorStop(1, "#4a5e2a");
      ctx.fillStyle = gndGrad;
      ctx.fillRect(0, groundY, W, H - groundY);
      // Ground line
      ctx.strokeStyle = "#5a7a30";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, groundY);
      ctx.lineTo(W, groundY);
      ctx.stroke();

      // ---- Sun position (arc across sky) ----
      // sunPosSlider: 0(左/早) → 50(中/正午) → 100(右/晚)
      // Sun follows a curved path: highest at pos=50, lower at ends
      var t = sunPosValue / 100; // 0..1
      var sunWorldX = 5 + t * 90; // world X: 5..95
      // Sun height follows a sine curve: peak at t=0.5
      var sunWorldY = sunHValue * (0.3 + 0.7 * Math.sin(t * Math.PI));

      // Convert world coords (m) to canvas
      var worldScale = W / 100; // 100m world → W pixels
      function wx(wx) { return wx * worldScale; }
      function wy(wy) { return groundY - wy * worldScale; } // y=0 at ground, up in world = up on canvas

      var treeWorldX = 50; // tree fixed at center
      var treeWorldH = treeHValue; // tree height in meters
      var sunWX = sunWorldX;
      var sunWY = sunWorldY; // sun height above ground in meters

      // Shadow calculation: sun ray through tree top hits ground
      // Sun at (sunWX, sunWY), Tree top at (treeWorldX, treeWorldH)
      // Ray: (sunWX, sunWY) + λ * (treeWorldX - sunWX, treeWorldH - sunWY)
      // Hit ground (y=0): sunWY + λ * (treeWorldH - sunWY) = 0
      // λ = -sunWY / (treeWorldH - sunWY) = sunWY / (sunWY - treeWorldH)
      var lambda = sunWY / (sunWY - treeWorldH);
      var shadowWorldX = sunWX + lambda * (treeWorldX - sunWX);
      var shadowLength = Math.abs(shadowWorldX - treeWorldX);

      // Sun elevation angle
      var sunAngle = Math.atan2(sunWY - treeWorldH, Math.abs(treeWorldX - sunWX)) * 180 / Math.PI;
      sunAngle = Math.max(0, Math.min(90, sunAngle));

      // Draw canvas coords
      var ctxSunX = wx(sunWX);
      var ctxSunY = wy(sunWY);
      var ctxTreeBaseX = wx(treeWorldX);
      var ctxTreeBaseY = groundY;
      var ctxTreeTopX = wx(treeWorldX);
      var ctxTreeTopY = wy(treeWorldH);
      var ctxShadowX = wx(shadowWorldX);
      var ctxGroundY = groundY;

      // ---- Draw sun rays ----
      var raysOn = document.getElementById("showRays").checked;
      var multiRaysOn = document.getElementById("multiRays").checked;

      if (raysOn || multiRaysOn) {
        // Canopy radius in world coords: match the visual canopyR = W * 0.04
        var canopyRCanvas = W * 0.04;
        var canopyRWorld = canopyRCanvas / worldScale; // convert to meters

        if (multiRaysOn) {
          // ---- Multi-ray mode: many rays from sun, some blocked by tree ----
          // Rays fan out across the tree region
          var numRays = 24;
          // Cover from well above tree to below tree top
          var rayWorldYStart = sunWY - (sunWY - treeWorldH) * 1.5;
          var rayWorldYEnd = sunWY + (treeWorldH + canopyRWorld - sunWY) * 0.5;
          // Actually, let's shoot rays from sun towards ground, covering the tree
          // Each ray targets a different Y on a vertical line near the tree
          // Target line: x = treeWorldX, y from 0 to treeWorldH + canopyRWorld*2

          var targetYs = [];
          var minTargetY = -canopyRWorld * 0.5; // slightly below ground
          var maxTargetY = treeWorldH + canopyRWorld * 2.5; // well above tree
          for (var ri = 0; ri < numRays; ri++) {
            targetYs.push(minTargetY + (maxTargetY - minTargetY) * ri / (numRays - 1));
          }

          for (var ri = 0; ri < numRays; ri++) {
            var targetY = targetYs[ri];
            // Direction from sun to (treeWorldX, targetY)
            var dx = treeWorldX - sunWX;
            var dy = targetY - sunWY;

            // Check intersection with tree canopy circle
            // Circle: center (treeWorldX, treeWorldH), radius canopyRWorld
            var cx = treeWorldX, cy = treeWorldH, cr = canopyRWorld;

            // Line from sun: param t in [0, 1], point = (sunWX + t*dx, sunWY + t*dy)
            // t where it hits ground: sunWY + t*dy = 0 => t = -sunWY/dy
            // (only valid if dy < 0, i.e., ray going downward)
            var tGround = (dy !== 0) ? -sunWY / dy : -1;

            // Solve quadratic for circle intersection
            var a = dx * dx + dy * dy;
            var b = 2 * (dx * (sunWX - cx) + dy * (sunWY - cy));
            var c = (sunWX - cx) * (sunWX - cx) + (sunWY - cy) * (sunWY - cy) - cr * cr;
            var disc = b * b - 4 * a * c;

            var isBlocked = false;
            var blockT = 1;
            if (disc >= 0 && a > 0) {
              var t1 = (-b - Math.sqrt(disc)) / (2 * a);
              var t2 = (-b + Math.sqrt(disc)) / (2 * a);
              // We want t > 0 (forward from sun)
              var tMin = Math.min(t1, t2);
              var tMax = Math.max(t1, t2);
              if (tMin > 0.001 && tMin < tGround) {
                isBlocked = true;
                blockT = tMin;
              }
            }

            var ctxEndX, ctxEndY;
            if (isBlocked) {
              // Ray hits tree: stop at circle edge
              ctxEndX = wx(sunWX + blockT * dx);
              ctxEndY = wy(sunWY + blockT * dy);
              ctx.strokeStyle = "rgba(255, 180, 30, 0.65)";
              ctx.lineWidth = 1.5;
            } else {
              // Ray passes: go to ground
              ctxEndX = wx(sunWX + tGround * dx);
              ctxEndY = groundY;
              ctx.strokeStyle = "rgba(255, 210, 60, 0.5)";
              ctx.lineWidth = 1.2;
            }

            ctx.setLineDash([]);
            ctx.beginPath();
            ctx.moveTo(ctxSunX, ctxSunY);
            ctx.lineTo(ctxEndX, ctxEndY);
            ctx.stroke();
          }
        } else if (raysOn) {
          // ---- Single-ray mode: simplified ----
          // Upper ray: from sun to tree top
          ctx.strokeStyle = "rgba(255, 200, 40, 0.7)";
          ctx.lineWidth = 2;
          ctx.setLineDash([6, 4]);
          ctx.beginPath();
          ctx.moveTo(ctxSunX, ctxSunY);
          ctx.lineTo(ctxTreeTopX, ctxTreeTopY);
          ctx.stroke();
          // Lower ray: from sun to shadow tip through tree top
          ctx.strokeStyle = "rgba(255, 180, 30, 0.7)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(ctxSunX, ctxSunY);
          ctx.lineTo(ctxShadowX, ctxGroundY);
          ctx.stroke();
          ctx.setLineDash([]);

          // Sun angle arc indicator
          var arcR = 35;
          ctx.strokeStyle = "rgba(255, 150, 30, 0.8)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(ctxTreeBaseX, ctxGroundY, arcR, -Math.PI, -Math.PI + sunAngle * Math.PI / 180);
          ctx.stroke();
        }
      }

      // ---- Draw sun arc path (before sun) ----
      ctx.strokeStyle = "rgba(255, 170, 40, 0.4)";
      ctx.lineWidth = 2.5;
      ctx.setLineDash([8, 5]);
      ctx.beginPath();
      var arcSteps = 80;
      for (var ai = 0; ai <= arcSteps; ai++) {
        var at = ai / arcSteps;
        var awx = 5 + at * 90;
        var awy = sunHValue * (0.3 + 0.7 * Math.sin(at * Math.PI));
        var ax = wx(awx);
        var ay = wy(awy);
        if (ai === 0) ctx.moveTo(ax, ay);
        else ctx.lineTo(ax, ay);
      }
      ctx.stroke();
      ctx.setLineDash([]);

      // Key points on arc: sunrise, noon, sunset
      var keyPoints = [
        { t: 0.05, label: "日出" },
        { t: 0.5, label: "正午" },
        { t: 0.95, label: "日落" }
      ];
      keyPoints.forEach(function(kp) {
        var kwx = 5 + kp.t * 90;
        var kwy = sunHValue * (0.3 + 0.7 * Math.sin(kp.t * Math.PI));
        var kx = wx(kwx);
        var ky = wy(kwy);
        // Dot
        ctx.fillStyle = "rgba(220, 130, 20, 0.7)";
        ctx.beginPath();
        ctx.arc(kx, ky, 4.5, 0, Math.PI * 2);
        ctx.fill();
        // Label
        ctx.fillStyle = "rgba(140, 70, 10, 0.9)";
        ctx.font = "bold " + Math.round(W * 0.022) + "px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(kp.label, kx, ky - 14);
      });

      // ---- Draw sun ----
      // Glow layers (smaller)
      for (var gi = 3; gi >= 0; gi--) {
        var gr = 6 + gi * 6;
        ctx.fillStyle = "rgba(255, 240, 100, " + (0.10 + gi * 0.10) + ")";
        ctx.beginPath();
        ctx.arc(ctxSunX, ctxSunY, gr, 0, Math.PI * 2);
        ctx.fill();
      }
      // Sun body
      ctx.fillStyle = "#ffe566";
      ctx.beginPath();
      ctx.arc(ctxSunX, ctxSunY, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#fff9c4";
      ctx.beginPath();
      ctx.arc(ctxSunX, ctxSunY, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(ctxSunX - 1, ctxSunY - 1.5, 2.5, 0, Math.PI * 2);
      ctx.fill();

      // Sun rays (smaller)
      ctx.strokeStyle = "rgba(255, 220, 60, 0.5)";
      ctx.lineWidth = 1.2;
      for (var ri = 0; ri < 8; ri++) {
        var ra = (ri / 8) * Math.PI * 2;
        var r1 = 10, r2 = 13 + (ri % 3) * 2;
        ctx.beginPath();
        ctx.moveTo(ctxSunX + Math.cos(ra) * r1, ctxSunY + Math.sin(ra) * r1);
        ctx.lineTo(ctxSunX + Math.cos(ra) * r2, ctxSunY + Math.sin(ra) * r2);
        ctx.stroke();
      }

      // ---- Draw tree ----
      // Shadow on ground
      if (shadowLength > 0.05) {
        var shadowStartX, shadowEndX;
        if (shadowWorldX > treeWorldX) {
          shadowStartX = ctxTreeBaseX;
          shadowEndX = ctxShadowX;
        } else {
          shadowStartX = ctxShadowX;
          shadowEndX = ctxTreeBaseX;
        }
        // Shadow on ground
        ctx.fillStyle = "rgba(20, 30, 10, 0.45)";
        ctx.beginPath();
        ctx.moveTo(shadowStartX, ctxGroundY);
        ctx.ellipse((shadowStartX + shadowEndX) / 2, ctxGroundY + 1, Math.abs(shadowEndX - shadowStartX) / 2, 3, 0, 0, Math.PI * 2);
        ctx.fill();

        // Shadow dimension line
        if (shadowLength > 0.3) {
          var dimY = ctxGroundY + 20;
          var midX = (shadowStartX + shadowEndX) / 2;
          ctx.strokeStyle = "#c0392b";
          ctx.lineWidth = 1.5;
          ctx.setLineDash([]);
          ctx.beginPath();
          ctx.moveTo(shadowStartX, dimY);
          ctx.lineTo(shadowEndX, dimY);
          ctx.stroke();
          // Arrow heads
          ctx.beginPath();
          ctx.moveTo(shadowStartX, dimY);
          ctx.lineTo(shadowStartX + 6, dimY - 4);
          ctx.moveTo(shadowStartX, dimY);
          ctx.lineTo(shadowStartX + 6, dimY + 4);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(shadowEndX, dimY);
          ctx.lineTo(shadowEndX - 6, dimY - 4);
          ctx.moveTo(shadowEndX, dimY);
          ctx.lineTo(shadowEndX - 6, dimY + 4);
          ctx.stroke();
          // Label
          ctx.fillStyle = "#c0392b";
          ctx.font = "bold " + Math.round(W * 0.022) + "px sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(shadowLength.toFixed(1) + " m", midX, dimY - 6);
        }
      }

      // Tree trunk
      var trunkW = W * 0.012;
      var trunkH = ctxGroundY - ctxTreeTopY - W * 0.04;
      ctx.fillStyle = "#8B6914";
      ctx.fillRect(ctxTreeBaseX - trunkW / 2, ctxTreeTopY + W * 0.04, trunkW, trunkH);
      // Trunk texture
      ctx.fillStyle = "#7a5c12";
      ctx.fillRect(ctxTreeBaseX - trunkW / 2 + trunkW * 0.3, ctxTreeTopY + W * 0.04, trunkW * 0.2, trunkH);

      // Tree canopy
      var canopyCY = ctxTreeTopY;
      var canopyR = W * 0.04;
      // Shadow side of canopy
      ctx.fillStyle = "#3d6b24";
      ctx.beginPath();
      ctx.arc(ctxTreeTopX + 2, canopyCY + 2, canopyR, 0, Math.PI * 2);
      ctx.fill();
      // Canopy body
      ctx.fillStyle = "#4a8c2a";
      ctx.beginPath();
      ctx.arc(ctxTreeTopX, canopyCY, canopyR, 0, Math.PI * 2);
      ctx.fill();
      // Canopy highlight
      ctx.fillStyle = "#5da832";
      ctx.beginPath();
      ctx.arc(ctxTreeTopX - canopyR * 0.2, canopyCY - canopyR * 0.25, canopyR * 0.55, 0, Math.PI * 2);
      ctx.fill();
      // Small highlight spot
      ctx.fillStyle = "#7cc850";
      ctx.beginPath();
      ctx.arc(ctxTreeTopX - canopyR * 0.3, canopyCY - canopyR * 0.4, canopyR * 0.25, 0, Math.PI * 2);
      ctx.fill();

      // Tree height dimension (vertical)
      var dimLX = ctxTreeBaseX + trunkW / 2 + 12;
      ctx.strokeStyle = "#2e7d32";
      ctx.lineWidth = 1.5;
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(dimLX, ctxGroundY);
      ctx.lineTo(dimLX, ctxTreeTopY);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(dimLX - 4, ctxGroundY); ctx.lineTo(dimLX + 4, ctxGroundY);
      ctx.moveTo(dimLX - 4, ctxTreeTopY); ctx.lineTo(dimLX + 4, ctxTreeTopY);
      ctx.stroke();
      ctx.fillStyle = "#2e7d32";
      ctx.font = "bold " + Math.round(W * 0.024) + "px sans-serif";
      ctx.textAlign = "left";
      ctx.fillText(treeWorldH.toFixed(1) + " m", dimLX + 4, (ctxGroundY + ctxTreeTopY) / 2 + 4);

      // Tree label
      ctx.fillStyle = "#145020";
      ctx.font = "bold " + Math.round(W * 0.025) + "px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("树", ctxTreeBaseX, ctxGroundY + 18);

      // ---- Sun elevation angle label ----
      ctx.fillStyle = "#d35400";
      ctx.font = "bold " + Math.round(W * 0.024) + "px sans-serif";
      ctx.textAlign = "left";
      ctx.fillText(sunAngle.toFixed(1) + "°", ctxTreeBaseX + 35, ctxGroundY - 22);

      // ---- Sun label ----
      ctx.fillStyle = "#b8860b";
      ctx.textAlign = "center";
      ctx.font = "bold " + Math.round(W * 0.022) + "px sans-serif";
      ctx.fillText("太阳", ctxSunX, ctxSunY - 22);

      // ---- Time of day indicator ----
      var timeLabel;
      if (sunPosValue < 20) timeLabel = "早晨";
      else if (sunPosValue < 35) timeLabel = "上午";
      else if (sunPosValue < 65) timeLabel = "正午";
      else if (sunPosValue < 80) timeLabel = "下午";
      else timeLabel = "傍晚";

      ctx.fillStyle = "rgba(0,0,0,0.5)";
      var timeW = 80, timeH = 26;
      roundRect(W - timeW - 12, 8, timeW, timeH, 6, true);
      ctx.fillStyle = "#fff";
      ctx.font = "bold " + Math.round(W * 0.022) + "px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(timeLabel, W - timeW / 2 - 12, 14 + timeH / 2);

      // ---- Update data panel ----
      document.getElementById("sdAngle").textContent = sunAngle.toFixed(1);
      document.getElementById("sdLength").textContent = shadowLength.toFixed(1);
      document.getElementById("sdTreeH").textContent = treeWorldH.toFixed(1);
    }

    function roundRect(x, y, w, h, r, fillOnly) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y, x + w, y + r, r);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x, y + h, x, y + h - r, r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x, y, x + r, y, r);
      ctx.closePath();
      if (fillOnly) ctx.fill();
      else { ctx.fill(); ctx.stroke(); }
    }

    // Fullscreen toggle
    function toggleFullscreen() {
      isFullscreen = !isFullscreen;
      var card = document.querySelector(".main-card");
      var btn = document.getElementById("fullscreenBtn");
      var header = document.querySelector(".header");
      if (isFullscreen) {
        card.classList.add("fullscreen-mode");
        btn.innerHTML = "✕ 退出全屏";
        if (header) header.style.display = "none";
        document.body.style.paddingTop = "0";
      } else {
        card.classList.remove("fullscreen-mode");
        btn.innerHTML = "⛶ 全屏";
        if (header) header.style.display = "";
        document.body.style.paddingTop = "";
      }
      setTimeout(resize, 100);
    }

    // Init
    document.getElementById("fullscreenBtn").addEventListener("click", toggleFullscreen);
    document.querySelectorAll("input[type=range], input[type=checkbox]").forEach(function(el) {
      el.addEventListener("input", render);
    });
    window.addEventListener("resize", resize);
    resize();
  })();
  </script>

  <script>
    (function() {
      var header = document.querySelector('.header');
      var hideTimer = null;
      var HIDE_DELAY = 800;
      function show() { clearTimeout(hideTimer); header.classList.remove('hidden'); document.body.classList.remove('header-hidden'); }
      function hide() { hideTimer = setTimeout(function() { header.classList.add('hidden'); document.body.classList.add('header-hidden'); }, HIDE_DELAY); }
      document.addEventListener('mousemove', function(e) {
        if (e.clientY <= 60) show();
        else if (e.clientY > header.offsetHeight + 20 && !header.classList.contains('hidden')) hide();
      });
      header.addEventListener('mouseenter', show);
      header.addEventListener('mouseleave', hide);
      hideTimer = setTimeout(function() { header.classList.add('hidden'); document.body.classList.add('header-hidden'); }, 2000);
    })();
  </script>
</body>
</html>
