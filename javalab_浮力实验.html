  <script>
// === 工具函数（源自 javalab.js） ===
var notClicked = true;

function doFullScreen() {
  var el = document.getElementById("divFull");
  if(el.requestFullscreen) el.requestFullscreen();
  else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  else if(el.mozRequestFullScreen) el.mozRequestFullScreen();

function doFullScreen2() {

  if(el.requestFullscreen) el.requestFullscreen();
  else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  else if(el.mozRequestFullScreen) el.mozRequestFullScreen();
  else if(el.msRequestFullscreen) el.msRequestFullscreen();
}

function contain(x, y, x1, y1, w1, h1) {
  if(x < x1 || x > (x1 + w1) || y < y1 || y > (y1 + h1)) return false;
  return true;
}

function drawButtonDrag() { drawButtonDetail("Drag"); }

function drawButtonDetail(str) {
  if(mouseIsPressed) if(contain(mouseX, mouseY, 0, 0, width, height)) notClicked = false;
  if(millis() > 10000) notClicked = false;
  var dia = 120;
  if(notClicked) {
    push();
    translate(width/2, height/2);
    noStroke();
    fill(128, 128);
    ellipse(0, 0, dia, dia);
    noFill();
    stroke(255);
    strokeWeight(dia*0.04);
    drawFingers(0, 0, dia*0.85);
    pop();
  }
}

function drawFingers(x, y, d) {
  push();
  translate(x, y);
  line(-d*0.2, d*0.3, -d*0.35, d*0.1);
  arc(-d*0.3, d*0.05, d*0.1414, d*0.1414, QUARTER_PI*3, QUARTER_PI*7);
  line(-d*0.25, d*0.0, -d*0.15, d*0.1);
  line(-d*0.15, d*0.1, -d*0.15, -d*0.25);
  arc(-d*0.075, -d*0.25, d*0.15, d*0.15, PI, TWO_PI);
  line(-d*0.0, -d*0.25, -d*0.0, d*0.0);
  arc(d*0.06, -d*0.1, d*0.12, d*0.12, HALF_PI*3, TWO_PI);
  line(d*0.12, -d*0.1, d*0.12, d*0.025);
  arc(d*0.18, -d*0.05, d*0.12, d*0.12, HALF_PI*3, TWO_PI);
  line(d*0.24, -d*0.05, d*0.24, d*0.05);
  arc(d*0.29, -d*0.0, d*0.1, d*0.1, HALF_PI*3, TWO_PI);
  line(d*0.34, -d*0.0, d*0.34, d*0.075);
  line(d*0.34, d*0.075, d*0.31, d*0.3);
  pop();
}

// === 浮力实验仿真（汉化版 language=3） ===
var language = 3;
var radioA, labelA, rangeA;
var handImage, scaleImage;
var scaleY = 300, massY = 450, massR = 50, waterY = 650;
var velocity = 0;

function preload() {
  handImage = loadImage("images/buoyancy_hand.png");
  scaleImage = loadImage("images/buoyancy_scale.png");
}

function setup() {
  frameRate(60);
  var o = select("#myContainer");
  var a = 1;
  var w = int(min(o.width, (window.innerHeight - 160) / a));
  var h = int(w * a);
  myCanvas = createCanvas(w, h);
  myCanvas.parent("myContainer");
  myCanvas.id("myP5Canvas");
  radioA = createRadio("radioA");
  radioA.option("g ", "g");
  radioA.option("N ", "N");
  radioA.parent("radioA");
  radioA.selected("g");
  labelA = select("#labelA");
  rangeA = select("#rangeA");
  rangeA.input(setup2);
  setup2();
}

function windowResized() {
  var o = select("#myContainer");
  var a = 1;
  var w = int(min(o.width, (window.innerHeight - 160) / a));
  var h = int(w * a);
  resizeCanvas(w, h);
}

function setup2() {
  labelA.html("密度 " + rangeA.value() + " g/mL");
}

function draw() {
  push();
  scale(width / 1000);
  background(244);
  strokeWeight(1);
  textSize(30);
  textAlign(LEFT, TOP);

  var density = rangeA.value();
  var ratio = map(massY, waterY - massR, waterY + massR, -HALF_PI, HALF_PI);
  ratio = constrain(ratio, -HALF_PI, HALF_PI);
  ratio = map(sin(ratio), -1, 1, 0, 1);
  var buoyancy = -100 * ratio;
  var gravity = 100 * density;

  velocity += 20 * (buoyancy + gravity) / gravity;
  velocity *= 0.6;
  massY += velocity;
  massY = min(massY, scaleY + 200, 797 - massR);

  var handWeight = gravity + buoyancy;
  var scaleWeight = 500 - buoyancy;

  if(massY >= (797 - massR)) { handWeight = 0; scaleWeight = 500 + gravity; }

  image(handImage, 0, scaleY - 635, 1000, 1000);
  image(scaleImage, 0, 0, 1000, 1000);

  noFill();
  stroke(0);
  strokeCap(ROUND);
  strokeWeight(16);
  line(500, scaleY - 135, 500 + 44 * sin(handWeight * PI / 400), scaleY - 135 - 44 * cos(handWeight * PI / 400));
  line(500, 900, 500 + 44 * sin(scaleWeight * PI / 400), 900 - 44 * cos(scaleWeight * PI / 400));

  noStroke();
  fill(128);
  ellipse(500, massY, 2 * massR, 2 * massR);

  textSize(50);
  textAlign(LEFT, CENTER);
  if(radioA.value() == "g") {
    text(round(handWeight * 10) / 10 + " g", 600, scaleY - 135);
    text(round(scaleWeight * 10) / 10 + " g", 600, 900);
  }
  if(radioA.value() == "N") {
    text(round(handWeight * 98) / 10000 + " N", 600, scaleY - 135);
    text(round(scaleWeight * 98) / 10000 + " N", 600, 900);
  }

  if(buoyancy < 0) {
    fill(0);
    noStroke();
    text("浸入体积 \n= " + round(-buoyancy * 10) / 10 + " mL", 625, massY);
  }

  textAlign(RIGHT, CENTER);
  if(radioA.value() == "g") text(round(gravity) + " g\n100 mL", (massY < 500) ? 430 : 360, massY);
  if(radioA.value() == "N") text(round(gravity * 9.8) / 1000 + " N\n100 mL", (massY < 500) ? 430 : 360, massY);

  fill(0, 128, 255, 128);
  rect(400, waterY, 200, 150, 0, 0, 20, 20);

  var bias = 200 - (massY - scaleY);

  noFill();
  strokeWeight(8);
  stroke(255, 191, 128);
  bezier(500, scaleY, 500, (massY), 500 - bias * 0.8, (massY - massR) + bias * 0.5, 500, (massY - massR - 2));
  scaleY = constrain(scaleY, 250, min(620, massY - massR - 20));

  pop();
  drawButtonDrag();
}

var dragged = false;
var offsetY;

function touchStarted() {
  if(!contain(mouseX, mouseY, 0, 0, width, height)) return;
  if(touches.length > 1) return;
  var y = mouseY * 1000 / width;
  dragged = true;
  offsetY = y - scaleY;
}

function touchMoved() {
  if(touches.length > 1) return;
  if(dragged) {
    scaleY = mouseY * 1000 / width - offsetY;
    scaleY = constrain(scaleY, 250, min(620, massY - massR - 20));
    return false;
  }
}

function touchEnded() { dragged = false; }
  </script>

  <script>
  // === 过关挑战 Quiz System - 浮力实验 ===
  (function() {
    var QUIZ_STORAGE_KEY = 'quiz_buoyancy_lab_progress';
    var EXPERIMENT_KEY = 'buoyancy_lab';
    var quizData = null;
    var currentRound = 0;
    var currentQuestion = 0;
    var selectedOption = null;
    var isAnswered = false;
    var isReviewing = false;
    var quizQuestions = [];

    // === 15 questions across 3 rounds ===
    var allQuestions = [];

    // Round 1: 浮力测量基础
    allQuestions.push({ round: 0, question: '用弹簧测力计测浮力时，物体在空气中重力为G，浸入水中后示数为F，则浮力大小为？', options: ['G - F', 'G + F', 'F - G', 'G × F'], answer: 0, explain: '浮力 = 空气中重力 - 水中拉力，即 F_浮 = G - F。这是用弹簧测力计测量浮力的标准方法。' });
    allQuestions.push({ round: 0, question: '物体浸入液体的体积越大，受到的浮力？', options: ['越大', '越小', '不变', '先增大后不变'], answer: 0, explain: '根据阿基米德原理 F_浮 = ρ_液·g·V_排，排开液体的体积越大，浮力越大，两者成正比关系。' });
    allQuestions.push({ round: 0, question: '石块浸没在水中后继续下沉（未到底），浮力如何变化？', options: ['变大', '变小', '不变', '先变小后变大'], answer: 2, explain: '石块完全浸没后 V_排 不变（等于石块体积），液体密度也不变，因此由 F_浮 = ρ_液·g·V_排 可知浮力不变。' });
    allQuestions.push({ round: 0, question: '浮力产生的根本原因是？', options: ['物体受到液体压力', '物体上下表面存在压力差', '物体密度小于液体', '液体有重力'], answer: 1, explain: '浮力产生的根本原因是物体在液体中上下表面所处的深度不同，下表面受到向上的压力大于上表面受到的向下压力，这个压力差就是浮力。' });
    allQuestions.push({ round: 0, question: '物体完全浸没后，改变它在水中的深度（未触碰容器底），浮力？', options: ['变大', '变小', '不变', '无法确定'], answer: 2, explain: '完全浸没后，排开液体体积不变（等于物体体积），液体密度也不变，因此浮力大小与深度无关。' });

    // Round 2: 排开水的重量
    allQuestions.push({ round: 1, question: '物体排开水的重力等于？', options: ['物体的重力', '物体所受浮力', '容器中水的总重力', '物体的体积'], answer: 1, explain: '根据阿基米德原理，物体排开液体的重力等于物体所受浮力，即 F_浮 = G_排。这是浮力实验的核心结论。' });
    allQuestions.push({ round: 1, question: '在阿基米德原理实验中，溢水杯中的水必须装满，目的是？', options: ['使实验更美观', '使物体排开的水全部溢出', '加快实验速度', '没有特殊目的'], answer: 1, explain: '溢水杯装满水后，当物体浸入时，排开的水会全部从溢水口溢出，便于收集和测量排开水的体积及重量。' });
    allQuestions.push({ round: 1, question: '用弹簧测力计吊着物体慢慢浸入水中时，测力计示数会？', options: ['逐渐增大', '逐渐减小', '不变', '先减小后增大'], answer: 1, explain: '物体慢慢浸入时，V_排 逐渐增大，浮力逐渐增大，弹簧测力计示数 F = G - F_浮 逐渐减小。当完全浸没后，示数不再变化。' });
    allQuestions.push({ round: 1, question: '同一物体浸没在盐水中受到的浮力比浸没在水中？', options: ['更大', '更小', '一样大', '无法比较'], answer: 0, explain: '盐水密度大于水，浸没时 V_排 相同，由 F_浮 = ρ_液·g·V_排 可知，密度更大的盐水中浮力更大。' });
    allQuestions.push({ round: 1, question: '浮力的大小与液体的什么性质直接相关？', options: ['温度', '密度', '质量', '体积'], answer: 1, explain: '由阿基米德原理 F_浮 = ρ_液·g·V_排 可知，浮力与液体的密度直接相关。液体密度越大，浮力越大。' });

    // Round 3: 视重与浮力应用
    allQuestions.push({ round: 2, question: '物体在水中看起来"变轻"了，这个"变轻"指的是什么物理量减小了？', options: ['物体的重力', '物体的质量', '弹簧测力计的示数', '物体的密度'], answer: 2, explain: '物体的重力和质量不会因为浸入水中而改变。"变轻"指的是弹簧测力计的示数减小了，因为物体受到了向上的浮力，拉力减小。' });
    allQuestions.push({ round: 2, question: '用弹簧测力计测量浮力时，物体不能接触？', options: ['水', '容器壁或容器底', '空气', '弹簧测力计'], answer: 1, explain: '物体接触容器壁或容器底时，会受到容器壁的支持力，导致弹簧测力计示数偏小，测量结果不准确。' });
    allQuestions.push({ round: 2, question: '阿基米德原理实验证实：浮力的大小等于物体排开的液体所受的？', options: ['质量', '重力', '体积', '密度'], answer: 1, explain: '实验证实 F_浮 = G_排，即浮力的大小等于物体排开的液体所受的重力，这是阿基米德原理的核心内容。' });
    allQuestions.push({ round: 2, question: '将空易拉罐慢慢压入水中，越往下压越费力，这是因为？', options: ['易拉罐体积变大', '排开水体积变大，浮力变大', '易拉罐重力变大', '水的压力变大'], answer: 1, explain: '越往下压，易拉罐浸入水中的体积越大，排开水的体积越大，受到的浮力越大。根据力的平衡，需要施加更大的向下压力来克服增大的浮力。' });
    allQuestions.push({ round: 2, question: '"曹冲称象"利用的核心物理原理是？', options: ['杠杆原理', '浮力原理（阿基米德原理）', '惯性原理', '能量守恒'], answer: 1, explain: '曹冲将大象换成石头，利用船漂浮时排开水的体积相同、浮力相同，从而间接称出大象的重力，本质上是利用了浮力原理。' });

    quizQuestions = allQuestions;

    // === Core Functions ===
    function initQuiz() {
      loadProgress();
      updateChallengeButton();
      var cb = document.getElementById('challengeBtnBL');
      if (cb) cb.onclick = function() { if (!isReviewing) startQuiz(); };
      var pauseCb = document.getElementById('pauseBL');
      if (pauseCb) {
        pauseCb.addEventListener('change', function() {
          if (this.checked && typeof noLoop === 'function') noLoop();
          else if (typeof loop === 'function') loop();
        });
      }
    }

    function startQuiz() {
      isReviewing = false;
      currentRound = 0;
      currentQuestion = 0;
      selectedOption = null;
      isAnswered = false;
      if (!quizData) {
        quizData = { answers: [], scores: [] };
        for (var r = 0; r < 3; r++) {
          quizData.answers[r] = [];
          quizData.scores[r] = [];
          for (var q = 0; q < 5; q++) { quizData.answers[r][q] = -1; quizData.scores[r][q] = 0; }
        }
      }
      document.getElementById('quizOverlayBL').style.display = 'flex';
      renderRound();
    }

    function closeQuiz() {
      document.getElementById('quizOverlayBL').style.display = 'none';
      updateChallengeButton();
    }

    function resetQuiz() {
      if (!confirm('确定要重置所有答题进度吗？')) return;
      quizData = null;
      try { localStorage.removeItem(QUIZ_STORAGE_KEY); } catch(e) {}
      saveQuizToServer(null);
      isReviewing = false;
      currentRound = 0;
      currentQuestion = 0;
      document.getElementById('quizOverlayBL').style.display = 'none';
      updateChallengeButton();
    }

    function renderRound() {
      var body = document.getElementById('quizBodyBL');
      var title = document.getElementById('quizTitleBL');
      title.textContent = '第 ' + (currentRound + 1) + ' 关（共3关）';
      var roundNames = ['浮力测量基础', '排开水的重量', '视重与浮力应用'];
      var html = '<div class="quiz-progress">第 ' + (currentRound + 1) + ' / 3 关 · 共5题</div>';
      html += '<div style="text-align:center;margin:20px 0;">';
      html += '<p style="font-size:18px;margin-bottom:24px;">准备好迎接挑战了吗？</p>';
      html += '<p style="color:#aaa;margin-bottom:20px;">本关主题：' + roundNames[currentRound] + '</p>';
      html += '<button class="quiz-btn" onclick="renderQuestion(0)">开始答题</button>';
      html += '<button class="quiz-btn secondary" onclick="closeQuiz()">退出</button>';
      html += '</div>';
      body.innerHTML = html;
    }

    function renderQuestion(qIdx) {
      currentQuestion = qIdx;
      selectedOption = null;
      isAnswered = false;
      var qIdx2 = currentRound * 5 + currentQuestion;
      var q = quizQuestions[qIdx2];
      var body = document.getElementById('quizBodyBL');
      var title = document.getElementById('quizTitleBL');
      title.textContent = '第 ' + (currentRound + 1) + ' 关 · 第 ' + (currentQuestion + 1) + ' 题';
      var hasAnswer = (quizData.answers[currentRound][currentQuestion] >= 0);
      var savedAns = quizData.answers[currentRound][currentQuestion];
      var html = '<div class="quiz-progress">';
      html += '第 ' + (currentRound + 1) + ' / 3 关 · ';
      html += '第 ' + (currentQuestion + 1) + ' / 5 题</div>';
      html += '<div style="font-size:18px;font-weight:600;margin:16px 0 20px;">' + q.question + '</div>';
      var labels = ['A', 'B', 'C', 'D'];
      for (var i = 0; i < q.options.length; i++) {
        var cls = 'quiz-option';
        var disabled = '';
        if (hasAnswer) {
          disabled = ' disabled';
          if (i === q.answer) cls += ' correct';
          else if (i === savedAns) cls += ' wrong';
        }
        html += '<button class="' + cls + '"' + disabled + ' data-opt="' + i + '" onclick="selectAnswer(' + i + ')">';
        html += '<strong>' + labels[i] + '.</strong> ' + q.options[i];
        html += '</button>';
      }
      if (hasAnswer) {
        html += '<div class="review-explain" style="margin-top:12px;padding:12px;background:#16213e;border-radius:8px;">';
        html += '<strong>解析：</strong>' + q.explain;
        html += '</div>';
      }
      html += '<div style="text-align:center;margin-top:16px;">';
      if (hasAnswer) {
        if (currentQuestion < 4) {
          html += '<button class="quiz-btn" onclick="renderQuestion(' + (currentQuestion + 1) + ')">下一题</button>';
        } else {
          html += '<button class="quiz-btn" onclick="showRoundResult()">查看本关结果</button>';
        }
      }
      html += '<button class="quiz-btn secondary" onclick="closeQuiz()">退出</button>';
      html += '</div>';
      body.innerHTML = html;
    }

    window.selectAnswer = function(optIdx) {
      if (isAnswered) return;
      var qIdx2 = currentRound * 5 + currentQuestion;
      var q = quizQuestions[qIdx2];
      isAnswered = true;
      selectedOption = optIdx;
      quizData.answers[currentRound][currentQuestion] = optIdx;
      var isCorrect = (optIdx === q.answer);
      quizData.scores[currentRound][currentQuestion] = isCorrect ? 1 : 0;
      var btns = document.querySelectorAll('#quizBodyBL .quiz-option');
      for (var i = 0; i < btns.length; i++) {
        btns[i].disabled = true;
        if (i === q.answer) btns[i].classList.add('correct');
        else if (i === optIdx) btns[i].classList.add('wrong');
      }
      setTimeout(function() {
        var body = document.getElementById('quizBodyBL');
        var explainDiv = document.createElement('div');
        explainDiv.className = 'review-explain';
        explainDiv.style.cssText = 'margin-top:12px;padding:12px;background:#16213e;border-radius:8px;';
        explainDiv.innerHTML = '<strong>解析：</strong>' + q.explain;
        body.appendChild(explainDiv);
        var btnDiv = document.createElement('div');
        btnDiv.style.cssText = 'text-align:center;margin-top:16px;';
        if (currentQuestion < 4) {
          btnDiv.innerHTML = '<button class="quiz-btn" onclick="renderQuestion(' + (currentQuestion + 1) + ')">下一题</button>';
        } else {
          btnDiv.innerHTML = '<button class="quiz-btn" onclick="showRoundResult()">查看本关结果</button>';
        }
        btnDiv.innerHTML += '<button class="quiz-btn secondary" onclick="closeQuiz()">退出</button>';
        body.appendChild(btnDiv);
        saveProgress();
      }, 1200);
    };

    function showRoundResult() {
      var body = document.getElementById('quizBodyBL');
      var title = document.getElementById('quizTitleBL');
      title.textContent = '第 ' + (currentRound + 1) + ' 关结果';
      var correctCount = 0;
      for (var i = 0; i < 5; i++) { if (quizData.scores[currentRound][i] === 1) correctCount++; }
      var stars = getStars(correctCount);
      var starStr = '';
      for (var s = 0; s < 3; s++) { starStr += (s < stars) ? '★' : '☆'; }
      var passed = (correctCount >= 3);
      var html = '<div class="quiz-result">';
      html += '<h3>' + (passed ? '恭喜过关！' : '再接再厉！') + '</h3>';
      html += '<div class="stars">' + starStr + '</div>';
      html += '<p>答对 ' + correctCount + ' / 5 题';
      if (passed) html += ' · ' + (correctCount >= 5 ? '完美！' : correctCount >= 4 ? '优秀！' : '通过！');
      html += '</p></div>';
      html += '<div style="text-align:center;margin:16px 0;">';
      if (passed && currentRound < 2) {
        html += '<button class="quiz-btn" onclick="goToNextRound()">进入下一关</button>';
      } else if (!passed) {
        html += '<button class="quiz-btn" onclick="retryRound()">重新挑战本关</button>';
      }
      if (passed && currentRound >= 2) {
        html += '<button class="quiz-btn" onclick="showReview()">查看全部解析</button>';
      }
      html += '<button class="quiz-btn secondary" onclick="closeQuiz()">退出</button>';
      html += '<button class="quiz-btn danger" onclick="resetQuiz()" style="margin-left:8px;">重置进度</button>';
      html += '</div>';
      body.innerHTML = html;
      saveProgress();
    }

    window.goToNextRound = function() {
      currentRound++;
      currentQuestion = 0;
      renderRound();
    };

    window.retryRound = function() {
      for (var i = 0; i < 5; i++) { quizData.answers[currentRound][i] = -1; quizData.scores[currentRound][i] = 0; }
      currentQuestion = 0;
      renderQuestion(0);
    };

    function showReview() {
      isReviewing = true;
      var body = document.getElementById('quizBodyBL');
      var title = document.getElementById('quizTitleBL');
      title.textContent = '全部题目回顾';
      var allCorrect = 0;
      var total = 0;
      var html = '';
      for (var r = 0; r < 3; r++) {
        html += '<h3 style="color:#ffd700;margin:16px 0 8px;">第 ' + (r + 1) + ' 关</h3>';
        for (var q = 0; q < 5; q++) {
          var qIdx = r * 5 + q;
          var question = quizQuestions[qIdx];
          var ans = quizData.answers[r][q];
          if (ans === undefined || ans === null) continue;
          var isC = (ans === question.answer);
          if (ans >= 0) { allCorrect += isC ? 1 : 0; total++; }
          var cls = isC ? 'correct' : 'wrong';
          html += '<div class="review-card ' + cls + '">';
          html += '<span class="rbadge ' + cls + '">' + (isC ? '正确' : '错误') + '</span>';
          html += '<strong>' + (q + 1) + '. ' + question.question + '</strong>';
          html += '<div style="margin-top:4px;font-size:14px;color:#ccc;">你的答案：' + (ans >= 0 ? question.options[ans] : '未作答') + ' | 正确答案：' + question.options[question.answer] + '</div>';
          html += '<div class="review-explain">' + question.explain + '</div>';
          html += '</div>';
        }
      }
      html += '<div style="text-align:center;margin:16px 0;">';
      html += '<p style="font-size:18px;margin-bottom:12px;">总得分：' + allCorrect + ' / ' + total + '</p>';
      html += '<button class="quiz-btn" onclick="closeQuiz()">关闭</button>';
      html += '<button class="quiz-btn danger" onclick="resetQuiz()">重置进度</button>';
      html += '</div>';
      body.innerHTML = html;
    }

    window.showReview = showReview;
    window.closeQuiz = closeQuiz;
    window.resetQuiz = resetQuiz;
    window.startQuiz = startQuiz;
    window.renderQuestion = renderQuestion;
    window.showRoundResult = showRoundResult;
    window.goToNextRound = goToNextRound;
    window.retryRound = retryRound;

    function getStars(correctCount) {
      if (correctCount >= 5) return 3;
      if (correctCount >= 4) return 2;
      if (correctCount >= 3) return 1;
      return 0;
    }

    function saveProgress() {
      var data = { answers: quizData.answers, scores: quizData.scores, timestamp: Date.now() };
      try { localStorage.setItem(QUIZ_STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
      saveQuizToServer(data);
    }

    function loadProgress() {
      try {
        var raw = localStorage.getItem(QUIZ_STORAGE_KEY);
        if (raw) {
          var data = JSON.parse(raw);
          if (data && data.answers && data.scores) {
            quizData = { answers: data.answers, scores: data.scores };
            return;
          }
        }
      } catch(e) {}
      quizData = null;
    }

    function clearProgress() {
      quizData = null;
      try { localStorage.removeItem(QUIZ_STORAGE_KEY); } catch(e) {}
      saveQuizToServer(null);
    }

    function updateChallengeButton() {
      var btn = document.getElementById('challengeBtnBL');
      if (!btn) return;
      var hasData = false;
      if (quizData) {
        for (var r = 0; r < 3; r++) {
          for (var q = 0; q < 5; q++) {
            if (quizData.answers && quizData.answers[r] && quizData.answers[r][q] >= 0) hasData = true;
          }
        }
      }
      btn.textContent = hasData ? '继续挑战' : '过关挑战';
    }

    // === Supabase sync ===
    function saveQuizToServer(data) {
      if (typeof supabase === 'undefined') return;
      try {
        var userStr = localStorage.getItem('auth_user');
        if (!userStr) return;
        var user = JSON.parse(userStr);
        if (!user || !user.id) return;
        var client = supabase.createClient(
          'https://ahgkfksfjkzqckkdgskl.supabase.co',
          'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFoZ2tma3Nmamt6cWNra2Rnc2tsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY1Mjc4NDUsImV4cCI6MjA1MjEwMzg0NX0.cCdQxkkmRFxzK5n3tYWhOgFpE8x1Qr5tj2j4VJmREng'
        );
        client.from('users').select('quiz_data').eq('id', user.id).then(function(res) {
          if (res.error) return;
          var quizDataObj = res.data && res.data[0] && res.data[0].quiz_data ? JSON.parse(JSON.stringify(res.data[0].quiz_data)) : {};
          if (data === null) {
            delete quizDataObj[EXPERIMENT_KEY];
          } else {
            quizDataObj[EXPERIMENT_KEY] = data;
          }
          client.from('users').update({ quiz_data: quizDataObj }).eq('id', user.id).then(function() {});
        });
      } catch(e) {}
    }

    window.updateChallengeButton = updateChallengeButton;
    window.saveProgress = saveProgress;
    window.loadProgress = loadProgress;
    window.clearProgress = clearProgress;
    window.getStars = getStars;
    window.saveQuizToServer = saveQuizToServer;

    // === Setup override ===
    var _origSetupBL = setup;
    setup = function() {
      if (_origSetupBL) _origSetupBL();
      initQuiz();
    };
  })();
  </script>
  <script src="supabase.js"></script>
  <script src="script.js"></script>
  <script>
    (function() {
      var header = document.querySelector('.header');
      var hideTimer = null;
      var HIDE_DELAY = 800;
      function show() { clearTimeout(hideTimer); header.classList.remove('hidden'); document.body.classList.remove('header-hidden'); }
      function hide() { hideTimer = setTimeout(function() { header.classList.add('hidden'); document.body.classList.add('header-hidden'); }, HIDE_DELAY); }
      document.addEventListener('mousemove', function(e) {
        if (e.clientY <= 60) show();
        else if (e.clientY > header.offsetHeight + 20 && !header.classList.contains('hidden')) hide();
      });
      header.addEventListener('mouseenter', show);
      header.addEventListener('mouseleave', hide);
      hideTimer = setTimeout(function() { header.classList.add('hidden'); document.body.classList.add('header-hidden'); }, 2000);
    })();
  </script>
