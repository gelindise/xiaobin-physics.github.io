<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=10">
  <title>交流发电机原理 - 物理虚拟实验</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <script src="auth-check.js"></script>
  <script src="supabase.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/addons/p5.dom.min.js"></script>
  <style>
    #myP5Canvas { touch-action: pinch-zoom; display: block; margin: 0 auto; border-radius: 12px; }
    .canvas-wrap { border-radius: 12px; padding: 4px; width: 100%; box-sizing: border-box; border: 1px solid #e2e8f0; position: relative; background: #fff; }
    .controls-bar { display: flex; align-items: center; justify-content: center; padding: 10px 16px; gap: 16px; flex-wrap: wrap; background: #f8fafc; border-radius: 0 0 12px 12px; border-top: 1px solid #e2e8f0; }
    .ctrl-group { display: flex; align-items: center; gap: 6px; font-size: 14px; color: #334155; }
    .ctrl-group input[type="checkbox"] { accent-color: #3b82f6; }
    .ctrl-group input[type="range"] { width: 80px; }
    .section { padding: 1.5rem 2rem 0.5rem; }
    .section h2 { font-size: 1.4rem; }
    .quiz-question { font-size: 15px; margin-bottom: 16px; line-height: 1.6; }
    .quiz-option { display: block; width: 100%; text-align: left; padding: 12px 16px; margin-bottom: 8px; border: 2px solid #333; border-radius: 8px; background: rgba(255,255,255,0.03); color: #ccc; font-size: 14px; cursor: pointer; transition: all 0.2s; }
    .quiz-option:hover { border-color: #8b5cf6; background: rgba(139,92,246,0.1); }
    .quiz-option.correct { border-color: #22c55e; background: rgba(34,197,94,0.15); color: #22c55e; }
    .quiz-option.wrong { border-color: #ef4444; background: rgba(239,68,68,0.15); color: #ef4444; }
    .quiz-option:disabled { cursor: default; opacity: 0.7; }
    .quiz-option:disabled.correct { opacity: 1; }
    .quiz-score { font-size: 48px; font-weight: bold; }
    .quiz-score.great { color: #22c55e; }
    .quiz-score.good { color: #f59e0b; }
    .quiz-score.poor { color: #ef4444; }
    .quiz-btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 16px; }
    .review-card { background: rgba(255,255,255,0.03); border: 1px solid #333; border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; text-align: left; }
    .review-card.wrong { border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.06); }
    .review-card.correct2 { border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.04); }
    .rbadge { font-size: 12px; padding: 2px 8px; border-radius: 10px; margin-right: 8px; }
    .rbadge.ok { background: rgba(34,197,94,0.2); color: #22c55e; }
    .rbadge.fail { background: rgba(239,68,68,0.2); color: #ef4444; }
    .rq { font-size: 14px; margin-bottom: 8px; }
    .review-user-ans { font-size: 13px; color: #ef4444; margin: 4px 0; }
    .review-correct-ans { font-size: 13px; color: #22c55e; margin: 4px 0; }
    .review-explain { background: rgba(139,92,246,0.08); border: 1px solid rgba(139,92,246,0.2); border-radius: 8px; padding: 10px 14px; margin-top: 8px; }
    .review-explain .rtitle { font-size: 13px; color: #a78bfa; margin-bottom: 4px; }
    .review-explain .rtext { font-size: 13px; color: #c4b5fd; line-height: 1.6; }

    /* 可隐藏导航栏 */
    .header {
      position: fixed !important;
      top: 0;
      left: 0;
      right: 0;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }
    .header.hidden { transform: translateY(-100%); }
    body {
      padding-top: 56px;
      transition: padding-top 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    body.header-hidden { padding-top: 0; }
    @media (max-width: 768px) {
      body { padding-top: 48px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">物理虚拟实验</div>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="experiments.html">实验列表</a>
    </nav>
  </header>

  <div class="section">
    <h2>交流发电机原理</h2>
    <p style="color:#94a3b8;margin:0 0 16px 0;">观察发电机如何将机械能转化为电能。通过滑环和电刷将线圈中产生的交流电输出，可接入灯泡、检流计或示波器观察。</p>
  </div>

  <div class="main-card">
    <div class="canvas-wrap">
      <div id="myContainer"></div>
    </div>
    <div class="controls-bar">
      <div class="ctrl-group">
        <span id="labelA" style="color:#334155;font-size:13px;">风力强度: 2</span>
        <input type="range" id="rangeA" min="-8" max="8" value="2">
      </div>
      <div class="ctrl-group">
        <span id="radioA"></span>
      </div>
      <div class="ctrl-group">
        <input type="checkbox" id="checkA">
        <label id="chalkA" for="checkA">运行</label>
      </div>
      <div class="ctrl-group">
        <input type="checkbox" id="checkPause">
        <label id="chalkPause" for="checkPause">暂停</label>
      </div>
      <div class="ctrl-group">
        <input type="checkbox" id="checkB">
        <label id="chalkB" for="checkB" style="color:#0B0;">显示磁场</label>
      </div>
      <div class="ctrl-group">
        <input type="checkbox" id="checkC">
        <label id="chalkC" for="checkC" style="color:#f00;">显示电流</label>
      </div>
    </div>
  </div>

  <div style="max-width:900px;margin:0 auto 24px;padding:0 16px;text-align:center;">
    <button class="btn" id="btnChallenge" style="font-size:16px;padding:10px 32px;border-color:#8b5cf6;color:#c4b5fd;">
      过关挑战
    </button>
    <p style="color:#64748b;font-size:12px;margin-top:8px;">15道单选题 · 每次5道 · 检验你对交流发电机原理的掌握程度</p>
  </div>

  <div id="quizOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;overflow-y:auto;">
    <div style="max-width:700px;margin:40px auto;background:#1a1a2e;border:1px solid #333;border-radius:16px;padding:24px 32px;color:#e2e8f0;">
      <div id="quizHeader" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <span style="font-size:18px;font-weight:bold;" id="quizTitle">第 1 关 (1/3)</span>
        <div style="display:flex;gap:8px;">
          <button class="btn" id="btnResetQuiz" style="font-size:12px;border-color:#555;color:#999;">↺ 重置</button>
          <button class="btn" id="btnCloseQuiz" style="font-size:12px;">✕ 退出</button>
        </div>
      </div>
      <div id="quizProgress" style="height:4px;background:#333;border-radius:2px;margin-bottom:20px;">
        <div id="quizProgressFill" style="height:100%;background:#8b5cf6;border-radius:2px;width:0%;transition:width 0.3s;"></div>
      </div>
      <div id="quizBody"></div>
      <div id="quizResult" style="display:none;text-align:center;padding:30px 0;"></div>
    </div>
  </div>

  <script>
    var labelA, rangeA, checkA, chalkA, checkB, chalkB, checkC, chalkC, radioA, checkPause, chalkPause;
    var generatorImage = [], glowImage, turbinImage;
    var ptheta = 1, theta = 0, thetaDiff = 0;
    var graphY = [];
    var motorX = 350, motorY = 250;
    var roterMax = 12;
    var roterX = [-40, -20, -20, -80, -80, -80, 80, 80, 80, 20, 20, 40];
    var roterY = [200, 200, 50, 50, 0, -50, -50, 0, 50, 50, 150, 150];
    var maskMax = 2;
    var maskX = [-20, -20], maskY = [200, 100];
    var bridgeX = [200, 150], bridgeY = [400, 450];
    var vectorX = [], vectorY = [];
    var vectorOX = [-0.1, 0.1], vectorOY = 0;
    var pathNode = [[], [], []], pathNodeLength = [], pathNodes = [0, 0, 0];
    var pathX1 = [[300, 750], [300, 800, 750], [300, 800, 750]];
    var pathY1 = [[430, 480], [430, 430, 480], [430, 430, 480]];
    var pathX2 = [[720, 250], [700, 750, 250], [700, 750, 250]];
    var pathY2 = [[430, 480], [430, 480, 480], [430, 480, 480]];
    var path1 = [[], [], []], path2 = [[], [], []];
    var x, y, dragged = false, pmx, pmy;

    function mod(x, y) {
      if (x < 0) x += y * (ceil(abs(x) / y) + 1);
      var c = floor(x / y);
      return x - y * c;
    }
    function contain(x, y, x1, y1, w1, h1) {
      if (x < x1) return false; if (x > (x1 + w1)) return false;
      if (y < y1) return false; if (y > (y1 + h1)) return false;
      return true;
    }
    function diffAngle(t1, t2) {
      var tt1 = mod(t1, TWO_PI), tt2 = mod(t2, TWO_PI);
      if (abs(tt1 - tt2) > PI) {
        if (tt1 < tt2) tt1 += TWO_PI; else if (tt1 > tt2) tt2 += TWO_PI;
      }
      return tt1 - tt2;
    }
    function drawArrow2D_thick(x, y, cx, cy, thick) {
      var lArrow = sqrt(cx * cx + cy * cy);
      if (lArrow < 1) return;
      var oxArrow = [0, lArrow - 2 * thick, lArrow - 2 * thick, lArrow, lArrow - 2 * thick, lArrow - 2 * thick, 0];
      var oyArrow = [thick, thick, 2 * thick, 0, -2 * thick, -thick, -thick];
      push(); translate(x, y); rotate(atan2(cy, cx));
      beginShape();
      for (var i = 0; i < oxArrow.length; i++) vertex(max(oxArrow[i], 0), oyArrow[i]);
      endShape(CLOSE); pop();
    }
    function drawProton(x, y, t) {
      var cx = 8 * cos(t), cy = 8 * sin(t);
      noStroke(); fill(255, 0, 0, 191);
      drawArrow2D_thick(x - cx, y - cy, 2 * cx, 2 * cy, 3);
    }

    function preload() {
      generatorImage[0] = loadImage("lee/image/ac_generator_0.png");
      generatorImage[1] = loadImage("lee/image/ac_generator_1.png");
      generatorImage[2] = loadImage("lee/image/ac_generator_2.png");
      generatorImage[3] = loadImage("lee/image/ac_generator_3.png");
      glowImage = loadImage("lee/image/faradays_law_glow.png");
      turbinImage = loadImage("lee/image/ac_generator_turbin.png");
    }

    function setup() {
      frameRate(20);
      var o = select("#myContainer");
      var a = 0.5;
      var w = int(min(o.width, (window.innerHeight - 200) / a));
      var h = int(w * a);
      myCanvas = createCanvas(w, h);
      myCanvas.parent("myContainer");
      myCanvas.id("myP5Canvas");

      labelA = select("#labelA");
      rangeA = select("#rangeA");
      rangeA.input(setup2);
      checkA = select("#checkA"); chalkA = select("#chalkA");
      chalkA.html("运行"); checkA.checked(true);
      checkB = select("#checkB"); chalkB = select("#chalkB");
      chalkB.style("color", "#0B0"); chalkB.html("显示磁场");
      checkC = select("#checkC"); chalkC = select("#chalkC");
      chalkC.style("color", "#F00"); chalkC.html("显示电流");
      checkC.checked(true);
      checkPause = select("#checkPause"); chalkPause = select("#chalkPause");

      radioA = createRadio("radioA");
      radioA.option("灯泡 ", "0");
      radioA.option("检流计 ", "1");
      radioA.option("示波器 ", "2");
      radioA.parent("radioA");
      radioA.value("0");

      for (var i = 0; i < pathNodes.length; i++) pathCalculate(i);
      setup2();
    }

    function setup2() {
      labelA.html("风力强度: " + rangeA.value());
    }

    function pathCalculate(i) {
      for (var j = 0; j < pathX1[i].length; j++) {
        path1[i][j] = (j === 0) ? 0 : path2[i][j - 1];
        path2[i][j] = path1[i][j] + dist(pathX1[i][j], pathY1[i][j], pathX2[i][j], pathY2[i][j]);
      }
      pathNodeLength[i] = path2[i][pathX1[i].length - 1];
      pathNodes[i] = round(pathNodeLength[i] * 0.03);
      for (var j = 0; j < pathNodes[i]; j++) {
        pathNode[i][j] = map(j, 0, pathNodes[i], 0, pathNodeLength[i]);
      }
    }

    function windowResized() {
      var o = select("#myContainer");
      var a = 0.5;
      var w = int(min(o.width, (window.innerHeight - 200) / a));
      var h = int(w * a);
      resizeCanvas(w, h);
    }

    function draw() {
      if (touches.length > 1) return;
      background(244);
      textSize(30);
      textAlign(LEFT, TOP);
      push();
      scale(width / 1000);
      strokeCap(ROUND);
      strokeJoin(ROUND);

      var paused = checkPause.checked();
      if (checkA.checked() && !paused) {
        ptheta = theta;
        if (dragged) { theta += thetaDiff; thetaDiff = 0; }
        else { theta += map(rangeA.value(), -8, 8, -0.4, 0.4); }
        theta = mod(theta, TWO_PI);
      }
      var emf = -(sin(ptheta) - sin(theta));
      if (checkA.checked() && !paused) graphY.push(emf);
      if (graphY.length >= 200) graphY.splice(0, 1);

      image(generatorImage[3], 0, 0, 1000, 500);

      push();
      translate(500, 100);
      imageMode(CENTER);
      rotate(theta);
      image(turbinImage, 0, 0, 600, 600);
      pop();

      noFill();
      strokeWeight(3);
      stroke(160, 80, 0);
      arc(bridgeX[0], bridgeY[0], 80, 80, 0, PI);
      strokeWeight(3);

      drawRoter(false);

      vectorX[0] = motorX + roterX[4] * cos(theta) - roterY[4];
      vectorY[0] = motorY + roterX[4] * sin(theta) + roterY[4];
      vectorX[1] = motorX + roterX[7] * cos(theta) - roterY[7];
      vectorY[1] = motorY + roterX[7] * sin(theta) + roterY[7];

      noFill();
      if (checkB.checked()) drawMagnetic(-emf * 3000);

      if (dragged) {
        noStroke(); fill(255, 0, 255); ellipse(motorX, motorY, 10, 10);
      }

      noFill();
      drawRoter(true);

      if (checkC.checked()) drawVector();

      stroke(244); strokeWeight(10);
      arc(bridgeX[0], bridgeY[0], 80, 80, PI, TWO_PI);
      arc(bridgeX[1], bridgeY[1], 80, 80, 4.2, TWO_PI);
      strokeWeight(3); stroke(160, 80, 0);
      arc(bridgeX[0], bridgeY[0], 80, 80, PI - 0.1, TWO_PI + 0.1);
      ellipse(bridgeX[1], bridgeY[1], 80, 80, 0, PI);

      strokeWeight(3); stroke(160, 80, 0);
      line(
        motorX + roterX[0] * cos(theta) - roterY[0], motorY + roterX[0] * sin(theta) + roterY[0],
        motorX + roterX[1] * cos(theta) - roterY[1], motorY + roterX[1] * sin(theta) + roterY[1]
      );
      line(
        motorX + roterX[roterMax - 2] * cos(theta) - roterY[roterMax - 2], motorY + roterX[roterMax - 2] * sin(theta) + roterY[roterMax - 2],
        motorX + roterX[roterMax - 1] * cos(theta) - roterY[roterMax - 1], motorY + roterX[roterMax - 1] * sin(theta) + roterY[roterMax - 1]
      );

      if (radioA.value() == "1") {
        stroke(0); strokeWeight(2);
        var x1 = 750, y1 = 410;
        var galvAngle = constrain(emf * 2.67, -1.04, 1.04);
        var x2 = x1 + 70 * sin(galvAngle);
        var y2 = y1 - 70 * cos(galvAngle);
        line(x1, y1, x2, y2);
        noStroke(); fill(217); ellipse(x1, y1, 40);
        fill(128); ellipse(x1, y1, 10);
      }

      image(generatorImage[int(radioA.value())], 0, 0, 1000, 500);

      rectMode(CENTER);
      var current = 20 * emf;
      if (checkC.checked()) {
        var i = int(radioA.value());
        if (checkA.checked()) {
          for (var j = 0; j < pathNodes[i]; j++) {
            pathNode[i][j] += current;
            if (pathNode[i][j] > pathNodeLength[i]) pathNode[i][j] -= pathNodeLength[i];
            if (pathNode[i][j] < 0) pathNode[i][j] += pathNodeLength[i];
          }
        }
        fill(0); noStroke();
        for (var j = 0; j < pathNodes[i]; j++) {
          for (var k = 0; k < pathX1[i].length; k++) {
            var p = mod(pathNode[i][j], pathNodeLength[i]);
            if (path1[i][k] <= pathNode[i][j] && pathNode[i][j] <= path2[i][k]) {
              var px = map(pathNode[i][j], path1[i][k], path2[i][k], pathX1[i][k], pathX2[i][k]);
              var py = map(pathNode[i][j], path1[i][k], path2[i][k], pathY1[i][k], pathY2[i][k]);
              var t = atan2(pathY2[i][k] - pathY1[i][k], pathX2[i][k] - pathX1[i][k]);
              if (current < 0) t += PI;
              drawProton(px, py, t);
            }
          }
        }
      }

      if (radioA.value() == "0") {
        imageMode(CENTER);
        tint(255, abs(800 * emf));
        image(glowImage, 750, 375, 260, 260);
        noTint();
        imageMode(CORNER);
      }

      if (radioA.value() == "2") {
        beginShape();
        noFill(); strokeWeight(2); stroke(255, 0, 0);
        for (var ii = 0; ii < graphY.length; ii++) {
          vertex(650 + ii, 350 - constrain(125 * graphY[ii], -50, 50));
        }
        endShape();
      }

      pop();
    }

    function drawMagnetic(emf) {
      var minX = motorX - 150, maxX = motorX + 150;
      var minY = motorY - 50, maxY = motorY + 50;
      var lineX = [vectorX[0], vectorX[1]], lineY = [vectorY[0], vectorY[1]];
      var lineMax = 8;
      var poleX = [], poleY = [], poleIsN = [];
      for (var j = 0; j < lineMax; j++) {
        poleX.push(minX - 20); poleY.push(map(j, 0, lineMax - 1, minY - 16, maxY + 16)); poleIsN.push(true);
      }
      for (var j = 0; j < lineMax; j++) {
        poleX.push(maxX + 20); poleY.push(map(j, 0, lineMax - 1, minY - 16, maxY + 16)); poleIsN.push(false);
      }
      for (var c = 1; c < lineMax - 1; c++) {
        var steps = 600;
        var forward = (sin(theta) * cos(theta)) ? ((c < lineMax / 2) ? true : false) : ((c < lineMax / 2) ? false : true);
        var current = forward ? -emf * 0.01 : emf * 0.01;
        var flux = forward ? 30 : -30;
        var foreX = [], foreY = [];
        foreX.push(forward ? minX : maxX);
        foreY.push(poleY[c]);
        for (var i = 0; i < steps; i++) {
          var x = foreX[foreX.length - 1], y = foreY[foreX.length - 1];
          var vecX = 0, vecY = 0;
          for (var k = 0; k < 2; k++) {
            var r = dist(x, y, lineX[k], lineY[k]);
            var hi = ((k === 0) ? -1 : 1) * current / r / r;
            vecX += hi * (y - lineY[k]) / r; vecY -= hi * (x - lineX[k]) / r;
          }
          for (var j = 0; j < poleX.length; j++) {
            var len = pow(x - poleX[j], 2) + pow(y - poleY[j], 2);
            vecX += flux * (poleIsN[j] ? 1 : -1) / len * ((x - poleX[j]) / sqrt(len));
            vecY += flux * (poleIsN[j] ? 1 : -1) / len * ((y - poleY[j]) / sqrt(len));
          }
          var h = sqrt(vecX * vecX + vecY * vecY);
          if (h < 0.001) break;
          x += vecX / h; y += vecY / h;
          foreX.push(x); foreY.push(y);
          if (forward) { if (x > maxX) break; } else { if (x < minX) break; }
        }
        var biasY = (foreY[foreX.length - 1] - foreY[0]);
        for (var ii = 0; ii < foreX.length; ii++) foreY[ii] -= biasY * ii / (foreX.length - 1);
        strokeWeight(7); stroke(244);
        beginShape();
        if (forward) for (var ii = 60; ii < foreX.length; ii++) vertex(foreX[ii], foreY[ii]);
        else for (var ii = 0; ii < foreX.length - 60; ii++) vertex(foreX[ii], foreY[ii]);
        endShape();
        strokeWeight(3); stroke(0, 255, 0);
        beginShape();
        for (var ii = 0; ii < foreX.length; ii++) vertex(foreX[ii], foreY[ii]);
        endShape();
      }
    }

    function drawRoter(bFront) {
      push();
      noFill(); strokeCap(SQUARE);
      stroke(233); strokeWeight(7);
      drawRoter2(bFront);
      stroke(160, 80, 0); strokeWeight(3);
      drawRoter2(bFront);
      pop();
    }

    function drawRoter2(bFront) {
      if (bFront) {
        line(
          motorX + maskX[0] * cos(theta) - maskY[0], motorY + maskX[0] * sin(theta) + maskY[0],
          motorX + maskX[1] * cos(theta) - maskY[1], motorY + maskX[1] * sin(theta) + maskY[1]
        );
        beginShape();
        for (var i = 0; i < roterMax; i++) {
          if (roterY[i] >= 0)
            vertex(motorX + roterX[i] * cos(theta) - roterY[i], motorY + roterX[i] * sin(theta) + roterY[i]);
          else { endShape(); beginShape(); }
        }
        endShape();
      } else {
        beginShape();
        for (var i = 0; i < roterMax; i++) {
          if (roterY[i] <= 0)
            vertex(motorX + roterX[i] * cos(theta) - roterY[i], motorY + roterX[i] * sin(theta) + roterY[i]);
        }
        endShape();
      }
    }

    function drawVector() {
      push();
      noStroke(); fill(255, 0, 0, 128);
      drawArrow2D_thick(vectorX[0], vectorY[0], 300 * graphY[graphY.length - 1], -300 * graphY[graphY.length - 1], 6);
      drawArrow2D_thick(vectorX[1], vectorY[1], -300 * graphY[graphY.length - 1], 300 * graphY[graphY.length - 1], 6);
      pop();
    }

    function touchStarted() {

      rangeA.value(0); setup2();
      pmx = mouseX * 1000 / width; pmy = mouseY * 1000 / height;
    }

    function touchMoved() {
      if (touches.length > 1) return;
      if (dragged) {
        var mx = mouseX * 1000 / width, my = mouseY * 1000 / height;
        var t1 = atan2(pmy - motorY, pmx - motorX);
        var t2 = atan2(my - motorY, mx - motorX);
        thetaDiff += diffAngle(t1, t2);
        pmx = mx; pmy = my;
        return false;
      }
    }

    function touchEnded() { dragged = false; }

    function mousePressed() {
      thetaDiff = 0; dragged = true;
      rangeA.value(0); setup2();
      pmx = mouseX * 1000 / width; pmy = mouseY * 1000 / height;
    }

            var quizData = user.quiz_data;
            if (typeof quizData === 'string') quizData = JSON.parse(quizData);
            if (quizData && quizData[EXPERIMENT_KEY]) {
              var serverData = quizData[EXPERIMENT_KEY];
              try { localStorage.setItem(QUIZ_STORAGE_KEY, JSON.stringify(serverData)); } catch(e) {}
              return serverData;
            }

    function getStars(score, total) {

      if (score >= Math.ceil(total / 2)) return "⭐";
      return "";

          quizRound = Math.min(saved.round + 1, 2);
          quizScores = saved.scores.slice();
          quizHighestRound = saved.highestRound;

        html += '<p style="font-size:13px;color:#64748b;margin-bottom:8px;">已完成第' + (quizRound + 1) + "关，进度已保存</p>";
        html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnReviewRound" style="font-size:14px;">查看回顾</button></div>';
        html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnNextRound" style="font-size:14px;padding:8px 24px;">进入下一关</button><button class="btn-reset" id="btnRetryRound" style="font-size:14px;">重新挑战本关</button></div>';
      } else {
        var total = quizScores[0] + quizScores[1] + quizScores[2];
        var totalClass = total >= 12 ? "great" : (total >= 8 ? "good" : "poor");
        var totalStars = getStars(total, 15);
        html = '<div class="quiz-score ' + totalClass + '">' + total + "/15</div>";
        if (totalStars) html += '<p style="font-size:20px;margin:4px 0;">' + totalStars + "</p>";
        html += '<p style="font-size:14px;color:#94a3b8;margin-bottom:8px;">第1关: ' + quizScores[0] + '/5 &nbsp; 第2关: ' + quizScores[1] + '/5 &nbsp; 第3关: ' + quizScores[2] + "/5</p>";
        html += '<p style="font-size:16px;margin:8px 0;color:' + (total >= 12 ? "#22c55e" : total >= 8 ? "#f59e0b" : "#ef4444") + ';">' + (total >= 12 ? "恭喜通关！你对交流发电机原理理解透彻！" : total >= 8 ? "还不错，再复习一下错题吧！" : "建议回到实验仔细观察线圈旋转与电流变化的关系。") + "</p>";
        html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnReviewRound" style="font-size:14px;">查看回顾</button></div>';
        html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnRetryAll" style="font-size:14px;padding:8px 24px;">重新全部挑战</button><button class="btn-reset" id="btnBackExp" style="font-size:14px;">返回实验</button></div>';
      }
      document.getElementById("quizResult").innerHTML = html;
      bindResultButtons();
    }

    function initQuiz() {
      btnChallenge = select("#btnChallenge");
      btnCloseQuiz = select("#btnCloseQuiz");
      btnResetQuiz = select("#btnResetQuiz");
      quizOverlay = select("#quizOverlay");
      quizTitle = select("#quizTitle");
      quizProgressFill = select("#quizProgressFill");
      quizBody = select("#quizBody");
      quizResult = select("#quizResult");
      btnChallenge.mouseClicked(startQuiz);
      btnCloseQuiz.mouseClicked(closeQuiz);
      btnResetQuiz.mouseClicked(resetQuiz);
      updateChallengeButton();
    }

    var _origSetup = setup;
    setup = function() { _origSetup(); initQuiz(); };
  </script>
  <script>
    (function() {
      var header = document.querySelector('.header');
      var hideTimer = null;
      var HIDE_DELAY = 800;
      function show() { clearTimeout(hideTimer); header.classList.remove('hidden'); document.body.classList.remove('header-hidden'); }
      function hide() { hideTimer = setTimeout(function() { header.classList.add('hidden'); document.body.classList.add('header-hidden'); }, HIDE_DELAY); }
      document.addEventListener('mousemove', function(e) {
        if (e.clientY <= 60) show();
        else if (e.clientY > header.offsetHeight + 20 && !header.classList.contains('hidden')) hide();
      });
      header.addEventListener('mouseenter', show);
      header.addEventListener('mouseleave', hide);
      hideTimer = setTimeout(function() { header.classList.add('hidden'); document.body.classList.add('header-hidden'); }, 2000);
    })();
  </script>
</body>
</html>
