<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>凸透镜成像3D虚拟实验</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
:root {
  --bg: #0a0e17;
  --surface: #141b2b;
  --surface2: #1a2238;
  --primary: #4facfe;
  --primary-dim: rgba(79, 172, 254, 0.15);
  --secondary: #f093fb;
  --text: #e0e6f0;
  --text-muted: #8896b0;
  --danger: #ff6b6b;
  --success: #51cf66;
  --warning: #ffd43b;
  --border: #2a3450;
  --radius: 10px;
  font-size: 14px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
  user-select: none;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
}
header .logo {
  font-size: 16px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
header nav a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 13px;
  margin-left: 16px;
  transition: color 0.2s;
}
header nav a:hover { color: var(--text); }
#container3d {
  flex: 1;
  position: relative;
  overflow: hidden;
  min-height: 0;
}
#container3d canvas { display: block; }
#controls {
  flex-shrink: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px 16px;
  max-height: 200px;
  overflow-y: auto;
}
.ctrl-group {
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.ctrl-group label {
  font-size: 12px;
  color: var(--text-muted);
  min-width: fit-content;
}
.ctrl-group .val {
  font-size: 12px;
  color: var(--primary);
  min-width: 32px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}
input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 80px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--primary);
  cursor: pointer;
  border: 2px solid var(--bg);
  box-shadow: 0 0 4px rgba(79,172,254,0.5);
}
.btn {
  padding: 4px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface2);
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn:hover { background: var(--primary-dim); border-color: var(--primary); }
.btn.active { background: var(--primary-dim); border-color: var(--primary); color: var(--primary); }
.btn-sm { padding: 2px 8px; font-size: 11px; }
.btn-danger { border-color: var(--danger); color: var(--danger); }
.btn-danger:hover { background: rgba(255,107,107,0.15); }
#infoBar {
  flex-shrink: 0;
  background: var(--surface2);
  border-top: 1px solid var(--border);
  padding: 6px 20px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px 20px;
  font-size: 13px;
  min-height: 32px;
}
#infoBar .info-item { display: flex; align-items: center; gap: 4px; }
#infoBar .info-label { color: var(--text-muted); }
#infoBar .info-value { color: var(--primary); font-weight: 600; font-variant-numeric: tabular-nums; }
#infoBar .info-type {
  padding: 1px 8px;
  border-radius: 4px;
  background: var(--primary-dim);
  color: var(--primary);
  font-size: 12px;
  font-weight: 600;
}
#coverHint {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10,14,23,0.85);
  border: 1px solid var(--warning);
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 13px;
  color: var(--warning);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s;
  z-index: 5;
}
#coverHint.show { opacity: 1; }
.cover-radio {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text-muted);
  padding: 2px 6px;
  border-radius: 4px;
  transition: all 0.2s;
}
.cover-radio:hover { background: var(--primary-dim); }
.cover-radio input { display: none; }
.cover-radio.active { color: var(--primary); background: var(--primary-dim); }
.separator { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
@media (max-width: 700px) {
  #controls { padding: 8px 12px; gap: 4px 10px; max-height: 150px; }
  input[type="range"] { width: 60px; }
  .ctrl-group label { font-size: 11px; }
  #infoBar { font-size: 12px; padding: 4px 12px; gap: 4px 12px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">凸透镜成像3D虚拟实验</div>
  <nav>
    <a href="experiments.html">← 实验列表</a>
  </nav>
</header>

<div id="container3d">
  <div id="coverHint">遮住透镜一部分，像仍然完整但变暗</div>
</div>

<div id="infoBar">
  <span class="info-item"><span class="info-label">物距 u =</span><span class="info-value" id="dispU">20.0 cm</span></span>
  <span class="info-item"><span class="info-label">像距 v =</span><span class="info-value" id="dispV">20.0 cm</span></span>
  <span class="info-item"><span class="info-label">焦距 f =</span><span class="info-value" id="dispF">10.0 cm</span></span>
  <span class="info-item"><span class="info-label">放大率 |m| =</span><span class="info-value" id="dispM">1.00</span></span>
  <span class="info-item"><span class="info-type" id="dispType">倒立、等大的实像</span></span>

<div id="controls">
  <div class="ctrl-group">

    <input type="range" id="sliderU" min="2" max="40" step="0.5" value="20">
    <span class="val" id="valU">20</span>
  </div>
  <div class="ctrl-group">
    <label>焦距 f</label>
    <input type="range" id="sliderF" min="2" max="15" step="0.5" value="10">
    <span class="val" id="valF">10</span>
  </div>
  <div class="ctrl-group">
    <label>蜡烛高</label>
    <input type="range" id="sliderH" min="1" max="8" step="0.5" value="4">
    <span class="val" id="valH">4</span>
  </div>
  <div class="ctrl-group">
    <label>发光点</label>
    <input type="range" id="sliderEmit" min="0.2" max="8" step="0.1" value="2.5">
    <span class="val" id="valEmit">2.5</span>
  </div>

  <div class="separator"></div>

  <div class="ctrl-group">
    <label>遮住透镜</label>
    <label class="cover-radio active" data-cover="none">
      <input type="radio" name="cover" value="none" checked> 无
    </label>
    <label class="cover-radio" data-cover="top">
      <input type="radio" name="cover" value="top"> 上半部
    </label>
    <label class="cover-radio" data-cover="bottom">
      <input type="radio" name="cover" value="bottom"> 下半部
    </label>
  </div>

  <div class="separator"></div>

  <button class="btn btn-sm" id="preset2f">u=2f</button>
  <button class="btn btn-sm" id="presetFocus">u=f</button>
  <button class="btn btn-sm" id="presetMag">放大实像</button>
  <button class="btn btn-sm" id="presetReduced">缩小实像</button>

  <div class="separator"></div>

  <button class="btn btn-sm btn-danger" id="btnSwap">⇄ 互换</button>
  <button class="btn btn-sm" id="btnResetView">⟲ 重置视角</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Physics ────────────────────────────────
const MAX_V = 80;
function calcImage(u, f) {
  if (Math.abs(u - f) < 0.01) return { v: Infinity, m: 0, imageH: 0, type: 'none', desc: '不成像（平行光）' };
  const v = (f * u) / (u - f);
  const clampedV = Math.abs(v) > MAX_V ? (v > 0 ? MAX_V : -MAX_V) : v;
  const m = -clampedV / u;
  const imageH = m * 4; // reference height 4cm
  let type, desc;
  if (v > 0) {
    if (u > 2 * f) { type = 'real'; desc = '倒立、缩小的实像'; }
    else if (Math.abs(u - 2 * f) < 0.01) { type = 'real'; desc = '倒立、等大的实像'; }
    else { type = 'real'; desc = '倒立、放大的实像'; }
  } else {
    type = 'virtual'; desc = '正立、放大的虚像';
  }
  return { v, clampedV, m, imageH, type, desc };
}

// ─── Scene Setup ────────────────────────────
const container = document.getElementById('container3d');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0e17);

const camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 200);
camera.position.set(10, 14, 32);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
controls.minDistance = 8;
controls.maxDistance = 80;
controls.update();

// ─── Lights ─────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffeedd, 1.8);
dirLight.position.set(10, 20, 15);
dirLight.castShadow = true;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0x4488ff, 0.4);
fillLight.position.set(-10, 5, -10);
scene.add(fillLight);

const hemiLight = new THREE.HemisphereLight(0x4466ff, 0x224422, 0.6);
scene.add(hemiLight);

// ─── Sub-scene grid (reference) ─────────────
const gridHelper = new THREE.GridHelper(80, 40, 0x2a3450, 0x1a2238);
gridHelper.position.y = -0.05;
scene.add(gridHelper);

// ─── Objects ────────────────────────────────
const LENS_RADIUS = 5;
const RAIL_LENGTH = 80;
const OBJ_GROUP = new THREE.Group();
scene.add(OBJ_GROUP);

// Optical rail
const railGeo = new THREE.BoxGeometry(RAIL_LENGTH, 0.3, 1.2);
const railMat = new THREE.MeshStandardMaterial({ color: 0x334466, metalness: 0.6, roughness: 0.4 });
const rail = new THREE.Mesh(railGeo, railMat);
rail.position.set(0, -0.15, 0);
rail.receiveShadow = true;
OBJ_GROUP.add(rail);

// Rail stand
const standGeo = new THREE.BoxGeometry(1, 0.5, 1.5);
const standMat = new THREE.MeshStandardMaterial({ color: 0x445577, metalness: 0.5, roughness: 0.5 });
const stand = new THREE.Mesh(standGeo, standMat);
stand.position.set(0, -0.4, 0);
OBJ_GROUP.add(stand);

// Principal axis (dashed line)
const axisPoints = [];
for (let x = -RAIL_LENGTH/2 + 1; x <= RAIL_LENGTH/2 - 1; x += 0.5) {
  axisPoints.push(new THREE.Vector3(x, 0, 0));
}
const axisGeo = new THREE.BufferGeometry().setFromPoints(axisPoints);
const axisMat = new THREE.LineDashedMaterial({ color: 0x667799, dashSize: 0.3, gapSize: 0.2, linewidth: 1 });
const axisLine = new THREE.Line(axisGeo, axisMat);
axisLine.computeLineDistances();
OBJ_GROUP.add(axisLine);

// Lens group — rotate to be perpendicular to principal axis (facing -X)
const lensGroup = new THREE.Group();
lensGroup.position.set(0, 0, 0);
lensGroup.rotation.y = -Math.PI / 2;
OBJ_GROUP.add(lensGroup);

const lensMatBody = new THREE.MeshPhysicalMaterial({
  color: 0x4488ff,
  transparent: true,
  opacity: 0.25,
  side: THREE.DoubleSide,
  roughness: 0.0,
  metalness: 0.0,
  depthWrite: false,
});
const lensGeo = new THREE.CircleGeometry(LENS_RADIUS, 48);
const lensMesh = new THREE.Mesh(lensGeo, lensMatBody);
lensGroup.add(lensMesh);

const lensMatFrame = new THREE.MeshPhysicalMaterial({
  color: 0xffaa44,
  metalness: 0.8,
  roughness: 0.2,
  side: THREE.DoubleSide,
});
const frameGeo = new THREE.RingGeometry(LENS_RADIUS - 0.25, LENS_RADIUS + 0.15, 48);
const frameMesh = new THREE.Mesh(frameGeo, lensMatFrame);
lensGroup.add(frameMesh);

// Lens cover
const coverMat = new THREE.MeshBasicMaterial({
  color: 0x000000,
  transparent: true,
  opacity: 0.55,
  side: THREE.DoubleSide,
  depthWrite: false,
});
const coverGeo = new THREE.PlaneGeometry(LENS_RADIUS * 2.2, LENS_RADIUS);
const coverMesh = new THREE.Mesh(coverGeo, coverMat);
coverMesh.position.z = 0.05;
coverMesh.visible = false;
lensGroup.add(coverMesh);

// Candle group — child group for rebuildable parts only
const candleGroup = new THREE.Group();
candleGroup.position.set(-20, 0, 0);
OBJ_GROUP.add(candleGroup);

const candleParts = new THREE.Group();
candleGroup.add(candleParts);

// Candle base (small platform) — added outside candleParts so it survives rebuilds
const baseMat = new THREE.MeshStandardMaterial({ color: 0x556677, metalness: 0.4, roughness: 0.5 });
const baseGeo = new THREE.BoxGeometry(0.8, 0.15, 0.8);
const candleBase = new THREE.Mesh(baseGeo, baseMat);
candleBase.position.y = -0.08;
candleGroup.add(candleBase);

// Emission point marker (glowing dot on candle)
const emitMat = new THREE.MeshBasicMaterial({ color: 0xffdd00 });
const emitGeo = new THREE.SphereGeometry(0.15, 8, 8);
const emitMarker = new THREE.Mesh(emitGeo, emitMat);
emitMarker.position.set(0, 2.5, 0); // updated in updateScene
candleGroup.add(emitMarker);

// Glow sprite for emission point
const glowCanvas = document.createElement('canvas');
glowCanvas.width = 64;
glowCanvas.height = 64;
const gctx = glowCanvas.getContext('2d');
const grad = gctx.createRadialGradient(32, 32, 0, 32, 32, 32);
grad.addColorStop(0, 'rgba(255,220,80,1)');
grad.addColorStop(0.3, 'rgba(255,180,40,0.6)');
grad.addColorStop(1, 'rgba(255,100,0,0)');
gctx.fillStyle = grad;
gctx.fillRect(0, 0, 64, 64);
const glowTexture = new THREE.CanvasTexture(glowCanvas);
const glowMat = new THREE.SpriteMaterial({ map: glowTexture, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
const emitGlow = new THREE.Sprite(glowMat);
emitGlow.scale.set(1.2, 1.2, 1);
emitGlow.position.set(0, 2.5, 0);
candleGroup.add(emitGlow);

const candleMatBody = new THREE.MeshStandardMaterial({ color: 0xdd4444, roughness: 0.7, metalness: 0.1 });
const candleMatTop = new THREE.MeshStandardMaterial({ color: 0x884422, roughness: 0.8 });

const flameMat = new THREE.MeshStandardMaterial({
  color: 0xff8800,
  emissive: 0xff4400,
  emissiveIntensity: 0.8,
});

const flameMatInner = new THREE.MeshStandardMaterial({
  color: 0xffdd44,
  emissive: 0xffdd44,
  emissiveIntensity: 1.2,
});

let candleBody, candleTop, flame, flameInner;

function buildCandle(height) {
  while (candleParts.children.length > 0) {
    const c = candleParts.children[0];
    candleParts.remove(c);
    if (c.geometry) c.geometry.dispose();
    // don't dispose shared materials
  }
  if (height < 0.5) return;

  const bodyH = Math.max(height - 1.2, 0.3);
  const bodyGeo = new THREE.CylinderGeometry(0.3, 0.35, bodyH, 12);
  candleBody = new THREE.Mesh(bodyGeo, candleMatBody);
  candleBody.position.y = bodyH / 2;
  candleBody.castShadow = true;
  candleParts.add(candleBody);

  const topGeo = new THREE.CylinderGeometry(0.25, 0.3, 0.3, 12);
  candleTop = new THREE.Mesh(topGeo, candleMatTop);
  candleTop.position.y = bodyH + 0.15;
  candleParts.add(candleTop);

  const flameH = Math.min(height * 0.35, 1.5);
  const flameGeo = new THREE.ConeGeometry(0.25, flameH, 8);
  flame = new THREE.Mesh(flameGeo, flameMat);
  flame.position.y = bodyH + 0.3 + flameH / 2;
  candleParts.add(flame);

  const flameGeoInner = new THREE.ConeGeometry(0.1, flameH * 0.6, 6);
  flameInner = new THREE.Mesh(flameGeoInner, flameMatInner);
  flameInner.position.y = bodyH + 0.3 + flameH * 0.4;
  candleParts.add(flameInner);
}

// Screen group
const screenGroup = new THREE.Group();
screenGroup.position.set(20, 0, 0);
OBJ_GROUP.add(screenGroup);

// Screen panel — rotate to face -X (toward lens)
const screenMat = new THREE.MeshStandardMaterial({
  color: 0xeeeeff,
  roughness: 0.6,
  metalness: 0.1,
  side: THREE.DoubleSide,
});
const screenGeo = new THREE.PlaneGeometry(4, 7);
const screenMesh = new THREE.Mesh(screenGeo, screenMat);
screenMesh.castShadow = true;
screenMesh.rotation.y = -Math.PI / 2; // face toward lens (-X)

// Screen frame (manual rectangular outline)
const sframePts = [
  -2.15, 3.65, 0,  2.15, 3.65, 0,
   2.15, 3.65, 0,  2.15,-3.65, 0,
   2.15,-3.65, 0, -2.15,-3.65, 0,
  -2.15,-3.65, 0, -2.15, 3.65, 0,
];
const sframeGeo2 = new THREE.BufferGeometry();
sframeGeo2.setAttribute('position', new THREE.Float32BufferAttribute(sframePts, 3));
const sframe = new THREE.LineSegments(sframeGeo2, new THREE.LineBasicMaterial({ color: 0x667788 }));
sframe.rotation.y = -Math.PI / 2;
screenGroup.add(screenMesh);
screenGroup.add(sframe);

// Screen stand
const sStandMat = new THREE.MeshStandardMaterial({ color: 0x445577, metalness: 0.4, roughness: 0.5 });
const sStandGeo = new THREE.BoxGeometry(0.6, 0.8, 0.6);
const sStand = new THREE.Mesh(sStandGeo, sStandMat);
sStand.position.y = -3.9;
screenGroup.add(sStand);

// Image plane (projected image) — with canvas texture for realistic rendering
const imgCanvas = document.createElement('canvas');
imgCanvas.width = 128;
imgCanvas.height = 256;
const imgCtx = imgCanvas.getContext('2d');
// Draw initial empty
imgCtx.fillStyle = 'rgba(0,0,0,0)';
imgCtx.fillRect(0, 0, 128, 256);
const imgTexture = new THREE.CanvasTexture(imgCanvas);
imgTexture.minFilter = THREE.LinearFilter;
imgTexture.magFilter = THREE.LinearFilter;

const imgMat = new THREE.MeshBasicMaterial({
  map: imgTexture,
  transparent: true,
  opacity: 0.9,
  side: THREE.DoubleSide,
  depthWrite: false,
  toneMapped: false,
});
const imgGeo = new THREE.PlaneGeometry(3.2, 4);
const imgMesh = new THREE.Mesh(imgGeo, imgMat);
imgMesh.rotation.y = -Math.PI / 2;
imgMesh.position.x = -0.03;
imgMesh.renderOrder = 1;
imgMesh.visible = false;
screenGroup.add(imgMesh);

// Virtual image plane (shown behind lens for virtual images)
const vImgMat = new THREE.MeshBasicMaterial({
  color: 0xff8800,
  transparent: true,
  opacity: 0.3,
  side: THREE.DoubleSide,
  depthWrite: false,
});
const vImgGeo = new THREE.PlaneGeometry(3.2, 2);
const vImgMesh = new THREE.Mesh(vImgGeo, vImgMat);
vImgMesh.rotation.y = -Math.PI / 2;
vImgMesh.visible = false;
OBJ_GROUP.add(vImgMesh);

// Focal points
const fpMat = new THREE.MeshBasicMaterial({ color: 0xff3333 });
const fpGeo = new THREE.SphereGeometry(0.2, 12, 12);
const fpMatGlow = new THREE.MeshBasicMaterial({ color: 0xff6666, transparent: true, opacity: 0.3 });
const fpGeoGlow = new THREE.SphereGeometry(0.35, 12, 12);

const fpF = new THREE.Mesh(fpGeo, fpMat);
fpF.position.set(-10, 0, 0);
OBJ_GROUP.add(fpF);
const fpFGlow = new THREE.Mesh(fpGeoGlow, fpMatGlow);
fpFGlow.position.copy(fpF.position);
OBJ_GROUP.add(fpFGlow);

const fpF2 = new THREE.Mesh(fpGeo, fpMat);
fpF2.position.set(10, 0, 0);
OBJ_GROUP.add(fpF2);
const fpF2Glow = new THREE.Mesh(fpGeoGlow, fpMatGlow);
fpF2Glow.position.copy(fpF2.position);
OBJ_GROUP.add(fpF2Glow);

// 2F points
const fp2FMat = new THREE.MeshBasicMaterial({ color: 0x66aaff, transparent: true, opacity: 0.4 });
const fp2FGeo = new THREE.SphereGeometry(0.15, 10, 10);
const fp2F = new THREE.Mesh(fp2FGeo, fp2FMat);
fp2F.position.set(-20, 0, 0);
OBJ_GROUP.add(fp2F);
const fp2F2 = new THREE.Mesh(fp2FGeo, fp2FMat);
fp2F2.position.set(20, 0, 0);
OBJ_GROUP.add(fp2F2);

// ─── Sprite Labels ──────────────────────────
function makeLabel(text, color = '#ff3333') {
  const canvas = document.createElement('canvas');
  canvas.width = 128;
  canvas.height = 48;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 128, 48);
  ctx.font = 'bold 32px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = color;
  ctx.fillText(text, 64, 24);
  const tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(1.2, 0.45, 1);
  return sprite;
}

const labelF = makeLabel('F');
labelF.position.set(-10, -0.8, 0);
OBJ_GROUP.add(labelF);
const labelF2 = makeLabel("F'");
labelF2.position.set(10, -0.8, 0);
OBJ_GROUP.add(labelF2);
const label2F = makeLabel('2F', '#66aaff');
label2F.position.set(-20, -0.8, 0);
OBJ_GROUP.add(label2F);
const label2F2 = makeLabel("2F'", '#66aaff');
label2F2.position.set(20, -0.8, 0);
OBJ_GROUP.add(label2F2);
const labelLens = makeLabel('凸透镜', '#4488ff');
labelLens.position.set(0, LENS_RADIUS + 0.8, 0);
OBJ_GROUP.add(labelLens);

// ─── Rays ──────────────────────────────────
const RAY_COLORS = [0xff4444, 0x44ff44, 0x4488ff, 0xffff44, 0xff88ff, 0x44ffff, 0xff8844];
const rayLines = [];
const rayExtLines = [];

function createRayLine(color, opacity = 0.8) {
  const mat = new THREE.LineBasicMaterial({
    color, transparent: opacity < 1, opacity,
    linewidth: 1,
  });
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(9); // 3 points (object→lens→image)
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const line = new THREE.Line(geo, mat);
  line.frustumCulled = false;
  return line;
}

function initRays() {
  // 7 rays: 3 principal + 4 bundle
  for (let i = 0; i < 7; i++) {
    const line = createRayLine(RAY_COLORS[i % RAY_COLORS.length], i < 3 ? 0.9 : 0.4);
    OBJ_GROUP.add(line);
    rayLines.push(line);

    // extension for virtual image
    const extMat = new THREE.LineDashedMaterial({
      color: RAY_COLORS[i % RAY_COLORS.length],
      transparent: true,
      opacity: 0.25,
      dashSize: 0.15,
      gapSize: 0.15,
    });
    const extGeo = new THREE.BufferGeometry();
    extGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
    const extLine = new THREE.Line(extGeo, extMat);
    extLine.frustumCulled = false;
    extLine.visible = false;
    OBJ_GROUP.add(extLine);
    rayExtLines.push(extLine);
  }
}
initRays();

// ─── Canvas drawing for realistic image ──────
function drawCandleOnCanvas(ctx, w, h, inverted, brightness, objH) {
  ctx.clearRect(0, 0, w, h);
  if (brightness < 0.05 || objH < 0.1) return;

  const alpha = Math.min(1, brightness * 1.2);
  const margin = h * 0.08;
  const areaH = h - 2 * margin;
  const bodyR = 0.55;
  const flameR = 0.45;
  const bodyH = areaH * bodyR;
  const flameH = areaH * flameR;
  const halfW = areaH * 0.09;
  const cx = w / 2;

  if (inverted) {
    // Real image: inverted candle — flame at bottom, body at top
    const bTop = margin;
    const bBot = bTop + bodyH;
    const fTop = bBot;
    const fBot = Math.min(fTop + flameH, h - margin);

    // Body
    ctx.fillStyle = `rgba(220, 60, 60, ${alpha})`;
    const rectW = halfW * 2;
    ctx.fillRect(cx - halfW, bTop, rectW, bBot - bTop);

    // Candle top (slightly wider ring)
    ctx.fillStyle = `rgba(180, 120, 60, ${alpha})`;
    ctx.fillRect(cx - halfW * 0.8, bBot - 4, rectW * 0.8, 4);

    // Flame (pointing downward — inverted)
    const grad = ctx.createRadialGradient(cx, fBot - flameH * 0.3, 0, cx, fBot - flameH * 0.3, flameH * 0.8);
    grad.addColorStop(0, `rgba(255, 240, 100, ${alpha})`);
    grad.addColorStop(0.3, `rgba(255, 180, 40, ${alpha * 0.9})`);
    grad.addColorStop(0.6, `rgba(255, 100, 20, ${alpha * 0.7})`);
    grad.addColorStop(1, `rgba(200, 50, 0, ${alpha * 0.3})`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(cx, fBot);
    ctx.lineTo(cx - halfW * 1.3, fTop);
    ctx.lineTo(cx + halfW * 1.3, fTop);
    ctx.closePath();
    ctx.fill();

    // Flame inner glow
    ctx.fillStyle = `rgba(255, 255, 200, ${alpha * 0.5})`;
    ctx.beginPath();
    ctx.moveTo(cx, fBot - 2);
    ctx.lineTo(cx - halfW * 0.5, fTop + 4);
    ctx.lineTo(cx + halfW * 0.5, fTop + 4);
    ctx.closePath();
    ctx.fill();
  } else {
    // Virtual image: upright candle
    const fBot = h - margin;
    const fTop = fBot - flameH;
    const bBot = fTop;
    const bTop = bBot - bodyH;

    // Body
    ctx.fillStyle = `rgba(220, 60, 60, ${alpha * 0.7})`;
    ctx.fillRect(cx - halfW, bTop, halfW * 2, bBot - bTop);

    // Candle top
    ctx.fillStyle = `rgba(180, 120, 60, ${alpha * 0.7})`;
    ctx.fillRect(cx - halfW * 0.8, bBot - 4, halfW * 1.6, 4);

    // Flame (pointing upward)
    const grad = ctx.createRadialGradient(cx, fTop + flameH * 0.3, 0, cx, fTop + flameH * 0.3, flameH * 0.8);
    grad.addColorStop(0, `rgba(255, 240, 100, ${alpha * 0.8})`);
    grad.addColorStop(0.3, `rgba(255, 180, 40, ${alpha * 0.7})`);
    grad.addColorStop(0.6, `rgba(255, 100, 20, ${alpha * 0.5})`);
    grad.addColorStop(1, `rgba(200, 50, 0, ${alpha * 0.2})`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(cx, fTop);
    ctx.lineTo(cx - halfW * 1.3, fBot);
    ctx.lineTo(cx + halfW * 1.3, fBot);
    ctx.closePath();
    ctx.fill();

    // Flame inner glow
    ctx.fillStyle = `rgba(255, 255, 200, ${alpha * 0.4})`;
    ctx.beginPath();
    ctx.moveTo(cx, fTop + 2);
    ctx.lineTo(cx - halfW * 0.5, fBot - 4);
    ctx.lineTo(cx + halfW * 0.5, fBot - 4);
    ctx.closePath();
    ctx.fill();
  }
}

// ─── Update Function ────────────────────────
const params = { u: 20, f: 10, candleH: 4, emissionY: 2.5, cover: 'none' };

function updateScene() {
  const { u, f, candleH, emissionY, cover } = params;
  const phys = calcImage(u, f);
  const { v, clampedV, m, imageH, type } = phys;

  // Candle
  buildCandle(candleH);
  candleGroup.position.x = -u;

  // Emission point marker — clamp to candle height
  const clampedEmit = Math.min(emissionY, candleH);
  emitMarker.position.y = clampedEmit;
  emitGlow.position.y = clampedEmit;

  // Screen position
  const screenX = Math.max(clampedV, 4);
  screenGroup.position.x = screenX;
  screenMesh.visible = (type === 'real');
  sframe.visible = (type === 'real');
  sStand.visible = (type === 'real');

  // Focal points
  fpF.position.x = -f;
  fpFGlow.position.x = -f;
  fpF2.position.x = f;
  fpF2Glow.position.x = f;
  labelF.position.x = -f;
  labelF2.position.x = f;
  fp2F.position.x = -2 * f;
  fp2F2.position.x = 2 * f;
  label2F.position.x = -2 * f;
  label2F2.position.x = 2 * f;

  // Image plane — using emission point as object height
  const absV = Math.abs(clampedV);
  const objHeight = clampedEmit; // object height = emission point Y
  const imgH = Math.abs(m) * objHeight;
  const clampedImgH = Math.min(imgH, 6);
  const bright = Math.min(1, 0.5 + 1 / Math.max(absV, 1));
  const coverDim = (cover !== 'none' && type === 'real') ? 0.45 : 1;

  if (type === 'real' && absV > 0.5) {
    imgMesh.visible = true;
    const scaleX = 1 - Math.min(1, 1 / absV) * 0.3;
    const scaleY = Math.max(0.1, clampedImgH / 4);
    imgMesh.scale.set(scaleX * 0.9, scaleY, 1);
    imgMesh.position.y = -imgH / 2;
    imgMesh.material.opacity = bright * (cover === 'none' ? 0.9 : 0.45);

    // Draw realistic candle image on canvas texture
    drawCandleOnCanvas(imgCtx, 128, 256, true, bright * coverDim, objHeight);
    imgTexture.needsUpdate = true;
  } else {
    imgMesh.visible = false;
  }

  // Virtual image
  if (type === 'virtual') {
    vImgMesh.visible = true;
    const scaleY = Math.max(0.1, clampedImgH / 3);
    vImgMesh.scale.set(0.5 + scaleY * 0.3, scaleY, 1);
    vImgMesh.position.x = clampedV; // negative (same side as object)
    vImgMesh.position.y = imgH / 2;
    vImgMesh.material.opacity = 0.3;
  } else {
    vImgMesh.visible = false;
  }

  // Lens cover
  if (cover === 'none') {
    coverMesh.visible = false;
  } else {
    coverMesh.visible = true;
    coverMesh.scale.y = 0.5;
    if (cover === 'top') {
      coverMesh.position.y = LENS_RADIUS / 2;
    } else {
      coverMesh.position.y = -LENS_RADIUS / 2;
    }
  }

  // ─── Rays ──────────────────────────────
  const objTopY = clampedEmit; // ray origin = emission point
  const hideRays = [];
  if (cover === 'top') hideRays.push(1, 3, 5);
  if (cover === 'bottom') hideRays.push(2, 4, 6);

  // Common image Y for rays (convergence/divergence point)
  const realImgY = -imgH / 2;   // inverted image center (real)
  const virtImgY = imgH / 2;    // upright image top (virtual)

  if (type === 'real' && clampedV > 1) {
    const imgY = realImgY;
    const lensYs = [
      0,                            // center (principal ray 2)
      objTopY * 0.7,                // upper (principal ray 1)
      -objTopY * 0.5,               // lower
      objTopY * 0.35,
      -objTopY * 0.35,
      objTopY * 0.15,
      -objTopY * 0.15,
    ];

    for (let i = 0; i < rayLines.length; i++) {
      const lensY = lensYs[i % lensYs.length];
      const p1 = new THREE.Vector3(-u, objTopY, 0);
      const p2 = new THREE.Vector3(0, lensY, 0);
      const p3 = new THREE.Vector3(clampedV, imgY, 0);

      if (hideRays.includes(i) || p1.distanceTo(p2) < 0.01 || p2.distanceTo(p3) < 0.01) {
        rayLines[i].visible = false;
        if (rayExtLines[i]) rayExtLines[i].visible = false;
        continue;
      }

      const pos = rayLines[i].geometry.attributes.position.array;
      pos[0] = p1.x; pos[1] = p1.y; pos[2] = p1.z;
      pos[3] = p2.x; pos[4] = p2.y; pos[5] = p2.z;
      pos[6] = p3.x; pos[7] = p3.y; pos[8] = p3.z;
      rayLines[i].geometry.attributes.position.needsUpdate = true;
      rayLines[i].geometry.setDrawRange(0, 3);
      rayLines[i].visible = true;
      rayLines[i].material.opacity = hideRays.includes(i) ? 0.15 : (i < 3 ? 0.9 : 0.4);
      rayExtLines[i].visible = false;
    }
  } else if (type === 'virtual') {
    const imgY = virtImgY; // virtual image top y (positive, upright)
    const vX = clampedV; // virtual image x (negative, same side as object)
    const lensYs = [
      0,
      objTopY * 0.7,
      -objTopY * 0.5,
      objTopY * 0.35,
      -objTopY * 0.35,
    ];

    for (let i = 0; i < rayLines.length; i++) {
      if (i >= lensYs.length) { rayLines[i].visible = false; if (rayExtLines[i]) rayExtLines[i].visible = false; continue; }
      const lensY = lensYs[i];
      // Ray from object top to lens point
      const p1 = new THREE.Vector3(-u, objTopY, 0);
      const p2 = new THREE.Vector3(0, lensY, 0);
      // Continue past lens (same direction as from p1 to p2)
      const dx = u; // u is positive, p2.x - p1.x = u
      const dy = lensY - objTopY;
      const extend = 20;
      const p3 = new THREE.Vector3(extend, lensY + dy * (extend / dx), 0);

      // Solid ray: from object top to lens point only (before lens)
      const pos = rayLines[i].geometry.attributes.position.array;
      pos[0] = p1.x; pos[1] = p1.y; pos[2] = p1.z;
      pos[3] = p2.x; pos[4] = p2.y; pos[5] = p2.z;
      rayLines[i].geometry.attributes.position.needsUpdate = true;
      rayLines[i].geometry.setDrawRange(0, 2);
      rayLines[i].visible = true;
      rayLines[i].material.opacity = i < 3 ? 0.8 : 0.35;

      // Extension: dashed line from virtual image point through lens point
      // Virtual image point = (vX, imgY) where vX < 0
      const extPos = rayExtLines[i].geometry.attributes.position.array;
      extPos[0] = vX; extPos[1] = imgY; extPos[2] = 0;
      extPos[3] = p2.x; extPos[4] = p2.y; extPos[5] = p2.z;
      rayExtLines[i].geometry.attributes.position.needsUpdate = true;
      rayExtLines[i].geometry.computeBoundingSphere();
      rayExtLines[i].computeLineDistances();
      rayExtLines[i].visible = true;
    }
  } else if (Math.abs(u - f) < 0.01) {
    // u ≈ f: parallel rays (no image)
    for (let i = 0; i < rayLines.length; i++) {
      if (i >= 3) { rayLines[i].visible = false; if (rayExtLines[i]) rayExtLines[i].visible = false; continue; }
      const lensY = (i - 1) * objTopY * 0.6;
      const p1 = new THREE.Vector3(-u, objTopY, 0);
      const p2 = new THREE.Vector3(0, lensY, 0);
      const p3 = new THREE.Vector3(30, lensY, 0);
      const pos = rayLines[i].geometry.attributes.position.array;
      pos[0] = p1.x; pos[1] = p1.y; pos[2] = p1.z;
      pos[3] = p2.x; pos[4] = p2.y; pos[5] = p2.z;
      rayLines[i].geometry.attributes.position.needsUpdate = true;
      rayLines[i].geometry.setDrawRange(0, 2);
      rayLines[i].visible = true;
      rayLines[i].material.opacity = 0.4;
      if (rayExtLines[i]) rayExtLines[i].visible = false;
    }
  } else {
    // no image
    for (let i = 0; i < rayLines.length; i++) {
      rayLines[i].visible = false;
      if (rayExtLines[i]) rayExtLines[i].visible = false;
    }
  }

  // ─── Info display ──────────────────────
  const dispU = document.getElementById('dispU');
  const dispV = document.getElementById('dispV');
  const dispF = document.getElementById('dispF');
  const dispM = document.getElementById('dispM');
  const dispType = document.getElementById('dispType');

  dispU.textContent = u.toFixed(1) + ' cm';
  dispV.textContent = (type === 'none' ? '∞' : clampedV.toFixed(1) + ' cm');
  dispF.textContent = f.toFixed(1) + ' cm';
  dispM.textContent = (type === 'none' ? '-' : Math.abs(m).toFixed(2));

  dispType.textContent = phys.desc;
  if (type === 'real') {
    dispType.style.background = 'rgba(81,207,102,0.15)';
    dispType.style.color = '#51cf66';
  } else if (type === 'virtual') {
    dispType.style.background = 'rgba(253,147,251,0.15)';
    dispType.style.color = '#f093fb';
  } else {
    dispType.style.background = 'rgba(255,107,107,0.15)';
    dispType.style.color = '#ff6b6b';
  }

  // Cover hint
  const hint = document.getElementById('coverHint');
  hint.classList.toggle('show', cover !== 'none' && type === 'real');
}

// ─── UI Bindings ────────────────────────────
const sliderU = document.getElementById('sliderU');
const sliderF = document.getElementById('sliderF');
const sliderH = document.getElementById('sliderH');
const sliderEmit = document.getElementById('sliderEmit');
const valU = document.getElementById('valU');
const valF = document.getElementById('valF');
const valH = document.getElementById('valH');
const valEmit = document.getElementById('valEmit');

sliderU.addEventListener('input', () => {
  params.u = parseFloat(sliderU.value);
  valU.textContent = params.u;
  updateScene();
});
sliderF.addEventListener('input', () => {
  params.f = parseFloat(sliderF.value);
  valF.textContent = params.f;
  updateScene();
});
sliderH.addEventListener('input', () => {
  params.candleH = parseFloat(sliderH.value);
  valH.textContent = params.candleH;
  // Keep emission slider max in sync
  sliderEmit.max = params.candleH;
  updateScene();
});

sliderEmit.addEventListener('input', () => {
  params.emissionY = parseFloat(sliderEmit.value);
  valEmit.textContent = params.emissionY;
  updateScene();
});

// Cover radio buttons
document.querySelectorAll('.cover-radio').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.cover-radio').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    params.cover = el.dataset.cover;
    updateScene();
  });
});

// Presets
document.getElementById('preset2f').addEventListener('click', () => {
  const f = parseFloat(sliderF.value);
  sliderU.value = Math.min(40, 2 * f);
  params.u = parseFloat(sliderU.value);
  valU.textContent = params.u;
  updateScene();
});
document.getElementById('presetFocus').addEventListener('click', () => {
  const f = parseFloat(sliderF.value);
  sliderU.value = Math.max(2, f);
  params.u = parseFloat(sliderU.value);
  valU.textContent = params.u;
  updateScene();
});
document.getElementById('presetMag').addEventListener('click', () => {
  const f = parseFloat(sliderF.value);
  sliderU.value = Math.max(2.5, f * 1.4);
  params.u = parseFloat(sliderU.value);
  valU.textContent = params.u;
  updateScene();
});
document.getElementById('presetReduced').addEventListener('click', () => {
  const f = parseFloat(sliderF.value);
  sliderU.value = Math.min(40, f * 3);
  params.u = parseFloat(sliderU.value);
  valU.textContent = params.u;
  updateScene();
});

// Swap
document.getElementById('btnSwap').addEventListener('click', () => {
  const phys = calcImage(params.u, params.f);
  if (phys.type !== 'real' || phys.v < 0.5) return;
  const newU = Math.min(40, Math.max(2, phys.clampedV));
  sliderU.value = newU;
  params.u = newU;
  valU.textContent = newU;
  updateScene();
});

// Reset view
document.getElementById('btnResetView').addEventListener('click', () => {
  camera.position.set(10, 14, 32);
  controls.target.set(0, 0, 0);
  controls.update();
});

// ─── Resize ─────────────────────────────────
function resize() {
  const w = container.clientWidth;
  const h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}
window.addEventListener('resize', resize);

// ─── Animation Loop ─────────────────────────
let swapAnimating = false;

function animate() {
  requestAnimationFrame(animate);
  controls.update();

  // Gentle flame flicker
  if (flame) {
    const flicker = 0.95 + Math.random() * 0.1;
    flame.scale.x = flicker;
    flame.scale.z = flicker;
  }
  if (flameInner) {
    const f2 = 0.9 + Math.random() * 0.2;
    flameInner.scale.x = f2;
    flameInner.scale.z = f2;
  }

  renderer.render(scene, camera);
}

// ─── Init ───────────────────────────────────
sliderEmit.max = params.candleH;
updateScene();
animate();
resize();

console.log('凸透镜成像3D实验已启动');
</script>
