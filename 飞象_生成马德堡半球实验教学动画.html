    &lt;script type=&quot;module&quot;&gt;
        // 音频资源
        const audioFiles = [
            &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/ESrM3NsMo2J9CZETDHgVjG.mp3&quot;, // 0: 欢迎
            &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/4cXFN5XJYB6mhbwbfiNUWh.mp3&quot;, // 1: 合拢
            &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/ZNQKtbHPzSjtkEyN5Baf6M.mp3&quot;, // 2: 抽气
            &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/Vk7kSAxaBFCMCN7oyYEo2U.mp3&quot;, // 3: 解释压力
            &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/kFaHsiEMyaW4S7oT7QqrJ5.mp3&quot;, // 4: 拉开
            &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/xQCWKrXUugEbNNkTxL6U2k.mp3&quot;  // 5: 复原
        ];

        // 状态管理
        const STATE = {
            SEPARATED: 0,
            COMBINED: 1,
            PUMPING: 2,
            VACUUM: 3,
            PULLING: 4,
            RESETTING: 5
        };

        let currentState = STATE.SEPARATED;
        let currentAudio = null;
        let pressure = 101.3; // kPa
        let targetPressure = 101.3;
        let particles = [];
        let leftHemisphereX = -100;
        let rightHemisphereX = 100;
        let pullForce = 0;
        let horsePower = 0; // 0-16

        // DOM 元素
        const btnCombine = document.getElementById('btn-combine');
        const btnPump = document.getElementById('btn-pump');
        const btnPull = document.getElementById('btn-pull');
        const btnReset = document.getElementById('btn-reset');
        const instructionText = document.getElementById('instruction-text');
        const pressureVal = document.getElementById('pressure-val');
        const forceVal = document.getElementById('force-val');
        const audioBtn = document.getElementById('audio-btn');

        // 播放音频
        function playAudio(index) {
            if (currentAudio) {
                currentAudio.pause();
            }
            currentAudio = new Audio(audioFiles[index]);
            currentAudio.play().catch(e =&gt; console.log(&quot;Audio play failed:&quot;, e));
        }

        // 更新UI文本
        function updateInstruction(text, audioIndex) {
            instructionText.style.opacity = 0;
            setTimeout(() =&gt; {
                instructionText.textContent = text;
                instructionText.style.opacity = 1;
                if (audioIndex !== undefined) playAudio(audioIndex);
            }, 300);
        }

        // 按钮事件绑定
        btnCombine.addEventListener('click', () =&gt; {
            currentState = STATE.COMBINED;
            updateInstruction(&quot;现在，我们将两个直径约37厘米的空心铜半球合拢。中间垫上浸油的皮革圈，确保不漏气。&quot;, 1);
            
            // 动画：半球合拢
            anime({
                targets: window.p5State,
                hemisphereGap: 0,
                duration: 1500,
                easing: 'easeInOutCubic',
                complete: () =&gt; {
                    btnCombine.disabled = true;
                    btnPump.disabled = false;
                    updateInstruction(&quot;请点击抽气按钮，用我发明的真空泵抽出球内的空气。&quot;, 2);
                }
            });
        });

        btnPump.addEventListener('click', () =&gt; {
            currentState = STATE.PUMPING;
            targetPressure = 5.0; // 抽到 5kPa
            btnPump.disabled = true;
            
            // 动画：气压下降
            anime({
                targets: window.p5State,
                pressure: 5,
                duration: 4000,
                easing: 'easeOutExpo',
                update: (anim) =&gt; {
                    pressure = anim.animatables[0].target.pressure;
                    pressureVal.textContent = pressure.toFixed(1);
                    // 计算压力差 F = &amp;Delta;P * S
                    // 假设半径 r = 0.185m (直径37cm)
                    // S = &amp;pi; * r^2 &amp;asymp; 0.107 m^2
                    // &amp;Delta;P = (101.3 - pressure) * 1000 Pa
                    // F = &amp;Delta;P * S
                    const deltaP = (101.3 - pressure) * 1000;
                    const area = Math.PI * 0.185 * 0.185;
                    const force = deltaP * area;
                    forceVal.textContent = Math.round(force);
                },
                complete: () =&gt; {
                    currentState = STATE.VACUUM;
                    btnPull.disabled = false;
                    updateInstruction(&quot;看，随着空气减少，球内气压降低。外部的大气压将两个半球紧紧地压在了一起。&quot;, 3);
                }
            });
        });

        // 拉力测试相关元素
        const pullTestArea = document.getElementById('pull-test-area');
        const currentHorsesDisplay = document.getElementById('current-horses');
        const btnAddHorse = document.getElementById('btn-add-horse');
        const btnReduceHorse = document.getElementById('btn-reduce-horse');
        const pullResult = document.getElementById('pull-result');
        
        let currentHorses = 0;
        const REQUIRED_HORSES = 16; // 需要16匹马才能拉开
        
        btnPull.addEventListener('click', () =&gt; {
            currentState = STATE.PULLING;
            btnPull.disabled = true;
            pullTestArea.classList.remove('hidden');
            updateInstruction(&quot;现在尝试拉开它们。请增加马匹数量，看看需要多少匹马才能拉开！&quot;, 4);
        });
        
        btnAddHorse.addEventListener('click', () =&gt; {
            if (currentHorses &lt; 20) {
                currentHorses += 2; // 每次增加2匹（左右各1匹）
                currentHorsesDisplay.textContent = currentHorses;
                
                // 更新动画
                anime({
                    targets: window.p5State,
                    horsePower: currentHorses,
                    duration: 500,
                    easing: 'easeOutQuad'
                });
                
                // 检查是否拉开
                if (currentHorses &gt;= REQUIRED_HORSES) {
                    pullResult.classList.remove('hidden');
                    pullResult.textContent = `成功！用${currentHorses}匹马拉开了半球！大气压力约为${Math.round((101.3 - pressure) * Math.PI * 0.185 * 0.185 * 1000)}N`;
                    
                    // 半球分离动画
                    setTimeout(() =&gt; {
                        anime({
                            targets: window.p5State,
                            hemisphereGap: 50,
                            duration: 1500,
                            easing: 'easeOutBack',
                            complete: () =&gt; {
                                btnReset.disabled = false;
                                updateInstruction(&quot;成功拉开！这证明了大气压的力量是多么巨大。现在可以打开阀门复原实验。&quot;);
                            }
                        });
                    }, 1000);
                } else {
                    pullResult.classList.remove('hidden');
                    pullResult.textContent = `拉力不足！还需要更多马匹...`;
                }
            }
        });
        
        btnReduceHorse.addEventListener('click', () =&gt; {
            if (currentHorses &gt; 0) {
                currentHorses -= 2;
                currentHorsesDisplay.textContent = currentHorses;
                
                anime({
                    targets: window.p5State,
                    horsePower: currentHorses,
                    duration: 500,
                    easing: 'easeOutQuad'
                });
                
                if (currentHorses &lt; REQUIRED_HORSES) {
                    pullResult.textContent = `拉力不足！还需要更多马匹...`;
                }
            }
        });

        btnReset.addEventListener('click', () =&gt; {
            currentState = STATE.RESETTING;
            targetPressure = 101.3;
            btnReset.disabled = true;
            updateInstruction(&quot;最后，打开阀门让空气进入。内外气压平衡，半球就能轻松分开了。&quot;, 5);
            
            // 动画：气压恢复
            anime({
                targets: window.p5State,
                pressure: 101.3,
                horsePower: 0,
                duration: 2000,
                easing: 'easeOutQuad',
                update: (anim) =&gt; {
                    pressure = anim.animatables[0].target.pressure;
                    pressureVal.textContent = pressure.toFixed(1);
                    forceVal.textContent = &quot;0&quot;;
                },
                complete: () =&gt; {
                    // 动画：半球分开
                    anime({
                        targets: window.p5State,
                        hemisphereGap: 100,
                        duration: 1000,
                        easing: 'easeOutBack',
                        complete: () =&gt; {
                            currentState = STATE.SEPARATED;
                            btnCombine.disabled = false;
                            pullTestArea.classList.add('hidden');
                            pullResult.classList.add('hidden');
                            currentHorses = 0;
                            currentHorsesDisplay.textContent = '0';
                            updateInstruction(&quot;欢迎来到1654年的马德堡。我是奥托&amp;middot;冯&amp;middot;格里克。今天我们要证明大气压的存在。&quot;, 0);
                        }
                    });
                }
            });
        });

        audioBtn.addEventListener('click', () =&gt; {
            if (currentAudio) {
                currentAudio.currentTime = 0;
                currentAudio.play();
            }
        });

        // p5.js 逻辑
        const sketch = (p) =&gt; {
            // 共享状态对象，用于 Anime.js 动画目标
            window.p5State = {
                hemisphereGap: 100,
                pressure: 101.3,
                horsePower: 0
            };

            let particles = [];
            const NUM_PARTICLES = 100;
            
            p.setup = () =&gt; {
                const container = document.getElementById('canvas-container');
                const canvas = p.createCanvas(container.offsetWidth, container.offsetHeight);
                canvas.parent('canvas-container');
                p.textAlign(p.CENTER, p.CENTER);
                
                // 初始化粒子
                for(let i=0; i&lt;NUM_PARTICLES; i++) {
                    particles.push(new Particle(p));
                }
            };

            p.windowResized = () =&gt; {
                const container = document.getElementById('canvas-container');
                p.resizeCanvas(container.offsetWidth, container.offsetHeight);
            };

            p.draw = () =&gt; {
                p.clear();
                p.translate(p.width/2, p.height/2);

                // 绘制背景装饰（可选）
                
                // 绘制马匹/拉力示意
                if (window.p5State.horsePower &gt; 0.1) {
                    drawHorses(p, window.p5State.horsePower);
                }

                // 绘制半球
                drawHemispheres(p, window.p5State.hemisphereGap);

                // 绘制粒子
                drawParticles(p, window.p5State.hemisphereGap, window.p5State.pressure);

                // 绘制压力箭头
                drawPressureArrows(p, window.p5State.hemisphereGap, window.p5State.pressure);
            };

            function drawHemispheres(p, gap) {
                const r = 120; // 半径
                const offset = gap / 2;

                p.noStroke();
                
                // 左半球
                p.push();
                p.translate(-offset, 0);
                // 外壳
                p.fill('#AE7645'); // 铜色
                p.arc(0, 0, r*2, r*2, p.HALF_PI, p.HALF_PI * 3);
                // 内壁（深色一点）
                p.fill('#8B5E34');
                p.arc(0, 0, r*1.8, r*1.8, p.HALF_PI, p.HALF_PI * 3);
                // 密封圈接口
                p.fill('#5D4037');
                p.rect(-5, -r, 5, r*2);
                p.pop();

                // 右半球
                p.push();
                p.translate(offset, 0);
                // 外壳
                p.fill('#AE7645');
                p.arc(0, 0, r*2, r*2, -p.HALF_PI, p.HALF_PI);
                // 内壁
                p.fill('#8B5E34');
                p.arc(0, 0, r*1.8, r*1.8, -p.HALF_PI, p.HALF_PI);
                // 密封圈接口
                p.fill('#5D4037');
                p.rect(0, -r, 5, r*2);
                
                // 阀门
                p.fill('#4A4A4A');
                p.rect(r, -10, 30, 20);
                p.fill('#AE7645');
                p.circle(r+35, 0, 15);
                p.pop();
            }

            function drawParticles(p, gap, pressure) {
                const r = 120;
                const innerR = r * 0.9;
                const offset = gap / 2;
                
                // 根据气压决定显示的粒子数量
                // 101.3 kPa -&gt; 100%, 0 kPa -&gt; 0%
                const activeCount = Math.floor(NUM_PARTICLES * (pressure / 101.3));

                p.fill(100, 149, 237, 150); // 蓝色空气粒子
                p.noStroke();

                for(let i=0; i&lt;activeCount; i++) {
                    let pt = particles[i];
                    pt.update(innerR, offset);
                    pt.display(p);
                }
            }

            function drawPressureArrows(p, gap, pressure) {
                const r = 120;
                const offset = gap / 2;
                
                // 外部大气压（常数，红色箭头指向内部）
                p.stroke('#DC2626');
                p.strokeWeight(2);
                p.fill('#DC2626');
                
                const arrowLen = 30;
                const numArrows = 12;

                // 左侧箭头
                for(let i=0; i&lt;numArrows; i++) {
                    let angle = p.map(i, 0, numArrows-1, p.HALF_PI + 0.2, p.HALF_PI * 3 - 0.2);
                    let x = -offset + Math.cos(angle) * r;
                    let y = Math.sin(angle) * r;
                    drawArrow(p, x + Math.cos(angle)*arrowLen, y + Math.sin(angle)*arrowLen, x, y);
                }

                // 右侧箭头
                for(let i=0; i&lt;numArrows; i++) {
                    let angle = p.map(i, 0, numArrows-1, -p.HALF_PI + 0.2, p.HALF_PI - 0.2);
                    let x = offset + Math.cos(angle) * r;
                    let y = Math.sin(angle) * r;
                    drawArrow(p, x + Math.cos(angle)*arrowLen, y + Math.sin(angle)*arrowLen, x, y);
                }

                // 内部压力（蓝色箭头指向外部，随气压减小而消失）
                if (pressure &gt; 5) {
                    p.stroke(100, 149, 237);
                    p.fill(100, 149, 237);
                    const innerArrowLen = p.map(pressure, 0, 101.3, 0, 25);
                    
                    // 左内
                    for(let i=0; i&lt;numArrows/2; i++) {
                        let angle = p.map(i, 0, numArrows/2-1, p.HALF_PI + 0.5, p.HALF_PI * 3 - 0.5);
                        let x = -offset + Math.cos(angle) * (r-10);
                        let y = Math.sin(angle) * (r-10);
                        drawArrow(p, x - Math.cos(angle)*innerArrowLen, y - Math.sin(angle)*innerArrowLen, x, y);
                    }
                    // 右内
                    for(let i=0; i&lt;numArrows/2; i++) {
                        let angle = p.map(i, 0, numArrows/2-1, -p.HALF_PI + 0.5, p.HALF_PI - 0.5);
                        let x = offset + Math.cos(angle) * (r-10);
                        let y = Math.sin(angle) * (r-10);
                        drawArrow(p, x - Math.cos(angle)*innerArrowLen, y - Math.sin(angle)*innerArrowLen, x, y);
                    }
                }
            }

            function drawArrow(p, x1, y1, x2, y2) {
                p.line(x1, y1, x2, y2);
                let angle = Math.atan2(y2 - y1, x2 - x1);
                p.push();
                p.translate(x2, y2);
                p.rotate(angle);
                p.triangle(0, 0, -6, 3, -6, -3);
                p.pop();
            }

            function drawHorses(p, power) {
                // 简单的马匹图标或文字表示
                p.fill('#2D593E');
                p.noStroke();
                p.textSize(16);
                p.textStyle(p.BOLD);
                
                const leftHorses = Math.ceil(power / 2);
                const rightHorses = Math.floor(power / 2);

                if (leftHorses &gt; 0) {
                    p.text(`⬅ ${leftHorses} 匹马`, -250, 0);
                    // 绳索
                    p.stroke('#5D4037');
                    p.strokeWeight(4);
                    p.line(-200, 0, -125, 0);
                }
                
                if (rightHorses &gt; 0) {
                    p.noStroke();
                    p.text(`${rightHorses} 匹马 ➡`, 250, 0);
                    // 绳索
                    p.stroke('#5D4037');
                    p.strokeWeight(4);
                    p.line(200, 0, 125, 0);
                }
            }

            class Particle {
                constructor(p) {
                    this.p = p;
                    this.reset();
                }

                reset() {
                    // 随机分布在球体内
                    let angle = this.p.random(this.p.TWO_PI);
                    let r = this.p.random(0, 100);
                    this.x = Math.cos(angle) * r;
                    this.y = Math.sin(angle) * r;
                    this.vx = this.p.random(-2, 2);
                    this.vy = this.p.random(-2, 2);
                }

                update(radius, offset) {
                    this.x += this.vx;
                    this.y += this.vy;

                    // 边界检测（简化为圆形边界，考虑左右半球的分离）
                    // 如果分离了，粒子可以跑出去吗？
                    // 现实中粒子会跑出去，这里为了演示，让粒子限制在各自的半球内或者整个区域
                    
                    if (offset &gt; 10) {
                        // 分离状态：限制在各自半球
                        // 简单处理：如果分离，粒子消失或重置，这里为了视觉连续性，
                        // 让粒子在整个空间乱跑，或者只显示在球内的粒子
                    } else {
                        // 合拢状态：限制在圆内
                        let d = this.p.dist(0, 0, this.x, this.y);
                        if (d &gt; radius - 5) {
                            // 反弹
                            let angle = Math.atan2(this.y, this.x);
                            this.vx = -Math.cos(angle) * Math.abs(this.vx) * 1.5; // 稍微加速一点保持活力
                            this.vy = -Math.sin(angle) * Math.abs(this.vy) * 1.5;
                            // 防止卡住
                            this.x = Math.cos(angle) * (radius - 6);
                            this.y = Math.sin(angle) * (radius - 6);
                        }
                    }
                    
                    // 限制最大速度
                    this.vx = this.p.constrain(this.vx, -3, 3);
                    this.vy = this.p.constrain(this.vy, -3, 3);
                }

                display(p) {
                    p.circle(this.x, this.y, 4);
                }
            }
        };

        new p5(sketch);

        // 初始播放欢迎语
        setTimeout(() =&gt; {
            updateInstruction(&quot;欢迎来到1654年的马德堡。我是奥托&amp;middot;冯&amp;middot;格里克。今天我们要证明大气压的存在。&quot;, 0);
        }, 1000);

    &lt;/script&gt;
&lt;/body&gt;
&lt;/html&gt;" frameborder="0"></iframe>
  </div>
  <script src="supabase.js"></script>
  <script src="script.js"></script>
  <script>
    (function() {
      var header = document.querySelector('.header');
      var cont = document.querySelector('.iframe-container');
      var hideTimer = null;
      var HIDE_DELAY = 800;
      function show() { clearTimeout(hideTimer); header.classList.remove('hidden'); cont.classList.remove('no-header-padding'); }
      function hide() { hideTimer = setTimeout(function() { header.classList.add('hidden'); cont.classList.add('no-header-padding'); }, HIDE_DELAY); }
      document.addEventListener('mousemove', function(e) {
        if (e.clientY <= 60) show();
        else if (e.clientY > header.offsetHeight + 20 && !header.classList.contains('hidden')) hide();
      });
      header.addEventListener('mouseenter', show);
      header.addEventListener('mouseleave', hide);
      hideTimer = setTimeout(function() { header.classList.add('hidden'); cont.classList.add('no-header-padding'); }, 2000);
    })();
  </script>
</body>
