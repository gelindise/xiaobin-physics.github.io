<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script src="geo-block.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安全支付 - 物理虚拟实验平台</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <style>
    .pay-container { max-width: 500px; margin: 4rem auto; text-align: center; }
    .pay-card {
      background: rgba(15,23,42,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      padding: 2.5rem; border-radius: 24px; border: 1px solid var(--glass-border);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      animation: cardIn 0.5s ease-out;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .pay-card h2 { font-size:1.3rem; }
    .pay-card .sub { color:var(--text-muted); font-size:0.85rem; margin-bottom:1.5rem; }
    .order-price { font-size:2.5rem; font-weight:800; color:var(--secondary); margin:0.75rem 0; }
    .order-user { color:var(--text-muted); font-size:0.85rem; }
    .order-user span { color:var(--accent); font-weight:600; }

    .qr-wrap {
      margin: 1.5rem auto; padding: 1rem; background:#fff; border-radius:12px;
      display:inline-block; box-shadow:0 0 30px rgba(59,130,246,0.15);
    }
    .qr-wrap canvas, .qr-wrap img { display:block; margin:0 auto; }
    .qr-wrap .hint {
      margin-top:0.5rem; color:#666; font-size:0.75rem; text-align:center;
    }

    .status-box {
      margin-top: 1.5rem; padding: 1rem; border-radius: 12px;
      font-size: 0.9rem;
    }
    .status-box.waiting {
      background:rgba(59,130,246,0.08); border:1px dashed var(--primary);
      color:var(--secondary);
    }
    .status-box.success {
      background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3);
      color:#4ade80;
    }
    .status-box.error {
      background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3);
      color:#ef4444;
    }
    .manual-box {
      margin-top:2rem; padding:1.5rem; background:rgba(139,92,246,0.06);
      border:1px dashed var(--glass-border); border-radius:16px;
    }
    .manual-box summary {
      cursor:pointer; color:var(--text-muted); font-size:0.8rem;
    }
    .manual-box input {
      width:100%; padding:0.7rem; border-radius:10px; margin-top:0.75rem;
      background:rgba(0,0,0,0.3); border:1px solid var(--glass-border);
      color:var(--text-main); text-align:center; font-size:0.95rem;
    }
    .manual-box input:focus { border-color:var(--accent); outline:none; }
    .loading-dots::after {
      content: ''; animation: dots 1.5s steps(4) infinite;
    }
    @keyframes dots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} 100%{content:''} }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">支付中心</div>
    <nav class="nav">
      <a href="index.html">返回首页</a>
      <a href="vip.html">重新选择</a>
    </nav>
  </header>

  <div class="pay-container">
    <div class="pay-card">
      <h2>💎 <span id="orderName">VIP 套餐</span></h2>
      <p class="sub">向管理员付款 · 凭激活码开通</p>
      <div class="order-price" id="orderPrice">¥ --</div>
      <div class="order-user">账户：<span id="orderUser">--</span></div>

      <!-- 二维码区域 -->
      <div class="qr-wrap" id="qrWrap">
        <div id="qrLoading" style="padding:2rem;color:var(--text-muted);font-size:0.85rem;">
          ⏳ 正在获取支付二维码...
        </div>
        <div id="qrDisplay" style="display:none;"></div>
        <div class="hint" id="qrHint" style="display:none;">请使用微信扫一扫 ↑</div>
      </div>

      <!-- 状态 -->
      <div class="status-box waiting" id="statusBox">
        <span id="statusText">等待扫码...</span>
      </div>

      <!-- 激活码激活（主要方式） -->
      <div class="manual-box" id="manualBox" style="display:none;">
        <div style="margin-bottom:0.75rem;font-weight:600;color:var(--secondary);">🔑 输入激活码开通 VIP</div>
        <input type="text" id="payCode" placeholder="例如：A3F-K2M-9X7" maxlength="11" style="text-transform:uppercase;letter-spacing:2px;font-family:monospace;">
        <button onclick="manualActivate()" class="btn" style="width:100%;margin-top:0.5rem;">✅ 激活 VIP</button>
        <p id="manualTip" style="margin-top:0.5rem;font-size:0.8rem;color:var(--text-muted);"></p>
      </div>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script src="script.js"></script>
  <script>
    let currentType = '', currentUser = '', outTradeNo = '', pollTimer = null;

    // 页面初始化
    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      currentType = params.get('type') || '月度VIP';
      currentUser = params.get('user') || '';
      const prices = { '月度VIP': '9.9', '年度VIP': '99', '终身VIP': '199' };

      document.getElementById('orderName').innerText = currentType;
      document.getElementById('orderPrice').innerText = '¥ ' + (prices[currentType] || '--');
      document.getElementById('orderUser').innerText = currentUser;

      if (currentUser) {
        createOrder();
      } else {
        showStatus('error', '❌ 未登录，请先登录');
      }
    });

    // 创建支付订单
    async function createOrder() {
      try {
        const res = await fetch('/api/create-order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: currentUser, vipType: currentType }),
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || '创建订单失败');
        }

        const data = await res.json();
        outTradeNo = data.out_trade_no;

        // 显示二维码
        const qrWrap = document.getElementById('qrDisplay');
        const qrLoading = document.getElementById('qrLoading');
        qrLoading.style.display = 'none';
        qrWrap.style.display = 'block';

        // 使用 QRCode.js 渲染二维码（或直接显示图片）
        const img = document.createElement('img');
        img.src = data.qrcode;
        img.alt = '支付二维码';
        img.style.width = '200px';
        img.style.height = '200px';
        img.style.borderRadius = '8px';
        qrWrap.appendChild(img);

        document.getElementById('qrHint').style.display = 'block';
        showStatus('waiting', '请使用微信扫一扫上方二维码完成支付');

        // 开始轮询支付状态
        startPolling();
      } catch (e) {
        console.warn('[pay] API not available, fallback to manual:', e.message);
        // API 不可用时回退到手动激活
        setupFallback();
      }
    }

    // 轮询支付状态
    function startPolling() {
      pollTimer = setInterval(async () => {
        try {
          const res = await fetch('/api/check-order?out_trade_no=' + outTradeNo);
          const data = await res.json();
          if (data.status === 'paid') {
            clearInterval(pollTimer);
            // 更新本地用户状态
            const cached = JSON.parse(localStorage.getItem('users') || '{}');
            if (cached[currentUser]) {
              const now = new Date();
              let expireDate = '';
              if (currentType === '月度VIP') { now.setDate(now.getDate()+30); expireDate = now.toISOString().split('T')[0]; }
              else if (currentType === '年度VIP') { now.setDate(now.getDate()+365); expireDate = now.toISOString().split('T')[0]; }
              else { expireDate = '永久'; }
              cached[currentUser].vip = currentType;
              cached[currentUser].expire = expireDate;
              localStorage.setItem('users', JSON.stringify(cached));
            }
            localStorage.setItem('currentUser', currentUser);
            showStatus('success', '🎉 支付成功！VIP 已自动开通，正在跳转...');
            setTimeout(() => location.href = 'experiments.html', 1500);
          }
        } catch(e) {
          console.warn('[poll] check failed:', e.message);
        }
      }, 3000);
    }

    // 回退到激活码激活（当 API 未配置时）
    function setupFallback() {
      document.getElementById('qrLoading').innerHTML = '💳 微信/支付宝转账后<br><span style="font-size:0.75rem;">输入管理员给你的激活码即可开通</span>';
      document.getElementById('manualBox').style.display = 'block';
      showStatus('waiting', '向管理员付款后，输入激活码完成开通');
    }

    // 手动激活（管理员给了激活码后使用）
    async function manualActivate() {
      const code = document.getElementById('payCode').value.trim();
      const tip = document.getElementById('manualTip');
      if (!code) { tip.textContent = '⚠️ 请输入激活码'; tip.style.color = '#ef4444'; return; }
      tip.textContent = '⏳ 验证中...'; tip.style.color = 'var(--secondary)';

      const ok = await simulatePaySuccess(currentUser, currentType, code);
      if (ok) {
        tip.innerHTML = "<b style='color:#4ade80'>🎉 激活成功！</b>";
        showStatus('success', '🎉 VIP 已开通，正在跳转...');
        setTimeout(() => location.href = 'experiments.html', 1500);
      } else {
        tip.textContent = '❌ 激活码无效，请联系管理员';
        tip.style.color = '#ef4444';
      }
    }

    function showStatus(type, msg) {
      const box = document.getElementById('statusBox');
      const text = document.getElementById('statusText');
      box.className = 'status-box ' + type;
      text.innerHTML = msg;
    }

    // 页面离开时停止轮询
    window.addEventListener('beforeunload', () => {
      if (pollTimer) clearInterval(pollTimer);
    });
  </script>
</body>
</html>
