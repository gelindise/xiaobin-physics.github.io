<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安全支付 - 物理虚拟实验平台</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .pay-container { max-width: 500px; margin: 4rem auto; text-align: center; }
    .pay-card {
      background: rgba(15,23,42,0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 2.5rem;
      border-radius: 24px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      animation: cardIn 0.5s ease-out;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .pay-card h2 { font-size:1.3rem; margin-bottom:0.25rem; }
    .pay-card .sub { color:var(--text-muted); font-size:0.85rem; margin-bottom:1.5rem; }
    .order-price { font-size:2.5rem; font-weight:800; color:var(--secondary); margin:1rem 0; }
    .order-remark {
      background:rgba(0,0,0,0.3); padding:0.6rem 1rem; border-radius:8px;
      font-family:monospace; color:var(--accent); font-size:0.85rem; display:inline-block;
    }
    .qr-wrap {
      background:white; width:200px; height:200px; margin:1.5rem auto;
      border-radius:12px; padding:8px; display:flex; align-items:center; justify-content:center;
      box-shadow:0 0 20px rgba(59,130,246,0.2);
    }
    .qr-wrap img { width:100%; height:100%; border-radius:6px; }
    .steps { text-align:left; font-size:0.85rem; color:var(--text-muted); margin:1.5rem 0; }
    .step-item { display:flex; align-items:center; gap:0.75rem; margin-bottom:0.6rem; }
    .step-num {
      width:22px; height:22px; background:var(--primary); color:#fff; border-radius:50%;
      display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:0.7rem; flex-shrink:0;
    }
    .verify-box {
      margin-top:1.5rem; padding:1.25rem; background:rgba(59,130,246,0.08);
      border:1px dashed var(--primary); border-radius:16px;
    }
    .verify-box input {
      width:100%; padding:0.7rem 1rem; border-radius:10px;
      background:rgba(0,0,0,0.3); border:1px solid var(--glass-border);
      color:var(--text-main); text-align:center; margin-bottom:0.75rem; font-size:0.95rem;
    }
    .verify-box input:focus { border-color:var(--primary); outline:none; }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">支付中心</div>
    <nav class="nav">
      <a href="index.html">返回首页</a>
      <a href="vip.html">重新选择</a>
    </nav>
  </header>

  <div class="pay-container">
    <div class="pay-card">
      <h2>💎 <span id="orderName">VIP 套餐</span></h2>
      <p class="sub">微信扫码支付 · 自动激活</p>

      <div class="order-price" id="orderPrice">¥ --</div>
      <p style="font-size:0.8rem;color:var(--text-muted);">订单备注（用于核对）：</p>
      <div class="order-remark" id="orderRemark">加载中...</div>

      <div class="qr-wrap">
        <img src="wechat_pay.png" alt="微信收款码"
             onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=PleaseReplaceQR'">
      </div>

      <div class="steps">
        <div class="step-item"><div class="step-num">1</div><p>打开微信「扫一扫」扫描上方二维码</p></div>
        <div class="step-item"><div class="step-num">2</div><p>支付对应金额，备注填写：<strong id="remarkHint" style="color:var(--accent);">用户名</strong></p></div>
        <div class="step-item"><div class="step-num">3</div><p>支付后输入转账单号后4位，自助激活 VIP</p></div>
      </div>

      <div class="verify-box">
        <input type="text" id="payCode" placeholder="输入微信支付单号后4位" maxlength="4">
        <button onclick="autoActivate()" class="btn" style="width:100%">立即自助激活 VIP</button>
        <p id="payTip" style="margin-top:0.6rem;font-size:0.8rem;color:var(--text-muted);"></p>
      </div>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script src="script.js"></script>
  <script>
    let currentType = '', currentUser = '';

    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      currentType = params.get('type') || '月度VIP';
      currentUser = params.get('user') || '访客';
      const prices = { '月度VIP': '10', '年度VIP': '50', '终身VIP': '98' };
      document.getElementById('orderName').innerText = currentType;
      document.getElementById('orderPrice').innerText = '¥ ' + (prices[currentType] || '--');
      document.getElementById('orderRemark').innerText = currentUser + ' - ' + currentType;
      document.getElementById('remarkHint').innerText = currentUser;
    });

    async function autoActivate() {
      const code = document.getElementById('payCode').value.trim();
      const tip = document.getElementById('payTip');
      if (code.length < 4) { tip.textContent = '⚠️ 请输入支付单号后4位'; tip.style.color = '#ef4444'; return; }

      tip.textContent = '⏳ 验证中...'; tip.style.color = 'var(--secondary)';

      const ok = await simulatePaySuccess(currentUser, currentType, code);
      if (ok) {
        tip.innerHTML = "<b style='color:#4ade80'>🎉 激活成功！</b><br><span style='color:var(--text-muted)'>正在跳转...</span>";
        setTimeout(() => location.href = 'experiments.html', 1500);
      } else {
        tip.textContent = '❌ 验证失败，请核对单号或联系管理员';
        tip.style.color = '#ef4444';
      }
    }
  </script>
</body>
</html>
