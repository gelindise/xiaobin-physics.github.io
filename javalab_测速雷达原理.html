  <script>
    // ========== 工具函数 ==========
    function doFullScreen() {
      const el = document.getElementById('divFull');
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }
    function contain(x, y, x1, y1, w1, h1) {
      return x > x1 && x < x1 + w1 && y > y1 && y < y1 + h1;
    }
    function drawButtonDrag() {
      push();
      const r = 30, gap = 4;
      let cx = width / 1000 * 40, cy = height - 45;
      if (window.devicePixelRatio) { cx = 40; cy = (height / (width / 1000)) - 45; }
      noStroke();
      for (let i = 0; i < 4; i++) {
        let x = cx + i * (r + gap) - 1.5 * (r + gap);
        fill(0, 0, 0, 30);
        ellipse(x, cy - 2, r, r);
        fill(180);
        ellipse(x, cy - 4, r - 2, r - 2);
        fill(240);
        ellipse(x, cy - 4, r - 8, r - 8);
        fill(100);
        noStroke();
        ellipse(x, cy - 4, 4, 4);
      }
      pop();
    }
    function cosineInterpolate(a, b, x) {
      let t = map(x, 0, 1, -HALF_PI, HALF_PI);
      t = map(sin(t), -1, 1, 0, 1);
      return lerp(a, b, t);
    }
    function getRedColor(nano) {
      if (400 <= nano && nano < 420) return cosineInterpolate(64, 84, map(nano, 400, 420, 0, 1));
      if (420 <= nano && nano < 510) return cosineInterpolate(84, 0, map(nano, 420, 510, 0, 1));
      if (510 <= nano && nano < 580) return cosineInterpolate(0, 255, map(nano, 510, 580, 0, 1));
      if (580 <= nano && nano < 700) return cosineInterpolate(255, 64, map(nano, 580, 700, 0, 1));
      return 64;
    }
    function getGreenColor(nano) {
      if (400 <= nano && nano < 440) return cosineInterpolate(64, 44, map(nano, 400, 440, 0, 1));
      if (440 <= nano && nano < 550) return cosineInterpolate(44, 192, map(nano, 440, 550, 0, 1));
      if (550 <= nano && nano < 640) return cosineInterpolate(192, 54, map(nano, 550, 640, 0, 1));
      if (640 <= nano && nano < 700) return cosineInterpolate(54, 64, map(nano, 640, 700, 0, 1));
      return 64;
    }
    function getBlueColor(nano) {
      if (400 <= nano && nano < 450) return cosineInterpolate(64, 212, map(nano, 400, 450, 0, 1));
      if (450 <= nano && nano < 550) return cosineInterpolate(212, 52, map(nano, 450, 550, 0, 1));
      if (550 <= nano && nano < 650) return cosineInterpolate(52, 64, map(nano, 550, 650, 0, 1));
      if (650 <= nano && nano < 700) return 64;
      return 64;
    }
    function getLightColor(nano) {
      return color(getRedColor(nano), getGreenColor(nano), getBlueColor(nano));
    }
    function draw2DArrow2(x, y, cx, cy, thick) {
      var lArrow = sqrt(cx * cx + cy * cy);
      var oxArrow = [0, lArrow - 2 * thick, lArrow - 2 * thick, lArrow, lArrow - 2 * thick, lArrow - 2 * thick, 0];
      var oyArrow = [thick, thick, 2 * thick, 0, -2 * thick, -thick, -thick];
      push();
      translate(x, y);
      rotate(atan2(cy, cx));
      beginShape();
      for (var i = 0; i < oxArrow.length; i++) vertex(max(oxArrow[i], 0), oyArrow[i]);
      endShape(CLOSE);
      pop();
    }

    // ========== 主模拟代码 ==========
    let language = 3;
    let labelA, rangeA, checkA, chalkA;
    let gunImage, ballImage;
    let genTime = 0;
    let gunX = 900, gunY = 200;
    let phase = 0;
    let ballVx = 0;
    let ballX1 = 450, ballX2 = 450, ballY = 200;
    let waves = [];
    let farMsg = ["球\n远离"];
    let stopMsg = ["静止"];
    let closeMsg = ["球\n靠近"];
    let speedT = 0;
    let wavelengthV2 = 0, wavelengthT2 = 0;
    let infoDisplay = true;

    function preload() {
      var imagePrefix = "images/";
      gunImage = loadImage(imagePrefix + "speedgun_speedgun.png");
      ballImage = loadImage(imagePrefix + "speedgun_ball.png");
    }

    function setup() {
      frameRate(60);
      let o = select("#myContainer");
      let a = 0.4;
      let w = int(min(o.width, (window.innerHeight - 160) / a));
      let h = int(w * a);
      myCanvas = createCanvas(w, h);
      myCanvas.parent("myContainer");
      myCanvas.id("myP5Canvas");
      labelA = select("#labelA");
      rangeA = select("#rangeA");
      rangeA.input(setup2);
      setup2();
      checkA = select("#checkA");
      chalkA = select("#chalkA");

      // 显示初始值
      updateRangeDisplay();
      rangeA.input(updateRangeDisplay);
    }

    function updateRangeDisplay() {
      document.getElementById('rangeValue').textContent = rangeA.value();
    }

    function windowResized() {
      let o = select("#myContainer");
      let a = 0.4;
      let w = int(min(o.width, (window.innerHeight - 160) / a));
      let h = int(w * a);
      resizeCanvas(w, h);
    }

    function setup2() {
      frameRate(rangeA.value());
    }

    function draw() {
      push();
      scale(width / 1000);
      background(211, 233, 255);
      textSize(26);
      textAlign(CENTER, BOTTOM);
      imageMode(CENTER);
      strokeWeight(1);
      stroke(0, 10);
      for (let i = 50; i < 1000; i += 50) line(i, 0, i, 400);
      for (let i = 50; i < 400; i += 50) line(0, i, 1000, i);
      strokeWeight(2);

      // 绘制小球
      image(ballImage, ballX1 - 20, ballY, 50, 50);

      let stdWaveVelo = 5;
      let stdBallVelo = 2;

      if (genTime > 0) if (waves.length <= 0) genTime = -20;

      var _chkRun = checkA.checked() && !select("#quizPauseCheck").checked();
      // 产生新波
      if (_chkRun) {
        genTime++;
        if (genTime > 0) if (genTime < 40) {
          phase += 0.6;
          waves.push({ ox: gunX, oy: gunY, x: gunX, y: gunY + 20 * sin(phase), v: -stdWaveVelo });
        }
      }

      let divide = 40;
      for (let n = 0; n < divide; n++) {
        // 更新小球位置
        if (_chkRun) {
          if (ballX2 < ballX1) { ballV = -stdBallVelo / divide; ballX1 = max(ballX1 - stdBallVelo / divide, ballX2); }
          if (ballX1 < ballX2) { ballV = stdBallVelo / divide; ballX1 = min(ballX1 + stdBallVelo / divide, ballX2); }
        }
        // 更新波的位置
        for (let i = 0; i < waves.length; i++) {
          if (_chkRun) waves[i].x += waves[i].v / divide;
          if (waves[i].x < ballX1) {
            waves[i].ox = ballX1;
            waves[i].x = ballX1 + (ballX1 - waves[i].x);
            waves[i].v = abs(waves[i].v);
          }
        }
      }

      // 绘制波
      noFill();
      let step = 1;
      for (let i = waves.length - 1; i >= step; i -= step) {
        stroke(getLightColor(550));
        if (abs(waves[i].x - waves[i - step].x) < stdWaveVelo) stroke(getLightColor(450));
        if (abs(waves[i].x - waves[i - step].x) > stdWaveVelo) stroke(getLightColor(650));
        if (waves[i].v * waves[i - step].v > 0)
          if (abs(waves[i].x - waves[i - step].x) < 20) {
            strokeWeight(2);
            line(waves[i].x, waves[i].y, waves[i - step].x, waves[i - step].y);
            strokeWeight(1);
            if ((waves[i].y - gunY) * (waves[i - step].y - gunY) < 0) {
              let r = abs(waves[i].x - waves[i].ox);
              stroke(128, map(r, 0, 1000, 64, 8));
              ellipse(waves[i].ox, waves[i].oy, 2 * r, 2 * r);
            }
          }
      }

      // 多普勒效应信息显示
      noStroke();
      textAlign(CENTER, BOTTOM);
      for (let i = 0; i < waves.length - 1; i++) {
        if (abs(waves[i].x - waves[i + 1].x) < 20)
          if (waves[i].v > 0)
            if (waves[i + 1].v > 0)
              if (waves[i + 1].x <= 900)
                if (900 <= waves[i].x) {
                  if (abs(waves[i].x - waves[i + 1].x) > stdWaveVelo) {
                    fill(getLightColor(650));
                    text(farMsg[language], 900, 150);
                  } else if (abs(waves[i].x - waves[i + 1].x) < stdWaveVelo) {
                    fill(getLightColor(450));
                    text(closeMsg[language], 900, 150);
                  } else {
                    fill(getLightColor(550));
                    text(stopMsg[language], 900, 150);
                  }
                }
      }

      // 移除超出范围的波
      for (let i = 0; i < waves.length; i++)
        if (!contain(waves[i].x, waves[i].y, 0, 0, 910, 1000)) { waves.splice(i, 1); }

      // 箭头指示
      fill(128, 64);
      noStroke();
      draw2DArrow2(ballX1, ballY, ballX2 - ballX1, 0, 4);

      // 测速雷达
      image(gunImage, gunX, gunY, 300, 300);

      // 提示文字
      if (infoDisplay) {
        fill(0);
        noStroke();
        textAlign(CENTER, CENTER);
        text("拖动小球移动", 450, 75);
      }
      pop();
      drawButtonDrag();
    }

    // ========== 鼠标/触摸拖拽 ==========
    var dragged = false;

    function touchStarted() {
      if (!contain(mouseX, mouseY, 0, 0, width, height)) return;
      if (touches.length > 1) return;
      dragged = true;
      infoDisplay = false;
      touchMoved();
      return false;
    }

    function touchMoved() {
      if (touches.length > 1) return;
      if (dragged) {
        ballX2 = mouseX * 1000 / width;
        ballX2 = constrain(ballX2, 100, 800);
        return false;
      }
    }

    function touchEnded() { dragged = false; }

    function mousePressed() { return touchStarted(); }
    function mouseDragged() { return touchMoved(); }
    function mouseReleased() { touchEnded(); }
  </script>

  <script>
  // ============================
  //  QUIZ CHALLENGE — 过关挑战
  // ============================
  var QUIZ_STORAGE_KEY = "quiz_radar_progress";
  var EXPERIMENT_KEY = "radar";

  var quizQuestions = [
    // ===== 第1关：多普勒效应基础 =====
    { q: "多普勒效应是指波源与观察者相对运动时，观察者接收到的____发生变化的现象。", opts: ["波速", "频率", "振幅", "波长"], ans: 1, explain: "多普勒效应：波源和观察者有相对运动时，观察者接收到的波频率会发生变化。波源靠近时频率升高，远离时频率降低。波速不变（由介质决定）。" },
    { q: "当波源朝向观察者运动时，观察者接收到的频率____。", opts: ["升高", "降低", "不变", "变为零"], ans: 0, explain: "波源朝向观察者运动时，波形被"压缩"，波长变短，观察者单位时间内接收到的波峰数量增多，因此接收频率升高。" },
    { q: "当波源远离观察者运动时，观察者接收到的频率____。", opts: ["升高", "降低", "不变", "变为零"], ans: 1, explain: "波源远离观察者运动时，波形被"拉伸"，波长变长，观察者单位时间内接收到的波峰数量减少，因此接收频率降低。" },
    { q: "以下哪种现象是多普勒效应的典型日常例子？", opts: ["汽车鸣笛驶过时音调变化", "回声定位", "光的折射", "声音的反射"], ans: 0, explain: "汽车鸣笛驶过时先靠近后远离→听到的音调先升高后降低，这就是典型的多普勒效应。回声定位和反射不是多普勒效应。" },
    { q: "多普勒效应适用于____。", opts: ["只有声波", "只有光波", "所有类型的波", "只有机械波"], ans: 2, explain: "多普勒效应适用于所有波动现象——声波、电磁波（包括光波、无线电波）等。雷达测速利用的就是电磁波的多普勒效应。" },
    // ===== 第2关：雷达测速原理 =====
    { q: "雷达测速仪发射的是____来测量速度。", opts: ["声波", "电磁波（无线电波）", "超声波", "激光"], ans: 1, explain: "雷达测速仪发射的是电磁波（微波），以光速传播。发出的波被运动目标反射后，根据反射波的频率变化计算目标速度。" },
    { q: "雷达测速中，电磁波从发射到接收经过了____次多普勒频移。", opts: ["1", "2", "3", "0"], ans: 1, explain: "电磁波先由雷达发射到运动的车辆（第1次频移），然后被车辆反射回雷达（第2次频移）。两次叠加后总频移变为单次的2倍。" },
    { q: "雷达测速的多普勒频移公式Δf=2v·f₀/c中，c代表____。", opts: ["车辆速度", "声速", "光速", "风速"], ans: 2, explain: "c是电磁波的传播速度，等于真空中的光速3×10⁸m/s。v是目标速度，f₀是雷达发射频率。" },
    { q: "雷达测速公式Δf=2v·f₀/c中系数2的出现是因为____。", opts: ["波速加倍", "电磁波经历了去程和回程两次多普勒效应", "地球自转", "温度影响"], ans: 1, explain: "系数2是因为雷达信号走了来回——发射到目标产生1次频移，反射回雷达又产生1次频移，总共2次多普勒频移。" },
    { q: "雷达测速公式中，当目标速度v增大时，频移Δf____。", opts: ["减小", "不变", "增大", "先增大后减小"], ans: 2, explain: "Δf=2v·f₀/c，频移与目标速度成正比。速度越大，频率变化越大，测量结果越明显。" },
    // ===== 第3关：综合应用 =====
    { q: "如果目标车辆朝雷达方向驶来，反射波的频率____发射波的频率。", opts: ["高于", "低于", "等于", "无法确定"], ans: 0, explain: "车辆朝雷达驶来→反射波被"压缩"→波长变短→频率升高。因此反射波频率高于发射波频率，Δf为正。" },
    { q: "如果目标车辆远离雷达方向驶去，反射波的频率____发射波的频率。", opts: ["高于", "低于", "等于", "无法确定"], ans: 1, explain: "车辆远离雷达→反射波被"拉伸"→波长变长→频率降低。因此反射波频率低于发射波频率，Δf为负。" },
    { q: "雷达测速中，如果车辆速度为零（静止），则反射波频率____发射波频率。", opts: ["高于", "低于", "等于", "加倍"], ans: 2, explain: "车辆静止时没有相对运动，不会产生多普勒效应。反射波频率等于发射波频率，Δf=0，测速仪不显示速度。" },
    { q: "雷达测速通常使用微波波段，这是因为____。", opts: ["微波传播速度特别快", "微波方向性好、传播距离远", "微波不受天气影响", "微波不反射"], ans: 1, explain: "微波（GHz量级）具有良好的方向性，可形成窄波束精确指向目标车辆，同时传播距离远、受大气衰减较小，非常适合交通测速。" },
    { q: "测速雷达发射频率f₀=24.125GHz，测得频移Δf=1.34kHz，目标速度约为____m/s（c=3×10⁸m/s）。", opts: ["8.3", "16.7", "33.3", "5.0"], ans: 0, explain: "由Δf=2v·f₀/c，得v=Δf·c/(2f₀)=1340×3×10⁸/(2×24.125×10⁹)=8.33m/s，约30km/h。这是典型的城市道路限速。" }
  ];

  var quizRound = 0;
  var quizIndex = 0;
  var quizAnswers = [];
  var quizLocked = false;
  var quizScores = [0, 0, 0];
  var quizHighestRound = 0;

  function initQuiz() {
    select("#btnChallenge").mouseClicked(startQuiz);
    select("#btnCloseQuiz").mouseClicked(closeQuiz);
    select("#btnResetQuiz").mouseClicked(resetQuiz);
    updateChallengeButton();
  }

  var _origSetupRD = setup;
  setup = function() {
    _origSetupRD();
    initQuiz();
  };

  function updateChallengeButton() {
    loadProgress().then(function(saved) {
      if (saved && (saved.scores[0] > 0 || saved.round > 0)) {
        var totalDone = saved.scores[0] + (saved.scores[1] || 0) + (saved.scores[2] || 0);
        select("#btnChallenge").html("继续挑战 (已得" + totalDone + "/15分)");
      } else {
        select("#btnChallenge").html("过关挑战");
      }
    });
  }

  function getUsername() {
    try { return localStorage.getItem("currentUser"); } catch(e) { return null; }
  }

  function saveProgress() {
    var data = { round: quizRound, scores: quizScores, highestRound: quizHighestRound, updatedAt: new Date().toISOString() };
    try { localStorage.setItem(QUIZ_STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
    var username = getUsername();
    if (username) saveQuizToServer(username, data);
  }

  function saveQuizToServer(username, data) {
    try {
      SB.getUser(username).then(function(users) {
        if (users && users.length > 0) {
          var user = users[0];
          var quizData = user.quiz_data;
          if (typeof quizData === "string") quizData = JSON.parse(quizData);
          if (!quizData || typeof quizData !== "object") quizData = {};
          quizData[EXPERIMENT_KEY] = data;
          SB.updateUser(username, { quiz_data: quizData }).catch(function(){});
        }
      }).catch(function(){});
    } catch(e) {}
  }

  async function loadProgress() {
    var username = getUsername();
    if (username) {
      try {
        var users = await SB.getUser(username);
        if (users && users.length > 0) {
          var user = users[0];
          var quizData = user.quiz_data;
          if (typeof quizData === "string") quizData = JSON.parse(quizData);
          if (quizData && quizData[EXPERIMENT_KEY]) {
            var serverData = quizData[EXPERIMENT_KEY];
            try { localStorage.setItem(QUIZ_STORAGE_KEY, JSON.stringify(serverData)); } catch(e) {}
            return serverData;
          }
        }
      } catch(e) {}
    }
    try {
      var raw = localStorage.getItem(QUIZ_STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    return null;
  }

  function clearProgress() {
    try { localStorage.removeItem(QUIZ_STORAGE_KEY); } catch(e) {}
    var username = getUsername();
    if (username) {
      try {
        SB.getUser(username).then(function(users) {
          if (users && users.length > 0) {
            var user = users[0];
            var quizData = user.quiz_data;
            if (typeof quizData === "string") quizData = JSON.parse(quizData);
            if (quizData && typeof quizData === "object") {
              delete quizData[EXPERIMENT_KEY];
              SB.updateUser(username, { quiz_data: quizData }).catch(function(){});
            }
          }
        }).catch(function(){});
      } catch(e) {}
    }
  }

  function startQuiz() {
    loadProgress().then(function(saved) {
      if (saved && saved.highestRound >= 0 && (saved.scores[0] > 0 || saved.round > 0)) {
        quizRound = Math.min(saved.round + 1, 2);
        quizScores = saved.scores.slice();
        quizHighestRound = saved.highestRound;
      } else {
        quizRound = 0; quizScores = [0,0,0]; quizHighestRound = 0;
      }
      select("#quizOverlay").style("display", "block");
      select("#quizPauseCheck").elt.checked = true;
      renderRound();
    });
  }

  function closeQuiz() {
    select("#quizOverlay").style("display", "none");
    select("#quizPauseCheck").elt.checked = false;
    updateChallengeButton();
  }

  function resetQuiz() {
    if (confirm("确定要重置所有挑战进度吗？当前进度将丢失。")) {
      quizRound = 0; quizScores = [0,0,0]; quizHighestRound = 0;
      clearProgress();
      renderRound();
    }
  }

  function renderRound() {
    quizIndex = 0; quizAnswers = []; quizLocked = false;
    select("#quizResult").style("display", "none");
    select("#quizBody").style("display", "block");
    select("#quizTitle").html("第 " + (quizRound + 1) + " 关 (题目 " + (quizRound * 5 + 1) + "-" + (quizRound * 5 + 5) + "/15)");
    select("#quizProgressFill").style("width", (quizRound * (100/3)) + "%");
    renderQuestion();
  }

  function renderQuestion() {
    var q = quizQuestions[quizRound * 5 + quizIndex];
    var html = '<div class="quiz-question">' + (quizIndex + 1) + ". " + q.q + "</div>";
    var labels = ["A", "B", "C", "D"];
    for (var i = 0; i < q.opts.length; i++) {
      html += '<button class="quiz-option" data-idx="' + i + '" ';
      if (quizLocked) html += 'disabled ';
      html += '>' + labels[i] + ". " + q.opts[i] + "</button>";
    }
    select("#quizBody").html(html);
    var opts = document.querySelectorAll("#quizBody .quiz-option");
    for (var j = 0; j < opts.length; j++) {
      (function(idx) {
        opts[j].addEventListener("click", function() { selectAnswer(idx); });
      })(j);
    }
  }

  function selectAnswer(idx) {
    if (quizLocked) return;
    quizLocked = true;
    quizAnswers.push(idx);
    var q = quizQuestions[quizRound * 5 + quizIndex];
    var correct = q.ans;
    var opts = document.querySelectorAll("#quizBody .quiz-option");
    for (var i = 0; i < opts.length; i++) {
      opts[i].disabled = true;
      if (i === correct) opts[i].classList.add("correct");
      if (i === idx && idx !== correct) opts[i].classList.add("wrong");
    }
    setTimeout(function() {
      quizIndex++;
      if (quizIndex < 5) { quizLocked = false; renderQuestion(); }
      else showRoundResult();
    }, 1200);
  }

  function getStars(score, total) {
    if (score === total) return "⭐⭐⭐";
    if (score >= total - 1) return "⭐⭐";
    if (score >= Math.ceil(total / 2)) return "⭐";
    return "";
  }

  function showRoundResult() {
    var correctCount = 0;
    for (var i = 0; i < 5; i++) {
      if (quizAnswers[i] === quizQuestions[quizRound * 5 + i].ans) correctCount++;
    }
    quizScores[quizRound] = correctCount;
    if (quizRound > quizHighestRound) quizHighestRound = quizRound;
    saveProgress();

    select("#quizBody").style("display", "none");
    select("#quizResult").style("display", "block");

    var stars = getStars(correctCount, 5);
    var scoreClass = correctCount >= 4 ? "great" : (correctCount >= 2 ? "good" : "poor");
    var comment = correctCount >= 4 ? "太棒了！" : (correctCount >= 2 ? "继续加油！" : "再看看实验吧！");

    var html = '<div class="quiz-score ' + scoreClass + '">' + correctCount + "/5</div>";
    if (stars) html += '<p style="font-size:20px;margin:4px 0;">' + stars + "</p>";
    html += '<p style="font-size:16px;margin:8px 0;color:#94a3b8;">' + comment + "</p>";

    if (quizRound < 2) {
      html += '<p style="font-size:13px;color:#64748b;margin-bottom:8px;">已完成第' + (quizRound + 1) + '关，进度已保存</p>';
      html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnReviewRound" style="font-size:14px;">&#128203; 查看回顾</button></div>';
      html += '<div class="quiz-btn-row">';
      html += '<button class="btn-primary" id="btnNextRound" style="font-size:14px;padding:8px 24px;">进入下一关</button>';
      html += '<button class="btn-reset" id="btnRetryRound" style="font-size:14px;">重新挑战本关</button>';
      html += "</div>";
    } else {
      var total = quizScores[0] + quizScores[1] + quizScores[2];
      var totalClass = total >= 12 ? "great" : (total >= 8 ? "good" : "poor");
      var totalStars = getStars(total, 15);
      html = '<div class="quiz-score ' + totalClass + '">' + total + '/15</div>';
      if (totalStars) html += '<p style="font-size:20px;margin:4px 0;">' + totalStars + '</p>';
      html += '<p style="font-size:14px;color:#94a3b8;margin-bottom:8px;">第1关: ' + quizScores[0] + '/5 &nbsp; 第2关: ' + quizScores[1] + '/5 &nbsp; 第3关: ' + quizScores[2] + '/5</p>';
      html += '<p style="font-size:16px;margin:8px 0;color:' + (total >= 12 ? '#22c55e' : total >= 8 ? '#f59e0b' : '#ef4444') + ';">' + (total >= 12 ? '恭喜通关！你对多普勒雷达测速原理理解透彻！' : total >= 8 ? '还不错，再复习一下错题吧！' : '建议回到实验观察波源和观察者相对运动时的波长变化。') + '</p>';
      html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnReviewRound" style="font-size:14px;">&#128203; 查看回顾</button></div>';
      html += '<div class="quiz-btn-row">';
      html += '<button class="btn-primary" id="btnRetryAll" style="font-size:14px;padding:8px 24px;">重新全部挑战</button>';
      html += '<button class="btn-reset" id="btnBackExp" style="font-size:14px;">返回实验</button>';
      html += '</div>';
    }
    select("#quizResult").html(html);
    bindResultButtons();
  }

  function bindResultButtons() {
    setTimeout(function() {
      var btnNext = document.getElementById("btnNextRound");
      var btnRetry = document.getElementById("btnRetryRound");
      var btnRetryAll = document.getElementById("btnRetryAll");
      var btnBack = document.getElementById("btnBackExp");
      var btnReview = document.getElementById("btnReviewRound");
      if (btnNext) btnNext.addEventListener("click", function() { quizRound++; renderRound(); });
      if (btnRetry) btnRetry.addEventListener("click", function() { renderRound(); });
      if (btnRetryAll) btnRetryAll.addEventListener("click", function() {
        quizRound = 0; quizScores = [0,0,0]; quizHighestRound = 0;
        clearProgress(); renderRound();
      });
      if (btnBack) btnBack.addEventListener("click", function() { closeQuiz(); });
      if (btnReview) btnReview.addEventListener("click", function() { showReview(); });
    }, 100);
  }

  function showReview() {
    var html = '<p style="font-size:16px;font-weight:bold;margin-bottom:16px;color:#e2e8f0;">第' + (quizRound + 1) + '关 — 答题回顾</p>';
    var wrongCount = 0;
    var labels = ["A", "B", "C", "D"];
    for (var i = 0; i < 5; i++) {
      var q = quizQuestions[quizRound * 5 + i];
      var userAns = quizAnswers[i];
      var isCorrect = userAns === q.ans;
      if (!isCorrect) wrongCount++;
      var cardClass = isCorrect ? "correct2" : "wrong";
      var badgeHtml = isCorrect ? '<span class="rbadge ok">✓ 正确</span>' : '<span class="rbadge fail">✗ 错误</span>';
      html += '<div class="review-card ' + cardClass + '">';
      html += '<div class="rq">' + badgeHtml + (i + 1) + ". " + q.q + "</div>";
      if (!isCorrect) {
        html += '<div class="review-user-ans">你的答案：' + labels[userAns] + ". " + q.opts[userAns] + "</div>";
        html += '<div class="review-correct-ans">正确答案：' + labels[q.ans] + ". " + q.opts[q.ans] + "</div>";
        html += '<div class="review-explain"><div class="rtitle">&#128161; 解析</div><div class="rtext">' + q.explain + "</div></div>";
      } else {
        html += '<div style="font-size:13px;color:#22c55e;margin-top:2px;">你的答案：' + labels[userAns] + ". " + q.opts[userAns] + " ✓</div>";
      }
      html += "</div>";
    }
    if (wrongCount === 0) {
      html += '<p style="text-align:center;color:#22c55e;font-size:15px;margin-top:12px;">&#127881; 全部正确！你对多普勒雷达测速原理掌握得很好！</p>';
    } else {
      html += '<p style="text-align:center;color:#f59e0b;font-size:14px;margin-top:12px;">共错 ' + wrongCount + ' 题，仔细阅读解析，理解后再继续！</p>';
    }
    html += '<div class="quiz-btn-row"><button class="btn-reset" id="btnBackResult" style="font-size:14px;">&#8592; 返回结果</button></div>';
    select("#quizBody").style("display", "none");
    select("#quizResult").style("display", "block");
    select("#quizResult").html(html);
    setTimeout(function() {
      var btnBack = document.getElementById("btnBackResult");
      if (btnBack) btnBack.addEventListener("click", function() { showRoundResultSkipSave(); });
    }, 100);
  }

  function showRoundResultSkipSave() {
    var correctCount = quizScores[quizRound];
    select("#quizBody").style("display", "none");
    select("#quizResult").style("display", "block");
    var stars = getStars(correctCount, 5);
    var scoreClass = correctCount >= 4 ? "great" : (correctCount >= 2 ? "good" : "poor");
    var comment = correctCount >= 4 ? "太棒了！" : (correctCount >= 2 ? "继续加油！" : "再看看实验吧！");
    var html = '<div class="quiz-score ' + scoreClass + '">' + correctCount + "/5</div>";
    if (stars) html += '<p style="font-size:20px;margin:4px 0;">' + stars + "</p>";
    html += '<p style="font-size:16px;margin:8px 0;color:#94a3b8;">' + comment + "</p>";
    if (quizRound < 2) {
      html += '<p style="font-size:13px;color:#64748b;margin-bottom:8px;">已完成第' + (quizRound + 1) + '关，进度已保存</p>';
      html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnReviewRound" style="font-size:14px;">&#128203; 查看回顾</button></div>';
      html += '<div class="quiz-btn-row">';
      html += '<button class="btn-primary" id="btnNextRound" style="font-size:14px;padding:8px 24px;">进入下一关</button>';
      html += '<button class="btn-reset" id="btnRetryRound" style="font-size:14px;">重新挑战本关</button>';
      html += "</div>";
    } else {
      var total = quizScores[0] + quizScores[1] + quizScores[2];
      var totalClass = total >= 12 ? "great" : (total >= 8 ? "good" : "poor");
      var totalStars = getStars(total, 15);
      html = '<div class="quiz-score ' + totalClass + '">' + total + '/15</div>';
      if (totalStars) html += '<p style="font-size:20px;margin:4px 0;">' + totalStars + '</p>';
      html += '<p style="font-size:14px;color:#94a3b8;margin-bottom:8px;">第1关: ' + quizScores[0] + '/5 &nbsp; 第2关: ' + quizScores[1] + '/5 &nbsp; 第3关: ' + quizScores[2] + '/5</p>';
      html += '<p style="font-size:16px;margin:8px 0;color:' + (total >= 12 ? '#22c55e' : total >= 8 ? '#f59e0b' : '#ef4444') + ';">' + (total >= 12 ? '恭喜通关！你对多普勒雷达测速原理理解透彻！' : total >= 8 ? '还不错，再复习一下错题吧！' : '建议回到实验观察波源和观察者相对运动时的波长变化。') + '</p>';
      html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnReviewRound" style="font-size:14px;">&#128203; 查看回顾</button></div>';
      html += '<div class="quiz-btn-row">';
      html += '<button class="btn-primary" id="btnRetryAll" style="font-size:14px;padding:8px 24px;">重新全部挑战</button>';
      html += '<button class="btn-reset" id="btnBackExp" style="font-size:14px;">返回实验</button>';
      html += '</div>';
    }
    select("#quizResult").html(html);
    bindResultButtons();
  }
  // ============================
  //  END QUIZ
  // ============================
  </script>
  <script>
    (function() {
      var header = document.querySelector('.header');
      var hideTimer = null;
      var HIDE_DELAY = 800;
      function show() { clearTimeout(hideTimer); header.classList.remove('hidden'); document.body.classList.remove('header-hidden'); }
      function hide() { hideTimer = setTimeout(function() { header.classList.add('hidden'); document.body.classList.add('header-hidden'); }, HIDE_DELAY); }
      document.addEventListener('mousemove', function(e) {
        if (e.clientY <= 60) show();
        else if (e.clientY > header.offsetHeight + 20 && !header.classList.contains('hidden')) hide();
      });
      header.addEventListener('mouseenter', show);
      header.addEventListener('mouseleave', hide);
      hideTimer = setTimeout(function() { header.classList.add('hidden'); document.body.classList.add('header-hidden'); }, 2000);
    })();
  </script>
