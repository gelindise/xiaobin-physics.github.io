<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>通电螺线管磁场 - 物理虚拟实验</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <script src="protect.js"></script>
  <style>
    :root {
      --primary: #3b82f6;
      --primary-dark: #1e40af;
      --bg-dark: #0b1120;
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --glass-border: rgba(148, 163, 184, 0.12);
      --card-bg: rgba(15, 23, 42, 0.6);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-dark);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }
    .particle-bg {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.06) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 50%, rgba(99,102,241,0.06) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }

    header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.6rem 2rem;
      background: rgba(11, 17, 32, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--glass-border);
    }
    header .logo { font-size: 1.1rem; font-weight: 700; }
    header .logo a { color: var(--text-main); text-decoration: none; }
    header nav a {
      color: var(--text-muted); text-decoration: none; font-size: 0.85rem;
      padding: 0.4rem 1rem; border-radius: 8px; transition: all 0.3s;
    }
    header nav a:hover { color: #fff; background: rgba(255,255,255,0.05); }

    .main-wrap {
      position: relative; z-index: 1;
      max-width: 1000px; margin: 1.5rem auto; padding: 0 1rem;
    }
    .main-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 1.5rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .main-card h2 {
      text-align: center; font-size: 1.3rem; margin-bottom: 1rem;
      background: linear-gradient(135deg, var(--primary), #818cf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #divFull {
      background: #0f172a;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    #myContainer {
      text-align: center;
      position: relative;
    }
    #myP5Canvas {
      display: block;
      margin: 0 auto;
      max-width: 100%;
      touch-action: pinch-zoom;
    }
    .flexContainer {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem;
      background: rgba(0,0,0,0.2);
    }
    .flexItem {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .flexContainer button {
      height: 36px;
      padding: 0 14px;
      font-size: 0.85rem;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .flexContainer button:hover {
      background: rgba(255,255,255,0.12);
    }
    .flexContainer input[type="checkbox"] {
      width: 18px; height: 18px;
      cursor: pointer;
      accent-color: var(--primary);
    }
    .flexContainer label {
      font-size: 0.85rem;
      cursor: pointer;
      user-select: none;
    }
    .flexContainer select {
      height: 36px;
      padding: 0 10px;
      font-size: 0.85rem;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      color: var(--text-main);
      cursor: pointer;
    }

    .fullscreen-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      cursor: pointer;
      transition: all 0.2s;
    }
    .fullscreen-btn:hover { background: rgba(255,255,255,0.12); }
    .fullscreen-btn svg { fill: var(--text-muted); width: 20px; height: 20px; }

    .info-section {
      margin-top: 1.5rem;
      padding: 1rem 1.2rem;
      background: rgba(0,0,0,0.15);
      border-radius: 12px;
      border: 1px solid var(--glass-border);
    }
    .info-section h3 {
      font-size: 1rem;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }
    .info-section p, .info-section li {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.7;
    }
    .info-section ul { padding-left: 1.2rem; }

    .formula-bar {
      text-align: center;
      padding: 1rem;
      margin-top: 1rem;
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      font-size: 0.9rem;
      color: var(--text-muted);
      border: 1px solid var(--glass-border);
    }

    @media (max-width: 640px) {
      header { padding: 0.5rem 1rem; }
      .main-wrap { margin: 0.8rem auto; }
      .main-card { padding: 0.8rem; border-radius: 14px; }
      .flexContainer { gap: 0.3rem; padding: 0.5rem; }
      .flexContainer button { font-size: 0.78rem; padding: 0 10px; height: 32px; }
    }

    /* p5.js radio button styling */
    .flexContainer input[type="radio"] {
      width: 16px; height: 16px;
      cursor: pointer;
      accent-color: var(--primary);
      margin: 0;
    }
    .flexContainer span label {
      font-size: 0.85rem;
      margin-right: 6px;
    }
  </style>
</head>
<body>
  <div class="particle-bg"></div>

  <header>
    <div class="logo"><a href="index.html">⚛ 物理虚拟实验</a></div>
    <nav>
      <a href="experiments.html">实验列表</a>

  <div class="main-wrap">
    <div class="main-card">
      <h2>通电螺线管的磁场</h2>

      <div id="divFull">
        <div id="myContainer"></div>
        <div class="flexContainer">
          <div class="flexItem"><button id="buttonA"></button></div>
          <div class="flexItem"><button id="buttonB"></button></div>
          <div class="flexItem"><span id="radioA"></span></div>
          <div class="flexItem"><input type="checkbox" id="checkA" unchecked><label id="chalkA" for="checkA"></label></div>
          <div class="flexItem"><input type="checkbox" id="checkB" unchecked><label id="chalkB" for="checkB"></label></div>
          <div class="flexItem">
            <span onclick="doFullScreen()" class="fullscreen-btn" title="全屏">
              <svg viewBox="0 0 520 520"><g transform="translate(-2598 -260)"><rect x="2650" y="312" width="156" height="52"/><rect x="2650" y="364" width="52" height="78"/><rect x="0" y="0" width="156" height="52" transform="matrix(-1 0 0 1 3066 312)"/><rect x="0" y="0" width="52" height="78" transform="matrix(-1 0 0 1 3066 364)"/><rect x="0" y="0" width="156" height="52" transform="matrix(1 0 0 -1 2650 623)"/><rect x="0" y="0" width="52" height="78" transform="matrix(1 0 0 -1 2650 571)"/><rect x="2910" y="571" width="156" height="52"/><rect x="3014" y="493" width="52" height="78"/><rect x="2650" y="675" width="104" height="52"/><rect x="2806" y="675" width="104" height="52"/><rect x="2962" y="675" width="104" height="52"/></g></svg>
            </span>
          </div>
          <div class="flexItem">
            <span onclick="doFullScreen2()" class="fullscreen-btn" title="仅Canvas全屏">
              <svg viewBox="0 0 520 520"><g transform="translate(-3378 -260)"><rect x="3430" y="338" width="156" height="52"/><rect x="3430" y="390" width="52" height="103"/><rect x="0" y="0" width="156" height="52" transform="matrix(-1 0 0 1 3846 338)"/><rect x="0" y="0" width="52" height="103" transform="matrix(-1 0 0 1 3846 390)"/><rect x="0" y="0" width="156" height="52" transform="matrix(1 0 0 -1 3430 706)"/><rect x="0" y="0" width="52" height="104" transform="matrix(1 0 0 -1 3430 654)"/><rect x="3690" y="649" width="156" height="52"/><rect x="3794" y="545" width="52" height="104"/></g></svg>
            </span>
          </div>
        </div>
      </div>

      <div class="info-section">
        <h3>实验说明</h3>
        <ul>
          <li>点击<b>「电流方向切换」</b>改变螺线管中电流的方向</li>
          <li>点击<b>「线圈方向切换」</b>改变线圈的缠绕方向</li>
          <li>勾选<b>「右手定则」</b>显示右手定则示意图</li>
          <li>勾选<b>「电流」</b>显示电流方向标记</li>
          <li>选择<b>「指南针 / 箭头」</b>切换磁场显示方式</li>
          <li><b>拖动</b>螺线管可移动其位置，观察不同位置的磁场分布</li>
        </ul>
      </div>

      <div class="formula-bar">
        <b>安培定则（右手螺旋定则）</b>：用右手握住螺线管，四指指向电流方向，拇指所指即为螺线管内部磁场方向（N极方向）。
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/addons/p5.dom.min.js"></script>
  <script>
    /* ===== Javalab utility functions ===== */
    function fullscreenchanged() {}
    function doFullScreen() {
      fullscreenchanged();
      var el = document.getElementById("divFull");
      if(el.requestFullscreen) el.requestFullscreen();
      else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if(el.mozRequestFullScreen) el.mozRequestFullScreen();
      el.addEventListener("fullscreenchange", fullscreenchanged);
      el.addEventListener("webkitfullscreenchange", fullscreenchanged);
      el.addEventListener("mozfullscreenchange", fullscreenchanged);
    }
    function doFullScreen2() {
      fullscreenchanged();
      var el = document.getElementById("myP5Canvas");
      if(el.requestFullscreen) el.requestFullscreen();
      else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if(el.mozRequestFullScreen) el.mozRequestFullScreen();
      el.addEventListener("fullscreenchange", fullscreenchanged);
      el.addEventListener("webkitfullscreenchange", fullscreenchanged);
      el.addEventListener("mozfullscreenchange", fullscreenchanged);
    }
    function mod(x, y) {
      if(x < 0) x += y * (Math.ceil(Math.abs(x)/y) + 1);
      return x - y * Math.floor(x / y);
    }
    function contain(x, y, x1, y1, w1, h1) {
      if(x < x1) return false;
      if(x > (x1 + w1)) return false;
      if(y < y1) return false;
      if(y > (y1 + h1)) return false;
      return true;
    }
    function diffAngle(t1, t2) {
      var tt1 = mod(t1, TWO_PI);
      var tt2 = mod(t2, TWO_PI);
      if(Math.abs(tt1 - tt2) > PI) {
        if(tt1 < tt2) tt1 += TWO_PI;
        else if(tt1 > tt2) tt2 += TWO_PI;
      }
      return tt2 - tt1;
    }
    function drawArrow_head(x, y, cx, cy, head) {
      line(x, y, x + cx, y + cy);
      var leng = Math.sqrt(cx*cx + cy*cy);
      var bolt = Math.min(leng/2.0, head);
      var x1 = 0.921 * cx*bolt/leng - 0.389 * cy*bolt/leng;
      var y1 = 0.389 * cx*bolt/leng + 0.921 * cy*bolt/leng;
      var x2 = 0.921 * cx*bolt/leng + 0.389 * cy*bolt/leng;
      var y2 = -0.389 * cx*bolt/leng + 0.921 * cy*bolt/leng;
      beginShape();
      vertex(x + cx - x1, y + cy - y1);
      vertex(x + cx, y + cy);
      vertex(x + cx - x2, y + cy - y2);
      endShape();
    }
    function draw2DArrow2(x, y, cx, cy, thick) {
      var lArrow = Math.sqrt(cx * cx + cy * cy);
      var oxArrow = [0, lArrow - 2*thick, lArrow - 2*thick, lArrow, lArrow - 2*thick, lArrow - 2*thick, 0];
      var oyArrow = [thick, thick, 2*thick, 0, -2*thick, -thick, -thick];
      push();
      translate(x, y);
      rotate(Math.atan2(cy, cx));
      beginShape();
      for(var i = 0; i < oxArrow.length; i++) {
        vertex(Math.max(oxArrow[i], 0), oyArrow[i]);
      }
      endShape(CLOSE);
      pop();
    }
    function drawButtonDrag() {
      if(mouseIsPressed && contain(mouseX, mouseY, 0, 0, width, height)) notClicked = false;
      if(millis() > 10000) notClicked = false;
      if(notClicked) {
        var dia = 100;
        push();
        translate(width/2, height/2);
        noStroke();
        fill(128, 128);
        ellipse(0, 0, dia, dia);
        noFill();
        stroke(255);
        strokeWeight(dia*0.04);
        push();
        translate(0, 0);
        line(-dia*0.2, dia*0.3, -dia*0.35, dia*0.1);
        arc(-dia*0.3, dia*0.05, dia*0.1414, dia*0.1414, QUARTER_PI*3, QUARTER_PI*7);
        line(-dia*0.25, 0, -dia*0.15, dia*0.1);
        line(-dia*0.15, dia*0.1, -dia*0.15, -dia*0.25);
        arc(-dia*0.075, -dia*0.25, dia*0.15, dia*0.15, PI, TWO_PI);
        line(0, -dia*0.25, 0, 0);
        arc(dia*0.06, -dia*0.1, dia*0.12, dia*0.12, HALF_PI*3, TWO_PI);
        line(dia*0.12, -dia*0.1, dia*0.12, dia*0.025);
        arc(dia*0.18, -dia*0.05, dia*0.12, dia*0.12, HALF_PI*3, TWO_PI);
        line(dia*0.24, -dia*0.05, dia*0.24, dia*0.05);
        arc(dia*0.29, 0, dia*0.1, dia*0.1, HALF_PI*3, TWO_PI);
        line(dia*0.34, 0, dia*0.34, dia*0.075);
        line(dia*0.34, dia*0.075, dia*0.31, dia*0.3);
        pop();
        pop();
      }
    }

    /* ===== Simulation variables ===== */
    var language = 3; // 0=Korean, 1=Japanese, 2=English, 3=Chinese
    var buttonA, buttonB, radioA, checkA, chalkA, checkB, chalkB;
    var battImage;
    var img_coil = [];
    var img_hand = [];
    var xMagnet = 500, yMagnet = 250;
    var wMagnet = 300, hMagnet = 40;
    var maxCompass1 = 15, maxCompass2 = 9;
    var xCompass = [], yCompass = [], oCompass = [], aCompass = [], tCompass = [];
    var timeBatteryChange = 0;
    var currDir = 0, coilDir = 0, pathIndex = 0;
    var pathNode = [[], []];
    var pathNodeLength = [];
    var pathNodes = [22, 22];
    var pathX1 = [
      [50,90,83,75,70,65,43,35,30,25,3,-5,-10,-15,-37,-45,-50,-55,-77,-85,-90,-90],
      [50,90,90,85,63,55,50,45,23,15,10,5,-17,-25,-30,-35,-57,-65,-70,-75,-90,-90]
    ];
    var pathY1 = [
      [100,100,-28,-28,0,28,-28,-28,0,28,-28,-28,0,28,-28,-28,0,28,-28,-28,0,100],
      [100,100,0,-28,28,28,0,-28,28,28,0,-28,28,28,0,-28,28,28,0,-28,28,100]
    ];
    var pathX2 = [
      [90,90,75,70,65,57,35,30,25,17,-5,-10,-15,-23,-45,-50,-55,-63,-85,-90,-90,-50],
      [90,90,85,77,55,50,45,37,15,10,5,-3,-25,-30,-35,-43,-65,-70,-75,-83,-90,-50]
    ];
    var pathY2 = [
      [100,28,-28,0,28,28,-28,0,28,28,-28,0,28,28,-28,0,28,28,-28,0,100,100],
      [100,0,-28,-28,28,0,-28,-28,28,0,-28,-28,28,0,-28,-28,28,0,-28,-28,100,100]
    ];
    var path1 = [[], [], [], []];
    var path2 = [[], [], [], []];
    var dragged = false, offsetX, offsetY;
    var notClicked = true;

    function preload() {
      battImage = loadImage("electromagnetic_batt.png");
      img_coil[0] = loadImage("magnetic_field_around_a_coil_coil_0.png");
      img_coil[1] = loadImage("magnetic_field_around_a_coil_coil_1.png");
      img_hand[0] = loadImage("magnetic_field_around_a_coil_hand_0.png");
      img_hand[1] = loadImage("magnetic_field_around_a_coil_hand_1.png");
    }

    function setup() {
      frameRate(20);
      var o = select("#myContainer");
      var a = 0.5;
      var w = int(min(o.width, (window.innerHeight - 160) / a));
      var h = int(w * a);
      myCanvas = createCanvas(w, h);
      myCanvas.parent("myContainer");
      myCanvas.id("myP5Canvas");

      buttonA = select("#buttonA");
      buttonA.mouseClicked(doButtonA);
      buttonA.html("电流方向切换");

      buttonB = select("#buttonB");
      buttonB.mouseClicked(doButtonB);
      buttonB.html("线圈方向切换");

      radioA = createRadio("radioA");
      radioA.option("指南针 ", "compass");
      radioA.option("箭头 ", "arrow");
      radioA.parent("radioA");
      radioA.value("compass");

      checkA = select("#checkA");
      chalkA = select("#chalkA");
      chalkA.html("右手定则");

      checkB = select("#checkB");
      chalkB = select("#chalkB");
      chalkB.html("电流");

      // Initialize compass arrays
      for(var i = 0; i < maxCompass1; i++) {
        xCompass[i] = []; yCompass[i] = []; oCompass[i] = []; aCompass[i] = []; tCompass[i] = [];
        for(var j = 0; j < maxCompass2; j++) {
          xCompass[i][j] = i * 70;
          yCompass[i][j] = j * 62;
          if(j % 2 === 0) xCompass[i][j] += 35;
          oCompass[i][j] = 0;
          aCompass[i][j] = 0;
          tCompass[i][j] = random(TWO_PI);
        }
      }

      // Build path data
      for(var i = 0; i < pathNodes.length; i++) {
        for(var j = 0; j < pathX1[i].length; j++) {
          path1[i][j] = (j === 0) ? 0 : path2[i][j-1];
          path2[i][j] = path1[i][j] + dist(pathX1[i][j], pathY1[i][j], pathX2[i][j], pathY2[i][j]);
        }
        pathNodeLength[i] = path2[i][pathX1[i].length - 1];
        pathNodes[i] = round(pathNodeLength[i] / 24);
        for(var j = 0; j < pathNodes[i]; j++) {
          pathNode[i][j] = map(j, 0, pathNodes[i], 0, pathNodeLength[i]);
        }
      }
      doPathIndex();
      setup2();
    }

    function windowResized() {
      var o = select("#myContainer");
      var a = 0.5;
      var w = int(min(o.width, (window.innerHeight - 160) / a));
      var h = int(w * a);
      resizeCanvas(w, h);
    }

    function doPathIndex() { pathIndex = coilDir; }

    function doButtonA() { currDir = mod(currDir + 1, 2); }

    function doButtonB() { coilDir = mod(coilDir + 1, 2); doPathIndex(); }

    function setup2() {
      for(var i = 0; i < maxCompass1; i++) {
        for(var j = 0; j < maxCompass2; j++) {
          if(timeBatteryChange === 0 || timeBatteryChange === 10) {
            oCompass[i][j] = -calcMagneticFieldCoil(
              xMagnet - wMagnet * 0.4, yMagnet - hMagnet / 2,
              xMagnet + wMagnet * 0.4, yMagnet + hMagnet / 2,
              xCompass[i][j], yCompass[i][j], 20
            );
            if((currDir + coilDir) !== 1) oCompass[i][j] += PI;
          } else {
            oCompass[i][j] = 0;
          }
        }
      }
    }

    function draw() {
      if(touches.length > 1) return;
      background('#0f172a');
      strokeWeight(1);
      textSize(20);
      imageMode(CENTER);
      strokeCap(SQUARE);
      push();
      scale(width / 1000);

      // Battery animation
      timeBatteryChange += (currDir === 0) ? -1 : 1;
      timeBatteryChange = constrain(timeBatteryChange, 0, 10);
      setup2();

      // Right hand rule image
      var handSpace = false;
      if(checkA.checked()) {
        if(timeBatteryChange === 0 || timeBatteryChange === 10) {
          if((currDir + coilDir) !== 1) {
            handSpace = true;
            image(img_hand[0], xMagnet, yMagnet + 44, 400, 400);
          }
        }
      }

      // Draw compasses or arrows
      for(var i = 0; i < maxCompass1; i++) {
        for(var j = 0; j < maxCompass2; j++) {
          var d = diffAngle(tCompass[i][j], oCompass[i][j]) / 8.0;
          if(Math.abs(d) > 0.01) aCompass[i][j] += d;
          aCompass[i][j] *= 0.8;
          tCompass[i][j] += aCompass[i][j];

          if(!contain(xCompass[i][j], yCompass[i][j],
            xMagnet - 130, yMagnet - (handSpace ? 100 : 50),
            260, (handSpace ? 150 : 100))) {
            if(radioA.value() === "compass") drawCompass(xCompass[i][j], yCompass[i][j], tCompass[i][j]);
            else drawCompassArrow(xCompass[i][j], yCompass[i][j], tCompass[i][j]);
          }
        }
      }

      // Draw coil image
      if(coilDir !== 1) image(img_coil[0], xMagnet, yMagnet, 1000, 500);
      else image(img_coil[1], xMagnet, yMagnet, 1000, 500);

      // Draw battery with rotation
      push();
      translate(xMagnet, yMagnet + 100);
      noStroke();
      rotate(map(timeBatteryChange, 0, 10, HALF_PI, -HALF_PI));
      image(battImage, 0, 0, 1000, 500);
      pop();

      // Draw current path markers (protons)
      if(checkB.checked()) {
        var accel = 0;
        if(timeBatteryChange === 0 || timeBatteryChange === 10) accel = (currDir === 0) ? 1 : -1;
        if(accel !== 0) {
          for(var j = 0; j < pathNodes[pathIndex]; j++) {
            pathNode[pathIndex][j] += accel;
            if(pathNode[pathIndex][j] > pathNodeLength[pathIndex]) pathNode[pathIndex][j] -= pathNodeLength[pathIndex];
            if(pathNode[pathIndex][j] < 0) pathNode[pathIndex][j] += pathNodeLength[pathIndex];
          }
          rectMode(CENTER);
          noStroke();
          for(var j = 0; j < pathNodes[pathIndex]; j++) {
            for(var k = 0; k < pathX1[pathIndex].length; k++) {
              if(path1[pathIndex][k] <= pathNode[pathIndex][j] && pathNode[pathIndex][j] <= path2[pathIndex][k]) {
                var x = map(pathNode[pathIndex][j], path1[pathIndex][k], path2[pathIndex][k],
                  pathX1[pathIndex][k], pathX2[pathIndex][k]);
                var y = map(pathNode[pathIndex][j], path1[pathIndex][k], path2[pathIndex][k],
                  pathY1[pathIndex][k], pathY2[pathIndex][k]);
                var t = atan2(pathY2[pathIndex][k] - pathY1[pathIndex][k],
                  pathX2[pathIndex][k] - pathX1[pathIndex][k]);
                if(accel < 0) t += PI;
                drawProton(xMagnet + x, yMagnet + y, t);
              }
            }
          }
        }
      }

      // Second hand rule image
      if(checkA.checked()) {
        if(timeBatteryChange === 0 || timeBatteryChange === 10) {
          if((currDir + coilDir) === 1) {
            image(img_hand[1], xMagnet, yMagnet + 44, 400, 400);
          }
        }
      }
      pop();
      drawButtonDrag();
    }

    function drawProton(x, y, t) {
      var cx = 8 * cos(t);
      var cy = 8 * sin(t);
      noStroke();
      fill(255, 0, 0, 191);
      draw2DArrow2(x - cx, y - cy, 2 * cx, 2 * cy, 3);
    }

    function drawCompass(x, y, theta) {
      fill(80);
      stroke(100);
      ellipse(x, y + 3, 60, 60);
      fill(180);
      stroke(120);
      ellipse(x, y, 60, 60);
      push();
      translate(x, y);
      rotate(theta);
      noStroke();
      fill(120);
      beginShape();
      vertex(-25, 0); vertex(0, -5); vertex(25, 0); vertex(0, 5);
      endShape(CLOSE);
      noStroke();
      fill(255, 0, 0);
      beginShape();
      vertex(5, 4); vertex(25, 0); vertex(5, -4);
      endShape(CLOSE);
      pop();
    }

    function drawCompassArrow(x, y, theta) {
      noFill();
      stroke(0, 200, 0);
      strokeWeight(3);
      drawArrow_head(x + 20 * cos(theta + PI), y + 20 * sin(theta + PI),
        40 * cos(theta), 40 * sin(theta), 20);
      strokeWeight(1);
    }

    function calcMagneticFieldCoil(xMin, yMin, xMax, yMax, xNeedle, yNeedle, numSpot) {
      var vecX = 0, vecY = 0;
      for(var i = 0; i < numSpot; i++) {
        for(var j = 0; j < 2; j++) {
          var cx = map(i, 0, numSpot, xMin, xMax);
          var cy = (j === 0) ? yMin : yMax;
          var len = dist(xNeedle, yNeedle, cx, cy);
          var vecXX = (xNeedle - cx) / Math.pow(len, 3);
          var vecYY = (yNeedle - cy) / Math.pow(len, 3);
          vecX += vecYY * ((j !== 0) ? 1 : -1) * 1000;
          vecY += vecXX * ((j !== 0) ? 1 : -1) * 1000;
        }
      }
      return atan2(vecY, vecX);
    }

    /* ===== Drag handlers ===== */
    function touchStarted() {
      if(!contain(mouseX, mouseY, 0, 0, width, height)) return;
      if(touches.length > 1) return;
      dragged = true;
      offsetX = mouseX * 1000 / width - xMagnet;
      offsetY = mouseY * 1000 / width - yMagnet;
    }
    function touchMoved() {
      if(touches.length > 1) return;
      if(dragged) {
        xMagnet = mouseX * 1000 / width - offsetX;
        yMagnet = mouseY * 1000 / width - offsetY;
        return false;
      }
    }
    function touchEnded() { dragged = false; }

    /* mouse event forwarding for desktop */
    function mousePressed() { return touchStarted(); }
    function mouseDragged() { return touchMoved(); }
    function mouseReleased() { touchEnded(); }
  </script>
</body>
