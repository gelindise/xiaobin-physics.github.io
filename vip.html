<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>开通VIP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="logo">物理虚拟实验</div>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="experiments.html">实验列表</a>
      <a href="vip.html">开通VIP</a>
    </nav>
  </header>

  <div class="section">
    <h2>VIP会员套餐</h2>
    <div class="vip-cards">
      <div class="vip-card">
        <h3>月度VIP</h3>
        <p class="price">¥10</p>
        <p>有效期30天</p>
        <button class="btn" onclick="buyVip('月度VIP')">立即购买</button>
      </div>
      <div class="vip-card">
        <h3>年度VIP</h3>
        <p class="price">¥50</p>
        <p>有效期365天</p>
        <button class="btn" onclick="buyVip('年度VIP')">立即购买</button>
      </div>
      <div class="vip-card">
        <h3>终身VIP</h3>
        <p class="price">¥98</p>
        <p>永久有效</p>
        <button class="btn" onclick="buyVip('终身VIP')">立即购买</button>
      </div>
    </div>
  </div>

  <div class="pay-info" id="payInfo">
    <h3>购买方式（人工开通）</h3>
    <p>请转账到微信：<strong>Your-WeChat</strong></p>
    <p>转账备注：<span id="orderRemark"></span></p>
    <p>转账后，联系管理员开通VIP</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
