<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 物理虚拟实验</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: cardIn 0.5s ease-out;
      position: relative;
      overflow: hidden;
    }
    .auth-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
      pointer-events: none;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
      position: relative;
    }
    .auth-header .icon-wrap {
      width: 64px;
      height: 64px;
      margin: 0 auto 1rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
    }
    .auth-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .auth-header p {
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .input-group {
      position: relative;
      margin-bottom: 1rem;
    }
    .input-group .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      opacity: 0.5;
      pointer-events: none;
    }
    .input-group input {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.6rem;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--text-main);
      font-size: 0.9rem;
      transition: all 0.3s ease;
      outline: none;
    }
    .input-group input::placeholder {
      color: rgba(148, 163, 184, 0.4);
    }
    .input-group input:focus {
      border-color: var(--primary);
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    .input-group input.error {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
    }
    .auth-btn {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
      margin-top: 0.5rem;
    }
    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
    }
    .auth-btn:active {
      transform: translateY(0);
    }
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .auth-footer a {
      color: var(--secondary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }
    .auth-footer a:hover {
      color: var(--primary);
    }
    .auth-tip {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.85rem;
      min-height: 1.5rem;
    }
    .auth-tip.success { color: #4ade80; }
    .auth-tip.error { color: #ef4444; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="icon-wrap">🔑</div>
        <h2>欢迎回来</h2>
        <p>登录以继续你的物理探索之旅</p>
      </div>

      <div class="input-group">
        <span class="input-icon">👤</span>
        <input type="text" id="loginUser" placeholder="用户名" autocomplete="username" required>
      </div>

      <div class="input-group">
        <span class="input-icon">🔒</span>
        <input type="password" id="loginPwd" placeholder="登录密码" autocomplete="current-password" required>
      </div>

      <button class="auth-btn" onclick="userLogin()">立即登录</button>

      <div class="auth-tip" id="loginTip"></div>

      <script>
        (function() {
          var params = new URLSearchParams(window.location.search);
          if (params.get('reason') === 'kicked') {
            document.getElementById('loginTip').className = 'auth-tip error';
            document.getElementById('loginTip').textContent = '⚠️ 您的账号已在其他设备登录，当前设备已下线。';
          }
        })();
      </script>

      <div class="auth-footer">
        还没有账号？<a href="register.html">立即注册</a>
      </div>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script src="script.js"></script>
  <script>
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') userLogin();
    });
  </script>
</body>
</html>
