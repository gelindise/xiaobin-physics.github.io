<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>物理虚拟实验 - 直流电路（PhET仿真）</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
      background: #000;
    }
    /* 覆盖共享样式：将 sticky 改为 fixed，使导航栏可隐藏 */
    .header {
      position: fixed !important;
      top: 0;
      left: 0;
      right: 0;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }
    .header.hidden {
      transform: translateY(-100%);
    }
    /* 顶部隐形触发区：鼠标移到顶部 40px 区域内显示导航栏 */
    .header-trigger {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 40px;
      z-index: 101;
    }
    .sim-container {
      position: fixed;
      top: 56px;
      left: 0;
      right: 0;
      bottom: 0;
      transition: top 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .sim-container.expanded {
      top: 0;
    }
    .sim-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    @media (max-width: 768px) {
      .sim-container { top: 52px; }
    }
  </style>
  <script src="protect.js"></script>
  <script src="auth-check.js"></script>
</head>
<body>
  <header class="header">
    <div class="logo">物理虚拟实验平台</div>
    <nav class="nav">
      <a href="experiments.html">实验目录</a>
      <a href="index.html">首页</a>
      <a href="vip.html">开通VIP</a>
    </nav>
  </header>
  <div class="sim-container">
    <iframe src="https://phet.colorado.edu/sims/html/circuit-construction-kit-dc/latest/circuit-construction-kit-dc_all.html?locale=zh_CN"
      allowfullscreen
      allow="fullscreen; accelerometer; autoplay; camera; encrypted-media; gyroscope; microphone; geolocation; xr-spatial-tracking">
    </iframe>
  </div>
  <script src="supabase.js"></script>
  <script src="script.js"></script>
  <script>
    (function() {
      var header = document.querySelector('.header');
      var container = document.querySelector('.sim-container');
      var hideTimer = null;
      var HIDE_DELAY = 800; // 鼠标离开导航栏后延迟隐藏(ms)

      function showHeader() {
        clearTimeout(hideTimer);
        header.classList.remove('hidden');
        container.classList.remove('expanded');
      }

      function hideHeader() {
        hideTimer = setTimeout(function() {
          header.classList.add('hidden');
          container.classList.add('expanded');
        }, HIDE_DELAY);
      }

      // 鼠标移到页面顶部 60px 以内 → 显示导航栏
      document.addEventListener('mousemove', function(e) {
        if (e.clientY <= 60) {
          showHeader();
        } else if (e.clientY > header.offsetHeight + 20 && !header.classList.contains('hidden')) {
          hideHeader();
        }
      });

      // 鼠标直接进入导航栏 → 保持显示
      header.addEventListener('mouseenter', function() {
        showHeader();
      });

      // 鼠标离开导航栏 → 延迟隐藏
      header.addEventListener('mouseleave', function() {
        hideHeader();
      });

      // 初始状态：几秒后自动隐藏
      hideTimer = setTimeout(function() {
        header.classList.add('hidden');
        container.classList.add('expanded');
      }, 2000);
    })();
  </script>
</body>
</html>
