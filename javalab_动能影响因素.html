<body>
  <header class="header">
    <div class="logo">物理虚拟实验</div>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="experiments.html">实验列表</a>
    </nav>
  </header>

  <div class="section">
    <h2>探究动能大小的影响因素</h2>
    <p style="color:#94a3b8;margin:0 0 16px 0;">小车从斜坡滑下撞击木块。改变质量和高度，观察动能如何影响木块滑行距离。</p>
  </div>

  <div class="main-card">
    <div class="canvas-wrap">
      <div id="myContainer"></div>
    </div>
    <div class="controls-bar">
      <div class="ctrl-col">
        <label id="labelA">小车质量 5 kg</label>
        <input type="range" id="rangeA" min="1" max="10" value="5">
      </div>
      <div class="ctrl-col">
        <label id="labelC">下滑高度 3 m</label>
        <input type="range" id="rangeC" min="1" max="8" value="3">
      </div>
      <div class="ctrl-col">
        <label id="labelB">木块阻力 10 N</label>
        <input type="range" id="rangeB" min="5" max="50" value="10">
      </div>
      <div class="ctrl-col">
        <input type="checkbox" id="checkA" unchecked />
        <label for="checkA">开始实验</label>
      </div>
      <div class="ctrl-col">
        <input type="checkbox" id="checkPause" unchecked />
        <label for="checkPause">暂停</label>
      </div>
      <button class="btn" id="buttonRst">重置</button>
      <span class="hint-text">高度和质量越大，动能越大，木块滑得越远</span>
    </div>
  </div>

  <div class="formula-bar">
    <div class="formula-item">
      <span class="label">势能 → 动能</span>
      <span class="value">Ep = mgh → Ek = ½mv² &nbsp;—&nbsp; 忽略斜坡摩擦时 mgh = ½mv²</span>
    </div>
    <div class="formula-item">
      <span class="label">动能影响因素</span>
      <span class="value">质量 m ↑ → Ek ↑ &nbsp;|&nbsp; 速度 v ↑ → Ek ↑（v²关系）</span>
    </div>
    <div class="formula-item">
      <span class="label">木块滑行距离</span>
      <span class="value">Ek = F<sub>阻</sub> × s &nbsp;→&nbsp; s = mgh / F<sub>阻</sub></span>
    </div>
  </div>

  <div style="max-width:900px;margin:0 auto 24px;padding:0 16px;text-align:center;">
    <button class="btn" id="btnChallenge" style="font-size:16px;padding:10px 32px;border-color:#8b5cf6;color:#c4b5fd;">
      过关挑战
    </button>
    <p style="color:#64748b;font-size:12px;margin-top:8px;">15道单选题 · 每次5道 · 检验你对动能影响因素的掌握程度</p>
  </div>

  <script src="protect.js"></script>
  <script src="supabase.js"></script>
  <script>
  function contain(x, y, x1, y1, w1, h1) {
    return !(x < x1 || x > (x1 + w1) || y < y1 || y > (y1 + h1));
  }

  // ---- state ----
  var labelA, rangeA, labelB, rangeB, labelC, rangeC, checkA, buttonRst, checkPause;
  var paused = false;
  var rangeAValue = 5, rangeBValue = 10, rangeCValue = 3;

  // Geometry (in internal 900x450 coordinate space, 50px = 1m)
  var slopeStartX = 100, slopeEndX = 350;
  var slopeStartY, slopeEndY = 380;
  var collisionX = 480;
  var cartX, cartY, cartV;
  var blockX;
  var trackMaxX = 900;
  var trackY = [];
  var running = false;
  var finished = false;
  var traceMax = 300;
  var traceX = [], traceY = [];

  function setup() {
    frameRate(40);
    var o = select("#myContainer");
    var a = 0.5;
    var w = int(min(o.width, (window.innerHeight - 160) / a));
    var h = int(w * a);
    myCanvas = createCanvas(w, h);
    myCanvas.parent("myContainer");
    myCanvas.id("myP5Canvas");

    labelA = select("#labelA");
    rangeA = select("#rangeA");
    labelB = select("#labelB");
    rangeB = select("#rangeB");
    labelC = select("#labelC");
    rangeC = select("#rangeC");
    checkA = select("#checkA");
    buttonRst = select("#buttonRst");
    buttonRst.mouseClicked(resetExperiment);
    checkPause = select("#checkPause");

    resetExperiment();
  }

  function windowResized() {
    var o = select("#myContainer");
    var a = 0.5;
    var w = int(min(o.width, (window.innerHeight - 160) / a));
    var h = int(w * a);
    resizeCanvas(w, h);
  }

  function getY(x) {
    // Slope region: parabolic, offset so derivative is non-zero at start
    if (x < slopeEndX) {
      var offset = 30;
      var dx = (x - slopeStartX + offset) / (slopeEndX - slopeStartX + offset);
      dx = constrain(dx, 0, 1);
      return slopeStartY + (slopeEndY - slopeStartY) * dx * dx;
    }
    // Flat region
    return slopeEndY;
  }

  function resetExperiment() {
    slopeStartY = 380 - rangeC.value() * 50;  // height in pixels (50px = 1m)
    rangeAValue = rangeA.value();
    rangeBValue = rangeB.value();
    rangeCValue = rangeC.value();

    labelA.html("小车质量 " + rangeAValue + " kg");
    labelB.html("木块阻力 " + rangeBValue + " N");
    labelC.html("下滑高度 " + rangeCValue + " m");

    // Build track
    for (var i = 0; i <= trackMaxX; i++) {
      trackY[i] = getY(i);
    }

    cartX = slopeStartX;
    cartY = slopeStartY;
    cartV = 0;
    blockX = collisionX;
    running = false;
    finished = false;
    checkA.checked(false);

    for (var i = 0; i < traceMax; i++) {
      traceX[i] = cartX;
      traceY[i] = cartY;
    }
  }

  function draw() {
    if (touches.length > 1) return;

    // Check for slider changes (skip when paused)
    if (!paused && (rangeAValue != rangeA.value() || rangeBValue != rangeB.value() || rangeCValue != rangeC.value())) {
      resetExperiment();
      return;
    }

    background(240, 240, 255);
    strokeWeight(1);
    textSize(18);
    push();
    scale(width / 900);

    // Physics update
    if (checkA.checked() && !finished && !paused) {
      running = true;
      var dx = 2;
      var nextY = trackY[round(cartX) + 1] || trackY[round(cartX)];
      var prevY = trackY[round(cartX) - 1] || trackY[round(cartX)];
      var dy = nextY - prevY;
      var d = sqrt(dy * dy + dx * dx);

      if (cartX < collisionX) {
        var fallH = cartY - slopeStartY;
        if (fallH < 0) fallH = 0;

        if (cartX < slopeEndX) {
          var vPE = sqrt(2 * 9.8 * fallH / 50);
          cartV = max(vPE, max(dy / d * 2, 0.5));
          cartX += cartV * 1.5 * dx / d;
          cartY = getY(cartX);
        } else if (cartX < collisionX) {
          cartX += cartV * 1.5;
          cartY = slopeEndY;
        }

        if (cartX >= collisionX) {
          cartX = collisionX;
          cartY = slopeEndY;
        }
      } else {
        // After collision: push block
        if (rangeBValue == 0) {
          blockX = cartX;
        } else {
          var pixelH = slopeEndY - slopeStartY;
          var slip = rangeAValue * 9.8 * pixelH / (5 * rangeBValue);
          cartX += cartV * 1.5;
          cartX = constrain(cartX, collisionX, collisionX + slip);
          blockX = constrain(blockX, cartX, collisionX + slip);

          var x0 = slip;
          var v0 = sqrt(2 * 9.8 * pixelH / 50);
          var x = (collisionX + slip) - cartX;
          if (x0 > 0) cartV = sqrt(v0 * v0 * x / x0);
          else cartV = 0;
        }
      }

      // Update trace
      for (var i = 1; i < traceMax; i++) {
        traceX[i - 1] = traceX[i];
        traceY[i - 1] = traceY[i];
      }
      traceX[traceMax - 1] = cartX;
      traceY[traceMax - 1] = cartY;

      // Check if stopped
      if (cartV < 0.01 && cartX >= collisionX) {
        finished = true;
        running = false;
      }
    }

    // Draw grid
    stroke(220);
    for (var i = 50; i < 900; i += 50) line(i, 0, i, 450);
    for (var i = 50; i < 450; i += 50) line(0, i, 900, i);
    stroke(180, 200, 255);
    line(collisionX, 0, collisionX, 450);

    // Draw track
    noStroke();
    fill(180);
    beginShape();
    for (var i = 0; i < trackMaxX; i++) vertex(i, trackY[i]);
    vertex(trackMaxX, 450);
    vertex(0, 450);
    endShape(CLOSE);

    stroke(0);
    strokeWeight(2);
    noFill();
    beginShape();
    for (var i = 0; i <= slopeEndX; i++) vertex(i, trackY[i]);
    endShape();
    // Flat surface line
    line(slopeEndX, slopeEndY, trackMaxX, slopeEndY);

    // Ruler marks on flat section
    for (var i = collisionX; i < 900; i += 5) line(i, slopeEndY, i, slopeEndY + 7);
    for (var i = collisionX; i < 900; i += 25) line(i, slopeEndY, i, slopeEndY + 14);
    for (var i = collisionX; i < 900; i += 50) line(i, slopeEndY, i, slopeEndY + 21);

    // Distance labels
    fill(0);
    noStroke();
    textAlign(CENTER, TOP);
    for (var i = collisionX; i < 900; i += 50) {
      text(((i - collisionX) / 50).toFixed(1) + "m", i, slopeEndY + 25);
    }

    // Trace
    if (checkA.checked() || finished) {
      stroke(0, 150, 200, 80);
      noFill();
      beginShape();
      for (var i = 0; i < traceMax; i++) {
        vertex(traceX[i], traceY[i]);
      }
      endShape();
    }

    // Draw wooden block
    var blockW = 20 * pow(rangeBValue / 10, 0.3);
    var blockH = 18 * pow(rangeBValue / 10, 0.3);
    fill(210, 160, 60);
    stroke(0);
    strokeWeight(1.5);
    rect(blockX, slopeEndY - blockH, blockW, blockH, 3);

    // Block label
    fill(0);
    noStroke();
    textAlign(LEFT, BOTTOM);
    text("阻力=" + rangeBValue + "N", blockX + blockW + 5, slopeEndY - blockH / 2);

    // Draw cart
    drawCart(cartX, cartY, atan2(trackY[round(min(cartX, trackMaxX - 1))] - trackY[round(max(cartX - 19, 0))], 20));

    // Height indicator
    stroke(0, 100, 200);
    strokeWeight(1);
    drawDashedLine(slopeStartX - 40, slopeStartY, slopeStartX + 40, slopeStartY);
    drawDashedLine(slopeStartX - 40, slopeEndY, slopeStartX, slopeEndY);

    // Height double arrow
    var arrowX = slopeStartX - 25;
    var arrowTop = slopeStartY;
    var arrowBottom = slopeEndY;
    stroke(0);
    strokeWeight(1.5);
    fill(0);
    // Up arrow
    line(arrowX, arrowBottom, arrowX, arrowTop);
    triangle(arrowX, arrowTop, arrowX - 5, arrowTop + 8, arrowX + 5, arrowTop + 8);
    // Down arrow
    triangle(arrowX, arrowBottom, arrowX - 5, arrowBottom - 8, arrowX + 5, arrowBottom - 8);

    // Height label
    noStroke();
    fill(0);
    textAlign(RIGHT, CENTER);
    var hMeters = ((slopeEndY - slopeStartY) / 50).toFixed(1);
    text(hMeters + " m", slopeStartX - 35, (slopeStartY + slopeEndY) / 2);

    // Block displacement if cart passed collision
    if (blockX > collisionX + 1) {
      noFill();
      stroke(255, 100, 0);
      strokeWeight(2);
      var arrEndX = min(collisionX + (blockX - collisionX) * 1.1, 880);
      line(collisionX, slopeEndY - blockH - 15, arrEndX, slopeEndY - blockH - 15);
      // Arrowheads
      triangle(arrEndX, slopeEndY - blockH - 15, arrEndX - 8, slopeEndY - blockH - 20, arrEndX - 8, slopeEndY - blockH - 10);

      fill(255, 100, 0);
      noStroke();
      var distCm = ((blockX - collisionX) / 50 * 100).toFixed(0);
      var distM = ((blockX - collisionX) / 50).toFixed(2);
      var distLabel = distCm < 100 ? distCm + " cm" : distM + " m";
      textAlign(CENTER, BOTTOM);
      text(distLabel, (collisionX + arrEndX) / 2, slopeEndY - blockH - 20);
    }

    // Energy display when running/finished
    if (running || finished) {
      var h = (slopeEndY - slopeStartY) / 50;
      var pe = rangeAValue * 9.8 * h;
      var ke = 0.5 * rangeAValue * cartV * cartV;
      fill(0);
      noStroke();
      textAlign(LEFT, TOP);
      text("势能 Ep = " + pe.toFixed(1) + " J", 10, 10);
      text("动能 Ek = " + ke.toFixed(1) + " J", 10, 30);
      text("速度 v = " + (cartV).toFixed(2) + " m/s", 10, 50);
    }

    pop();
  }

  function drawCart(x, y, theta) {
    push();
    translate(x, y);
    rotate(theta);
    translate(-15, 0);
    // Cart body
    fill(100, 200, 255);
    stroke(0);
    strokeWeight(1);
    rect(-15, -20, 30, 15, 3);
    // Wheels
    noStroke();
    fill(40);
    ellipse(-8, -5, 9, 9);
    ellipse(8, -5, 9, 9);
    // Mass label
    fill(0);
    noStroke();
    textAlign(RIGHT, BOTTOM);
    text(rangeAValue + " kg", 8, -28);
    pop();
  }

  function drawDashedLine(x1, y1, x2, y2) {
    var d = dist(x1, y1, x2, y2);
    var steps = d / 8;
    for (var i = 0; i < steps; i += 2) {
      var t1 = i / steps;
      var t2 = min((i + 1) / steps, 1);
      line(lerp(x1, x2, t1), lerp(y1, y2, t1), lerp(x1, x2, t2), lerp(y1, y2, t2));
    }
  }

  // ===== 过关挑战答题系统 =====
  var QUIZ_STORAGE_KEY = "quiz_kinetic_energy_progress";
  var EXPERIMENT_KEY = "kinetic_energy";

  var quizQuestions = [
    // 第1关：动能的基本概念（5题）
    { q: "动能的定义是什么？", opts: ["物体由于被举高而具有的能量", "物体由于运动而具有的能量", "物体由于形变而具有的能量", "物体由于温度而具有的能量"], ans: 1, explain: "动能是物体由于运动而具有的能量。运动的物体速度越快、质量越大，动能就越大。静止物体的动能为零。" },
    { q: "两个质量相同的物体，速度大的物体动能怎样？", opts: ["动能更大", "动能更小", "动能相同", "无法比较"], ans: 0, explain: "根据动能公式 Ek=½mv²，质量相同时，速度越大的物体动能越大。例如高速行驶的汽车比慢速行驶的同款汽车具有更大的动能。" },
    { q: "动能的国际单位是什么？", opts: ["牛顿（N）", "焦耳（J）", "瓦特（W）", "帕斯卡（Pa）"], ans: 1, explain: "动能属于能量的一种，国际单位是焦耳（J），符号为J。1J = 1N·m = 1kg·m²/s²。牛顿是力的单位，瓦特是功率的单位，帕斯卡是压强的单位。" },
    { q: "以下哪个物体具有动能？", opts: ["放在桌上的书本", "正在飞行的足球", "挂在墙上的画", "静止在地面的石头"], ans: 1, explain: "正在飞行的足球由于运动而具有动能。其他选项中的物体都处于静止状态，不具有动能（但可能具有势能）。" },
    { q: "动能的大小与什么因素有关？", opts: ["只与质量有关", "只与速度有关", "与质量大小和速度大小都有关系", "与质量和速度都无关"], ans: 2, explain: "动能的大小由物体的质量和速度共同决定。质量越大、速度越大，动能就越大。两者缺一不可，这也是为什么超载和超速都会增加安全隐患。" },

    // 第2关：动能影响因素分析（5题）
    { q: "一辆汽车质量增大到原来的2倍，速度不变，动能变为原来的几倍？", opts: ["1倍", "2倍", "4倍", "8倍"], ans: 1, explain: "根据 Ek=½mv²，速度 v 不变，质量 m 变为2倍时，动能 Ek 也变为2倍。动能与质量成正比关系。" },
    { q: "一辆汽车速度增大到原来的2倍，质量不变，动能变为原来的几倍？", opts: ["2倍", "4倍", "8倍", "不变"], ans: 1, explain: "根据 Ek=½mv²，质量 m 不变，速度 v 变为2倍时，v² 变为4倍，动能 Ek 也变为4倍。这就是超速比超载更危险的原因——速度对动能的影响是平方关系。" },
    { q: "质量相同的甲、乙两物体，甲的速度是乙的3倍，甲的动能是乙的多少倍？", opts: ["3倍", "6倍", "9倍", "27倍"], ans: 2, explain: "根据 Ek=½mv²，质量相同，甲的 v 是乙的3倍，则 v² 是9倍，因此甲的动能是乙的9倍。这说明速度的微小增加会导致动能的大幅增加。" },
    { q: "在水平路面上匀速行驶的汽车，其动能如何变化？", opts: ["逐渐增大", "逐渐减小", "保持不变", "先增大后减小"], ans: 2, explain: "动能由质量和速度决定。汽车匀速行驶，质量不变、速度不变，因此动能保持不变。如果加速则动能增大，减速则动能减小。" },
    { q: "同一辆车从低速加速到高速的过程中，动能如何变化？", opts: ["动能减小", "动能不变", "动能增大", "动能先增大后减小"], ans: 2, explain: "加速过程中速度 v 增大，质量 m 不变，根据 Ek=½mv²，动能 Ek 增大。加速过程中，发动机做功将化学能转化为汽车的动能。" },

    // 第3关：综合应用（5题）
    { q: "高速公路上为什么对货车有载重限制？", opts: ["为了保护路面", "因为质量越大，速度相同时动能越大，刹车距离越长", "为了节省燃油", "为了让货车跑得更快"], ans: 1, explain: "速度相同时，质量越大动能越大，刹车时需要克服的摩擦力做功更多，刹车距离更长，安全隐患更大。这就是为什么货车有载重限制的原因。" },
    { q: "小球从斜面上滑下，到达水平面时的动能与什么有关？", opts: ["只与小球质量有关", "只与斜面高度有关", "与小球质量和斜面高度都有关", "与斜面坡度有关"], ans: 2, explain: "小球从斜面滑下，势能转化为动能：mgh = ½mv²，所以到达底部时的动能等于 mgh，即与质量 m 和高度 h 都有关。这个实验常用于探究动能的影响因素。" },
    { q: "子弹质量虽小，但穿透力强，主要是因为什么？", opts: ["子弹温度高", "子弹速度极大，动能很大", "子弹形状特殊", "子弹材料特殊"], ans: 1, explain: "子弹虽然质量小（约10克），但速度极大（约1000m/s），根据 Ek=½mv²，速度对动能的贡献是平方关系，所以子弹动能很大，具有强大的穿透能力。" },
    { q: "两辆不同的汽车以相同速度行驶，质量大的车动能更大。这说明什么？", opts: ["质量对动能没有影响", "动能与质量成正比", "动能与质量成反比", "动能与质量的平方成正比"], ans: 1, explain: "速度相同时，根据 Ek=½mv²，动能与质量成正比。质量大的车动能更大，因此刹车时需要更长的距离才能停下来，这也是大型车辆跟车距离需要更大的原因。" },
    { q: "在动能影响因素实验中，木块被推得越远，说明什么？", opts: ["小车颜色更鲜艳", "小车的动能越大", "木块质量更小", "地面更光滑"], ans: 1, explain: "小车撞击木块时，将动能传递给木块，推动木块滑行。木块滑行距离越远，说明小车具有的动能越大。实验中通过改变小车的质量和下滑高度，可以探究影响动能大小的因素。" }
  ];

  var quizRound = 0, quizIndex = 0, quizAnswers = [], quizLocked = false;
  var quizScores = [0, 0, 0], quizHighestRound = 0;
  var btnChallenge, btnCloseQuiz, btnResetQuiz, quizOverlay, quizTitle, quizProgressFill, quizBody, quizResult;

  function getUsername() {
    try { return localStorage.getItem("currentUser"); } catch(e) { return null; }
  }

  function saveProgress() {
    var data = { round: quizRound, scores: quizScores, highestRound: quizHighestRound, updatedAt: new Date().toISOString() };
    try { localStorage.setItem(QUIZ_STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
    var username = getUsername();
    if (username) saveQuizToServer(username, data);
  }

  function saveQuizToServer(username, data) {
    try {
      SB.getUser(username).then(function(users) {
        if (users && users.length > 0) {
          var user = users[0];
          var quizData = user.quiz_data;
          if (typeof quizData === 'string') quizData = JSON.parse(quizData);
          if (!quizData || typeof quizData !== 'object') quizData = {};
          quizData[EXPERIMENT_KEY] = data;
          SB.updateUser(username, { quiz_data: quizData }).catch(function(){});
        }
      }).catch(function(){});
    } catch(e) {}
  }

  async function loadProgress() {
    var username = getUsername();
    if (username) {
      try {
        var users = await SB.getUser(username);
        if (users && users.length > 0) {
          var user = users[0];
          var quizData = user.quiz_data;
          if (typeof quizData === 'string') quizData = JSON.parse(quizData);
          if (quizData && quizData[EXPERIMENT_KEY]) {
            var serverData = quizData[EXPERIMENT_KEY];
            try { localStorage.setItem(QUIZ_STORAGE_KEY, JSON.stringify(serverData)); } catch(e) {}
            return serverData;
          }
        }
      } catch(e) {}
    }
    try { var raw = localStorage.getItem(QUIZ_STORAGE_KEY); if (raw) return JSON.parse(raw); } catch(e) {}
    return null;
  }

  function clearProgress() {
    try { localStorage.removeItem(QUIZ_STORAGE_KEY); } catch(e) {}
    var username = getUsername();
    if (username) {
      try {
        SB.getUser(username).then(function(users) {
          if (users && users.length > 0) {
            var user = users[0];
            var quizData = user.quiz_data;
            if (typeof quizData === 'string') quizData = JSON.parse(quizData);
            if (quizData && typeof quizData === 'object') { delete quizData[EXPERIMENT_KEY]; SB.updateUser(username, { quiz_data: quizData }).catch(function(){}); }
          }
        }).catch(function(){});
      } catch(e) {}
    }
  }

  function updateChallengeButton() {
    loadProgress().then(function(saved) {
      if (saved && (saved.scores[0] > 0 || saved.round > 0)) {
        var totalDone = saved.scores[0] + (saved.scores[1] || 0) + (saved.scores[2] || 0);
        btnChallenge.html("继续挑战 (已得" + totalDone + "/15分)");
      } else { btnChallenge.html("过关挑战"); }
    });
  }

  function getStars(score, total) {
    if (score === total) return "⭐⭐⭐";
    if (score >= total - 1) return "⭐⭐";
    if (score >= Math.ceil(total / 2)) return "⭐";
    return "";
  }

  function startQuiz() {
    loadProgress().then(function(saved) {
      if (saved && saved.highestRound >= 0 && (saved.scores[0] > 0 || saved.round > 0)) {
        quizRound = Math.min(saved.round + 1, 2);
        quizScores = saved.scores.slice();
        quizHighestRound = saved.highestRound;
      } else { quizRound = 0; quizScores = [0,0,0]; quizHighestRound = 0; }
      quizOverlay.style("display", "block");
      paused = true;
      checkPause.checked(true);
      renderRound();
    });
  }

  function closeQuiz() {
    quizOverlay.style("display", "none");
    paused = false;
    checkPause.checked(false);
    updateChallengeButton();
  }

  function resetQuiz() {
    if (confirm("确定要重置所有挑战进度吗？当前进度将丢失。")) {
      quizRound = 0; quizScores = [0,0,0]; quizHighestRound = 0;
      clearProgress(); renderRound();
    }
  }

  function renderRound() {
    quizIndex = 0; quizAnswers = []; quizLocked = false;
    quizResult.style("display", "none");
    quizBody.style("display", "block");
    quizTitle.html("第 " + (quizRound + 1) + " 关 (题目 " + (quizRound * 5 + 1) + "-" + (quizRound * 5 + 5) + "/15)");
    quizProgressFill.style("width", (quizRound * (100/3)) + "%");
    renderQuestion();
  }

  function renderQuestion() {
    var q = quizQuestions[quizRound * 5 + quizIndex];
    var html = '<div class="quiz-question">' + (quizIndex + 1) + ". " + q.q + "</div>";
    var labels = ["A", "B", "C", "D"];
    for (var i = 0; i < q.opts.length; i++) {
      html += '<button class="quiz-option" data-idx="' + i + '" ';
      if (quizLocked) html += 'disabled ';
      html += '>' + labels[i] + ". " + q.opts[i] + "</button>";
    }
    quizBody.html(html);
    var opts = document.querySelectorAll("#quizBody .quiz-option");
    for (var j = 0; j < opts.length; j++) {
      (function(idx) { opts[j].addEventListener("click", function() { selectAnswer(idx); }); })(j);
    }
  }

  function selectAnswer(idx) {
    if (quizLocked) return;
    quizLocked = true; quizAnswers.push(idx);
    var q = quizQuestions[quizRound * 5 + quizIndex];
    var correct = q.ans;
    var opts = document.querySelectorAll("#quizBody .quiz-option");
    for (var i = 0; i < opts.length; i++) {
      opts[i].disabled = true;
      if (i === correct) opts[i].classList.add("correct");
      if (i === idx && idx !== correct) opts[i].classList.add("wrong");
    }
    setTimeout(function() {
      quizIndex++;
      if (quizIndex < 5) { quizLocked = false; renderQuestion(); }
      else showRoundResult();
    }, 1200);
  }

  function showRoundResult() {
    var correctCount = 0;
    for (var i = 0; i < 5; i++) { if (quizAnswers[i] === quizQuestions[quizRound * 5 + i].ans) correctCount++; }
    quizScores[quizRound] = correctCount;
    if (quizRound > quizHighestRound) quizHighestRound = quizRound;
    saveProgress();
    quizBody.style("display", "none");
    quizResult.style("display", "block");
    var stars = getStars(correctCount, 5);
    var scoreClass = correctCount >= 4 ? "great" : (correctCount >= 2 ? "good" : "poor");
    var comment = correctCount >= 4 ? "太棒了！" : (correctCount >= 2 ? "继续加油！" : "再看看实验吧！");
    var html = '<div class="quiz-score ' + scoreClass + '">' + correctCount + "/5</div>";
    if (stars) html += '<p style="font-size:20px;margin:4px 0;">' + stars + "</p>";
    html += '<p style="font-size:16px;margin:8px 0;color:#94a3b8;">' + comment + "</p>";
    if (quizRound < 2) {
      html += '<p style="font-size:13px;color:#64748b;margin-bottom:8px;">已完成第' + (quizRound + 1) + "关，进度已保存</p>";
      html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnReviewRound" style="font-size:14px;">查看回顾</button></div>';
      html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnNextRound" style="font-size:14px;padding:8px 24px;">进入下一关</button><button class="btn-reset" id="btnRetryRound" style="font-size:14px;">重新挑战本关</button></div>';
    } else {
      var total = quizScores[0] + quizScores[1] + quizScores[2];
      var totalClass = total >= 12 ? "great" : (total >= 8 ? "good" : "poor");
      var totalStars = getStars(total, 15);
      html = '<div class="quiz-score ' + totalClass + '">' + total + "/15</div>";
      if (totalStars) html += '<p style="font-size:20px;margin:4px 0;">' + totalStars + "</p>";
      html += '<p style="font-size:14px;color:#94a3b8;margin-bottom:8px;">第1关: ' + quizScores[0] + '/5 &nbsp; 第2关: ' + quizScores[1] + '/5 &nbsp; 第3关: ' + quizScores[2] + "/5</p>";
      html += '<p style="font-size:16px;margin:8px 0;color:' + (total >= 12 ? "#22c55e" : total >= 8 ? "#f59e0b" : "#ef4444") + ';">' + (total >= 12 ? "恭喜通关！你对动能影响因素理解透彻！" : total >= 8 ? "还不错，再复习一下错题吧！" : "建议回到实验仔细观察小车质量、下滑高度与木块滑行距离的关系。") + "</p>";
      html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnReviewRound" style="font-size:14px;">查看回顾</button></div>';
      html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnRetryAll" style="font-size:14px;padding:8px 24px;">重新全部挑战</button><button class="btn-reset" id="btnBackExp" style="font-size:14px;">返回实验</button></div>';
      clearProgress();
    }
    quizResult.html(html);
    bindResultButtons();
  }

  function bindResultButtons() {
    setTimeout(function() {
      var btnNext = document.getElementById("btnNextRound");
      var btnRetry = document.getElementById("btnRetryRound");
      var btnRetryAll = document.getElementById("btnRetryAll");
      var btnBack = document.getElementById("btnBackExp");
      var btnReview = document.getElementById("btnReviewRound");
      if (btnNext) btnNext.addEventListener("click", function() { quizRound++; renderRound(); });
      if (btnRetry) btnRetry.addEventListener("click", function() { renderRound(); });
      if (btnRetryAll) btnRetryAll.addEventListener("click", function() { quizRound = 0; quizScores = [0,0,0]; quizHighestRound = 0; clearProgress(); renderRound(); });
      if (btnBack) btnBack.addEventListener("click", function() { closeQuiz(); });
      if (btnReview) btnReview.addEventListener("click", function() { showReview(); });
    }, 100);
  }

  function showReview() {
    var html = '<p style="font-size:16px;font-weight:bold;margin-bottom:16px;color:#e2e8f0;">第' + (quizRound + 1) + '关 — 答题回顾</p>';
    var wrongCount = 0;
    var labels = ["A", "B", "C", "D"];
    for (var i = 0; i < 5; i++) {
      var q = quizQuestions[quizRound * 5 + i];
      var userAns = quizAnswers[i];
      var isCorrect = userAns === q.ans;
      if (!isCorrect) wrongCount++;
      var cardClass = isCorrect ? "correct2" : "wrong";
      var badgeHtml = isCorrect ? '<span class="rbadge ok">正确</span>' : '<span class="rbadge fail">错误</span>';
      html += '<div class="review-card ' + cardClass + '"><div class="rq">' + badgeHtml + (i + 1) + ". " + q.q + "</div>";
      if (!isCorrect) {
        html += '<div class="review-user-ans">你的答案：' + labels[userAns] + ". " + q.opts[userAns] + "</div>";
        html += '<div class="review-correct-ans">正确答案：' + labels[q.ans] + ". " + q.opts[q.ans] + "</div>";
        html += '<div class="review-explain"><div class="rtitle">解析</div><div class="rtext">' + q.explain + "</div></div>";
      } else {
        html += '<div style="font-size:13px;color:#22c55e;margin-top:2px;">你的答案：' + labels[userAns] + ". " + q.opts[userAns] + " </div>";
      }
      html += "</div>";
    }
    if (wrongCount === 0) { html += '<p style="text-align:center;color:#22c55e;font-size:15px;margin-top:12px;">全部正确！你对这部分知识点掌握得很好！</p>'; }
    else { html += '<p style="text-align:center;color:#f59e0b;font-size:14px;margin-top:12px;">共错 ' + wrongCount + ' 题，仔细阅读解析，理解后再继续！</p>'; }
    html += '<div class="quiz-btn-row"><button class="btn-reset" id="btnBackResult" style="font-size:14px;">返回结果</button></div>';
    document.getElementById("quizBody").style.display = "none";
    document.getElementById("quizResult").style.display = "block";
    document.getElementById("quizResult").innerHTML = html;
    setTimeout(function() {
      var btnBack = document.getElementById("btnBackResult");
      if (btnBack) btnBack.addEventListener("click", function() { showRoundResultSkipSave(); });
    }, 100);
  }

  function showRoundResultSkipSave() {
    var correctCount = quizScores[quizRound];
    document.getElementById("quizBody").style.display = "none";
    document.getElementById("quizResult").style.display = "block";
    var stars = getStars(correctCount, 5);
    var scoreClass = correctCount >= 4 ? "great" : (correctCount >= 2 ? "good" : "poor");
    var comment = correctCount >= 4 ? "太棒了！" : (correctCount >= 2 ? "继续加油！" : "再看看实验吧！");
    var html = '<div class="quiz-score ' + scoreClass + '">' + correctCount + "/5</div>";
    if (stars) html += '<p style="font-size:20px;margin:4px 0;">' + stars + "</p>";
    html += '<p style="font-size:16px;margin:8px 0;color:#94a3b8;">' + comment + "</p>";
    if (quizRound < 2) {
      html += '<p style="font-size:13px;color:#64748b;margin-bottom:8px;">已完成第' + (quizRound + 1) + "关，进度已保存</p>";
      html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnReviewRound" style="font-size:14px;">查看回顾</button></div>';
      html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnNextRound" style="font-size:14px;padding:8px 24px;">进入下一关</button><button class="btn-reset" id="btnRetryRound" style="font-size:14px;">重新挑战本关</button></div>';
    } else {
      var total = quizScores[0] + quizScores[1] + quizScores[2];
      var totalClass = total >= 12 ? "great" : (total >= 8 ? "good" : "poor");
      var totalStars = getStars(total, 15);
      html = '<div class="quiz-score ' + totalClass + '">' + total + "/15</div>";
      if (totalStars) html += '<p style="font-size:20px;margin:4px 0;">' + totalStars + "</p>";
      html += '<p style="font-size:14px;color:#94a3b8;margin-bottom:8px;">第1关: ' + quizScores[0] + '/5 &nbsp; 第2关: ' + quizScores[1] + '/5 &nbsp; 第3关: ' + quizScores[2] + "/5</p>";
      html += '<p style="font-size:16px;margin:8px 0;color:' + (total >= 12 ? "#22c55e" : total >= 8 ? "#f59e0b" : "#ef4444") + ';">' + (total >= 12 ? "恭喜通关！你对动能影响因素理解透彻！" : total >= 8 ? "还不错，再复习一下错题吧！" : "建议回到实验仔细观察小车质量、下滑高度与木块滑行距离的关系。") + "</p>";
      html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnReviewRound" style="font-size:14px;">查看回顾</button></div>';
      html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnRetryAll" style="font-size:14px;padding:8px 24px;">重新全部挑战</button><button class="btn-reset" id="btnBackExp" style="font-size:14px;">返回实验</button></div>';
    }
    document.getElementById("quizResult").innerHTML = html;
    bindResultButtons();
  }

  function initQuiz() {
    btnChallenge = select("#btnChallenge");
    btnCloseQuiz = select("#btnCloseQuiz");
    btnResetQuiz = select("#btnResetQuiz");
    quizOverlay = select("#quizOverlay");
    quizTitle = select("#quizTitle");
    quizProgressFill = select("#quizProgressFill");
    quizBody = select("#quizBody");
    quizResult = select("#quizResult");
    btnChallenge.mouseClicked(startQuiz);
    btnCloseQuiz.mouseClicked(closeQuiz);
    btnResetQuiz.mouseClicked(resetQuiz);
    updateChallengeButton();
  }

  var _origSetupKE = setup;
  setup = function() { _origSetupKE(); initQuiz(); };
  </script>
  <!-- === 过关挑战弹窗 === -->
  <div id="quizOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;overflow-y:auto;">
    <div style="max-width:700px;margin:40px auto;background:#1a1a2e;border:1px solid #333;border-radius:16px;padding:24px 32px;color:#e2e8f0;">
      <div id="quizHeader" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <span style="font-size:18px;font-weight:bold;" id="quizTitle">第 1 关 (1/3)</span>
        <div style="display:flex;gap:8px;">
          <button class="btn" id="btnResetQuiz" style="font-size:12px;border-color:#555;color:#999;">↺ 重置</button>
          <button class="btn" id="btnCloseQuiz" style="font-size:12px;">✕ 退出</button>
        </div>
      </div>
      <div id="quizProgress" style="height:4px;background:#333;border-radius:2px;margin-bottom:20px;">
        <div id="quizProgressFill" style="height:100%;background:#8b5cf6;border-radius:2px;width:0%;transition:width 0.3s;"></div>
      </div>
      <div id="quizBody"></div>
      <div id="quizResult" style="display:none;text-align:center;padding:30px 0;"></div>
    </div>
  </div>
  <script>
    (function() {
      var header = document.querySelector('.header');
      var hideTimer = null;
      var HIDE_DELAY = 800;
      function show() { clearTimeout(hideTimer); header.classList.remove('hidden'); document.body.classList.remove('header-hidden'); }
      function hide() { hideTimer = setTimeout(function() { header.classList.add('hidden'); document.body.classList.add('header-hidden'); }, HIDE_DELAY); }
      document.addEventListener('mousemove', function(e) {
        if (e.clientY <= 60) show();
        else if (e.clientY > header.offsetHeight + 20 && !header.classList.contains('hidden')) hide();
      });
      header.addEventListener('mouseenter', show);
      header.addEventListener('mouseleave', hide);
      hideTimer = setTimeout(function() { header.classList.add('hidden'); document.body.classList.add('header-hidden'); }, 2000);
    })();
  </script>
