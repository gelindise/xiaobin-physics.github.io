  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/p5.min.js"></script>

  <script>
    // ========== 工具函数 ==========
    function doFullScreen() {
      const el = document.getElementById('divFull');
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }

    function mod(x, y) {
      if (x < 0) x += y * (ceil(abs(x)/y) + 1);
      let c = floor(x / y);
      return x - y * c;
    }

    function contain(x, y, x1, y1, w1, h1) {
      return x > x1 && x < x1 + w1 && y > y1 && y < y1 + h1;
    }

    function cosineInterpolate(a, b, t) {
      const f = (1 - cos(t * PI)) * 0.5;
      return a + (b - a) * f;
    }

    function getRedColor(nano) {
      if (400 <= nano && nano < 420) return cosineInterpolate(64, 84, map(nano, 400, 420, 0, 1));
      if (420 <= nano && nano < 510) return cosineInterpolate(84, 0, map(nano, 420, 510, 0, 1));
      if (510 <= nano && nano < 580) return cosineInterpolate(0, 255, map(nano, 510, 580, 0, 1));
      if (580 <= nano && nano < 700) return cosineInterpolate(255, 64, map(nano, 580, 700, 0, 1));
      return 64;
    }

    function getGreenColor(nano) {
      if (400 <= nano && nano < 440) return cosineInterpolate(64, 44, map(nano, 400, 440, 0, 1));
      if (440 <= nano && nano < 550) return cosineInterpolate(44, 192, map(nano, 440, 550, 0, 1));
      if (550 <= nano && nano < 640) return cosineInterpolate(192, 54, map(nano, 550, 640, 0, 1));
      if (640 <= nano && nano < 700) return cosineInterpolate(54, 64, map(nano, 640, 700, 0, 1));
      return 64;
    }

    function getBlueColor(nano) {
      if (400 <= nano && nano < 450) return cosineInterpolate(64, 212, map(nano, 400, 450, 0, 1));
      if (450 <= nano && nano < 550) return cosineInterpolate(212, 52, map(nano, 450, 550, 0, 1));
      if (550 <= nano && nano < 650) return cosineInterpolate(52, 64, map(nano, 550, 650, 0, 1));
      if (650 <= nano && nano < 700) return cosineInterpolate(64, 0, map(nano, 650, 700, 0, 1));
      return 64;
    }

    function draw2DArrow2(x, y, cx, cy, thick) {
      const lArrow = sqrt(cx * cx + cy * cy);
      const oxArrow = [0, lArrow - 2*thick, lArrow - 2*thick, lArrow, lArrow - 2*thick, lArrow - 2*thick, 0];
      const oyArrow = [thick, thick, 2*thick, 0, -2*thick, -thick, -thick];
      push();
      translate(x, y);
      rotate(atan2(cy, cx));
      beginShape();
      for (let i = 0; i < oxArrow.length; i++) vertex(max(oxArrow[i], 0), oyArrow[i]);
      endShape(CLOSE);
      pop();
    }

    function drawButtonDrag() {
      push();
      const r = 30, gap = 4;
      let cx = width / 900 * 40, cy = height - 45;
      if (window.devicePixelRatio) { cx = 40; cy = (height / (width / 900)) - 45; }
      noStroke();
      for (let i = 0; i < 4; i++) {
        let x = cx + i * (r + gap) - 1.5 * (r + gap);
        fill(0, 0, 0, 30);
        ellipse(x, cy - 2, r, r);
        fill(180);
        ellipse(x, cy - 4, r - 2, r - 2);
        fill(240);
        ellipse(x, cy - 4, r - 8, r - 8);
        fill(100);
        noStroke();
        ellipse(x, cy - 4, 4, 4);
      }
      pop();
    }

    // ========== 主模拟代码 ==========
    let language = 3; // 3=中文
    let checkA, chalkA, checkPause, chalkPause, currentSlider, currentLabel;
    let onImage, offImage, glowImage;
    let switchOn = false;
    let dragY = 140;
    let initV = 2;
    let prevInitV = 2;
    let minX = 0, minY = -900, maxX = 1500, maxY = 600;
    let leadAtomX = [], leadAtomY = [];
    let filaAtomX = [], filaAtomY = [], filaAtomXo = [], filaAtomYo = [];
    let leadElecX = [], leadElecY = [], leadElecVx = [], leadElecVy = [];
    let filaElecX = [], filaElecY = [], filaElecVx = [], filaElecVy = [];
    let photons = [];
    let touched = false, touchedX = 0, touchedY = 0;

    function preload() {
      onImage = loadImage("images/incandescence_on.png");
      offImage = loadImage("images/incandescence_off.png");
      glowImage = loadImage("images/faradays_law_glow.png");
    }

    function setup() {
      frameRate(60);
      let container = select("#myContainer");
      let a = 0.5;
      let w = int(min(container.width, (window.innerHeight - 160) / a));
      let h = int(w * a);
      if (w < 100) w = 800;
      if (h < 100) h = 400;
      myCanvas = createCanvas(w, h);
      myCanvas.parent("myContainer");
      myCanvas.id("myP5Canvas");

      checkA = select("#checkA");
      chalkA = select("#chalkA");
      chalkA.html("开关");
      checkA.changed(doCheckA);

      currentSlider = select("#currentSlider");
      currentLabel = select("#currentLabel");
      currentSlider.input(updateCurrent);

      checkPause = select("#checkPause");
      chalkPause = select("#chalkPause");

      setup2();
    }

    function windowResized() {
      let container = select("#myContainer");
      let a = 0.5;
      let w = int(min(container.width, (window.innerHeight - 160) / a));
      let h = int(w * a);
      if (w < 100) w = 800;
      resizeCanvas(w, h);
    }

    function updateCurrent() {
      const v = currentSlider.value();
      const current = map(v, 1, 100, 0.1, 1.0);
      const newInitV = map(current, 0.1, 1.0, 0.2, 3.0);
      const ratio = prevInitV > 0 ? newInitV / prevInitV : 1;
      for (let i = 0; i < leadElecVx.length; i++) {
        leadElecVx[i] *= ratio; leadElecVy[i] *= ratio;
      }
      for (let i = 0; i < filaElecVx.length; i++) {
        filaElecVx[i] *= ratio; filaElecVy[i] *= ratio;
      }
      initV = newInitV;
      prevInitV = newInitV;
      currentLabel.html("电流 " + current.toFixed(1));
    }

    function getPosition() {
      for (let n = 0; n < 500; n++) {
        let x = random(minX + 50, maxX - 50);
        let y = random(minY + 50, maxY - 50);
        let tooClose = false;
        for (let i = 0; i < filaAtomX.length; i++) {
          if (dist(x, y, filaAtomX[i], filaAtomY[i]) < 73) { tooClose = true; break; }
        }
        if (!tooClose) return createVector(x, y);
      }
      return createVector(random(minX+50,maxX-50), random(minY+50,maxY-50));
    }

    function doCheckA() {
      if (checkA.checked()) {
        for (let i = 0; i < leadAtomX.length; i++) leadElecVy[i] = abs(leadElecVy[i]);
        for (let i = 0; i < filaAtomX.length; i++) filaElecVy[i] = abs(filaElecVy[i]);
      } else {
        for (let i = 0; i < leadAtomX.length; i++) {
          let t = random(TWO_PI);
          leadElecVx[i] = initV * cos(t);
          leadElecVy[i] = initV * sin(t);
        }
        for (let i = 0; i < filaAtomX.length; i++) {
          let t = random(TWO_PI);
          filaElecVx[i] = initV * cos(t);
          filaElecVy[i] = initV * sin(t);
        }
      }
    }

    function setup2() {
      let offY = 0;
      for (let x = minX + 50; x < maxX; x += 100) {
        offY = mod(offY + 50, 100);
        for (let y = minY; y < maxY; y += 100) {
          leadAtomX.push(x);
          leadAtomY.push(y + offY);
        }
      }
      for (let i = 0; i < leadAtomX.length; i++) {
        leadElecX.push(random(minX, maxX));
        leadElecY.push(random(minY, maxY));
        let t = random(TWO_PI);
        leadElecVx.push(initV * cos(t));
        leadElecVy.push(initV * sin(t));
      }
      for (let i = 0; i < leadAtomX.length; i++) {
        let p = getPosition();
        filaAtomX.push(p.x);
        filaAtomY.push(p.y);
        filaAtomXo.push(p.x);
        filaAtomYo.push(p.y);
      }
      for (let i = 0; i < leadAtomX.length; i++) {
        filaElecX.push(random(minX, maxX));
        filaElecY.push(random(minY, maxY));
        let t = random(TWO_PI);
        filaElecVx.push(initV * cos(t));
        filaElecVy.push(initV * sin(t));
      }
    }

    function draw() {
      if (touches.length > 1) return;
      background(222, 128);
      strokeWeight(2);
      push();
      scale(width / 1000);

      let filament = (225 <= dragY && dragY <= 275);

      if (!checkPause.checked()) {
        runningFilamentElectrons();
        runningLeadElectrons();
        runningFilamentAtoms();
      }

      if (!mouseIsPressed) {
        if (touched && dist(mouseX, mouseY, touchedX, touchedY) < width * 0.01) {
          if (dist(mouseX * 1000 / width, mouseY * 1000 / width, 125, 450) < 100) {
            checkA.checked(checkA.checked() ? false : true);
            doCheckA();
          }
        }
        touched = false;
      } else {
        if (contain(mouseX, mouseY, 0, 0, width, height)) {
          if (!touched) { touchedX = mouseX; touchedY = mouseY; }
          touched = true;
        }
      }

      if (filament) {
        for (let i = 0; i < filaAtomX.length; i++) drawPositron(filaAtomX[i], filaAtomY[i]);
        for (let i = 0; i < filaElecX.length; i++) {
          noStroke(); fill(0, 0, 255);
          ellipse(filaElecX[i], filaElecY[i], 8, 8);
        }
      } else {
        for (let i = 0; i < leadAtomX.length; i++) drawPositron(leadAtomX[i], leadAtomY[i]);
        for (let i = 0; i < leadElecX.length; i++) {
          noStroke(); fill(0, 0, 255);
          ellipse(leadElecX[i], leadElecY[i], 8, 8);
        }
      }

      // 光子
      noFill(); strokeWeight(2);
      for (let i = 0; i < photons.length; i++) {

    function drawPhoton2(x, y, cx, nano, t) {
      push();

      endShape(OPEN);

    function runningFilamentElectrons() {
      let tollerence = 20;
      for (let i = 0; i < filaElecX.length - 1; i++) {
        for (let j = i + 1; j < filaElecX.length; j++) {
          let pix = filaElecX[i] + filaElecVx[i];
          let piy = filaElecY[i] + filaElecVy[i];
          let pjx = filaElecX[j] + filaElecVx[j];
          let pjy = filaElecY[j] + filaElecVy[j];
          if (dist(filaElecX[i], filaElecY[i], filaElecX[j], filaElecY[j]) < tollerence) {
            if (dist(filaElecX[i], filaElecY[i], filaElecX[j], filaElecY[j]) > dist(pix, piy, pjx, pjy)) {
              let vix = filaElecVx[i], viy = filaElecVy[i];
              let vjx = filaElecVx[j], vjy = filaElecVy[j];
              let vcx = (vix + vjx) / 2, vcy = (viy + vjy) / 2;
              let vcix = vix - vcx, vciy = viy - vcy;
              let vcjx = vjx - vcx, vcjy = vjy - vcy;
              let vci = dist(0, 0, vcix, vciy);
              let vcj = dist(0, 0, vcjx, vcjy);
              let aci = atan2(vciy, vcix);
              let acj = atan2(vcjy, vcjx);
              let aij = atan2(filaElecY[j] - filaElecY[i], filaElecX[j] - filaElecX[i]);
              let aji = atan2(filaElecY[i] - filaElecY[j], filaElecX[i] - filaElecX[j]);
              aci = mod(2 * aij + PI - aci, TWO_PI);
              acj = mod(2 * aji + PI - acj, TWO_PI);
              vix = vci * cos(aci); viy = vci * sin(aci);
              vjx = vcj * cos(acj); vjy = vcj * sin(acj);
              vix += vcx; viy += vcy;
              vjx += vcx; vjy += vcy;
              filaElecVx[i] = vix; filaElecVy[i] = viy;
              filaElecVx[j] = vjx; filaElecVy[j] = vjy;
            }
          }
        }
      }
    }

    function runningFilamentAtoms() {
      let accel = map(initV, 0.2, 3.0, 0.01, 0.14);
      for (let i = 0; i < filaElecX.length; i++) {
        let x1 = filaElecX[i], y1 = filaElecY[i];
        let x2 = filaElecX[i] + filaElecVx[i], y2 = filaElecY[i] + filaElecVy[i] + (checkA.checked() ? accel : 0);
        for (let j = 0; j < filaAtomX.length; j++) {
          let d1 = dist(filaAtomX[j], filaAtomY[j], x1, y1);
          let d2 = dist(filaAtomX[j], filaAtomY[j], x2, y2);
          if (d2 < 26 && d1 > d2) {
            let vcx = (1 * filaElecVx[i] + 10 * 0) / (1 + 6);
            let vcy = (1 * filaElecVy[i] + 10 * 0) / (1 + 6);
            let vcix = filaElecVx[i] - vcx, vciy = filaElecVy[i] - vcy;
            let vcjx = 0 - vcx, vcjy = 0 - vcy;
            let vci = mag(vcix, vciy), vcj = mag(vcjx, vcjy);
            let aci = atan2(vciy, vcix);
            let acj = atan2(vcjy, vcjx);
            let aij = atan2(filaAtomY[j] - filaElecY[i], filaAtomX[j] - filaElecX[i]);
            let aji = atan2(filaElecY[i] - filaAtomY[j], filaElecX[i] - filaAtomX[j]);
            aci = mod(2 * aij + PI - aci, TWO_PI);
            acj = mod(2 * aji + PI - acj, TWO_PI);
            filaElecVx[i] = max(vci, initV) * cos(aci);
            filaElecVy[i] = max(vci, initV) * sin(aci);
            let Vx = vcj * cos(acj), Vy = vcj * sin(acj);
            filaElecVx[i] += vcx; filaElecVy[i] += vcy;
            Vx += vcx; Vy += vcy;
            if (checkA.checked()) { filaAtomX[j] += Vx * 6; filaAtomY[j] += Vy * 6; }
            else { filaAtomX[j] += Vx; filaAtomY[j] += Vy; }
            if (225 <= dragY && dragY <= 275) {
              if (mag(Vx, Vy) > 1 && 500 < filaAtomXo[j] && filaAtomXo[j] < 1000 && 0 < filaAtomYo[j] && filaAtomYo[j] < 500) {
                photons.push({
                  x: filaAtomX[j], y: filaAtomY[j], cx: 0,
                  nano: 1000 / mag(Vx, Vy),
                  t: atan2(filaAtomY[j] - filaAtomYo[j], filaAtomX[j] - filaAtomXo[j])
                });
              }
            }
          }
        }
        filaElecX[i] += filaElecVx[i];
        filaElecY[i] += filaElecVy[i];
        if (checkA.checked()) filaElecVy[i] += accel;
        if (filaElecX[i] < minX) filaElecVx[i] = +abs(filaElecVx[i]);
        if (filaElecX[i] > maxX) filaElecVx[i] = -abs(filaElecVx[i]);
        if (filaElecY[i] < minY) { filaElecX[i] = random(minX, maxX); filaElecY[i] = maxY; }
        if (filaElecY[i] > maxY) { filaElecX[i] = random(minX, maxX); filaElecY[i] = minY; }
      }
      for (let i = 0; i < filaAtomX.length; i++) {
        filaAtomX[i] = lerp(filaAtomX[i], filaAtomXo[i], 0.1);
        filaAtomY[i] = lerp(filaAtomY[i], filaAtomYo[i], 0.1);
      }
      for (let i = 0; i < leadElecX.length; i++) {
        leadElecX[i] += leadElecVx[i];
        leadElecY[i] += leadElecVy[i] + (checkA.checked() ? 0.5 : 0);
        for (let j = 0; j < leadAtomX.length; j++) {
          let d = dist(leadAtomX[j], leadAtomY[j], leadElecX[i], leadElecY[i]);
          if (d < 26) {
            let x1 = leadElecX[i] - leadElecVx[i], y1 = leadElecY[i] - leadElecVy[i];
            let x2 = leadElecX[i], y2 = leadElecY[i];
            let t1 = atan2(y1 - leadAtomY[j], x1 - leadAtomX[j]);
            let t2 = atan2(y2 - leadAtomY[j], x2 - leadAtomX[j]);
            x1 = leadAtomX[j] + 26 * cos(t1); y1 = leadAtomY[j] + 26 * sin(t1);
            x2 = leadAtomX[j] + 26 * cos(t2); y2 = leadAtomY[j] + 26 * sin(t2);
            let t = atan2(y2 - y1, x2 - x1);
            let v = mag(leadElecVx[i], leadElecVy[i]);
            leadElecX[i] = x2; leadElecY[i] = y2;
            leadElecVx[i] = v * cos(t); leadElecVy[i] = v * sin(t);
          }
        }
        if (leadElecX[i] < minX) leadElecVx[i] = +abs(leadElecVx[i]);
        if (leadElecX[i] > maxX) leadElecVx[i] = -abs(leadElecVx[i]);
        if (leadElecY[i] < minY) { leadElecX[i] = random(minX, maxX); leadElecY[i] = maxY; }
        if (leadElecY[i] > maxY) { leadElecX[i] = random(minX, maxX); leadElecY[i] = minY; }
      }
    }

      {
        question: "关于白炽灯与电阻发热，下列说法错误的是？",
        options: ["钨丝电阻随温度升高而增大", "白炽灯是利用电流热效应工作的", "白炽灯中电能100%转化为光能", "螺旋状灯丝可以增加有效长度并减少散热"],
        answer: 2,
        explain: "C明显错误——白炽灯只有约5-10%电能转化为可见光。A正确（金属电阻随温度升高增大），B正确（电流热效应是基础原理），D正确（螺旋结构增大电阻、减小散热面积、提高灯丝温度）。"
      }
    ];

    const LEVEL_NAMES = ['第1关：电流热效应基础', '第2关：电阻与发热', '第3关：综合分析与应用'];
    const LEVEL_BOUNDARIES = [0, 5, 10, 15];

    let quizState = {
      currentIndex: 0,
      answers: new Array(15).fill(null),
      confirmed: new Array(15).fill(false),
      quizDone: false,
      levelStars: [0, 0, 0]
    };

    function loadQuizProgress() {
      try {
        let saved = localStorage.getItem(QUIZ_STORAGE_KEY);
        if (saved) {
          let data = JSON.parse(saved);
          if (data.experiment === EXPERIMENT_KEY && data.answers && data.answers.length === 15) {
            quizState.answers = data.answers;
            quizState.confirmed = data.confirmed || new Array(15).fill(false);
            quizState.currentIndex = data.currentIndex || 0;
            quizState.quizDone = data.quizDone || false;
            quizState.levelStars = data.levelStars || [0, 0, 0];
          }
        }
      } catch(e) {}
    }

    function saveQuizProgress() {
      try {
        localStorage.setItem(QUIZ_STORAGE_KEY, JSON.stringify({
          experiment: EXPERIMENT_KEY,
          answers: quizState.answers,
          confirmed: quizState.confirmed,
          currentIndex: quizState.currentIndex,
          quizDone: quizState.quizDone,
          levelStars: quizState.levelStars
        }));
      } catch(e) {}
    }

    function getCurrentLevel() {
      for (let i = LEVEL_BOUNDARIES.length - 1; i >= 0; i--) {
        if (quizState.currentIndex >= LEVEL_BOUNDARIES[i]) return i;
      }
      return 0;
    }

    function checkAllCorrectInLevel(levelIdx) {
      let start = LEVEL_BOUNDARIES[levelIdx];
      let end = LEVEL_BOUNDARIES[levelIdx + 1];
      for (let i = start; i < end; i++) {
        if (quizState.answers[i] !== quizQuestions[i].answer) return false;
      }
      return true;
    }

    function getStarsForLevel(levelIdx) {
      if (!checkAllCorrectInLevel(levelIdx)) return 0;
      let start = LEVEL_BOUNDARIES[levelIdx];
      let end = LEVEL_BOUNDARIES[levelIdx + 1];
      let correct = 0;
      for (let i = start; i < end; i++) {
        if (quizState.answers[i] === quizQuestions[i].answer) correct++;
      }
      let total = end - start;
      let ratio = correct / total;
      if (ratio >= 1) return 3;
      if (ratio >= 0.8) return 2;
      if (ratio >= 0.6) return 1;
      return 0;
    }

    function openQuiz() {
      loadQuizProgress();
      document.getElementById('quizContainer').classList.add('show');
      quizState.quizDone = false;
      renderQuiz();

      // Pause animation when quiz opens
      if (checkPause && !checkPause.checked()) {
        checkPause.checked(true);
      }
    }

    function closeQuiz() {
      document.getElementById('quizContainer').classList.remove('show');
      saveQuizProgress();

      // Resume animation when quiz closes
      if (checkPause && checkPause.checked()) {
        checkPause.checked(false);
      }
    }

    function renderQuiz() {
      const body = document.getElementById('quizBody');
      if (quizState.quizDone) {
        renderResult(body);
        return;
      }

      let levelIdx = getCurrentLevel();
      let q = quizQuestions[quizState.currentIndex];
      let progress = ((quizState.currentIndex + 1) / quizQuestions.length) * 100;

      let optionsHtml = '';
      for (let i = 0; i < q.options.length; i++) {
        let cls = 'quiz-option';
        if (quizState.confirmed[quizState.currentIndex]) {
          cls += ' disabled';
          if (i === quizState.answers[quizState.currentIndex]) {
            cls += (i === q.answer) ? ' correct' : ' wrong';
          }
          if (i === q.answer && quizState.answers[quizState.currentIndex] !== i) {
            cls += ' correct';
          }
        } else if (quizState.answers[quizState.currentIndex] === i) {
          cls += ' selected';
        }
        optionsHtml += '<div class="' + cls + '" data-optindex="' + i + '" onclick="selectOption(' + i + ')">' + q.options[i] + '</div>';
      }

      let showExplain = quizState.confirmed[quizState.currentIndex];
      let navHtml = '';

      if (showExplain) {
        navHtml = '<div class="quiz-explain show">' +
          '<div class="quiz-explain-label">解析</div>' +
          '<div class="quiz-explain-text">' + q.explain + '</div>' +
          '</div>' +
          '<div class="quiz-nav">' +
          '<button class="quiz-nav-btn prev" onclick="prevQuestion()"' + (quizState.currentIndex === 0 ? ' disabled' : '') + '>上一题</button>' +
          '<span style="color:#888;font-size:14px;">' + (quizState.currentIndex + 1) + ' / ' + quizQuestions.length + '</span>' +
          '<button class="quiz-nav-btn next" onclick="nextQuestion()">' + (quizState.currentIndex < quizQuestions.length - 1 ? '下一题' : '查看结果') + '</button>' +
          '</div>';
      } else {
        navHtml = '<div class="quiz-nav">' +
          '<button class="quiz-nav-btn prev" onclick="prevQuestion()"' + (quizState.currentIndex === 0 ? ' disabled' : '') + '>上一题</button>' +
          '<span style="color:#888;font-size:14px;">' + (quizState.currentIndex + 1) + ' / ' + quizQuestions.length + '</span>' +
          '<button class="quiz-nav-btn next" onclick="confirmAnswer()"' + (quizState.answers[quizState.currentIndex] === null ? ' disabled' : '') + '>确认答案</button>' +
          '</div>';
      }

      // Level stars display
      let starsHtml = '';
      for (let s = 0; s < 3; s++) {
        let starActive = s < quizState.levelStars[levelIdx] ? 'active' : '';
        starsHtml += '<span class="star ' + starActive + '">&#9733;</span>';
      }

      body.innerHTML = '<div class="quiz-level">' + LEVEL_NAMES[levelIdx] + ' &nbsp;|&nbsp; ' + starsHtml + '</div>' +
        '<div class="quiz-progress"><div class="quiz-progress-bar" style="width:' + progress + '%"></div></div>' +
        '<div class="quiz-question">' + (quizState.currentIndex + 1) + '. ' + q.question + '</div>' +
        '<div class="quiz-options">' + optionsHtml + '</div>' +
        navHtml;
    }

    function selectOption(idx) {
      if (quizState.confirmed[quizState.currentIndex]) return;
      quizState.answers[quizState.currentIndex] = idx;
      renderQuiz();
    }

    function confirmAnswer() {
      if (quizState.answers[quizState.currentIndex] === null) return;
      quizState.confirmed[quizState.currentIndex] = true;

      // Update level stars
      let levelIdx = getCurrentLevel();
      quizState.levelStars[levelIdx] = getStarsForLevel(levelIdx);

      renderQuiz();
      saveQuizProgress();
    }

    function prevQuestion() {
      if (quizState.currentIndex > 0) {
        quizState.currentIndex--;
        renderQuiz();
      }
    }

    function nextQuestion() {
      if (quizState.currentIndex < quizQuestions.length - 1) {
        quizState.currentIndex++;
        renderQuiz();
      } else {
        // All done, show results
        quizState.quizDone = true;
        renderResult(document.getElementById('quizBody'));
        saveQuizProgress();
      }
    }

    function renderResult() {
      let totalCorrect = 0;
      for (let i = 0; i < quizQuestions.length; i++) {
        if (quizState.answers[i] === quizQuestions[i].answer) totalCorrect++;
      }

      // Stars for all levels
      let levelStars = [];
      let levelResults = [];
      for (let l = 0; l < 3; l++) {
        let stars = quizState.levelStars[l] || getStarsForLevel(l);
        levelStars.push(stars);
        let start = LEVEL_BOUNDARIES[l];
        let end = LEVEL_BOUNDARIES[l + 1];
        let correct = 0;
        for (let i = start; i < end; i++) {
          if (quizState.answers[i] === quizQuestions[i].answer) correct++;
        }
        levelResults.push(LEVEL_NAMES[l] + ': ' + correct + '/' + (end - start) + ' 正确');
      }

      let allStars = levelStars.reduce(function(a, b) { return a + b; }, 0);
      let totalStars = '';
      for (let i = 0; i < 3; i++) {
        totalStars += '<span class="star">&#9733;</span>';
      }

      // Try saving to Supabase
      let supabaseNote = '';
      if (typeof supabase !== 'undefined' && supabase) {
        try {
          var userData = localStorage.getItem('user');
          if (userData) {
            var u = JSON.parse(userData);
            supabase.from('users').select('quiz_data').eq('id', u.id).single().then(function(res) {
              var quizData = (res.data && res.data.quiz_data) ? res.data.quiz_data : {};
              quizData[EXPERIMENT_KEY] = {
                correct: totalCorrect,
                total: quizQuestions.length,
                stars: allStars,
                updated_at: new Date().toISOString()
              };
              supabase.from('users').update({ quiz_data: quizData }).eq('id', u.id).then(function(){});
            });
          }
        } catch(e) {}
        supabaseNote = '<div style="font-size:12px;color:#666;margin-top:12px;">成绩已保存</div>';
      }

      let detailHtml = '';
      for (let i = 0; i < quizQuestions.length; i++) {
        let isCorrect = quizState.answers[i] === quizQuestions[i].answer;
        let color = isCorrect ? '#81c784' : '#ef9a9a';
        let icon = isCorrect ? '&#10003;' : '&#10007;';
        detailHtml += '<div style="font-size:13px;color:' + color + ';padding:3px 0;">' + (i + 1) + '. ' + icon + ' ' + quizQuestions[i].question.substring(0, 20) + '...</div>';
      }

      document.getElementById('quizBody').innerHTML = '<div class="quiz-result">' +
        '<div class="stars">' + totalStars + '</div>' +
        '<div class="big-score">' + totalCorrect + '/' + quizQuestions.length + '</div>' +
        '<div class="result-label">挑战完成！</div>' +
        '<div class="result-detail">' + levelResults.join('<br>') + '</div>' +
        '<div style="margin:16px 0;text-align:left;background:rgba(255,255,255,0.04);border-radius:12px;padding:16px;">' +
        '<div style="font-size:14px;color:#888;margin-bottom:8px;">答题详情：</div>' +
        detailHtml +
        '</div>' +
        supabaseNote +
        '<button class="restart-btn" onclick="resetQuiz()">重新挑战</button>' +
        '</div>';
    }

    function resetQuiz() {
      quizState = {
        currentIndex: 0,
        answers: new Array(15).fill(null),
        confirmed: new Array(15).fill(false),
        quizDone: false,
        levelStars: [0, 0, 0]
      };
      saveQuizProgress();
      renderQuiz();
    }

    function initQuiz() {
      checkPause = select("#checkPause");
      chalkPause = select("#chalkPause");
      loadQuizProgress();
    }

    // Override setup to include quiz init
    var _origSetupIL = setup;
    setup = function() {
      _origSetupIL();
      initQuiz();
    };
  </script>
  <script>
    (function() {
      var header = document.querySelector('.header');
      var hideTimer = null;
      var HIDE_DELAY = 800;
      function show() { clearTimeout(hideTimer); header.classList.remove('hidden'); document.body.classList.remove('header-hidden'); }
      function hide() { hideTimer = setTimeout(function() { header.classList.add('hidden'); document.body.classList.add('header-hidden'); }, HIDE_DELAY); }
      document.addEventListener('mousemove', function(e) {
        if (e.clientY <= 60) show();
        else if (e.clientY > header.offsetHeight + 20 && !header.classList.contains('hidden')) hide();
      });
      header.addEventListener('mouseenter', show);
      header.addEventListener('mouseleave', hide);
      hideTimer = setTimeout(function() { header.classList.add('hidden'); document.body.classList.add('header-hidden'); }, 2000);
    })();
  </script>
</body>
</html>
