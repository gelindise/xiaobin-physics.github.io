  <div class="section">
    <h2>吉他的琴弦发声 — 谐波与频率</h2>
    <p style="color:#94a3b8;margin:0 0 16px 0;">弦两端固定，拨动后形成驻波。调节按弦位置改变弦长，弦越短音调越高；调节松紧改变张力，弦越紧音调越高。选择不同谐波模式观察振动形态。</p>
  </div>

  <div class="main-card">
    <div class="canvas-wrap">
      <div id="myContainer"></div>
    </div>
    <div class="controls-bar">
      <div class="ctrl-col" id="radioA"></div>
      <div class="ctrl-col">
        <label id="spanA">按弦位置</label>
        <input type="range" id="rangeA" min="0" max="100" value="50">
      </div>
      <div class="ctrl-col">
        <label id="spanB">振幅</label>
        <input type="range" id="rangeB" min="0" max="100" value="50">
      </div>
      <div class="ctrl-col">
        <label id="spanC">弦的松紧</label>
        <div style="display:flex;align-items:center;gap:4px;">
          <span style="color:#888;font-size:10px;">松</span>
          <input type="range" id="rangeC" min="0" max="100" value="50">
          <span style="color:#888;font-size:10px;">紧</span>
        </div>
      </div>
      <div class="ctrl-col">
        <input type="checkbox" id="checkA" name="checkA" value="checkA" unchecked />
        <label for="checkA" id="checkAlabel">聆听声音（正弦波）</label>
      </div>
      <div class="ctrl-col">
        <label style="color:#ccc;font-size:12px;display:flex;align-items:center;gap:4px;"><input type="checkbox" id="quizPauseCheck" style="accent-color:#8b5cf6;"> 暂停实验</label>
      </div>
      <div class="ctrl-col">
        <button class="btn-primary" id="btnChallenge" style="font-size:13px;padding:4px 14px;background:linear-gradient(135deg,#8b5cf6,#06b6d4);">过关挑战</button>
      </div>
      <span class="hint-text">弦越紧音越高 | 谐波越高节点越多</span>
    </div>
  </div>

  <div class="formula-bar">
    <div class="formula-item">
      <span class="label">驻波条件</span>
      <span class="value">L = n·λ/2 &nbsp;→&nbsp; 弦长等于半波长的整数倍时形成驻波</span>
    </div>
    <div class="formula-item">
      <span class="label">频率公式</span>
      <span class="value">f = n·v/(2L) &nbsp;—&nbsp; 波速 v=√(T/μ)，张力越大频率越高</span>
    </div>
    <div class="formula-item">
      <span class="label">谐波系列</span>
      <span class="value">基频 f₀ → 2f₀（第2谐波）→ 3f₀（第3谐波）→ …</span>
    </div>
  </div>

  <script src="protect.js"></script>
  <script>
  // ---- state ----
  var radioA;
  var spanA, spanB, spanC, rangeA, rangeB, rangeC, checkA, checkAlabel;
  var osc1, osc2, osc4;
  var guitarImage, fingerImage;
  var minX = 0.155;
  var fingerX = 0.2;
  var maxX = 0.828;
  var tabOX = [0, 0.1125, 0.0684, 0.024, 0.024, 0.0684, 0.1125];
  var tabOY = [0, 0.2, 0.2, 0.2, 0.16, 0.16, 0.16];
  var tabY  = [0, 0.195, 0.195, 0.195, 0.165, 0.165, 0.165];
  var lineY = [0, 0.2, 0.192, 0.184, 0.176, 0.168, 0.16];
  var lineWeight = [0, 0.00244949, 0.002236068, 0.002, 0.001732051, 0.001414214, 0.001];
  var waveMax = 200;
  var wave = [];
  var timming = 0;

  function preload() {
    guitarImage = loadImage("standing_wave_guitar.png");
    fingerImage = loadImage("standing_wave_finger.png");
  }

  function setup() {
    frameRate(60);
    var o = select("#myContainer");
    var a = 0.36;
    var w = int((o.width > (window.innerHeight - 160) / a) ? (window.innerHeight - 160) / a : o.width);
    var h = int(w * a);
    myCanvas = createCanvas(w, h);
    myCanvas.parent("myContainer");
    myCanvas.id("myP5Canvas");

    spanA = select("#spanA");
    spanA.html("按弦位置");
    spanB = select("#spanB");
    spanB.html("振幅");
    spanC = select("#spanC");
    spanC.html("弦的松紧");
    rangeA = select("#rangeA");
    rangeB = select("#rangeB");
    rangeC = select("#rangeC");
    checkA = select("#checkA");
    checkA.changed(setup2);
    checkAlabel = select("#checkAlabel");
    checkAlabel.html("聆听声音（正弦波）");

    radioA = createRadio("radioA");
    radioA.option("1", "1");
    radioA.option("2", "2");
    radioA.option("3", "3");
    radioA.option("4", "4");
    radioA.option("5", "5");
    radioA.option("6", "6");
    radioA.parent("radioA");
    radioA.value("1");
    radioA.changed(setup2);

    osc1 = new p5.Oscillator();
    osc1.setType('sine');
    osc1.amp(0);
    osc2 = new p5.Oscillator();
    osc2.setType('sine');
    osc2.amp(0);
    osc4 = new p5.Oscillator();
    osc4.setType('sine');
    osc4.amp(0);

    setup2();
  }

  function windowResized() {
    var o = select("#myContainer");
    var a = 0.36;
    var w = int((o.width > (window.innerHeight - 160) / a) ? (window.innerHeight - 160) / a : o.width);
    var h = int(w * a);
    resizeCanvas(w, h);
  }

  function setup2() {
    var lineNum = int(radioA.value());
    for (var i = 0; i < waveMax; i++) {
      wave[i] = sin(map(i, 0, waveMax - 1, 0, PI * lineNum));
    }
    if (checkA.checked()) {
      osc1.start();
      osc2.start();
      osc4.start();
    } else {
      osc1.amp(0, 0.5);
      osc2.amp(0, 0.5);
      osc4.amp(0, 0.5);
    }
  }

  function draw() {
    if (touches.length > 1) return;
    strokeWeight(width * 0.001);
    textSize(width * 0.025);
    textAlign(CENTER, CENTER);

    if (getAudioContext().state !== 'running') {
      getAudioContext().resume();
    }

    image(guitarImage, 0, 0, width, width * 0.36);

    var lineNum = int(radioA.value());
    fingerX = map(rangeA.value(), 0, 200, minX, maxX);
    // tension: 0=loose(0.25x) → 50=normal(1x) → 100=tight(2x), f ∝ √T
    var tensionFactor = map(rangeC.value(), 0, 100, 0.25, 2.0);
    var tensionSqrt = sqrt(tensionFactor);
    var _pchk = document.getElementById('quizPauseCheck');
    if (!(_pchk && _pchk.checked)) {
      timming += 0.05 * lineNum * (-200 / (rangeA.value() - 200)) * tensionSqrt;
    }
    var amplitude = map(rangeB.value(), 0, 100, 0, 0.02) * sin(timming);
    var frequency = sqrt(lineNum) * 200 * (-200 / (rangeA.value() - 200)) * tensionSqrt;

    osc1.freq(frequency);
    osc2.freq(frequency / 2);
    osc4.freq(frequency / 4);

    if (checkA.checked()) {
      var oscAmp = map(rangeB.value(), 0, 100, 0, 0.5);
      osc1.amp(oscAmp);
      osc2.amp(oscAmp / 2);
      osc4.amp(oscAmp / 4);
    }

    // Draw string with standing wave
    noFill();
    stroke(0);
    strokeWeight(width * lineWeight[lineNum]);
    beginShape();
    vertex(width * tabOX[lineNum], width * tabY[lineNum]);
    vertex(width * minX, width * lineY[lineNum]);
    vertex(width * fingerX, width * lineY[lineNum]);
    for (var i = 0; i < waveMax; i++) {
      vertex(width * map(i, 0, waveMax - 1, fingerX, maxX),
        width * (lineY[lineNum] + amplitude * wave[i]));
    }
    endShape();

    // Draw nut position markers
    noStroke();
    fill(217);
    for (var i = 1; i < 7; i++) {
      ellipse(width * tabOX[i], width * tabOY[i], width * 0.01, width * 0.01);
    }

    // Draw finger image
    if (rangeA.value() > 0) {
      image(fingerImage, width * (fingerX - 0.038), width * (lineY[lineNum] - 0.005),
        width * 0.0005 * fingerImage.width, width * 0.0005 * fingerImage.height);
    }
  }
  </script>
  <script src="supabase.js"></script>

  <!-- 过关挑战答题界面 -->
  <div id="quizOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;overflow-y:auto;">
    <div style="max-width:700px;margin:40px auto;background:#1a1a2e;border:1px solid #333;border-radius:16px;padding:24px 32px;color:#e2e8f0;">
      <div id="quizHeader" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <span style="font-size:18px;font-weight:bold;" id="quizTitle">第 1 关 (1/3)</span>
        <div style="display:flex;gap:8px;">
          <button class="btn-reset" id="btnResetQuiz" style="font-size:12px;">&#8634; 重置</button>
          <button class="btn-reset" id="btnCloseQuiz" style="font-size:12px;">&#10005; 退出</button>
        </div>
      </div>
      <div id="quizProgress" style="height:4px;background:#333;border-radius:2px;margin-bottom:20px;">
        <div id="quizProgressFill" style="height:100%;background:#8b5cf6;border-radius:2px;width:0%;transition:width 0.3s;"></div>
      </div>
      <div id="quizBody"></div>

  <script>
  // ============================
  //  QUIZ CHALLENGE — 过关挑战
  // ============================
  var QUIZ_STORAGE_KEY = "quiz_standing_wave_progress";
  var EXPERIMENT_KEY = "standing_wave";

  var quizQuestions = [
    // ===== 第1关：驻波基础 =====
    { q: "两端固定的弦上形成驻波的条件是弦长等于____的整数倍。", opts: ["波长", "半波长", "四分之一波长", "二倍波长"], ans: 1, explain: "两端固定的弦，形成稳定驻波需要弦长等于半波长的整数倍：L=n·λ/2（n=1,2,3...）。此时入射波与反射波相位匹配，形成稳定的驻波图案。" },
    { q: "驻波中振幅始终为零的位置叫做____。", opts: ["波腹", "波节", "波源", "波谷"], ans: 1, explain: "波节（node）是驻波中振幅始终为零的点，即弦上始终不动的点。对于基频（n=1），两个端点就是波节。" },
    { q: "驻波中振幅最大的位置叫做____。", opts: ["波节", "波腹", "波峰", "波源"], ans: 1, explain: "波腹（antinode）是驻波中振幅最大的位置，弦在这里上下振动的幅度最大。基频的波腹在弦的正中间。" },
    { q: "基频（第一谐波）对应的驻波有____个波腹（antinode）。", opts: ["0", "1", "2", "3"], ans: 1, explain: "基频（n=1）时，弦上只有半波长，中间有一个波腹，两端为波节。这是弦振动最简单、频率最低的模式。" },
    { q: "驻波是由什么叠加形成的？", opts: ["一列行进波", "两列同频、等幅、相向传播的波", "两列不同频率的波", "一列纵波"], ans: 1, explain: "驻波由两列频率相同、振幅相同、振动方向相同但传播方向相反的波叠加而成。在弦上就是入射波和反射波叠加的结果。" },
    // ===== 第2关：谐波与频率 =====
    { q: "第n谐波对应的驻波有____个波腹。", opts: ["n-1", "n", "n+1", "2n"], ans: 1, explain: "第n谐波（即第n个振动模式）的弦上有n个半波长，对应n个波腹。基频n=1有1个波腹，第2谐波有2个波腹。" },
    { q: "弦振动频率f与弦长L的关系是____。", opts: ["f正比于L", "f正比于1/L", "f正比于L²", "f与L无关"], ans: 1, explain: "根据公式f=n·v/(2L)，频率与弦长成反比。弦越短频率越高、音调越高。这就是为什么按弦越靠琴头发出的音越高。" },
    { q: "弦上横波的波速公式是v=____。", opts: ["√(T·μ)", "√(T/μ)", "T/μ", "μ/T"], ans: 1, explain: "弦上横波的波速v=√(T/μ)，其中T为弦的张力，μ为弦的线密度（单位长度的质量）。张力越大、弦越细，波速越快。" },
    { q: "弦的张力增大时，振动频率会____。", opts: ["降低", "不变", "升高", "先降后升"], ans: 2, explain: "张力T增大→波速v=√(T/μ)增大→频率f=n·v/(2L)增大。这就是为什么吉他调音时弦越紧音调越高。" },
    { q: "琴弦越短，音调____。", opts: ["越低", "不变", "越高", "先高后低"], ans: 2, explain: "弦长L越短→频率f=n·v/(2L)越高→音调越高。手指按在弦上不同位置实际上就是改变了有效弦长，从而改变音高。" },
    // ===== 第3关：综合应用 =====
    { q: "第二谐波（n=2）的频率是基频的____倍。", opts: ["1", "2", "3", "4"], ans: 1, explain: "f_n=n·f₁，第二谐波频率=2×基频。谐波频率是基频的整数倍，这是弦振动的重要特征。" },
    { q: "弦的线密度μ增大时（其他条件不变），频率会____。", opts: ["降低", "升高", "不变", "先降后升"], ans: 0, explain: "μ增大→波速v=√(T/μ)减小→频率f=n·v/(2L)减小。这就是粗弦发出的音调比细弦低——吉他最低音用的就是最粗的弦。" },
    { q: "手指按住弦的不同位置，改变的是____。", opts: ["弦的张力", "弦的线密度", "有效弦长", "弦的材料"], ans: 2, explain: "手指按弦将弦紧压在指板上形成新端点，缩短了有效弦长L。弦长变短→频率升高→音调变高。按的位置不同弦长不同音高就不同。" },
    { q: "两端固定弦的第n谐波，弦内部（不含两端）的波节数为____。", opts: ["n", "n-1", "n+1", "2n"], ans: 1, explain: "第n谐波共有n+1个波节（含两端）。去掉两端后内部有n-1个波节。例如第2谐波内部有1个波节（弦正中），第3谐波内部有2个。" },
    { q: "吉他调音时旋紧弦钮，弦的张力____，音调____。", opts: ["减小，降低", "增大，升高", "不变，不变", "增大，降低"], ans: 1, explain: "旋紧弦钮→弦被拉得更紧→张力T增大→波速增大→频率增大→音调升高。反之旋松弦钮音调降低。这就是吉他调音的基本原理。" }
  ];

  var quizRound = 0;
  var quizIndex = 0;
  var quizAnswers = [];
  var quizLocked = false;
  var quizScores = [0, 0, 0];
  var quizHighestRound = 0;

  function initQuiz() {
    document.getElementById("btnChallenge").addEventListener("click", startQuiz);
    document.getElementById("btnCloseQuiz").addEventListener("click", closeQuiz);
    document.getElementById("btnResetQuiz").addEventListener("click", resetQuiz);
    updateChallengeButton();
  }

  var _origSetupSW = setup;
  setup = function() {
    _origSetupSW();
    initQuiz();
  };

  function updateChallengeButton() {
    loadProgress().then(function(saved) {
      if (saved && (saved.scores[0] > 0 || saved.round > 0)) {
        var totalDone = saved.scores[0] + (saved.scores[1] || 0) + (saved.scores[2] || 0);
        document.getElementById("btnChallenge").textContent = "继续挑战 (已得" + totalDone + "/15分)";
      } else {
        document.getElementById("btnChallenge").textContent = "过关挑战";
      }
    });
  }

  function getUsername() {
    try { return localStorage.getItem("currentUser"); } catch(e) { return null; }
  }

  function saveProgress() {
    var data = { round: quizRound, scores: quizScores, highestRound: quizHighestRound, updatedAt: new Date().toISOString() };
    try { localStorage.setItem(QUIZ_STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
    var username = getUsername();
    if (username) saveQuizToServer(username, data);
  }

  function saveQuizToServer(username, data) {
    try {
      SB.getUser(username).then(function(users) {
        if (users && users.length > 0) {
          var user = users[0];
          var quizData = user.quiz_data;
          if (typeof quizData === "string") quizData = JSON.parse(quizData);
          if (!quizData || typeof quizData !== "object") quizData = {};
          quizData[EXPERIMENT_KEY] = data;
          SB.updateUser(username, { quiz_data: quizData }).catch(function(){});
        }
      }).catch(function(){});
    } catch(e) {}
  }

  async function loadProgress() {
    var username = getUsername();
    if (username) {
      try {
        var users = await SB.getUser(username);
        if (users && users.length > 0) {
          var user = users[0];
          var quizData = user.quiz_data;
          if (typeof quizData === "string") quizData = JSON.parse(quizData);
          if (quizData && quizData[EXPERIMENT_KEY]) {
            var serverData = quizData[EXPERIMENT_KEY];
            try { localStorage.setItem(QUIZ_STORAGE_KEY, JSON.stringify(serverData)); } catch(e) {}
            return serverData;
          }
        }
      } catch(e) {}
    }
    try {
      var raw = localStorage.getItem(QUIZ_STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    return null;
  }

  function clearProgress() {
    try { localStorage.removeItem(QUIZ_STORAGE_KEY); } catch(e) {}
    var username = getUsername();
    if (username) {
      try {
        SB.getUser(username).then(function(users) {
          if (users && users.length > 0) {
            var user = users[0];
            var quizData = user.quiz_data;
            if (typeof quizData === "string") quizData = JSON.parse(quizData);
            if (quizData && typeof quizData === "object") {
              delete quizData[EXPERIMENT_KEY];
              SB.updateUser(username, { quiz_data: quizData }).catch(function(){});
            }
          }
        }).catch(function(){});
      } catch(e) {}
    }
  }

  function startQuiz() {
    loadProgress().then(function(saved) {
      if (saved && saved.highestRound >= 0 && (saved.scores[0] > 0 || saved.round > 0)) {
        quizRound = Math.min(saved.round + 1, 2);
        quizScores = saved.scores.slice();
        quizHighestRound = saved.highestRound;
      } else {
        quizRound = 0; quizScores = [0,0,0]; quizHighestRound = 0;
      }
      document.getElementById("quizOverlay").style.display = "block";
      document.getElementById("quizPauseCheck").checked = true;
      renderRound();
    });
  }

  function closeQuiz() {
    document.getElementById("quizOverlay").style.display = "none";
    document.getElementById("quizPauseCheck").checked = false;
    updateChallengeButton();
  }

  function resetQuiz() {
    if (confirm("确定要重置所有挑战进度吗？当前进度将丢失。")) {
      quizRound = 0; quizScores = [0,0,0]; quizHighestRound = 0;
      clearProgress();
      renderRound();
    }
  }

  function renderRound() {
    quizIndex = 0; quizAnswers = []; quizLocked = false;
    document.getElementById("quizResult").style.display = "none";
    document.getElementById("quizBody").style.display = "block";
    document.getElementById("quizTitle").textContent = "第 " + (quizRound + 1) + " 关 (题目 " + (quizRound * 5 + 1) + "-" + (quizRound * 5 + 5) + "/15)";
    document.getElementById("quizProgressFill").style.width = (quizRound * (100/3)) + "%";
    renderQuestion();
  }

  function renderQuestion() {
    var q = quizQuestions[quizRound * 5 + quizIndex];
    var html = '<div class="quiz-question">' + (quizIndex + 1) + ". " + q.q + "</div>";
    var labels = ["A", "B", "C", "D"];
    for (var i = 0; i < q.opts.length; i++) {
      html += '<button class="quiz-option" data-idx="' + i + '" ';
      if (quizLocked) html += 'disabled ';
      html += '>' + labels[i] + ". " + q.opts[i] + "</button>";
    }
    document.getElementById("quizBody").innerHTML = html;
    var opts = document.querySelectorAll("#quizBody .quiz-option");
    for (var j = 0; j < opts.length; j++) {
      (function(idx) {
        opts[j].addEventListener("click", function() { selectAnswer(idx); });
      })(j);
    }
  }

  function selectAnswer(idx) {
    if (quizLocked) return;
    quizLocked = true;
    quizAnswers.push(idx);
    var q = quizQuestions[quizRound * 5 + quizIndex];
    var correct = q.ans;
    var opts = document.querySelectorAll("#quizBody .quiz-option");
    for (var i = 0; i < opts.length; i++) {
      opts[i].disabled = true;
      if (i === correct) opts[i].classList.add("correct");
      if (i === idx && idx !== correct) opts[i].classList.add("wrong");
    }
    setTimeout(function() {
      quizIndex++;
      if (quizIndex < 5) { quizLocked = false; renderQuestion(); }
      else showRoundResult();
    }, 1200);
  }

  function getStars(score, total) {
    if (score === total) return "⭐⭐⭐";
    if (score >= total - 1) return "⭐⭐";
    if (score >= Math.ceil(total / 2)) return "⭐";
    return "";
  }

  function showRoundResult() {
    var correctCount = 0;
    for (var i = 0; i < 5; i++) {
      if (quizAnswers[i] === quizQuestions[quizRound * 5 + i].ans) correctCount++;
    }
    quizScores[quizRound] = correctCount;
    if (quizRound > quizHighestRound) quizHighestRound = quizRound;
    saveProgress();

    document.getElementById("quizBody").style.display = "none";
    document.getElementById("quizResult").style.display = "block";

    var stars = getStars(correctCount, 5);
    var scoreClass = correctCount >= 4 ? "great" : (correctCount >= 2 ? "good" : "poor");
    var comment = correctCount >= 4 ? "太棒了！" : (correctCount >= 2 ? "继续加油！" : "再看看实验吧！");

    var html = '<div class="quiz-score ' + scoreClass + '">' + correctCount + "/5</div>";
    if (stars) html += '<p style="font-size:20px;margin:4px 0;">' + stars + "</p>";
    html += '<p style="font-size:16px;margin:8px 0;color:#94a3b8;">' + comment + "</p>";

    if (quizRound < 2) {
      html += '<p style="font-size:13px;color:#64748b;margin-bottom:8px;">已完成第' + (quizRound + 1) + '关，进度已保存</p>';
      html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnReviewRound" style="font-size:14px;">&#128203; 查看回顾</button></div>';
      html += '<div class="quiz-btn-row">';
      html += '<button class="btn-primary" id="btnNextRound" style="font-size:14px;padding:8px 24px;">进入下一关</button>';
      html += '<button class="btn-reset" id="btnRetryRound" style="font-size:14px;">重新挑战本关</button>';
      html += "</div>";
    } else {
      var total = quizScores[0] + quizScores[1] + quizScores[2];
      var totalClass = total >= 12 ? "great" : (total >= 8 ? "good" : "poor");
      var totalStars = getStars(total, 15);
      html = '<div class="quiz-score ' + totalClass + '">' + total + '/15</div>';
      if (totalStars) html += '<p style="font-size:20px;margin:4px 0;">' + totalStars + '</p>';
      html += '<p style="font-size:14px;color:#94a3b8;margin-bottom:8px;">第1关: ' + quizScores[0] + '/5 &nbsp; 第2关: ' + quizScores[1] + '/5 &nbsp; 第3关: ' + quizScores[2] + '/5</p>';
      html += '<p style="font-size:16px;margin:8px 0;color:' + (total >= 12 ? '#22c55e' : total >= 8 ? '#f59e0b' : '#ef4444') + ';">' + (total >= 12 ? '恭喜通关！你对驻波知识理解透彻！' : total >= 8 ? '还不错，再复习一下错题吧！' : '建议回到实验观察不同谐波模式下弦的振动形态。') + '</p>';
      html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnReviewRound" style="font-size:14px;">&#128203; 查看回顾</button></div>';
      html += '<div class="quiz-btn-row">';
      html += '<button class="btn-primary" id="btnRetryAll" style="font-size:14px;padding:8px 24px;">重新全部挑战</button>';
      html += '<button class="btn-reset" id="btnBackExp" style="font-size:14px;">返回实验</button>';
      html += '</div>';
    }
    document.getElementById("quizResult").innerHTML = html;
    bindResultButtons();
  }

  function bindResultButtons() {
    setTimeout(function() {
      var btnNext = document.getElementById("btnNextRound");
      var btnRetry = document.getElementById("btnRetryRound");
      var btnRetryAll = document.getElementById("btnRetryAll");
      var btnBack = document.getElementById("btnBackExp");
      var btnReview = document.getElementById("btnReviewRound");
      if (btnNext) btnNext.addEventListener("click", function() { quizRound++; renderRound(); });
      if (btnRetry) btnRetry.addEventListener("click", function() { renderRound(); });
      if (btnRetryAll) btnRetryAll.addEventListener("click", function() {
        quizRound = 0; quizScores = [0,0,0]; quizHighestRound = 0;
        clearProgress(); renderRound();
      });
      if (btnBack) btnBack.addEventListener("click", function() { closeQuiz(); });
      if (btnReview) btnReview.addEventListener("click", function() { showReview(); });
    }, 100);
  }

  function showReview() {
    var html = '<p style="font-size:16px;font-weight:bold;margin-bottom:16px;color:#e2e8f0;">第' + (quizRound + 1) + '关 — 答题回顾</p>';
    var wrongCount = 0;
    var labels = ["A", "B", "C", "D"];
    for (var i = 0; i < 5; i++) {
      var q = quizQuestions[quizRound * 5 + i];
      var userAns = quizAnswers[i];
      var isCorrect = userAns === q.ans;
      if (!isCorrect) wrongCount++;
      var cardClass = isCorrect ? "correct2" : "wrong";
      var badgeHtml = isCorrect ? '<span class="rbadge ok">✓ 正确</span>' : '<span class="rbadge fail">✗ 错误</span>';
      html += '<div class="review-card ' + cardClass + '">';
      html += '<div class="rq">' + badgeHtml + (i + 1) + ". " + q.q + "</div>";
      if (!isCorrect) {
        html += '<div class="review-user-ans">你的答案：' + labels[userAns] + ". " + q.opts[userAns] + "</div>";
        html += '<div class="review-correct-ans">正确答案：' + labels[q.ans] + ". " + q.opts[q.ans] + "</div>";
        html += '<div class="review-explain"><div class="rtitle">&#128161; 解析</div><div class="rtext">' + q.explain + "</div></div>";
      } else {
        html += '<div style="font-size:13px;color:#22c55e;margin-top:2px;">你的答案：' + labels[userAns] + ". " + q.opts[userAns] + " ✓</div>";
      }
      html += "</div>";
    }
    if (wrongCount === 0) {
      html += '<p style="text-align:center;color:#22c55e;font-size:15px;margin-top:12px;">&#127881; 全部正确！你对驻波知识掌握得很好！</p>';
    } else {
      html += '<p style="text-align:center;color:#f59e0b;font-size:14px;margin-top:12px;">共错 ' + wrongCount + ' 题，仔细阅读解析，理解后再继续！</p>';
    }
    html += '<div class="quiz-btn-row"><button class="btn-reset" id="btnBackResult" style="font-size:14px;">&#8592; 返回结果</button></div>';
    document.getElementById("quizBody").style.display = "none";
    document.getElementById("quizResult").style.display = "block";
    document.getElementById("quizResult").innerHTML = html;
    setTimeout(function() {
      var btnBack = document.getElementById("btnBackResult");
      if (btnBack) btnBack.addEventListener("click", function() { showRoundResultSkipSave(); });
    }, 100);
  }

  function showRoundResultSkipSave() {
    var correctCount = quizScores[quizRound];
    document.getElementById("quizBody").style.display = "none";
    document.getElementById("quizResult").style.display = "block";
    var stars = getStars(correctCount, 5);
    var scoreClass = correctCount >= 4 ? "great" : (correctCount >= 2 ? "good" : "poor");
    var comment = correctCount >= 4 ? "太棒了！" : (correctCount >= 2 ? "继续加油！" : "再看看实验吧！");
    var html = '<div class="quiz-score ' + scoreClass + '">' + correctCount + "/5</div>";
    if (stars) html += '<p style="font-size:20px;margin:4px 0;">' + stars + "</p>";
    html += '<p style="font-size:16px;margin:8px 0;color:#94a3b8;">' + comment + "</p>";
    if (quizRound < 2) {
      html += '<p style="font-size:13px;color:#64748b;margin-bottom:8px;">已完成第' + (quizRound + 1) + '关，进度已保存</p>';
      html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnReviewRound" style="font-size:14px;">&#128203; 查看回顾</button></div>';
      html += '<div class="quiz-btn-row">';
      html += '<button class="btn-primary" id="btnNextRound" style="font-size:14px;padding:8px 24px;">进入下一关</button>';
      html += '<button class="btn-reset" id="btnRetryRound" style="font-size:14px;">重新挑战本关</button>';
      html += "</div>";
    } else {
      var total = quizScores[0] + quizScores[1] + quizScores[2];
      var totalClass = total >= 12 ? "great" : (total >= 8 ? "good" : "poor");
      var totalStars = getStars(total, 15);
      html = '<div class="quiz-score ' + totalClass + '">' + total + '/15</div>';
      if (totalStars) html += '<p style="font-size:20px;margin:4px 0;">' + totalStars + '</p>';
      html += '<p style="font-size:14px;color:#94a3b8;margin-bottom:8px;">第1关: ' + quizScores[0] + '/5 &nbsp; 第2关: ' + quizScores[1] + '/5 &nbsp; 第3关: ' + quizScores[2] + '/5</p>';
      html += '<p style="font-size:16px;margin:8px 0;color:' + (total >= 12 ? '#22c55e' : total >= 8 ? '#f59e0b' : '#ef4444') + ';">' + (total >= 12 ? '恭喜通关！你对驻波知识理解透彻！' : total >= 8 ? '还不错，再复习一下错题吧！' : '建议回到实验观察不同谐波模式下弦的振动形态。') + '</p>';
      html += '<div class="quiz-btn-row"><button class="btn-primary" id="btnReviewRound" style="font-size:14px;">&#128203; 查看回顾</button></div>';
      html += '<div class="quiz-btn-row">';
      html += '<button class="btn-primary" id="btnRetryAll" style="font-size:14px;padding:8px 24px;">重新全部挑战</button>';
      html += '<button class="btn-reset" id="btnBackExp" style="font-size:14px;">返回实验</button>';
      html += '</div>';
    }
    document.getElementById("quizResult").innerHTML = html;
    bindResultButtons();
  }
  // ============================
  //  END QUIZ
  // ============================
  </script>
  <script>
    (function() {
      var header = document.querySelector('.header');
      var hideTimer = null;
      var HIDE_DELAY = 800;
      function show() { clearTimeout(hideTimer); header.classList.remove('hidden'); document.body.classList.remove('header-hidden'); }
      function hide() { hideTimer = setTimeout(function() { header.classList.add('hidden'); document.body.classList.add('header-hidden'); }, HIDE_DELAY); }
      document.addEventListener('mousemove', function(e) {
        if (e.clientY <= 60) show();
        else if (e.clientY > header.offsetHeight + 20 && !header.classList.contains('hidden')) hide();
      });
      header.addEventListener('mouseenter', show);
      header.addEventListener('mouseleave', hide);
      hideTimer = setTimeout(function() { header.classList.add('hidden'); document.body.classList.add('header-hidden'); }, 2000);
    })();
  </script>
