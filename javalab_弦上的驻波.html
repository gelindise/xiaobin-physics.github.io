<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=10">
  <title>弦上的驻波 — 谐波与频率 - 物理虚拟实验</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/addons/p5.dom.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/addons/p5.sound.min.js"></script>
  <style>
    .main-card { max-width: 900px; margin: 0 auto 24px; padding: 0 16px; }
    .canvas-wrap { border-radius: 12px; padding: 4px; width: 100%; box-sizing: border-box; border: 1px solid #e2e8f0; position: relative; background: #fff; }
    .controls-bar { display: flex; align-items: center; justify-content: center; padding: 12px 16px; gap: 20px; flex-wrap: wrap; background: #1a1a2e; border-radius: 0 0 12px 12px; border-top: 1px solid #333; color: #ccc; font-size: 13px; }
    .controls-bar .ctrl-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .controls-bar label { color: #ccc; font-size: 12px; white-space: nowrap; }
    .controls-bar input[type="range"] { width: 100px; accent-color: #8b5cf6; }
    .controls-bar input[type="checkbox"] { accent-color: #8b5cf6; }
    #radioA { display: flex; gap: 6px; }
    #radioA label { color: #ccc; font-size: 12px; cursor: pointer; }
    #radioA input[type="radio"] { accent-color: #8b5cf6; }
    .hint-text { color: #888; font-size: 12px; }
    .section { padding: 1.5rem 2rem 0.5rem; }
    .section h2 { font-size: 1.4rem; }
    .formula-bar { max-width: 900px; margin: 0 auto 24px; padding: 0 16px; display: flex; gap: 12px; flex-wrap: wrap; }
    .formula-item { flex: 1; min-width: 180px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px 16px; }
    .formula-item .label { color: #64748b; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; }
    .formula-item .value { color: #e2e8f0; font-size: 13px; }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">物理虚拟实验</div>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="experiments.html">实验列表</a>
    </nav>
  </header>

  <div class="section">
    <h2>弦上的驻波 — 谐波与频率</h2>
    <p style="color:#94a3b8;margin:0 0 16px 0;">弦两端固定，拨动后形成驻波。调节按弦位置改变弦长，弦越短音调越高。选择不同谐波模式观察振动形态。</p>
  </div>

  <div class="main-card">
    <div class="canvas-wrap">
      <div id="myContainer"></div>
    </div>
    <div class="controls-bar">
      <div class="ctrl-col" id="radioA"></div>
      <div class="ctrl-col">
        <label id="spanA">按弦位置</label>
        <input type="range" id="rangeA" min="0" max="100" value="50">
      </div>
      <div class="ctrl-col">
        <label id="spanB">振幅</label>
        <input type="range" id="rangeB" min="0" max="100" value="50">
      </div>
      <div class="ctrl-col">
        <input type="checkbox" id="checkA" name="checkA" value="checkA" unchecked />
        <label for="checkA" id="checkAlabel">聆听声音（正弦波）</label>
      </div>
      <span class="hint-text">谐波越高，节点越多，频率越高</span>
    </div>
  </div>

  <div class="formula-bar">
    <div class="formula-item">
      <span class="label">驻波条件</span>
      <span class="value">L = n·λ/2 &nbsp;→&nbsp; 弦长等于半波长的整数倍时形成驻波</span>
    </div>
    <div class="formula-item">
      <span class="label">频率公式</span>
      <span class="value">f = n·v/(2L) &nbsp;—&nbsp; 弦越短、谐波数越高，频率越高</span>
    </div>
    <div class="formula-item">
      <span class="label">谐波系列</span>
      <span class="value">基频 f₀ → 2f₀（第2谐波）→ 3f₀（第3谐波）→ …</span>
    </div>
  </div>

  <script src="protect.js"></script>
  <script>
  // ---- state ----
  var radioA;
  var spanA, spanB, rangeA, rangeB, checkA, checkAlabel;
  var osc1, osc2, osc4;
  var guitarImage, fingerImage;
  var minX = 0.155;
  var fingerX = 0.2;
  var maxX = 0.828;
  var tabOX = [0, 0.1125, 0.0684, 0.024, 0.024, 0.0684, 0.1125];
  var tabOY = [0, 0.2, 0.2, 0.2, 0.16, 0.16, 0.16];
  var tabY  = [0, 0.195, 0.195, 0.195, 0.165, 0.165, 0.165];
  var lineY = [0, 0.2, 0.192, 0.184, 0.176, 0.168, 0.16];
  var lineWeight = [0, 0.00244949, 0.002236068, 0.002, 0.001732051, 0.001414214, 0.001];
  var waveMax = 200;
  var wave = [];
  var timming = 0;

  function preload() {
    guitarImage = loadImage("standing_wave_guitar.png");
    fingerImage = loadImage("standing_wave_finger.png");
  }

  function setup() {
    frameRate(60);
    var o = select("#myContainer");
    var a = 0.36;
    var w = int((o.width > (window.innerHeight - 160) / a) ? (window.innerHeight - 160) / a : o.width);
    var h = int(w * a);
    myCanvas = createCanvas(w, h);
    myCanvas.parent("myContainer");
    myCanvas.id("myP5Canvas");

    spanA = select("#spanA");
    spanA.html("按弦位置");
    spanB = select("#spanB");
    spanB.html("振幅");
    rangeA = select("#rangeA");
    rangeB = select("#rangeB");
    checkA = select("#checkA");
    checkA.changed(setup2);
    checkAlabel = select("#checkAlabel");
    checkAlabel.html("聆听声音（正弦波）");

    radioA = createRadio("radioA");
    radioA.option("1", "1");
    radioA.option("2", "2");
    radioA.option("3", "3");
    radioA.option("4", "4");
    radioA.option("5", "5");
    radioA.option("6", "6");
    radioA.parent("radioA");
    radioA.value("1");
    radioA.changed(setup2);

    osc1 = new p5.Oscillator();
    osc1.setType('sine');
    osc1.amp(0);
    osc2 = new p5.Oscillator();
    osc2.setType('sine');
    osc2.amp(0);
    osc4 = new p5.Oscillator();
    osc4.setType('sine');
    osc4.amp(0);

    setup2();
  }

  function windowResized() {
    var o = select("#myContainer");
    var a = 0.36;
    var w = int((o.width > (window.innerHeight - 160) / a) ? (window.innerHeight - 160) / a : o.width);
    var h = int(w * a);
    resizeCanvas(w, h);
  }

  function setup2() {
    var lineNum = int(radioA.value());
    for (var i = 0; i < waveMax; i++) {
      wave[i] = sin(map(i, 0, waveMax - 1, 0, PI * lineNum));
    }
    if (checkA.checked()) {
      osc1.start();
      osc2.start();
      osc4.start();
    } else {
      osc1.amp(0, 0.5);
      osc2.amp(0, 0.5);
      osc4.amp(0, 0.5);
    }
  }

  function draw() {
    if (touches.length > 1) return;
    strokeWeight(width * 0.001);
    textSize(width * 0.025);
    textAlign(CENTER, CENTER);

    if (getAudioContext().state !== 'running') {
      getAudioContext().resume();
    }

    image(guitarImage, 0, 0, width, width * 0.36);

    var lineNum = int(radioA.value());
    fingerX = map(rangeA.value(), 0, 200, minX, maxX);
    timming += 0.05 * lineNum * (-200 / (rangeA.value() - 200));
    var amplitude = map(rangeB.value(), 0, 100, 0, 0.02) * sin(timming);
    var frequency = sqrt(lineNum) * 200 * (-200 / (rangeA.value() - 200));

    osc1.freq(frequency);
    osc2.freq(frequency / 2);
    osc4.freq(frequency / 4);

    if (checkA.checked()) {
      var oscAmp = map(rangeB.value(), 0, 100, 0, 0.5);
      osc1.amp(oscAmp);
      osc2.amp(oscAmp / 2);
      osc4.amp(oscAmp / 4);
    }

    // Draw string with standing wave
    noFill();
    stroke(0);
    strokeWeight(width * lineWeight[lineNum]);
    beginShape();
    vertex(width * tabOX[lineNum], width * tabY[lineNum]);
    vertex(width * minX, width * lineY[lineNum]);
    vertex(width * fingerX, width * lineY[lineNum]);
    for (var i = 0; i < waveMax; i++) {
      vertex(width * map(i, 0, waveMax - 1, fingerX, maxX),
        width * (lineY[lineNum] + amplitude * wave[i]));
    }
    endShape();

    // Draw nut position markers
    noStroke();
    fill(217);
    for (var i = 1; i < 7; i++) {
      ellipse(width * tabOX[i], width * tabOY[i], width * 0.01, width * 0.01);
    }

    // Draw finger image
    if (rangeA.value() > 0) {
      image(fingerImage, width * (fingerX - 0.038), width * (lineY[lineNum] - 0.005),
        width * 0.0005 * fingerImage.width, width * 0.0005 * fingerImage.height);
    }
  }
  </script>
</body>
</html>
