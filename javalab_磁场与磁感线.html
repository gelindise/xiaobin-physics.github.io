<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=10">
  <title>物理虚拟实验 - 磁场与磁感线</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      overflow-x: hidden;
      background: #f0f0f0;
    }
    #myContainer { text-align: center; position: relative; }
    #divFull {
      background-color: white;
      position: relative;
      font-size: 18px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    #myP5Canvas { touch-action: pinch-zoom; display: block; margin: 0 auto; }
    .sim-wrapper {
      max-width: 1100px;
      margin: 60px auto 0;
      padding: 10px;
    }
    .flexContainer {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      background: #f8f9fa;
      border-radius: 10px;
      margin-top: 8px;
    }
    .flexContainer * { color: #000 !important; }
    .flexItem { display: inline-flex; align-items: center; gap: 6px; }
    .flexItem label {
      font-size: 15px;
      font-weight: 600;
      color: #000;
      white-space: nowrap;
    }
    .flexItem input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #3b82f6;
    }
    .flexItem .radio-group {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .flexItem .radio-group label {
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      padding: 4px 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: #fff;
      transition: all 0.2s;
    }
    .flexItem .radio-group input[type="radio"] { display: none; }
    .flexItem .radio-group input[type="radio"]:checked + label {
      background: #3b82f6;
      color: #fff !important;
      border-color: #3b82f6;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">物理虚拟实验</div>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="experiments.html">实验列表</a>
      <a href="vip.html">开通VIP</a>
    </nav>
  </header>

  <div class="sim-wrapper">
    <div id="divFull">
      <div id="myContainer"></div>
      <div class="flexContainer">
        <div class="flexItem">
          <span id="radioA"></span>
        </div>
        <div class="flexItem">
          <input type="checkbox" id="checkA" checked>
          <label for="checkA" id="chalkA" style="font-weight:600;color:#000;cursor:pointer;">自动旋转</label>
        </div>
        <div class="flexItem">
          <a href="javascript:doFullScreen();" style="box-shadow:none;">
            <svg width="32" height="32" viewBox="0 0 40 40" style="vertical-align:middle;">
              <path d="M5,15 L5,5 L15,5 M35,25 L35,35 L25,35 M25,5 L35,5 L35,15 M15,35 L5,35 L5,25" fill="none" stroke="#555" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
      </div>
    </div>
    <p style="text-align:center;font-size:14px;color:#999;margin-top:8px;">拖动旋转视角 · 红色=N极方向 蓝色=S极方向</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/addons/p5.dom.min.js"></script>
  <script>
    // ========== 工具函数 ==========
    function doFullScreen() {
      const el = document.getElementById('divFull');
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }

    // ========== 主模拟代码 ==========
    let radioA, checkA, chalkA;
    let barImage, earthImage;
    let needleX = [], needleY = [], needleZ = [];
    let rotZAngles = [], rotYAngles = [];
    let rotX = -0.3, rotY = 0;

    function preload() {
      barImage = loadImage("images/bar_magnet_texture.png");
      earthImage = loadImage("images/earth_movements_map.png");
    }

    function setup() {
      let container = select("#myContainer");
      let w = int(min(container.width, window.innerHeight - 160));
      let h = w;
      setAttributes("antialias", true);
      myCanvas = createCanvas(w, h, WEBGL);
      myCanvas.parent("myContainer");
      myCanvas.id("myP5Canvas");
      pixelDensity(1);

      // 单选按钮
      radioA = createRadio("radioA");
      radioA.option("bar", "条形磁铁");
      radioA.option("earth", "地球");
      radioA.parent("radioA");
      radioA.selected("bar");

      checkA = select("#checkA");
      chalkA = select("#chalkA");
      chalkA.html("自动旋转");

      // 磁极位置（条形磁铁的两个磁极）
      let poleX = [0, 0], poleY = [-200, 200], poleZ = [0, 0];
      let poleSign = [-1, 1];

      // 生成小磁针位置：500个散布 + 40个靠近磁极
      for (let i = 0; i < 540; i++) {
        let x, y, z;
        if (i < 500) {
          x = random(-500, 500);
          y = random(-500, 500);
          z = random(-500, 500);
        } else {
          x = random(-80, 80);
          y = random(-80, 80) + (i < 520 ? 200 : -200);
          z = random(-80, 80);
        }
        if (mag(x, z) > 480) continue;
        needleX.push(x);
        needleY.push(y);
        needleZ.push(z);
      }

      // 预计算磁场方向
      for (let i = 0; i < needleX.length; i++) {
        let vx = 0, vy = 0, vz = 0;
        for (let j = 0; j < poleX.length; j++) {
          let dx = needleX[i] - poleX[j];
          let dy = needleY[i] - poleY[j];
          let dz = needleZ[i] - poleZ[j];
          let d = sqrt(dx*dx + dy*dy + dz*dz);
          if (d < 0.001) continue;
          let f = poleSign[j] / (d * d * d);
          vx += f * dx;
          vy += f * dy;
          vz += f * dz;
        }
        let m = sqrt(vx*vx + vy*vy + vz*vz);
        if (m < 0.001) { vx = 0; vy = 0; vz = 1; m = 1; }
        vx /= m; vy /= m; vz /= m;
        // 计算旋转角：将Z轴转向磁场方向
        rotZAngles[i] = atan2(vy, vx);
        rotYAngles[i] = acos(constrain(vz, -1, 1));
      }
    }

    function windowResized() {
      let container = select("#myContainer");
      let w = int(min(container.width, window.innerHeight - 160));
      let h = w;
      resizeCanvas(w, h);
    }

    function draw() {
      // 清屏
      if (radioA.value() == "bar") {
        background(230, 250, 230);
      } else {
        background(30, 30, 50);
      }

      // 自动旋转
      if (checkA.checked()) rotY += 0.005;

      // 全局场景变换
      push();
      scale(width / 1000);
      rotateX(rotX);
      rotateY(rotY);

      // ==== 绘制磁源 ====
      noStroke();
      if (radioA.value() == "bar") {
        // 条形磁铁：沿X轴
        // N极（红色）
        push();
        fill(255, 30, 30);
        translate(-100, 0, 0);
        box(180, 46, 22);
        pop();
        // S极（蓝色）
        push();
        fill(30, 30, 255);
        translate(100, 0, 0);
        box(180, 46, 22);
        pop();
        // 中间分隔
        push();
        fill(180, 180, 180);
        translate(0, 0, 0);
        box(12, 46, 22);
        pop();
      }

      if (radioA.value() == "earth") {
        // 地球
        push();
        fill(60, 120, 220);
        sphere(180);
        pop();
        // 地球上的纹理叠加
        if (earthImage && earthImage.width > 0) {
          push();
          fill(255);
          texture(earthImage);
          sphere(185);
          pop();
        }
      }

      // ==== 绘制小磁针 ====
      for (let i = 0; i < needleX.length; i++) {
        push();
        translate(needleX[i], needleY[i], needleZ[i]);
        rotateZ(rotZAngles[i] || 0);
        rotateY(rotYAngles[i] || 0);
        // N极（红色）指向磁场方向
        fill(255, 40, 40);
        translate(0, 0, 8);
        box(5, 5, 16);
        // S极（蓝色）背向磁场方向
        fill(40, 40, 255);
        translate(0, 0, -16);
        box(5, 5, 16);
        pop();
      }

      pop();
    }

    // ========== 视角拖拽 ==========
    let pmx, pmy, dragged = false;

    function touchStarted() {
      if (mouseX >= 0 && mouseX <= width && mouseY >= 0 && mouseY <= height) {
        pmx = 1000 * mouseX / width;
        pmy = 1000 * mouseY / width;
        dragged = true;
      }
    }

    function touchMoved() {
      if (dragged) {
        rotX += 0.002 * (pmy - 1000 * mouseY / width);
        rotX = constrain(rotX, -HALF_PI, HALF_PI);
        rotY += 0.002 * (1000 * mouseX / width - pmx);
        pmx = 1000 * mouseX / width;
        pmy = 1000 * mouseY / width;
        return false;
      }
    }

    function touchEnded() { dragged = false; }

    function mousePressed() { touchStarted(); }
    function mouseDragged() { return touchMoved(); }
    function mouseReleased() { touchEnded(); }
  </script>
</body>
</html>
